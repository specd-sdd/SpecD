schema: '@specd/schema-std'

# Agent instructions prepended before spec content
context:
  - instruction: >-
      specd is a spec-driven development platform. TypeScript, pnpm monorepo, ESM only.
      Hexagonal architecture: domain (no I/O), application (ports), infrastructure (fs adapters).
      Rich entities enforce invariants; pure functions for stateless services; manual DI, no IoC.
      Packages: @specd/core (business logic), @specd/cli, @specd/mcp, @specd/skills,
      @specd/schema-std, plugins (claude, copilot, codex).
      Never write directly to specs/ folder. Use specd workflow skills or specd commands: draft spec,
      implement, review, approve, merge, archive.
      Specs live in specs/ — they are requirements, not documentation. Code implements specs.
      Don't write code without a spec. Use specd's workflow: draft spec, implement, review, approve, merge, archive.
      Always keep specs up to date. Specs are the source of truth, not code comments or external docs.
      Always read existing specs before drafting new ones. Avoid duplicates; update existing specs instead.
      Use specd's context features to include relevant specs in workflow steps. For example, include
      'default:*' to always have global specs in context.

workspaces:
  default:
    prefix: _global
    specs:
      adapter: fs
      fs:
        path: specs/_global
    ownership: owned
    graph:
      excludePaths:
        - node_modules/
        - .git/
        - .specd/
        - dist/
        - build/
        - coverage/
        - .next/
        - .nuxt/
        - packages/
        - apps/

  core:
    prefix: core
    specs:
      adapter: fs
      fs:
        path: specs/core
    codeRoot: packages/core
    ownership: owned

  cli:
    prefix: cli
    specs:
      adapter: fs
      fs:
        path: specs/cli
    codeRoot: packages/cli
    ownership: owned

  code-graph:
    prefix: code-graph
    specs:
      adapter: fs
      fs:
        path: specs/code-graph
    codeRoot: packages/code-graph
    ownership: owned

  public-web:
    prefix: public-web
    specs:
      adapter: fs
      fs:
        path: specs/public-web
    codeRoot: apps/public-web
    ownership: owned

storage:
  changes:
    adapter: fs
    fs:
      path: .specd/changes
  drafts:
    adapter: fs
    fs:
      path: .specd/drafts
  discarded:
    adapter: fs
    fs:
      path: .specd/discarded
  archive:
    adapter: fs
    fs:
      path: .specd/archive
      pattern: '{{year}}/{{month}}/{{change.archivedName}}'

approvals:
  spec: false
  signoff: false

# Global constraints always in context regardless of change scope
contextIncludeSpecs:
  - 'default:*'

contextExcludeSpecs:
  - 'default:commits'

llmOptimizedContext: true

schemaOverrides:
  append:
    artifacts:
      - id: design
        rules:
          post:
            - id: designing-docs
              instruction: >-
                You MUST add instructions to update documentation in docs/ if needed on the design.md.
            - id: check-global-specs-compliance
              instruction: >-
                Cross-reference this design against the global specs (default:_global/*):
                architecture (hexagonal layers, dependency direction, no I/O in domain),
                conventions (naming, exports, ESM, no default exports, no any),
                and testing (test structure, coverage). Flag any decision that violates
                a global constraint before proceeding.
                Ensure proper JSDoc per default:_global/docs.
    workflow:
      - step: designing
        hooks:
          post:
            - id: designing-check-global-specs
              instruction: >-
                Before finishing design, review all artifacts and deltas in this change
                against the global specs (default:_global/*). Check compliance with:
                architecture (hexagonal layers, dependency direction), conventions
                (naming, exports, ESM), testing (structure, coverage expectations),
                and any other applicable global constraint. Flag violations before
                transitioning to ready.
      - step: implementing
        hooks:
          post:
            - id: implementing-run-tests
              run: 'pnpm test'
            - id: implementing-run-lint
              run: 'pnpm lint'
      - step: archiving
        hooks:
          pre:
            - id: archiving-run-tests
              run: 'pnpm test'
            - id: archiving-run-lint
              run: 'pnpm lint'
