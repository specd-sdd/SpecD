schema: '@specd/schema-std'

# Agent instructions prepended before spec content
context:
  - instruction: |
      specd is a spec-driven development platform. TypeScript, pnpm monorepo,
      ESM only. Hexagonal architecture: domain (no I/O), application (ports),
      infrastructure (fs adapters). Rich entities enforce invariants; pure
      functions for stateless services; manual DI, no IoC. Packages: @specd/core
      (business logic), @specd/cli, @specd/mcp, @specd/skills,
      @specd/schema-std, plugins (claude, copilot, codex). Never write directly
      to specs/ folder. Use specd workflow skills or specd commands: draft spec,
      implement, review, approve, merge, archive. Specs live in specs/ — they
      are requirements, not documentation. Code implements specs. Don't write
      code without a spec. Use specd's workflow: draft spec, implement, review,
      approve, merge, archive. Always keep specs up to date. Specs are the
      source of truth, not code comments or external docs. Always read existing
      specs before drafting new ones. Avoid duplicates; update existing specs
      instead. Use specd's context features to include relevant specs in
      workflow steps. For example, include 'default:*' to always have global
      specs in context. Always write artifacts, code, comments, and
      documentation in english.

workspaces:
  default:
    prefix: _global
    specs:
      adapter: fs
      fs:
        path: specs/_global
    ownership: owned
    graph:
      excludePaths:
        - node_modules/
        - .git/
        - .specd/
        - dist/
        - build/
        - coverage/
        - .next/
        - .nuxt/
        - packages/
        - apps/

  core:
    prefix: core
    specs:
      adapter: fs
      fs:
        path: specs/core
    codeRoot: packages/core
    ownership: owned

  cli:
    prefix: cli
    specs:
      adapter: fs
      fs:
        path: specs/cli
    codeRoot: packages/cli
    ownership: owned

  code-graph:
    prefix: code-graph
    specs:
      adapter: fs
      fs:
        path: specs/code-graph
    codeRoot: packages/code-graph
    ownership: owned

  skills:
    specs:
      adapter: fs
      fs:
        path: specs/skills
    codeRoot: packages/skills
    ownership: owned

  plugin-manager:
    specs:
      adapter: fs
      fs:
        path: specs/plugins-manager
    codeRoot: packages/plugin-manager
    ownership: owned

  plugin-agent-claude:
    specs:
      adapter: fs
      fs:
        path: specs/plugins-claude
    codeRoot: packages/plugin-agent-claude
    ownership: owned

  plugin-agent-copilot:
    specs:
      adapter: fs
      fs:
        path: specs/plugins-copilot
    codeRoot: packages/plugin-agent-copilot
    ownership: owned

  plugin-agent-codex:
    specs:
      adapter: fs
      fs:
        path: specs/plugins-codex
    codeRoot: packages/plugin-agent-codex
    ownership: owned

  plugin-agent-opencode:
    specs:
      adapter: fs
      fs:
        path: specs/plugins-opencode
    codeRoot: packages/plugin-agent-opencode
    ownership: owned

  specd-metapackage:
    specs:
      adapter: fs
      fs:
        path: specs/specd
    codeRoot: packages/specd
    ownership: owned

  public-web:
    prefix: public-web
    specs:
      adapter: fs
      fs:
        path: specs/public-web
    codeRoot: apps/public-web
    ownership: owned

storage:
  changes:
    adapter: fs
    fs:
      path: .specd/changes
  drafts:
    adapter: fs
    fs:
      path: .specd/drafts
  discarded:
    adapter: fs
    fs:
      path: .specd/discarded
  archive:
    adapter: fs
    fs:
      path: .specd/archive
      pattern: '{{year}}/{{month}}/{{change.archivedName}}'

approvals:
  spec: false
  signoff: false

# Global constraints always in context regardless of change scope
contextIncludeSpecs:
  - 'default:*'

contextExcludeSpecs:
  - 'default:_global/commits'

llmOptimizedContext: true

schemaOverrides:
  append:
    artifacts:
      - id: design
        rules:
          post:
            - id: designing-docs
              instruction: |
                You MUST add instructions to update documentation in docs/ if
                needed on the design.md.
            - id: check-global-specs-compliance
              instruction: |
                Cross-reference this design against the global specs
                (default:_global/*): architecture (hexagonal layers, dependency
                direction, no I/O in domain), conventions (naming, exports, ESM,
                no default exports, no any), and testing (test structure,
                coverage). Flag any decision that violates a global constraint
                before proceeding. Ensure proper JSDoc per default:_global/docs.

    workflow:
      - step: designing
        hooks:
          post:
            - id: designing-check-global-specs
              instruction: |
                Before finishing design, review all artifacts and deltas in this
                change against the global specs (default:_global/*). Check
                compliance with: architecture (hexagonal layers, dependency
                direction), conventions (naming, exports, ESM), testing
                (structure, coverage expectations), and any other applicable
                global constraint. Flag violations before transitioning to
                ready.
      - step: implementing
        hooks:
          post:
            - id: implementing-run-tests
              run: 'pnpm test'
            - id: implementing-run-lint
              run: 'pnpm lint'
            - id: implementing-run-typecheck
              run: 'pnpm typecheck'
      - step: verifying
        hooks:
          pre:
            - id: verifying-run-tests
              run: 'pnpm test'
            - id: verifying-run-lint
              run: 'pnpm lint'
            - id: verifying-run-typecheck
              run: 'pnpm typecheck'
      - step: archiving
        hooks:
          pre:
            - id: archiving-run-tests
              run: 'pnpm test'
            - id: archiving-run-lint
              run: 'pnpm lint'
            - id: archiving-edit-description
              instruction: |
                Read the proposal.md and design.md files in this change
                directory. Based on their content, write a more elaborate
                description (2-3 sentences) that summarizes the change purpose
                and outcomes.

                You MUST ask the user to review and edit this description for clarity and
                completeness. 

                You can edit the change description using the command line after
                this step with `specd change edit <change-name> --description
                "..."`.
            - id: archiving-release-info
              instruction: |
                Run `specd change status` to get the list of affected specs,
                then create a `.changeset-release.yaml` file in the change
                directory with release metadata:

                ```yaml
                releases:
                  <workspace>:<spec-path>: patch  # major | minor | patch per spec
                  <workspace>:<spec-path>: minor
                ```

                For each affected spec, set the appropriate bump type: - 'major'
                — breaking API changes - 'minor' — new features - 'patch' —
                fixes, refactors, chores (default)

                Example for a change affecting 2 specs:

                ```yaml
                releases:
                  core:core/validate-artifacts: patch
                  cli:cli/change-validate: minor
                ```
            - id: archiving-adrs
              instruction: |
                Review whether this change introduced any durable decisions that may merit an ADR.

                Be conservative. Prefer no ADR recommendation over ADR spam.

                A design choice inside a single change is not automatically ADR-worthy. Only surface decisions likely to remain relevant beyond this change.

                Before recommending a new ADR, consider whether:
                - an existing ADR should be updated instead
                - the decision is already sufficiently captured elsewhere
                - the decision is too local or tactical to deserve an ADR

                If you identify an ADR candidate:

                - do NOT assume an ADR should be created automatically
                - present it as a candidate for user confirmation
                - propose an ADR filename under `docs/adr`, following the format rules in `default:_global/docs`
                - if an existing ADR appears more appropriate to update, propose that instead

                For each candidate, ask the user explicitly whether they want to:

                1. create the proposed ADR
                2. update an existing ADR
                3. dismiss the candidate

                Return the result as a concise interactive review, for example:

                Potential ADR candidates detected:

                1. Separate verification from approval gates  
                Suggested file: docs/adr/0018-separate-verification-from-approval-gates.md  
                Reason: affects lifecycle semantics for future changes.

                You MUST ask the user to create this ADR, update an existing ADR, or dismiss this candidate.

                Only draft ADR content if the user explicitly chooses to create or update an ADR.
          post:
            - id: archiving-create-changeset
              run: 'node dev/scripts/hooks/post-archive-changeset.js {{change.archivedName}}'

plugins:
  agents:
    - name: '@specd/plugin-agent-codex'
    - name: '@specd/plugin-agent-claude'
    - name: '@specd/plugin-agent-copilot'
    - name: '@specd/plugin-agent-opencode'
