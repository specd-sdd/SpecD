kind: schema
name: schema-std
version: 1
description: Standard SpecD workflow — proposal → specs → design → tasks

artifacts:
  # ── proposal ──────────────────────────────────────────────────────────────
  - id: proposal
    scope: change
    output: proposal.md
    description: Initial proposal outlining why the change is needed
    template: templates/proposal.md
    requires: []
    instruction: |
      Create the proposal document that establishes WHY this change is needed.
      The template contains `<!-- ... -->` comments with guidance for each section —
      these are instructions for you, not content. Do NOT copy them into the output file.

      Sections to include:
      - **Motivation**: 1–2 sentences on the problem or opportunity. What is broken or missing? Why now?
      - **Current behaviour**: What happens today. What is missing or broken.
      - **Proposed solution**: High-level description of what we want to build or change.
      - **Specs affected**: List every spec that will be created or modified, split into
        two subsections:
        - **New specs**: each becomes `specs/<workspace>/<capability-path>/spec.md`.
          Format: `<workspace>:<capability-path>`: brief description.
          Under each spec, list its dependencies: `Depends on: <specId>, <specId>, ...`
          or `Depends on: none`.
        - **Modified specs**: existing specs whose requirements change. Each needs a delta file.
          Run `specd spec list --format json --summary` to discover existing specs, and
          `specd spec show <workspace>:<capability-path> --format json` for full review.
          Format: `<workspace>:<capability-path>`: what requirement is changing and why.
          Under each spec, list any new dependencies this change introduces:
          `Depends on (added): <specId>, ...` or `Depends on (added): none`.
      - **Impact**: Affected code areas, APIs, data models, or external dependencies.
      - **Technical context**: Technical insights, constraints, and decisions discussed
        during the proposal conversation. Record what was actually discussed — if concrete
        structures, file paths, or interfaces came up, include them. Covers constraints
        discovered, alternatives evaluated and ruled out, architectural direction, domain
        modelling decisions, and any concrete structures or interfaces explored. Do not
        invent design details that were not discussed — only record what was agreed or
        explored with the user. This section may be left empty if no technical discussion
        took place.
      - **Open questions**: Unresolved decisions that must be settled before spec work begins.

      The "Specs affected" section is the contract between proposal and specs — every spec
      listed there will need a corresponding file or delta. Research existing specs before
      filling it in.

      Dependencies listed under each spec are also a contract — they declare which other
      specs a given spec depends on (uses their types, calls their APIs, or builds on
      their requirements). These dependencies are used by specd for transitive context
      compilation. To identify dependencies, examine what each spec will need from other
      specs: shared types, APIs it calls, concepts it references.

      Keep it concise (1–2 pages). Focus on the "why", not the "how" — implementation
      details belong in design.md.
    rules:
      post:
        - id: resolve-open-questions
          instruction: |
            Review the "Open questions" section of the proposal. If any question
            affects downstream artifacts (specs, design, tasks), it must be resolved
            with the user before proceeding. Do not write specs or design while
            unresolved questions could change the direction of those artifacts.
        - id: register-spec-deps
          instruction: |
            Review the "Specs affected" section. For each spec (new or modified)
            that lists dependencies, register them now. Dependency registration
            affects context compilation for all downstream artifacts — do not
            defer this to the specs artifact.

  # ── specs ──────────────────────────────────────────────────────────────────
  - id: specs
    scope: spec
    output: 'specs/**/spec.md'
    description: Detailed specifications defining what the system should do
    template: templates/spec.md
    requires:
      - proposal
    instruction: |
      Create new specification files for every new spec listed in the proposal's
      "Specs affected" section. Each new spec defines WHAT the system should do for
      one capability. The template contains `<!-- ... -->` comments with guidance —
      these are instructions for you, not content. Do NOT copy them into the output file.

      New specs are written as **full files** under `{{change.path}}/specs/` — NOT as deltas.
      Deltas (under `{{change.path}}/deltas/`) are only for modifying existing specs
      (handled by deltaInstruction).

      The proposal lists each spec as `<workspace>:<capability-path>`. Use those
      components to create `{{change.path}}/specs/<workspace>/<capability-path>/spec.md` using the
      template.

      Format requirements:
      - Include a Purpose section: start with WHY this spec exists, then briefly describe what it covers.
      - Use `### Requirement: <name>` for each requirement.
      - Use SHALL / MUST for normative statements. Avoid "should" or "may" for hard rules.
      - Do not include WHEN/THEN scenarios here — those go in verify.md.

      Before writing each spec, review the proposal's "Open questions" section. If any
      open question affects the spec you are writing, ask the user to resolve it before
      proceeding — do not make assumptions about unresolved decisions.

      Every spec MUST include a `## Spec Dependencies` section.

      If the spec depends on other specs (uses their types, calls their APIs, or
      builds on their requirements), list each dependency with a brief reason.

      Preferred format:
      - `- [\`<workspace>:<capability-path>\`](../relative/path/spec.md) — <reason>`

      Compatible fallback when there is no link:
      - `- \`<workspace>:<capability-path>\` — <reason>`

      If there are no dependencies, write `_none_`. Global constraint specs with no
      dependencies use `_none — this is a global constraint spec_`.

      The visible label MUST be the canonical spec ID. When a link is present,
      the href SHOULD be the relative path to the dependency's `spec.md`.
      This section is used by tooling to discover transitive context.

      Common pitfalls:
      - Using the wrong heading level. Requirements are `###`, never `##` or `####`.
      - Mixing requirement content into the Purpose section.
      - Omitting spec dependencies — if the spec references another spec's concepts,
        list it.
    rules:
      post:
        - id: proposal-specs-coverage
          instruction: |
            Cross-reference proposal.md's "Specs affected" section against the
            spec artifacts just written. Every new spec listed in the proposal
            must have a corresponding spec.md file. Every modified spec must
            have a corresponding delta file. If any spec from the proposal is
            missing coverage, write it before proceeding.
    delta: true
    deltaInstruction: |
      For every modified spec listed in the proposal's "Specs affected" section,
      produce a delta file instead of rewriting the existing file.

      The proposal lists each spec as `<workspace>:<capability-path>`. Use those
      components to create `{{change.path}}/deltas/<workspace>/<capability-path>/spec.md.delta.yaml`.

      Read the existing spec first (`specd spec show <workspace>:<capability-path>`)
      to understand its current structure before writing the delta.

      Operations:
      - **added**: New requirement. Use `position.parent` targeting the Requirements
        section. `content` MUST include the full `### Requirement: <name>` heading
        followed by the body — because there is no existing heading to preserve.
      - **modified**: Changed requirement. Selector must target the requirement section
        by its exact heading text. `content` is the **body only** — do NOT repeat the
        `### Requirement:` heading in content, it is preserved from the selector match.
        Include the complete updated body — partial content loses detail at archive time.
      - **removed**: Deprecated requirement. Selector targets the heading; the entire
        section (heading + body) is deleted.
      - **renamed**: Name change only. Use `rename` field on a `modified` operation.

      For **added** operations only, every `### Requirement:` heading in `content` must
      use exactly three hashtags.

      If the change introduces new dependencies on other specs, add or update the
      `## Spec Dependencies` section using an `added` or `modified` operation targeting
      that section. Use the canonical visible label plus a brief reason.

      Preferred format:
      - `- [\`<workspace>:<capability-path>\`](../relative/path/spec.md) — <reason>`

      Compatible fallback when there is no link:
      - `- \`<workspace>:<capability-path>\` — <reason>`

      If a spec listed in the proposal does not need changes to its spec.md (e.g. only
      other artifacts change), create a no-op delta instead of skipping the file:
        `{{change.path}}/deltas/<workspace>/<capability-path>/spec.md.delta.yaml`:
        ```yaml
        - op: no-op
          description: "<reason why no spec changes are needed>"
        ```

      Common pitfalls:
      - Forgetting to read the existing spec before writing a MODIFIED delta — the
        selector must match the exact heading text.
      - Writing a full spec file instead of a delta — never rewrite an existing spec.
      - Omitting spec dependency updates when the change adds cross-spec references.
    validations:
      - id: has-purpose
        type: section
        matches: '^Purpose$'
        required: true
      - id: has-requirements
        type: section
        matches: '^Requirements$'
        required: true
        children:
          - id: has-requirement-block
            type: section
            matches: '^Requirement:'
            required: true
  # ── verify ─────────────────────────────────────────────────────────────────
  - id: verify
    scope: spec
    output: 'specs/**/verify.md'
    description: Verification scenarios for the spec
    template: templates/verify.md
    requires:
      - specs
    instruction: |
      Create verification files for every new spec listed in the proposal's
      "Specs affected" section. Each verify file describes HOW to confirm the
      spec is satisfied. The template contains `<!-- ... -->` comments with guidance —
      these are instructions for you, not content. Do NOT copy them into the output file.

      New verify files are written as **full files** under `{{change.path}}/specs/` — NOT
      as deltas. Deltas (under `{{change.path}}/deltas/`) are only for modifying existing
      verify files (handled by deltaInstruction).

      The proposal lists each spec as `<workspace>:<capability-path>`. Create
      `{{change.path}}/specs/<workspace>/<capability-path>/verify.md` using the template.

      Format requirements:
      - Top-level heading: `# Verification: <spec name>`
      - Group scenarios under `### Requirement: <name>` headings.
        The heading text must match the corresponding requirement in spec.md exactly —
        same wording, same order.
      - Each scenario: `#### Scenario: <name>` with optional GIVEN, then WHEN / THEN lines.
        Use GIVEN when the precondition is not obvious from context. Each clause (GIVEN,
        WHEN, THEN) can be followed by AND or OR lines for additional conditions or
        assertions. Scenarios use exactly four hashtags. Never three, never bullets.

      Only write scenarios that add information beyond what the requirement prose already
      states. Do not restate the happy path if it is obvious from the requirement itself.
      Focus on edge cases, error conditions, and non-obvious interactions.

      Every requirement in spec.md should have at least one scenario unless its behaviour
      is fully described by a parent requirement's scenarios.
    delta: true
    deltaInstruction: |
      For every modified spec listed in the proposal's "Specs affected" section,
      produce a delta file for its verification scenarios.

      The proposal lists each spec as `<workspace>:<capability-path>`. Create
      `{{change.path}}/deltas/<workspace>/<capability-path>/verify.md.delta.yaml`.

      Read the existing verify.md first (`specd spec show <workspace>:<capability-path>`)
      to understand its current structure before writing the delta.

      Operations:
      - **modified**: Updated scenarios under an existing requirement. Selector targets
        the `### Requirement: <name>` section. `content` is the **body only** (the
        scenarios) — do NOT repeat the `### Requirement:` heading. Include all scenarios
        for that requirement in `content` — not just the new ones.
      - **added**: Required for every new requirement added to spec.md in the same change.
        Every new requirement must have at least one scenario — do not leave a new requirement
        without verification coverage. Use `position.parent` targeting the Requirements section.
        `content` MUST include the full `### Requirement:` heading and at least one
        `#### Scenario:` block — because there is no existing heading to preserve.
      - **removed**: Required for every requirement removed from spec.md in the same change.
        Selector targets the `### Requirement: <name>` section; the entire section is deleted.

      For **added** operations only, every `#### Scenario:` heading in `content` must
      use exactly four hashtags.

      If a spec listed in the proposal does not need changes to its verify.md (e.g.
      existing scenarios remain valid), create a no-op delta instead of skipping the file:
        `{{change.path}}/deltas/<workspace>/<capability-path>/verify.md.delta.yaml`:
        ```yaml
        - op: no-op
          description: "<reason why no verify changes are needed>"
        ```
    rules:
      post:
        - id: specs-verify-coverage
          instruction: |
            Cross-reference spec.md's requirements against the verify
            scenarios just written. Every requirement in spec.md must have
            at least one corresponding scenario in verify.md. If any
            requirement is missing verification coverage, add a scenario
            before proceeding.
    deltaValidations:
      - id: added-has-scenario
        type: sequence-item
        where:
          op: 'added|modified'
        contentMatches: '#### Scenario:'
        required: true
    validations:
      - id: has-requirements
        type: section
        matches: '^Requirements$'
        required: true
        children:
          - id: has-requirement-block
            type: section
            matches: '^Requirement:'
            required: true
            children:
              - id: has-scenario
                type: section
                matches: '^Scenario:'
                required: true

  # ── design ─────────────────────────────────────────────────────────────────
  - id: design
    scope: change
    optional: false
    output: design.md
    description: Implementation analysis — what needs to change and how
    template: templates/design.md
    requires:
      - proposal
      - specs
      - verify
    instruction: |
      Read the upstream artifacts before writing:
      - proposal.md — the problem, motivation, and scope
      - specs (spec.md and deltas) — the final requirements the implementation must satisfy
      - verify (verify.md and deltas) — the verification scenarios the implementation must pass

      Create the design document that explains HOW to implement the change. This artifact
      is the bridge between specs and tasks — it must be concrete enough that tasks can be
      derived from it without ambiguity.

      The design must be concrete, not generic. Avoid vague statements like "add a new
      service" or "update the module" — specify the exact class name, method signatures,
      and file paths. A developer reading the design should know precisely what to build
      without needing to make design decisions of their own.

      Before writing, analyse the codebase to understand impact:
      - **Affected files discovery**: use the impact analysis to find every existing
        file, module, symbol, document, or resource that will also need modification
        or removal because of this change — not just the initially obvious target.
      - **Symbol-level impact**: for each symbol being modified, identify its direct and
        transitive callers/dependents. Assess risk — symbols with many cross-workspace
        callers are high-risk and need careful handling.
      - **Spec ripple effect**: when the change modifies existing specs, trace their
        dependents (direct and transitive). Assess whether dependent specs' requirements
        are still satisfied or need updating. If this analysis reveals additional specs
        that also need requirement changes, treat them as part of the change's scope:
        add them to the affected specs set before proceeding so they get the required
        delta or artifact files.
      - **Dependency map**: for non-trivial changes, visualise the key relationships
        (symbols → callers, specs → dependents) to make the blast radius explicit.

      The implementation approach must satisfy every requirement and scenario defined
      in the specs and verify artifacts of this change. Reference them to ensure full
      coverage.

      **Always write design.md** — the template defines the sections and format
      requirements. The template contains `<!-- ... -->` comments with detailed guidance
      on each section — these are instructions for you, not content. Do NOT copy them
      into the output file. Follow them to understand what each section requires.
    rules:
      post:
        - id: specs-design-coverage
          instruction: |
            Cross-reference the spec and verify artifacts against the design
            just written. Every requirement in spec.md must have a clear path
            to implementation in design.md (mentioned in Affected areas, New
            constructs, or Approach). Every scenario in verify.md must map to
            at least one entry in the Testing section. If any requirement or
            scenario lacks design coverage, add it before proceeding.
        - id: resolve-open-questions
          instruction: |
            Review the "Open questions" section of the design. If any question
            affects implementation tasks, it must be resolved with the user before
            writing tasks.md. Unresolved design questions lead to ambiguous tasks
            and rework during implementation.

  # ── tasks ──────────────────────────────────────────────────────────────────
  - id: tasks
    scope: change
    output: tasks.md
    description: Implementation checklist with trackable tasks
    template: templates/tasks.md
    requires:
      - specs
      - design
    instruction: |
      Create the task list that breaks down the implementation into discrete,
      trackable steps. The template contains `<!-- ... -->` comments with guidance —
      these are instructions for you, not content. Do NOT copy them into the output file.
      The tasks artifact is derived from design.md — every task
      must reference the concrete files, symbols, and approach documented there.

      Format requirements:
      - Group related tasks under `## <n>. <Group name>` headings.
      - Each task is a checkbox line followed by indented context lines:
        ```
        - [ ] <n>.<m> <short description>
              <file>: <symbol> — <what to change and why>
              Approach: <concrete implementation detail from design.md — the specific
              technique, algorithm, signature, or code pattern to use>
              (Req: requirement name)
        ```
        The checkbox line is tracked by SpecD. The indented lines below it provide
        the actionable context from design.md: which file, which symbol or function,
        what the change does, and HOW to do it. The `Approach:` line carries the key
        design decision or code pattern from design.md so the implementer does not need
        to cross-reference. A developer reading a single task should know exactly
        where to go, what to do, and how to do it.
      - When revising an existing `tasks.md` after review, regression discovery, or a
        return from a later lifecycle state, preserve the existing task history. Do not
        rewrite the task list in a way that makes previously completed work look like it
        was always part of the final plan.
      - Follow-up work discovered after the original task list was written must be added
        as new tasks or new task groups. Prefer a clearly labeled review/follow-up group
        so readers can distinguish original implementation tasks from work added after
        later findings.
      - Order tasks by dependency — what must be done first?
      - Tasks should be small enough to complete in a single session.

      Reference each spec requirement at least once — every requirement must map
      to at least one task, otherwise it may never be implemented.

      Example:
      ```
      ## 1. Domain model

      - [ ] 1.1 Add optional `artifactId` field to input interface
            `packages/core/src/application/use-cases/validate-artifacts.ts`:
            `ValidateArtifactsInput` — add `artifactId?: string` property
            Approach: add as optional field; when present, `execute()` filters
            the schema artifacts array to only the matching ID before validation
            (Req: Input)
      - [ ] 1.2 Guard unknown artifact IDs with failure result
            `packages/core/src/application/use-cases/validate-artifacts.ts`:
            `execute()` — return failure when `artifactId` not in schema, do not throw
            Approach: check `schema.artifact(artifactId) === null` before the
            validation loop; return `{ result: 'failure', errors: [...] }` instead
            of throwing, consistent with other validation failures
            (Req: Input, scenario: unknown artifact ID)

      ## 2. Tests

      - [ ] 2.1 Add test for single-artifact validation
            `packages/core/test/application/use-cases/validate-artifacts.spec.ts`:
            new describe block — verify only specified artifact is validated
            Approach: create a change with two artifacts, validate with artifactId
            targeting one, assert only that artifact's errors are returned
      ```

      Each task should be verifiable — you know unambiguously when it is done.
    rules:
      post:
        - id: design-tasks-coverage
          instruction: |
            Cross-reference design.md against the tasks just written. Every
            item in Affected areas, every new construct in New constructs,
            every automated test in Testing, and every manual / E2E
            verification step must map to at least one task. If any item
            from design.md is missing a corresponding task, add it before
            proceeding.
    preHashCleanup:
      - id: normalize-checkboxes
        pattern: '^([ \t]*-\s+)\[x\]'
        replacement: '$1[ ]'
    taskCompletionCheck:
      incompletePattern: '^\s*-\s+\[ \]'
      completePattern: '^\s*-\s+\[x\]'

# ── metadataExtraction ──────────────────────────────────────────────────────────────────

metadataExtraction:
  title:
    artifact: specs
    extractor:
      selector: { type: section, level: 1 }
      extract: label
  description:
    artifact: specs
    extractor:
      selector: { type: section, matches: '^Purpose$' }
      extract: content
  dependsOn:
    artifact: specs
    extractor:
      selector: { type: section, matches: '^Spec Dependencies$' }
      extract: content
      capture: '(?:^|\n)\s*-\s+(?:\[`?|\[|`)?((?:[A-Za-z\-\_0-9]+:[A-Za-z\-\_0-9\/]+|(?:[A-Za-z]:\\)?(?:[A-Za-z\-\_0-9]+\.[A-Za-z\-\_0-9]+|(?:[A-Za-z\-\_0-9]+[\/\\])+[A-Za-z\-\_0-9]+\.[A-Za-z\-\_0-9]+)))(?:`?\]|\]|`)?(?:\(((?:[A-Za-z]:\\|(?:\.{1,2}[\\//])*)?(?:[A-Za-z\-\_0-9]+[\/\\])+[A-Za-z\-\_0-9]+\.[A-Za-z\-\_0-9]+))?'
      transform:
        name: resolveSpecPath
        args: ['$2']
  rules:
    - id: spec-requirements
      artifact: specs
      extractor:
        selector:
          type: section
          matches: '^Requirement:'
          parent: { type: section, matches: '^Requirements$' }
        groupBy: label
        strip: '^Requirement:\s*'
        extract: content
  constraints:
    - id: spec-constraints
      artifact: specs
      extractor:
        selector:
          type: list-item
          parent: { type: section, matches: '^Constraints$' }
        extract: label
  scenarios:
    - id: verify-scenarios
      artifact: verify
      extractor:
        selector:
          type: section
          matches: '^Scenario:'
          parent: { type: section, matches: '^Requirement:' }
        fields:
          name: { from: label, strip: '^Scenario:\s*' }
          requirement: { from: parentLabel, strip: '^Requirement:\s*' }
          given:
            childSelector: { type: list-item, matches: '^GIVEN\b' }
            capture: '^GIVEN\s+(.+)'
            followSiblings: '^(?:AND|OR)\b'
          when:
            childSelector: { type: list-item, matches: '^WHEN\b' }
            capture: '^WHEN\s+(.+)'
            followSiblings: '^(?:AND|OR)\b'
          then:
            childSelector: { type: list-item, matches: '^THEN\b' }
            capture: '^THEN\s+(.+)'
            followSiblings: '^(?:AND|OR)\b'
  context:
    - id: spec-overview
      artifact: specs
      extractor:
        selector: { type: section, matches: '^Purpose$' }
        extract: content

# ── workflows ──────────────────────────────────────────────────────────────────

workflow:
  - step: designing
    requires: []
    hooks:
      pre:
        - id: designing-guidance
          instruction: |
            The compiled context could include project-level specs with coding conventions,
            documentation requirements, and linting rules. You MUST follow these
            constraints while writing artifacts — they are as binding as the change specs.

  - step: ready
    requires: [proposal, specs, verify, design, tasks]
    hooks:
      pre:
        - id: ready-guidance
          instruction: |
            Verify that all required artifacts are present and complete: proposal
            has been approved, specs and verify files exist for every capability,
            design.md exists and is complete, and tasks.md lists all implementation
            work items. This is a gate — do not proceed until everything is in place.

  - step: implementing
    requires: [proposal, specs, verify, design, tasks]
    hooks:
      pre:
        - id: implementing-guidance
          instruction: |
            Read all change artifacts before starting:
            - proposal.md — the problem being solved and why
            - specs (spec.md and deltas) — the final specification of what the system should do
            - verify (verify.md and deltas) — the verification scenarios that the
              implementation must satisfy
            - design.md — the implementation approach, key decisions, affected areas,
              and code snippets. This is the primary technical reference, you MUST read it.
            - tasks.md — the progress checklist
            Work through tasks one by one in order. Use design.md as the technical
            reference for how to implement each task, specs for what the system should
            do, verify for the scenarios the implementation must pass, and proposal.md
            for the motivation behind decisions. Mark each task complete (- [x]) as
            you go. Pause and ask for guidance if you hit a blocker or the task is
            ambiguous, If ambiguous: design.md is the source of truth. Do not advance
            to verifying while any - [ ] items remain.

            The compiled context could include project-level specs with coding conventions,
            documentation requirements, and linting rules. You MUST follow these
            constraints while writing code — they are as binding as the change specs.

  - step: verifying
    requires: [proposal, specs, verify, design, tasks]
    requiresTaskCompletion: [tasks]
    hooks:
      pre:
        - id: verifying-guidance
          instruction: |
            Run through every scenario in verify.md. For each one, confirm the implementation
            satisfies it by inspecting the code and running the relevant tests. If a scenario
            fails, return to implementing — do not mark verifying complete until all scenarios pass.

  - step: archiving
    requires: [proposal, specs, verify, design, tasks]
    requiresTaskCompletion: [tasks]
    hooks:
      pre:
        - id: archiving-guidance
          instruction: |
            Review the delta files before confirming the archive. Confirm that every modified
            spec accurately reflects what was actually built. If the implementation diverged
            from the spec, update the spec now rather than archiving an inaccurate record.
      post:
        - id: summarise-archive
          instruction: |
            Summarise what changed in this archive for the commit message. List each spec
            created or modified and the key requirement changes.
