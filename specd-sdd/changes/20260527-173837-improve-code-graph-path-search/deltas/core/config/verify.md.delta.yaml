- op: removed
  description: 'Remove old workspace graph config verification.'
  selector:
    type: section
    matches: '^Requirement: Workspace graph config$'
    parent:
      type: section
      matches: '^Requirements$'

- op: added
  description: 'Add new workspace graph config verification with allowedPaths and existing scenarios.'
  position:
    parent:
      type: section
      matches: '^Requirements$'
    after:
      type: section
      matches: '^Requirement: Workspaces$'
  content: |
    ### Requirement: Workspace-level graph configuration

    #### Scenario: Allowed paths constrain workspace indexing

    - **GIVEN** a workspace declares `graph.allowedPaths: ["src/**"]`
    - **WHEN** the config is loaded
    - **THEN** the workspace configuration includes the `allowedPaths` constraint

    #### Scenario: excludePaths replaces built-in defaults

    - **GIVEN** a workspace with `graph.excludePaths: ["fixtures/"]`
    - **WHEN** the config is loaded
    - **THEN** `SpecdWorkspaceConfig.graph.excludePaths` is `["fixtures/"]`
    - **AND** the built-in defaults (`node_modules/`, `dist/`, etc.) are NOT applied — only the declared patterns are used

    #### Scenario: graph block absent — no field on workspace config

    - **GIVEN** a workspace with no `graph` key
    - **WHEN** the config is loaded
    - **THEN** `SpecdWorkspaceConfig.graph` is `undefined`
    - **AND** `discoverFiles` falls back to built-in default exclusions

    #### Scenario: respectGitignore defaults to true

    - **GIVEN** a workspace with `graph: {}` (no `respectGitignore` key)
    - **WHEN** the config is loaded
    - **THEN** `SpecdWorkspaceConfig.graph.respectGitignore` is `undefined` (treated as `true` by the indexer)

    #### Scenario: respectGitignore set to false

    - **GIVEN** a workspace with `graph.respectGitignore: false`
    - **WHEN** the config is loaded
    - **THEN** `SpecdWorkspaceConfig.graph.respectGitignore` is `false`

- op: added
  description: 'Add project-level graph configuration verification.'
  position:
    parent:
      type: section
      matches: '^Requirements$'
    after:
      type: section
      matches: '^Requirement: Workspace-level graph configuration$'
  content: |
    ### Requirement: Project-level graph configuration

    #### Scenario: Project graph include paths discovered

    - **GIVEN** `specd.yaml` declares `graph.includePaths: ["docs/**"]`
    - **WHEN** the config is loaded
    - **THEN** `config.graph.includePaths` includes the `docs/**` pattern

    #### Scenario: Project graph exclude paths discovered

    - **GIVEN** `specd.yaml` declares `graph.excludePaths: ["specs/"]`
    - **WHEN** the config is loaded
    - **THEN** `config.graph.excludePaths` includes the `specs/` pattern
