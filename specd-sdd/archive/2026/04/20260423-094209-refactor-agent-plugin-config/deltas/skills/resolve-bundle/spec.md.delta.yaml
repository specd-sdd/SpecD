- op: removed
  description: 'Remove old Input requirement'
  selector:
    type: section
    matches: 'Requirement: Input'

- op: added
  description: 'Add new SpecdConfig-based Input requirement'
  position:
    parent:
      type: section
      matches: 'Requirements'
    after:
      type: section
      matches: 'Purpose'
  content: |
    ### Requirement: Input

    The input MUST contain:

    ```typescript
    interface ResolveBundleInput {
      name: string
      config?: SpecdConfig
      variables?: Record<string, string>
    }
    ```

    `variables` defaults to an empty object.

- op: removed
  description: 'Remove old Behavior requirement'
  selector:
    type: section
    matches: 'Requirement: Behavior'

- op: added
  description: 'Add new Behavior requirement with built-in variables'
  position:
    parent:
      type: section
      matches: 'Requirements'
    after:
      type: section
      matches: 'Requirement: Output'
  content: |
    ### Requirement: Behavior

    The use case MUST:

    1. **Built-in Variable Injection**: If `config` is provided, merge built-in variables with the provided `variables` map (user-provided variables override built-ins).
       Built-in variables SHALL include:
       - `{{projectRoot}}`: `config.projectRoot`
       - `{{configPath}}`: `config.configPath`
       - `{{schemaRef}}`: `config.schemaRef`
    2. Call `SkillRepository.getBundle(input.name, mergedVariables)`
    3. Replace `{{key}}` placeholders in each template file with values from the merged variables map
    4. Return the resolved bundle

- op: removed
  description: 'Remove old Spec Dependencies'
  selector:
    type: section
    matches: 'Spec Dependencies'

- op: added
  description: 'Add new Spec Dependencies'
  position:
    parent:
      type: section
      matches: 'skills:resolve-bundle'
  content: |
    ## Spec Dependencies

    - [`core:core/config`](../../core/core/config/spec.md) — defines SpecdConfig type
    - [`skills:skill-bundle`](../skill-bundle/spec.md) — return type
    - [`skills:skill-repository-port`](../skill-repository-port/spec.md) — repository port
