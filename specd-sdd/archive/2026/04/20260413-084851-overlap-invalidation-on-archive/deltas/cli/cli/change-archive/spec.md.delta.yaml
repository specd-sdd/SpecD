- op: modified
  description: 'Extend output on success to report invalidated changes'
  selector:
    type: section
    matches: 'Requirement: Output on success'
  content: |
    On success, output depends on `--format`:

    - `text` (default): prints to stdout:
      - The archive path line
      - If changes were invalidated due to overlap, a summary listing each invalidated change and the overlapping specs:

      ```
      archived change <name> → <archive-path>
      invalidated 2 overlapping changes:
        - beta (specs: core:core/config, core:core/kernel)
        - gamma (specs: core:core/config)
      ```

      The invalidated changes section is omitted when no changes were invalidated.
    - `json` or `toon`: outputs the following to stdout (encoded in the respective format):

      where `<archive-path>` is the path to the archived change directory relative to the project root, and `invalidatedChanges` is the array from the `ArchiveChange` result (empty when no changes were invalidated).
