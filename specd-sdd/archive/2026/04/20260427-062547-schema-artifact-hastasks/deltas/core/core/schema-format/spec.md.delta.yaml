- op: modified
  description: 'Update Artifact definition to include hasTasks and point to taskCompletionCheck requirement'
  selector:
    type: section
    matches: 'Requirement: Artifact definition'
  content: |
    Each entry in `artifacts` must include:

    - `id` (string, required) ÔÇö unique identifier within the schema, e.g. `proposal`, `specs`, `design`, `tasks`
    - `scope` (`spec` | `change`, required) ÔÇö declares where this artifact lives after the change is archived. `spec` means the artifact file is synced to the `SpecRepository` (e.g. `spec.md`, `verify.md` ÔÇö files that become part of the project's permanent spec record). `change` means the artifact stays only in the change directory and is never synced (e.g. `proposal.md`, `tasks.md` ÔÇö working documents used during the change process).
    - `optional` (boolean, optional, default `false`) ÔÇö when `false`, `ValidateArtifacts` requires this artifact to be present in the change before validation can pass. When `true`, the artifact may be absent without failing validation; if present, it is validated and (for `scope: spec` artifacts) synced normally. `scope` and `optional` are independent.
    - `hasTasks` (boolean, optional, default `false`) ÔÇö when `true`, the artifact is explicitly marked as containing trackable tasks. This is the **master switch** for task capability: it enables task completion checks and displays the `[hasTasks]` indicator in CLI status. If omitted or `false`, task capability is disabled even if `taskCompletionCheck` patterns are defined.
    - `output` (string or glob, required) ÔÇö path pattern for the artifact's files **relative to the change directory**, e.g. `proposal.md` or `specs/**/spec.md`. When creating a new artifact file within a change, the filename is derived from the last literal segment of the glob (e.g. `spec.md` from `specs/**/spec.md`); if the last segment is a wildcard, the filename falls back to the template filename (e.g. `spec.md` from `template: templates/spec.md`). If neither the glob nor the template yields a determinate filename, `SchemaRegistry.resolve()` must throw a `SchemaValidationError`. The final location of these files in the project repo after syncing is configured separately and may differ.
    - `description` (string, optional) ÔÇö human-readable summary for tooling
    - `template` (string, optional) ÔÇö path to a template file, relative to the schema directory; see Requirement: Template resolution
    - `instruction` (string, optional) ÔÇö AI instruction text assembled by `GetArtifactInstruction`
    - `requires` (array of artifact IDs, optional) ÔÇö artifacts that must be resolved before this one; used to compute `Change.effectiveStatus()`. A dependency is resolved when its status is `complete` or `skipped`. `skipped` is only reachable for `optional: true` artifacts. Any other state (`missing`, `in-progress`) blocks the dependent artifact.
    - `format` (`markdown` | `json` | `yaml` | `plaintext`, optional) ÔÇö declares the file format of this artifact. Used by `GetArtifactInstruction` to select the correct `ArtifactParser` adapter when injecting delta instructions. If omitted, the format is inferred from the file extension of the derived output filename (`.md` Ôćĺ `markdown`, `.json` Ôćĺ `json`, `.yaml` / `.yml` Ôćĺ `yaml`); any other extension defaults to `plaintext`. Must be declared explicitly when the extension is ambiguous or non-standard.
    - `delta` (boolean, optional, default `false`) ÔÇö declares that this artifact supports delta files. Only valid when `scope: spec`; `SchemaRegistry.resolve()` must throw a `SchemaValidationError` if `delta: true` is combined with `scope: change`. When `true`, a delta file for this artifact (`deltas/<workspace>/<capability-path>/<filename>.delta.yaml`) may be present in the change directory. When `false`, delta files for this artifact are rejected at validation time.
    - `deltaInstruction` (string, optional) ÔÇö domain-specific guidance injected by `GetArtifactInstruction` alongside the format-level delta instructions when `delta: true`. Describes which domain concepts to add, modify, or remove (e.g. requirements, scenarios) without repeating the technical delta format, which is provided automatically by the `ArtifactParser` adapter. Only valid when `delta: true`.
    - `deltaValidations` (array, optional) ÔÇö structural validation rules checked against the normalized YAML AST of the delta file before application; see Requirement: Delta validation rules. Only valid when `delta: true`.
    - `validations` (array, optional) ÔÇö structural validation rules for the base artifact (after delta application); see Requirement: Validation rules
    - `metadataExtraction` (object, optional) ÔÇö top-level declaration of how to extract metadata fields from artifact content; see Requirement: Metadata extraction
    - `rules` (object, optional) ÔÇö constraint blocks injected by `GetArtifactInstruction` around the artifact's `instruction`. Rules exist as a **schema composition mechanism**: they allow extending schemas and schema plugins to wrap an artifact's instruction with additional constraints without overriding the `instruction` field itself. A base schema defines the core instruction; child schemas or plugins add `rules.pre`/`rules.post` entries to augment it.
      - `pre` (array, optional) ÔÇö entries injected **before** the instruction. Each entry: `{ id: string, instruction: string }`.
      - `post` (array, optional) ÔÇö entries injected **after** the instruction. Each entry: `{ id: string, instruction: string }`.
        `id` follows the standard array entry identity format. `instruction` is injected verbatim as a constraint block.
    - `preHashCleanup` (array, optional) ÔÇö list of regex substitutions applied to the artifact content before computing any hash (both `validatedHash` for `ArtifactStatus` and the approval hash). Each entry has `id` (string, required ÔÇö standard array entry identity format), `pattern` (regex string), and `replacement` (string, may be empty). Substitutions are applied in declaration order. Use this to normalize progress markers or other volatile content that should not affect hash comparisons.
    - `taskCompletionCheck` (object, optional) ÔÇö declares patterns for detecting checkboxes; see Requirement: taskCompletionCheck.

- op: added
  description: 'Promote taskCompletionCheck to a top-level requirement'
  position:
    parent:
      type: section
      matches: 'Requirements'
    after:
      type: section
      matches: 'Requirement: Artifact definition'
  content: |
    ### Requirement: taskCompletionCheck

    `taskCompletionCheck` defines how the system identifies incomplete tasks within an artifact's file. This requirement is only active when `hasTasks: true` is set for the artifact.

    The fields are optional and default to standard markdown checkbox syntax:

    - `incompletePattern` (string, regex, default `^\s*-\s+\[ \]`) ÔÇö matches an incomplete task item
    - `completePattern` (string, regex, default `^\s*-\s+\[x\]`, case-insensitive) ÔÇö matches a complete task item

- op: modified
  description: 'Update Workflow requirement to include hasTasks invariant for requiresTaskCompletion'
  selector:
    type: section
    matches: 'Requirement: Workflow'
  content: |
    A `workflow` defines the sequence of steps a change follows. Each entry must include:

    - `step` (string, required) ÔÇö name of the phase (e.g., `designing`, `implementing`)
    - `requires` (array of strings, optional) ÔÇö IDs of artifacts that must be `complete` before the step is available
    - `requiresTaskCompletion` (array of strings, optional) ÔÇö IDs of artifacts where all tasks MUST be complete before the step can be finished. **Invariant**: Every artifact ID listed here MUST have `hasTasks: true` declared in its artifact definition. `SchemaRegistry.resolve()` SHALL throw a `SchemaValidationError` if this invariant is violated.
    - `hooks` (object, optional) ÔÇö `pre` and `post` hooks for the step

- op: modified
  description: 'Update Constraints to include hasTasks and requiresTaskCompletion invariant'
  selector:
    type: section
    matches: 'Constraints'
  content: |
    - `kind` is required on every schema file; must be `schema` or `schema-plugin`
    - `kind: schema-plugin` must not declare `artifacts`, `workflow`, `metadataExtraction`, or `extends`
    - `extends` is only valid on `kind: schema`; cycles in extends chains are a validation error
    - `artifact.id` must match `/^[a-z][a-z0-9-]*$/` and must be unique within a schema
    - Array entry `id` must match `/^[a-z][a-z0-9]*(-[a-z0-9]+)*$/`, 1ÔÇô64 characters, unique within its immediate array
    - `artifact.scope` must be `spec` or `change`; it is required and has no default
    - `artifact.optional` defaults to `false`; a non-optional artifact with `scope: spec` must be present in every spec directory and every change
    - `artifact.hasTasks` is optional and defaults to `false`
    - `workflow[].requiresTaskCompletion` MUST ONLY reference artifacts with `hasTasks: true`
    - `artifact.rules.pre` and `artifact.rules.post` are optional arrays of `{ id, instruction }` entries
    - `workflow[].step` must be unique ÔÇö duplicate step names in the same `workflow` array are a schema validation error
    - Every hook entry must include an `id` field alongside its `instruction` or `run` field
    - `requires` must not contain cycles; circular dependencies in the artifact graph are a schema validation error
    - If artifact A is `optional: true`, any artifact that lists A in its `requires` must also be `optional: true`
    - `deltaValidations` is only valid on artifacts with `delta: true`; declaring `deltaValidations` on a non-delta artifact is a schema validation error
    - The order of entries in `workflow` is the intended display order for tooling; it does not enforce sequential blocking between consecutive steps
    - Delta file format, selector model, and application constraints are defined in `specs/core/delta-format/spec.md`

- op: modified
  description: 'Add hasTasks to Schema Example'
  selector:
    type: section
    matches: 'Schema Example'
  content: |
    ```yaml
    kind: schema
    name: schema-example
    version: 1
    description: Proposal Ôćĺ specs Ôćĺ design Ôćĺ tasks workflow

    artifacts:
      - id: proposal
        scope: change
        output: proposal.md
        description: Initial proposal outlining why the change is needed
        template: templates/proposal.md
        instruction: |
          Create the proposal document that establishes WHY this change is needed.
        requires: []

      - id: specs
        scope: spec
        output: 'specs/**/spec.md'
        description: Detailed specifications defining what the system should do
        template: templates/spec.md
        requires:
          - proposal
        instruction: |
          Create specification files defining WHAT the system should do.
          Do not include WHEN/THEN scenarios ÔÇö those go in verify.md.
        rules:
          post:
            - id: normative-language
              text: 'Use SHALL / MUST for normative statements.'
        delta: true
        deltaValidations:
          - id: added-has-scenario
            type: sequence-item
            where:
              op: 'added|modified'
            contentMatches: '#### Scenario:'
            required: true
        validations:
          - id: has-purpose
            type: section
            matches: '^Purpose$'
            required: true
          - id: has-requirements
            type: section
            matches: '^Requirements$'
            required: true
            children:
              - id: has-requirement-block
                type: section
                matches: '^Requirement:'
                required: true
                children:
                  - id: has-scenario
                    type: section
                    matches: '^Scenario:'
                    required: true

      - id: verify
        scope: spec
        output: 'specs/**/verify.md'
        description: Verification scenarios for the spec
        template: templates/verify.md
        requires:
          - specs
        instruction: |
          Create verification scenarios (WHEN/THEN) for the spec.
          Group scenarios under ### Requirement: headings matching the spec.md requirements exactly.
          Only include scenarios that add information beyond what the requirement prose already states.
        delta: true
        validations:
          - id: has-requirements
            type: section
            matches: '^Requirements$'
            required: true
            children:
              - id: has-requirement-block
                type: section
                matches: '^Requirement:'
                required: true
                children:
                  - id: has-scenario
                    type: section
                    matches: '^Scenario:'
                    required: true

      - id: design
        scope: change
        optional: true
        output: design.md
        description: Technical design with implementation decisions
        template: templates/design.md
        requires:
          - proposal
        instruction: |
          Create the design document explaining HOW to implement the change.

      - id: tasks
        scope: change
        output: tasks.md
        hasTasks: true
        description: Implementation checklist with trackable tasks
        template: templates/tasks.md
        requires:
          - specs
        instruction: |
          Create the task list breaking down the implementation work.
          If a design document (design.md) exists, use it to inform the task breakdown.
          If it does not exist, derive tasks from the specs alone.
        preHashCleanup:
          - id: normalize-checkboxes
            pattern: '^\s*-\s+\[x\]'
            replacement: '- [ ]'
        taskCompletionCheck:
          incompletePattern: '^\s*-\s+\[ \]'
          completePattern: '^\s*-\s+\[x\]'

    workflow:
      - step: designing
        requires: []
      - step: implementing
        requires: [tasks]
        requiresTaskCompletion: [tasks]
        hooks:
          pre:
            - id: read-tasks
              instruction: |
                Read pending tasks, work through them one by one,
                mark each complete as you go. Pause if you hit a blocker.
          post:
            - id: run-tests
              run: 'pnpm test'
            - id: confirm-tests
              instruction: |
                Confirm all tests pass before marking implementing complete.
      - step: verifying
        requires: [verify]
        hooks:
          pre:
            - id: run-scenarios
              instruction: |
                Run through each scenario in verify.md and confirm the implementation satisfies it.
      - step: archiving
        requires: [specs, tasks]
        hooks:
          pre:
            - id: run-tests
              run: 'pnpm test'
            - id: review-deltas
              instruction: |
                Review the delta files before confirming the archive.
          post:
            - id: create-branch
              run: 'git checkout -b specd/{{change.name}}'
            - id: summarise
              instruction: |
                Summarise what changed in this archive.

    metadataExtraction:
      title:
        artifact: specs
        extractor:
          selector: { type: section, level: 1 }
          extract: label
      description:
        artifact: specs
        extractor:
          selector: { type: section, matches: '^Overview$|^Purpose$' }
          extract: content
      rules:
        - id: spec-requirements
          artifact: specs
          extractor:
            selector:
              type: section
              matches: '^Requirement:'
              parent: { type: section, matches: '^Requirements$' }
            groupBy: label
            strip: '^Requirement:\s*'
            extract: content
      constraints:
        - id: spec-constraints
          artifact: specs
          extractor:
            selector:
              type: list-item
              parent: { type: section, matches: '^Constraints$' }
            extract: label
    ```
