- op: added
  description: 'Add blockers and nextAction verification scenarios'
  position:
    parent: { type: section, matches: 'Requirement: Returns the change and its artifact statuses' }
  content: |
    #### Scenario: Result includes blockers array

    - **GIVEN** a change with artifact drift
    - **WHEN** `execute()` is called
    - **THEN** the result includes a `blockers` array
    - **AND** it contains at least one entry with `code: 'ARTIFACT_DRIFT'`

    #### Scenario: Result includes nextAction recommendation

    - **GIVEN** a change in `designing` state with incomplete artifacts
    - **WHEN** `execute()` is called
    - **THEN** the result includes a `nextAction` object
    - **AND** `nextAction.command` is `'/specd-design'`
    - **AND** `nextAction.actionType` is `'cognitive'`
