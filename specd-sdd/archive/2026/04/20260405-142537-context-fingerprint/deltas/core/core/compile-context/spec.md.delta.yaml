- op: modified
  description: 'Add fingerprint parameter to Input requirement'
  selector:
    type: section
    matches: 'Requirement: Input'
  content: |
    `CompileContext.execute` receives:

    - `name` ‚Äî the change name to compile context for
    - `step` ‚Äî the lifecycle step name being entered (e.g. `'designing'`, `'implementing'`, `'verifying'`, `'archiving'`)
    - `config` ‚Äî the resolved project configuration containing `context`, `contextIncludeSpecs`, `contextExcludeSpecs`, per-workspace `contextIncludeSpecs` / `contextExcludeSpecs`, and `contextMode`
    - `followDeps` (optional, default `false`) ‚Äî when `true`, performs the `dependsOn` transitive traversal (step 5 of context spec collection) to discover additional specs. When `false` or absent, traversal is skipped and only specs collected in steps 1‚Äì4 are included.
    - `depth` (optional) ‚Äî only valid when `followDeps` is `true`; limits `dependsOn` traversal to N levels deep (1 = direct dependencies only, 2 = deps of deps, etc.). When absent and `followDeps` is `true`, traversal is unlimited.
    - `sections` (optional) ‚Äî when present, restricts the metadata content rendered for each spec in the output to the listed sections (`'rules'`, `'constraints'`, `'scenarios'`). When absent, all available sections are rendered (description + rules + constraints + scenarios). `sections` applies only to full-mode spec content ‚Äî it does not affect summary-mode specs, project context entries, or available steps.
    - `fingerprint` (optional) ‚Äî when provided, `CompileContext` compares this value against the fingerprint it calculates from the current context inputs. If they match, the result's `status` field is set to `'unchanged'` and the full context is not assembled. If omitted or the fingerprint does not match, `status` is `'changed'` and the full context is returned with the new fingerprint.

- op: added
  description: 'Add fingerprint calculation requirement'
  position:
    parent:
      type: section
      matches: Requirements
    after:
      type: section
      matches: 'Requirement: Unknown workspace qualifiers emit a warning'
  content: |
    ### Requirement: Context fingerprint

    `CompileContext` calculates a fingerprint that uniquely identifies the current context state. The fingerprint is a SHA-256 hash of a canonicalized string representation of all inputs that affect the logical context content:

    1. Change specIds (sorted alphabetically)
    2. Project context entries (instruction values verbatim, file content hashed)
    3. Context include/exclude patterns from config
    4. The step being queried
    5. Schema version
    6. All flags that affect output: `followDeps`, `depth`, `sections`

    When `fingerprint` is provided to `execute()`:
    - If `fingerprint` matches the calculated fingerprint, `status` is `'unchanged'` and the context is not assembled (early return).
    - If `fingerprint` does not match or is omitted, `status` is `'changed'` and the full context is assembled and returned.

    The fingerprint enables clients to skip re-fetching unchanged context without comparing the full output themselves.

- op: modified
  description: 'Add fingerprint and status to Result shape'
  selector:
    type: section
    matches: 'Requirement: Result shape'
  content: |
    `CompileContext.execute` MUST return a `CompileContextResult` object with:

    - `contextFingerprint: string` ‚Äî the calculated fingerprint for the current context state (SHA-256 hash)
    - `status: 'changed' | 'unchanged'` ‚Äî `'changed'` when the full context is returned, `'unchanged'` when the provided fingerprint matched and context was skipped
    - `stepAvailable: boolean` ‚Äî whether the requested step is currently available
    - `blockingArtifacts: string[]` ‚Äî artifact IDs blocking the step (empty if available)
    - `projectContext: ProjectContextEntry[]` ‚Äî rendered project context entries (empty when `status` is `'unchanged'`)
    - `specs: ContextSpecEntry[]` ‚Äî spec entries with tier classification, source, and content (empty when `status` is `'unchanged'`)
    - `availableSteps: AvailableStep[]` ‚Äî all workflow steps with availability status
    - `warnings: ContextWarning[]` ‚Äî stale metadata warnings and any other advisory conditions

    When `status` is `'unchanged'`, the `projectContext` and `specs` arrays are empty (the client uses its cached values). The `stepAvailable`, `blockingArtifacts`, `availableSteps`, and `warnings` fields are always populated ‚Äî this allows the client to determine step availability without fetching the full context. When `status` is `'changed'`, all fields are populated as described.

    `CompileContext` MUST NOT throw on availability failures. It MUST throw on `ChangeNotFoundError` (change not found) and on schema resolution errors.
