    matches: '^Spec Dependencies$'
  content: |
    - [`specs/code-graph/symbol-model/spec.md`](../symbol-model/spec.md) ‚Äî `FileNode`, `SymbolNode`, `SpecNode`, `Relation`, `RelationType`, and hierarchy relation semantics
    - [`specs/_global/architecture/spec.md`](../../_global/architecture/spec.md) ‚Äî ports as abstract classes and adapters in infrastructure
    - [`specs/code-graph/staleness-detection/spec.md`](../staleness-detection/spec.md) ‚Äî `lastIndexedRef` field definition and staleness semantics
