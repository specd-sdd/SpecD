- op: modified
  selector:
    type: section
    matches: '^Requirement: Resolves schema before processing$'
  content: |
    The use case MUST obtain the project's schema via `SchemaProvider.get()` before processing any specs. If the schema cannot be resolved, `get()` throws `SchemaNotFoundError` or `SchemaValidationError` тАФ the use case does not catch these.
