- op: added
  description: 'Add scenario for new spec with delta:true artifact type being copied during archive'
  position:
    parent:
      type: section
      matches: 'Requirement: Delta merge and spec sync'
    after:
      type: section
      matches: 'Scenario: New artifact synced directly'
  content: |
    #### Scenario: New spec with delta-capable artifact copied to project

    - **GIVEN** a change has a spec ID for a spec that does not yet exist in the project
    - **AND** the schema declares the artifact type with `delta: true`
    - **AND** the change directory contains a full primary file (e.g. `specs/<workspace>/<path>/spec.md`) instead of a `.delta.yaml`
    - **WHEN** `ArchiveChange.execute` is called
    - **THEN** the primary file content is copied directly to `SpecRepository`
    - **AND** the spec directory and file are created in the project

    #### Scenario: Delta file takes precedence over primary file

    - **GIVEN** a change has a spec ID for an existing spec
    - **AND** the schema declares the artifact type with `delta: true`
    - **AND** both a `.delta.yaml` and a primary file exist in the change directory
    - **WHEN** `ArchiveChange.execute` is called
    - **THEN** the `.delta.yaml` is merged into the base spec via the parser
    - **AND** the primary file is not used
