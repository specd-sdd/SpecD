- op: modified
  description: 'Make symbol-level caller evidence primary and leave exact numeric weights to design'
  selector:
    type: section
    matches: '^Requirement: Batch hotspot scoring$'
  content: |
    `computeHotspots(store: GraphStore, options?: HotspotOptions): Promise<HotspotResult>` SHALL compute a hotspot score for every symbol in the graph using exactly two batch queries:

    1. **Caller query** ‚Äî returns one row per (symbol, caller) pair with both the symbol's `filePath` and the caller's `filePath`
    2. **Importer count query** ‚Äî returns the number of files that import each file

    The scoring model uses three signals:

    - **sameWorkspaceCallers** ‚Äî callers whose `filePath` shares the same workspace prefix as the symbol
    - **crossWorkspaceCallers** ‚Äî callers whose `filePath` has a different workspace prefix
    - **fileImporters** ‚Äî number of files that `IMPORT` the file containing the symbol

    Workspace is extracted from `filePath` as the prefix before the first `:` (e.g. `core` from `core:src/index.ts`).

    The exact numeric weighting of these signals is intentionally not fixed by this spec. It is defined by the implementation design and may be tuned without further spec churn, provided these observable semantics hold:

    - symbol-level caller evidence is the primary ranking signal
    - cross-workspace caller evidence contributes at least as strongly as same-workspace caller evidence
    - file-level importer data is a secondary signal that refines symbol ranking rather than replacing symbol-level evidence
- op: modified
  description: 'Define per-option defaults and importer-only exclusion'
  selector:
    type: section
    matches: '^Requirement: Smart defaults with automatic removal$'
  content: |
    Hotspot computation applies product defaults per option:

    - **kinds = [`class`, `method`, `function`]** ‚Äî the default hotspot view focuses on callable or structural symbols
    - **score > 0** ‚Äî symbols with no caller signal and no importer signal are excluded
    - **risk >= MEDIUM** ‚Äî LOW-risk symbols are filtered out
    - **limit 20** ‚Äî only the top 20 results are returned
    - **no importer-only entries** ‚Äî a symbol with zero direct callers MUST NOT appear in the default result solely because its containing file has many importers

    Explicit options override only their own defaults:

    - omitted `kinds` ‚Üí use the default hotspot kinds
    - explicit `kinds` ‚Üí fully replace the default kind set; do not merge with it
    - omitted `minRisk` ‚Üí use `MEDIUM`
    - explicit `minRisk` ‚Üí use only the requested risk threshold
    - omitted `limit` ‚Üí use `20`
    - explicit `limit` ‚Üí use only the requested limit
    - omitted `workspace`, `filePath`, `excludePaths`, `excludeWorkspaces` ‚Üí no extra filter
    - explicit `workspace`, `filePath`, `excludePaths`, `excludeWorkspaces` ‚Üí add only the requested scope restriction

    Importer-only exclusion remains active unless the user explicitly widens the result set with `includeImporterOnly = true`.

    In other words, changing `minRisk`, `limit`, or `workspace` MUST NOT silently remove the default kind set or re-enable importer-only symbols.

    Examples:

    - `specd graph hotspots` ‚Üí defaults apply (kinds = `class,method,function`, no importer-only entries, risk >= MEDIUM, limit 20)
    - `specd graph hotspots --min-risk HIGH` ‚Üí risk >= HIGH, while default kinds, importer-only exclusion, and limit 20 remain active
    - `specd graph hotspots --limit 50` ‚Üí limit 50, while default kinds, importer-only exclusion, and risk >= MEDIUM remain active
    - `specd graph hotspots --kind interface` ‚Üí only `interface` symbols, with the rest of the default ranking policy still active
    - `specd graph hotspots --include-importer-only --kind interface` ‚Üí explicit broad query; importer-only `interface` symbols may appear
- op: modified
  description: 'Align filtering contract with HotspotOptions.kinds'
  selector:
    type: section
    matches: '^Requirement: Filtering$'
  content: |
    `HotspotOptions` supports these optional filters:

    - **workspace** ‚Äî only include symbols whose `filePath` starts with this workspace prefix
    - **kinds** ‚Äî only include symbols whose kind is in the provided `SymbolKind[]`
    - **filePath** ‚Äî only include symbols in this file
    - **excludePaths** ‚Äî array of glob patterns to exclude by file path (supports `*` wildcards, case-insensitive). Uses `matchesExclude` from `domain/services/matches-exclude.ts`
    - **excludeWorkspaces** ‚Äî array of workspace names to exclude. Uses `matchesExclude` from `domain/services/matches-exclude.ts`
    - **limit** ‚Äî maximum results to return (default 20)
    - **minScore** ‚Äî minimum score threshold (default 1, i.e. > 0)
    - **minRisk** ‚Äî minimum risk level threshold (default MEDIUM)
    - **includeImporterOnly** ‚Äî include symbols with zero direct callers whose score comes only from file importer counts (default false)

    Excludes are applied alongside the existing include filters before the limit is applied.
- op: modified
  description: 'Remove fixed score weights constraint and preserve observable guarantees instead'
  selector:
    type: section
    matches: '^Constraints$'
  content: |
    - Exactly 2 graph queries ‚Äî no N+1 per-symbol queries
    - Exact numeric weights are not fixed by this spec; design and implementation may tune them
    - File-level importer counts are a secondary ranking signal, not a standalone default inclusion path
    - Risk level thresholds reuse the existing `computeRiskLevel` function
    - Workspace is the prefix before the first `:` in `filePath`
    - No spec coverage logic ‚Äî deferred to issue 19
