- op: added
  description: 'Add generic task completion gating rule to requires-based gating'
  position:
    parent:
      type: section
      matches: 'Requirements'
    after:
      type: section
      matches: 'Requirement: Requires-based gating'
  content: |
    ### Requirement: Task completion gating

    When a workflow step's `requires` array includes an artifact whose `ArtifactType` declares a `taskCompletionCheck`, the transition system MUST verify that the artifact's content contains no incomplete task items before allowing the transition. This check is performed automatically as part of requires enforcement â€” callers do not need to supply task checks explicitly.

    For each required artifact that has a `taskCompletionCheck`:

    1. Get the `ChangeArtifact` via `change.getArtifact(artifactId)`. If it does not exist, skip it.
    2. Iterate the artifact's `files` map. For each `ArtifactFile`, load the file content via `ChangeRepository.artifact(change, file.filename)`.
    3. If the file does not exist (returns `null`), skip it.
    4. Compile `taskCompletionCheck.incompletePattern` using `safeRegex` with the `'m'` flag.
    5. If the regex is valid and matches any line in the file content, reject the transition with `InvalidStateTransitionError`.

    This rule applies to ANY workflow step that requires an artifact with `taskCompletionCheck`, not only to a specific transition. For example, if both `verifying` and `archiving` steps require the `tasks` artifact, both transitions enforce task completion.

- op: modified
  description: 'Add task completion gating to constraints'
  selector:
    type: section
    matches: 'Constraints'
  content: |
    - Lifecycle states are defined by the Change entity â€” the schema selects which states are workflow-visible, it does not create new ones
    - Step availability is always computed dynamically from `change.effectiveStatus()` â€” never cached
    - `workflow` array order is display order only; it does not create implicit sequential dependencies
    - A step with an empty `requires` is always available regardless of change state
    - Step `requires` contains artifact IDs, not step names â€” step-to-step cycles are structurally impossible
    - The artifact dependency graph is validated as a DAG by `buildSchema()` â€” cycles are rejected at schema load time
    - The archiving step is the only step that is both a workflow step and handled by a dedicated use case (`ArchiveChange`)
    - Task completion gating is derived automatically from the schema's `taskCompletionCheck` declarations â€” callers never supply task checks explicitly
    - Task completion checks use `safeRegex` to compile patterns; patterns that fail compilation or contain nested quantifiers are treated as non-matching (no error thrown)
