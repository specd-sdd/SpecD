- op: modified
  description: 'Add changePath to JSON output'
  selector:
    type: section
    matches: 'Requirement: Output on success'
  content: |
    On success, output depends on `--format`:

    - `text` (default): prints a single line to stdout:

      ```
      created change <name>
      ```

    - `json` or `toon`: outputs the following to stdout (encoded in the respective format):

      ```json
      { "result": "ok", "name": "<name>", "state": "drafting", "changePath": "<absolute path>" }
      ```

      The `changePath` is the absolute filesystem path to the change directory where artifacts should be written.

    No further output is produced.
