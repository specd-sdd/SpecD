- op: modified
  description: Return paginated DiscardedChangeListEntry rows.
  selector:
    type: section
    matches: 'Requirement: Returns all discarded changes'
  content: |
    `ListDiscarded.execute(options?)` MUST return `ListResult<DiscardedChangeListEntry>` for all discarded changes.

    It MUST forward `ListOptions`, `includeDescription`, `includeReason`, and `includeSupersededBy` to `ChangeRepository.listDiscarded()` without re-sorting, re-filtering, or re-paginating. Canonical order (`discardedAt` descending) is owned by the repository index helper.

    Default `limit` is **100** when callers omit options.

- op: modified
  description: List entries replace DiscardedChangeView for listing.
  selector:
    type: section
    matches: 'Requirement: Returns DiscardedChangeView without content'
  content: |
    `ListDiscarded.execute()` MUST return `DiscardedChangeListEntry` items â€” not `DiscardedChangeView`, not mutable `Change` instances.

    Entries MUST NOT include artifact file content, history, or derived artifact state maps. Detail belongs on `getDiscarded(name)`.

    Optional `description`, `reason`, and `supersededBy` appear only when the matching include flags are set and the repository projected them from the cached entry.

- op: modified
  description: Empty result is a zero-item ListResult envelope.
  selector:
    type: section
    matches: 'Requirement: Returns an empty array when no discarded changes exist'
  content: |
    When the repository contains no discarded changes, `execute()` MUST return `{ items: [], meta: { total: 0, count: 0, limit: <resolved limit> } }`. It MUST NOT throw.

- op: modified
  description: Delegate list options to ChangeRepository.listDiscarded without re-sorting.
  selector:
    type: section
    matches: 'Requirement: Constructor accepts a ChangeRepository'
  content: |
    `ListDiscarded` MUST accept a `ChangeRepository` as its sole constructor argument. It MUST delegate to `ChangeRepository.listDiscarded(options)` and return the resulting `ListResult<DiscardedChangeListEntry>` unchanged.

    The use case MUST NOT re-sort, filter, or paginate after the repository returns.

- op: modified
  description: Add change-list-entry dependency; keep discarded-change-view for get detail only.
  selector:
    type: section
    matches: Spec Dependencies
  content: |
    - [`core:change`](../change/spec.md)
    - [`core:change-list-entry`](../change-list-entry/spec.md) â€” `DiscardedChangeListEntry` row shape
    - [`core:change-repository-port`](../change-repository-port/spec.md) â€” paginated list/count contract
    - [`core:kernel`](../kernel/spec.md)
    - [`core:discarded-change-view`](../discarded-change-view/spec.md) â€” detail read model for `getDiscarded`
    - [`core:composition-resolver`](../composition-resolver/spec.md)
