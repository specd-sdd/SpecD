- op: added
  description: FsChangeIndexCache owns change-bucket list indexes under fs-cache.
  position:
    parent:
      type: section
      matches: Requirements
    after:
      type: section
      matches: 'Requirement: Storage factory registration'
  content: |
    ### Requirement: FsChangeIndexCache helper

    `FsChangeRepository` MUST delegate active, draft, and discarded list/count/reindex operations to one `FsChangeIndexCache` instance per bucket under `{configPath}/tmp/fs-cache/changes/`, `.../drafts/`, and `.../discarded/`.

    The repository MUST NOT read or write `.specd-index.jsonl` or `.specd-index-meta.json` directly. It projects list entries from persisted manifests (including history-derived `state`, draft/discard timestamps, actors, reasons, and superseded-by) and forwards `list`, `count`, `reindex*`, and cache invalidation to the helpers.

    Canonical sort order per bucket:

    | Bucket | Sort key | Direction |
    | --- | --- | --- |
    | Active | `createdAt` | oldest â†’ newest |
    | Drafts | `draftedAt` | newest â†’ oldest |
    | Discarded | `discardedAt` | newest â†’ oldest |

- op: added
  description: Index writes go through mutate with per-bucket lock and atomic publish.
  position:
    parent:
      type: section
      matches: Requirements
    after:
      type: section
      matches: 'Requirement: FsChangeIndexCache helper'
  content: |
    ### Requirement: Index helper mutate and lock

    Each `FsChangeIndexCache` MUST expose a `mutate(fn)`-style API as the **only** allowed write path for its bucket index files. It MUST acquire a per-bucket file lock, run `fn`, and release the lock â€” including on failure. Concurrent mutators MUST wait (they MUST NOT fail with lock contention).

    Inside `mutate`, updates to `.specd-index.jsonl` or `.specd-index-meta.json` MUST write a temp file and `rename` atomically over the live path:

    1. Meta-only update â†’ temp+rename of `.specd-index-meta.json` only.
    2. JSONL-only update â†’ temp+rename of `.specd-index.jsonl`, then meta update via temp+rename.
    3. Both files change â†’ publish jsonl first, then meta.
    4. If `fn` fails mid-flight â†’ discard temps; do not leave a half-published pair; release the lock.

    `list` and `count` MUST NOT take the lock; with atomic publish they observe a complete prior or complete next snapshot.

    Higher-level helper operations (`invalidate`, `reindex`, entry upsert, full rebuild) MUST go through `mutate`, not ad hoc file writes.

- op: added
  description: Freshness uses invalidation flag, mtimes, and fixed TTL â€” no VCS.
  position:
    parent:
      type: section
      matches: Requirements
    after:
      type: section
      matches: 'Requirement: Index helper mutate and lock'
  content: |
    ### Requirement: Index freshness model

    On `list` / `count`, each helper MUST apply this sequence (no VCS coupling):

    1. If `isInvalidated` in meta â†’ mandatory incremental rebuild.
    2. Else compare disk presence/mtimes to cached `sourceMtime` (manifest for change buckets) â†’ incremental rebuild when stale.
    3. Else if `now - generatedAt > 300_000` ms (fixed 5-minute TTL) â†’ mandatory regenerate.
    4. Else serve from index.

    `FsChangeRepository.invalidateCache()` MUST mark all three bucket helpers invalidated. External callers MAY invoke `invalidateCache()` when the tree changed outside normal write paths.

    Rebuild algorithm: single-pass disk scan of mtimes â†’ stream old JSONL â†’ copy hits / rewrite misses â†’ append new â†’ atomic rename; update meta (`totalCount`, `generatedAt`, clear `isInvalidated`).

- op: added
  description: save upserts projected list entries; moves invalidate both buckets.
  position:
    parent:
      type: section
      matches: Requirements
    after:
      type: section
      matches: 'Requirement: Index freshness model'
  content: |
    ### Requirement: Write-path index maintenance

    After `save(manifest)` in the same bucket, `FsChangeRepository` MUST project the new list entry (including history-derived fields) and compare to the cached entry. If equal â†’ no index write. If different â†’ upsert that row via the bucket helper (update `totalCount` as needed).

    - **create / delete:** update or remove the row (and `totalCount`) or invalidate the bucket.
    - **Moves** between `changes` â†” `drafts` â†” `discarded`: update/invalidate **both** affected buckets.
    - **`saveArtifact()` / skip / non-listing history:** MUST NOT require list-index updates.

    `reindex()`, `reindexActive()`, `reindexDrafts()`, and `reindexDiscarded()` MUST delegate to the corresponding helper full rebuild.

