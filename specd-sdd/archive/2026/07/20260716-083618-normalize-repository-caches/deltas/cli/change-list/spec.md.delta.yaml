- op: modified
  description: Add pagination and include flags to command signature
  selector:
    type: section
    matches: 'Requirement: Command signature'
  content: |
    ```
    specd changes list [--format text|json|toon] [--limit <n>] [--page <p>] [--after-key <iso>] [--after-id <name>] [--description]
    ```

    Alias:

    ```
    specd change list [--format text|json|toon] [--limit <n>] [--page <p>] [--after-key <iso>] [--after-id <name>] [--description]
    ```

    - `--format text|json|toon` ã optional; output format, defaults to `text`
    - `--limit <n>` ã optional; maximum number of entries to return; defaults to `100`
    - `--page <p>` ã optional; 1-based page number (uses `--limit`, defaulting to `100` when omitted)
    - `--after-key <iso>` ã optional; exclusive keyset cursor ã ISO-8601 `createdAt` of the last seen row
    - `--after-id <name>` ã optional; tiebreak change `name` when `--after-key` collides; MUST accompany `--after-key`
    - `--description` ã optional; include the `description` field on each entry (maps to `includeDescription`)

    `--page` is mutually exclusive with `--after-key` / `--after-id`.

- op: modified
  description: Paginated list output with opt-in description and truncation hint
  selector:
    type: section
    matches: 'Requirement: Output format'
  content: |
    The command invokes `ListChanges.execute()` with list options derived from the flags and prints the returned `ListResult<ActiveChangeListEntry>` without re-sorting ã canonical order (`createdAt` ascending) is owned by the repository layer.

    In `text` mode, the command prints a human-readable table to stdout showing only active changes (in `changes/`).

    The output has an inverse-video column header row `NAME  STATE  SPECS  SCHEMA` above the data rows. Column widths are fixed at render time, computed from the widest value across all rows for each column (global, not per-group).

    Each data row shows:

    ```
      <name>  <state>  <specIds>  <schema-name>@<schema-version>
    ```

    where `<specIds>` is a comma-separated list of the spec IDs on the change.

    When `--description` is set and the entry includes a description, a dim indented description line is printed below the main row:

    ```
        <description>
    ```

    Description sub-rows are NOT part of the column structure ã they are printed outside the fixed-width grid.

    When `meta.count < meta.total`, the command MUST print a trailing hint line after the table:

    ```
    showing <count> of <total> (use --limit/--page)
    ```

    In `json` or `toon` format, stdout is a paginated envelope:

    ```json
    {
      "items": [
        {
          "name": "...",
          "state": "...",
          "specIds": ["..."],
          "schemaName": "...",
          "schemaVersion": 1,
          "createdAt": "...",
          "description": "..."
        }
      ],
      "meta": {
        "total": 125,
        "count": 100,
        "limit": 100,
        "page": 1
      }
    }
    ```

    Optional fields (`description`) appear in `items` only when the corresponding include flag was set. `meta.after` is included when keyset pagination was used.

- op: added
  description: Forward list options without re-sorting
  position:
    parent:
      type: section
      matches: Requirements
    after:
      type: section
      matches: 'Requirement: Command signature'
  content: |
    ### Requirement: List options forwarding

    The command MUST map CLI flags to `ListOptions` and include flags as follows:

    - `--limit`, `--page`, `--after-key`, `--after-id` ã `limit`, `page`, and `after: { key, id? }` on the use-case input
    - `--description` ã `includeDescription: true`; when omitted, the CLI MUST NOT set include flags (defaults are port-side false)

    The command MUST NOT re-sort, filter, or paginate results after the use case returns ã it renders the `items` array and `meta` envelope as returned.

- op: modified
  description: Empty output uses paginated envelope in JSON/toon
  selector:
    type: section
    matches: 'Requirement: Empty output'
  content: |
    If there are no active changes, the command prints `no changes` to stdout in `text` mode, or `{"items":[],"meta":{"total":0,"count":0,"limit":100}}` in `json`/`toon` mode. The process exits with code 0.

