- op: removed
  description: Remove transition autodetection scenarios
  selector:
    type: section
    matches: 'Requirement: Implementation autodetection before transition'

- op: removed
  description: Remove ImplementationDetector dependency scenario
  selector:
    type: section
    matches: 'TransitionChange receives ImplementationDetector dependency'

- op: added
  description: Verify caller-owned refresh
  position:
    parent:
      type: section
      matches: 'Requirements'
    after:
      type: section
      matches: 'Requirement: Change must exist'
  content: |
    ### Requirement: Caller-owned implementation tracking refresh

    #### Scenario: TransitionChange does not invoke detector

    - **GIVEN** a change has entered `implementing` at least once
    - **WHEN** `TransitionChange.execute()` runs
    - **THEN** it does not invoke `ImplementationDetector`
    - **AND** it does not merge detected files during the transition mutate
