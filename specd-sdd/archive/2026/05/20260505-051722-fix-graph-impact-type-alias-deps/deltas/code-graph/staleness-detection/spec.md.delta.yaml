    - When `lastIndexedRef` is `null`, no staleness line SHALL be shown
    - When a derivation fingerprint mismatch is detected, append: `âš  Derivation fingerprint mismatch â€” graph built with different code-graph version or workspace configuration`

    **JSON/TOON output**:

    - `stale` (`boolean | null`) â€” `true` if stale, `false` if fresh, `null` if unknown
    - `currentRef` (`string | null`) â€” the current VCS ref, or `null` if unavailable
    - `fingerprintMismatch` (`boolean | null`) â€” `true` if derivation fingerprint differs, `false` if it matches, `null` if no stored fingerprint exists
