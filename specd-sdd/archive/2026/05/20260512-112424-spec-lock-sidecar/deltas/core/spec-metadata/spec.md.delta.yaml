- op: modified
  description: 'Normalize Purpose to metadata.json and JSON terminology'
  selector:
    type: section
    matches: '^Purpose$'
  content: |
    Tooling and AI agents need a compact, machine-readable summary of each spec â€” its dependencies, content hashes, rules, and scenarios â€” without parsing the full artifact files every time. Each spec has a corresponding `metadata.json` file stored under `.specd/metadata/<workspace>/<capability-path>/`, separate from the spec's content artifacts. It is generated deterministically by core at archive time using the schema's `metadataExtraction` engine and is not part of the schema artifact system; content hashes enable staleness detection so consumers know when to regenerate.
- op: modified
  description: 'Normalize write-time validation wording to JSON'
  selector:
    type: section
    matches: '^Requirement: Write-time structural validation$'
  content: |
    The `SaveSpecMetadata` use case validates JSON content against the `strictSpecMetadataSchema` Zod schema before writing. The content must be a JSON object. `title` and `description` are required; other fields are optional but when present must conform to their declared types and formats:

    - `title` (required) must be a non-empty string
    - `description` (required) must be a non-empty string
    - `keywords` must be an array of non-empty lowercase strings
    - `dependsOn` must be an array of strings, each matching a valid spec ID pattern (`capabilityPath` or `workspace:capabilityPath` where workspace matches `/^[a-z][a-z0-9-]*$/` and capability path segments match `/^[a-z0-9_][a-z0-9_-]*$/`)
    - `contentHashes` (required) must be a non-empty record of filename to hash string, where each hash matches `sha256:<64 hex chars>`
    - `rules` must be an array of objects with `requirement` (non-empty string) and `rules` (non-empty array of non-empty strings)
    - `constraints` must be a non-empty array of non-empty strings
    - `scenarios` must be an array of objects with `requirement` (non-empty string), `name` (non-empty string), `when` (non-empty array of strings), `then` (non-empty array of strings), and `given` (optional array of strings)

    If validation fails, `SaveSpecMetadata` throws a `MetadataValidationError` (a domain error extending `SpecdError`) with the Zod issues formatted as a human-readable message. The file is not written.

    Unknown top-level keys are allowed (`.passthrough()`) to support forward-compatible extensions.
- op: modified
  description: 'Clarify metadata and sidecar authority boundaries, including pre-publication consistency checks'
  selector:
    type: section
    matches: '^Requirement: Deterministic generation at archive time$'
  content: |
    `metadata.json` is generated deterministically by core as part of the `ArchiveChange` use case, but sidecar consistency is checked before canonical publication begins for each spec.

    Archive-time flow for a modified spec:

    1. Prepare the merged canonical artifact content for the spec in memory.
    2. Determine the final persisted `dependsOn` set for the archive attempt.
    3. Run `extractMetadata()` over the prepared merged content to validate archive-time consistency for fields such as `dependsOn`.
    4. Determine the final `spec-lock.json` content to publish for that spec.
    5. Publish the canonical spec artifacts plus `spec-lock.json` together as one staged spec publication unit.
    6. After publication succeeds, run `GenerateSpecMetadata` against the canonical persisted spec.
    7. Compute `contentHashes` for the required persisted spec artifacts and persist `metadata.json`.

    The archive-owned persisted dependency rules are:

    - If `change.specDependsOn` has an entry for the spec, that value is the final persisted `dependsOn` set for the archive attempt.
    - If `metadataExtraction.dependsOn` returns a value during the pre-publication extraction pass, the extracted value MUST match the final persisted `dependsOn` set being sealed for that spec or archive fails.
    - This mismatch rule applies both when a canonical `spec-lock.json` already exists and when the archive is creating `spec-lock.json` for the first time.
    - If `metadataExtraction.dependsOn` is omitted, `metadata.json.dependsOn` MUST still be written from the final persisted dependency set.
    - Outside archive, a legacy spec with no sidecar MAY still remain on extraction-backed metadata flows until opportunistic backfill succeeds.

    `metadata.json.dependsOn` remains a supported consumer surface, but for persisted specs it is a projection of the archive-owned sidecar state rather than an independent source of truth.
- op: added
  description: 'Record sidecar separation from metadata storage'
  position:
    parent:
      type: section
      matches: '^Requirements$'
    after:
      type: section
      matches: '^Requirement: File location and naming$'
  content: |
    ### Requirement: Sidecar separation

    `metadata.json` and `spec-lock.json` are distinct persisted artifacts with different responsibilities.

    - `metadata.json` lives under the configured metadata root and remains the compact machine-readable summary consumed by context and tooling.
    - `spec-lock.json` lives alongside the canonical persisted `scope: spec` artifacts for the spec and owns the durable archived values for schema identity and persisted `dependsOn`.
    - A missing `metadata.json` remains non-fatal.
    - A missing `spec-lock.json` on a legacy spec is tolerated until opportunistic backfill creates it.
- op: modified
  description: 'Normalize version control wording to metadata.json'
  selector:
    type: section
    matches: '^Requirement: Version control$'
  content: |
    `metadata.json` files under `.specd/metadata/` must be committed to version control alongside the project. The `.specd/metadata/` directory must not be added to `.gitignore`.
- op: modified
  description: 'Normalize pending note to metadata.json terminology'
  selector:
    type: section
    matches: '^Pending$'
  content: |
    - **Spec index** â€” operations like `specd spec find --keyword <term>` currently require traversing all spec directories to read individual `metadata.json` files. If the number of specs grows to a point where traversal is slow, a generated index (analogous to the archive `index.jsonl`) should be introduced: individual files remain the source of truth, the index is derived and rebuilt via `specd spec reindex`. Not needed until there is a measurable performance problem.
- op: modified
  description: 'Normalize constraints wording to metadata.json terminology'
  selector:
    type: section
    matches: '^Constraints$'
  content: |
    - `metadata.json` is not a schema artifact â€” it is never listed in `requiredSpecArtifacts`, never validated by `ValidateArtifacts`, and never tracked in the change manifest's `artifacts` array
    - Its absence is not an error at any point â€” all reads of metadata treat a missing file as empty
    - `dependsOn` paths must not form cycles; if a cycle is detected during traversal, specd breaks the cycle and emits a warning
    - Staleness warnings are advisory only â€” they do not block any operation
    - The LLM must not include the spec itself in its own `dependsOn` list
    - `SaveSpecMetadata` must validate content against `strictSpecMetadataSchema` before writing â€” structurally invalid content is rejected with `MetadataValidationError`
    - `SaveSpecMetadata` must check for `dependsOn` overwrite before writing â€” changed `dependsOn` without `force` is rejected with `DependsOnOverwriteError`
    - Reading metadata (`parseMetadata`) remains lenient â€” it returns `{}` on invalid input so that downstream operations are never blocked by a malformed file on disk
    - Metadata is accessed exclusively via `SpecRepository.metadata()` and `SpecRepository.saveMetadata()` â€” never via the generic `artifact()` / `save()` methods
