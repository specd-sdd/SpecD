- op: modified
  description: 'Clarify accepted encodings for textual document fallback.'
  selector:
    type: section
    matches: '^Requirement: Textual classification fallback'
  content: |
    During indexing, a file that does not match any registered language adapter SHALL be classified as a `DocumentNode` if its content is determined to be textual. Files detected as binary SHALL be skipped and MUST NOT produce a node in the graph.

    Textual classification SHALL accept these encodings only:

    - `utf-8`
    - `utf-16le`
    - `utf-16be`
    - `windows-1252`

    Detection SHALL prefer BOM-marked encodings first, then `utf-8`, then UTF-16 byte-pattern matches, and finally `windows-1252` when the file does not contain NUL bytes.
