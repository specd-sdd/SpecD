- op: modified
  description: 'Verify accepted document encodings and NUL-based rejection fallback.'
  selector:
    type: section
    matches: '^Requirement: Textual classification fallback$'
    parent:
      type: section
      matches: '^Requirements$'
  content: |
    #### Scenario: Text file with no adapter becomes a DocumentNode

    - **GIVEN** a `.md` file with no language adapter registered
    - **WHEN** it is indexed
    - **THEN** it produces a `DocumentNode` in the graph
    - **AND** it does not produce any symbol nodes

    #### Scenario: Windows-1252 text file with no adapter becomes a DocumentNode

    - **GIVEN** a `.txt` file with no language adapter registered
    - **AND** its content is encoded as `windows-1252`
    - **WHEN** it is indexed
    - **THEN** it produces a `DocumentNode` in the graph

    #### Scenario: UTF-16 text file with no adapter becomes a DocumentNode

    - **GIVEN** a `.txt` file with no language adapter registered
    - **AND** its content is encoded as `utf-16le` or `utf-16be`
    - **WHEN** it is indexed
    - **THEN** it produces a `DocumentNode` in the graph

    #### Scenario: Binary file is skipped

    - **GIVEN** a `.png` file
    - **WHEN** it is indexed
    - **THEN** no node is created in the graph

    #### Scenario: NUL-bearing file without accepted encoding is skipped

    - **GIVEN** a file with no language adapter registered
    - **AND** its content contains NUL bytes but is not valid `utf-16le` or `utf-16be`
    - **WHEN** it is indexed
    - **THEN** no node is created in the graph
