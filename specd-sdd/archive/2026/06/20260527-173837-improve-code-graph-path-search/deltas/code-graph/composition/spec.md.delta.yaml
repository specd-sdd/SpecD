- op: modified
  description: 'Extend provider facade with selector normalization and document search.'
  selector:
    type: section
    matches: '^Requirement: CodeGraphProvider facade$'
    parent:
      type: section
      matches: '^Requirements$'
  content: |
    `CodeGraphProvider` SHALL be the top-level API object that wraps all code graph functionality. It exposes:

    - **Indexing**: `index(options: IndexOptions): Promise<IndexResult>` ŌĆö runs `IndexCodeGraph`
    - **Querying**: `getSymbol(id)`, `findSymbols(query)`, `getFile(path)`, `getSpec(specId)`, `getSpecDependencies(specId)`, `getSpecDependents(specId)`, `getCoveredFiles(specId)`, `getCoveringSpecsForFile(filePath)`, `getCoveredSymbols(specId)`, `getCoveringSpecsForSymbol(symbolId)`, `getStatistics()` ŌĆö delegates to `GraphStore`
    - **Search**: `searchSymbols(options: SearchOptions)`, `searchSpecs(options: SearchOptions)`, `searchDocuments(options: SearchOptions)` ŌĆö full-text search with exact-match prioritization, delegates to `GraphStore`
    - **Maintenance**: `clear(): Promise<void>` ŌĆö removes all data from the store (for full re-index)
    - **Traversal**: `getUpstream(symbolId, options?)`, `getDownstream(symbolId, options?)` ŌĆö delegates to traversal functions
    - **Impact**: `analyzeImpact(target, direction)`, `analyzeFileImpact(filePath, direction)`, `analyzeSpecImpact(specId, direction)`, `detectChanges(changedFiles)` ŌĆö delegates to impact functions
    - **Selector Normalization**: `resolveFileSelector(selector: string): Promise<string | string[]>`, `resolveSymbolSelector(selector: string): Promise<string | string[]>` ŌĆö resolves project-relative or absolute paths to canonical graph identities
    - **Lifecycle**: `open(): Promise<void>`, `close(): Promise<void>` ŌĆö manages the store connection

    The provider SHALL provide a unified entry point for normalization so that CLI commands and other adapters do not need to implement path resolution logic.

    `CodeGraphProvider` is a thin orchestration layer ŌĆö it holds no domain logic. All methods delegate to the appropriate domain service or use case.

- op: modified
  description: 'Update primary factory to clarify SpecdConfig usage and statelessness.'
  selector:
    type: section
    matches: '^Requirement: Factory function$'
    parent:
      type: section
      matches: '^Requirements$'
  content: |
    Two factory signatures are provided:

    **Primary (workspace-aware):**

    `createCodeGraphProvider(config: SpecdConfig, options?: CodeGraphFactoryOptions): CodeGraphProvider` accepts a `SpecdConfig` from `@specd/core` plus optional internal composition overrides and:

    1. Derives the graph storage root from `config.configPath`
    2. Resolves the active graph-store backend id using `options.graphStoreId` when provided, otherwise the built-in default backend id
    3. Builds a merged graph-store registry from the built-in backends plus any additive `options.graphStoreFactories`
    4. Creates the selected concrete `GraphStore` from that registry using the derived storage root
    5. Creates `AdapterRegistry` and registers the built-in adapters (TypeScript, Python, Go, PHP)
    6. Registers any additive language adapters from `options.adapters`
    7. Creates `IndexCodeGraph` with the selected store and adapter registry
    8. Returns a `CodeGraphProvider` wired to all components

    **Legacy (standalone):**

    `createCodeGraphProvider(options: CodeGraphOptions): CodeGraphProvider` accepts:

    - **`storagePath`** (`string`, required) ŌĆö filesystem root allocated to the selected concrete graph-store backend
    - **`graphStoreId`** (`string`, optional) ŌĆö selected backend id; when omitted, uses the built-in default backend id
    - **`graphStoreFactories`** (optional additive registrations) ŌĆö external graph-store factories merged with the built-in graph-store registry before backend selection
    - **`adapters`** (`LanguageAdapter[]`, optional) ŌĆö additional language adapters to register beyond the 4 built-in adapters

    The provider is stateless regarding project configuration; it uses `SpecdConfig` to derive its internal storage root but does not cache it. Workspaces and graph-specific rules are passed to `index()` via `IndexOptions` at each call.

    `CodeGraphFactoryOptions` SHALL support the same additive graph-store selection model as `CodeGraphOptions`, except that the storage root is derived from `SpecdConfig`.

    The factory detects which overload is being used by checking for the `projectRoot` property (present on `SpecdConfig`) vs the `storagePath` property (present on `CodeGraphOptions`).

    The built-in graph-store registry SHALL include at least:

    - `ladybug` ŌĆö the Ladybug-backed implementation
    - `sqlite` ŌĆö the SQLite-backed implementation

    The built-in default graph-store id SHALL be `sqlite`. `ladybug` remains available only by explicit selection.

    Callers MUST NOT construct `CodeGraphProvider` directly ŌĆö the constructor is not part of the public API.

- op: modified
  description: 'Preserve document-model dependency for provider-level document search responsibilities.'
  selector:
    type: section
    matches: '^Spec Dependencies$'
  content: |
    - [`code-graph:symbol-model`](../symbol-model/spec.md) ŌĆö shared node and relation vocabulary
    - [`code-graph:graph-store`](../graph-store/spec.md) ŌĆö store-backed query and maintenance contract
    - [`code-graph:ladybug-graph-store`](../ladybug-graph-store/spec.md) ŌĆö concrete Ladybug backend available through the factory
    - [`code-graph:sqlite-graph-store`](../sqlite-graph-store/spec.md) ŌĆö concrete SQLite backend available through the factory
    - [`code-graph:language-adapter`](../language-adapter/spec.md) ŌĆö built-in and additive adapter registration
    - [`code-graph:indexer`](../indexer/spec.md) ŌĆö indexing use case composed into the provider facade
    - [`code-graph:traversal`](../traversal/spec.md) ŌĆö traversal and impact operations exposed through the provider
    - [`default:_global/architecture`](../../../_global/architecture/spec.md) ŌĆö thin orchestration and composition-layer constraints
    - [`code-graph:document-model`](../document-model/spec.md) ŌĆö provider-level document search and `root:` identity handling
