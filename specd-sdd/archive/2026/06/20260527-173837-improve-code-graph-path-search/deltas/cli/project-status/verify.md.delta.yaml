- op: removed
  description: 'Remove old workspace info verification.'
  selector:
    type: section
    matches: '^Requirement: includes workspace information$'
    parent:
      type: section
      matches: '^Requirements$'

- op: added
  description: 'Add new workspace info verification with orchestrated workspaces.'
  position:
    parent:
      type: section
      matches: '^Requirements$'
    after:
      type: section
      matches: '^Requirement: project status command exists$'
  content: |
    ### Requirement: includes workspace information

    #### Scenario: Workspaces obtained from orchestrator

    - **WHEN** `specd project status` is executed
    - **THEN** it obtains the list of workspaces via `ListWorkspaces`
    - **AND** the output includes rich information for each orchestrated workspace

- op: removed
  description: 'Remove old spec counts verification.'
  selector:
    type: section
    matches: '^Requirement: includes spec counts$'
    parent:
      type: section
      matches: '^Requirements$'

- op: added
  description: 'Add new spec counts verification with efficient repository counting.'
  position:
    parent:
      type: section
      matches: '^Requirements$'
    after:
      type: section
      matches: '^Requirement: includes workspace information$'
  content: |
    ### Requirement: includes spec counts

    #### Scenario: Spec counts use efficient repository counting

    - **WHEN** `specd project status` calculates spec counts
    - **THEN** it calls `SpecRepository.count()` for each workspace
    - **AND** it does not perform full metadata extraction
