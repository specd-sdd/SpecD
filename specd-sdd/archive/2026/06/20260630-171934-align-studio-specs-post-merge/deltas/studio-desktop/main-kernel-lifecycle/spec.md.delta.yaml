- op: modified
  selector:
    type: section
    matches: Purpose
  content: |
    ## Purpose

    Electron desktop host concern â€” **Main Kernel Lifecycle**. Local mode bootstraps an SDK host context (`createSdkContext`) in the main process and exposes IPC-backed ports; remote mode reuses the HTTP client stack. The main process owns one SDK host context per locally opened project.

- op: modified
  selector:
    type: section
    matches: 'Requirement: one kernel per open local project'
  content: |
    ### Requirement: one SDK host context per open local project

    Opening a project directory MUST construct exactly one SDK host context (kernel + `createGraphProvider` from `createSdkContext`) for that `specd.yaml` root until the project is closed or switched.

- op: modified
  selector:
    type: section
    matches: 'Requirement: project switch tears down kernel and graph state'
  content: |
    ### Requirement: project switch tears down SDK host and graph state

    Switching projects MUST dispose the previous SDK host context and any desktop graph provider state before creating a new one to avoid cross-project leakage.

- op: modified
  selector:
    type: section
    matches: 'Requirement: desktop kernel configures plain-text logs'
  content: |
    ### Requirement: desktop SDK context configures plain-text logs

    `createSdkContext` for the desktop main process MUST receive `logFormatter: createLogFormatter({ colorize: false })` so that log readback through local IPC returns plain text without ANSI escape sequences.

