- op: added
  description: Assert read-only repository access
  position:
    parent:
      type: section
      matches: 'Requirement: GetChangeArtifact returns content and originalHash'
    after:
      type: section
      matches: 'Scenario: Untracked filename fails'
  content: |
    #### Scenario: Read does not call mutate

    - **WHEN** use case executes
    - **THEN** loads change via `get` and artifact bytes via `artifact`
    - **AND** does not invoke `ChangeRepository.mutate` or `save`

