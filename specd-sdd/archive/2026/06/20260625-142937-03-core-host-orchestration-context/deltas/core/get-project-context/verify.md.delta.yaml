- op: removed
  description: Replace minimal input scenario
  selector:
    type: section
    matches: 'Scenario: Minimal input with config only'

- op: removed
  description: Replace constructor scenario
  selector:
    type: section
    matches: 'Scenario: Constructor accepts all required ports'

- op: added
  description: Minimal input without config
  position:
    parent:
      type: section
      matches: 'Requirement: Accepts GetProjectContextInput as input'
    before:
      type: section
      matches: 'Scenario: Full optional input supported'
  content: |
    #### Scenario: Minimal input with no overrides

    - **GIVEN** `GetProjectContext` was constructed with a baked default configuration
    - **WHEN** `execute` is called with `{}`
    - **THEN** the call succeeds using the baked default snapshot

- op: modified
  description: Update full optional input scenario
  selector:
    type: section
    matches: 'Scenario: Full optional input supported'
  content: |
    - **WHEN** `execute` is called with `followDeps: true`, `depth: 2`, `sections: ["rules"]`, and `contextMode: "full"`
    - **THEN** the call succeeds and respects all optional parameters
    - **AND** no `config` field is required

- op: added
  description: Verify defaultConfig constructor dependency
  position:
    parent:
      type: section
      matches: 'Requirement: Construction dependencies'
  content: |
    #### Scenario: Constructor accepts all required ports and default config

    - **WHEN** `GetProjectContext` is instantiated from a resolved `SpecdConfig`
    - **THEN** it requires `listWorkspaces`, `schemaProvider`, `files`, `parsers`, `hasher`, and a yaml-derived `CompileContextConfig` default snapshot in its constructor
