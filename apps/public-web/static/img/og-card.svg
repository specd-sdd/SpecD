  <ellipse cx="978" cy="314" rx="162" ry="62" fill="none" stroke="#63b3ff" stroke-opacity=".24" stroke-width="2" />
  <ellipse cx="978" cy="314" rx="104" ry="146" fill="none" stroke="#4dd0a8" stroke-opacity=".18" stroke-width="2" transform="rotate(-24 978 314)" />
  <ellipse cx="978" cy="314" rx="94" ry="142" fill="none" stroke="#63b3ff" stroke-opacity=".14" stroke-width="2" transform="rotate(38 978 314)" />

