      <circle cx="824" cy="278" r="5.5" />
      <circle cx="822" cy="350" r="5.5" />
      <circle cx="904" cy="252" r="5" />
    </g>
    <g fill="#63b3ff">
      <circle cx="870" cy="282" r="5" />
      <circle cx="934" cy="220" r="6" />
      <circle cx="934" cy="408" r="6" />
    </g>
    <g fill="#f4b860">
      <circle cx="772" cy="248" r="4.5" />
      <circle cx="1048" cy="248" r="6" />
      <circle cx="1052" cy="376" r="5" />
