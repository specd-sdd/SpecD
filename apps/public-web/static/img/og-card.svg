      <stop offset="0.42" stop-color="#63b3ff" stop-opacity=".96" />
      <stop offset="0.68" stop-color="#1cc8ff" stop-opacity=".32" />
      <stop offset="1" stop-color="#07101d" stop-opacity="0" />
    </radialGradient>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>

  <rect width="1200" height="630" rx="42" fill="url(#page-bg)" />

