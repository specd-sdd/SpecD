    <path d="M168 0v630M336 0v630M504 0v630M672 0v630M840 0v630M1008 0v630" stroke="#6d84ac" />
  </g>

  <rect x="56" y="54" width="1088" height="522" rx="34" fill="url(#panel-bg)" stroke="rgba(123,146,180,.26)" />
