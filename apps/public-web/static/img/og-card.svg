    <text x="138" y="160" fill="#8eb8ea" font-family="IBM Plex Mono, SFMono-Regular, monospace" font-size="18" letter-spacing="4">SPEC-FIRST WORKFLOW</text>

    <text x="112" y="252" fill="#f5fbff" font-family="IBM Plex Mono, SFMono-Regular, monospace" font-size="100" font-weight="700" letter-spacing="-6">SpecD</text>
    <text x="116" y="292" fill="#8eb8ea" font-family="IBM Plex Mono, SFMono-Regular, monospace" font-size="24" letter-spacing="7">SPEC-DRIVEN DEVELOPMENT</text>

    <text x="112" y="374" fill="#f3f7ff" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="54" font-weight="700">
      <tspan x="112" dy="0">Build against intent before</tspan>
      <tspan x="112" dy="64">code starts drifting.</tspan>
    </text>

    <text x="116" y="496" fill="#a8b6cf" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="26">
