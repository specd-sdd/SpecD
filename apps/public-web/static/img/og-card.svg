<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SpecD public site</title>
  <desc id="desc">A dark editorial card for SpecD with the product title on the left and a workflow core visual on the right.</desc>
  <defs>
    <linearGradient id="page-bg" x1="180" y1="32" x2="1030" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10182c" />
      <stop offset="1" stop-color="#07101d" />
    </linearGradient>
    <linearGradient id="panel-bg" x1="100" y1="80" x2="1040" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10192f" />
      <stop offset="0.58" stop-color="#0b1326" />
      <stop offset="1" stop-color="#08101e" />
    </linearGradient>
    <linearGradient id="signal-line" x1="732" y1="314" x2="1060" y2="314" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4dd0a8" />
      <stop offset="0.52" stop-color="#63b3ff" />
      <stop offset="1" stop-color="#f4b860" />
    </linearGradient>
    <radialGradient id="core-glow" cx="0" cy="0" r="1" gradientTransform="translate(978 314) rotate(90) scale(156)">
