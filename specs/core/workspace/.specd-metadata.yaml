title: 'Workspace'
description: >
  Defines the workspace concept, the fundamental organizational unit in specd that groups specs,
  code locations, schemas, and ownership semantics under a named context. Read this when working
  on multi-workspace configuration, cross-workspace references, context compilation scoping,
  workspace-qualified spec IDs, or change artifact path resolution.
keywords:
  - 'workspace'
  - 'spec-id'
  - 'ownership'
  - 'context-patterns'
  - 'cross-workspace'
  - 'prefix'
  - 'code-root'
  - 'external-workspace'
dependsOn:
  - 'core:core/config'
  - 'core:core/spec-id-format'
contentHashes:
  'spec.md': 'sha256:17521d50c96529fd08f554d7576e1dac059ba11d1d48b37b8b99b0cee92e179c'
  'verify.md': 'sha256:90850de8eef3bc31e4be14a77c9a1c318821919cc6da70fada534aa4cf0e0a76'
rules:
  - requirement: 'Workspace identity'
    rules:
      - 'A workspace is identified by a unique name within a project specd.yaml.'
      - 'Workspace names must match /^[a-z][a-z0-9-]*$/.'
      - 'The name default is reserved for the local project workspace.'
      - 'Every project must declare a default workspace.'
      - 'No two workspaces in the same configuration may share the same name.'
  - requirement: 'Workspace properties'
    rules:
      - 'The specs property is always required and specifies the storage adapter and path where the workspace spec files live.'
      - 'The codeRoot property is required for non-default workspaces; for the default workspace it resolves to the project root.'
      - 'The schemas property defaults to specd/schemas for the default workspace; non-default workspaces have no local schemas by default.'
      - 'The ownership property defaults to owned for the default workspace and readOnly for non-default workspaces.'
      - 'The prefix property is optional with no default for any workspace.'
      - 'The contextIncludeSpecs property defaults to all specs in this workspace for non-default workspaces.'
      - 'The contextExcludeSpecs property has no default.'
      - 'All relative paths resolve from the directory containing specd.yaml.'
  - requirement: 'External workspace inference'
    rules:
      - 'A workspace is considered external when its specs storage path resolves to a location outside the project repository root.'
      - 'The isExternal property is inferred from the resolved path at configuration load time and is never declared explicitly.'
      - 'External workspaces affect ownership defaults and change validation behavior.'
  - requirement: 'Ownership semantics'
    rules:
      - 'Ownership value owned means the project owns these specs and changes are freely proposed.'
      - 'Ownership value shared means the project co-owns these specs and changes may require coordination.'
      - 'Ownership value readOnly means the project reads but does not modify these specs.'
      - 'Ownership defaults to owned for the default workspace and readOnly for non-default workspaces.'
      - 'Ownership affects whether changes can target specs in the workspace and whether approval gates apply.'
  - requirement: 'Prefix semantics'
    rules:
      - 'When a workspace declares a prefix, the prefix is prepended to all capability paths in that workspace.'
      - 'A spec stored at architecture/ on disk becomes prefix/architecture in the specd model.'
      - 'When no prefix is declared, specs use bare capability paths.'
      - 'Prefixes may be single-segment or multi-segment.'
      - 'Two workspaces may share the same prefix; the prefix is not a unique identifier, the workspace name is.'
      - 'Invalid prefix syntax produces a ConfigValidationError at startup.'
  - requirement: 'Workspace-qualified spec IDs'
    rules:
      - 'Every spec is identified by a fully-qualified spec ID in the format workspace:capabilityPath.'
      - 'The colon separates the workspace name from the capability path; / always belongs to the capability path.'
      - 'A bare path (no colon) is shorthand for default:path.'
      - 'An unknown workspace qualifier in a spec ID is rejected with an error.'
      - 'Internally, specd always uses the fully-qualified form; the bare-path shorthand is a user-facing convenience only.'
  - requirement: 'Active workspace determination'
    rules:
      - 'A workspace is considered active in the context of a change when at least one of the change specIds belongs to that workspace.'
      - 'Active workspaces determine which workspace-level context patterns are applied during context compilation.'
      - 'The set of active workspaces is derived at runtime from specIds via the workspaces computed getter, which extracts the workspace component of each spec ID using parseSpecId().'
      - 'The set of active workspaces is not a persisted field.'
  - requirement: 'Primary workspace'
    rules:
      - 'The primary workspace of a change is the first entry in the computed change.workspaces derived from specIds.'
      - 'The primary workspace is used for archive path template resolution (change.workspace) and default metadata attribution when archiving.'
  - requirement: 'Port-per-workspace pattern'
    rules:
      - 'Use cases that operate across workspaces receive a ReadonlyMap of string to RepositoryInstance keyed by workspace name.'
      - 'The composition layer constructs one repository instance per workspace declared in configuration and passes the complete map.'
      - 'Use cases look up the repository for a spec workspace to resolve paths, load content, or write artifacts.'
  - requirement: 'Workspace-level context patterns'
    rules:
      - 'Each workspace may declare contextIncludeSpecs and contextExcludeSpecs patterns.'
      - 'These patterns are applied only when the workspace is active.'
      - 'Omitting the workspace qualifier in a workspace-level pattern means this workspace, not default.'
      - 'The pattern * means all specs in this workspace.'
      - 'Workspace-level patterns are evaluated after project-level patterns.'
      - 'Specs added via dependsOn traversal are never subject to exclude patterns.'
  - requirement: 'Cross-workspace references'
    rules:
      - 'Specs may reference other specs in different workspaces using the qualified form (e.g. billing:payments/invoices) in dependsOn, context patterns, and delta targets.'
      - 'Schema references use #workspace:name syntax to resolve schemas from another workspace local schema directory.'
      - 'References to unknown workspaces at configuration validation time produce an error and abort.'
      - 'References to unknown workspaces at runtime (context compilation) produce a warning and skip.'
  - requirement: 'Workspace directory structure in changes'
    rules:
      - 'Change artifacts always include an explicit workspace segment in the path, even for single-workspace changes.'
      - 'New spec artifacts use the path specs/workspace/capability-path/artifact-filename.'
      - 'Delta files use the path deltas/workspace/capability-path/artifact-filename.delta.yaml.'
      - 'This ensures multi-workspace changes are unambiguous and tooling can resolve the correct repository without inspecting configuration.'
  - requirement: 'Sole source of truth'
    rules:
      - 'Each project specd.yaml is the sole source of truth for that project view of workspaces.'
      - 'When a workspace specs path points to an external repository, specd never reads the external repository specd.yaml.'
      - 'All properties (paths, schemas, ownership, prefix) must be independently declared in the consuming project configuration.'
constraints:
  - 'Every project must declare a default workspace.'
  - 'Workspace names must match /^[a-z][a-z0-9-]*$/.'
  - 'codeRoot is required for non-default workspaces.'
  - 'isExternal is inferred, never declared.'
  - 'Spec IDs are always workspace-qualified internally.'
  - "A change's workspaces are derived from its specIds via parseSpecId() and are not persisted."
  - 'When specIds is empty, workspaces is empty.'
  - 'Workspace-level exclude patterns do not apply to specs reached via dependsOn.'
  - 'External repository configurations are never read; each project declares its own view.'
  - 'Change artifacts always include the workspace segment in their path.'
scenarios:
  - requirement: 'Workspace identity'
    name: 'Valid workspace names accepted'
    given: []
    when:
      - 'A workspace is declared with name billing, my-service, or default.'
    then:
      - 'Configuration loads successfully.'
  - requirement: 'Workspace identity'
    name: 'Invalid workspace name rejected'
    given: []
    when:
      - 'A workspace is declared with name Billing, my_service, or 123abc.'
    then:
      - 'A ConfigValidationError is thrown at startup.'
  - requirement: 'Workspace identity'
    name: 'Missing default workspace'
    given: []
    when:
      - 'specd.yaml declares workspaces but none is named default.'
    then:
      - 'A ConfigValidationError is thrown at startup.'
  - requirement: 'Workspace identity'
    name: 'Duplicate workspace name'
    given: []
    when:
      - 'specd.yaml declares two workspaces with the same name.'
    then:
      - 'A ConfigValidationError is thrown at startup.'
  - requirement: 'Workspace properties'
    name: 'Default workspace inherits defaults'
    given:
      - 'A default workspace with only specs declared.'
    when:
      - 'Configuration is loaded.'
    then:
      - 'codeRoot resolves to the project root.'
      - 'ownership is owned.'
      - 'schemas resolves to specd/schemas.'
  - requirement: 'Workspace properties'
    name: 'Non-default workspace requires codeRoot'
    given: []
    when:
      - 'A non-default workspace omits codeRoot.'
    then:
      - 'A ConfigValidationError is thrown at startup.'
  - requirement: 'Workspace properties'
    name: 'Non-default workspace defaults'
    given:
      - 'A non-default workspace with specs and codeRoot declared.'
    when:
      - 'Configuration is loaded.'
    then:
      - 'ownership defaults to readOnly.'
      - 'schemas is absent (no local schemas).'
  - requirement: 'External workspace inference'
    name: 'Workspace with path inside repo root'
    given:
      - 'Project root is /project and workspace specs path is ./specs.'
    when:
      - 'Configuration is loaded.'
    then:
      - 'isExternal is false.'
  - requirement: 'External workspace inference'
    name: 'Workspace with path outside repo root'
    given:
      - 'Project root is /project and workspace specs path is ../external-repo/specs.'
    when:
      - 'Configuration is loaded.'
    then:
      - 'isExternal is true.'
  - requirement: 'Prefix semantics'
    name: 'Prefix prepended to capability path'
    given:
      - 'Workspace shared declares prefix: team/core.'
      - 'A spec stored at architecture/ on disk.'
    when:
      - 'The spec ID is resolved.'
    then:
      - 'It becomes shared:team/core/architecture.'
  - requirement: 'Prefix semantics'
    name: 'No prefix uses bare path'
    given:
      - 'Workspace default declares no prefix.'
      - 'A spec stored at architecture/ on disk.'
    when:
      - 'The spec ID is resolved.'
    then:
      - 'It becomes default:architecture.'
  - requirement: 'Prefix semantics'
    name: 'Invalid prefix rejected'
    given: []
    when:
      - 'A workspace declares a prefix with invalid syntax.'
    then:
      - 'A ConfigValidationError is thrown at startup.'
  - requirement: 'Workspace-qualified spec IDs'
    name: 'Bare path resolves to default workspace'
    given: []
    when:
      - 'A user specifies auth/login without a colon.'
    then:
      - 'It resolves to default:auth/login.'
  - requirement: 'Workspace-qualified spec IDs'
    name: 'Unknown workspace rejected'
    given: []
    when:
      - 'A spec ID nonexistent:auth/login is used.'
    then:
      - 'An error is thrown indicating the workspace is unknown.'
  - requirement: 'Active workspace determination'
    name: 'Workspace active when change has spec in it'
    given:
      - "A change with specIds: ['billing:invoices']."
    when:
      - 'Context compilation determines active workspaces.'
    then:
      - 'Workspace billing is active.'
  - requirement: 'Active workspace determination'
    name: 'Workspace inactive when no specs target it'
    given:
      - "A change with specIds: ['default:auth/login']."
    when:
      - 'Context compilation determines active workspaces.'
    then:
      - 'Workspace billing is not active.'
      - 'Its workspace-level patterns are not applied.'
  - requirement: 'Workspace-level context patterns'
    name: 'Unqualified pattern resolves to own workspace'
    given:
      - "Workspace billing declares contextIncludeSpecs: ['payments/*']."
    when:
      - 'Context patterns are resolved.'
    then:
      - 'The pattern matches billing:payments/*, not default:payments/*.'
  - requirement: 'Workspace-level context patterns'
    name: 'DependsOn specs exempt from excludes'
    given:
      - "Workspace billing declares contextExcludeSpecs: ['internal/*']."
      - 'A spec reached via dependsOn traversal matches billing:internal/utils.'
    when:
      - 'Context is compiled.'
    then:
      - 'billing:internal/utils is included (not excluded).'
  - requirement: 'Workspace directory structure in changes'
    name: 'Single-workspace change includes workspace segment'
    given:
      - 'A change targeting only default workspace.'
    when:
      - 'A new spec artifact is stored.'
    then:
      - 'The path includes the workspace segment: specs/default/capability-path/filename.'
  - requirement: 'Sole source of truth'
    name: 'External workspace config is never read'
    given:
      - 'Workspace billing points to ../billing-repo/specs.'
      - '../billing-repo/specd.yaml exists with its own workspace configuration.'
    when:
      - 'specd loads configuration.'
    then:
      - '../billing-repo/specd.yaml is never read.'
      - 'All workspace properties come from the local specd.yaml.'
