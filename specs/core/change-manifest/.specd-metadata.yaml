title: 'Change Manifest'
description: >
  Defines the manifest.json format that persists the full state of a Change domain entity,
  including identity, specs, artifacts, and append-only event history. FsChangeRepository
  reads and writes this file; lifecycle state is derived from history at load time.
keywords:
  - 'change-manifest'
  - 'manifest-json'
  - 'event-history'
  - 'artifact-validation'
  - 'validated-hash'
  - 'atomic-write'
  - 'schema-version'
  - 'fs-change-repository'
dependsOn:
  - 'core:core/change'
  - 'core:core/storage'
  - 'core:core/spec-metadata'
  - 'core:core/spec-id-format'
  - 'core:core/workspace'
contentHashes:
  'spec.md': 'sha256:4ec515cd94e31df6cb4a33f70d310c64404b1e0914f8fd0b1bdb0b070e7aae01'
  'verify.md': 'sha256:da0edcc679f5ba5a2c5cbcab2d8844597474c5aa21305fb4c1b2ff2d36b1590c'
rules:
  - requirement: 'Manifest structure'
    rules:
      - 'Each change is persisted as a manifest.json file inside its change directory.'
      - 'The top-level fields are name, createdAt, schema, specIds, artifacts, and history.'
      - 'The workspaces field is optional and accepted on load for backward compatibility with older manifests but is no longer written on save.'
      - 'Active workspaces are derived at runtime from specIds via parseSpecId().'
      - 'The name field is the change slug and is immutable after creation.'
      - 'The createdAt field is an ISO 8601 timestamp, immutable after creation, and is the source of truth for the directory prefix.'
      - 'The schema field contains name (string) and version (integer) of the schema active at creation; written once, never updated.'
      - 'The specIds field is the current snapshot of spec IDs and is mutable.'
      - 'The artifacts array contains descriptors with type, filename, optional, requires, and validatedHash fields.'
      - 'validatedHash is null when the artifact has not been validated, a SHA-256 string when validated, or __skipped__ when an optional artifact has been explicitly marked as not produced.'
      - 'ArtifactStatus is never stored in the manifest; it is derived at load time from validatedHash and file presence.'
      - 'The history field is an append-only array of typed events; the current lifecycle state is derived from the most recent transitioned event to field.'
      - 'Event types serialized in history are created, transitioned, spec-approved, signed-off, invalidated, drafted, restored, artifact-skipped, and discarded.'
      - 'The transitioned event contains type, at, by, from, and to fields.'
      - 'The spec-approved event contains type, at, by, reason, and artifactHashes fields.'
      - 'The signed-off event contains type, at, by, reason, and artifactHashes fields.'
      - 'The invalidated event contains type, at, by, and cause fields; cause values are spec-change or artifact-change.'
      - 'The drafted event contains type, at, by, and reason fields.'
      - 'The restored event contains type, at, and by fields.'
      - 'The artifact-skipped event contains type, at, by, artifactId, and reason fields.'
      - 'The discarded event contains type, at, by, reason, and optional supersededBy fields.'
  - requirement: 'Schema version'
    rules:
      - 'schema.name is the value of the schema field from specd.yaml at creation time; schema.version is the version integer from the schema schema.yaml; both are written once and never updated.'
      - 'When a change is loaded and the active schema name or version differs from the manifest, specd must emit an advisory warning; the change remains usable.'
      - 'Archiving a change with a schema version mismatch must still be possible; the warning surfaces the mismatch so the user can decide whether to proceed.'
  - requirement: 'Atomic writes'
    rules:
      - 'The manifest must be written atomically by writing to a temporary file and then renaming it into place, to prevent partial reads if the process is interrupted mid-write.'
constraints:
  - 'ArtifactStatus is never stored in the manifest; it is always derived from validatedHash and file presence at load time.'
  - 'validatedHash has three valid values: null (not yet validated), a SHA-256 string (validated), or __skipped__ (optional artifact explicitly not produced).'
  - 'The manifest has no state field; the current lifecycle state is always derived from the history array at load time.'
  - 'The history array is append-only; existing events must never be modified or removed by any operation.'
  - 'The schema field is written once at creation and must never be updated by subsequent operations.'
scenarios:
  - requirement: 'Manifest structure'
    name: 'Manifest written on creation'
    given: []
    when:
      - 'A new change add-auth-flow is created.'
    then:
      - 'A manifest.json is written containing name, createdAt, schema, workspaces, specIds, contextSpecIds, artifacts, and a history array with a single created event.'
  - requirement: 'Manifest structure'
    name: 'No state field in manifest'
    given: []
    when:
      - 'A manifest is read from disk.'
    then:
      - 'There is no top-level state field; the current state is derived by reading the to field of the last transitioned event in history.'
  - requirement: 'Manifest structure'
    name: 'History never shrinks'
    given: []
    when:
      - 'A manifest is loaded, modified (e.g. workspace added), and saved.'
    then:
      - 'The history array on disk has more entries than before; no existing events are missing or reordered.'
  - requirement: 'Manifest structure'
    name: 'Artifact validated hash stored'
    given: []
    when:
      - 'ValidateArtifacts marks an artifact complete with hash sha256:abc.'
    then:
      - 'The manifest artifacts entry for that type has validatedHash sha256:abc and no status field.'
  - requirement: 'Manifest structure'
    name: 'validatedHash is null for unvalidated artifact'
    given: []
    when:
      - 'An artifact exists in artifacts but has never been validated.'
    then:
      - 'Its validatedHash is null in the manifest.'
  - requirement: 'Manifest structure'
    name: 'validatedHash is sentinel for skipped artifact'
    given: []
    when:
      - 'An optional artifact is explicitly marked as not produced.'
    then:
      - 'Its validatedHash is __skipped__ in the manifest and no status field is stored.'
  - requirement: 'Manifest structure'
    name: 'artifact-skipped event serialized in history'
    given: []
    when:
      - 'An optional artifact is skipped with reason not needed for this change.'
    then:
      - 'The history contains an artifact-skipped event with artifactId design and the given reason.'
  - requirement: 'Manifest structure'
    name: 'validatedHash cleared on invalidation'
    given:
      - 'One artifact with validatedHash sha256:abc and one with validatedHash __skipped__.'
    when:
      - 'An invalidated event is appended.'
    then:
      - 'Both validatedHash values are set to null in the manifest; rollback is uniform.'
  - requirement: 'Manifest structure'
    name: 'contextSpecIds does not invalidate approvals'
    given: []
    when:
      - 'contextSpecIds is updated on a change that has an active spec-approved event.'
    then:
      - 'No invalidated event is appended and the approval remains active.'
  - requirement: 'Schema version'
    name: 'Schema unchanged'
    given: []
    when:
      - 'A change is loaded and its manifest schema matches the active schema name and version.'
    then:
      - 'No warning is emitted.'
  - requirement: 'Schema version'
    name: 'Schema version bumped'
    given: []
    when:
      - 'A change is loaded and the active schema has a higher version than recorded in the manifest.'
    then:
      - 'specd emits a warning indicating the schema has changed since the change was created and the user should review whether the change artifacts are still compatible.'
  - requirement: 'Schema version'
    name: 'Schema name changed'
    given: []
    when:
      - 'A change is loaded and the active schema name differs from the one recorded in the manifest.'
    then:
      - 'specd emits a warning indicating the change was created under a different schema.'
  - requirement: 'Schema version'
    name: 'Archiving with schema mismatch'
    given: []
    when:
      - 'specd archive is run on a change with a schema version mismatch.'
    then:
      - 'The warning is shown and the user is asked to confirm before proceeding; archiving is not blocked.'
  - requirement: 'Atomic writes'
    name: 'History events appended atomically'
    given: []
    when:
      - 'A state transition occurs.'
    then:
      - 'The new transitioned event is appended to history and the entire manifest is written atomically via temp file and rename; no partial writes are visible.'
