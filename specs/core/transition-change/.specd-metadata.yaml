title: TransitionChange
description: The `TransitionChange` use case performs a lifecycle state transition on an existing change. It implements approval-gate routing (spec approval and signoff gates), task completion checks for the `implementing` to `verifying` transition, and artifact validation clearing for the `verifying` to `implementing` transition.
dependsOn:
  - core:core/change
  - default:_global/architecture
context:
  - The `TransitionChange` use case performs a lifecycle state transition on an existing change. It implements approval-gate routing (spec approval and signoff gates), task completion checks for the `implementing` to `verifying` transition, and artifact validation clearing for the `verifying` to `implementing` transition.
rules:
  - requirement: Input contract
    rules:
      - |-
        `TransitionChange.execute` SHALL accept a `TransitionChangeInput` with the following fields:

        * `name` (string, required) ŌĆö the change to transition
        * `to` (ChangeState, required) ŌĆö the requested target state
        * `approvalsSpec` (boolean, required) ŌĆö whether the spec approval gate is enabled
        * `approvalsSignoff` (boolean, required) ŌĆö whether the signoff gate is enabled
        * `implementingRequires` (readonly string\[], optional) ŌĆö artifact IDs whose validation is cleared on `verifying` to `implementing`
        * `implementingTaskChecks` (ReadonlyArray\<TaskCompletionCheck>, optional) ŌĆö task completion checks for `implementing` to `verifying`
  - requirement: Change must exist
    rules:
      - The use case MUST load the change from the `ChangeRepository` by name. If no change exists with the given name, it MUST throw `ChangeNotFoundError`.
  - requirement: Approval-gate routing for spec approval
    rules:
      - When the change is in `ready` state, the requested target is `implementing`, and `approvalsSpec` is `true`, the use case MUST route the transition to `pending-spec-approval` instead of `implementing`.
  - requirement: Approval-gate routing for signoff
    rules:
      - When the change is in `done` state, the requested target is `archivable`, and `approvalsSignoff` is `true`, the use case MUST route the transition to `pending-signoff` instead of `archivable`.
  - requirement: Direct transition when gates are inactive
    rules:
      - When neither approval-gate routing condition is met, the use case MUST transition to the exact target state requested in the input.
  - requirement: Task completion check on implementing to verifying
    rules:
      - |-
        When the current state is `implementing` and the effective target is `verifying`, the use case MUST check each entry in `implementingTaskChecks` before allowing the transition:

        1. Load the artifact file content via `ChangeRepository.artifact(change, check.filename)`
        2. If the artifact does not exist (returns `null`), skip it
        3. Compile the `incompletePattern` using `safeRegex` with the `'m'` flag
        4. If the regex is valid and matches any line in the artifact content, throw `InvalidStateTransitionError`
  - requirement: Artifact validation clearing on verifying to implementing
    rules:
      - When the current state is `verifying` and the effective target is `implementing`, the use case MUST call `change.clearArtifactValidations` with the `implementingRequires` list (defaulting to an empty array) before performing the transition. This resets validation state for the specified artifacts.
  - requirement: Transition delegation
    rules:
      - After routing and pre-transition checks, the use case MUST delegate the actual state transition to `change.transition(effectiveTarget, actor)`. The `Change` entity enforces transition validity via its own state machine.
  - requirement: Persistence
    rules:
      - After a successful transition, the use case MUST persist the updated change via `ChangeRepository.save` and return the updated `Change` instance.
  - requirement: Dependencies
    rules:
      - |-
        `TransitionChange` depends on two ports injected via constructor:

        * `ChangeRepository` ŌĆö for loading, artifact content access, and persistence
        * `ActorResolver` ŌĆö for resolving the current actor identity
constraints:
  - The use case MUST NOT bypass the Change entity's transition validation ŌĆö it only resolves the effective target and delegates
  - Task completion checks use safeRegex to compile patterns; patterns that fail compilation or contain nested quantifiers are treated as non-matching (no error thrown)
  - The implementingTaskChecks and implementingRequires inputs default to empty arrays when not provided
  - Approval-gate routing is purely input-driven ŌĆö the use case does not read configuration directly
scenarios:
  - requirement: Change must exist
    name: Non-existent change is rejected
    when:
      - TransitionChange.execute is called with a name that does not exist in the repository
    then:
      - it throws ChangeNotFoundError
  - requirement: Approval-gate routing for spec approval
    name: Ready to implementing is rerouted when spec approval is active
    given:
      - a change in ready state
    when:
      - "execute is called with to: 'implementing' and approvalsSpec: true"
    then:
      - the change transitions to pending-spec-approval
  - requirement: Approval-gate routing for spec approval
    name: Ready to implementing is direct when spec approval is inactive
    given:
      - a change in ready state
    when:
      - "execute is called with to: 'implementing' and approvalsSpec: false"
    then:
      - the change transitions to implementing
  - requirement: Approval-gate routing for signoff
    name: Done to archivable is rerouted when signoff is active
    given:
      - a change in done state
    when:
      - "execute is called with to: 'archivable' and approvalsSignoff: true"
    then:
      - the change transitions to pending-signoff
  - requirement: Approval-gate routing for signoff
    name: Done to archivable is direct when signoff is inactive
    given:
      - a change in done state
    when:
      - "execute is called with to: 'archivable' and approvalsSignoff: false"
    then:
      - the change transitions to archivable
  - requirement: Task completion check on implementing to verifying
    name: Transition blocked by incomplete tasks
    given:
      - a change in implementing state with an artifact file containing an unchecked checkbox line
    when:
      - "execute is called with to: 'verifying' and a matching implementingTaskChecks entry"
    then:
      - it throws InvalidStateTransitionError
  - requirement: Task completion check on implementing to verifying
    name: Transition allowed when all tasks are complete
    given:
      - a change in implementing state with an artifact file containing only checked checkboxes
    when:
      - "execute is called with to: 'verifying' and implementingTaskChecks entries"
    then:
      - the change transitions to verifying
  - requirement: Task completion check on implementing to verifying
    name: Missing artifact file is skipped
    given:
      - a change in implementing state
    when:
      - "execute is called with to: 'verifying' and a task check referencing a non-existent artifact file"
    then:
      - the check is skipped and the transition proceeds
  - requirement: Task completion check on implementing to verifying
    name: Invalid regex pattern is treated as non-matching
    given:
      - a change in implementing state
    when:
      - execute is called with a task check whose incompletePattern is an invalid regex
    then:
      - the check is skipped and the transition proceeds
  - requirement: Task completion check on implementing to verifying
    name: No task checks provided defaults to empty
    given:
      - a change in implementing state
    when:
      - "execute is called with to: 'verifying' and no implementingTaskChecks"
    then:
      - the transition proceeds without any task checks
  - requirement: Artifact validation clearing on verifying to implementing
    name: Artifact validations are cleared on verifying to implementing
    given:
      - a change in verifying state with validated artifacts
    when:
      - "execute is called with to: 'implementing' and implementingRequires: ['spec', 'tasks']"
    then:
      - change.clearArtifactValidations is called with ['spec', 'tasks'] before the transition
  - requirement: Artifact validation clearing on verifying to implementing
    name: No implementingRequires defaults to empty
    given:
      - a change in verifying state
    when:
      - "execute is called with to: 'implementing' and no implementingRequires"
    then:
      - change.clearArtifactValidations is called with an empty array
  - requirement: Transition delegation
    name: Invalid transition is rejected by entity
    given:
      - a change in drafting state
    when:
      - "execute is called with to: 'implementing'"
    then:
      - change.transition throws InvalidStateTransitionError
  - requirement: Persistence
    name: Change is saved after successful transition
    when:
      - TransitionChange.execute completes successfully
    then:
      - ChangeRepository.save was called with the updated Change instance
