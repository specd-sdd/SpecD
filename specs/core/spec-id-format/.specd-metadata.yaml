title: 'Spec ID Format'
description: >
  A **spec ID** is the canonical string that identifies a spec within a specd project. Every spec belongs to exactly one workspace and has a capability path within that workspace. This spec defines the canonical format, parsing rules, and storage conventions for spec IDs to eliminate ambiguity between workspace prefixes and capability path segments.
keywords:
  - 'format'
  - 'canonical'
  - 'bare'
  - 'path'
  - 'shorthand'
  - 'unknown'
  - 'workspace'
  - 'rejection'
  - 'parsing'
  - 'rules'
  - 'normalization'
  - 'names'
dependsOn:
  - 'core:core/change'
  - 'core:core/change-manifest'
  - 'core:core/spec-metadata'
  - 'core:core/compile-context'
contentHashes:
  'spec.md': 'sha256:f534a740b38bdc9ecfa1b60e7d5057c1c0fd708aecd9ed9d8f78b1a1587524d9'
  'verify.md': 'sha256:adf59befa729ab466749d249ff8fb8537ff444283a19642494d7c5676858d6e7'
rules:
  - requirement: 'Canonical format'
    rules:
      - 'The canonical spec ID format SHALL be `workspace:capabilityPath`, where:'
      - '`workspace` is the workspace name (e.g. `default`, `billing`)'
      - '`capabilityPath` is the slash-separated path to the spec within the workspace (e.g. `auth/login`, `_global/architecture`)'
      - 'The workspace and capability path are separated by `:` (colon). All `/` characters belong to the capability path.'
      - 'This format is used everywhere: internal storage (`change.specIds`, manifest), domain-layer references, CLI input, metadata `dependsOn`, and user-facing output. There is a single format â€” no internal vs external distinction.'
  - requirement: 'Bare path shorthand'
    rules:
      - 'When no `:` is present, the spec ID SHALL be interpreted as a capability path in the `default` workspace.'
      - 'For example, `auth/login` with no colon resolves to workspace `default`, capability path `auth/login`. Its fully-qualified form is `default:auth/login`.'
  - requirement: 'Unknown workspace rejection'
    rules:
      - 'When a colon-qualified spec ID specifies a workspace name that does not exist in the project configuration, the parser SHALL reject the input with an error.'
  - requirement: 'Parsing rules'
    rules:
      - 'Parsing a spec ID string SHALL follow these steps:'
      - '1. Find the first `:` in the string. 2. If found: everything before `:` is the workspace, everything after is the capability path. Validate the workspace exists. 3. If not found: workspace is `default`, the entire string is the capability path.'
      - 'There is no slash-based workspace detection. The `/` character is never used as a workspace separator.'
  - requirement: 'Normalization'
    rules:
      - 'Functions that accept spec IDs SHOULD normalize bare paths to fully-qualified form (`default:capPath`) at the system boundary. Domain-layer code MAY assume spec IDs are already qualified.'
constraints:
  - 'Workspace names MUST NOT contain `/` or `:` characters'
  - 'Capability paths MUST NOT contain `:` characters'
  - 'The separator is always `:` (colon) â€” `/` is never a workspace separator'
  - 'The `default` workspace is implicit when no colon is present'
scenarios:
  - requirement: 'Canonical format'
    name: 'Simple spec ID with default workspace'
    when:
      - 'parsing `default:auth/login`'
    then:
      - 'workspace is `default` and capability path is `auth/login`'
  - requirement: 'Canonical format'
    name: 'Non-default workspace'
    when:
      - 'parsing `billing:invoices/create`'
    then:
      - 'workspace is `billing` and capability path is `invoices/create`'
  - requirement: 'Canonical format'
    name: 'Multi-segment capability path'
    when:
      - 'parsing `default:common/conventions`'
    then:
      - 'workspace is `default` and capability path is `common/conventions`'
  - requirement: 'Bare path shorthand'
    name: 'Bare path defaults to default workspace'
    when:
      - 'parsing `auth/login` (no colon present)'
    then:
      - 'workspace is `default` and capability path is `auth/login`'
  - requirement: 'Bare path shorthand'
    name: 'Single-segment bare path'
    when:
      - 'parsing `architecture` (no colon, no slash)'
    then:
      - 'workspace is `default` and capability path is `architecture`'
  - requirement: 'Unknown workspace rejection'
    name: 'Colon syntax with unknown workspace'
    given:
      - '`nonexistent` is not a configured workspace'
    when:
      - 'parsing `nonexistent:auth/login`'
    then:
      - 'an error is raised indicating the workspace is unknown'
  - requirement: 'Parsing rules'
    name: 'Colon takes precedence over slash'
    given:
      - '`billing` is a configured workspace'
    when:
      - 'parsing `billing:auth/login`'
    then:
      - 'workspace is `billing` and capability path is `auth/login`'
      - 'the `/` in `auth/login` is never interpreted as a workspace separator'
  - requirement: 'Parsing rules'
    name: 'Slash is never a workspace separator'
    given:
      - '`billing` is a configured workspace'
    when:
      - 'parsing `billing/auth/login` (no colon)'
    then:
      - 'workspace is `default` and capability path is `billing/auth/login`'
  - requirement: 'contextSpecIds format'
    name: 'contextSpecIds use canonical format'
    given:
      - "a spec at `default:auth/login` with `dependsOn: ['auth/session']`"
    when:
      - 'context spec IDs are resolved'
    then:
      - '`contextSpecIds` contains `default:auth/session` in fully-qualified format'
  - requirement: 'contextSpecIds format'
    name: 'Cross-workspace contextSpecIds'
    given:
      - "a spec at `billing:invoices/create` with `dependsOn: ['billing:invoices/shared']`"
    when:
      - 'context spec IDs are resolved'
    then:
      - '`contextSpecIds` contains `billing:invoices/shared` and traversal uses workspace `billing`'
  - requirement: 'Normalization'
    name: 'Bare path normalized to fully-qualified'
    when:
      - '`auth/login` enters the system boundary'
    then:
      - 'it is normalized to `default:auth/login` before reaching the domain layer'
