title: Validate Specs
description: "The `ValidateSpecs` use case validates spec artifacts against the active schema's structural rules. It supports three scoping modes: a single spec by qualified path, all specs in a workspace, or all specs across all workspaces. Only spec-scoped artifact types from the schema are validated; change-scoped artifacts are excluded."
dependsOn:
  - core:core/validate-artifacts
  - core:core/schema-format
  - core:core/storage
  - core:core/workspace
  - core:core/spec-id-format
context:
  - "The `ValidateSpecs` use case validates spec artifacts against the active schema's structural rules. It supports three scoping modes: a single spec by qualified path, all specs in a workspace, or all specs across all workspaces. Only spec-scoped artifact types from the schema are validated; change-scoped artifacts are excluded."
rules:
  - requirement: Resolve the active schema
    rules:
      - The use case SHALL resolve the schema via `SchemaRegistry.resolve(schemaRef, workspaceSchemasPaths)`. If the schema cannot be resolved (returns `null`), the use case MUST throw a `SchemaNotFoundError`.
  - requirement: Filter to spec-scoped artifact types
    rules:
      - The use case SHALL call `schema.artifacts()` and retain only those artifact types where `scope === 'spec'`. Change-scoped artifact types MUST be excluded from validation.
  - requirement: Single spec validation mode
    rules:
      - |-
        When `input.specPath` is provided (format: `workspace:capabilityPath`), the use case SHALL:

        1. Parse the spec identifier via `parseSpecId`.
        2. Look up the workspace's `SpecRepository`. If not found, throw `WorkspaceNotFoundError`.
        3. Load the spec via `repo.get(specPath)`. If not found, throw `SpecNotFoundError`.
        4. Validate only that single spec.
  - requirement: Workspace validation mode
    rules:
      - |-
        When `input.workspace` is provided (and `input.specPath` is not), the use case SHALL:

        1. Look up the workspace's `SpecRepository`. If not found, throw `WorkspaceNotFoundError`.
        2. List all specs in the workspace via `repo.list()`.
        3. Validate each spec.
  - requirement: All-workspaces validation mode
    rules:
      - When neither `input.specPath` nor `input.workspace` is provided, the use case SHALL iterate all configured workspaces and validate every spec in each.
  - requirement: Per-spec artifact validation
    rules:
      - |-
        For each spec, the use case SHALL check every spec-scoped artifact type from the schema:

        1. Determine the expected filename from `path.basename(artifactType.output)`.
        2. If the file is missing and the artifact type is not optional, record a `ValidationFailure` with description indicating the required artifact is missing.
        3. If the file is missing and the artifact type is optional, skip silently.
        4. If the file exists and the artifact type has no validation rules, skip.
        5. If the file exists and has rules: infer the format (from `artifactType.format` or filename), obtain the parser from `ArtifactParserRegistry`, parse the content into an AST, and evaluate the schema's validation rules via `evaluateRules`.
  - requirement: Aggregated result
    rules:
      - |-
        The use case SHALL return a `ValidateSpecsResult` containing:

        * `entries` — array of `SpecValidationEntry` objects, one per validated spec.
        * `totalSpecs` — total number of specs validated.
        * `passed` — number of specs with zero failures.
        * `failed` — number of specs with one or more failures.

        Each `SpecValidationEntry` MUST include:

        * `spec` — qualified label in `workspace:capabilityPath` format.
        * `passed` — `true` if `failures` is empty.
        * `failures` — array of `ValidationFailure` objects.
        * `warnings` — array of `ValidationWarning` objects.
  - requirement: Format inference and parser resolution
    rules:
      - When an artifact type does not specify an explicit `format`, the use case SHALL infer it from the filename via `inferFormat`. If no parser is found for the resolved format, the artifact MUST be skipped without recording a failure or warning.
constraints:
  - The use case receives a ReadonlyMap<string, SpecRepository> — it MUST NOT modify the map or the repositories.
  - 'input.specPath takes precedence: when provided, input.workspace is ignored.'
  - Validation rules come exclusively from the resolved schema — the use case does not define its own rules.
  - The ValidationFailure and ValidationWarning types are shared with the ValidateArtifacts use case.
scenarios:
  - requirement: Resolve the active schema
    name: Schema not found throws SchemaNotFoundError
    when:
      - the schema registry returns null for the configured schema reference
    then:
      - a SchemaNotFoundError is thrown
  - requirement: Filter to spec-scoped artifact types
    name: Change-scoped artifacts excluded
    given:
      - "a schema with both scope: 'spec' and scope: 'change' artifact types"
    when:
      - validation runs
    then:
      - "only scope: 'spec' artifact types are checked"
  - requirement: Single spec validation mode
    name: Validate a single spec by qualified path
    given:
      - a spec at default:auth/login with a required spec.md present
    when:
      - "execute({ specPath: 'default:auth/login' }) is called"
    then:
      - the result contains exactly one entry for 'default:auth/login'
  - requirement: Single spec validation mode
    name: Unknown workspace in specPath throws WorkspaceNotFoundError
    when:
      - "execute({ specPath: 'nonexistent:auth/login' }) is called"
    then:
      - a WorkspaceNotFoundError is thrown
  - requirement: Single spec validation mode
    name: Spec not found throws SpecNotFoundError
    given:
      - workspace 'default' exists but has no spec at auth/login
    when:
      - "execute({ specPath: 'default:auth/login' }) is called"
    then:
      - a SpecNotFoundError is thrown
  - requirement: Workspace validation mode
    name: All specs in workspace validated
    given:
      - workspace 'default' contains three specs
    when:
      - "execute({ workspace: 'default' }) is called"
    then:
      - the result contains three entries
  - requirement: Workspace validation mode
    name: Unknown workspace throws WorkspaceNotFoundError
    when:
      - "execute({ workspace: 'nonexistent' }) is called"
    then:
      - a WorkspaceNotFoundError is thrown
  - requirement: All-workspaces validation mode
    name: All specs across all workspaces validated
    given:
      - two workspaces with two specs each
    when:
      - execute({}) is called
    then:
      - the result contains four entries
  - requirement: Per-spec artifact validation
    name: Missing required artifact recorded as failure
    given:
      - a spec-scoped artifact type spec.md that is not optional, and the spec has no spec.md
    when:
      - validation runs for that spec
    then:
      - a ValidationFailure is recorded with artifactId matching the artifact type and a description indicating the artifact is missing
  - requirement: Per-spec artifact validation
    name: Missing optional artifact skipped silently
    given:
      - an optional spec-scoped artifact type, and the spec does not have that file
    when:
      - validation runs for that spec
    then:
      - no failure or warning is recorded for that artifact
  - requirement: Per-spec artifact validation
    name: Artifact with no validation rules skipped
    given:
      - a spec-scoped artifact type with an empty validations array, and the file exists
    when:
      - validation runs for that spec
    then:
      - no failure or warning is recorded for that artifact
  - requirement: Per-spec artifact validation
    name: Validation rules evaluated against parsed AST
    given:
      - a spec-scoped artifact type with validation rules, and the file exists and parses successfully
    when:
      - validation runs
    then:
      - evaluateRules results are included in the entry's failures and warnings
  - requirement: Aggregated result
    name: Counts reflect validation outcomes
    given:
      - three specs validated where two pass and one fails
    when:
      - the result is returned
    then:
      - totalSpecs is 3, passed is 2, failed is 1
  - requirement: Format inference and parser resolution
    name: Format inferred from filename when not explicit
    given:
      - an artifact type with no explicit format and filename spec.md
    when:
      - validation runs
    then:
      - the format is inferred as markdown and the corresponding parser is used
  - requirement: Format inference and parser resolution
    name: No parser available skips artifact silently
    given:
      - an artifact type whose inferred format has no registered parser
    when:
      - validation runs
    then:
      - no failure or warning is recorded for that artifact
