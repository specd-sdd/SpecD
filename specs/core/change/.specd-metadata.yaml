title: 'Change'
description: >
  The central domain entity representing a discrete unit of spec work that progresses through a defined lifecycle from drafting to archiving. Covers identity and immutability, workspace/spec associations, state transitions, approval gates, artifacts, event sourcing, and draft/discard mechanics. Read this when implementing lifecycle operations, state derivation, approval workflows, or artifact validation.
keywords:
  - 'change'
  - 'lifecycle'
  - 'state machine'
  - 'event sourcing'
  - 'approval gates'
  - 'artifacts'
dependsOn:
  - 'specs/core/config/spec.md'
  - 'specs/core/schema-format/spec.md'
  - 'specs/core/change-manifest/spec.md'
  - 'specs/core/storage/spec.md'
  - 'specs/core/delta-format/spec.md'
  - 'specs/core/spec-metadata/spec.md'
contentHashes:
  spec.md: 'sha256:b48f68b476e05a76fbcb1f9a427399e2bbb72c7482824da7aff8c0248a3396c5'
  verify.md: 'sha256:b3da839663f50d93cb163cf402cc76b1903cb5c5a326618b4c1fc71f343b8842'
rules:
  - requirement: 'Identity'
    rules:
      - 'A Change has a unique, user-defined slug name and a createdAt timestamp recorded at creation time.'
      - 'Both name and createdAt are immutable.'
      - 'The name is the primary handle used in all CLI commands and port interfaces.'
      - 'The createdAt timestamp is the source of truth for ordering.'
  - requirement: 'Workspaces and specs'
    rules:
      - 'A Change declares workspaces (one or more workspace IDs, at least one required) and specIds (one or more spec paths, at least one required).'
      - 'A Change may declare contextSpecIds (spec paths providing context but not being modified).'
      - 'workspaces and specIds are validated against specd.yaml and the spec filesystem at creation time.'
      - 'workspaces and specIds are mutable after creation; any modification triggers approval invalidation.'
      - 'Modifications to contextSpecIds alone do not invalidate approvals; at most a warning is emitted.'
      - "contextSpecIds are populated when the change reaches ready state by taking the union of dependsOn from each spec's .specd-metadata.yaml (direct dependencies only)."
      - 'contextSpecIds may be updated manually without triggering approval invalidation.'
      - 'CompileContext reads workspaces from the change manifest to determine which workspaces are active.'
      - "CompileContext uses contextSpecIds as the starting point for context graph traversal, following dependsOn links in each spec's .specd-metadata.yaml transitively."
  - requirement: 'Lifecycle'
    rules:
      - 'A Change progresses through states: drafting → designing → ready → implementing ⇄ verifying → done → archivable.'
      - 'Two approval gates are configurable in specd.yaml: approvals.spec (default false) and approvals.signoff (default false).'
      - 'When approvals.spec: true, the path ready → pending-spec-approval → spec-approved → implementing is taken instead of ready → implementing.'
      - 'When approvals.signoff: true, the path done → pending-signoff → signed-off → archivable is taken instead of done → archivable.'
      - 'Only the transitions shown in the state diagram are valid; attempting invalid transitions throws InvalidStateTransitionError.'
      - 'archivable is terminal — no further transitions are possible from archivable.'
      - 'The implementing ↔ verifying loop may repeat any number of times.'
      - 'The transition implementing → verifying is only valid when all tasks in the tasks artifact are complete.'
      - 'The transition verifying → implementing is taken when verification fails; no approval invalidation is triggered.'
      - 'Current lifecycle state is derived from history (the to field of the most recent transitioned event); no separate state snapshot is stored.'
  - requirement: 'Implementation and verification loop'
    rules:
      - 'The implementing and verifying states form a loop that repeats until verification passes.'
      - "The transition implementing → verifying is only valid when all artifacts listed in the implementing step's requires field have zero matches for their taskCompletionCheck.incompletePattern."
      - 'The default taskCompletionCheck.incompletePattern is markdown unchecked checkboxes: ^\s*-\s+\[ \].'
      - 'This is a content-level check on the artifact files, not a check on effectiveStatus.'
      - 'Attempting implementing → verifying while any incomplete task item remains throws InvalidStateTransitionError.'
      - 'The transition verifying → implementing is taken when verification fails and changes are required.'
      - 'No approval invalidation is triggered by verifying → implementing.'
      - 'The loop may repeat any number of times; history records each round in full.'
  - requirement: 'Spec approval gate'
    rules:
      - 'When approvals.spec: true, the transition from ready to implementing is blocked.'
      - 'The change must first transition to pending-spec-approval, receive an explicit approval (approver identity, reason, artifact hashes), and then transition to spec-approved before implementing becomes reachable.'
      - 'When approvals.spec: false (default), ready → implementing is a free transition.'
      - 'The pending-spec-approval and spec-approved states are unreachable when approvals.spec: false.'
  - requirement: 'Signoff gate'
    rules:
      - 'When approvals.signoff: true, the transition from done to archivable is always blocked, regardless of whether the change contains only new specs, modifications, or removals.'
      - 'The change must transition to pending-signoff, receive an explicit sign-off (approver identity, reason, artifact hashes), and transition through signed-off → archivable.'
      - 'When approvals.signoff: false (default), done → archivable is a free transition.'
      - 'Attempting to archive a change that is not in archivable state throws InvalidStateTransitionError.'
  - requirement: 'Artifacts'
    rules:
      - 'A Change holds a set of artifacts — typed files whose types and dependency graph are declared by the active schema.'
      - 'Each artifact has: type (artifact type ID from the schema), filename (file path within the change directory), optional (whether required for archiving), requires (ordered list of artifact type IDs that must be complete before this artifact can be validated), status (derived at load time), and validatedHash (hash recorded when last validated, computed after applying preHashCleanup if declared).'
      - 'validatedHash is the sentinel value "__skipped__" when an optional artifact is explicitly marked as not produced.'
      - 'ArtifactStatus is never stored directly — always derived on load from validatedHash and file presence.'
      - 'Status derivation: if validatedHash === "__skipped__" → skipped (only valid for optional: true); if file absent and no sentinel → missing; if file present and cleaned hash matches validatedHash → complete; if file present but hash differs or validatedHash is unset → in-progress.'
      - 'skipped is only valid for optional: true artifacts; attempting to skip a non-optional artifact throws an error.'
      - 'The skipped state must be set explicitly by an actor via a CLI command; the agent must be instructed to call that command when deciding not to produce an optional artifact.'
      - 'When an invalidated event is appended, specd clears validatedHash for all artifacts in the change (sets to null); this resets complete → in-progress and skipped → missing uniformly.'
      - "For the verifying → implementing transition, only the validatedHash of artifacts in the implementing step's requires list is cleared."
      - 'Effective status cascades: an artifact is in-progress if any artifact in its requires chain is neither complete nor skipped.'
      - 'A skipped optional artifact satisfies the dependency — downstream artifacts and workflow steps treat it as resolved.'
      - 'Artifact.markComplete(hash) may only be called by the ValidateArtifacts use case.'
      - 'Artifact.markSkipped() sets validatedHash to the sentinel and may only be called by the skip use case.'
  - requirement: 'History and event sourcing'
    rules:
      - 'The change manifest contains an append-only history array of typed events.'
      - 'Every significant operation appends one or more events; events are never modified or removed.'
      - 'Current lifecycle state is derived entirely from history: the to field of the most recent transitioned event; if no transitioned event exists, the state is drafting.'
      - 'Current draft/active status is derived from history: if the most recent drafted or restored event is of type drafted, the change is shelved in drafts/; otherwise it is active in changes/.'
      - 'Active approval for each gate is the most recent spec-approved or signed-off event that has not been superseded by a subsequent invalidated event.'
      - 'All events share common fields: type, at (ISO 8601 timestamp), and by (git identity).'
      - 'Event types and their conditions: created (once at creation with workspaces, specIds, schemaName, schemaVersion), transitioned (each state transition with from and to), spec-approved (when spec gate passed with reason and artifactHashes), signed-off (when signoff gate passed with reason and artifactHashes), invalidated (when workspaces/specIds/artifacts change with cause), drafted (when shelved to drafts/), restored (when moved back from drafts/), artifact-skipped (when optional artifact marked as not produced), discarded (when permanently abandoned with reason and optional supersededBy).'
      - 'When workspace list, spec list, or any artifact content changes, specd appends an invalidated event followed immediately by a transitioned event rolling back to designing.'
      - 'Invalidated approvals remain in history for audit purposes and are identified as superseded by the presence of a subsequent invalidated event.'
      - 'Multiple approval cycles recorded in full: the active approval is the last spec-approved / signed-off event with no subsequent invalidated event.'
  - requirement: 'Schema version'
    rules:
      - 'The created event records the schemaName and schemaVersion of the schema active at creation time.'
      - 'When the change is loaded, specd compares these values against the currently active schema.'
      - 'If they differ, a warning is emitted.'
      - 'The change remains fully usable — the warning is advisory.'
      - 'Archiving with a schema version mismatch is allowed.'
  - requirement: 'Drafting and discarding'
    rules:
      - 'A change may be moved between storage locations without affecting its lifecycle state; all operations are recorded as events in history.'
      - 'Draft operation (changes/ → drafts/): shelves the change with mandatory by (git identity), at (timestamp), and optional reason.'
      - 'Draft can be performed at any point before archiving; the change retains its full history and lifecycle state.'
      - 'Restore operation (drafts/ → changes/): recovers a drafted change by appending a restored event.'
      - 'Restored change resumes from its preserved state.'
      - 'Discard operation (changes/ or drafts/ → discarded/): permanently abandons the change with mandatory reason, mandatory by (git identity), at (timestamp), and optional supersededBy (list of change names).'
      - 'Discard cannot be undone.'
      - 'A change may be drafted and restored multiple times before being discarded; the full cycle is preserved in history.'
constraints:
  - 'name and createdAt are set at creation and never changed.'
  - 'A Change must have at least one workspace ID and at least one spec ID.'
  - 'Current lifecycle state is derived from history (last transitioned event); no state snapshot is stored.'
  - 'Any modification to the workspace list, spec list, or any artifact content appends an invalidated event followed by a transitioned event back to designing.'
  - 'ArtifactStatus is never stored directly — always derived from validatedHash and file presence.'
  - 'validatedHash === "__skipped__" is the sentinel for skipped status — only valid on optional: true artifacts.'
  - 'skipped is only valid for optional: true artifacts; attempting to skip a non-optional artifact throws an error.'
  - 'skipped satisfies the dependency in requires chains and workflow step availability checks — treated as resolved.'
  - 'On invalidated event: all validatedHash values are cleared — resets complete → in-progress and skipped → missing uniformly.'
  - 'On verifying → implementing: only validatedHash of artifacts in implementing.requires is cleared.'
  - 'Artifact.markComplete(hash) may only be called from ValidateArtifacts.'
  - 'Artifact.markSkipped() may only be called from the skip use case; sets validatedHash to the sentinel.'
  - 'archivable is the only state from which a change may be archived; attempting to archive from any other state throws InvalidStateTransitionError.'
  - 'Both approval gates default to false — teams opt in via approvals in specd.yaml.'
  - 'When approvals.spec: true, spec approval is required before implementing.'
  - 'When approvals.signoff: true, sign-off is always required before archivable, regardless of change content.'
  - 'implementing → verifying requires zero matches of taskCompletionCheck.incompletePattern across all artifacts in the implementing step''s requires; defaults to ^\s*-\s+\[ \] if not declared in the schema; throws InvalidStateTransitionError if any incomplete item is found.'
  - 'verifying → implementing does not trigger approval invalidation.'
  - 'History events are never modified or deleted; invalidated approvals are identifiable by a subsequent invalidated event.'
  - 'Discarding a change requires a discarded event with mandatory reason and by; it is irreversible.'
scenarios:
  - requirement: 'Identity'
    name: 'Change name immutable after creation'
    given: []
    when:
      - 'a Change is created with name add-auth-flow'
    then:
      - 'the name cannot be changed by any subsequent operation'
  - requirement: 'Workspaces and specs'
    name: 'Single workspace change'
    given: []
    when:
      - "a Change is created with workspaces: ['default']"
    then:
      - 'only the default workspace is active for CompileContext'
  - requirement: 'Workspaces and specs'
    name: 'Multi-workspace change'
    given: []
    when:
      - "a Change is created with workspaces: ['default', 'billing']"
    then:
      - 'both default and billing are active and both workspace-level context patterns are applied'
  - requirement: 'Workspaces and specs'
    name: 'Empty workspace list rejected at creation'
    given: []
    when:
      - 'a Change is created with an empty workspaces list'
    then:
      - 'the creation fails with a validation error'
  - requirement: 'Workspaces and specs'
    name: 'Undeclared workspace ID rejected at creation'
    given: []
    when:
      - "a Change is created with workspaces: ['unknown'] and no workspace named unknown exists in specd.yaml"
    then:
      - 'the creation fails with a validation error'
  - requirement: 'Workspaces and specs'
    name: 'Workspace added after creation'
    given: []
    when:
      - "a Change has workspaces: ['default'] and billing is added to the list"
    then:
      - "the workspace list becomes ['default', 'billing'], an invalidated event with cause: 'workspace-change' is appended, a transitioned event rolling back to designing is appended, and any prior spec-approved or signed-off events are now superseded"
  - requirement: 'Workspaces and specs'
    name: 'Spec added after creation'
    given: []
    when:
      - "a new spec path is added to the Change's specIds"
    then:
      - "an invalidated event with cause: 'spec-change' is appended and a transitioned event rolling back to designing is appended"
  - requirement: 'Lifecycle'
    name: 'Valid transition succeeds'
    given: []
    when:
      - 'a Change in drafting state is transitioned to designing'
    then:
      - "a transitioned event with from: 'drafting' and to: 'designing' is appended and deriving state from history returns designing"
  - requirement: 'Lifecycle'
    name: 'Invalid transition throws'
    given: []
    when:
      - 'a Change in drafting state is transitioned to archivable'
    then:
      - 'InvalidStateTransitionError is thrown, no event is appended, and the state remains drafting'
  - requirement: 'Lifecycle'
    name: 'archivable is terminal'
    given: []
    when:
      - 'a Change in archivable state is transitioned to any other state'
    then:
      - 'InvalidStateTransitionError is thrown'
  - requirement: 'Lifecycle'
    name: 'State derived from history — no snapshot'
    given: []
    when:
      - "a Change has a history containing two transitioned events ending with to: 'implementing'"
    then:
      - 'deriving state from history returns implementing without reading any separate state field'
  - requirement: 'Lifecycle'
    name: 'Valid transition — implementing to verifying when all task items complete'
    given:
      - 'a Change in implementing state'
      - "all artifacts in the implementing step's requires have zero matches for their taskCompletionCheck.incompletePattern"
    when:
      - 'the change is transitioned to verifying'
    then:
      - "a transitioned event with from: 'implementing' and to: 'verifying' is appended and deriving state returns verifying"
  - requirement: 'Lifecycle'
    name: 'Default incompletePattern matches markdown unchecked checkboxes'
    given:
      - 'an artifact with no taskCompletionCheck declared'
      - 'its file contains - [ ] implement login and - [x] implement logout'
    when:
      - 'the implementing → verifying transition is attempted'
    then:
      - 'the default pattern ^\s*-\s+\[ \] matches - [ ] implement login and the transition is blocked'
  - requirement: 'Lifecycle'
    name: 'Custom incompletePattern blocks transition'
    given:
      - 'an artifact declares taskCompletionCheck.incompletePattern: ''^\s*TODO:'''
      - 'its file contains TODO: implement login and DONE: implement logout'
    when:
      - 'the implementing → verifying transition is attempted'
    then:
      - 'the custom pattern matches TODO: implement login and the transition is blocked'
  - requirement: 'Lifecycle'
    name: 'Invalid transition — implementing to verifying when a task item is incomplete'
    given:
      - 'a Change in implementing state'
      - "at least one artifact in the implementing step's requires has one or more matches for taskCompletionCheck.incompletePattern"
    when:
      - 'the change is transitioned to verifying'
    then:
      - 'InvalidStateTransitionError is thrown and the state remains implementing'
  - requirement: 'Lifecycle'
    name: 'Progress reported from both patterns'
    given:
      - 'an artifact with taskCompletionCheck.completePattern and taskCompletionCheck.incompletePattern both declared'
      - 'the artifact file contains 3 complete items and 2 incomplete items'
    when:
      - 'the CLI reports task progress'
    then:
      - 'it reports 3/5 tasks complete'
  - requirement: 'Lifecycle'
    name: 'Invalid transition — implementing to done (skipping verifying)'
    given: []
    when:
      - 'a Change in implementing state is transitioned directly to done'
    then:
      - 'InvalidStateTransitionError is thrown and the state remains implementing'
  - requirement: 'Lifecycle'
    name: 'Valid transition — verifying back to implementing when verification fails'
    given:
      - 'a Change in verifying state where verification has failed and changes are required'
    when:
      - 'the change is transitioned back to implementing'
    then:
      - "a transitioned event with from: 'verifying' and to: 'implementing' is appended"
      - 'no approval invalidation is triggered'
  - requirement: 'Lifecycle'
    name: 'implementing ↔ verifying loop repeats until verification passes'
    given:
      - 'a Change that has cycled through implementing → verifying → implementing → verifying'
    when:
      - 'verification passes on the second verifying round'
    then:
      - 'the change transitions to done and the full cycle is recorded in history'
  - requirement: 'Lifecycle'
    name: 'Valid transition — verifying to done'
    given: []
    when:
      - 'a Change in verifying state transitions to done'
    then:
      - "a transitioned event with from: 'verifying' and to: 'done' is appended"
  - requirement: 'Spec approval gate'
    name: 'Gate disabled — free transition to implementing'
    given: []
    when:
      - 'approvals.spec: false (default) and a Change is in ready state'
    then:
      - 'it transitions directly to implementing with no approval required'
  - requirement: 'Spec approval gate'
    name: 'Gate enabled — blocked until spec approved'
    given: []
    when:
      - 'approvals.spec: true and a Change is in ready state'
    then:
      - 'it transitions to pending-spec-approval, not implementing'
  - requirement: 'Spec approval gate'
    name: 'Gate enabled — implementing reachable after approval'
    given: []
    when:
      - 'approvals.spec: true and a Change in pending-spec-approval receives approval'
    then:
      - 'a spec-approved event is appended, then a transitioned event to spec-approved state, then to implementing'
  - requirement: 'Signoff gate'
    name: 'Gate disabled — free transition to archivable'
    given: []
    when:
      - 'approvals.signoff: false (default) and a Change is in done state'
    then:
      - 'it transitions directly to archivable regardless of change content'
  - requirement: 'Signoff gate'
    name: 'Gate enabled — always blocked at done'
    given: []
    when:
      - 'approvals.signoff: true and a Change is in done state'
    then:
      - 'it transitions to pending-signoff, not archivable — regardless of whether changes are additions, modifications, or removals'
  - requirement: 'Signoff gate'
    name: 'Gate enabled — archivable after signoff'
    given: []
    when:
      - 'approvals.signoff: true and a Change in pending-signoff receives sign-off'
    then:
      - 'a signed-off event is appended, then a transitioned event to signed-off state, then to archivable'
  - requirement: 'Signoff gate'
    name: 'Archive from non-archivable state throws'
    given: []
    when:
      - 'archiving is attempted on a Change not in archivable state'
    then:
      - 'InvalidStateTransitionError is thrown'
  - requirement: 'Artifacts'
    name: 'Status derived — complete'
    given: []
    when:
      - "the cleaned hash of an artifact's current file matches its validatedHash"
    then:
      - 'effectiveStatus returns complete'
  - requirement: 'Artifacts'
    name: 'Status derived — missing'
    given: []
    when:
      - "an artifact's file does not exist"
    then:
      - 'effectiveStatus returns missing'
  - requirement: 'Artifacts'
    name: 'Status derived — in-progress'
    given: []
    when:
      - "an artifact's cleaned file hash differs from validatedHash"
    then:
      - 'effectiveStatus returns in-progress'
  - requirement: 'Artifacts'
    name: 'preHashCleanup applied before status comparison'
    given: []
    when:
      - 'an artifact has preHashCleanup defined and a progress marker changes (e.g. a checkbox is checked)'
    then:
      - 'effectiveStatus remains complete — the cleaned hash is unchanged'
  - requirement: 'Artifacts'
    name: 'Status derived — skipped'
    given:
      - 'an optional: true artifact with no file on disk'
      - 'its validatedHash is "__skipped__"'
    when:
      - 'effectiveStatus is derived'
    then:
      - 'it returns skipped'
  - requirement: 'Artifacts'
    name: 'skipped persists across calls'
    given:
      - 'an optional: true artifact with validatedHash === "__skipped__" persisted in the manifest'
    when:
      - 'effectiveStatus is derived in a subsequent CLI invocation'
    then:
      - 'it returns skipped — the sentinel in the manifest is the source of truth'
  - requirement: 'Artifacts'
    name: 'skipping a non-optional artifact fails'
    given: []
    when:
      - 'an attempt is made to skip an artifact with optional: false'
    then:
      - 'the operation fails with an error and validatedHash is not modified'
  - requirement: 'Artifacts'
    name: 'invalidated event clears all validatedHash values'
    given:
      - 'a change with one complete artifact (hash set) and one skipped artifact (sentinel set)'
    when:
      - 'an invalidated event is appended'
    then:
      - 'all validatedHash values are cleared — the complete artifact becomes in-progress and the skipped artifact becomes missing'
  - requirement: 'Artifacts'
    name: 'verifying → implementing clears only implementing.requires artifacts'
    given:
      - 'a change with implementing.requires: [tasks] and tasks is complete'
    when:
      - 'the change transitions verifying → implementing'
    then:
      - 'only tasks.validatedHash is cleared — other artifacts retain their status'
  - requirement: 'Artifacts'
    name: 'Dependency cascade — skipped optional satisfies dependency'
    given:
      - 'artifact B requires artifact A, and artifact A is optional: true and skipped'
    when:
      - 'effectiveStatus for artifact B is derived'
    then:
      - 'it is not blocked by A — skipped is treated as resolved'
  - requirement: 'Artifacts'
    name: 'Dependency cascade — incomplete dependency'
    given: []
    when:
      - 'artifact B requires artifact A, and artifact A is in-progress'
    then:
      - "effectiveStatus for artifact B returns in-progress even if B's own cleaned hash matches its validatedHash"
  - requirement: 'Artifacts'
    name: 'markComplete only from ValidateArtifacts'
    given: []
    when:
      - 'any code path other than ValidateArtifacts calls Artifact.markComplete(hash)'
    then:
      - 'this is a violation of the domain contract — no other use case may set an artifact to complete'
  - requirement: 'History and event sourcing'
    name: 'History is append-only'
    given: []
    when:
      - 'any operation is performed on a Change'
    then:
      - 'new events are appended to history; no existing event is modified or removed'
  - requirement: 'History and event sourcing'
    name: 'State derived from last transitioned event'
    given: []
    when:
      - 'history contains transitioned events with to values of designing, ready, implementing, verifying'
    then:
      - 'deriving state returns verifying (the most recent to value)'
  - requirement: 'History and event sourcing'
    name: 'Draft status derived from history'
    given: []
    when:
      - 'history contains a drafted event followed by no restored event'
    then:
      - 'the change is considered currently shelved in drafts/'
  - requirement: 'History and event sourcing'
    name: 'Draft/restore cycle tracked'
    given: []
    when:
      - 'a Change is drafted, then restored, then drafted again'
    then:
      - 'history contains two drafted events and one restored event, and the change is currently shelved'
  - requirement: 'History and event sourcing'
    name: 'Active approval derived from history'
    given: []
    when:
      - 'a spec-approved event exists in history and no subsequent invalidated event exists'
    then:
      - 'that approval is the active spec approval and its artifactHashes represent the current approved signature'
  - requirement: 'History and event sourcing'
    name: 'Approval superseded by subsequent invalidated event'
    given: []
    when:
      - 'a spec-approved event exists in history followed by an invalidated event'
    then:
      - 'the prior spec-approved event is superseded — there is no active spec approval'
  - requirement: 'History and event sourcing'
    name: 'Multiple approval cycles in history'
    given: []
    when:
      - 'a Change is spec-approved, then invalidated, then spec-approved again'
    then:
      - 'history contains two spec-approved events; the first is superseded by the invalidated event; the second is the active approval'
  - requirement: 'History and event sourcing'
    name: 'Approval events never modified'
    given: []
    when:
      - 'a Change already has spec-approved or signed-off events in history'
    then:
      - 'no operation may overwrite or modify those events — only new events are appended'
  - requirement: 'History and event sourcing'
    name: 'Artifact change triggers invalidation'
    given: []
    when:
      - "an artifact's validatedHash is updated (i.e. its content changed after a prior approval)"
    then:
      - "an invalidated event with cause: 'artifact-change' is appended and a transitioned event back to designing is appended"
  - requirement: 'Schema version'
    name: 'Schema version mismatch warns'
    given: []
    when:
      - "a Change is loaded and the active schema's version differs from the schemaVersion recorded in the created event"
    then:
      - 'specd emits a warning but the change remains fully usable'
  - requirement: 'Schema version'
    name: 'Schema mismatch does not block archive'
    given: []
    when:
      - 'a Change with a schema version mismatch is in archivable state'
    then:
      - 'archiving proceeds normally — the mismatch warning is advisory only'
  - requirement: 'Drafting and discarding'
    name: 'Draft requires identity'
    given: []
    when:
      - 'a Change is drafted without providing a by identity'
    then:
      - 'the operation fails with a validation error and no event is appended'
  - requirement: 'Drafting and discarding'
    name: 'Draft appends drafted event'
    given: []
    when:
      - 'a Change in implementing state is drafted with a valid identity'
    then:
      - 'a drafted event is appended to history, the change is moved to drafts/, and it retains its implementing lifecycle state'
  - requirement: 'Drafting and discarding'
    name: 'Drafted change no longer appears in active changes'
    given: []
    when:
      - 'a Change has a drafted event as its most recent drafted/restored event'
    then:
      - 'the change is resolved from drafts/, not changes/'
  - requirement: 'Drafting and discarding'
    name: 'Restore appends restored event'
    given: []
    when:
      - 'a drafted Change is restored'
    then:
      - 'a restored event is appended to history, the change is moved back to changes/, and it resumes from its preserved lifecycle state'
  - requirement: 'Drafting and discarding'
    name: 'Discard requires reason and identity'
    given: []
    when:
      - 'a Change is discarded without providing a reason or by identity'
    then:
      - 'the operation fails with a validation error and no event is appended'
  - requirement: 'Drafting and discarding'
    name: 'Discard appends discarded event'
    given: []
    when:
      - 'a Change is discarded with a reason, identity, and optional superseding change names'
    then:
      - 'a discarded event is appended to history and the change is moved to discarded/'
  - requirement: 'Drafting and discarding'
