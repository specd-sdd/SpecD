title: Change
description: A Change is the central domain entity in specd. It represents a discrete, named unit of in-progress spec work — a coherent set of modifications across one or more workspaces that moves from initial drafting through implementation and into the archive. Every specd operation targets a Change. The Change enforces its own lifecycle and invariants; no external code may bypass them.
dependsOn:
  - core:core/config
  - core:core/schema-format
  - core:core/change-manifest
  - core:core/storage
  - core:core/delta-format
  - core:core/spec-metadata
  - core:core/spec-id-format
  - core:core/workspace
context:
  - A Change is the central domain entity in specd. It represents a discrete, named unit of in-progress spec work — a coherent set of modifications across one or more workspaces that moves from initial drafting through implementation and into the archive. Every specd operation targets a Change. The Change enforces its own lifecycle and invariants; no external code may bypass them.
rules:
  - requirement: Identity
    rules:
      - A Change has a unique, user-defined slug name (e.g. `add-auth-flow`) and a `createdAt` timestamp recorded at creation time. Both are immutable. The name is the primary handle used in all CLI commands and port interfaces. The `createdAt` timestamp is the source of truth for ordering — the storage layer derives its directory name prefix from it (see storage spec), but that prefix is an infrastructure concern and does not appear in the domain model.
  - requirement: Workspaces and specs
    rules:
      - |-
        A Change declares:
        * **`specIds`** — zero or more spec IDs being created or modified by this change (e.g. `['auth/login', 'billing:invoices']`). An empty list is allowed (e.g. when a change is first created but specs have not yet been assigned).
        * **`workspaces`** — a **computed getter** derived at runtime from `specIds` by extracting the workspace component of each spec ID via `parseSpecId()`. It is not a declared or persisted field. When `specIds` is empty, `workspaces` is empty.
        * **`specDependsOn`** — an optional map from spec ID to an array of spec IDs representing per-spec declared dependencies. Captured during change authoring to track dependencies independently of `.specd-metadata.yaml`. Used by `CompileContext` as the highest-priority source for `dependsOn` resolution. Not subject to approval invalidation — updating `specDependsOn` does not trigger an `invalidated` event.
        `specIds` have their workspace component validated against `specd.yaml` at creation time (the spec path itself is not validated against the filesystem, since a change may create new specs that don't yet exist). `specIds` is **mutable** after creation — specs can be added or removed as the change scope evolves. Any modification to `specIds` triggers approval invalidation (see Requirement: History and event sourcing).
        `CompileContext` derives the active workspaces from `specIds` via the `workspaces` getter. It resolves `dependsOn` entries directly from `change.specIds` by reading each spec's `.specd-metadata.yaml`, then follows links transitively. This resolution happens dynamically on every execution, not as a snapshot. See [`specs/core/spec-metadata/spec.md`](../spec-metadata/spec.md) for the `.specd-metadata.yaml` format.
  - requirement: Lifecycle
    rules:
      - |-
        A Change progresses through the following states. Two approval gates are configurable in `specd.yaml` (`approvals.spec` and `approvals.signoff`, both default `false`); the dashed paths are only active when the corresponding gate is enabled:
        ```
        drafting → designing → ready ──────────────────────────────────────── → implementing ⇄ verifying → done ──────────────────── → archivable
                                     ╌→ pending-spec-approval → spec-approved ┘                            ╌→ pending-signoff → signed-off ┘
                                       (if approvals.spec: true)                                              (if approvals.signoff: true)
        ```
        | State                   | Meaning                                                                                       |
        | ----------------------- | --------------------------------------------------------------------------------------------- |
        | `drafting`              | Initial state; the change has been created but no design work has started                     |
        | `designing`             | The agent is elaborating the spec content                                                     |
        | `ready`                 | The spec is complete; awaiting implementation (or spec approval if gate is enabled)           |
        | `pending-spec-approval` | Waiting for human approval of the spec before implementation may begin                        |
        | `spec-approved`         | Spec has been approved; implementation may begin                                              |
        | `implementing`          | Code is being written against the spec; all tasks must be complete to transition to verifying |
        | `verifying`             | The implementation is being verified against the spec scenarios                               |
        | `done`                  | Verification is complete; the change is ready to archive                                      |
        | `pending-signoff`       | Waiting for human sign-off on the completed work before archiving                             |
        | `signed-off`            | Work has been signed off; the change may be archived                                          |
        | `archivable`            | Terminal state; the change may be moved to the archive                                        |
        Only the transitions shown above are valid. Any attempt to transition to a state not reachable from the current state throws `InvalidStateTransitionError`. `archivable` is terminal — no further transitions are possible.
        The `implementing ↔ verifying` loop may repeat any number of times. The transition `implementing → verifying` is only valid when all tasks in the `tasks` artifact are complete. The transition `verifying → implementing` is taken when verification fails and changes are required — the tasks artifact is reset to `in-progress` to allow new tasks to be added before the next implementation round begins.
  - requirement: Implementation and verification loop
    rules:
      - |-
        The `implementing` and `verifying` states form a loop that repeats until verification passes.
        The transition `implementing → verifying` is only valid when all artifacts listed in the `implementing` step's `requires` field have zero matches for their `taskCompletionCheck.incompletePattern` (defaulting to markdown unchecked checkboxes `- [ ]` if not declared). This is a content-level check on the artifact files, not a check on `effectiveStatus`. Attempting this transition while any incomplete task item remains throws `InvalidStateTransitionError`.
        The transition `verifying → implementing` is taken when verification fails and changes are required. No approval invalidation is triggered by this transition; the spec has not changed, only the implementation work has been found insufficient.
        The loop may repeat any number of times. History records each round in full.
  - requirement: Spec approval gate
    rules:
      - |-
        When `approvals.spec: true`, the transition from `ready` to `implementing` is blocked. The change must first transition to `pending-spec-approval`, receive an explicit approval (approver identity, reason, artifact hashes), and then transition to `spec-approved` before `implementing` becomes reachable.
        When `approvals.spec: false` (default), `ready → implementing` is a free transition. The `pending-spec-approval` and `spec-approved` states are unreachable.
  - requirement: Signoff gate
    rules:
      - |-
        When `approvals.signoff: true`, the transition from `done` to `archivable` is always blocked — regardless of whether the change contains only new specs, modifications, or removals. The change must transition to `pending-signoff`, receive an explicit sign-off (approver identity, reason, artifact hashes), and transition through `signed-off → archivable`.
        When `approvals.signoff: false` (default), `done → archivable` is a free transition. Attempting to archive a change that is not in `archivable` state throws `InvalidStateTransitionError`.
  - requirement: Artifacts
    rules:
      - |-
        A Change holds a set of artifacts — typed files whose types and dependency graph are declared by the active schema. Each artifact has:
        * **`type`** — the artifact type ID from the schema (e.g. `proposal`, `specs`, `design`, `tasks`)
        * **`filename`** — the file path within the change directory
        * **`optional`** — whether the artifact is required for archiving
        * **`requires`** — ordered list of artifact type IDs that must be complete before this artifact can be validated
        * **`status`** — derived at load time: `missing` | `in-progress` | `complete` | `skipped`
        * **`validatedHash`** — the hash recorded when the artifact was last validated, computed after applying `preHashCleanup` if declared in the schema. The sentinel value `"__skipped__"` is used when an optional artifact is explicitly marked as not produced.
        `ArtifactStatus` is never stored directly — it is always derived on load from `validatedHash` and file presence:
        1. `validatedHash === "__skipped__"` → `skipped` (only valid for `optional: true` artifacts)
        2. File absent (and no sentinel) → `missing`
        3. File present and cleaned hash matches `validatedHash` → `complete`
        4. File present but hash differs or `validatedHash` is unset → `in-progress`
        `skipped` is only valid for `optional: true` artifacts. Attempting to skip a non-optional artifact throws an error.
        The `skipped` state must be set explicitly by an actor — human or agent via a CLI command. The agent must be instructed (via the schema `instruction` or skill definition) to call that command when it decides not to produce an optional artifact. The specific CLI command is defined in the CLI spec.
        **Rollback:** when an `invalidated` event is appended, specd clears `validatedHash` for all artifacts in the change (sets to `null`). This resets them uniformly: `complete` artifacts become `in-progress` (file present, no valid hash), `skipped` artifacts become `missing` (file absent, sentinel cleared). For the `verifying → implementing` transition, only the `validatedHash` of artifacts in the `implementing` step's `requires` list is cleared.
        Effective status cascades: an artifact is `in-progress` if any artifact in its `requires` chain is neither `complete` nor `skipped`, even if its own hash matches. A `skipped` optional artifact satisfies the dependency — downstream artifacts and workflow steps treat it as resolved.
        `Artifact.markComplete(hash)` may only be called by the `ValidateArtifacts` use case. `Artifact.markSkipped()` sets `validatedHash` to the sentinel and may only be called by the skip use case. No other code path may set these values.
  - requirement: History and event sourcing
    rules:
      - |-
        The change manifest contains an **append-only `history` array** of typed events. Every significant operation appends one or more events. Events are never modified or removed.
        The **current lifecycle state** of a Change is derived entirely from its history: the `to` field of the most recent `transitioned` event. If no `transitioned` event exists, the state is `drafting`. No separate state snapshot is stored. The JSON serialization of these events in `manifest.json` is defined in [`specs/core/change-manifest/spec.md` — Requirement: Manifest structure](../change-manifest/spec.md).
        The **current draft/active status** is derived from history: if the most recent `drafted` or `restored` event is of type `drafted`, the change is currently shelved in `drafts/`; otherwise it is active in `changes/`.
        The **active approval** for each gate is the most recent `spec-approved` or `signed-off` event that has not been superseded by a subsequent `invalidated` event.
        All events share common fields:
        * **`type`** — identifies the event kind
        * **`at`** — ISO 8601 timestamp
        * **`by`** — git identity (`name` + `email`) of the actor, mandatory on all events
        Event types:
        | Type               | Additional fields                                          | When appended                                                  |
        | ------------------ | ---------------------------------------------------------- | -------------------------------------------------------------- |
        | `created`          | `specIds`, `schemaName`, `schemaVersion`                   | Once, when the change is first created                         |
        | `transitioned`     | `from: ChangeState`, `to: ChangeState`                     | Each lifecycle state transition                                |
        | `spec-approved`    | `reason: string`, `artifactHashes: Record<string, string>` | When the spec approval gate is passed                          |
        | `signed-off`       | `reason: string`, `artifactHashes: Record<string, string>` | When the signoff gate is passed                                |
        | `invalidated`      | `cause: 'spec-change' \| 'artifact-change'`                | When specIds or artifacts change, superseding approvals        |
        | `drafted`          | `reason?: string`                                          | When a change is shelved to `drafts/`                          |
        | `restored`         | *(none beyond common fields)*                              | When a drafted change is moved back to `changes/`              |
        | `artifact-skipped` | `artifactId: string`, `reason?: string`                    | When an optional artifact is explicitly marked as not produced |
        | `discarded`        | `reason: string`, `supersededBy?: string[]`                | When a change is permanently abandoned                         |
        **Approval invalidation:** when the spec list or any artifact content changes, specd appends an `invalidated` event (with the appropriate `cause`) followed immediately by a `transitioned` event rolling back to `designing`. The invalidated approvals remain in history for audit purposes and are identified as superseded by the presence of the subsequent `invalidated` event.
        **Multiple approval cycles:** if a change is approved, then invalidated, then approved again, the history records all events. The active approval is the last `spec-approved` / `signed-off` event with no subsequent `invalidated` event.
  - requirement: Schema version
    rules:
      - |-
        The `created` event records the `schemaName` and `schemaVersion` of the schema active at creation time.
        A **`schemaName` mismatch** (e.g. `schema-std` → `schema-openspec`) indicates structural incompatibility — different artifact types, formats, delta rules, and validations. When a use case (`ArchiveChange`, `ValidateArtifacts`, `CompileContext`) detects that `schema.name() !== change.schemaName`, it must throw `SchemaMismatchError` before performing any work. This is an error, not a warning.
        A **`schemaVersion` mismatch** within the same schema name is advisory. A warning is emitted but the change remains fully usable. Archiving with a `schemaVersion` mismatch is allowed; a `schemaName` mismatch throws `SchemaMismatchError`.
  - requirement: Drafting and discarding
    rules:
      - |-
        A change may be moved between storage locations without affecting its lifecycle state. All operations are recorded as events in history.
        * **Draft** (`changes/` → `drafts/`) — shelves the change. Appends a `drafted` event with: Can be performed at any point before archiving. The change retains its full history and lifecycle state.
          * **`by`** — mandatory git identity (name + email) of the person shelving
          * **`at`** — timestamp
          * **`reason`** — optional explanation
        * **Restore** (`drafts/` → `changes/`) — recovers a drafted change. Appends a `restored` event. The change resumes from its preserved state.
        * **Discard** (`changes/` or `drafts/` → `discarded/`) — permanently abandons the change. Appends a `discarded` event with: Cannot be undone. A change may be drafted and restored multiple times before being discarded; the full cycle is preserved in history.
          * **`reason`** — mandatory human-provided explanation
          * **`by`** — mandatory git identity (name + email) of the person discarding
          * **`at`** — timestamp
          * **`supersededBy`** — optional list of change names that replace this one
constraints:
  - name and createdAt are set at creation and never changed
  - workspaces is a computed getter derived from specIds via parseSpecId() — it is not a declared or persisted field
  - specIds may be empty (empty specIds results in empty workspaces)
  - Current lifecycle state is derived from history (last transitioned event); no state snapshot is stored
  - Any modification to the spec list or any artifact content appends an invalidated event followed by a transitioned event back to designing
  - ArtifactStatus is never stored directly — always derived from validatedHash and file presence
  - 'validatedHash === "__skipped__" is the sentinel for skipped status — only valid on optional: true artifacts'
  - 'skipped is only valid for optional: true artifacts; attempting to skip a non-optional artifact throws an error'
  - skipped satisfies the dependency in requires chains and workflow step availability checks — treated as resolved
  - 'On invalidated event: all validatedHash values are cleared — resets complete → in-progress and skipped → missing uniformly'
  - 'On verifying → implementing: only validatedHash of artifacts in implementing.requires is cleared'
  - Artifact.markComplete(hash) may only be called from ValidateArtifacts
  - Artifact.markSkipped() may only be called from the skip use case; sets validatedHash to the sentinel
  - archivable is the only state from which a change may be archived; attempting to archive from any other state throws InvalidStateTransitionError
  - Both approval gates default to false — teams opt in via approvals in specd.yaml
  - 'When approvals.spec: true, spec approval is required before implementing'
  - 'When approvals.signoff: true, sign-off is always required before archivable, regardless of change content'
  - implementing → verifying requires zero matches of taskCompletionCheck.incompletePattern across all artifacts in the implementing step's requires; defaults to ^\s*-\s+\[ \] if not declared in the schema; throws InvalidStateTransitionError if any incomplete item is found
  - verifying → implementing does not trigger approval invalidation
  - History events are never modified or deleted; invalidated approvals are identifiable by a subsequent invalidated event
  - Discarding a change requires a discarded event with mandatory reason and by; it is irreversible
scenarios:
  - requirement: Identity
    name: Change name immutable after creation
    when:
      - a Change is created with name add-auth-flow
    then:
      - the name cannot be changed by any subsequent operation
  - requirement: Workspaces and specs
    name: Workspaces derived from specIds
    when:
      - "a Change has specIds: ['default:auth/login', 'billing:invoices']"
    then:
      - workspaces returns ['default', 'billing'] derived via parseSpecId()
  - requirement: Workspaces and specs
    name: Workspaces empty when specIds empty
    when:
      - a Change has an empty specIds list
    then:
      - workspaces returns an empty list
  - requirement: Workspaces and specs
    name: Empty specIds allowed at creation
    when:
      - a Change is created with an empty specIds list
    then:
      - creation succeeds and workspaces is empty
  - requirement: Workspaces and specs
    name: Single workspace derived from specIds
    when:
      - "a Change has specIds: ['default:auth/login']"
    then:
      - only the default workspace is active for CompileContext
  - requirement: Workspaces and specs
    name: Multi-workspace derived from specIds
    when:
      - "a Change has specIds: ['default:auth/login', 'billing:invoices']"
    then:
      - both default and billing are active and both workspace-level context patterns are applied
  - requirement: Workspaces and specs
    name: Spec added after creation
    when:
      - a new spec ID is added to the Change's specIds
    then:
      - "an invalidated event with cause: 'spec-change' is appended and a transitioned event rolling back to designing is appended"
  - requirement: Lifecycle
    name: Valid transition succeeds
    when:
      - a Change in drafting state is transitioned to designing
    then:
      - "a transitioned event with from: 'drafting' and to: 'designing' is appended and deriving state from history returns designing"
  - requirement: Lifecycle
    name: Invalid transition throws
    when:
      - a Change in drafting state is transitioned to archivable
    then:
      - InvalidStateTransitionError is thrown, no event is appended, and the state remains drafting
  - requirement: Lifecycle
    name: archivable is terminal
    when:
      - a Change in archivable state is transitioned to any other state
    then:
      - InvalidStateTransitionError is thrown
  - requirement: Lifecycle
    name: State derived from history — no snapshot
    when:
      - "a Change has a history containing two transitioned events ending with to: 'implementing'"
    then:
      - deriving state from history returns implementing without reading any separate state field
  - requirement: Lifecycle
    name: Valid transition — implementing to verifying when all task items complete
    given:
      - a Change in implementing state
      - AND all artifacts in the implementing step's requires have zero matches for their taskCompletionCheck.incompletePattern
    when:
      - the change is transitioned to verifying
    then:
      - "a transitioned event with from: 'implementing' and to: 'verifying' is appended and deriving state returns verifying"
  - requirement: Lifecycle
    name: Default incompletePattern matches markdown unchecked checkboxes
    given:
      - an artifact with no taskCompletionCheck declared
      - AND its file contains - [ ] implement login and - [x] implement logout
    when:
      - the implementing → verifying transition is attempted
    then:
      - the default pattern ^\s*-\s+\[ \] matches - [ ] implement login and the transition is blocked
  - requirement: Lifecycle
    name: Custom incompletePattern blocks transition
    given:
      - "an artifact declares taskCompletionCheck.incompletePattern: '^\\s*TODO:'"
      - 'AND its file contains TODO: implement login and DONE: implement logout'
    when:
      - the implementing → verifying transition is attempted
    then:
      - 'the custom pattern matches TODO: implement login and the transition is blocked'
  - requirement: Lifecycle
    name: Invalid transition — implementing to verifying when a task item is incomplete
    given:
      - a Change in implementing state
      - AND at least one artifact in the implementing step's requires has one or more matches for taskCompletionCheck.incompletePattern
    when:
      - the change is transitioned to verifying
    then:
      - InvalidStateTransitionError is thrown and the state remains implementing
  - requirement: Lifecycle
    name: Progress reported from both patterns
    given:
      - an artifact with taskCompletionCheck.completePattern and taskCompletionCheck.incompletePattern both declared
      - AND the artifact file contains 3 complete items and 2 incomplete items
    when:
      - the CLI reports task progress
    then:
      - it reports 3/5 tasks complete
  - requirement: Lifecycle
    name: Invalid transition — implementing to done (skipping verifying)
    when:
      - a Change in implementing state is transitioned directly to done
    then:
      - InvalidStateTransitionError is thrown and the state remains implementing
  - requirement: Lifecycle
    name: Valid transition — verifying back to implementing when verification fails
    given:
      - a Change in verifying state where verification has failed and changes are required
    when:
      - the change is transitioned back to implementing
    then:
      - "a transitioned event with from: 'verifying' and to: 'implementing' is appended"
      - AND no approval invalidation is triggered
  - requirement: Lifecycle
    name: implementing ↔ verifying loop repeats until verification passes
    given:
      - a Change that has cycled through implementing → verifying → implementing → verifying
    when:
      - verification passes on the second verifying round
    then:
      - the change transitions to done and the full cycle is recorded in history
  - requirement: Lifecycle
    name: Valid transition — verifying to done
    when:
      - a Change in verifying state transitions to done
    then:
      - "a transitioned event with from: 'verifying' and to: 'done' is appended"
  - requirement: Spec approval gate
    name: Gate disabled — free transition to implementing
    when:
      - 'approvals.spec: false (default) and a Change is in ready state'
    then:
      - it transitions directly to implementing with no approval required
  - requirement: Spec approval gate
    name: Gate enabled — blocked until spec approved
    when:
      - 'approvals.spec: true and a Change is in ready state'
    then:
      - it transitions to pending-spec-approval, not implementing
  - requirement: Spec approval gate
    name: Gate enabled — implementing reachable after approval
    when:
      - 'approvals.spec: true and a Change in pending-spec-approval receives approval'
    then:
      - a spec-approved event is appended, then a transitioned event to spec-approved state, then to implementing
  - requirement: Signoff gate
    name: Gate disabled — free transition to archivable
    when:
      - 'approvals.signoff: false (default) and a Change is in done state'
    then:
      - it transitions directly to archivable regardless of change content
  - requirement: Signoff gate
    name: Gate enabled — always blocked at done
    when:
      - 'approvals.signoff: true and a Change is in done state'
    then:
      - it transitions to pending-signoff, not archivable — regardless of whether changes are additions, modifications, or removals
  - requirement: Signoff gate
    name: Gate enabled — archivable after signoff
    when:
      - 'approvals.signoff: true and a Change in pending-signoff receives sign-off'
    then:
      - a signed-off event is appended, then a transitioned event to signed-off state, then to archivable
  - requirement: Signoff gate
    name: Archive from non-archivable state throws
    when:
      - archiving is attempted on a Change not in archivable state
    then:
      - InvalidStateTransitionError is thrown
  - requirement: Artifacts
    name: Status derived — complete
    when:
      - the cleaned hash of an artifact's current file matches its validatedHash
    then:
      - effectiveStatus returns complete
  - requirement: Artifacts
    name: Status derived — missing
    when:
      - an artifact's file does not exist
    then:
      - effectiveStatus returns missing
  - requirement: Artifacts
    name: Status derived — in-progress
    when:
      - an artifact's cleaned file hash differs from validatedHash
    then:
      - effectiveStatus returns in-progress
  - requirement: Artifacts
    name: preHashCleanup applied before status comparison
    when:
      - an artifact has preHashCleanup defined and a progress marker changes (e.g. a checkbox is checked)
    then:
      - effectiveStatus remains complete — the cleaned hash is unchanged
  - requirement: Artifacts
    name: Status derived — skipped
    given:
      - 'an optional: true artifact with no file on disk'
      - AND its validatedHash is "__skipped__"
    when:
      - effectiveStatus is derived
    then:
      - it returns skipped
  - requirement: Artifacts
    name: skipped persists across calls
    given:
      - 'an optional: true artifact with validatedHash === "__skipped__" persisted in the manifest'
    when:
      - effectiveStatus is derived in a subsequent CLI invocation
    then:
      - it returns skipped — the sentinel in the manifest is the source of truth
  - requirement: Artifacts
    name: skipping a non-optional artifact fails
    when:
      - 'an attempt is made to skip an artifact with optional: false'
    then:
      - the operation fails with an error and validatedHash is not modified
  - requirement: Artifacts
    name: invalidated event clears all validatedHash values
    given:
      - a change with one complete artifact (hash set) and one skipped artifact (sentinel set)
    when:
      - an invalidated event is appended
    then:
      - all validatedHash values are cleared — the complete artifact becomes in-progress and the skipped artifact becomes missing
  - requirement: Artifacts
    name: verifying → implementing clears only implementing.requires artifacts
    given:
      - 'a change with implementing.requires: [tasks] and tasks is complete'
    when:
      - the change transitions verifying → implementing
    then:
      - only tasks.validatedHash is cleared — other artifacts retain their status
  - requirement: Artifacts
    name: Dependency cascade — skipped optional satisfies dependency
    given:
      - 'artifact B requires artifact A, and artifact A is optional: true and skipped'
    when:
      - effectiveStatus for artifact B is derived
    then:
      - it is not blocked by A — skipped is treated as resolved
  - requirement: Artifacts
    name: Dependency cascade — incomplete dependency
    when:
      - artifact B requires artifact A, and artifact A is in-progress
    then:
      - effectiveStatus for artifact B returns in-progress even if B's own cleaned hash matches its validatedHash
  - requirement: Artifacts
    name: markComplete only from ValidateArtifacts
    when:
      - any code path other than ValidateArtifacts calls Artifact.markComplete(hash)
    then:
      - this is a violation of the domain contract — no other use case may set an artifact to complete
  - requirement: History and event sourcing
    name: History is append-only
    when:
      - any operation is performed on a Change
    then:
      - new events are appended to history; no existing event is modified or removed
  - requirement: History and event sourcing
    name: State derived from last transitioned event
    when:
      - history contains transitioned events with to values of designing, ready, implementing, verifying
    then:
      - deriving state returns verifying (the most recent to value)
  - requirement: History and event sourcing
    name: Draft status derived from history
    when:
      - history contains a drafted event followed by no restored event
    then:
      - the change is considered currently shelved in drafts/
  - requirement: History and event sourcing
    name: Draft/restore cycle tracked
    when:
      - a Change is drafted, then restored, then drafted again
    then:
      - history contains two drafted events and one restored event, and the change is currently shelved
  - requirement: History and event sourcing
    name: Active approval derived from history
    when:
      - a spec-approved event exists in history and no subsequent invalidated event exists
    then:
      - that approval is the active spec approval and its artifactHashes represent the current approved signature
  - requirement: History and event sourcing
    name: Approval superseded by subsequent invalidated event
    when:
      - a spec-approved event exists in history followed by an invalidated event
    then:
      - the prior spec-approved event is superseded — there is no active spec approval
  - requirement: History and event sourcing
    name: Multiple approval cycles in history
    when:
      - a Change is spec-approved, then invalidated, then spec-approved again
    then:
      - history contains two spec-approved events; the first is superseded by the invalidated event; the second is the active approval
  - requirement: History and event sourcing
    name: Approval events never modified
    when:
      - a Change already has spec-approved or signed-off events in history
    then:
      - no operation may overwrite or modify those events — only new events are appended
  - requirement: History and event sourcing
    name: Artifact change triggers invalidation
    when:
      - an artifact's validatedHash is updated (i.e. its content changed after a prior approval)
    then:
      - "an invalidated event with cause: 'artifact-change' is appended and a transitioned event back to designing is appended"
  - requirement: Schema version
    name: Schema version mismatch warns
    when:
      - a Change is loaded and the active schema's version differs from the schemaVersion recorded in the created event
    then:
