title: 'Change'
description: >
  A Change is the central domain entity in specd representing a discrete, named unit of in-progress spec work that progresses through a defined lifecycle with configurable approval gates.
keywords:
  - 'change'
  - 'entity'
  - 'lifecycle'
  - 'state-machine'
  - 'artifact'
  - 'event-sourcing'
  - 'approval'
  - 'workspace'
  - 'spec'
dependsOn:
  - 'specs/core/config'
  - 'specs/core/schema-format'
  - 'specs/core/change-manifest'
  - 'specs/core/storage'
  - 'specs/core/delta-merger'
  - 'specs/core/spec-metadata'
contentHashes:
  spec.md: 'sha256:7d90942c79c38231c1331d4ee304d63d6e52a819831724f981e8add885a12070'
  verify.md: 'sha256:ad782031f704e71cfd39c23dc6cc84950d41c0b910986927dddbaf4c50019d1c'
constraints:
  - '`name` and `createdAt` are set at creation and never changed'
  - 'A Change must have at least one workspace ID and at least one spec ID'
  - 'Current lifecycle state is derived from history (last `transitioned` event); no state snapshot is stored'
  - 'Any modification to the workspace list, spec list, or any artifact content appends an `invalidated` event followed by a `transitioned` event back to `designing`'
  - '`ArtifactStatus` is never persisted — always derived from cleaned hash vs `validatedHash`'
  - '`Artifact.markComplete(hash)` may only be called from `ValidateSpec`'
  - '`archivable` is the only state from which a change may be archived; attempting to archive from any other state throws `InvalidStateTransitionError`'
  - 'Both approval gates default to `false` — teams opt in via `approvals` in `specd.yaml`'
  - 'When `approvals.spec: true`, spec approval is required before `implementing`'
  - 'When `approvals.signoff: true`, sign-off is always required before `archivable`, regardless of change content'
  - 'History events are never modified or deleted; invalidated approvals are identifiable by a subsequent `invalidated` event'
  - 'Discarding a change requires a `discarded` event with mandatory `reason` and `by`; it is irreversible'
rules:
  - requirement: 'Identity'
    rules:
      - 'A Change has a unique, user-defined slug name (e.g. `add-auth-flow`) and a `createdAt` timestamp recorded at creation time.'
      - 'Both name and `createdAt` are immutable.'
      - 'The name is the primary handle used in all CLI commands and port interfaces.'
      - 'The `createdAt` timestamp is the source of truth for ordering.'
      - 'The storage layer derives its directory name prefix from the timestamp, but that prefix is an infrastructure concern and does not appear in the domain model.'
  - requirement: 'Workspaces and specs'
    rules:
      - "A Change declares `workspaces` — one or more workspace IDs it belongs to (e.g. `['default', 'billing']`)."
      - 'Workspace IDs reference keys declared in `specd.yaml`.'
      - 'At least one workspace is required.'
      - "A Change declares `specIds` — one or more spec paths being created or modified by this change (e.g. `['auth/login', 'billing/invoices']`)."
      - 'At least one spec is required.'
      - 'A Change declares `contextSpecIds` — spec paths that provide context for this change but are not being modified.'
      - "`contextSpecIds` is populated when the change reaches `ready` state by taking the union of `dependsOn` from each spec's `.specd-metadata.yaml` (direct dependencies only)."
      - '`contextSpecIds` may be empty.'
      - '`contextSpecIds` is mutable — can be updated manually without triggering approval invalidation.'
      - '`workspaces` and `specIds` are validated against `specd.yaml` and the spec filesystem at creation time.'
      - 'Both `workspaces` and `specIds` are mutable after creation — workspaces and specs can be added or removed as the change scope evolves.'
      - 'Any modification to `workspaces` or `specIds` triggers approval invalidation.'
      - 'Modifications to `contextSpecIds` alone do not invalidate approvals — at most a warning is emitted if context specs change after an approval has been recorded.'
      - '`CompileContext` reads `workspaces` from the change manifest to determine which workspaces are active.'
      - '`CompileContext` does not infer workspaces from spec paths at compile time.'
      - '`CompileContext` uses `contextSpecIds` as the starting point for context graph traversal.'
      - "`CompileContext` follows `dependsOn` links in each spec's `.specd-metadata.yaml` transitively."
  - requirement: 'Lifecycle'
    rules:
      - 'A Change progresses through the following states: `drafting`, `designing`, `ready`, `pending-spec-approval`, `spec-approved`, `implementing`, `done`, `pending-signoff`, `signed-off`, `archivable`.'
      - '`drafting` is the initial state; the change has been created but no design work has started.'
      - '`designing` state means the agent is elaborating the spec content.'
      - '`ready` state means the spec is complete; awaiting implementation (or spec approval if gate is enabled).'
      - '`pending-spec-approval` means waiting for human approval of the spec before implementation may begin.'
      - '`spec-approved` means spec has been approved; implementation may begin.'
      - '`implementing` means code is being written against the spec.'
      - '`done` means implementation is complete.'
      - '`pending-signoff` means waiting for human sign-off on the completed work before archiving.'
      - '`signed-off` means work has been signed off; the change may be archived.'
      - '`archivable` is the terminal state; the change may be moved to the archive.'
      - 'Only the transitions shown in the state diagram are valid.'
      - 'Any attempt to transition to a state not reachable from the current state throws `InvalidStateTransitionError`.'
      - '`archivable` is terminal — no further transitions are possible.'
      - 'Two approval gates are configurable in `specd.yaml`: `approvals.spec` and `approvals.signoff`, both default to `false`.'
  - requirement: 'Spec approval gate'
    rules:
      - 'When `approvals.spec: true`, the transition from `ready` to `implementing` is blocked.'
      - 'When `approvals.spec: true`, the change must first transition to `pending-spec-approval`.'
      - 'When `approvals.spec: true`, the change must receive an explicit approval (approver identity, reason, artifact hashes).'
      - 'When `approvals.spec: true`, the change must then transition to `spec-approved` before `implementing` becomes reachable.'
      - 'When `approvals.spec: false` (default), `ready → implementing` is a free transition.'
      - 'When `approvals.spec: false`, the `pending-spec-approval` and `spec-approved` states are unreachable.'
  - requirement: 'Signoff gate'
    rules:
      - 'When `approvals.signoff: true`, the transition from `done` to `archivable` is always blocked.'
      - 'The block applies regardless of whether the change contains only new specs, modifications, or removals.'
      - 'When `approvals.signoff: true`, the change must transition to `pending-signoff`.'
      - 'When `approvals.signoff: true`, the change must receive an explicit sign-off (approver identity, reason, artifact hashes).'
      - 'When `approvals.signoff: true`, the change must transition through `signed-off → archivable`.'
      - 'When `approvals.signoff: false` (default), `done → archivable` is a free transition.'
      - 'Attempting to archive a change that is not in `archivable` state throws `InvalidStateTransitionError`.'
  - requirement: 'Artifacts'
    rules:
      - 'A Change holds a set of artifacts — typed files whose types and dependency graph are declared by the active schema.'
      - 'Each artifact has: `type` (artifact type ID from the schema), `filename` (file path within the change directory), `optional` (whether required for archiving), `requires` (ordered list of artifact type IDs that must be complete before this artifact can be validated), `status` (derived at load time), `validatedHash` (hash recorded when artifact was last validated).'
      - 'Artifact `status` values are: `missing`, `in-progress`, `complete`.'
      - '`ArtifactStatus` is never stored directly — it is computed on load.'
      - '`ArtifactStatus` is computed by comparing the hash of the current file content (after `preHashCleanup`) against `validatedHash`.'
      - 'An artifact whose cleaned hash matches `validatedHash` is `complete`.'
      - 'An artifact whose file is absent is `missing`.'
      - 'An artifact whose file is present but hash differs or unvalidated is `in-progress`.'
      - 'Effective status cascades: an artifact is `in-progress` if any artifact in its `requires` chain is not `complete`.'
      - 'This prevents marking later artifacts as complete while earlier dependencies are stale.'
      - '`Artifact.markComplete(hash)` may only be called by the `ValidateSpec` use case.'
      - 'No other code path may set an artifact to `complete`.'
  - requirement: 'History and event sourcing'
    rules:
      - 'The change manifest contains an append-only `history` array of typed events.'
      - 'Every significant operation appends one or more events.'
      - 'Events are never modified or removed.'
      - 'The current lifecycle state of a Change is derived entirely from its history.'
      - 'The `to` field of the most recent `transitioned` event determines the state.'
      - 'If no `transitioned` event exists, the state is `drafting`.'
      - 'No separate state snapshot is stored.'
      - 'The current draft/active status is derived from history.'
      - 'If the most recent `drafted` or `restored` event is of type `drafted`, the change is currently shelved in `drafts/`.'
      - 'Otherwise, the change is active in `changes/`.'
      - 'The active approval for each gate is the most recent `spec-approved` or `signed-off` event that has not been superseded by a subsequent `invalidated` event.'
      - 'All events share common fields: `type`, `at` (ISO 8601 timestamp), `by` (git identity: name + email) of the actor, mandatory on all events.'
      - 'Event type `created` has fields: `workspaces`, `specIds`, `schemaName`, `schemaVersion`. Appended once, when the change is first created.'
      - 'Event type `transitioned` has fields: `from: ChangeState`, `to: ChangeState`. Appended each lifecycle state transition.'
      - 'Event type `spec-approved` has fields: `reason: string`, `artifactHashes: Record<string, string>`. Appended when the spec approval gate is passed.'
      - 'Event type `signed-off` has fields: `reason: string`, `artifactHashes: Record<string, string>`. Appended when the signoff gate is passed.'
      - "Event type `invalidated` has field: `cause: 'workspace-change' | 'spec-change' | 'artifact-change'`. Appended when workspaces, specIds, or artifacts change, superseding approvals."
      - 'Event type `drafted` has field: `reason?: string`. Appended when a change is shelved to `drafts/`.'
      - 'Event type `restored` has no fields beyond common fields. Appended when a drafted change is moved back to `changes/`.'
      - 'Event type `discarded` has fields: `reason: string`, `supersededBy?: string[]`. Appended when a change is permanently abandoned.'
      - 'When the workspace list, spec list, or any artifact content changes, specd appends an `invalidated` event (with the appropriate `cause`) followed immediately by a `transitioned` event rolling back to `designing`.'
      - 'The invalidated approvals remain in history for audit purposes and are identified as superseded by the presence of the subsequent `invalidated` event.'
      - 'If a change is approved, then invalidated, then approved again, the history records all events.'
      - 'The active approval is the last `spec-approved` / `signed-off` event with no subsequent `invalidated` event.'
  - requirement: 'Schema version'
    rules:
      - 'The `created` event records the `schemaName` and `schemaVersion` of the schema active at creation time.'
      - 'When the change is loaded, specd compares these values against the currently active schema.'
      - 'If they differ, a warning is emitted.'
      - 'The change remains fully usable — the warning is advisory.'
      - 'Archiving with a schema version mismatch is allowed.'
  - requirement: 'Drafting and discarding'
    rules:
      - 'A change may be moved between storage locations without affecting its lifecycle state.'
      - 'All operations are recorded as events in history.'
      - 'Draft operation (`changes/` → `drafts/`) shelves the change.'
      - 'Draft appends a `drafted` event with `by` (mandatory git identity), `at` (timestamp), `reason` (optional explanation).'
      - 'Draft can be performed at any point before archiving.'
      - 'The change retains its full history and lifecycle state after drafting.'
      - 'Restore operation (`drafts/` → `changes/`) recovers a drafted change.'
      - 'Restore appends a `restored` event.'
      - 'The change resumes from its preserved state after restoration.'
      - 'Discard operation (`changes/` or `drafts/` → `discarded/`) permanently abandons the change.'
      - 'Discard appends a `discarded` event with `reason` (mandatory human-provided explanation), `by` (mandatory git identity), `at` (timestamp), `supersededBy` (optional list of change names that replace this one).'
      - 'Discard cannot be undone.'
      - 'A change may be drafted and restored multiple times before being discarded.'
      - 'The full draft/restore/discard cycle is preserved in history.'
scenarios:
  - requirement: 'Identity'
    name: 'Change name immutable after creation'
    given:
      - 'A Change is created with name `add-auth-flow`'
    when:
      - 'Any subsequent operation is performed'
    then:
      - 'The name cannot be changed'
  - requirement: 'Workspaces and specs'
    name: 'Single workspace change'
    given:
      - 'A Change is being created'
    when:
      - "It is created with `workspaces: ['default']`"
    then:
      - 'Only the `default` workspace is active for `CompileContext`'
  - requirement: 'Workspaces and specs'
    name: 'Multi-workspace change'
    given:
      - 'A Change is being created'
    when:
      - "It is created with `workspaces: ['default', 'billing']`"
    then:
      - 'Both `default` and `billing` are active and both workspace-level context patterns are applied'
  - requirement: 'Workspaces and specs'
    name: 'Empty workspace list rejected at creation'
    given:
      - 'A Change is being created'
    when:
      - 'An empty `workspaces` list is provided'
    then:
      - 'The creation fails with a validation error'
  - requirement: 'Workspaces and specs'
    name: 'Undeclared workspace ID rejected at creation'
    given:
      - 'A Change is being created'
      - 'No workspace named `unknown` exists in `specd.yaml`'
    when:
      - "It is created with `workspaces: ['unknown']`"
    then:
      - 'The creation fails with a validation error'
  - requirement: 'Workspaces and specs'
    name: 'Workspace added after creation'
    given:
      - "A Change has `workspaces: ['default']`"
    when:
      - '`billing` is added to the list'
    then:
      - "The workspace list becomes `['default', 'billing']`"
      - "An `invalidated` event with `cause: 'workspace-change'` is appended"
      - 'A `transitioned` event rolling back to `designing` is appended'
      - 'Any prior `spec-approved` or `signed-off` events are now superseded'
  - requirement: 'Workspaces and specs'
    name: 'Spec added after creation'
    given:
      - 'A Change is in progress'
    when:
      - "A new spec path is added to the Change's `specIds`"
    then:
      - "An `invalidated` event with `cause: 'spec-change'` is appended"
      - 'A `transitioned` event rolling back to `designing` is appended'
  - requirement: 'Lifecycle'
    name: 'Valid transition succeeds'
    given:
      - 'A Change in `drafting` state'
    when:
      - 'It is transitioned to `designing`'
    then:
      - "A `transitioned` event with `from: 'drafting'` and `to: 'designing'` is appended"
      - 'Deriving state from history returns `designing`'
  - requirement: 'Lifecycle'
    name: 'Invalid transition throws'
    given:
      - 'A Change in `drafting` state'
    when:
      - 'It is transitioned to `archivable`'
    then:
      - '`InvalidStateTransitionError` is thrown'
      - 'No event is appended'
      - 'The state remains `drafting`'
  - requirement: 'Lifecycle'
    name: 'archivable is terminal'
    given:
      - 'A Change in `archivable` state'
    when:
      - 'It is transitioned to any other state'
    then:
      - '`InvalidStateTransitionError` is thrown'
  - requirement: 'Lifecycle'
    name: 'State derived from history — no snapshot'
    given:
      - "A Change has a history containing two `transitioned` events ending with `to: 'implementing'`"
    when:
      - 'State is derived from history'
    then:
      - 'Deriving state from history returns `implementing` without reading any separate state field'
  - requirement: 'Spec approval gate'
    name: 'Gate disabled — free transition to implementing'
    given:
      - '`approvals.spec: false` (default)'
      - 'A Change is in `ready` state'
    when:
      - 'Transition to `implementing` is attempted'
    then:
      - 'It transitions directly to `implementing` with no approval required'
  - requirement: 'Spec approval gate'
    name: 'Gate enabled — blocked until spec approved'
    given:
      - '`approvals.spec: true`'
      - 'A Change is in `ready` state'
    when:
      - 'Transition to `implementing` is attempted'
    then:
      - 'It transitions to `pending-spec-approval`, not `implementing`'
  - requirement: 'Spec approval gate'
    name: 'Gate enabled — implementing reachable after approval'
    given:
      - '`approvals.spec: true`'
      - 'A Change in `pending-spec-approval`'
    when:
      - 'Approval is received'
    then:
      - 'A `spec-approved` event is appended'
      - 'A `transitioned` event to `spec-approved` state is appended'
      - 'Then transition to `implementing` is possible'
  - requirement: 'Signoff gate'
    name: 'Gate disabled — free transition to archivable'
    given:
      - '`approvals.signoff: false` (default)'
      - 'A Change is in `done` state'
    when:
      - 'Transition to `archivable` is attempted'
    then:
      - 'It transitions directly to `archivable` regardless of change content'
  - requirement: 'Signoff gate'
    name: 'Gate enabled — always blocked at done'
    given:
      - '`approvals.signoff: true`'
      - 'A Change is in `done` state'
    when:
      - 'Transition to `archivable` is attempted'
    then:
      - 'It transitions to `pending-signoff`, not `archivable`'
      - 'This applies regardless of whether changes are additions, modifications, or removals'
  - requirement: 'Signoff gate'
    name: 'Gate enabled — archivable after signoff'
    given:
      - '`approvals.signoff: true`'
      - 'A Change in `pending-signoff`'
    when:
      - 'Sign-off is received'
    then:
      - 'A `signed-off` event is appended'
      - 'A `transitioned` event to `signed-off` state is appended'
      - 'Then transition to `archivable` is possible'
  - requirement: 'Signoff gate'
    name: 'Archive from non-archivable state throws'
    given:
      - 'A Change not in `archivable` state'
    when:
      - 'Archiving is attempted'
    then:
      - '`InvalidStateTransitionError` is thrown'
  - requirement: 'Artifacts'
    name: 'Status derived — complete'
    given:
      - 'An artifact exists'
    when:
      - "The cleaned hash of the artifact's current file matches its `validatedHash`"
    then:
      - '`effectiveStatus` returns `complete`'
  - requirement: 'Artifacts'
    name: 'Status derived — missing'
    given:
      - 'An artifact is defined'
    when:
      - "The artifact's file does not exist"
    then:
      - '`effectiveStatus` returns `missing`'
  - requirement: 'Artifacts'
    name: 'Status derived — in-progress'
    given:
      - 'An artifact exists'
    when:
      - "The artifact's cleaned file hash differs from `validatedHash`"
    then:
      - '`effectiveStatus` returns `in-progress`'
  - requirement: 'Artifacts'
    name: 'preHashCleanup applied before status comparison'
    given:
      - 'An artifact has `preHashCleanup` defined'
      - 'The artifact is previously complete'
    when:
      - 'A progress marker changes (e.g. a checkbox is checked)'
    then:
      - '`effectiveStatus` remains `complete`'
      - 'The cleaned hash is unchanged'
  - requirement: 'Artifacts'
    name: 'Dependency cascade — incomplete dependency'
    given:
      - 'Artifact B requires artifact A'
      - 'Artifact A is `in-progress`'
    when:
      - 'Status of artifact B is checked'
    then:
      - "`effectiveStatus` for artifact B returns `in-progress` even if B's own cleaned hash matches its `validatedHash`"
  - requirement: 'Artifacts'
    name: 'markComplete only from ValidateSpec'
    given:
      - 'An artifact exists'
    when:
      - 'Any code path other than `ValidateSpec` calls `Artifact.markComplete(hash)`'
    then:
      - 'This is a violation of the domain contract'
      - 'No other use case may set an artifact to `complete`'
  - requirement: 'History and event sourcing'
    name: 'History is append-only'
    given:
      - 'A Change exists with a history'
    when:
      - 'Any operation is performed on the Change'
    then:
      - 'New events are appended to history'
      - 'No existing event is modified or removed'
  - requirement: 'History and event sourcing'
    name: 'State derived from last transitioned event'
    given:
      - "A Change's history contains `transitioned` events with `to` values of `designing`, `ready`, `implementing`"
    when:
      - 'State is derived from history'
    then:
      - 'Deriving state returns `implementing` (the most recent `to` value)'
  - requirement: 'History and event sourcing'
    name: 'Draft status derived from history'
    given:
      - "A Change's history contains a `drafted` event followed by no `restored` event"
    when:
      - 'Draft status is checked'
    then:
      - 'The change is considered currently shelved in `drafts/`'
  - requirement: 'History and event sourcing'
    name: 'Draft/restore cycle tracked'
    given:
      - 'A Change is being modified'
    when:
      - 'The Change is drafted, then restored, then drafted again'
    then:
      - 'History contains two `drafted` events and one `restored` event'
      - 'The change is currently shelved'
  - requirement: 'History and event sourcing'
    name: 'Active approval derived from history'
    given:
      - "A Change's history contains a `spec-approved` event"
      - 'No subsequent `invalidated` event exists'
    when:
      - 'Active approval is checked'
    then:
      - 'That approval is the active spec approval'
      - 'Its `artifactHashes` represent the current approved signature'
  - requirement: 'History and event sourcing'
    name: 'Approval superseded by subsequent invalidated event'
    given:
      - "A Change's history contains a `spec-approved` event followed by an `invalidated` event"
    when:
      - 'Active approval is checked'
    then:
      - 'The prior `spec-approved` event is superseded'
      - 'There is no active spec approval'
  - requirement: 'History and event sourcing'
    name: 'Multiple approval cycles in history'
    given:
      - 'A Change is being modified'
    when:
      - 'The Change is spec-approved, then invalidated, then spec-approved again'
    then:
      - 'History contains two `spec-approved` events'
      - 'The first is superseded by the `invalidated` event'
      - 'The second is the active approval'
  - requirement: 'History and event sourcing'
    name: 'Approval events never modified'
    given:
      - 'A Change already has `spec-approved` or `signed-off` events in history'
    when:
      - 'Any operation is performed'
    then:
      - 'No operation may overwrite or modify those events'
      - 'Only new events are appended'
  - requirement: 'History and event sourcing'
    name: 'Artifact change triggers invalidation'
    given:
      - 'A Change has an artifact with a `validatedHash`'
    when:
      - "The artifact's `validatedHash` is updated (its content changed after prior approval)"
    then:
      - "An `invalidated` event with `cause: 'artifact-change'` is appended"
      - 'A `transitioned` event back to `designing` is appended'
  - requirement: 'Schema version'
    name: 'Schema version mismatch warns'
    given:
      - 'A Change is loaded'
      - "The active schema's version differs from the `schemaVersion` recorded in the `created` event"
    when:
      - 'The schema version is checked'
    then:
      - 'specd emits a warning'
      - 'The change remains fully usable'
  - requirement: 'Schema version'
    name: 'Schema mismatch does not block archive'
    given:
      - 'A Change with a schema version mismatch is in `archivable` state'
    when:
      - 'Archiving is attempted'
    then:
      - 'Archiving proceeds normally'
      - 'The mismatch warning is advisory only'
  - requirement: 'Drafting and discarding'
    name: 'Draft requires identity'
    given:
      - 'A Change is being drafted'
    when:
      - 'No `by` identity is provided'
    then:
      - 'The operation fails with a validation error'
      - 'No event is appended'
  - requirement: 'Drafting and discarding'
    name: 'Draft appends drafted event'
    given:
      - 'A Change in `implementing` state'
    when:
      - 'It is drafted with a valid identity'
    then:
      - 'A `drafted` event is appended to history'
      - 'The change is moved to `drafts/`'
      - 'It retains its `implementing` lifecycle state'
  - requirement: 'Drafting and discarding'
    name: 'Drafted change no longer appears in active changes'
    given:
      - 'A Change has a `drafted` event as its most recent `drafted`/`restored` event'
    when:
      - 'The change is looked up'
    then:
      - 'The change is resolved from `drafts/`, not `changes/`'
  - requirement: 'Drafting and discarding'
    name: 'Restore appends restored event'
    given:
      - 'A drafted Change'
    when:
      - 'It is restored'
    then:
      - 'A `restored` event is appended to history'
      - 'The change is moved back to `changes/`'
      - 'It resumes from its preserved lifecycle state'
  - requirement: 'Drafting and discarding'
    name: 'Discard requires reason and identity'
    given:
      - 'A Change is being discarded'
    when:
      - 'No reason or `by` identity is provided'
    then:
      - 'The operation fails with a validation error'
      - 'No event is appended'
  - requirement: 'Drafting and discarding'
    name: 'Discard appends discarded event'
    given:
      - 'A Change is being discarded'
    when:
      - 'A reason, identity, and optional superseding change names are provided'
    then:
      - 'A `discarded` event is appended to history'
      - 'The change is moved to `discarded/`'
  - requirement: 'Drafting and discarding'
    name: 'Discard from drafts'
    given:
      - 'A drafted Change'
    when:
      - 'It is discarded'
    then:
      - 'A `discarded` event is appended'
      - 'The change is moved to `discarded/`'
      - 'It cannot be recovered'
  - requirement: 'Drafting and discarding'
    name: 'Discard with supersededBy'
    given:
      - 'A Change is being discarded'
    when:
      - "`supersededBy: ['new-auth-flow', 'cleanup-tokens']` is provided"
    then:
      - 'The `discarded` event stores those names for traceability'
  - requirement: 'Drafting and discarding'
    name: 'Discarded change cannot be restored'
    given:
      - 'A discarded Change'
    when:
