title: 'Delta Merger'
description: >
  Specifies the mergeSpecs pure function that applies a delta spec to a base
  spec using schema-driven block-level operations, producing a merged result
  or raising a conflict error when operations are incompatible.
keywords:
  - 'merge'
  - 'diff'
  - 'conflict'
  - 'pure-functions'
  - 'functional'
  - 'schema-driven'
  - 'domain-services'
dependsOn:
  - 'specs/core/schema-format/'
  - 'specs/_global/architecture/'
contentHashes:
  spec.md: 'sha256:0abb0567ee6aab05f6d0b06703b17c1009f5a9d60efbca3f0b927bee45427e4b'
  verify.md: 'sha256:5b362bfa911c892c694113ea4a0ed5f67b0c075b09aa6b8df5eaccf449f659bc'
rules:
  - requirement: 'Function signature'
    rules:
      - '`mergeSpecs` must have the following signature: `export function mergeSpecs(base: Spec, delta: Spec, deltaConfigs: readonly DeltaConfig[], deltaOperations?: OperationKeywords): Spec`'
      - '`DeltaConfig` defines the section name and block header pattern for one delta section.'
      - '`OperationKeywords` carries the six configurable keyword labels (`added`, `modified`, `removed`, `renamed`, `from`, `to`).'
      - 'When `deltaOperations` is omitted, specd defaults apply (`ADDED`, `MODIFIED`, `REMOVED`, `RENAMED`, `FROM`, `TO`).'
      - '`DeltaConfig` must have fields: `section: string` and `pattern: string`'
      - '`OperationKeywords` must have fields: `added: string`, `modified: string`, `removed: string`, `renamed: string`, `from: string`, `to: string`'
  - requirement: 'Apply order'
    rules:
      - 'Operations are applied in fixed order: RENAMED → REMOVED → MODIFIED → ADDED across all `deltaConfigs`.'
      - 'Each config is processed independently.'
      - 'See `specs/core/schema-format/spec.md` — Requirement: Delta merge operations for the full behavioral contract.'
  - requirement: 'Conflict detection'
    rules:
      - '`mergeSpecs` must run conflict detection before applying any changes.'
      - 'If any conflict is found, it must throw a `DeltaConflictError` without modifying the base spec.'
      - 'See `specs/core/schema-format/spec.md` — Requirement: Delta conflict detection for the full list of conflict conditions.'
  - requirement: 'Pure function'
    rules:
      - '`mergeSpecs` must be a pure function.'
      - 'It must not mutate `base` or `delta`.'
      - 'It must not perform any I/O.'
      - 'Calling it twice with the same inputs must produce equal outputs.'
constraints:
  - '`mergeSpecs` must not hardcode any operation keyword — all keywords come from `deltaOperations` (with defaults as fallback).'
  - '`DeltaConflictError` must be a typed subclass of `SpecdError` with a machine-readable `code`.'
  - 'Block order in the merged spec is preserved from the original; ADDED blocks are appended after all existing blocks.'
  - '`{name}` in `DeltaConfig.pattern` is expanded to `.+` for regex matching — see `specs/core/schema-format/spec.md` — Requirement: Pattern matching.'
scenarios:
  - requirement: 'Function signature'
    name: 'deltaOperations omitted'
    given:
      - '`mergeSpecs` is ready to be called'
    when:
      - '`mergeSpecs` is called without `deltaOperations`'
    then:
      - 'It uses the specd defaults: `ADDED`, `MODIFIED`, `REMOVED`, `RENAMED`, `FROM`, `TO`'
  - requirement: 'Function signature'
    name: 'deltaOperations provided'
    given:
      - '`mergeSpecs` is ready to be called'
    when:
      - '`mergeSpecs` is called with `deltaOperations.added: "AÑADIDO"`'
    then:
      - 'It parses `## AÑADIDO Requirements` sections from the delta, not `## ADDED Requirements`'
  - requirement: 'Apply order'
    name: 'RENAMED resolved before MODIFIED'
    given:
      - 'A delta renames block `Old` to `New` and also modifies `New`'
    when:
      - '`mergeSpecs` processes the delta'
    then:
      - 'RENAMED runs first, then MODIFIED applies to the already-renamed block using `New`'
  - requirement: 'Conflict detection'
    name: 'Conflict throws before any mutation'
    given:
      - 'The delta contains a conflict (e.g. same block in both MODIFIED and REMOVED)'
    when:
      - '`mergeSpecs` is called with this delta'
    then:
      - '`mergeSpecs` throws `DeltaConflictError` and the returned spec is never produced'
  - requirement: 'Pure function'
    name: 'Base spec unchanged'
    given:
      - 'A base spec and delta spec are prepared'
    when:
      - '`mergeSpecs(base, delta, configs)` is called'
    then:
      - '`base.content` is unchanged after the call'
