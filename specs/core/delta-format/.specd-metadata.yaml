title: Delta Format
description: Inline text diffs are fragile and format-unaware, making them unreliable for modifying structured artifacts like specs, configs, and schemas. Delta files solve this by expressing changes as a sequence of structured AST operations in separate YAML documents that address artifact nodes by type and identifying property. The `ArtifactParser` port abstracts parsing, delta application, and serialisation across all supported file types ã markdown, JSON, YAML, and plain text.
dependsOn:
  - core:core/artifact-ast
  - core:core/selector-model
  - core:core/schema-format
context:
  - Inline text diffs are fragile and format-unaware, making them unreliable for modifying structured artifacts like specs, configs, and schemas. Delta files solve this by expressing changes as a sequence of structured AST operations in separate YAML documents that address artifact nodes by type and identifying property. The `ArtifactParser` port abstracts parsing, delta application, and serialisation across all supported file types ã markdown, JSON, YAML, and plain text.
rules:
  - requirement: ArtifactParser port
    rules:
      - |-
        `ArtifactParser` is the domain port that abstracts all file-type-specific operations. Each supported file type has a corresponding infrastructure adapter implementing this port. The port is injected at the application layer ã domain services never reference concrete parsers directly.

        The port interface:

        ```typescript
        interface NodeTypeDescriptor {
          type: string // e.g. "section", "property", "pair"
          identifiedBy: string[] // selector properties that identify a node, always ["matches"]
          description: string // human-readable description for LLM context generation
        }

        interface OutlineEntry {
          type: string
          label: string // identifying value, e.g. heading text or key name
          depth: number // nesting depth (0 = root children)
          children?: OutlineEntry[]
        }

        interface ArtifactParser {
          readonly fileExtensions: string[] // e.g. ['.md'] or ['.json']
          parse(content: string): ArtifactAST
          apply(ast: ArtifactAST, delta: DeltaEntry[]): ArtifactAST
          serialize(ast: ArtifactAST): string
          renderSubtree(node: ArtifactNode): string
          nodeTypes(): NodeTypeDescriptor[]
          outline(ast: ArtifactAST): OutlineEntry[]
          deltaInstructions(): string
          parseDelta(content: string): DeltaEntry[]
        }
        ```

        `nodeTypes()` returns a static description of all addressable node types for this file format. `CompileContext` calls `nodeTypes()` to inject a concise vocabulary into the LLM's context when generating a delta, so the LLM knows what node types and selector properties are valid for the target artifact.

        `outline(ast)` returns a simplified, navigable summary of the artifact's addressable nodes ã headings, keys, scenario titles, etc. ã without full content. `CompileContext` injects this outline when asking the LLM to generate a delta, so the LLM can reference nodes that actually exist in the current artifact without needing to read the full file.

        `deltaInstructions()` returns a format-specific, static text block that `CompileContext` injects verbatim into the LLM instruction when `delta: true` is active for the artifact. Each adapter implements this method to explain its selector vocabulary, the semantics of `content` vs `value` for that format, and a concrete example mapping an AST node to a delta entry. This separates format-level technical guidance (owned by the adapter) from domain-level guidance (owned by the schema's `deltaInstruction` field).

        `renderSubtree(node)` serializes a single AST node and all its descendants back to the artifact's native format string. It is used by `ValidateArtifacts` (to evaluate `contentMatches` against a node's serialized subtree) and by the metadata extraction engine (to extract spec content via `metadataExtraction` when metadata is absent or stale, using `extract: 'content'` or `extract: 'both'`). The output is identical to calling `serialize` on a minimal AST containing only this node ã the adapter is free to implement it that way or via a dedicated code path.

        `parseDelta(content)` parses a YAML delta file's raw string content into a typed array of `DeltaEntry[]`. It is called by `ValidateArtifacts` and `ArchiveChange` on the YAML adapter to convert the raw delta file into entries before passing them to `apply()`. Only the YAML adapter is expected to return a non-empty result ã other adapters may return an empty array. This method separates the concern of YAML deserialization from AST application so that callers do not need to depend on a YAML library directly.

        `apply(ast, delta)` is the single entry point for all delta application. It resolves all selectors against the AST before applying any operation ã if any selector fails to resolve (no match or ambiguous match), the entire application is rejected with a `DeltaApplicationError`.

        `serialize(ast)` converts the AST back to a string representation. For YAML files, the serialiser must use a library that preserves comments and formatting (CST-level round-trip); for JSON files, formatting is normalised to two-space indentation.
  - requirement: Selector model
    rules:
      - |-
        The selector model is defined in [`specs/core/selector-model/spec.md`](../selector-model/spec.md). Selectors are used in delta entries to target nodes for modification or removal, and in `position.after`/`position.before` hints for positioned insertion.

        In the context of delta application, the following additional constraints apply to the selector model:

        - When a `selector` in a `modified` or `removed` entry matches zero nodes ã `apply` rejects with `DeltaApplicationError`.
        - When a `selector` in a `modified` or `removed` entry matches more than one node ã `apply` rejects with `DeltaApplicationError`.
        - `position.after` and `position.before` selectors in `added` entries are warnings on no match, not errors ã insertion falls back to the end of the parent scope.

        **Array merge strategies:**

        Delta entries targeting an array or sequence node (not an individual item) accept an optional `strategy` field:

        - `replace` (default) ã replaces the array value in its entirety with the supplied `value`
        - `append` ã appends the supplied `value` items to the end of the existing array
        - `merge-by` ã merges the supplied items into the existing array by matching objects on a key field; requires `mergeKey` to name the key field; items with a matching key are replaced, items with new keys are appended, existing items whose key does not appear in the supplied value are preserved
  - requirement: Delta file format
    rules:
      - |-
        A delta file is a YAML document containing an array of delta entry objects. Its filename is `<artifact-output-filename>.delta.yaml` ã e.g. `spec.md.delta.yaml`, `package.json.delta.yaml`. The system infers the target artifact from the filename prefix.

        Delta files are located at `deltas/<workspace>/<capability-path>/<filename>.delta.yaml` within the change directory ã e.g. `deltas/default/core/config/spec.md.delta.yaml`. This separates them from newly created artifacts, which live under `specs/<workspace>/<capability-path>/`. Delta files are never synced to permanent spec directories.

        Each delta entry must include:

        - `op` (string, required) ã one of `added`, `modified`, `removed`
        - `selector` (selector, required for `modified` and `removed`, not valid for `added`) ã identifies the existing node to modify or remove; for `added` entries, use `position.parent` to scope the insertion; see Requirement: Selector model
        - `position` (object, optional, `added` only) ã declares where the new node is inserted. Contains:
          - `parent` (selector, optional) ã scopes the insertion to the children of the matched node; if omitted, insertion happens at document root level
          - `after` (selector, optional) ã inserts immediately after the matched sibling within the parent scope; if the selector resolves to no node, falls back to appending at the end of the parent scope with a warning
          - `before` (selector, optional) ã inserts immediately before the matched sibling within the parent scope; if the selector resolves to no node, falls back to appending at the end of the parent scope with a warning
          - `first` (boolean, optional) ã inserts as the first child of the parent scope (or document root if no `parent`); mutually exclusive with `after`, `before`, and `last`
          - `last` (boolean, optional) ã inserts as the last child of the parent scope (or document root if no `parent`); mutually exclusive with `after`, `before`, and `first`; this is the default when no placement hint is given
          - `after`, `before`, `first`, and `last` are mutually exclusive
          - If only `parent` is specified (no placement hint), the new node is appended as the last child of the matched parent
          - If `position` is omitted entirely, the new node is appended at the end of the document
        - `rename` (string, optional, `modified` only) ã new value for the node's identifying property (e.g. new heading text for a `section`, new key for a `property` or `pair`); the selector still uses the current name to locate the node; if the rename target already exists as a sibling node, `apply` must reject with `DeltaApplicationError`
        - `content` (string, optional) ã the full new node content in the artifact's native format (e.g. markdown for `.md` files); for `added`, includes the identifying line (e.g. `### Heading` for markdown, key name for YAML/JSON) as the first line; for `modified`, contains only the body ã the identifying line is preserved or replaced via `rename`; `apply` parses this string using `ArtifactParser.parse()` before inserting into the AST; mutually exclusive with `value`
        - `value` (any, optional) ã the node's value as a structured YAML value; used for structured nodes (e.g. JSON properties, YAML pairs); mutually exclusive with `content`
        - `strategy` (`replace` | `append` | `merge-by`, optional, default `replace`) ã array merge strategy; only valid when the selector targets an array or sequence node; see Requirement: Selector model
        - `mergeKey` (string, optional) ã key field for `merge-by` strategy; required when `strategy: merge-by`

        Example (`spec.md.delta.yaml`):

        ```yaml
        # Modify body only
        - op: modified
          selector:
            type: section
            matches: 'Requirement: Load config'
          content: |
            The system must load specd.yaml from the nearest ancestor directory...

        # Rename and modify body in one operation
        - op: modified
          selector:
            type: section
            matches: 'Requirement: Cache'
          rename: 'Requirement: Cache config'
          content: |
            The system must cache the resolved config in memory...

        # Add new node inside "Requirements" after a specific sibling
        - op: added
          position:
            parent:
              type: section
              matches: 'Requirements'
            after:
              type: section
              matches: 'Requirement: Validate config'
          content: |
            ### Requirement: Evict cache on change

            The system must evict the cache when specd.yaml changes.

        - op: removed
          selector:
            type: section
            matches: 'Requirement: Old behaviour'
        ```

        Example (`package.json.delta.yaml`):

        ```yaml
        - op: modified
          selector:
            type: property
            matches: version
          value: '2.0.0'

        - op: modified
          selector:
            type: property
            matches: keywords
          strategy: append
          value:
            - 'specd'
        ```

        Example with `parent` and `where`:

        ```yaml
        # Modify a nested YAML property
        - op: modified
          selector:
            type: pair
            matches: model
            parent:
              type: pair
              matches: llm
          value: 'claude-opus-4-6'

        # Modify a specific item in an array of objects
        - op: modified
          selector:
            type: sequence-item
            parent:
              type: pair
              matches: steps
            where:
              name: 'Run tests'
          value:
            name: 'Run tests'
            run: 'pnpm test --coverage'
        ```
  - requirement: Delta application
    rules:
      - |-
        Delta entries are applied in declaration order after all selectors are validated. For each entry:

        - `modified`: replace the targeted node body (`content`) and/or rename the identifying field (`rename`)
        - `removed`: remove the targeted node
        - `added`: insert new node(s) according to `position` semantics

        `apply` first resolves selectors against the original AST to guarantee atomicity. If any selector is invalid or ambiguous, `apply` fails with `DeltaApplicationError` and applies nothing.

        During `modified` operations on markdown artifacts, replacing node body content must not destroy inline formatting metadata for unaffected sibling/ancestor nodes. Implementations must preserve representable inline structure so serialization does not strip backticks or rewrite emphasis/strong markers in untouched nodes.

        For markdown serialization after delta apply, list/emphasis/strong marker output should track source style when unambiguous. If the source is mixed/ambiguous for a construct, the serializer must choose deterministic project markdown conventions.
  - requirement: Delta conflict detection
    rules:
      - |-
        `apply` must detect and reject conflicting delta entries before applying any changes:

        - Two `modified` or `removed` operations whose selectors resolve to the same node ã error
        - A `rename` target that matches an existing sibling node's identifying property ã error
        - A `rename` target that matches another `modified` entry's `rename` value within the same parent scope ã error
        - An `added` entry with more than one of `position.after`, `position.before`, `position.first`, `position.last` ã error
        - An `added` entry with `position.parent` that resolves to no node ã error
        - `content` and `value` both present in the same entry ã error
        - `selector` on an `added` entry ã error; use `position.parent` to scope insertion
        - `rename` on an `added` or `removed` entry ã error
        - `strategy: merge-by` without `mergeKey` ã error
        - `mergeKey` present without `strategy: merge-by` ã error
        - `strategy` on an entry whose selector targets a non-array node ã error
  - requirement: Delta structural validation
    rules:
      - "The `deltaValidations` field on a schema artifact allows schema authors to define JSONPath-based structural constraints checked against the normalized YAML AST of the delta file before application. The delta file is parsed by the YAML adapter to produce a normalized AST; `ValidateArtifacts` then evaluates each rule's `selector` JSONPath expression against that AST ã the same mechanism used for `validations` against the artifact AST. The full rule format is specified in [`specs/core/schema-format/spec.md` ã Requirement: Delta validation rules](../schema-format/spec.md)."
constraints:
  - selector.index and selector.where are mutually exclusive
  - position.after, position.before, position.first, and position.last are mutually exclusive in an added entry
  - rename is only valid on modified entries; using it on added or removed is an error
  - A rename value that collides with an existing sibling node or another rename in the same scope is a hard error checked during validation before any operation is applied
  - Unresolved after/before selectors are warnings, not errors ã the node is appended at the end of the parent scope; unresolved selector in modified/removed is always a hard error
  - 'For modified, content is the node body only ã the identifying line (heading, key name) is excluded and preserved or replaced via rename; for added, content must start with the identifying line (e.g. ### Heading for markdown sections) followed by the body'
  - delta.content and delta.value are mutually exclusive
  - 'strategy: merge-by requires mergeKey; mergeKey is invalid without strategy: merge-by'
  - strategy is only valid on entries whose selector targets an array or sequence node
  - Delta files live at deltas/<workspace>/<capability-path>/<filename>.delta.yaml within the change directory and are never synced to permanent spec directories
  - A DeltaApplicationError on any entry must abort the entire delta ã no partial application
  - Declaration order in the delta file is the execution order; no reordering is performed
scenarios:
  - requirement: ArtifactParser port
    name: nodeTypes returns format-specific vocabulary
    when:
      - nodeTypes() is called on the markdown parser
    then:
      - it returns descriptors including section (identified by heading), paragraph, list, list-item, and code-block
  - requirement: ArtifactParser port
    name: nodeTypes returns JSON vocabulary
    when:
      - nodeTypes() is called on the JSON parser
    then:
      - it returns descriptors including property (identified by key), object, array, and array-item
  - requirement: ArtifactParser port
    name: deltaInstructions returns format-specific selector guidance
    when:
      - deltaInstructions() is called on the markdown adapter
    then:
      - it returns a string describing the selector fields (type, heading, parent), the semantics of content for modified and added, the delta file location pattern, and a concrete YAML example mapping an AST section node to a delta entry
  - requirement: ArtifactParser port
    name: deltaInstructions returns format-specific value guidance for JSON
    when:
      - deltaInstructions() is called on the JSON adapter
    then:
      - 'it returns a string describing type: property, key, value, index, where, and includes a concrete example using op: modified with a value field'
  - requirement: ArtifactParser port
    name: outline reflects current artifact nodes
    when:
      - 'outline(ast) is called on a parsed markdown spec with three ### Requirement: headings'
    then:
      - 'it returns three OutlineEntry objects with type: section and their respective heading texts as label'
  - requirement: ArtifactParser port
    name: apply rejects on unresolved selector
    when:
      - a delta entry has a selector that matches no node in the AST
    then:
      - apply must throw DeltaApplicationError without modifying the AST
  - requirement: ArtifactParser port
    name: apply rejects on ambiguous selector
    when:
      - a delta entry has a selector that matches more than one node and a single match is expected
    then:
      - apply must throw DeltaApplicationError without modifying the AST
  - requirement: ArtifactParser port
    name: serialize round-trips YAML comments
    when:
      - a YAML artifact containing inline comments is parsed and serialised without modification
    then:
      - the serialised output preserves all comments
  - requirement: Selector model
    name: matches ã plain string acts as regex
    when:
      - 'a selector has type: section and matches: "Requirement: Load"'
    then:
      - 'it matches any section node whose identifier contains "Requirement: Load" (case-insensitive regex)'
  - requirement: Selector model
    name: matches ã anchored regex
    when:
      - 'a selector has matches: "^Requirement:"'
    then:
      - it matches any section node whose identifier starts with "Requirement:"
  - requirement: Selector model
    name: contains matches node value
    when:
      - 'a selector has type: paragraph and contains: "SHALL"'
    then:
      - it matches any paragraph node whose value contains "SHALL" (case-insensitive)
  - requirement: Selector model
    name: contains and matches combined
    when:
      - 'a selector has type: pair, matches: "^op$", and contains: "added|modified"'
    then:
      - it matches only pair nodes whose label is "op" AND whose value matches "added|modified"
  - requirement: Selector model
    name: parent narrows search
    when:
      - 'two pair nodes share matches: model at different nesting levels and a selector has matches: model with parent: { type: pair, matches: llm }'
    then:
      - only the node nested under llm is matched
  - requirement: Selector model
    name: index targets array item
    when:
      - 'a selector has type: array-item and index: 0'
    then:
      - it targets the first item of the nearest matching array
  - requirement: Selector model
    name: where targets object array item
    when:
      - 'a selector has type: sequence-item, parent: { type: pair, matches: steps }, and where: { name: "Run tests" }'
    then:
      - it targets the sequence item under steps whose name field matches the regex "Run tests" (case-insensitive)
  - requirement: Selector model
    name: index and where mutually exclusive
    when:
      - a selector declares both index and where
    then:
      - apply must throw DeltaApplicationError
  - requirement: Selector model
    name: strategy append adds items to end
    when:
      - 'a delta entry targets a property node whose value is ["a", "b"] with strategy: append and value: ["c"]'
    then:
      - the resulting array is ["a", "b", "c"]
  - requirement: Selector model
    name: strategy merge-by replaces matched and preserves unmatched
    when:
      - 'a delta targets a sequence with items [{name: "a", run: "old"}, {name: "b", run: "old"}] using strategy: merge-by, mergeKey: name, and value: [{name: "a", run: "new"}]'
    then:
      - 'the result is [{name: "a", run: "new"}, {name: "b", run: "old"}]'
  - requirement: Selector model
    name: merge-by without mergeKey
    when:
      - 'a delta entry has strategy: merge-by but no mergeKey'
    then:
      - apply must throw DeltaApplicationError
  - requirement: Delta file format
    name: modified replaces node body only
    when:
      - 'a delta entry has op: modified, a selector matching a section node, and content with new markdown'
    then:
      - apply replaces that section's body with the supplied content; the heading line is unchanged
  - requirement: Delta file format
    name: modified with rename updates identifying property
    when:
      - 'a delta entry has op: modified, a selector matching matches: "Requirement: Login", and rename: "Requirement: Authentication"'
    then:
      - 'the section heading becomes "Requirement: Authentication" in the serialised output'
  - requirement: Delta file format
    name: rename with body update in one operation
    when:
      - a delta entry has both rename and content on a modified entry
    then:
      - both are applied ã the heading is renamed and the body is replaced
  - requirement: Delta file format
    name: rename collides with existing sibling
    when:
      - a delta entry renames a section to a heading that already exists as a sibling
    then:
      - apply must throw DeltaApplicationError before applying any changes
  - requirement: Delta file format
    name: rename on added entry is invalid
    when:
      - 'a delta entry has op: added and includes rename'
    then:
      - apply must throw DeltaApplicationError
  - requirement: Delta file format
    name: added appends when no position
    when:
      - 'a delta entry has op: added and omits position'
    then:
      - the new node is appended at the end of the document
  - requirement: Delta file format
    name: added with position.parent appends as last child
    when:
      - 'a delta entry has op: added and position: { parent: { type: section, matches: "Requirements" } } with no placement hint'
    then:
      - the new node is appended as the last child of the matched Requirements section
  - requirement: Delta file format
    name: added positions after matched sibling
    when:
      - 'a delta entry has op: added and position: { parent: { type: section, matches: "Requirements" }, after: { type: section, matches: "Requirement: A" } }'
    then:
      - 'the new node is inserted immediately after the Requirement: A section within Requirements'
  - requirement: Delta file format
    name: position.after resolves to no node ã fallback to end of parent
    when:
      - 'a delta entry has op: added and position: { parent: { type: section, matches: "Requirements" }, after: { type: section, matches: "Requirement: Deleted" } } but the after node does not exist'
    then:
      - the new node is appended at the end of the parent scope and a warning is emitted; no error is thrown
  - requirement: Delta file format
    name: position.first inserts as first child
    when:
      - 'a delta entry has op: added and position: { parent: { type: section, matches: "Requirements" }, first: true }'
    then:
      - the new node is inserted before all existing children of the matched Requirements section
  - requirement: Delta file format
    name: position.last inserts as last child
    when:
      - 'a delta entry has op: added and position: { parent: { type: section, matches: "Requirements" }, last: true }'
    then:
      - the new node is appended after all existing children of the matched Requirements section
  - requirement: Delta file format
    name: position.parent resolves to no node ã error
    when:
      - 'a delta entry has op: added and position: { parent: { type: section, matches: "Nonexistent" } } but no such node exists'
    then:
      - apply must throw DeltaApplicationError
  - requirement: Delta file format
    name: removed detaches node
    when:
      - 'a delta entry has op: removed and a selector matching a section node'
    then:
      - that section is absent from the serialised output
  - requirement: Delta file format
    name: content and value mutually exclusive
    when:
      - a delta entry declares both content and value
    then:
      - apply must throw DeltaApplicationError
  - requirement: Delta file format
    name: position placement hints mutually exclusive
    when:
      - an added entry declares more than one of position.after, position.before, position.first, position.last
    then:
      - apply must throw DeltaApplicationError
  - requirement: Delta file format
    name: delta file inferred from filename prefix
    when:
      - a file named spec.md.delta.yaml is present in the change directory
    then:
      - the system associates it with the artifact whose output filename is spec.md
  - requirement: Delta application
    name: entries applied in declaration order
    when:
      - a delta has two modified entries targeting different nodes
    then:
      - the first entry is applied before the second, and both changes appear in the result
  - requirement: Delta application
    name: removed followed by added at same position
    when:
      - a delta removes a node and then adds a new node after the preceding sibling
    then:
      - the old node is absent and the new node appears at the correct position
  - requirement: Delta application
    name: entire delta rejected on single selector failure
    when:
      - a delta has three entries and the second selector resolves to no node
    then:
      - apply throws DeltaApplicationError and none of the three operations are applied
  - requirement: Delta application
    name: modified operation does not strip inline formatting in untouched nodes
    given:
      - a markdown document with one untouched paragraph containing `inline`, *emphasis*, and **strong**
      - AND a modified delta entry targets a different section
    when:
      - apply is executed and the result is serialized
    then:
      - untouched paragraph inline formatting remains semantically equivalent and is not downgraded to plain text
  - requirement: Delta application
    name: markdown apply output is deterministic for mixed style input
    given:
      - a markdown document that mixes supported style markers for the same construct
    when:
      - a delta is applied and the markdown result is serialized
    then:
      - ambiguous constructs are emitted using deterministic project markdown conventions
  - requirement: Delta conflict detection
    name: Two entries targeting the same node
    when:
      - a delta has two modified entries whose selectors both resolve to the same node
    then:
      - apply must throw DeltaApplicationError before applying any changes
  - requirement: Delta conflict detection
    name: strategy on non-array target
    when:
      - 'a delta entry specifies strategy: append but the selector targets a section node'
    then:
      - apply must throw DeltaApplicationError
  - requirement: Delta conflict detection
    name: multiple position placement hints ã error
    when:
      - 'an added entry declares both position.first: true and position.last: true (or any two of first, last, after, before)'
    then:
      - apply must throw DeltaApplicationError
  - requirement: Delta structural validation
    name: deltaValidations rules enforced on delta entries
    given:
      - a schema with deltaValidations rules declared on an artifact
    when:
      - a delta entry for that artifact violates a deltaValidations rule
    then:
      - validation fails with the appropriate error
