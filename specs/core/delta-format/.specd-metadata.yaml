title: 'Delta Format'
description: >
  Defines the delta file format for expressing structured AST-level changes to artifacts.
  The ArtifactParser port abstracts parsing, delta application, and serialisation across
  markdown, JSON, YAML, and plain text file types. Deltas are separate YAML documents that
  address artifact nodes by type and selector, enabling precise, conflict-detected changes.
keywords:
  - 'delta'
  - 'artifact'
  - 'ast'
  - 'parser'
  - 'diff'
  - 'yaml'
  - 'selector'
dependsOn:
  - 'core:core/artifact-ast'
  - 'core:core/selector-model'
contentHashes:
  'spec.md': 'sha256:13e1519ac4e02f283f0763eed042ce4c44739b1c47233035619cb110ef790670'
  'verify.md': 'sha256:f89dce5bd26f3e1cf28b2cc436929d643c49eda3412c828bc33ea3b9e61a64ad'
rules:
  - requirement: 'ArtifactParser port'
    rules:
      - 'ArtifactParser is the domain port that abstracts all file-type-specific operations; each supported file type has a corresponding infrastructure adapter implementing this port.'
      - 'The port is injected at the application layer — domain services never reference concrete parsers directly.'
      - 'nodeTypes() returns a static description of all addressable node types for the file format; CompileContext calls it to inject a concise vocabulary into the LLM context.'
      - "outline(ast) returns a simplified summary of the artifact's addressable nodes without full content; CompileContext injects this when asking the LLM to generate a delta."
      - 'deltaInstructions() returns a format-specific static text block injected verbatim into the LLM instruction when delta: true is active for the artifact.'
      - 'renderSubtree(node) serialises a single AST node and all descendants back to the artifact native format string; used by ValidateArtifacts and CompileContext.'
      - "parseDelta(content) parses a YAML delta file's raw string content into a typed array of DeltaEntry[]; only the YAML adapter is expected to return a non-empty result."
      - 'apply(ast, delta) resolves all selectors before applying any operation; if any selector fails to resolve the entire application is rejected with DeltaApplicationError.'
      - 'serialize(ast) must use a CST-level round-trip library for YAML to preserve comments and formatting; JSON formatting is normalised to two-space indentation.'
  - requirement: 'Selector model'
    rules:
      - 'When a selector in a modified or removed entry matches zero nodes, apply rejects with DeltaApplicationError.'
      - 'When a selector in a modified or removed entry matches more than one node, apply rejects with DeltaApplicationError.'
      - 'position.after and position.before selectors in added entries are warnings on no match, not errors — insertion falls back to the end of the parent scope.'
      - 'Delta entries targeting an array or sequence node accept an optional strategy field: replace (default), append, or merge-by.'
      - 'merge-by requires a mergeKey field naming the key for matching; items with a matching key are replaced, new-key items are appended, unmatched existing items are preserved.'
  - requirement: 'Delta file format'
    rules:
      - 'A delta file is a YAML document containing an array of delta entry objects; its filename is <artifact-output-filename>.delta.yaml.'
      - 'Delta files are located at deltas/<workspace>/<capability-path>/<filename>.delta.yaml within the change directory and are never synced to permanent spec directories.'
      - 'Each delta entry must include op (added | modified | removed) and, for modified and removed, a selector.'
      - 'position (added only) accepts parent, after, before, first, and last sub-fields; after/before/first/last are mutually exclusive.'
      - "rename (modified only) sets a new value for the node's identifying property; the selector still uses the current name; collision with an existing sibling is a hard error."
      - 'content and value are mutually exclusive in the same delta entry.'
      - 'strategy is only valid when the selector targets an array or sequence node; merge-by requires mergeKey.'
  - requirement: 'Delta application'
    rules:
      - 'apply first validates all selectors for modified and removed entries; any failure rejects the entire delta with DeltaApplicationError before any operation is applied.'
      - 'position.parent selectors are validated; if declared and resolves to no node, reject with DeltaApplicationError.'
      - 'Entries are processed in declaration order: removed detaches the node, modified updates the node, added inserts a new node.'
      - 'Declaration order is the authoritative execution order; no fixed operation ordering is imposed.'
  - requirement: 'Delta conflict detection'
    rules:
      - 'Two modified or removed operations whose selectors resolve to the same node must be rejected with DeltaApplicationError.'
      - 'A rename target colliding with an existing sibling or another rename in the same scope is a hard error.'
      - 'An added entry with more than one of position.after, position.before, position.first, position.last must be rejected.'
      - 'An added entry with a position.parent that resolves to no node must be rejected.'
      - 'content and value both present, selector on an added entry, rename on added or removed, strategy: merge-by without mergeKey, mergeKey without strategy: merge-by, and strategy on a non-array target are all hard errors.'
  - requirement: 'Delta structural validation'
    rules:
      - 'The deltaValidations field on a schema artifact defines JSONPath-based structural constraints evaluated against the normalised YAML AST of the delta file before application.'
      - 'ValidateArtifacts evaluates each rule selector JSONPath expression against the delta AST using the same mechanism as validations against artifact ASTs.'
constraints:
  - 'selector.index and selector.where are mutually exclusive'
  - 'position.after, position.before, position.first, and position.last are mutually exclusive in an added entry'
  - 'rename is only valid on modified entries; using it on added or removed is a hard error'
  - 'A rename value that collides with an existing sibling node or another rename in the same scope is a hard error checked before any operation is applied'
  - 'Unresolved after/before selectors are warnings, not errors — the node is appended at end of parent scope; unresolved selector in modified/removed is always a hard error'
  - 'For modified, content is the node body only — the identifying line is excluded and preserved or replaced via rename; for added, content must start with the identifying line'
  - 'delta.content and delta.value are mutually exclusive'
  - 'strategy: merge-by requires mergeKey; mergeKey is invalid without strategy: merge-by'
  - 'strategy is only valid on entries whose selector targets an array or sequence node'
  - 'Delta files live at deltas/<workspace>/<capability-path>/<filename>.delta.yaml within the change directory and are never synced to permanent spec directories'
  - 'A DeltaApplicationError on any entry must abort the entire delta — no partial application'
  - 'Declaration order in the delta file is the execution order; no reordering is performed'
scenarios:
  - requirement: 'ArtifactParser port'
    name: 'nodeTypes returns format-specific vocabulary'
    when:
      - 'nodeTypes() is called on the markdown parser'
    then:
      - 'it returns descriptors including section (identified by heading), paragraph, list, list-item, and code-block'
  - requirement: 'ArtifactParser port'
    name: 'nodeTypes returns JSON vocabulary'
    when:
      - 'nodeTypes() is called on the JSON parser'
    then:
      - 'it returns descriptors including property (identified by key), object, array, and array-item'
  - requirement: 'ArtifactParser port'
    name: 'deltaInstructions returns format-specific selector guidance'
    when:
      - 'deltaInstructions() is called on the markdown adapter'
    then:
      - 'it returns a string describing the selector fields (type, heading, parent), the semantics of content for modified and added, the delta file location pattern, and a concrete YAML example'
  - requirement: 'ArtifactParser port'
    name: 'outline reflects current artifact nodes'
    when:
      - 'outline(ast) is called on a parsed markdown spec with three ### Requirement: headings'
    then:
      - 'it returns three OutlineEntry objects with type: section and their respective heading texts as label'
  - requirement: 'ArtifactParser port'
    name: 'apply rejects on unresolved selector'
    when:
      - 'a delta entry has a selector that matches no node in the AST'
    then:
      - 'apply must throw DeltaApplicationError without modifying the AST'
  - requirement: 'ArtifactParser port'
    name: 'apply rejects on ambiguous selector'
    when:
      - 'a delta entry has a selector that matches more than one node and a single match is expected'
    then:
      - 'apply must throw DeltaApplicationError without modifying the AST'
  - requirement: 'ArtifactParser port'
    name: 'serialize round-trips YAML comments'
    when:
      - 'a YAML artifact containing inline comments is parsed and serialised without modification'
    then:
      - 'the serialised output preserves all comments'
  - requirement: 'Selector model'
    name: 'matches — plain string acts as regex'
    when:
      - 'a selector has type: section and matches: "Requirement: Load"'
    then:
      - 'it matches any section node whose identifier contains "Requirement: Load" (case-insensitive regex)'
  - requirement: 'Selector model'
    name: 'matches — anchored regex'
    when:
      - 'a selector has matches: "^Requirement:"'
    then:
      - 'it matches any section node whose identifier starts with "Requirement:"'
  - requirement: 'Selector model'
    name: 'strategy append adds items to end'
    when:
      - 'a delta entry targets a property node whose value is ["a", "b"] with strategy: append and value: ["c"]'
    then:
      - 'the resulting array is ["a", "b", "c"]'
  - requirement: 'Selector model'
    name: 'strategy merge-by replaces matched and preserves unmatched'
    when:
      - 'a delta targets a sequence with items [{name: "a", run: "old"}, {name: "b", run: "old"}] using strategy: merge-by, mergeKey: name, and value: [{name: "a", run: "new"}]'
    then:
      - 'the result is [{name: "a", run: "new"}, {name: "b", run: "old"}]'
  - requirement: 'Selector model'
    name: 'merge-by without mergeKey'
    when:
      - 'a delta entry has strategy: merge-by but no mergeKey'
    then:
      - 'apply must throw DeltaApplicationError'
  - requirement: 'Delta file format'
    name: 'modified replaces node body only'
    when:
      - 'a delta entry has op: modified, a selector matching a section node, and content with new markdown'
    then:
      - "apply replaces that section's body with the supplied content; the heading line is unchanged"
  - requirement: 'Delta file format'
    name: 'modified with rename updates identifying property'
    when:
      - 'a delta entry has op: modified, a selector matching matches: "Requirement: Login", and rename: "Requirement: Authentication"'
    then:
      - 'the section heading becomes "Requirement: Authentication" in the serialised output'
  - requirement: 'Delta file format'
    name: 'rename collides with existing sibling'
    when:
      - 'a delta entry renames a section to a heading that already exists as a sibling'
    then:
      - 'apply must throw DeltaApplicationError before applying any changes'
  - requirement: 'Delta file format'
    name: 'rename on added entry is invalid'
    when:
      - 'a delta entry has op: added and includes rename'
    then:
      - 'apply must throw DeltaApplicationError'
  - requirement: 'Delta file format'
    name: 'added appends when no position'
    when:
      - 'a delta entry has op: added and omits position'
    then:
      - 'the new node is appended at the end of the document'
  - requirement: 'Delta file format'
    name: 'added with position.parent appends as last child'
    when:
      - 'a delta entry has op: added and position: { parent: { type: section, matches: "Requirements" } } with no placement hint'
    then:
      - 'the new node is appended as the last child of the matched Requirements section'
  - requirement: 'Delta file format'
    name: 'position.after resolves to no node — fallback to end of parent'
    when:
      - 'a delta entry has op: added and position.after targets a node that does not exist'
    then:
      - 'the new node is appended at the end of the parent scope and a warning is emitted; no error is thrown'
  - requirement: 'Delta file format'
    name: 'position.parent resolves to no node — error'
    when:
      - 'a delta entry has op: added and position.parent targets a node that does not exist'
    then:
      - 'apply must throw DeltaApplicationError'
  - requirement: 'Delta file format'
    name: 'removed detaches node'
    when:
      - 'a delta entry has op: removed and a selector matching a section node'
    then:
      - 'that section is absent from the serialised output'
  - requirement: 'Delta file format'
    name: 'content and value mutually exclusive'
    when:
      - 'a delta entry declares both content and value'
    then:
      - 'apply must throw DeltaApplicationError'
  - requirement: 'Delta application'
    name: 'entries applied in declaration order'
    when:
      - 'a delta has two modified entries targeting different nodes'
    then:
      - 'the first entry is applied before the second, and both changes appear in the result'
  - requirement: 'Delta application'
    name: 'entire delta rejected on single selector failure'
    when:
      - 'a delta has three entries and the second selector resolves to no node'
    then:
      - 'apply throws DeltaApplicationError and none of the three operations are applied'
  - requirement: 'Delta conflict detection'
    name: 'Two entries targeting the same node'
    when:
      - 'a delta has two modified entries whose selectors both resolve to the same node'
    then:
      - 'apply must throw DeltaApplicationError before applying any changes'
  - requirement: 'Delta conflict detection'
    name: 'strategy on non-array target'
    when:
      - 'a delta entry specifies strategy: append but the selector targets a section node'
    then:
      - 'apply must throw DeltaApplicationError'
  - requirement: 'Delta structural validation'
    name: 'deltaValidations rules evaluated before application'
    when:
      - 'a schema artifact defines deltaValidations rules with JSONPath selectors'
    then:
      - 'ValidateArtifacts evaluates each rule selector against the normalised YAML AST of the delta file before delta application proceeds'
