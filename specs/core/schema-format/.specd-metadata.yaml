title: 'Schema Format'
description: >
  The spec defines the YAML structure that projects use to declare their artifact workflow,
  including artifact types, validation rules, delta merge operations, and lifecycle phases.
  It covers how schemas are resolved at runtime, how deltas are merged when archiving,
  and how the AI compiler extracts context. Read this spec when implementing schema loading,
  validation, delta merging, or context compilation features.
keywords:
  - 'schema'
  - 'YAML'
  - 'artifact'
  - 'workflow'
  - 'validation'
  - 'delta'
  - 'merge'
  - 'context'
dependsOn: []
contentHashes:
  spec.md: 'sha256:ae583cb5d70f2e5995afe82217d0f007d618b528f6a3e5b14d027b5fe7c3c654'
  verify.md: 'sha256:650cb3c63b3ebd6ddb7d2a90e982b58fe510b3dc297121852941bb17663defda'
rules:
  - requirement: 'Schema file structure'
    rules:
      - 'A schema file must be a valid YAML document with the following top-level fields: `name` (string, required), `version` (integer, required), `description` (string, optional), `deltaOperations` (object, optional), `artifacts` (array, required), `workflow` (array, optional).'
  - requirement: 'Delta operation keywords'
    rules:
      - '`deltaOperations` at the schema level defines the keyword labels used as prefixes in delta section headings.'
      - 'All four keys (`added`, `modified`, `removed`, `renamed`) are optional and fall back to the specd defaults.'
      - 'The `from` and `to` keys are optional and fall back to the specd defaults, used inside RENAMED sections.'
      - 'These labels appear as prefixes in delta section headings: `## {added} {section}`, `## {modified} {section}`, `## {removed} {section}`, `## {renamed} {section}`.'
      - 'The `from` and `to` labels are used as line prefixes inside RENAMED sections: `{from}: ### Requirement: Old name` / `{to}: ### Requirement: New name`.'
      - '`mergeSpecs` and `ValidateArtifacts` read all keywords from the resolved schema — they do not hardcode the default strings.'
  - requirement: 'Artifact definition'
    rules:
      - 'Each entry in `artifacts` must include: `id` (string, required), `scope` (required, one of `spec` or `change`), `optional` (boolean, optional, default `false`), `output` (string or glob, required), `description` (string, optional), `template` (string, optional), `instruction` (string, optional), `requires` (array, optional), `deltas` (array, optional), `deltaValidations` (array, optional), `validations` (array, optional), `contextSections` (array, optional), `preHashCleanup` (array, optional), `taskCompletionCheck` (object, optional).'
      - '`scope: spec` means the artifact file is synced to the SpecRepository after archiving.'
      - '`scope: change` means the artifact stays only in the change directory and is never synced.'
      - 'When `optional: false`, `ValidateArtifacts` requires this artifact to be present in the change.'
      - 'When `optional: true`, the artifact may be absent without failing validation; if present, it is validated and (for `scope: spec` artifacts) synced normally.'
      - 'When creating a new artifact file within a change, the filename is derived from the last literal segment of the glob; if the last segment is a wildcard, the filename falls back to the template filename.'
      - '`requires` declares artifacts that must be resolved before this one; a dependency is resolved when its status is `complete` or `skipped`.'
      - '`skipped` is only reachable for `optional: true` artifacts.'
      - 'Any other state (`missing`, `in-progress`) blocks the dependent artifact.'
      - '`taskCompletionCheck` with `incompletePattern` (regex, default `^\s*-\s+\[ \]`) detects incomplete task items.'
      - '`taskCompletionCheck` with `completePattern` (regex, default `^\s*-\s+\[x\]`, case-insensitive) detects complete task items.'
      - 'When both patterns are present, the CLI can report progress by counting matches of each.'
      - 'If `taskCompletionCheck` is omitted entirely, the defaults apply.'
  - requirement: 'Template resolution'
    rules:
      - 'Template files are bundled alongside `schema.yaml` in a `templates/` subdirectory by convention.'
      - 'The `template` field is a path relative to the directory containing `schema.yaml`.'
      - '`SchemaRegistry.resolve()` reads all referenced template files at load time and makes their content available in the resolved schema.'
      - 'Template content is plain markdown — no interpolation or placeholder substitution is performed.'
      - 'HTML comments (`<!-- ... -->`) are valid template content and are preserved as-is in the scaffolded file.'
  - requirement: 'Delta configuration'
    rules:
      - '`deltas` on an artifact defines how its content is merged during `specd archive`.'
      - 'Each entry in `deltas` must include: `section` (string, required) — the section name in the base spec, `pattern` (string, required) — the block header pattern with a `{name}` placeholder.'
      - "Delta sections in a delta spec file use the format `## {added} {section}`, `## {modified} {section}`, `## {removed} {section}`, or `## {renamed} {section}`, where the operation keywords come from the schema's `deltaOperations` field."
      - '`mergeSpecs(base, delta, deltaConfigs, deltaOperations)` applies all delta configs in the order they appear.'
      - 'Each config is processed independently against its own section.'
  - requirement: 'Delta merge operations'
    rules:
      - '`mergeSpecs` applies delta operations in a fixed order: RENAMED → REMOVED → MODIFIED → ADDED.'
      - 'This order ensures that renames are resolved before removals or modifications reference the new names, and that additions cannot conflict with existing blocks.'
      - 'RENAMED: each entry consists of a `FROM:` line followed immediately by a `TO:` line, both matching the block header pattern.'
      - 'The block is found by its `FROM` name, its header line is rewritten to the `TO` name, and it is re-keyed under the new name.'
      - 'All further operations in the same merge (REMOVED, MODIFIED, ADDED) must reference the new name, not the old one.'
      - 'REMOVED: lists block header lines (or names) to delete with no block body needed.'
      - 'If a named block does not exist in the base spec, the removal is silently ignored.'
      - 'MODIFIED: each entry is a full block (header + body) that replaces the corresponding block in the base spec.'
      - 'If the block does not exist, it is inserted (upsert).'
      - 'ADDED: each entry is a full block (header + body) appended to the section.'
      - 'Existing blocks are preserved; their relative order is maintained, with ADDED blocks appended after them.'
      - 'If the section does not exist in the base spec, it is created.'
      - 'If all blocks in a section are removed, the section itself is removed from the merged spec.'
  - requirement: 'Delta conflict detection'
    rules:
      - '`mergeSpecs` must detect and reject conflicting delta operations before applying any changes.'
      - 'Duplicate block names within ADDED are an error.'
      - 'Duplicate block names within MODIFIED are an error.'
      - 'Duplicate block names within REMOVED are an error.'
      - 'Duplicate `FROM` or `TO` names within RENAMED are an error.'
      - 'A name appearing in both MODIFIED and REMOVED is an error.'
      - 'A name appearing in both MODIFIED and ADDED is an error.'
      - 'A name appearing in both ADDED and REMOVED is an error.'
      - 'A MODIFIED block referencing a name that is a `FROM` in RENAMED is an error (must use the `TO` name instead).'
      - 'An ADDED block using a name that is a `TO` in RENAMED is an error (the name is already taken by the renamed block).'
  - requirement: 'Pattern matching'
    rules:
      - 'The `pattern` field on validation rules is matched against file content using these rules in order:'
      - 'If the pattern contains `{name}`, it is treated as a structural pattern; `{name}` is replaced with `.+` and the result is used as a regex anchored to the start of a line.'
      - 'This is the same `{name}` expansion used by `mergeSpecs`.'
      - 'If the pattern contains no `{name}`, it is used directly as a JavaScript regular expression with the multiline flag.'
      - 'If the pattern is not a valid regular expression, it is matched as a literal substring.'
      - 'When `eachBlock` is set, blocks within the named section are identified using the block pattern from `deltas[]` for that section.'
      - 'A block starts at a line matching the block pattern and ends at the next line matching the same pattern, the next `##`-level section header, or end of file.'
      - 'The `pattern` check runs against the full content of each block (including its header line and any nested sub-sections).'
      - 'If `eachBlock` names a section that has no entry in `deltas[]`, `ValidateArtifacts` must report a configuration error.'
  - requirement: 'Delta validations'
    rules:
      - '`deltaValidations` on an artifact defines structural validation rules that `ValidateArtifacts` checks against the delta file for that artifact.'
      - 'This is distinct from `validations`, which checks the final merged spec.'
      - 'These rules validate that the delta file is well-formed before the merge is attempted.'
      - 'Each entry must include: `pattern` (string, required), `required` (boolean, optional, default `true`), `scope` (string, optional), `eachBlock` (string, optional).'
      - '`scope` narrows the search space to a section.'
      - '`eachBlock` iterates blocks within a section.'
      - '`scope` and `eachBlock` are independent and can be combined.'
      - '`required` always applies to the `pattern` — `true` means absence is an error, `false` means absence is a warning.'
      - "This is uniform across all modes: section not existing (for `scope`), pattern not found in section, and block not containing the pattern (for `eachBlock`) are all treated as 'pattern absent'."
      - 'The only exception is `eachBlock` with no matching blocks — the rule passes vacuously regardless of `required`, since there is nothing to validate.'
  - requirement: 'Validation rules'
    rules:
      - '`validations` on an artifact defines structural validation rules checked by `ValidateArtifacts` against the base spec file (after merging).'
      - 'Each entry must include: `pattern` (string, required), `required` (boolean, optional, default `true`), `scope` (string, optional), `eachBlock` (string, optional).'
      - '`scope` and `eachBlock` are independent and can be combined.'
      - '`required` always applies to the `pattern` — `true` means absence is an error, `false` means absence is a warning.'
      - "This is uniform across all modes: section not existing (for `scope`), pattern not found in section, and block not containing the pattern (for `eachBlock`) are all treated as 'pattern absent'."
      - 'The only exception is `eachBlock` with no matching blocks — the rule passes vacuously regardless of `required`, since there is nothing to validate.'
  - requirement: 'Per-spec approval'
    rules:
      - 'Any spec file touched by a delta — whether created via an `added` operation or modified via a `modified`, `removed`, or `renamed` operation — requires explicit approval before the change can be archived.'
      - 'Approval is tracked per spec path, not per change.'
      - '`specd archive` must refuse to proceed if any spec touched by the change has not been approved.'
      - '`specd approve <spec-path>` records the approval for that spec within the current change.'
      - 'A spec created by an `added` operation also requires approval: someone must take ownership of the new spec, even if ownership is granted by the same person who submitted the change.'
  - requirement: 'Context sections'
    rules:
      - "`contextSections` on an artifact declares which sections of that artifact's spec files are relevant context for workflow steps."
      - '`CompileContext` uses these declarations to extract and inject the named sections when compiling context for a step.'
      - 'Each entry must include: `name` (string, required) — section heading to extract, `contextTitle` (string, optional) — title used for this section in the compiled context block.'
      - 'If `contextTitle` is omitted, `name` is used as the title.'
  - requirement: 'Artifact scope'
    rules:
      - '`scope` on an artifact is the single source of truth for what constitutes a complete spec and what files are expected in the spec directory.'
      - 'Artifacts with `scope: spec` (and `optional: false`) are the files specd expects to find in every `specs/<name>/` directory.'
      - 'When compiling context, specd reads all of them.'
      - '`specd validate` checks that every spec directory in the project contains all non-optional `scope: spec` artifact files; missing files are reported as validation errors.'
      - '`ValidateArtifacts` requires all non-optional artifacts (regardless of scope) to be present in the change before validation can pass.'
      - '`scope: change` artifacts (e.g. `proposal.md`, `tasks.md`) are working documents used during the change process and are validated in the change but never synced to the `SpecRepository`.'
      - '`scope: spec` artifacts (e.g. `spec.md`, `verify.md`) are merged or copied into the `SpecRepository` during `ArchiveChange`.'
  - requirement: 'Workflow'
    rules:
      - '`workflow` is an array of named lifecycle phase definitions for a change.'
      - 'Each entry describes a distinct phase — such as designing specs, applying changes, verifying work, or archiving — and declares what artifact conditions must be met for that phase to become active, along with any hooks to run at phase boundaries.'
      - 'Steps are not limited to AI agent invocations.'
      - 'They may represent human review phases, automated checks, artifact generation, or any recurring activity in the change lifecycle.'
      - '`CompileContext` uses step definitions to gate context compilation and to inject phase-specific instructions and hooks into the AI context.'
      - 'Entries must include: `step` (string, required) — step name identifying a phase of the change lifecycle, `requires` (array of artifact IDs, optional), `hooks` (object, optional).'
      - 'Every hook entry is either: `{ instruction: string }` — AI context injected when this step is compiled, or `{ run: string }` — shell command executed at the phase boundary.'
      - 'Shell commands support template variables: `{{change.name}}`, `{{change.path}}`, `{{project.root}}`.'
      - 'If a `run:` hook exits with non-zero code, the step is aborted and the user is informed of the failure.'
      - 'The agent should offer to attempt to fix the problem before retrying.'
      - 'After `post` hook failure, the user is prompted to choose: continue with remaining hooks, or stop.'
      - 'The completed step operation is not rolled back.'
      - 'The order of entries in `workflow` is the intended progression of the change lifecycle and is used by tooling to display status.'
      - 'It does not enforce sequential blocking between consecutive steps.'
      - 'Each step is independently gated by its own `requires`.'
      - '`specd.yaml` uses the same `workflow` format to add project-level hooks.'
      - 'Each entry only accepts `step` and `hooks` — `requires` is not valid in `specd.yaml` workflow entries.'
      - '`requires` must be rejected at load time in `specd.yaml`.'
      - 'Entries are matched by `step` name; schema hooks fire first, then project hooks, within the same `pre`/`post` event.'
  - requirement: 'Project-level artifactRules'
    rules:
      - '`artifactRules` in `specd.yaml` allows teams to add per-artifact constraints without forking the schema.'
      - 'Each key is an artifact ID; each value is an array of rule strings.'
      - '`CompileContext` injects them alongside the schema-defined instruction as a distinct constraints block.'
      - "Rule keys are validated against the active schema's artifact IDs on load."
      - 'Unknown keys produce a warning but do not prevent startup.'
      - "Rules are additive — they extend the schema's instruction, not replace it."
  - requirement: 'Schema resolution'
    rules:
      - '`SchemaRegistry.resolve(ref)` interprets the `schema` value from `specd.yaml` using a prefix convention.'
      - 'The prefix determines exactly where to look — there is no implicit fallback across multiple locations.'
      - '`@scope/name` (starts with `@`) — npm package; loads from `node_modules/@scope/name/schema.yaml`.'
      - '`#workspace:name` — workspace-qualified name; loads from `workspaces.<workspace>.schemas.fs.path/<name>/schema.yaml`.'
      - '`#name` or bare name (no prefix, not a path) — equivalent to `#default:name`; loads from `workspaces.default.schemas.fs.path/<name>/schema.yaml`.'
      - 'Relative or absolute path — direct file reference; relative paths are resolved from the directory containing `specd.yaml`.'
      - '`SchemaRegistry.resolve()` receives the full `ref` string and a resolved map of workspace schema paths.'
      - 'It does not read `specd.yaml` itself.'
      - 'If the resolved file does not exist, `resolve()` must return `null`; the caller is responsible for converting `null` to `SchemaNotFoundError`.'
  - requirement: 'Schema validation on load'
    rules:
      - '`SchemaRegistry.resolve()` must validate the parsed YAML against the schema structure before returning it.'
      - 'Unknown top-level fields must be ignored (forward compatibility).'
      - 'Missing required fields and structural duplicates must produce a `SchemaValidationError`.'
  - requirement: 'verify.md format'
    rules:
      - '`verify.md` is the verification artifact for a spec.'
      - 'It contains WHEN/THEN scenarios that describe how to confirm the system behaves correctly.'
      - 'It is always paired with a `spec.md` — the spec describes what the system does; the verify file describes how to check it.'
      - 'The file groups scenarios under `### Requirement: <name>` headings that mirror the `spec.md` structure.'
      - 'This is required — using the same heading pattern as the `spec` artifact allows the delta merger to correlate requirements with their verification scenarios when changes are applied.'
      - 'Only scenarios that add information beyond what the requirement prose already states are included.'
      - 'Scenarios that merely restate the happy path from the spec are omitted.'
      - 'The `verify` artifact in the schema should declare `requires: [spec]` — scenarios are written after the spec is stable.'
      - 'The `workflow.verify` step should declare `requires: [verify]`.'
constraints:
  - 'The `deltas[].section` name is case-sensitive and must match the `## {section}` heading in the base spec exactly.'
  - 'The `scope` name in `validations[]` and `deltaValidations[]` is case-sensitive and must match the section heading exactly.'
  - 'The `{name}` placeholder must appear exactly once in `deltas[].pattern` fields and in `eachBlock` values — these are always block header patterns; validation `pattern` fields may omit `{name}` entirely and use plain regex instead.'
  - '`artifact.id` must match `/^[a-z][a-z0-9-]*$/` (lowercase letters, digits, hyphens; must start with a letter) and must be unique within a schema.'
  - '`artifact.scope` must be `spec` or `change`; it is required and has no default.'
  - '`artifact.optional` defaults to `false`; a non-optional artifact with `scope: spec` must be present in every spec directory and every change.'
  - '`deltas[].section` must be unique within an artifact — duplicate section names in the same `deltas` array are a schema validation error.'
  - '`workflow[].step` must be unique — duplicate step names in the same `workflow` array are a schema validation error.'
  - '`requires` must not contain cycles; circular dependencies in the artifact graph are a schema validation error.'
  - 'If artifact A is `optional: true`, any artifact that lists A in its `requires` must also be `optional: true`; a non-optional artifact cannot hard-depend on an optional one — `SchemaRegistry.resolve()` must throw `SchemaValidationError` if this constraint is violated.'
  - '`eachBlock` must contain a `{name}` placeholder — it is always a block pattern, never a plain section name.'
  - '`required` on an `eachBlock` rule only applies when a block exists but the pattern is missing; it does not enforce block existence.'
  - "`mergeSpecs` must not hardcode operation keywords; it receives them from the resolved schema's `deltaOperations` field."
  - "`deltaValidations[].scope` strings must use the schema's resolved operation keywords, not the specd defaults, when the schema overrides them."
  - 'Block order in the merged spec is preserved from the original; ADDED blocks are always appended after existing blocks.'
  - 'The order of entries in `workflow` is the intended display order for tooling; it does not enforce sequential blocking between consecutive steps.'
  - '`requires` in `specd.yaml` workflow entries is invalid and must be rejected at load time; only `step` and `hooks` are accepted.'
scenarios:
  - requirement: 'Schema file structure'
    name: 'Minimal valid schema'
    given: []
    when:
      - 'a schema file contains `name`, `version`, and at least one artifact'
    then:
      - '`SchemaRegistry.resolve()` must return the parsed schema without error'
  - requirement: 'Schema file structure'
    name: 'Missing required field'
    given: []
    when:
      - 'a schema file is missing `name` or `version`'
    then:
      - '`SchemaRegistry.resolve()` must throw a validation error'
  - requirement: 'Delta operation keywords'
    name: 'Custom operation keywords'
    given: []
    when:
      - 'a schema defines `deltaOperations.added: "AÑADIDO"`'
    then:
      - 'delta files using `## AÑADIDO Requirements` are processed correctly by `mergeSpecs`'
  - requirement: 'Delta operation keywords'
    name: 'Partial override'
    given: []
    when:
      - 'a schema defines only `deltaOperations.added` and omits the rest'
    then:
      - 'the omitted keys fall back to their specd defaults'
  - requirement: 'Delta operation keywords'
    name: 'Default keywords'
    given: []
    when:
      - 'a schema omits `deltaOperations` entirely'
    then:
      - '`mergeSpecs` uses `ADDED`, `MODIFIED`, `REMOVED`, and `RENAMED`'
  - requirement: 'Artifact definition'
    name: 'Filename derived from glob literal segment'
    given: []
    when:
      - 'an artifact declares `output: "specs/**/spec.md"` and a new file is created within the change'
    then:
      - 'the file is named `spec.md`; the subdirectory path (e.g. `auth/login/`) is chosen by the user'
  - requirement: 'Artifact definition'
    name: 'Filename derived from template when glob segment is a wildcard'
    given: []
    when:
      - 'an artifact declares `output: "specs/**/*.md"` and `template: "templates/spec.md"`'
    then:
      - 'the file is named `spec.md`, taken from the template filename'
  - requirement: 'Artifact definition'
    name: 'Change file path differs from synced repo path'
    given: []
    when:
      - 'a change contains `changes/my-change/specs/auth/login/spec.md` and the project syncs to `especificaciones/`'
    then:
      - 'the file is copied to `especificaciones/auth/login/spec.md`; `output` does not control the sync destination'
  - requirement: 'Artifact definition'
    name: 'Artifact with no requirements'
    given: []
    when:
      - 'an artifact omits `requires`'
    then:
      - 'its effective status depends only on its own validated hash'
  - requirement: 'Artifact definition'
    name: 'Artifact with dependency chain'
    given: []
    when:
      - 'artifact B declares `requires: [a]` and artifact A is `in-progress`'
    then:
      - "`Change.effectiveStatus('b')` must return `in-progress`"
  - requirement: 'Artifact definition'
    name: 'Circular dependency in artifact graph'
    given: []
    when:
      - 'artifact A declares `requires: [b]` and artifact B declares `requires: [a]`'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError` identifying the cycle'
  - requirement: 'Artifact definition'
    name: 'Non-optional artifact requires optional artifact'
    given: []
    when:
      - 'artifact A is `optional: true` and artifact B is `optional: false` and declares `requires: [a]`'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError` — a non-optional artifact cannot hard-depend on an optional one'
  - requirement: 'Artifact definition'
    name: 'Optional artifact requiring optional artifact is valid'
    given: []
    when:
      - 'artifact A is `optional: true` and artifact B is also `optional: true` and declares `requires: [a]`'
    then:
      - '`SchemaRegistry.resolve()` loads successfully — the constraint is satisfied'
  - requirement: 'Template resolution'
    name: 'Template loaded at resolve time'
    given: []
    when:
      - 'an artifact declares `template: templates/proposal.md` and the file exists in the schema directory'
    then:
      - '`SchemaRegistry.resolve()` returns the artifact with the template content populated'
  - requirement: 'Template resolution'
    name: 'Template file not found'
    given: []
    when:
      - 'an artifact declares a `template` path that does not exist relative to the schema directory'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError`'
  - requirement: 'Template resolution'
    name: 'No template declared'
    given: []
    when:
      - 'an artifact omits `template`'
    then:
      - 'no template content is provided for that artifact; scaffolding falls back to an empty file'
  - requirement: 'Delta configuration'
    name: 'Multiple delta configs'
    given: []
    when:
      - 'an artifact declares multiple entries in `deltas`'
    then:
      - 'each entry is processed independently against its own section'
  - requirement: 'Delta configuration'
    name: 'Spec dependency added appears in ADDED section'
    given:
      - 'a `specs` artifact with `deltas: [{ section: Spec Dependencies, pattern: ''- \[`{name}`\]'' }]`'
    when:
      - 'a delta adds `- [`specs/core/config/spec.md`](../config/spec.md) — reason`'
    then:
      - 'the entry appears under `## ADDED Spec Dependencies` in the delta file, with `specs/core/config/spec.md` as the block name'
  - requirement: 'Delta configuration'
    name: 'Spec dependency removed appears in REMOVED section'
    given:
      - 'a dependency `specs/core/config/spec.md` exists in the base spec'
    when:
      - 'a delta removes it'
    then:
      - 'the entry appears under `## REMOVED Spec Dependencies` in the delta file'
  - requirement: 'Delta configuration'
    name: 'Spec dependency description changed appears in MODIFIED section'
    given:
      - 'a dependency `specs/core/config/spec.md` exists in the base spec'
    when:
      - 'a delta updates only its description text'
    then:
      - 'the full updated entry appears under `## MODIFIED Spec Dependencies` in the delta file'
  - requirement: 'Delta merge operations'
    name: 'RENAMED operation'
    given: []
    when:
      - 'a delta spec contains a RENAMED section with `FROM: ### Requirement: Old` / `TO: ### Requirement: New`'
    then:
      - 'the block is found by `Old`, its header is rewritten to `New`, and subsequent MODIFIED/REMOVED operations must use `New`'
  - requirement: 'Delta merge operations'
    name: 'REMOVED operation'
    given: []
    when:
      - 'a delta spec contains a REMOVED section with `### Requirement: X`'
    then:
      - 'block `X` is deleted from the base spec; if it does not exist, the removal is silently ignored'
  - requirement: 'Delta merge operations'
    name: 'MODIFIED operation'
    given: []
    when:
      - 'a delta spec contains a MODIFIED section with a full `### Requirement: X` block'
    then:
      - 'the block replaces the existing block; if the block does not exist, it is inserted'
  - requirement: 'Delta merge operations'
    name: 'ADDED operation'
    given: []
    when:
      - 'a delta spec contains an ADDED section with `### Requirement: X` blocks'
    then:
      - 'those blocks are appended to the section after all existing blocks'
  - requirement: 'Delta merge operations'
    name: 'Section created when missing'
    given: []
    when:
      - 'the base spec has no `## Requirements` section and the delta adds blocks to it'
    then:
      - 'the section is created in the merged spec'
  - requirement: 'Delta merge operations'
    name: 'Section removed when empty'
    given: []
    when:
      - 'all blocks in a section are removed by the delta'
    then:
      - 'the section itself is removed from the merged spec'
  - requirement: 'Delta conflict detection'
    name: 'MODIFIED and REMOVED name collision'
    given: []
    when:
      - 'a delta spec lists the same requirement name in both MODIFIED and REMOVED'
    then:
      - '`mergeSpecs` must throw a conflict error before applying any changes'
  - requirement: 'Delta conflict detection'
    name: 'Duplicate name within ADDED'
    given: []
    when:
      - 'a delta spec contains two ADDED blocks with the same requirement name'
    then:
      - '`mergeSpecs` must throw a conflict error before applying any changes'
  - requirement: 'Delta conflict detection'
    name: 'Duplicate name within MODIFIED'
    given: []
    when:
      - 'a delta spec contains two MODIFIED blocks with the same requirement name'
    then:
      - '`mergeSpecs` must throw a conflict error before applying any changes'
  - requirement: 'Delta conflict detection'
    name: 'Duplicate name within REMOVED'
    given: []
    when:
      - 'a delta spec contains two REMOVED entries with the same requirement name'
    then:
      - '`mergeSpecs` must throw a conflict error before applying any changes'
  - requirement: 'Delta conflict detection'
    name: 'Duplicate FROM name within RENAMED'
    given: []
    when:
      - 'a delta spec contains two RENAMED entries with the same `FROM` name'
    then:
      - '`mergeSpecs` must throw a conflict error before applying any changes'
  - requirement: 'Delta conflict detection'
    name: 'Duplicate TO name within RENAMED'
    given: []
    when:
      - 'a delta spec contains two RENAMED entries with the same `TO` name'
    then:
      - '`mergeSpecs` must throw a conflict error before applying any changes'
  - requirement: 'Delta conflict detection'
    name: 'MODIFIED and ADDED name collision'
    given: []
    when:
      - 'a delta spec lists the same requirement name in both MODIFIED and ADDED'
    then:
      - '`mergeSpecs` must throw a conflict error before applying any changes'
  - requirement: 'Delta conflict detection'
    name: 'ADDED and REMOVED name collision'
    given: []
    when:
      - 'a delta spec lists the same requirement name in both ADDED and REMOVED'
    then:
      - '`mergeSpecs` must throw a conflict error before applying any changes'
  - requirement: 'Delta conflict detection'
    name: 'MODIFIED references old name after RENAMED'
    given: []
    when:
      - 'a delta spec renames `Old` to `New` and also has a MODIFIED block for `Old`'
    then:
      - '`mergeSpecs` must throw a conflict error (MODIFIED must use `New`)'
  - requirement: 'Delta conflict detection'
    name: 'ADDED uses TO name from RENAMED'
    given: []
    when:
      - 'a delta spec renames `Old` to `New` and also has an ADDED block named `New`'
    then:
      - '`mergeSpecs` must throw a conflict error — the name `New` is already taken by the renamed block'
  - requirement: 'Pattern matching'
    name: 'Pattern with {name} placeholder'
    given: []
    when:
      - 'a rule has `pattern: "### Requirement: {name}"`'
    then:
      - 'it matches any line of the form `### Requirement: <anything>`'
  - requirement: 'Pattern matching'
    name: 'Regex pattern'
    given: []
    when:
      - 'a rule has `pattern: "SHALL|MUST"`'
    then:
      - 'it matches any occurrence of `SHALL` or `MUST` anywhere in the target content'
  - requirement: 'Pattern matching'
    name: 'Literal pattern fallback'
    given: []
    when:
      - 'a rule has a pattern that is not valid regex and contains no `{name}`'
    then:
      - 'it is matched as a literal substring'
  - requirement: 'Pattern matching'
    name: 'Pattern check inside nested sub-section'
    given: []
    when:
      - 'a rule has `eachBlock: Decisions` and `pattern: "HAS TO"`, the block pattern is `### Decision: {name}`, and a block contains `#### New Decision: Redis` with `The system HAS TO use Redis` inside it'
    then:
      - 'the pattern `"HAS TO"` matches because the check runs against the full block content including nested sub-sections at any depth'
  - requirement: 'Pattern matching'
    name: 'Sub-section with name placeholder'
    given: []
    when:
      - 'a rule has `eachBlock: Decisions` and `pattern: "#### New Decision: {name}"`, and a `### Decision: X` block contains `#### New Decision: Redis`'
    then:
      - 'the pattern matches within that block; a block with no `#### New Decision: ` line fails'
  - requirement: 'Pattern matching'
    name: 'eachBlock section not in deltas'
    given: []
    when:
      - 'a rule has `eachBlock: "Decisions"` but `deltas[]` has no entry with `section: "Decisions"`'
    then:
      - '`ValidateSpec` must report a configuration error'
  - requirement: 'Delta validations'
    name: 'Section missing with required true'
    given: []
    when:
      - 'a rule has `scope: "ADDED Requirements"` and `required: true` and the section does not exist'
    then:
      - '`ValidateSpec` must report an error — the pattern was not found'
  - requirement: 'Delta validations'
    name: 'Section missing with required false'
    given: []
    when:
      - 'a rule has `scope: "ADDED Requirements"` and `required: false` and the section does not exist'
    then:
      - '`ValidateSpec` must report a warning — the pattern was not found'
  - requirement: 'Delta validations'
    name: 'Per-block check passes vacuously'
    given: []
    when:
      - 'a rule has `eachBlock: "### Requirement: {name}"` and no blocks match that pattern'
    then:
      - 'the rule passes regardless of `required` — there is nothing to validate'
  - requirement: 'Delta validations'
    name: 'Per-block check fails on missing pattern'
    given: []
    when:
      - 'a rule has `eachBlock: "### Requirement: {name}"` and one block does not contain the pattern'
    then:
      - '`ValidateSpec` must report an error or warning based on `required`, identifying which block is missing the pattern'
  - requirement: 'Delta validations'
    name: 'scope section does not exist with eachBlock'
    given: []
    when:
      - 'a rule has `scope: "ADDED Requirements"` and `eachBlock: "### Requirement: {name}"` and the section does not exist in the delta file'
    then:
      - 'the rule passes vacuously — the section has no blocks to iterate; use a separate file-level rule to enforce section existence'
  - requirement: 'Delta validations'
    name: 'Custom keywords in scope'
    given: []
    when:
      - 'the schema defines `deltaOperations.added: "AÑADIDO"` and a rule has `scope: "AÑADIDO Requirements"`'
    then:
      - 'the check is run against the `## AÑADIDO Requirements` section of the delta file'
  - requirement: 'Delta validations'
    name: 'ADDED Spec Dependencies section absent — passes vacuously'
    given:
      - "a `deltaValidation` with `scope: 'ADDED Spec Dependencies'` and `required: false`"
    when:
      - 'the delta file has no `## ADDED Spec Dependencies` section'
    then:
      - 'the rule passes with no warning — the section is optional'
  - requirement: 'Delta validations'
    name: 'ADDED Spec Dependencies entry missing link format — warning'
    given:
      - 'a `deltaValidation` with `scope: ''ADDED Spec Dependencies''`, `pattern: ''- \[`[^`]+`\]\([^)]+\)''`, and `required: false`'
    when:
      - 'the `## ADDED Spec Dependencies` section contains an entry without a proper markdown link'
    then:
      - '`ValidateSpec` emits a warning identifying the malformed entry'
  - requirement: 'Delta validations'
    name: 'ADDED Spec Dependencies entry missing description — warning'
    given:
      - "a `deltaValidation` with `scope: 'ADDED Spec Dependencies'`, `pattern: ' — '`, and `required: false`"
    when:
      - 'the `## ADDED Spec Dependencies` section contains an entry with no ` — ` description'
    then:
      - '`ValidateSpec` emits a warning — the dependency does not explain why it is needed'
  - requirement: 'Delta validations'
    name: 'MODIFIED Spec Dependencies validated same as ADDED'
    given:
      - "the same `deltaValidation` rules applied to `scope: 'MODIFIED Spec Dependencies'`"
    when:
      - 'a modified entry is missing a link format or description'
    then:
      - '`ValidateSpec` emits the same warnings as for ADDED entries'
  - requirement: 'Validation rules'
    name: 'File-level required pattern'
    given: []
    when:
      - 'a rule has `required: true` and no `scope` or `eachBlock`'
    then:
      - '`ValidateSpec` must report an error if the pattern is not found anywhere in the file'
  - requirement: 'Validation rules'
    name: 'Section missing with required true'
    given: []
    when:
      - 'a rule has `scope: Requirements` and `required: true` and the section does not exist'
    then:
      - '`ValidateSpec` must report an error — the pattern was not found'
  - requirement: 'Validation rules'
    name: 'Section missing with required false'
    given: []
    when:
      - 'a rule has `scope: Requirements` and `required: false` and the section does not exist'
    then:
      - '`ValidateSpec` must report a warning — the pattern was not found'
  - requirement: 'Validation rules'
    name: 'Per-block passes vacuously with no blocks'
    given: []
    when:
      - 'a rule has `eachBlock: "### Requirement: {name}"` and no blocks match'
    then:
      - 'the rule passes regardless of `required` — there is nothing to validate'
  - requirement: 'Validation rules'
    name: 'Per-block fails on missing pattern'
    given: []
    when:
      - 'a rule has `eachBlock: "### Requirement: {name}"` and one block does not contain the pattern'
    then:
      - '`ValidateSpec` must report an error or warning based on `required`, identifying which block is missing the pattern'
  - requirement: 'Validation rules'
    name: 'scope section does not exist with eachBlock'
    given: []
    when:
      - 'a rule has `scope: Requirements` and `eachBlock: "### Requirement: {name}"` and the section does not exist in the spec'
    then:
      - 'the rule passes vacuously — the section has no blocks to iterate; use a separate file-level rule to enforce section existence'
  - requirement: 'Per-spec approval'
    name: 'New spec requires approval'
    given: []
    when:
      - 'a delta creates a new spec via an `added` operation'
    then:
      - 'that spec path must be approved before archiving'
  - requirement: 'Per-spec approval'
    name: 'Modified spec requires approval'
    given: []
    when:
      - 'a delta modifies, removes blocks from, or renames blocks in an existing spec'
    then:
      - 'that spec path must be approved before archiving'
  - requirement: 'Per-spec approval'
    name: 'All specs approved'
    given: []
    when:
      - 'every spec path touched by the change has been approved'
    then:
      - '`specd archive` proceeds without an approval error'
  - requirement: 'Per-spec approval'
    name: 'Partially approved'
    given: []
    when:
      - 'at least one touched spec path has not been approved'
    then:
      - '`specd archive` must refuse and report which spec paths are pending approval'
  - requirement: 'taskCompletionCheck'
    name: 'Default patterns detect markdown checkboxes'
    given:
      - 'an artifact with no `taskCompletionCheck` declared'
      - 'its file contains `- [ ] pending` and `- [x] done`'
    when:
      - 'the CLI checks task completion'
    then:
      - '`incompletePattern` defaults to `^\s*-\s+\[ \]` and matches `- [ ] pending`'
      - '`completePattern` defaults to `^\s*-\s+\[x\]` (case-insensitive) and matches `- [x] done`'
  - requirement: 'taskCompletionCheck'
    name: 'Custom patterns override defaults'
    given:
      - 'an artifact declares `taskCompletionCheck.incompletePattern: ''^\s*TODO:''` and `taskCompletionCheck.completePattern: ''^\s*DONE:''`'
      - 'its file contains `TODO: implement login` and `DONE: implement logout`'
    when:
      - 'the CLI checks task completion'
    then:
      - '`incompletePattern` matches `TODO: implement login` and the transition is blocked'
  - requirement: 'taskCompletionCheck'
    name: 'Both patterns used to report progress'
    given:
      - 'an artifact with both `incompletePattern` and `completePattern` declared'
      - 'its file has 4 complete items and 1 incomplete item'
    when:
      - 'the CLI reports progress'
    then:
      - 'it reports `4/5 tasks complete`'
  - requirement: 'taskCompletionCheck'
    name: 'All tasks complete — no incomplete matches'
    given:
      - 'an artifact file where all checkboxes are checked (`- [x]`) and none are unchecked'
    when:
      - 'the `implementing → verifying` transition is attempted'
    then:
      - '`incompletePattern` matches zero lines and the transition is allowed'
  - requirement: 'taskCompletionCheck'
    name: 'taskCompletionCheck omitted entirely — defaults apply'
    given:
      - 'an artifact with no `taskCompletionCheck` field'
    when:
      - 'the schema is loaded'
    then:
      - 'the artifact behaves as if `incompletePattern: ''^\s*-\s+\[ \]''` and `completePattern: ''^\s*-\s+\[x\]''` were declared'
  - requirement: 'preHashCleanup'
    name: 'Substitution applied before hashing'
    given:
      - 'an artifact with `preHashCleanup: [{ pattern: ''^\s*-\s+\[x\]'', replacement: ''- [ ]'' }]`'
      - 'its file contains `- [x] implement logout`'
    when:
      - 'the hash is computed'
    then:
      - 'the substitution is applied first and the hash is computed on the normalized content, not the original'
  - requirement: 'preHashCleanup'
    name: 'Checking a task off does not invalidate approval'
    given:
      - 'an artifact with `preHashCleanup` that normalizes checked boxes to unchecked'
      - 'the artifact was approved with some tasks unchecked'
    when:
      - 'tasks are marked complete (boxes checked)'
    then:
      - 'the approval hash still matches — the transition does not require re-approval'
  - requirement: 'preHashCleanup'
    name: 'Multiple substitutions applied in order'
    given:
      - 'an artifact with two `preHashCleanup` entries: first normalizes `[x]` to `[ ]`, second strips trailing whitespace'
    when:
      - 'the hash is computed'
    then:
      - 'the first substitution is applied to the full content, then the second is applied to the result of the first'
  - requirement: 'preHashCleanup'
    name: 'preHashCleanup omitted'
    given: []
    when:
      - 'an artifact declares no `preHashCleanup`'
    then:
      - 'the hash is computed directly from the file content with no normalization'
  - requirement: 'Context sections'
    name: 'Section injected'
    given: []
    when:
      - 'an artifact has a `contextSections` entry and the spec contains that section'
    then:
      - '`CompileContext` includes the section content in the compiled context under the given `contextTitle`'
  - requirement: 'Context sections'
    name: 'contextTitle omitted'
    given: []
    when:
      - 'a `contextSections` entry has no `contextTitle`'
    then:
      - '`CompileContext` uses `name` as the context section title'
  - requirement: 'Context sections'
    name: 'Section not present in spec'
    given: []
    when:
      - 'the spec does not contain the named section'
    then:
      - '`CompileContext` skips that entry without error'
  - requirement: 'Artifact scope'
    name: 'Missing non-optional artifact in change'
    given: []
    when:
      - 'a change is missing an artifact with `optional: false`'
    then:
      - '`ValidateSpec` must report a validation error'
  - requirement: 'Artifact scope'
    name: 'Optional artifact absent from change'
    given: []
    when:
      - 'a change is missing an artifact with `optional: true`'
    then:
      - '`ValidateSpec` does not report a validation error for that artifact'
  - requirement: 'Artifact scope'
    name: 'Missing scope:spec artifact file in spec directory'
    given: []
    when:
      - 'a spec directory at `specs/<name>/` is missing a file for a non-optional `scope: spec` artifact'
    then:
      - '`specd validate` must report that spec as incomplete'
  - requirement: 'Artifact scope'
    name: 'scope:change artifact not present in spec directory'
    given: []
    when:
      - 'a `scope: change` artifact (e.g. `proposal.md`) is present in the change'
    then:
      - 'it is validated but never synced to `specs/<name>/` — it must not appear in spec directory checks'
  - requirement: 'Artifact scope'
    name: 'LLM context includes all scope:spec artifacts'
    given: []
    when:
      - 'specd compiles context for a spec'
    then:
      - 'it reads every `scope: spec` artifact file from the spec directory and includes them all'
  - requirement: 'Workflow'
    name: 'Pre hook failure aborts step'
    given: []
    when:
      - 'a `pre` `run:` hook exits with a non-zero code'
    then:
      - 'the step is aborted, the user is informed of the failure, and the agent offers to attempt to fix the problem before retrying'
  - requirement: 'Workflow'
    name: 'Post hook failure prompts user'
    given: []
    when:
      - 'a `post` `run:` hook exits with a non-zero code'
    then:
      - 'the user is prompted to choose whether to continue with remaining hooks or stop; the completed step operation is not rolled back'
  - requirement: 'Workflow'
    name: 'Step with unsatisfied prerequisites'
    given: []
    when:
      - "a step's `requires` lists an artifact that is not `complete`"
    then:
      - '`CompileContext` must report that the step is blocked and which artifacts are incomplete'
  - requirement: 'Workflow'
    name: 'Step with no prerequisites'
    given: []
    when:
      - 'a step has an empty or omitted `requires`'
    then:
      - 'the step is always available regardless of artifact state'
  - requirement: 'Workflow'
    name: 'Apply scans required artifacts for tasks'
    given: []
    when:
      - 'the `apply` step has `requires: [tasks]` and `tasks.md` contains markdown checkboxes'
    then:
      - 'the apply step reads pending tasks from `tasks.md` and surfaces them in the compiled context'
  - requirement: 'Workflow'
    name: 'Tasks spread across multiple artifacts'
    given: []
    when:
      - 'the `apply` step has `requires: [tasks, specs]`'
    then:
      - 'the apply step scans both artifacts for checkboxes and aggregates them'
  - requirement: 'Workflow'
    name: 'Schema and project hooks merged'
    given: []
    when:
      - 'both the schema and `specd.yaml` define `workflow` entries for the same step'
    then:
      - 'schema hooks fire first, followed by project hooks, within the same `pre`/`post` event'
