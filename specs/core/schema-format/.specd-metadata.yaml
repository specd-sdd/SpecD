    name: 'Project-level entry adds a new hook'
    given: []
    when:
      - '`specd.yaml` defines a `workflow` entry for a step with no hooks in the schema'
    then:
      - 'the project hooks are appended without error'
  - requirement: 'Project-level artifactRules'
    name: 'Rules injected into compiled context'
    given: []
    when:
      - '`specd.yaml` defines artifactRules for artifact `specs`'
    then:
      - '`CompileContext` includes those artifactRules in the compiled instruction block for the `specs` artifact, clearly marked as constraints the agent must follow but not copy into its output'
