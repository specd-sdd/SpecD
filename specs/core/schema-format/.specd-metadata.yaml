    then:
      - '`SchemaRegistry.resolve()` returns `null`'
  - requirement: 'Schema validation on load'
    name: 'Unknown field ignored'
    given: []
    when:
      - 'a schema file includes a top-level field not in the current spec'
    then:
      - 'the schema loads successfully and the unknown field is ignored'
  - requirement: 'Schema validation on load'
    name: 'Duplicate artifact ID'
    given: []
    when:
      - 'a schema file declares two artifacts with the same `id`'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError`'
  - requirement: 'Schema validation on load'
    name: 'Duplicate delta section'
    given: []
    when:
      - 'an artifact declares two `deltas` entries with the same `section`'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError`'
