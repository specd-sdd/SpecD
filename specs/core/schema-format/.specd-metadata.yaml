      - '`SchemaRegistry` emits a warning at load time and ignores those artifactRules'
  - requirement: 'Schema resolution'
    name: 'npm package resolved'
    given: []
    when:
      - '`schema: "@specd/schema-std"` is declared'
    then:
      - '`SchemaRegistry.resolve()` loads `node_modules/@specd/schema-std/schema.yaml`'
  - requirement: 'Schema resolution'
    name: 'Bare name resolved from default workspace'
    given: []
    when:
      - '`schema: "spec-driven"` is declared and `workspaces.default.schemas.fs.path` is `specd/schemas`'
    then:
      - '`SchemaRegistry.resolve()` loads `specd/schemas/spec-driven/schema.yaml`'
