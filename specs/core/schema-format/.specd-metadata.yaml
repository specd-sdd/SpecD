title: 'Schema Format'
description: >
  The spec defines the YAML structure that projects use to declare their artifact workflow,
  including artifact types, validation rules, delta validation rules, and lifecycle phases.
  It covers how schemas are resolved at runtime, how deltas are validated and merged when
  applying changes, and how the AI compiler extracts context for agent work. Read this spec
  when implementing schema loading, validation, delta application, context compilation, or
  artifact definition features.
keywords:
  - 'schema'
  - 'YAML'
  - 'artifact'
  - 'workflow'
  - 'validation'
  - 'delta'
  - 'merge'
  - 'context'
dependsOn:
  - 'specs/core/delta-format'
contentHashes:
  spec.md: 'sha256:e2442edae718c715c8722731e0026a2aa492d30e1ff13ead95065d331d1f1f29'
  verify.md: 'sha256:52a680a7e66b3b2ba218d9e58b9f86d078e8da6b7cf681286cb05b2df090e6a8'
constraints:
  - 'artifact.id must match /^[a-z][a-z0-9-]*$/ and must be unique within a schema'
  - 'artifact.scope must be spec or change; it is required and has no default'
  - 'artifact.optional defaults to false; a non-optional artifact with scope: spec must be present in every spec directory and every change'
  - 'workflow[].step must be unique — duplicate step names in the same workflow array are a schema validation error'
  - 'requires must not contain cycles; circular dependencies in the artifact graph are a schema validation error'
  - 'If artifact A is optional: true, any artifact that lists A in its requires must also be optional: true'
  - 'deltaValidations is only valid on artifacts with delta: true; declaring deltaValidations on a non-delta artifact is a schema validation error'
  - 'delta: true is only valid when scope: spec; combining delta: true with scope: change is a schema validation error'
  - 'requires in specd.yaml workflow entries is invalid and must be rejected at load time; only step and hooks are accepted'
  - 'The order of entries in workflow is the intended display order for tooling; it does not enforce sequential blocking between consecutive steps'
rules:
  - requirement: 'Schema file structure'
    rules:
      - 'A schema file must be a valid YAML document with the following top-level fields: name (string, required), version (integer, required), description (string, optional), artifacts (array, required), workflow (array, optional).'
  - requirement: 'Artifact definition'
    rules:
      - 'Each entry in artifacts must include: id (string, required), scope (spec | change, required), optional (boolean, optional, default false), output (string or glob, required), description (string, optional), template (string, optional), instruction (string, optional), requires (array of artifact IDs, optional), format (markdown | json | yaml | plaintext, optional), delta (boolean, optional, default false), deltaInstruction (string, optional), deltaValidations (array, optional), validations (array, optional), contextSections (array, optional), preHashCleanup (array, optional), taskCompletionCheck (object, optional).'
      - 'scope spec means the artifact file is synced to the SpecRepository (e.g. spec.md, verify.md); scope change means the artifact stays only in the change directory and is never synced (e.g. proposal.md, tasks.md).'
      - 'When creating a new artifact file within a change, the filename is derived from the last literal segment of the glob (e.g. spec.md from specs/**/spec.md); if the last segment is a wildcard, the filename falls back to the template filename.'
      - 'A dependency is resolved when its status is complete or skipped; skipped is only reachable for optional: true artifacts; any other state (missing, in-progress) blocks the dependent artifact.'
      - 'delta: true declares that this artifact supports delta files; a delta file (<artifact-output-filename>.delta.yaml) may be present alongside the artifact in the change directory.'
      - 'delta: false means delta files for this artifact are rejected at validation time.'
      - 'format (markdown | json | yaml | plaintext, optional) declares the file format of this artifact; if omitted, the format is inferred from the file extension of the derived output filename (.md → markdown, .json → json, .yaml / .yml → yaml); any other extension defaults to plaintext.'
      - 'deltaInstruction (string, optional) is domain-specific guidance injected by CompileContext alongside the format-level delta instructions when delta: true and activeArtifact matches this artifact.'
      - 'deltaValidations defines structural validation rules checked against the normalized YAML AST of the delta file before application.'
      - 'validations are structural validation rules for the base artifact (after delta application).'
      - 'contextSections are sections of existing specs to inject into the AI context.'
      - 'preHashCleanup is a list of regex substitutions applied to the artifact content before computing any hash (both validatedHash for ArtifactStatus and the approval hash); substitutions are applied in declaration order; each entry has a pattern (regex string) and a replacement (string, may be empty).'
      - "taskCompletionCheck declares how to detect task completion within this artifact's file content; used to gate the implementing → verifying transition; if the artifact is listed in the implementing step's requires, all items matching incompletePattern must be absent before the transition is allowed."
      - 'incompletePattern defaults to ^\s*-\s+\[ \] (matches an incomplete task item).'
      - 'completePattern defaults to ^\s*-\s+\[x\] (case-insensitive, matches a complete task item).'
      - 'When both taskCompletionCheck patterns are present, the CLI can report progress by counting matches of each; if taskCompletionCheck is omitted entirely, the defaults apply.'
  - requirement: 'Template resolution'
    rules:
      - 'Template files are bundled alongside schema.yaml in a templates/ subdirectory by convention.'
      - 'The template field is a path relative to the directory containing schema.yaml.'
      - 'SchemaRegistry.resolve() reads all referenced template files at load time and makes their content available in the resolved schema.'
      - 'Template content is plain text — no interpolation or placeholder substitution is performed.'
      - 'HTML comments (<!-- ... -->) are valid template content and are preserved as-is in the scaffolded file; they serve as guidance hints for the AI generating the artifact.'
  - requirement: 'Validation rules'
    rules:
      - 'validations on an artifact defines structural constraints checked by ValidateArtifacts against the artifact content (after delta application for scope: spec artifacts).'
      - 'A validation rule is an object with: Node identification (one of two mutually exclusive approaches: Selector fields — type, matches, contains, parent, index, where; or path — a JSONPath expression (RFC 9535) evaluated against the normalized AST).'
      - "Additional fields: required (boolean, optional, default true) — whether absence of a matching node is an error (true) or a warning (false); contentMatches (string, optional) — a regex matched case-insensitively against the serialized text of the matched node's subtree; children (array, optional) — sub-rules evaluated with each matched node as root."
      - 'A rule passes vacuously when it matches zero nodes — no error or warning is produced.'
  - requirement: 'Delta validation rules'
    rules:
      - 'deltaValidations on a schema artifact defines rules that ValidateArtifacts checks against the delta file before application.'
      - 'It works identically to validations — each rule uses the same structure and evaluation semantics — but the document is the normalized YAML AST of the delta file rather than the artifact content.'
      - 'Only valid when delta: true.'
      - 'The delta file is a YAML sequence of operation entries; when parsed by the YAML adapter, each entry becomes a sequence-item containing a mapping with pair nodes for op, selector, content, position, etc.'
      - 'The where field on sequence-item rules is particularly useful here for correlated checks — asserting that the same entry satisfies multiple field conditions simultaneously.'
      - 'Each rule uses the same structure as validations rules: selector fields or path for node identification, plus required, contentMatches, and children.'
      - 'A rule passes vacuously when it matches zero nodes.'
  - requirement: 'Per-spec approval'
    rules:
      - 'Any spec file touched by a delta — whether created via an added operation or modified via a modified or removed operation — requires explicit approval before the change can be archived; approval is tracked per spec path, not per change.'
      - 'specd archive must refuse to proceed if any spec touched by the change has not been approved.'
      - 'specd approve <spec-path> records the approval for that spec within the current change.'
      - 'A spec created by an added operation also requires approval: someone must take ownership of the new spec, even if ownership is granted by the same person who submitted the change.'
  - requirement: 'Context sections'
    rules:
      - "contextSections on an artifact declares which nodes of that artifact's spec files are relevant context for workflow steps."
      - 'CompileContext uses these declarations to extract and inject the matched nodes when compiling context for a step as a fallback when .specd-metadata.yaml is absent or stale.'
      - 'Each entry must include: selector (selector, required) — identifies which node(s) to extract, using the same selector model defined in specs/core/delta-format/spec.md; when the selector matches multiple nodes, each is extracted separately.'
      - 'role (rules | constraints | scenarios | context, optional, default context) — semantic category of the extracted content; CompileContext uses this to label and group the injected block so the LLM receives the same structural signal as when fresh metadata is available.'
      - "extract (content | label | both, optional, default content) — what to inject for each matched node: content serializes the node's full subtree to the artifact's native format; label injects only the node's identifying value (heading text, key name); both injects label followed by serialized content."
      - "contextTitle (string, optional) — title used for this section in the compiled context block; if omitted, the node's label is used as the title."
  - requirement: 'Artifact scope'
    rules:
      - 'scope on an artifact is the single source of truth for what constitutes a complete spec and what files are expected in the spec directory.'
      - 'scope has three responsibilities: 1) Spec directory layout — artifacts with scope: spec (and optional: false) are the files specd expects to find in every specs/<name>/ directory; when compiling context, specd reads all of them.'
      - '2) Existing spec validation — specd validate checks that every spec directory in the project contains all non-optional scope: spec artifact files; missing files are reported as validation errors.'
      - '3) Change validation — ValidateArtifacts requires all non-optional artifacts (regardless of scope) to be present in the change before validation can pass.'
      - 'scope: change artifacts (e.g. proposal.md, tasks.md) are working documents used during the change process; they are validated in the change but never synced to the SpecRepository.'
      - 'scope: spec artifacts (e.g. spec.md, verify.md) are merged or copied into the SpecRepository during ArchiveChange.'
  - requirement: 'Workflow'
    rules:
      - 'workflow is an array of named lifecycle phase definitions for a change; each entry describes a distinct phase — such as designing specs, applying changes, verifying work, or archiving.'
      - 'Steps are not limited to AI agent invocations; they may represent human review phases, automated checks, artifact generation, or any recurring activity in the change lifecycle.'
      - 'CompileContext uses step definitions to gate context compilation and to inject phase-specific instructions and hooks into the AI context.'
      - 'Entries must include: step (string, required), requires (array of artifact IDs, optional), hooks (object, optional).'
      - 'requires lists artifacts that must be complete before this step is available; empty or omitted means always available.'
      - "hooks for this step's boundaries; each key is pre or post, each value is an array of instruction: or run: hook entries."
      - 'Every hook entry is either {instruction: string} (AI context injected when this step is compiled) or {run: string} (shell command executed at the phase boundary).'
      - 'Pre hook failure — if a run: hook exits with a non-zero code, the step is aborted and the user is informed of the failure; the agent should offer to attempt to fix the problem before retrying.'
      - 'Post hook failure — the step has already completed, so the operation is not rolled back; after each failing run: hook, the user is prompted to choose: continue with the remaining hooks, or stop.'
      - 'The order of entries in workflow is the intended progression of the change lifecycle and is used by tooling to display status; it does not enforce sequential blocking between consecutive steps — each step is independently gated by its own requires.'
      - 'specd.yaml uses the same workflow format to add project-level hooks; each entry only accepts step and hooks — requires is not valid in specd.yaml workflow entries and must be rejected at load time; entries are matched by step name; schema hooks fire first, then project hooks, within the same pre/post event.'
  - requirement: 'Project-level artifactRules'
    rules:
      - 'artifactRules in specd.yaml allows teams to add per-artifact constraints without forking the schema; each key is an artifact ID; each value is an array of rule strings.'
      - 'CompileContext injects them alongside the schema-defined instruction as a distinct constraints block.'
      - "Rule keys are validated against the active schema's artifact IDs on load; unknown keys produce a warning but do not prevent startup."
      - "Rules are additive — they extend the schema's instruction, not replace it."
  - requirement: 'Schema resolution'
    rules:
      - 'SchemaRegistry.resolve(ref) interprets the schema value from specd.yaml using a prefix convention; the prefix determines exactly where to look — there is no implicit fallback across multiple locations.'
      - '@scope/name (starts with @) — npm package; loads from node_modules/@scope/name/schema.yaml.'
      - '#workspace:name — workspace-qualified name; loads from workspaces.<workspace>.schemas.fs.path/<name>/schema.yaml.'
      - '#name or bare name (no prefix, not a path) — equivalent to #default:name; loads from workspaces.default.schemas.fs.path/<name>/schema.yaml.'
      - 'Relative or absolute path — direct file reference; relative paths are resolved from the directory containing specd.yaml.'
      - 'SchemaRegistry.resolve() receives the full ref string and a resolved map of workspace schema paths; it does not read specd.yaml itself.'
      - 'If the resolved file does not exist, resolve() must return null; the caller is responsible for converting null to SchemaNotFoundError.'
  - requirement: 'Schema validation on load'
    rules:
      - 'SchemaRegistry.resolve() must validate the parsed YAML against the schema structure before returning it.'
      - 'Unknown top-level fields must be ignored (forward compatibility).'
      - 'Missing required fields and structural duplicates must produce a SchemaValidationError: Duplicate artifact.id within artifacts, Duplicate workflow[].step within workflow, artifact.id not matching /^[a-z][a-z0-9-]*$/, Unknown artifact ID referenced in artifact.requires, Circular dependency in artifact requires graph, Non-optional artifact hard-depending on an optional artifact, deltaValidations declared on an artifact with delta: false, requires present in a specd.yaml workflow entry.'
  - requirement: 'verify.md format'
    rules:
      - 'verify.md is the verification artifact for a spec; it contains WHEN/THEN scenarios that describe how to confirm the system behaves correctly.'
      - 'It is always paired with a spec.md — the spec describes what the system does; the verify file describes how to check it.'
      - 'The file groups scenarios under ### Requirement: <name> headings that mirror the spec.md structure; this is required — using the same heading pattern as the spec artifact allows ValidateArtifacts to correlate requirements with their verification scenarios.'
      - 'Only scenarios that add information beyond what the requirement prose already states are included; scenarios that merely restate the happy path from the spec are omitted.'
      - 'The verify artifact in the schema should declare requires: [spec] — scenarios are written after the spec is stable.'
      - 'The workflow.verify step should declare requires: [verify].'
scenarios:
  - requirement: 'Schema file structure'
    name: 'Minimal valid schema'
    when:
      - 'a schema file contains `name`, `version`, and at least one artifact'
    then:
      - '`SchemaRegistry.resolve()` must return the parsed schema without error'
  - requirement: 'Schema file structure'
    name: 'Missing required field'
    when:
      - 'a schema file is missing `name` or `version`'
    then:
      - '`SchemaRegistry.resolve()` must throw a validation error'
  - requirement: 'Artifact definition'
    name: 'Filename derived from glob literal segment'
    when:
      - 'an artifact declares `output: "specs/**/spec.md"` and a new file is created within the change'
    then:
      - 'the file is named `spec.md`; the subdirectory path (e.g. `auth/login/`) is chosen by the user'
  - requirement: 'Artifact definition'
    name: 'Filename derived from template when glob segment is a wildcard'
    when:
      - 'an artifact declares `output: "specs/**/*.md"` and `template: "templates/spec.md"`'
    then:
      - 'the file is named `spec.md`, taken from the template filename'
  - requirement: 'Artifact definition'
    name: 'Filename indeterminate — no literal segment and no template'
    when:
      - 'an artifact declares `output: "specs/**/*.md"` and omits `template`'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError` identifying the artifact'
  - requirement: 'Artifact definition'
    name: 'Artifact with no requirements'
    when:
      - 'an artifact omits `requires`'
    then:
      - 'its effective status depends only on its own validated hash'
  - requirement: 'Artifact definition'
    name: 'Artifact with dependency chain'
    when:
      - 'artifact B declares `requires: [a]` and artifact A is `in-progress`'
    then:
      - "`Change.effectiveStatus('b')` must return `in-progress`"
  - requirement: 'Artifact definition'
    name: 'Circular dependency in artifact graph'
    when:
      - 'artifact A declares `requires: [b]` and artifact B declares `requires: [a]`'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError` identifying the cycle'
  - requirement: 'Artifact definition'
    name: 'Non-optional artifact requires optional artifact'
    when:
      - 'artifact A is `optional: true` and artifact B is `optional: false` and declares `requires: [a]`'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError`'
  - requirement: 'Artifact definition'
    name: 'Optional artifact requiring optional artifact is valid'
    when:
      - 'artifact A is `optional: true` and artifact B is also `optional: true` and declares `requires: [a]`'
    then:
      - '`SchemaRegistry.resolve()` loads successfully'
  - requirement: 'Artifact definition'
    name: 'deltaValidations on non-delta artifact'
    when:
      - 'an artifact declares `delta: false` and also declares `deltaValidations`'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError`'
  - requirement: 'Delta validation rules'
    name: 'where rule matches correlated entry in delta AST'
    given:
      - "a `deltaValidations` rule `{ type: sequence-item, where: { op: 'added|modified' }, contentMatches: '#### Scenario:', required: true }`"
    when:
      - 'the delta file contains at least one entry with `op: added` whose `content` includes `#### Scenario:`'
      - '`ValidateArtifacts` evaluates the rule against the normalized delta YAML AST'
    then:
      - 'the rule passes — at least one matching node was found'
  - requirement: 'Delta validation rules'
    name: 'where rule fails when no entry matches correlated condition'
    given:
      - "a `deltaValidations` rule `{ type: sequence-item, where: { op: 'added|modified' }, contentMatches: '#### Scenario:', required: true }`"
      - 'the delta file contains only entries with `op: removed`'
    when:
      - '`ValidateArtifacts` evaluates the rule'
    then:
      - 'the rule fails — zero nodes matched — and `ValidateArtifacts` reports a validation failure'
  - requirement: 'Delta validation rules'
    name: 'Rule passes vacuously when no nodes match'
    given:
      - 'a `deltaValidations` rule that matches no nodes in the delta YAML AST'
    when:
      - '`ValidateArtifacts` evaluates the rule'
    then:
      - 'the rule passes without error regardless of `required`'
  - requirement: 'Delta validation rules'
    name: 'Warning on required false with no match'
    given:
      - 'a `deltaValidations` rule with `required: false` that matches zero nodes in the delta YAML AST'
    when:
      - '`ValidateArtifacts` evaluates the rule'
    then:
      - '`ValidateArtifacts` records a warning, not a failure'
  - requirement: 'Delta validation rules'
    name: 'Children constraint checked for each matched node'
    given:
      - 'a `deltaValidations` rule that matches two nodes, and a `children` constraint that matches zero nodes relative to one of those matched nodes'
    when:
      - '`ValidateArtifacts` evaluates the rule'
    then:
      - 'the failing child check produces a validation failure for that matched node'
  - requirement: 'Delta validation rules'
    name: 'delta on scope:change artifact'
    when:
      - 'an artifact declares `delta: true` and `scope: change`'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError`'
  - requirement: 'Delta validation rules'
    name: 'format inferred from output extension'
    when:
      - 'an artifact omits `format` and its derived output filename ends in `.md`'
    then:
      - 'the resolved artifact has `format: markdown`'
  - requirement: 'Delta validation rules'
    name: 'format indeterminate requires explicit declaration'
    when:
      - 'an artifact omits `format` and its derived output filename has an extension not in `.md`, `.json`, `.yaml`, `.yml`'
    then:
      - 'the resolved artifact uses `format: plaintext`'
  - requirement: 'Template resolution'
    name: 'Template loaded at resolve time'
    when:
      - 'an artifact declares `template: templates/proposal.md` and the file exists in the schema directory'
    then:
      - '`SchemaRegistry.resolve()` returns the artifact with the template content populated'
  - requirement: 'Template resolution'
    name: 'Template file not found'
    when:
      - 'an artifact declares a `template` path that does not exist relative to the schema directory'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError`'
  - requirement: 'Template resolution'
    name: 'No template declared'
    when:
      - 'an artifact omits `template`'
    then:
      - 'no template content is provided for that artifact; scaffolding falls back to an empty file'
  - requirement: 'Validation rules'
    name: 'Required section missing'
    given:
      - "a `validations` rule `{ type: section, matches: '^Requirements$', required: true }`"
      - 'the artifact has no section whose label matches `Requirements`'
    when:
      - '`ValidateArtifacts` evaluates the rule against the normalized artifact AST'
    then:
      - '`ValidateArtifacts` reports an error'
  - requirement: 'Validation rules'
    name: 'Required section missing — warning'
    given:
      - 'a `validations` rule with `required: false` that matches no node in the artifact AST'
    when:
      - '`ValidateArtifacts` evaluates the rule'
    then:
      - '`ValidateArtifacts` reports a warning, not an error'
  - requirement: 'Validation rules'
    name: 'children narrows scope to matched node'
    given:
      - "a `validations` rule `{ type: section, matches: '^Requirements$', children: [{ type: section, matches: '^Requirement:' }] }`"
      - 'a `Requirement:` section exists both inside `Requirements` and outside it'
    when:
      - '`ValidateArtifacts` evaluates the rule'
    then:
      - 'only the `Requirement:` section inside `Requirements` is checked against the child rule; the outer one is not'
  - requirement: 'Validation rules'
    name: 'Children constraint fails on one node'
    given:
      - "a `validations` rule `{ type: section, matches: '^Requirement:' }` with a `children` constraint `{ type: section, matches: '^Scenario:', required: true }`"
      - 'one `Requirement:` section has no `Scenario:` child'
    when:
      - '`ValidateArtifacts` evaluates the rule'
    then:
      - '`ValidateArtifacts` reports an error identifying the offending Requirement'
  - requirement: 'Validation rules'
    name: 'contentMatches checked against serialized subtree'
    given:
      - "a `validations` rule `{ type: section, matches: '^Requirement:', contentMatches: 'SHALL|MUST', required: false }`"
      - 'one `Requirement:` section whose serialized markdown body contains no `SHALL` or `MUST`'
    when:
      - '`ValidateArtifacts` evaluates the rule'
    then:
      - '`ValidateArtifacts` records a warning for that section'
  - requirement: 'Validation rules'
    name: 'Rule passes vacuously when no nodes match'
    given:
      - 'a `validations` rule with a `children` constraint, whose top-level identification matches zero nodes in the artifact AST'
    when:
      - '`ValidateArtifacts` evaluates the rule'
    then:
      - 'the rule passes without error — the children constraint is never evaluated'
  - requirement: 'Per-spec approval'
    name: 'New spec requires approval'
    when:
      - 'a delta creates a new spec via an `added` operation'
    then:
      - 'that spec path must be approved before archiving'
  - requirement: 'Per-spec approval'
    name: 'Modified spec requires approval'
    when:
      - 'a delta modifies or removes nodes in an existing spec'
    then:
      - 'that spec path must be approved before archiving'
  - requirement: 'Per-spec approval'
    name: 'All specs approved'
    when:
      - 'every spec path touched by the change has been approved'
    then:
      - '`specd archive` proceeds without an approval error'
  - requirement: 'Per-spec approval'
    name: 'Partially approved'
    when:
      - 'at least one touched spec path has not been approved'
    then:
      - '`specd archive` must refuse and report which spec paths are pending approval'
  - requirement: 'taskCompletionCheck'
    name: 'Default patterns detect markdown checkboxes'
    given:
      - 'an artifact with no `taskCompletionCheck` declared'
      - 'its file contains `- [ ] pending` and `- [x] done`'
    when:
      - 'the CLI checks task completion'
    then:
      - '`incompletePattern` defaults to `^\s*-\s+\[ \]` and matches `- [ ] pending`'
      - '`completePattern` defaults to `^\s*-\s+\[x\]` (case-insensitive) and matches `- [x] done`'
  - requirement: 'taskCompletionCheck'
    name: 'Custom patterns override defaults'
    given:
      - 'an artifact declares `taskCompletionCheck.incompletePattern: ''^\\s*TODO:''` and `taskCompletionCheck.completePattern: ''^\\s*DONE:''`'
      - 'its file contains `TODO: implement login` and `DONE: implement logout`'
    when:
      - 'the CLI checks task completion'
    then:
      - '`incompletePattern` matches `TODO: implement login` and the transition is blocked'
  - requirement: 'taskCompletionCheck'
    name: 'All tasks complete — no incomplete matches'
    given:
      - 'an artifact file where all checkboxes are checked and none are unchecked'
    when:
      - 'the `implementing → verifying` transition is attempted'
    then:
      - '`incompletePattern` matches zero lines and the transition is allowed'
  - requirement: 'preHashCleanup'
    name: 'Substitution applied before hashing'
    given:
      - 'an artifact with `preHashCleanup: [{ pattern: ''^\\s*-\\s+\\[x\\]'', replacement: ''- [ ]'' }]`'
      - 'its file contains `- [x] implement logout`'
    when:
      - 'the hash is computed'
    then:
      - 'the substitution is applied first and the hash reflects the normalised content'
  - requirement: 'preHashCleanup'
    name: 'Checking a task off does not invalidate approval'
    given:
      - 'an artifact with `preHashCleanup` that normalises checked boxes to unchecked'
      - 'the artifact was approved with some tasks unchecked'
    when:
      - 'tasks are marked complete'
    then:
      - 'the approval hash still matches'
  - requirement: 'preHashCleanup'
    name: 'Multiple substitutions applied in order'
    given:
      - 'an artifact with two `preHashCleanup` entries'
    when:
      - 'the hash is computed'
    then:
      - 'the first substitution is applied to the full content, then the second is applied to the result of the first'
  - requirement: 'Context sections'
    name: 'Section injected'
    when:
      - 'an artifact has a `contextSections` entry and the selector matches a node in the spec'
    then:
      - '`CompileContext` includes the extracted content in the compiled context under the given `contextTitle`, labelled with the declared `role`'
  - requirement: 'Context sections'
    name: 'contextTitle omitted'
    when:
      - 'a `contextSections` entry has no `contextTitle`'
    then:
      - "`CompileContext` uses the matched node's `label` as the context section title"
  - requirement: 'Context sections'
    name: 'Section not present in spec'
    when:
      - 'the selector matches no node in the spec'
    then:
      - '`CompileContext` skips that entry without error'
  - requirement: 'Context sections'
    name: 'extract label only'
    when:
      - 'a `contextSections` entry declares `extract: label`'
    then:
      - "`CompileContext` injects only the matched node's identifying value, not its subtree content"
  - requirement: 'Context sections'
    name: 'extract both'
    when:
      - 'a `contextSections` entry declares `extract: both` and the selector matches multiple nodes'
    then:
      - '`CompileContext` injects the label followed by the serialized content for each matched node separately'
  - requirement: 'Artifact scope'
    name: 'Missing non-optional artifact in change'
    when:
      - 'a change is missing an artifact with `optional: false`'
    then:
      - '`ValidateArtifacts` must report a validation error'
  - requirement: 'Artifact scope'
    name: 'Optional artifact absent from change'
    when:
      - 'a change is missing an artifact with `optional: true`'
    then:
      - '`ValidateArtifacts` does not report a validation error for that artifact'
  - requirement: 'Artifact scope'
    name: 'Missing scope:spec artifact file in spec directory'
    when:
      - 'a spec directory at `specs/<name>/` is missing a file for a non-optional `scope: spec` artifact'
    then:
      - '`specd validate` must report that spec as incomplete'
  - requirement: 'Artifact scope'
    name: 'scope:change artifact not present in spec directory'
    when:
      - 'a `scope: change` artifact is present in the change'
    then:
      - 'it is validated but never synced to the spec directory'
  - requirement: 'Workflow'
    name: 'Pre hook failure aborts step'
    when:
      - 'a `pre` `run:` hook exits with a non-zero code'
    then:
      - 'the step is aborted, the user is informed, and the agent offers to fix the problem before retrying'
  - requirement: 'Workflow'
    name: 'Post hook failure prompts user'
    when:
      - 'a `post` `run:` hook exits with a non-zero code'
    then:
      - 'the user is prompted to continue or stop; the completed step is not rolled back'
  - requirement: 'Workflow'
    name: 'Step with unsatisfied prerequisites'
    when:
      - "a step's `requires` lists an artifact that is not `complete`"
    then:
      - '`CompileContext` must report that the step is blocked'
  - requirement: 'Workflow'
    name: 'Schema and project hooks merged'
    when:
      - 'both the schema and `specd.yaml` define `workflow` entries for the same step'
    then:
      - 'schema hooks fire first, followed by project hooks, within the same `pre`/`post` event'
  - requirement: 'Workflow'
    name: 'requires in specd.yaml workflow entry rejected'
    when:
      - 'a `specd.yaml` workflow entry includes a `requires` field'
    then:
      - 'the config loader must reject it with a validation error'
  - requirement: 'Project-level artifactRules'
    name: 'Rules injected into compiled context'
    when:
      - '`specd.yaml` defines artifactRules for artifact `specs`'
    then:
      - '`CompileContext` includes those rules in the compiled instruction block for the `specs` artifact'
  - requirement: 'Project-level artifactRules'
    name: 'Unknown artifact ID in artifactRules'
    when:
      - '`specd.yaml` defines artifactRules for an artifact ID not present in the active schema'
    then:
      - '`SchemaRegistry` emits a warning at load time and ignores those rules'
  - requirement: 'Schema resolution'
    name: 'npm package resolved'
    when:
      - '`schema: "@specd/schema-std"` is declared'
    then:
      - '`SchemaRegistry.resolve()` loads `node_modules/@specd/schema-std/schema.yaml`'
  - requirement: 'Schema resolution'
    name: 'Bare name resolved from default workspace'
    when:
      - '`schema: "spec-driven"` is declared and `workspaces.default.schemas.fs.path` is `specd/schemas`'
    then:
      - '`SchemaRegistry.resolve()` loads `specd/schemas/spec-driven/schema.yaml`'
  - requirement: 'Schema resolution'
    name: 'Direct path resolved'
    when:
      - '`schema: "./custom/schema.yaml"` is declared'
    then:
      - '`SchemaRegistry.resolve()` loads that file relative to the `specd.yaml` directory'
  - requirement: 'Schema resolution'
    name: 'Schema not found'
    when:
      - 'the resolved path does not exist on disk'
    then:
      - '`SchemaRegistry.resolve()` returns `null`'
  - requirement: 'Schema validation on load'
    name: 'Unknown field ignored'
    when:
      - 'a schema file includes a top-level field not in the current spec'
    then:
      - 'the schema loads successfully and the unknown field is ignored'
  - requirement: 'Schema validation on load'
    name: 'Duplicate artifact ID'
    when:
      - 'a schema file declares two artifacts with the same `id`'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError`'
  - requirement: 'Schema validation on load'
    name: 'Duplicate workflow step'
    when:
      - 'the `workflow` array contains two entries with the same `step` name'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError`'
  - requirement: 'Schema validation on load'
    name: 'Unknown artifact ID in requires'
    when:
      - 'an artifact declares `requires: [unknown-id]`'
    then:
      - '`SchemaRegistry.resolve()` must throw a `SchemaValidationError`'
  - requirement: 'verify.md format'
    name: 'verify.md compiled with spec.md'
    when:
      - 'specd compiles context for a spec that has both `spec` and `verify` artifacts with `scope: spec`'
    then:
      - 'both `spec.md` and `verify.md` are read and included together in the LLM context'
