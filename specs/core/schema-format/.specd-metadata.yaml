    name: 'Scope-qualified name resolved'
    given: []
    when:
      - '`schema: "#billing:my-schema"` is declared and `workspaces.billing.schemas.fs.path` is `../billing/dev/schemas`'
    then:
      - '`SchemaRegistry.resolve()` loads `../billing/dev/schemas/my-schema/schema.yaml`'
  - requirement: 'Schema resolution'
    name: 'Direct path resolved'
    given: []
    when:
      - '`schema: "./custom/schema.yaml"` is declared'
    then:
      - '`SchemaRegistry.resolve()` loads that file relative to the `specd.yaml` directory'
  - requirement: 'Schema resolution'
    name: 'Schema not found'
    given: []
    when:
