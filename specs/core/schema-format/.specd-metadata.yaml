title: 'Schema Format'
description: >
  Defines the YAML structure of a specd schema file, including artifact definitions,
  workflow lifecycle phases, validation rules, delta support, template resolution, and
  schema resolution logic. Governs how SchemaRegistry loads, validates, and constructs
  Schema objects from schema.yaml files.
keywords:
  - 'schema'
  - 'artifact'
  - 'workflow'
  - 'validation'
  - 'delta'
  - 'template'
  - 'context-sections'
  - 'SchemaRegistry'
dependsOn:
  - 'core:core/delta-format'
  - 'core:core/selector-model'
contentHashes:
  'spec.md': 'sha256:9e6fdd8d73fbccd610c2ad218bddb1b38816755facc5a11a0b91e47d8c79637a'
  'verify.md': 'sha256:2c56d89bc0308c3648ac26e458e9af4964be6fe1e2557c9ae49d22e087d38b1c'
rules:
  - requirement: 'Schema file structure'
    rules:
      - 'A schema file must be a valid YAML document with top-level fields: name (string, required), version (integer, required), description (string, optional), artifacts (array, required), workflow (array, optional).'
  - requirement: 'Artifact definition'
    rules:
      - 'Each artifact entry must include: id, scope, output; optional fields include optional, description, template, instruction, requires, format, delta, deltaInstruction, deltaValidations, validations, contextSections, preHashCleanup, taskCompletionCheck.'
      - 'The output filename is derived from the last literal glob segment; if the last segment is a wildcard, the template filename is used; if neither yields a determinate name, SchemaRegistry.resolve() must throw a SchemaValidationError.'
      - 'delta: true is only valid when scope is spec; combining delta: true with scope: change must throw a SchemaValidationError.'
      - 'format is inferred from the derived output filename extension when omitted (.md -> markdown, .json -> json, .yaml/.yml -> yaml, other -> plaintext).'
  - requirement: 'Template resolution'
    rules:
      - 'Template files are loaded at resolve time from the path relative to the schema directory.'
      - 'If the declared template file does not exist, SchemaRegistry.resolve() must throw a SchemaValidationError.'
      - 'Template content is plain text with no interpolation; HTML comments are preserved as-is.'
  - requirement: 'Validation rules'
    rules:
      - 'Each validation rule uses either selector fields (type, matches, contains, parent, index, where) or a JSONPath path expression to identify AST nodes.'
      - 'A rule passes vacuously when it matches zero nodes; no error or warning is produced.'
      - 'required: false produces a warning rather than an error when no nodes match.'
      - 'children sub-rules are evaluated with each matched node as root.'
      - 'contentMatches is matched case-insensitively against the serialized text of the matched node subtree.'
  - requirement: 'Delta validation rules'
    rules:
      - 'deltaValidations rules are evaluated against the normalized YAML AST of the delta file before application.'
      - 'deltaValidations uses the same rule structure and evaluation semantics as validations.'
      - 'deltaValidations is only valid on artifacts with delta: true; declaring it on a non-delta artifact is a SchemaValidationError.'
  - requirement: 'Per-spec approval'
    rules:
      - 'Any spec file touched by a delta requires explicit approval before the change can be archived.'
      - 'specd archive must refuse if any spec touched by the change has not been approved.'
      - 'A spec created by an added operation also requires approval.'
  - requirement: 'Context sections'
    rules:
      - 'Each contextSections entry must include a selector; role defaults to context; extract defaults to content; contextTitle defaults to the matched node label.'
      - 'CompileContext uses contextSections as a fallback when .specd-metadata.yaml is absent or stale.'
      - 'When the selector matches no node, CompileContext skips the entry without error.'
  - requirement: 'Artifact scope'
    rules:
      - 'scope: spec artifacts are synced to the SpecRepository during ArchiveChange; scope: change artifacts are validated in the change but never synced.'
      - 'Non-optional scope: spec artifacts must be present in every spec directory; specd validate reports missing files as errors.'
      - 'ValidateArtifacts requires all non-optional artifacts (regardless of scope) to be present in the change.'
  - requirement: 'Workflow'
    rules:
      - 'Each workflow entry must include step (string, required); requires (array of artifact IDs, optional); hooks (object with pre/post arrays, optional).'
      - 'Each hook entry is either { instruction: string } or { run: string }.'
      - 'A pre run: hook that exits non-zero aborts the step; a post run: hook that exits non-zero prompts the user to continue or stop.'
      - 'Schema hooks fire first, then project hooks, within the same pre/post event.'
      - 'requires is not valid in specd.yaml workflow entries and must be rejected at load time.'
  - requirement: 'Project-level artifactRules'
    rules:
      - 'artifactRules keys are validated against active schema artifact IDs on load; unknown keys produce a warning but do not prevent startup.'
      - 'Rules are additive — they extend the schema instruction, not replace it.'
  - requirement: 'Schema resolution'
    rules:
      - 'Prefix @scope/name loads from node_modules/@scope/name/schema.yaml.'
      - 'Prefix #workspace:name loads from workspaces.<workspace>.schemas.fs.path/<name>/schema.yaml.'
      - 'Bare name or #name is equivalent to #default:name.'
      - 'Relative or absolute path is resolved directly; relative paths are resolved from the specd.yaml directory.'
      - 'If the resolved file does not exist, resolve() must return null; the caller converts null to SchemaNotFoundError.'
  - requirement: 'Schema validation on load'
    rules:
      - 'SchemaRegistry.resolve() must validate parsed YAML via Zod before constructing the Schema object.'
      - 'Unknown top-level fields must be ignored for forward compatibility.'
      - 'Structural mismatches must produce a SchemaValidationError before any domain object construction.'
      - 'Validation checks: duplicate artifact.id, duplicate workflow[].step, artifact.id not matching /^[a-z][a-z0-9-]*$/, unknown artifact ID in requires, circular requires dependency, non-optional artifact hard-depending on optional artifact, deltaValidations on delta: false artifact, requires in specd.yaml workflow entry.'
  - requirement: 'verify.md format'
    rules:
      - 'verify.md groups scenarios under ### Requirement: <name> headings matching the spec.md structure.'
      - 'Only scenarios that add information beyond what the requirement prose already states are included.'
      - 'The verify artifact should declare requires: [spec]; the workflow verify step should declare requires: [verify].'
constraints:
  - 'artifact.id must match /^[a-z][a-z0-9-]*$/ and must be unique within a schema.'
  - 'artifact.scope must be spec or change; it is required and has no default.'
  - 'artifact.optional defaults to false; a non-optional scope: spec artifact must be present in every spec directory and every change.'
  - 'workflow[].step must be unique — duplicate step names in the same workflow array are a schema validation error.'
  - 'requires must not contain cycles; circular dependencies in the artifact graph are a schema validation error.'
  - 'If artifact A is optional: true, any artifact that lists A in its requires must also be optional: true.'
  - 'deltaValidations is only valid on artifacts with delta: true; declaring it on a non-delta artifact is a schema validation error.'
  - 'requires in specd.yaml workflow entries is invalid and must be rejected at load time; only step and hooks are accepted.'
  - 'The order of entries in workflow is the intended display order for tooling; it does not enforce sequential blocking between consecutive steps.'
  - 'Delta file format, selector model, and application constraints are defined in specs/core/delta-format/spec.md.'
scenarios:
  - requirement: 'Schema file structure'
    name: 'Minimal valid schema'
    when:
      - 'a schema file contains name, version, and at least one artifact'
    then:
      - 'SchemaRegistry.resolve() must return the parsed schema without error'
  - requirement: 'Schema file structure'
    name: 'Missing required field'
    when:
      - 'a schema file is missing name or version'
    then:
      - 'SchemaRegistry.resolve() must throw a validation error'
  - requirement: 'Artifact definition'
    name: 'Filename derived from glob literal segment'
    when:
      - 'an artifact declares output: "specs/**/spec.md" and a new file is created within the change'
    then:
      - 'the file is named spec.md; the subdirectory path is chosen by the user'
  - requirement: 'Artifact definition'
    name: 'Filename indeterminate — no literal segment and no template'
    when:
      - 'an artifact declares output: "specs/**/*.md" and omits template'
    then:
      - 'SchemaRegistry.resolve() must throw a SchemaValidationError identifying the artifact'
  - requirement: 'Artifact definition'
    name: 'Circular dependency in artifact graph'
    when:
      - 'artifact A declares requires: [b] and artifact B declares requires: [a]'
    then:
      - 'SchemaRegistry.resolve() must throw a SchemaValidationError identifying the cycle'
  - requirement: 'Artifact definition'
    name: 'Non-optional artifact requires optional artifact'
    when:
      - 'artifact A is optional: true and artifact B is optional: false and declares requires: [a]'
    then:
      - 'SchemaRegistry.resolve() must throw a SchemaValidationError'
  - requirement: 'Artifact definition'
    name: 'deltaValidations on non-delta artifact'
    when:
      - 'an artifact declares delta: false and also declares deltaValidations'
    then:
      - 'SchemaRegistry.resolve() must throw a SchemaValidationError'
  - requirement: 'Delta validation rules'
    name: 'delta on scope:change artifact'
    when:
      - 'an artifact declares delta: true and scope: change'
    then:
      - 'SchemaRegistry.resolve() must throw a SchemaValidationError'
  - requirement: 'Delta validation rules'
    name: 'Rule passes vacuously when no nodes match'
    when:
      - 'a deltaValidations rule matches no nodes in the delta YAML AST'
    then:
      - 'the rule passes without error regardless of required'
  - requirement: 'Template resolution'
    name: 'Template file not found'
    when:
      - 'an artifact declares a template path that does not exist relative to the schema directory'
    then:
      - 'SchemaRegistry.resolve() must throw a SchemaValidationError'
  - requirement: 'Validation rules'
    name: 'Required section missing'
    when:
      - 'a validations rule { type: section, matches: "^Requirements$", required: true } is evaluated'
      - 'the artifact has no section whose label matches Requirements'
    then:
      - 'ValidateArtifacts reports an error'
  - requirement: 'Per-spec approval'
    name: 'Partially approved'
    when:
      - 'at least one touched spec ID has not been approved'
    then:
      - 'specd archive must refuse and report which spec IDs are pending approval'
  - requirement: 'Artifact scope'
    name: 'Missing scope:spec artifact file in spec directory'
    when:
      - 'a spec directory at specs/<name>/ is missing a file for a non-optional scope: spec artifact'
    then:
      - 'specd validate must report that spec as incomplete'
  - requirement: 'Workflow'
    name: 'Pre hook failure aborts step'
    when:
      - 'a pre run: hook exits with a non-zero code'
    then:
      - 'the step is aborted, the user is informed, and the agent offers to fix the problem before retrying'
  - requirement: 'Workflow'
    name: 'requires in specd.yaml workflow entry rejected'
    when:
      - 'a specd.yaml workflow entry includes a requires field'
    then:
      - 'the config loader must reject it with a validation error'
  - requirement: 'Schema resolution'
    name: 'Schema not found'
    when:
      - 'the resolved path does not exist on disk'
    then:
      - 'SchemaRegistry.resolve() returns null'
  - requirement: 'Schema validation on load'
    name: 'Duplicate artifact ID'
    when:
      - 'a schema file declares two artifacts with the same id'
    then:
      - 'SchemaRegistry.resolve() must throw a SchemaValidationError'
  - requirement: 'Schema validation on load'
    name: 'Unknown field ignored'
    when:
      - 'a schema file includes a top-level field not in the current spec'
    then:
      - 'the schema loads successfully and the unknown field is ignored'
  - requirement: 'verify.md format'
    name: 'verify.md compiled with spec.md'
    when:
      - 'specd compiles context for a spec that has both spec and verify artifacts with scope: spec'
    then:
      - 'both spec.md and verify.md are read and included together in the LLM context'
