title: 'CompileContext'
description: >
  Application use case that assembles the AI instruction block for a lifecycle
  step of a change. Collects context specs via five-step include/exclude resolution,
  evaluates step availability, and combines schema instructions, artifact rules,
  delta context, spec content, and step hooks into a single structured output.
keywords:
  - 'context compilation'
  - 'instruction block'
  - 'lifecycle step'
  - 'spec collection'
  - 'dependsOn traversal'
  - 'staleness detection'
  - 'step availability'
  - 'delta context'
  - 'artifact rules'
  - 'step hooks'
dependsOn:
  - 'core:core/change'
  - 'core:core/config'
  - 'core:core/spec-metadata'
  - 'core:core/schema-format'
  - 'core:core/delta-format'
  - 'core:core/selector-model'
  - 'core:core/spec-id-format'
contentHashes:
  'spec.md': 'sha256:f645cd22c0066fa11c39db9fc9176b10d9a710c8a2ea0c643f8ad529a61d3e67'
  'verify.md': 'sha256:5558daf7218656254520ba0a227d04060d1a14f58311cc538bb91ef076f9c346'
rules:
  - requirement: 'Ports and constructor'
    rules:
      - 'CompileContext receives ChangeRepository, a map of SpecRepository instances keyed by workspace name, SchemaRegistry, FileReader, and ArtifactParserRegistry at construction time.'
      - 'ArtifactParserRegistry maps format names (markdown, json, yaml, plaintext) to ArtifactParser adapters used for delta context injection.'
      - 'FileReader returns file content as a string or null if absent; it is bound to the project root by the bootstrap layer.'
      - 'CompileContext must not create or configure repositories — it only reads from them.'
  - requirement: 'Input'
    rules:
      - 'CompileContext.execute receives: name, step, optional activeArtifact, schemaRef, workspaceSchemasPaths, config, optional followDeps (default false), optional depth, and optional sections.'
      - 'activeArtifact is only applicable to the designing step; post-ready steps do not use it.'
      - 'When sections is present, only the listed sections (rules, constraints, scenarios) are rendered for each spec in the output.'
      - 'depth is only valid when followDeps is true and limits dependsOn traversal levels.'
  - requirement: 'Workspace resolution for spec IDs'
    rules:
      - 'Explicit workspace qualifier (e.g. billing:auth/login) resolves to the named SpecRepository in the map.'
      - 'Unqualified paths resolve to the default workspace at project level, to the current workspace at workspace level, and to the declaring spec workspace in dependsOn entries.'
      - 'If a pattern or dependsOn entry references an unknown workspace, CompileContext must emit a warning and skip — no error thrown.'
  - requirement: 'Context spec collection'
    rules:
      - 'CompileContext must collect specs via five steps: project-level includes, project-level excludes, workspace-level includes (active workspaces only), workspace-level excludes (active workspaces only), and optional dependsOn traversal when followDeps is true.'
      - 'A spec matched by multiple include patterns appears exactly once at the position of the first match.'
      - 'Specs added via dependsOn traversal that are already in the set also appear once at their earlier position.'
  - requirement: 'Cycle detection during dependsOn traversal'
    rules:
      - 'CompileContext must detect cycles in the dependsOn graph, break the cycle, emit a warning, and continue — it must not enter an infinite loop.'
      - 'All specs reachable without traversing the cycle must still be included.'
  - requirement: 'Staleness detection and content fallback'
    rules:
      - 'For every spec in the context set, CompileContext must check whether .specd-metadata.yaml exists and whether its contentHashes are fresh.'
      - 'Fresh metadata: use structured content (rules, constraints, scenarios, description) from .specd-metadata.yaml.'
      - 'Stale or absent metadata: fall back to raw artifact file content and emit a staleness warning — compilation is never blocked.'
  - requirement: 'Step availability'
    rules:
      - 'A step is available when all artifact IDs in its workflow requires list have effective status complete or skipped.'
      - 'A skipped optional artifact satisfies the requirement identically to a completed artifact.'
      - 'Unavailability is surfaced in the result with stepAvailable: false and blockingArtifacts populated — CompileContext must not throw.'
  - requirement: 'Assembled instruction block'
    rules:
      - 'The instruction block is assembled in order: (1) project context entries, (2) schema artifact instruction (when activeArtifact present), (3) delta context (when activeArtifact has delta: true), (4) project artifactRules for the active artifact, (5) spec content for collected specs, (6) step hooks, (7) available steps listing.'
      - 'Project context entries always appear first; missing file entries emit a warning and are skipped.'
      - 'Delta context consists of: format instructions from ArtifactParser.deltaInstructions(), artifact deltaInstruction field, and existing artifact outlines per change.specIds.'
      - 'Spec content uses fresh metadata when available; falls back to contextSections extraction when metadata is stale or absent.'
      - 'Step hooks include only instruction: entries prefixed with [pre] or [post]; run: entries are not included.'
  - requirement: 'Result shape'
    rules:
      - 'CompileContext.execute must return: stepAvailable, blockingArtifacts, instructionBlock, and warnings.'
      - 'CompileContext must throw on ChangeNotFoundError and on schema resolution errors.'
      - 'CompileContext must not throw on step availability failures.'
  - requirement: 'Missing spec IDs emit a warning'
    rules:
      - 'If a spec ID from an include pattern or dependsOn reference does not exist in SpecRepository, emit a warning and skip — no error thrown.'
  - requirement: 'Unknown workspace qualifiers emit a warning'
    rules:
      - 'If a pattern or dependsOn entry references a workspace with no SpecRepository in the map, emit a warning and skip — no error thrown.'
constraints:
  - 'Project context entries always appear first in the instruction block, before schema instructions and spec content.'
  - 'Missing file references in context emit a warning and are skipped — no error.'
  - 'Steps 1–4 (include/exclude patterns) are applied before dependsOn traversal (step 5).'
  - 'Specs added via dependsOn traversal are never removed by exclude rules.'
  - 'A spec always appears at most once in the context output, at the position of the first include.'
  - 'CompileContext must not perform direct filesystem reads — all file access goes through SpecRepository or FileReader.'
  - 'The caller resolves the config and constructs all SpecRepository and FileReader instances before calling the constructor.'
  - 'The specs map must contain one entry per workspace declared in specd.yaml; missing workspaces produce a warning, not an error.'
  - 'Artifact instructions, delta context, and artifactRules are included only when activeArtifact is provided — and only for that artifact.'
  - 'Delta context is injected only when activeArtifact has delta: true.'
  - 'Existing artifact outlines are injected per spec ID in change.specIds; missing files are silently skipped.'
  - 'ArtifactParserRegistry must contain an adapter for every format in the schema; a missing adapter must emit a warning and skip the delta context block — no error.'
  - 'Step hooks fire once per step, not once per artifact iteration.'
  - 'instruction: hook entries are included prefixed with [pre] or [post]; run: hook entries are not included.'
  - 'dependsOn traversal is opt-in via followDeps: true; when absent or false, step 5 is skipped entirely.'
  - 'depth is only meaningful when followDeps: true; it limits traversal levels (1 = direct deps only).'
  - 'sections applies only to spec content rendering; schema instructions, delta context, artifact rules, step hooks, and available steps are unaffected.'
  - 'Cycle detection is mandatory — cycles in dependsOn must not cause infinite loops.'
  - 'Metadata-based content (fresh .specd-metadata.yaml) is always preferred; contextSections fallback is used only when metadata is absent or stale.'
scenarios:
  - requirement: 'Context spec collection'
    name: 'Project-level include applied regardless of active workspace'
    when:
      - 'contextIncludeSpecs: [_global/*] at the project level'
      - 'the current change has no spec from _global'
      - 'CompileContext.execute is called'
    then:
      - 'all specs under _global/ are included in the context'
  - requirement: 'Context spec collection'
    name: 'Workspace-level include applied only for active workspace'
    when:
      - 'billing workspace declares contextIncludeSpecs: [*]'
      - 'the current change has no spec in the billing workspace'
      - 'CompileContext.execute is called'
    then:
      - 'no billing specs are included via workspace-level patterns'
  - requirement: 'Context spec collection'
    name: 'Project-level exclude removes spec before workspace patterns are applied'
    when:
      - 'contextIncludeSpecs: [default:*] and contextExcludeSpecs: [default:drafts/*]'
      - 'default:drafts/old-spec was matched by the project-level include'
      - 'CompileContext.execute applies step 3 (project-level exclude)'
    then:
      - 'default:drafts/old-spec is removed before workspace-level patterns are evaluated'
  - requirement: 'Context spec collection'
    name: 'Workspace-level exclude removes spec after workspace include'
    when:
      - 'default workspace declares contextIncludeSpecs: [*] and contextExcludeSpecs: [internal/*]'
      - 'default is active and default:internal/notes was added by the workspace include'
      - 'CompileContext.execute applies workspace-level exclude'
    then:
      - 'default:internal/notes is removed from the context set'
  - requirement: 'Context spec collection'
    name: 'dependsOn traversal adds specs beyond include set'
    when:
      - 'change.contextSpecIds: [auth/login]'
      - 'auth/login/.specd-metadata.yaml declares dependsOn: [auth/jwt]'
      - 'auth/jwt was not matched by any include pattern'
      - 'CompileContext.execute applies dependsOn traversal'
    then:
      - 'auth/jwt is added to the context set'
  - requirement: 'Context spec collection'
    name: 'dependsOn spec not removed by exclude'
    when:
      - 'contextExcludeSpecs: [default:auth/*]'
      - 'auth/jwt is added via dependsOn traversal'
      - 'CompileContext.execute is called'
    then:
      - 'auth/jwt is not excluded — dependsOn traversal specs are immune to exclude rules'
  - requirement: 'Context spec collection'
    name: 'Spec appears only once even if matched multiple times'
    when:
      - 'contextIncludeSpecs: [auth/login, auth/*]'
      - 'CompileContext.execute is called'
    then:
      - 'auth/login appears exactly once in the context, at the position of the first matching pattern'
  - requirement: 'Cycle detection during dependsOn traversal'
    name: 'Cycle broken without infinite loop'
    when:
      - 'auth/login depends on auth/jwt'
      - 'auth/jwt depends back on auth/login'
      - 'CompileContext.execute traverses dependsOn'
    then:
      - 'both specs are included (or the cycle is broken at one point)'
      - 'no infinite loop occurs'
      - 'a cycle warning is emitted'
  - requirement: 'Staleness detection and content fallback'
    name: 'Stale metadata emits warning'
    when:
      - 'auth/jwt/.specd-metadata.yaml has contentHashes.spec.md: sha256:old'
      - 'the current spec.md hashes to sha256:new'
      - 'CompileContext.execute adds auth/jwt via dependsOn traversal'
    then:
      - 'the result warnings includes a staleness warning for auth/jwt'
  - requirement: 'Staleness detection and content fallback'
    name: 'Fresh metadata emits no staleness warning'
    when:
      - 'all contentHashes in .specd-metadata.yaml match the current file hashes'
      - 'CompileContext.execute is called'
    then:
      - 'no staleness warnings are emitted'
  - requirement: 'Step availability'
    name: 'Step unavailable when required artifact not complete'
    when:
      - 'workflow.implementing.requires: [tasks]'
      - 'the tasks artifact effective status is in-progress'
      - 'CompileContext.execute is called with step: implementing'
    then:
      - 'result.stepAvailable is false'
      - 'result.blockingArtifacts includes tasks'
  - requirement: 'Step availability'
    name: 'Step available when all required artifacts are complete'
    when:
      - 'workflow.implementing.requires: [tasks]'
      - 'the tasks artifact effective status is complete'
      - 'CompileContext.execute is called with step: implementing'
    then:
      - 'result.stepAvailable is true'
      - 'result.blockingArtifacts is empty'
  - requirement: 'Step availability'
    name: 'Unavailability does not throw'
    when:
      - 'the requested step required artifacts are not complete'
      - 'CompileContext.execute is called'
    then:
      - 'the result is returned normally — no exception is thrown'
  - requirement: 'Assembled instruction block'
    name: 'instruction entry injected before schema instruction'
    when:
      - 'config.context: [{ instruction: "Always prefer editing existing files." }]'
      - 'CompileContext.execute is called'
    then:
      - 'result.instructionBlock begins with "Always prefer editing existing files."'
      - 'that text appears before the schema instruction'
  - requirement: 'Assembled instruction block'
    name: 'file entry read via FileReader and injected verbatim before schema instruction'
    when:
      - 'config.context: [{ file: "specd-bootstrap.md" }]'
      - 'FileReader.read("specd-bootstrap.md") returns "# specd Bootstrap"'
      - 'CompileContext.execute is called'
    then:
      - 'result.instructionBlock begins with "# specd Bootstrap"'
      - 'that content appears before the schema instruction'
  - requirement: 'Assembled instruction block'
    name: 'missing file entry emits a warning'
    when:
      - 'config.context: [{ file: "does-not-exist.md" }]'
      - 'FileReader.read("does-not-exist.md") returns null'
      - 'CompileContext.execute is called'
    then:
      - 'a warning is emitted identifying the missing file'
      - 'the entry is absent from the output'
      - 'no error is thrown'
  - requirement: 'Assembled instruction block'
    name: 'Schema instruction included for the active artifact only'
    when:
      - 'schema declares artifacts[spec].instruction and artifacts[verify].instruction'
      - 'CompileContext.execute is called with activeArtifact: spec'
    then:
      - 'result.instructionBlock includes the instruction for spec'
      - 'result.instructionBlock does not include the instruction for verify'
  - requirement: 'Assembled instruction block'
    name: 'No artifact instruction for post-ready steps'
    when:
      - 'CompileContext.execute is called for a post-ready step (e.g. implementing)'
      - 'no activeArtifact is provided'
    then:
      - 'no artifact instructions are included in the instruction block'
  - requirement: 'Assembled instruction block'
    name: 'artifactRules injected for the active artifact only'
    when:
      - 'artifactRules.spec: ["All requirements must use SHALL/MUST"] and artifactRules.verify: ["Scenarios must use GIVEN/WHEN/THEN"]'
      - 'CompileContext.execute is called with activeArtifact: spec'
    then:
      - 'result.instructionBlock includes the spec rules after the schema instruction'
      - 'result.instructionBlock does not include the verify rules'
      - 'the schema instruction is not replaced'
  - requirement: 'Assembled instruction block'
    name: 'Step hooks fire once regardless of artifact iteration'
    when:
      - 'the designing step declares hooks.pre: [{ instruction: "Plan your approach first." }]'
      - 'CompileContext.execute is called twice — once with activeArtifact: spec and once with activeArtifact: tasks'
    then:
      - 'both calls include the designing pre-hook instruction'
  - requirement: 'Assembled instruction block'
    name: 'contextSections extracted from context specs'
    when:
      - 'schema declares artifacts[specs].contextSections with selector matching Requirements section'
      - 'auth/jwt/spec.md has a ## Requirements section'
      - 'CompileContext.execute is called with stale or absent metadata for auth/jwt'
    then:
      - 'result.instructionBlock includes the serialized Requirements section from auth/jwt/spec.md labelled as rules'
  - requirement: 'Assembled instruction block'
    name: 'instruction hooks included but run hooks excluded'
    when:
      - 'workflow.archiving.hooks.pre contains { instruction: "Review delta specs" } and { run: "pnpm test" }'
      - 'CompileContext.execute is called with step: archiving'
    then:
      - 'result.instructionBlock includes "Review delta specs"'
      - '"pnpm test" is not included in the instruction block'
  - requirement: 'Missing spec IDs emit a warning'
    name: 'Non-existent spec ID emits a warning'
    when:
      - 'an include pattern matches a spec ID that does not exist in SpecRepository'
      - 'CompileContext.execute is called'
    then:
      - 'a warning is emitted identifying the missing path'
      - 'the path is skipped'
      - 'no error is thrown'
  - requirement: 'Unknown workspace qualifiers emit a warning'
    name: 'Unknown workspace qualifier in include pattern'
    when:
      - 'contextIncludeSpecs: [unknown-workspace:*]'
      - 'unknown-workspace is not declared in the active config'
      - 'CompileContext.execute is called'
    then:
      - 'result.warnings includes a warning about the unknown qualifier'
      - 'no exception is thrown'
