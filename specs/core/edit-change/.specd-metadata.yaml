title: EditChange
description: The `EditChange` use case modifies the spec scope of an existing change by adding or removing spec IDs. Workspaces are never managed directly â€” they are derived from the resulting `specIds` via the `Change.workspaces` getter. Any effective modification to `specIds` triggers approval invalidation.
dependsOn:
  - core:core/change
  - core:core/composition
context:
  - The `EditChange` use case modifies the spec scope of an existing change by adding or removing spec IDs. Workspaces are never managed directly â€” they are derived from the resulting `specIds` via the `Change.workspaces` getter. Any effective modification to `specIds` triggers approval invalidation.
rules:
  - requirement: Input contract
    rules:
      - |-
        `EditChange.execute` SHALL accept an `EditChangeInput` with the following fields:

        * `name` (required, string) â€” the change slug to edit
        * `addSpecIds` (optional, string array) â€” spec IDs to add to the change's `specIds`
        * `removeSpecIds` (optional, string array) â€” spec IDs to remove from the change's `specIds`
  - requirement: Change lookup
    rules:
      - The use case MUST load the change by `name` via `ChangeRepository.get`. If no change with the given name exists, it MUST throw `ChangeNotFoundError`.
  - requirement: No-op when no spec changes requested
    rules:
      - 'If both `addSpecIds` and `removeSpecIds` are absent or empty, the use case MUST return the unchanged change with `invalidated: false` without persisting or resolving actor identity.'
  - requirement: Removal precedes addition
    rules:
      - When both `removeSpecIds` and `addSpecIds` are provided, removals MUST be applied before additions. This allows a caller to replace a spec ID by removing the old one and adding the new one in a single call.
  - requirement: Removal of absent spec throws
    rules:
      - If any spec ID in `removeSpecIds` is not present in the change's current `specIds`, the use case MUST throw `SpecNotInChangeError` for that spec ID. Removal is atomic per ID â€” the first missing ID aborts the entire operation.
  - requirement: Addition is idempotent
    rules:
      - If a spec ID in `addSpecIds` already exists in the change's `specIds` (after removals), it MUST be silently skipped â€” no duplicate is added and no error is thrown.
  - requirement: No-op when specIds unchanged after processing
    rules:
      - "If the resulting `specIds` list is identical (same length, same order) to the change's current `specIds`, the use case MUST return the unchanged change with `invalidated: false` without persisting."
  - requirement: Approval invalidation on effective change
    rules:
      - |-
        When the resulting `specIds` differ from the current set, the use case MUST:

        1. Resolve the current actor via `ActorResolver.identity()`
        2. Call `change.updateSpecIds(newSpecIds, actor)` â€” this records an `invalidated` event with cause `spec-change` and a `transitioned` event
        3. Persist the change via `ChangeRepository.save`
        4. Return `{ change, invalidated: true }`
  - requirement: Output contract
    rules:
      - |-
        `EditChange.execute` MUST return an `EditChangeResult` with:

        * `change` â€” the `Change` entity (updated or unchanged)
        * `invalidated` â€” `true` if approvals were invalidated, `false` otherwise
constraints:
  - The use case MUST NOT modify workspaces directly â€” they are always derived from specIds
  - The use case MUST NOT validate spec IDs against the filesystem â€” specs may not yet exist
  - Actor identity is only resolved when a persistence-worthy change occurs
scenarios:
  - requirement: Change lookup
    name: Change does not exist
    when:
      - execute is called with a name that does not exist in the repository
    then:
      - it throws ChangeNotFoundError
  - requirement: No-op when no spec changes requested
    name: Both add and remove are absent
    when:
      - execute is called with only name (no addSpecIds, no removeSpecIds)
    then:
      - 'it returns { change, invalidated: false }'
      - AND ChangeRepository.save is not called
  - requirement: No-op when no spec changes requested
    name: Both add and remove are empty arrays
    when:
      - 'execute is called with addSpecIds: [] and removeSpecIds: []'
    then:
      - 'it returns { change, invalidated: false }'
      - AND ChangeRepository.save is not called
  - requirement: Removal precedes addition
    name: Remove and add in same call
    given:
      - "a change with specIds: ['auth/login', 'billing/invoices']"
    when:
      - "execute is called with removeSpecIds: ['auth/login'] and addSpecIds: ['auth/signup']"
    then:
      - the resulting specIds are ['billing/invoices', 'auth/signup']
      - AND invalidated is true
  - requirement: Removal of absent spec throws
    name: Removing a spec not in the change
    given:
      - "a change with specIds: ['auth/login']"
    when:
      - "execute is called with removeSpecIds: ['billing/invoices']"
    then:
      - it throws SpecNotInChangeError
  - requirement: Addition is idempotent
    name: Adding a spec already present
    given:
      - "a change with specIds: ['auth/login']"
    when:
      - "execute is called with addSpecIds: ['auth/login']"
    then:
      - specIds remains ['auth/login']
      - AND invalidated is false
  - requirement: No-op when specIds unchanged after processing
    name: Remove and re-add the same spec
    given:
      - "a change with specIds: ['auth/login', 'billing/invoices']"
    when:
      - "execute is called with removeSpecIds: ['billing/invoices'] and addSpecIds: ['billing/invoices']"
    then:
      - the resulting specIds are ['auth/login', 'billing/invoices']
      - AND invalidated is false
  - requirement: Approval invalidation on effective change
    name: Adding a new spec triggers invalidation
    given:
      - "a change with specIds: ['auth/login']"
    when:
      - "execute is called with addSpecIds: ['billing/invoices']"
    then:
      - change.updateSpecIds is called with the new spec list and the resolved actor
      - AND the change is persisted via ChangeRepository.save
      - AND invalidated is true
  - requirement: Approval invalidation on effective change
    name: Removing a spec triggers invalidation
    given:
      - "a change with specIds: ['auth/login', 'billing/invoices']"
    when:
      - "execute is called with removeSpecIds: ['billing/invoices']"
    then:
      - change.updateSpecIds is called with ['auth/login'] and the resolved actor
      - AND the change is persisted
      - AND invalidated is true
