title: GetStatus
description: Users and tooling need a quick way to see where a change stands — both its lifecycle state and which artifacts are actually ready — without loading file content. The `GetStatus` use case loads a single change by name and reports its current lifecycle state along with the effective status of each artifact, cascading through dependency chains so that an artifact whose hashes match may still show `in-progress` if any of its required dependencies are not `complete`.
dependsOn:
  - core:core/change
  - core:core/kernel
  - core:core/transition-change
  - core:core/schema-format
  - core:core/config
context:
  - Users and tooling need a quick way to see where a change stands — both its lifecycle state and which artifacts are actually ready — without loading file content. The `GetStatus` use case loads a single change by name and reports its current lifecycle state along with the effective status of each artifact, cascading through dependency chains so that an artifact whose hashes match may still show `in-progress` if any of its required dependencies are not `complete`.
rules:
  - requirement: Accepts a change name as input
    rules:
      - '`GetStatus.execute()` MUST accept a `GetStatusInput` containing a `name` string that identifies the change to look up.'
  - requirement: Returns the change and its artifact statuses
    rules:
      - |-
        On success, `execute()` MUST return a `GetStatusResult` containing:

        - `change` -- the loaded `Change` entity with its current artifact state
        - `artifactStatuses` -- an array of `ArtifactStatusEntry` objects, one per artifact attached to the change

        Each `ArtifactStatusEntry` MUST contain:

        - `type` -- the artifact type identifier (e.g. `'proposal'`, `'spec'`)
        - `effectiveStatus` -- the effective `ArtifactStatus` after cascading through required dependencies via `Change.effectiveStatus(type)`
        - `files` -- an array of `ArtifactFileStatus` objects, one per file in the artifact

        Each `ArtifactFileStatus` MUST contain:

        - `key` -- the file key (artifact type id for `scope: change`, spec ID for `scope: spec`)
        - `filename` -- the relative filename within the change directory
        - `status` -- the `ArtifactStatus` of that individual file
  - requirement: Throws ChangeNotFoundError for unknown changes
    rules:
      - If no change with the given name exists in the repository, `execute()` MUST throw a `ChangeNotFoundError` with code `CHANGE_NOT_FOUND`. It MUST NOT return `null`.
  - requirement: Constructor dependencies
    rules:
      - |-
        `GetStatus` MUST accept the following constructor arguments:

        - `changes: ChangeRepository` — for loading changes by name
        - `schemas: SchemaRegistry` — for resolving the active schema
        - `schemaRef: string` — the schema reference string from project config
        - `workspaceSchemasPaths: ReadonlyMap<string, string>` — workspace-to-schemas-path map for schema resolution
        - `approvals: { readonly spec: boolean; readonly signoff: boolean }` — whether approval gates are active

        It MUST delegate to `ChangeRepository.get(name)` to load the change. The additional dependencies follow the same injection pattern used by `TransitionChange`, `CompileContext`, and other use cases that need schema access.
  - requirement: Reports effective status for every artifact
    rules:
      - The `artifactStatuses` array MUST contain exactly one entry per artifact in the change's artifact map. It MUST NOT omit artifacts and MUST NOT include entries for artifacts that do not exist on the change.
  - requirement: Returns lifecycle context
    rules:
      - |-
        On success, `GetStatusResult` MUST include a `lifecycle` object with the following fields:

        - `validTransitions` — a `readonly ChangeState[]` listing all structurally valid transitions from the current state, as defined by `VALID_TRANSITIONS[state]`
        - `availableTransitions` — a `readonly ChangeState[]` listing the subset of `validTransitions` where the target state's workflow `requires` are all satisfied (each required artifact has effective status `complete` or `skipped`). This is a dry-run: it tells the consumer which transitions would succeed right now without attempting them.
        - `blockers` — a `readonly` array of blocker entries, one per valid-but-unavailable transition. Each entry MUST contain:
          - `transition: ChangeState` — the blocked target state
          - `reason: 'requires' | 'tasks-incomplete'` — why the transition is blocked
          - `blocking: readonly string[]` — artifact IDs whose effective status is neither `complete` nor `skipped`
        - `approvals` — `{ readonly spec: boolean; readonly signoff: boolean }` reflecting whether each approval gate is active in the project config
        - `nextArtifact` — `string | null`; the ID of the next artifact in schema-declared order whose `requires` are all satisfied (each required artifact has effective status `complete` or `skipped`) but whose own effective status is neither `complete` nor `skipped`. `null` when all artifacts are done.
        - `changePath` — `string`; the filesystem path to the change directory, obtained from `ChangeRepository.changePath(change)`
        - `schemaInfo` — `{ readonly name: string; readonly version: number } | null`; the active schema's name and version from schema resolution. `null` when schema resolution fails. Consumers MUST use this for schema mismatch warnings instead of resolving the schema independently.
  - requirement: Graceful degradation when schema resolution fails
    rules:
      - |-
        If schema resolution fails (e.g. schema not found, version mismatch), the `lifecycle` object MUST still be present with degraded values:

        - `validTransitions` MUST be populated normally (it is a static lookup, independent of schema)
        - `availableTransitions` MUST be an empty array
        - `blockers` MUST be an empty array
        - `approvals` MUST be populated normally (it is injected config, independent of schema)
        - `nextArtifact` MUST be `null`
        - `changePath` MUST be populated normally
        - `schemaInfo` MUST be `null`

        The use case MUST NOT throw when schema resolution fails — it degrades the lifecycle fields silently.
constraints:
  - The use case does not modify the change — it is a read-only query
  - Artifact content is not loaded; only status metadata is returned
  - The effective status computation is delegated to the Change entity, not performed by the use case itself
  - The lifecycle computation adds zero additional I/O beyond schema resolution — VALID_TRANSITIONS is a static lookup, effectiveStatus is already computed, and schema.workflowStep() / schema.artifacts() are in-memory after resolution
  - changePath is obtained from ChangeRepository.changePath(change) which the repository already exposes
scenarios:
  - requirement: Returns the change and its artifact statuses
    name: Change with multiple artifacts
    given:
      - a change add-login exists with artifacts proposal (complete) and spec (in-progress)
    when:
      - "execute({ name: 'add-login' }) is called"
    then:
      - the result contains the Change entity for add-login
      - 'AND artifactStatuses has two entries: one for proposal and one for spec'
      - AND each entry's effectiveStatus reflects the value returned by Change.effectiveStatus(type)
  - requirement: Returns the change and its artifact statuses
    name: Change with no artifacts
    given:
      - a change empty-change exists with an empty artifact map
    when:
      - "execute({ name: 'empty-change' }) is called"
    then:
      - the result contains the Change entity
      - AND artifactStatuses is an empty array
  - requirement: Throws ChangeNotFoundError for unknown changes
    name: Change does not exist
    when:
      - "execute({ name: 'nonexistent' }) is called"
    then:
      - a ChangeNotFoundError is thrown with code CHANGE_NOT_FOUND
      - AND the error message contains 'nonexistent'
  - requirement: Reports effective status for every artifact
    name: Effective status cascades through dependencies
    given:
      - a change has artifact spec that depends on proposal
      - AND spec hashes match (would be complete in isolation)
      - AND proposal is in-progress
    when:
      - execute() is called for this change
    then:
      - the effectiveStatus for spec is in-progress (cascaded from its dependency)
      - AND the effectiveStatus for proposal is in-progress
  - requirement: Reports effective status for every artifact
    name: Skipped artifacts satisfy dependencies
    given:
      - a change has artifact spec that depends on proposal
      - AND proposal is skipped
      - AND spec hashes match
    when:
      - execute() is called for this change
    then:
      - the effectiveStatus for spec is complete
      - AND the effectiveStatus for proposal is skipped
  - requirement: Returns lifecycle context
    name: Valid transitions from designing state
    given:
      - a change in designing state
    when:
      - execute() is called
    then:
      - lifecycle.validTransitions contains exactly the states defined in VALID_TRANSITIONS['designing']
  - requirement: Returns lifecycle context
    name: Available transitions when all requires are satisfied
    given:
      - a change in designing state
      - AND all artifacts required by the ready workflow step have effective status complete
    when:
      - execute() is called
    then:
      - lifecycle.availableTransitions includes ready
  - requirement: Returns lifecycle context
    name: Blocked transition with unsatisfied requires
    given:
      - a change in designing state
      - AND artifact specs has effective status missing
      - AND the ready workflow step requires specs
    when:
      - execute() is called
    then:
      - lifecycle.availableTransitions does not include ready
      - "AND lifecycle.blockers contains an entry with transition: 'ready', reason: 'requires', and blocking including 'specs'"
  - requirement: Returns lifecycle context
    name: Approvals reflect injected config
    given:
      - 'GetStatus was constructed with approvals: { spec: true, signoff: false }'
    when:
      - execute() is called
    then:
      - 'lifecycle.approvals is { spec: true, signoff: false }'
  - requirement: Returns lifecycle context
    name: Next artifact resolves first unsatisfied artifact with met requires
    given:
      - a change with artifacts proposal (complete), specs (missing), verify (missing)
      - AND specs requires proposal
      - AND verify requires specs
    when:
      - execute() is called
    then:
      - lifecycle.nextArtifact is 'specs'
  - requirement: Returns lifecycle context
    name: Next artifact is null when all artifacts are complete
    given:
      - all artifacts have effective status complete
    when:
      - execute() is called
    then:
      - lifecycle.nextArtifact is null
  - requirement: Returns lifecycle context
    name: Next artifact skips artifacts whose requires are not met
    given:
      - artifacts proposal (missing), specs (missing), design (missing)
      - AND specs requires proposal, design requires proposal and specs
    when:
      - execute() is called
    then:
      - lifecycle.nextArtifact is 'proposal' (the only artifact with all requires satisfied)
  - requirement: Returns lifecycle context
    name: Change path is included
    when:
      - execute() is called for an existing change
    then:
      - lifecycle.changePath equals the value returned by ChangeRepository.changePath(change)
  - requirement: Returns lifecycle context
    name: Schema info is included when resolution succeeds
    given:
      - schema resolution succeeds with name schema-std and version 1
    when:
      - execute() is called
    then:
      - "lifecycle.schemaInfo is { name: 'schema-std', version: 1 }"
  - requirement: Returns lifecycle context
    name: Skipped artifacts count as satisfied requires for available transitions
    given:
      - a change in designing state
      - AND all artifacts required by ready have effective status complete or skipped
    when:
      - execute() is called
    then:
      - lifecycle.availableTransitions includes ready
  - requirement: Graceful degradation when schema resolution fails
    name: Schema resolution failure degrades lifecycle fields
    given:
      - SchemaRegistry.resolve() throws an error
    when:
      - execute() is called
    then:
      - the result does not throw
      - AND lifecycle.validTransitions is populated normally
      - AND lifecycle.availableTransitions is an empty array
      - AND lifecycle.blockers is an empty array
      - AND lifecycle.approvals is populated normally
      - AND lifecycle.nextArtifact is null
      - AND lifecycle.changePath is populated normally
      - AND lifecycle.schemaInfo is null
