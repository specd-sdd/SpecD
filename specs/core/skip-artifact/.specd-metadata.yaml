title: SkipArtifact
description: Not every change needs every optional artifact, but the system must distinguish "intentionally omitted" from "forgotten" to avoid blocking downstream steps on missing files. The `SkipArtifact` use case explicitly marks an optional artifact as skipped, signalling deliberate omission so that dependency chains and workflow steps treat it as resolved. Only optional artifacts may be skipped — required artifacts MUST be produced.
dependsOn:
  - core:core/change
  - core:core/composition
context:
  - Not every change needs every optional artifact, but the system must distinguish "intentionally omitted" from "forgotten" to avoid blocking downstream steps on missing files. The `SkipArtifact` use case explicitly marks an optional artifact as skipped, signalling deliberate omission so that dependency chains and workflow steps treat it as resolved. Only optional artifacts may be skipped — required artifacts MUST be produced.
rules:
  - requirement: Input contract
    rules:
      - |-
        `SkipArtifact.execute` SHALL accept a `SkipArtifactInput` with the following fields:

        - `name` (required, string) — the change slug
        - `artifactId` (required, string) — the artifact type ID to skip (e.g. `'proposal'`)
        - `reason` (optional, string) — explanation for why the artifact is being skipped
  - requirement: Change lookup
    rules:
      - The use case MUST load the change by `name` via `ChangeRepository.get`. If no change with the given name exists, it MUST throw `ChangeNotFoundError`.
  - requirement: Artifact existence check
    rules:
      - The use case MUST look up the artifact on the change via `change.getArtifact(artifactId)`. If the artifact does not exist on the change, it MUST throw `ArtifactNotFoundError`.
  - requirement: Only optional artifacts may be skipped
    rules:
      - 'If the resolved artifact has `optional: false`, the use case MUST throw `ArtifactNotOptionalError`. Required artifacts cannot be skipped.'
  - requirement: Recording and marking
    rules:
      - |-
        When the artifact exists and is optional, the use case MUST:

        1. Resolve the current actor via `ActorResolver.identity()`
        2. Call `change.recordArtifactSkipped(artifactId, actor, reason)` to record the skip event on the change
        3. Call `artifact.markSkipped()` to update the artifact's status
  - requirement: Persistence and output
    rules:
      - After recording and marking, the use case MUST persist the change via `ChangeRepository.save` and return the updated `Change` entity.
constraints:
  - The use case validates artifact optionality before resolving actor identity — the actor is not resolved if the artifact is required or nonexistent
  - The reason field is passed through to the domain event; it is not validated beyond being an optional string
scenarios:
  - requirement: Change lookup
    name: Change does not exist
    when:
      - execute is called with a name that does not exist in the repository
    then:
      - it throws ChangeNotFoundError
  - requirement: Artifact existence check
    name: Artifact does not exist on the change
    given:
      - a change with no artifact matching the given artifactId
    when:
      - execute is called with that artifactId
    then:
      - it throws ArtifactNotFoundError
  - requirement: Only optional artifacts may be skipped
    name: Skipping a required artifact
    given:
      - a change with an artifact where optional is false
    when:
      - execute is called with that artifact's ID
    then:
      - it throws ArtifactNotOptionalError
  - requirement: Recording and marking
    name: Successfully skipping an optional artifact
    given:
      - a change with an optional artifact
    when:
      - execute is called with the artifact's ID and a reason
    then:
      - change.recordArtifactSkipped is called with the artifact ID, the resolved actor, and the reason
      - AND artifact.markSkipped() is called
  - requirement: Recording and marking
    name: Skipping without a reason
    given:
      - a change with an optional artifact
    when:
      - execute is called without a reason
    then:
      - change.recordArtifactSkipped is called with undefined as the reason
      - AND the artifact is still marked as skipped
  - requirement: Persistence and output
    name: Change is persisted and returned
    given:
      - a successful skip operation
    when:
      - execute completes
    then:
      - ChangeRepository.save is called with the updated change
      - AND the returned value is the Change entity
