title: 'ArchiveChange'
description: >
  Defines the ArchiveChange application use case that finalises a completed change by merging
  delta artifacts into project specs, moving the change directory to the archive, and firing
  lifecycle hooks. Read this when implementing or modifying archiving logic, delta merge steps,
  hook execution order, or the archive result shape.
keywords:
  - 'archive-change'
  - 'delta-merge'
  - 'spec-sync'
  - 'lifecycle-hooks'
  - 'artifact-parser'
  - 'archived-change'
  - 'pre-archive-hooks'
  - 'metadata-refresh'
dependsOn:
  - 'core:core/change'
  - 'core:core/schema-format'
  - 'core:core/delta-format'
  - 'core:core/validate-artifacts'
  - 'core:core/storage'
  - 'core:core/config'
  - 'core:core/spec-metadata'
  - 'default:_global/architecture'
  - 'core:core/workspace'
  - 'core:core/spec-id-format'
contentHashes:
  'spec.md': 'sha256:be7dd440f5b62d2f4e1be0de4e36824e593af9455953274ff3ffb31ece6a596d'
  'verify.md': 'sha256:cc092a9faab12766a45611bb2063fac15b1c9f8abcbaaf49ffd652633880655b'
rules:
  - requirement: 'Ports and constructor'
    rules:
      - 'ArchiveChange receives at construction time: ChangeRepository, a map of SpecRepository instances (one per configured workspace), ArchiveRepository, HookRunner, GitAdapter, ArtifactParserRegistry, schemaRef, workspaceSchemasPaths, projectRoot, changesPath, and projectHooks.'
      - 'schemaRef is the schema reference string from specd.yaml; workspaceSchemasPaths is the resolved workspace-to-schemas-path map passed through to SchemaRegistry.resolve().'
      - 'projectRoot is the absolute path to the project root (the directory containing specd.yaml); changesPath is the absolute path to the changes directory.'
      - 'projectHooks contains the project-level workflow hook definitions from specd.yaml.'
      - 'All constructor parameters are injected at kernel composition time, not passed per invocation.'
      - 'hookVariables is built internally by ArchiveChange from projectRoot and changesPath; the caller does not provide it.'
      - 'specs is keyed by workspace name; ArchiveChange looks up the SpecRepository for each spec ID workspace before reading or writing.'
      - 'ArtifactParserRegistry is a map from format name (markdown, json, yaml, plaintext) to the corresponding ArtifactParser adapter.'
      - 'ArchiveChange does not instantiate parsers directly; the bootstrap layer constructs and injects ArtifactParserRegistry.'
  - requirement: 'Input'
    rules:
      - 'ArchiveChange.execute receives name (the change name to archive).'
  - requirement: 'Schema name guard'
    rules:
      - 'After resolving the schema from config, ArchiveChange must compare schema.name() with change.schemaName.'
      - 'If they differ, ArchiveChange must throw SchemaMismatchError.'
      - 'The schema name guard must happen before the archivable guard, any hooks, or file modifications.'
  - requirement: 'Archivable guard'
    rules:
      - 'The first step of ArchiveChange.execute after the schema name guard must call change.assertArchivable().'
      - 'If the change is not in archivable state, this throws InvalidStateTransitionError and the archive is aborted without running any hooks or modifying any files.'
  - requirement: 'Pre-archive hooks'
    rules:
      - 'After the archivable guard passes, ArchiveChange must run all run: hooks declared in the schema workflow[archiving].hooks.pre followed by any project-level workflow[archiving].hooks.pre entries, in declaration order.'
      - 'instruction: hook entries in pre are not executed by ArchiveChange; they are AI context injected by CompileContext at skill compile time.'
      - 'If any pre-archive run: hook exits with a non-zero code, ArchiveChange must abort immediately and throw HookFailedError with the hook command, exit code, and stderr.'
      - 'No files are modified before a failed pre-archive hook.'
  - requirement: 'Delta merge and spec sync'
    rules:
      - 'After all pre-archive hooks succeed, ArchiveChange must merge each delta artifact into the project spec and sync the result to SpecRepository.'
      - 'For each spec ID in change.specIds, resolve the active schema for that spec workspace.'
      - 'For each artifact that declares delta: true, look up the ArtifactParser for the artifact format from ArtifactParserRegistry; if no adapter is registered, throw.'
      - 'Load the delta file from ChangeRepository (filename artifact-output-filename.delta.yaml); if absent or skipped, skip.'
      - 'Parse the delta file as YAML to obtain the array of delta entries.'
      - 'Load the base artifact content from SpecRepository; if absent, treat as empty document via ArtifactParser.parse(empty string).'
      - 'Parse the base content via ArtifactParser.parse(baseContent) to obtain a base AST.'
      - 'Call ArtifactParser.apply(baseAST, deltaEntries) to produce the merged AST; if apply throws DeltaApplicationError, re-throw it.'
      - 'Serialize the merged AST via ArtifactParser.serialize(mergedAST) and save the result to SpecRepository.'
      - 'For each artifact with delta: false (new file artifacts), load from ChangeRepository and save directly to SpecRepository if not absent or skipped.'
  - requirement: 'Archive repository call'
    rules:
      - 'After syncing all specs, ArchiveChange must resolve the git actor via GitAdapter.identity() before calling archiveRepository.archive().'
      - 'If identity() throws, the archive proceeds without an actor.'
      - 'ArchiveChange calls archiveRepository.archive(change, { actor }) when an actor is available, or archiveRepository.archive(change, {}) when it is not.'
      - 'The ArchiveRepository port is responsible for constructing the ArchivedChange record; the use case never builds it directly.'
      - 'archivedName must be the full timestamped directory name YYYYMMDD-HHmmss-name where the timestamp is derived from change.createdAt, never from wall-clock time.'
      - 'archivedAt is the timestamp when the archive operation completes, set by the repository.'
      - 'archivedBy is optional and is the git identity of the actor; absent if git identity was unavailable.'
      - 'workspace is the SpecPath of the primary workspace (the first entry in change.workspaces).'
      - 'artifacts contains artifact metadata tracked by the repository.'
      - 'The FsArchiveRepository implementation moves the change directory and appends an entry to index.jsonl; the use case has no knowledge of these implementation details.'
      - 'ArchivedChange has no approval field and no wasStructural flag.'
  - requirement: 'Post-archive hooks'
    rules:
      - 'After archiveRepository.archive() succeeds, ArchiveChange must run all run: hooks declared in workflow[archiving].hooks.post, schema hooks first then project-level hooks, in declaration order.'
      - 'instruction: post hooks are AI context and are not executed.'
      - 'Post-archive hook failures do not roll back the archive.'
      - 'ArchiveChange collects post-hook failures and returns them in the result.'
  - requirement: 'Spec metadata refresh signal'
    rules:
      - 'After post-archive hooks complete, ArchiveChange must collect the set of spec paths modified during delta merge and spec sync.'
      - 'These are included in the result so the caller can trigger metadata regeneration.'
      - 'ArchiveChange does not invoke the LLM extraction agent directly; it only signals which specs need refresh.'
  - requirement: 'Result shape'
    rules:
      - 'ArchiveChange.execute must return a result object.'
      - 'The result must include archivedChange (the ArchivedChange record), postHookFailures (array of failed hook commands, empty on success), and staleMetadataSpecPaths (array of spec paths needing metadata regeneration).'
      - 'ArchiveChange throws on pre-archive hook failure or assertArchivable failure; post-archive failures are returned, not thrown.'
constraints:
  - 'change.assertArchivable() must be called before any hooks or file modifications.'
  - 'Pre-archive hook failures abort the archive and throw; no partial state is written.'
  - 'Post-archive hook failures are returned in the result; the archive is not rolled back.'
  - 'ArchiveChange must not call change.invalidate() or any mutation on the Change entity; the change is already at its terminal state.'
  - 'ArchiveChange never constructs ArchivedChange directly; it is always returned by archiveRepository.archive(change, { actor }).'
  - 'archivedName must be derived from change.createdAt by the repository, never from wall-clock time at archive execution.'
  - 'ArchiveChange does not delete the change from ChangeRepository; FsArchiveRepository.archive() moves the directory as part of the archive operation.'
scenarios:
  - requirement: 'Archivable guard'
    name: 'Change not in archivable state'
    given: []
    when:
      - 'ArchiveChange.execute is called for a change in done state.'
    then:
      - 'change.assertArchivable() throws InvalidStateTransitionError.'
      - 'No hooks are run.'
      - 'No files are modified.'
  - requirement: 'Archivable guard'
    name: 'Change in archivable state'
    given:
      - 'The change is in archivable state.'
    when:
      - 'ArchiveChange.execute is called.'
    then:
      - 'The archivable guard passes and execution proceeds to pre-archive hooks.'
  - requirement: 'Pre-archive hooks'
    name: 'Pre-archive run hook executes before file sync'
    given:
      - 'The schema declares workflow.archiving.hooks.pre: [{ run: pnpm test }].'
    when:
      - 'ArchiveChange.execute is called.'
    then:
      - 'pnpm test is executed before any spec files are written.'
  - requirement: 'Pre-archive hooks'
    name: 'Failing pre-archive hook aborts archive'
    given:
      - 'A pre-archive run: hook exits with code 1.'
    when:
      - 'ArchiveChange.execute is called.'
    then:
      - 'HookFailedError is thrown.'
      - 'No spec files are written or modified.'
  - requirement: 'Pre-archive hooks'
    name: 'instruction entries in pre hooks are not executed'
    given:
      - "The schema declares a workflow.archiving.hooks.pre entry with instruction: 'Review delta specs'."
    when:
      - 'ArchiveChange.execute is called.'
    then:
      - 'No shell command is run for the instruction entry.'
      - 'Execution proceeds to the next hook.'
  - requirement: 'Delta merge and spec sync'
    name: 'Delta artifact merged into base spec'
    given:
      - 'A change artifact contains delta modifications under MODIFIED Requirements.'
      - 'The base spec in SpecRepository has a Requirements section with the targeted block.'
    when:
      - 'ArchiveChange.execute is called.'
    then:
      - 'The merged content (with the modification applied) is saved to SpecRepository.'
  - requirement: 'Delta merge and spec sync'
    name: 'New artifact synced directly'
    given:
      - 'A change artifact with no deltas[] configuration (a new file).'
    when:
      - 'ArchiveChange.execute is called.'
    then:
      - 'The artifact content is saved as-is to SpecRepository.'
  - requirement: 'Delta merge and spec sync'
    name: 'Optional artifact with missing status — not synced'
    given:
      - 'An optional artifact declared in the schema has no file in the change directory and validatedHash is null (status missing).'
    when:
      - 'ArchiveChange.execute is called.'
    then:
      - 'That artifact is not synced and no entry is created in SpecRepository.'
  - requirement: 'Delta merge and spec sync'
    name: 'Optional artifact with skipped status — not synced'
    given:
      - 'An optional artifact has validatedHash: __skipped__ in the manifest (status skipped) and no file in the change directory.'
    when:
      - 'ArchiveChange.execute is called.'
    then:
      - 'That artifact is not synced and no entry is created in SpecRepository.'
  - requirement: 'Delta merge and spec sync'
    name: 'Conflict detected at archive time'
    given:
      - 'The delta file has a conflict (same block in MODIFIED and REMOVED).'
    when:
      - 'ArchiveChange.execute reaches the merge step.'
    then:
      - 'DeltaConflictError is thrown.'
  - requirement: 'ArchivedChange construction'
    name: 'archivedName derived from createdAt'
    given:
      - "A change with createdAt = 2024-01-15T12:00:00Z and name = 'add-auth-flow'."
    when:
      - 'ArchiveChange constructs the ArchivedChange.'
    then:
      - 'archivedName is 20240115-120000-add-auth-flow.'
  - requirement: 'ArchivedChange construction'
    name: 'ArchivedChange has no approval or wasStructural fields'
    given: []
    when:
      - 'ArchiveChange constructs the ArchivedChange.'
    then:
      - 'The result has no approval field and no wasStructural field.'
  - requirement: 'Post-archive hooks'
    name: 'Post-archive hook runs after archive'
    given:
      - 'The schema declares workflow.archiving.hooks.post: [{ run: ''git commit -m "archive"'' }].'
    when:
      - 'ArchiveChange.execute succeeds.'
    then:
      - 'The run: command executes after archiveRepository.archive() is called.'
  - requirement: 'Post-archive hooks'
    name: 'Failing post-archive hook does not roll back archive'
    given:
      - 'A post-archive run: hook exits with code 1.'
    when:
      - 'ArchiveChange.execute is called.'
    then:
      - 'The archive is not rolled back.'
      - "The result's postHookFailures includes the failed hook."
  - requirement: 'Result shape'
    name: 'Successful archive returns result'
    given: []
    when:
      - 'ArchiveChange.execute completes successfully.'
    then:
      - 'The result includes the ArchivedChange record.'
      - 'postHookFailures is empty.'
  - requirement: 'Result shape'
    name: 'Pre-archive failure throws'
    given: []
    when:
      - 'A pre-archive hook fails.'
    then:
      - 'ArchiveChange.execute throws and does not return a result.'
