title: Config Loader
description: '`createConfigLoader` is the composition factory that produces a `ConfigLoader` instance for delivery mechanisms. It encapsulates filesystem-based config discovery, YAML parsing, Zod validation, path resolution, and workspace inference. This spec covers the public contract of config loading as consumed by CLI and MCP adapters — it does not duplicate the `SpecdConfig` structure or field semantics already specified in `specs/core/config/spec.md`.'
dependsOn:
  - core:core/config
  - core:core/composition
  - default:_global/architecture
context:
  - '`createConfigLoader` is the composition factory that produces a `ConfigLoader` instance for delivery mechanisms. It encapsulates filesystem-based config discovery, YAML parsing, Zod validation, path resolution, and workspace inference. This spec covers the public contract of config loading as consumed by CLI and MCP adapters — it does not duplicate the `SpecdConfig` structure or field semantics already specified in `specs/core/config/spec.md`.'
rules:
  - requirement: Factory signature and return type
    rules:
      - |-
        `createConfigLoader(options)` SHALL accept an `FsConfigLoaderOptions` discriminated union and return a `ConfigLoader`. The options union has two forms:

        * `{ startDir: string }` — discovery mode
        * `{ configPath: string }` — forced mode

        The returned `ConfigLoader` exposes a single method `load(): Promise<SpecdConfig>`.
  - requirement: Discovery mode
    rules:
      - |-
        When constructed with `{ startDir }`, the loader MUST walk up from `startDir` to locate a config file, bounded by the nearest git repository root. At each directory level the loader MUST check for `specd.local.yaml` first; if it exists, that file is used immediately and `specd.yaml` at the same level is not consulted. If neither file exists at a level, the search continues to the parent directory.

        The walk MUST stop at the git repository root — it SHALL NOT traverse above it. If no config file is found before or at the git root, `load()` MUST throw `ConfigValidationError`.

        When `startDir` is not inside a git repository, the loader MUST check only the starting directory itself (both `specd.local.yaml` and `specd.yaml`, in that order) and SHALL NOT walk further up. If neither file exists, `load()` MUST throw `ConfigValidationError`.
  - requirement: Forced mode
    rules:
      - When constructed with `{ configPath }`, the loader MUST resolve the path to an absolute path and use it directly. No `specd.local.yaml` lookup SHALL take place. If the file does not exist, `load()` MUST throw `ConfigValidationError`.
  - requirement: YAML parsing and structural validation
    rules:
      - |-
        The loader MUST parse the config file as YAML. If the file contains invalid YAML syntax, `load()` MUST throw `ConfigValidationError` with a message describing the parse error.

        After parsing, the loader MUST validate the resulting object against a Zod schema that enforces the structural shape defined in `specs/core/config/spec.md`. Any structural mismatch — missing required fields, wrong types, unknown adapter values — MUST produce a `ConfigValidationError` with the Zod issue path and message. Validation MUST occur before any path resolution or domain object construction.
  - requirement: Default workspace is required
    rules:
      - The loader MUST verify that `workspaces.default` exists in the parsed config. If the `default` workspace is absent, `load()` MUST throw `ConfigValidationError` with a message indicating that `workspaces.default` is required.
  - requirement: Path resolution relative to config directory
    rules:
      - All relative paths in the parsed config — `specs.fs.path`, `schemas.fs.path`, `codeRoot`, and all `storage.*.fs.path` values — MUST be resolved relative to the directory containing the active config file. The resolved `SpecdConfig.projectRoot` MUST be set to the config file's parent directory.
  - requirement: Storage path containment
    rules:
      - |-
        When inside a git repository, every resolved storage path (`changes`, `drafts`, `discarded`, `archive`) MUST resolve to a location within or equal to the git repository root. If any storage path resolves outside the git root, `load()` MUST throw `ConfigValidationError` identifying the offending storage key.

        When not inside a git repository, the containment check SHALL NOT apply — storage paths are accepted as resolved.
  - requirement: isExternal inference for workspaces
    rules:
      - |-
        For each workspace, the loader MUST infer the `isExternal` flag by comparing the resolved `specsPath` against the git repository root. A workspace is external when its `specsPath` neither equals the git root nor starts with the git root followed by a path separator.

        When not inside a git repository, `isExternal` MUST be `false` for all workspaces.
  - requirement: Default values for workspace fields
    rules:
      - |-
        The loader MUST apply the following defaults when workspace fields are omitted:

        * **`ownership`**: `'owned'` for the `default` workspace; `'readOnly'` for all other workspaces.
        * **`codeRoot`**: the config file directory for the `default` workspace. For non-default workspaces, `codeRoot` is required — its absence MUST produce `ConfigValidationError`.
        * **`schemasPath`**: for the `default` workspace, when `schemas` is omitted, defaults to `<configDir>/specd/schemas`. For non-default workspaces, when `schemas` is omitted, `schemasPath` MUST be `null`.
  - requirement: contextIncludeSpecs and contextExcludeSpecs pattern validation
    rules:
      - |-
        The loader MUST validate all `contextIncludeSpecs` and `contextExcludeSpecs` patterns at both project level and workspace level. Valid pattern forms are:

        * `*` — bare wildcard
        * `workspace:*` — wildcard qualified by workspace name
        * `prefix/*` — wildcard after a path prefix ending in `/`
        * `workspace:prefix/*` — qualified wildcard after path prefix
        * `path/name` — exact spec path (no wildcard)
        * `workspace:path/name` — qualified exact spec path

        `*` SHALL only appear alone, after `workspace:`, or after a path prefix ending in `/`. Any other position MUST produce `ConfigValidationError`.

        Workspace qualifiers MUST match `/^[a-z][a-z0-9-]*$/`. Path segments MUST match `/^[a-z_][a-z0-9_-]*$/`. Invalid qualifiers or segments MUST produce `ConfigValidationError`.
  - requirement: Workflow and context entry mapping
    rules:
      - |-
        The loader MUST map raw `workflow` entries from YAML to typed `SpecdWorkflowStep` objects, converting `{ run }` hooks to `{ type: 'run', command }` and `{ instruction }` hooks to `{ type: 'instruction', text }`.

        The loader MUST map raw `context` entries preserving their `{ file }` or `{ instruction }` shape.
  - requirement: Approvals default to false
    rules:
      - When the `approvals` section is absent or individual approval gates (`spec`, `signoff`) are omitted, the loader MUST default them to `false`.
  - requirement: All errors are ConfigValidationError
    rules:
      - Every validation failure during `load()` — missing config file, invalid YAML, structural mismatch, missing required fields, path containment violations, invalid patterns — MUST be surfaced as a `ConfigValidationError`. No other error type SHALL be thrown for validation failures.
constraints:
  - createConfigLoader is the only public entry point for config loading — FsConfigLoader MUST NOT be exported from @specd/core
  - The factory returns a ConfigLoader port interface, not the concrete FsConfigLoader class
  - Discovery mode never reads specd.yaml when specd.local.yaml is present at the same directory level — the local file is used exclusively with no merging
  - Forced mode never performs specd.local.yaml lookup
  - Zod validation precedes all path resolution and domain construction
  - projectRoot is always the directory containing the active config file, not startDir
scenarios:
  - requirement: Factory signature and return type
    name: Factory returns a ConfigLoader
    when:
      - "createConfigLoader({ startDir: '/some/dir' }) is called"
    then:
      - the returned object satisfies the ConfigLoader interface
      - AND it exposes a load() method returning Promise<SpecdConfig>
  - requirement: Discovery mode
    name: Config found in startDir
    given:
      - specd.yaml exists in /repo/project/
    when:
      - "load() is called with { startDir: '/repo/project/' }"
    then:
      - it returns a SpecdConfig with projectRoot equal to /repo/project
  - requirement: Discovery mode
    name: Config found in ancestor directory
    given:
      - specd.yaml exists in /repo/ (the git root) but not in /repo/packages/foo/
    when:
      - "load() is called with { startDir: '/repo/packages/foo/' }"
    then:
      - it returns a SpecdConfig with projectRoot equal to /repo
  - requirement: Discovery mode
    name: Local config takes precedence over specd.yaml
    given:
      - both specd.yaml and specd.local.yaml exist in /repo/
    when:
      - "load() is called with { startDir: '/repo/' }"
    then:
      - the loader reads specd.local.yaml exclusively
      - AND specd.yaml is not read
  - requirement: Discovery mode
    name: Local config found at higher directory level
    given:
      - specd.local.yaml exists in /repo/ but only specd.yaml exists in /repo/sub/
    when:
      - "load() is called with { startDir: '/repo/sub/' }"
    then:
      - the loader uses specd.yaml in /repo/sub/ (first match wins during walk)
  - requirement: Discovery mode
    name: Walk stops at git root
    given:
      - specd.yaml exists in /parent/ but the git root is /parent/repo/
    when:
      - "load() is called with { startDir: '/parent/repo/src/' }"
    then:
      - load() throws ConfigValidationError with a message about no config found
  - requirement: Discovery mode
    name: No git repo — checks only startDir
    given:
      - startDir is not inside any git repository
      - AND specd.yaml exists in the parent of startDir but not in startDir itself
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError
  - requirement: Discovery mode
    name: No config file found
    given:
      - no specd.yaml or specd.local.yaml exists in or above startDir up to the git root
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError with a message indicating no config was found
  - requirement: Forced mode
    name: Forced path loads exact file
    given:
      - specd.yaml and specd.local.yaml both exist in /repo/
    when:
      - "load() is called with { configPath: '/repo/specd.yaml' }"
    then:
      - the loader reads /repo/specd.yaml
      - AND specd.local.yaml is not consulted
  - requirement: Forced mode
    name: Forced path resolves relative path
    when:
      - "load() is called with { configPath: './custom/specd.yaml' }"
    then:
      - the path is resolved to an absolute path before reading
  - requirement: Forced mode
    name: Forced path file not found
    given:
      - the file at configPath does not exist
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError with a message about the file not being found
  - requirement: YAML parsing and structural validation
    name: Invalid YAML syntax
    given:
      - the config file contains malformed YAML
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError with a message containing the YAML parse error
  - requirement: YAML parsing and structural validation
    name: Missing required field
    given:
      - the config file is valid YAML but omits the schema field
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError with the Zod path referencing the missing field
  - requirement: YAML parsing and structural validation
    name: Invalid adapter value
    given:
      - 'a workspace specs section declares adapter: s3'
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError
  - requirement: YAML parsing and structural validation
    name: Validation precedes path resolution
    given:
      - the config has both an invalid structure and relative paths
    when:
      - load() is called
    then:
      - the structural error is thrown before any path resolution occurs
  - requirement: Default workspace is required
    name: Missing default workspace
    given:
      - the config declares workspaces but none is named default
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError with a message indicating workspaces.default is required
  - requirement: Path resolution relative to config directory
    name: Relative spec path resolved from config directory
    given:
      - 'the config file is at /repo/specd.yaml and declares specs.fs.path: specs/'
    when:
      - load() is called
    then:
      - the workspace's specsPath is /repo/specs
  - requirement: Path resolution relative to config directory
    name: Storage paths resolved from config directory
    given:
      - 'the config file is at /repo/specd.yaml and declares storage.changes.fs.path: specd/changes'
    when:
      - load() is called
    then:
      - storage.changesPath is /repo/specd/changes
  - requirement: Path resolution relative to config directory
    name: projectRoot is config file directory
    given:
      - the config file is at /repo/specd.yaml
    when:
      - load() is called
    then:
      - projectRoot is /repo
  - requirement: Storage path containment
    name: Storage path outside git root
    given:
      - the git root is /repo/ and storage.changes.fs.path resolves to /other/changes
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError indicating the storage path resolves outside the repo root
  - requirement: Storage path containment
    name: Storage path at git root is valid
    given:
      - the git root is /repo/ and a storage path resolves to exactly /repo
    when:
      - load() is called
    then:
      - the storage path is accepted without error
  - requirement: Storage path containment
    name: No git repo — containment check skipped
    given:
      - startDir is not inside a git repository
      - AND storage paths resolve to arbitrary locations
    when:
      - load() is called
    then:
      - no containment error is thrown
  - requirement: isExternal inference for workspaces
    name: Workspace specsPath inside git root
    given:
      - the git root is /repo/ and a workspace's specsPath resolves to /repo/specs
    when:
      - load() is called
    then:
      - the workspace's isExternal is false
  - requirement: isExternal inference for workspaces
    name: Workspace specsPath outside git root
    given:
      - the git root is /repo/ and a workspace's specsPath resolves to /other-repo/specs
    when:
      - load() is called
    then:
      - the workspace's isExternal is true
  - requirement: isExternal inference for workspaces
    name: No git repo — all workspaces are not external
    given:
      - startDir is not inside a git repository
    when:
      - load() is called
    then:
      - all workspaces have isExternal set to false
  - requirement: Default values for workspace fields
    name: Default workspace ownership defaults to owned
    given:
      - the default workspace omits ownership
    when:
      - load() is called
    then:
      - the default workspace's ownership is 'owned'
  - requirement: Default values for workspace fields
    name: Non-default workspace ownership defaults to readOnly
    given:
      - a non-default workspace omits ownership
    when:
      - load() is called
    then:
      - that workspace's ownership is 'readOnly'
  - requirement: Default values for workspace fields
    name: Default workspace codeRoot defaults to config directory
    given:
      - the default workspace omits codeRoot and the config is at /repo/specd.yaml
    when:
      - load() is called
    then:
      - the default workspace's codeRoot is /repo
  - requirement: Default values for workspace fields
    name: Non-default workspace missing codeRoot
    given:
      - a non-default workspace omits codeRoot
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError indicating codeRoot is required for that workspace
  - requirement: Default values for workspace fields
    name: Default workspace schemasPath defaults when omitted
    given:
      - the default workspace omits schemas and the config is at /repo/specd.yaml
    when:
      - load() is called
    then:
      - the default workspace's schemasPath is /repo/specd/schemas
  - requirement: Default values for workspace fields
    name: Non-default workspace schemasPath is null when omitted
    given:
      - a non-default workspace omits schemas
    when:
      - load() is called
    then:
      - that workspace's schemasPath is null
  - requirement: contextIncludeSpecs and contextExcludeSpecs pattern validation
    name: Valid bare wildcard
    given:
      - contextIncludeSpecs contains '*'
    when:
      - load() is called
    then:
      - validation succeeds
  - requirement: contextIncludeSpecs and contextExcludeSpecs pattern validation
    name: Valid qualified wildcard
    given:
      - contextIncludeSpecs contains 'billing:*'
    when:
      - load() is called
    then:
      - validation succeeds
  - requirement: contextIncludeSpecs and contextExcludeSpecs pattern validation
    name: Valid prefix wildcard
    given:
      - contextIncludeSpecs contains 'auth/*'
    when:
      - load() is called
    then:
      - validation succeeds
  - requirement: contextIncludeSpecs and contextExcludeSpecs pattern validation
    name: Wildcard in disallowed position
    given:
      - contextIncludeSpecs contains 'auth/*/login'
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError
  - requirement: contextIncludeSpecs and contextExcludeSpecs pattern validation
    name: Invalid workspace qualifier
    given:
      - contextExcludeSpecs contains 'BILLING:*'
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError
  - requirement: contextIncludeSpecs and contextExcludeSpecs pattern validation
    name: Workspace-level patterns are also validated
    given:
      - a workspace declares contextIncludeSpecs with an invalid pattern
    when:
      - load() is called
    then:
      - load() throws ConfigValidationError identifying the workspace and field
  - requirement: Workflow and context entry mapping
    name: Run hook mapped to typed form
    given:
      - "the config declares a workflow step with hooks.post: [{ run: 'make test' }]"
    when:
      - load() is called
    then:
      - "the corresponding hook has type: 'run' and command: 'make test'"
  - requirement: Workflow and context entry mapping
    name: Instruction hook mapped to typed form
    given:
      - "the config declares a workflow step with hooks.pre: [{ instruction: 'Check coverage' }]"
    when:
      - load() is called
    then:
      - "the corresponding hook has type: 'instruction' and text: 'Check coverage'"
  - requirement: Approvals default to false
    name: Approvals section absent
    given:
      - the config omits the approvals section entirely
    when:
      - load() is called
    then:
      - approvals.spec is false and approvals.signoff is false
  - requirement: Approvals default to false
    name: Partial approvals section
    given:
      - 'the config declares approvals: { spec: true } without signoff'
    when:
      - load() is called
    then:
      - approvals.spec is true and approvals.signoff is false
  - requirement: All errors are ConfigValidationError
    name: All validation errors use ConfigValidationError
    given:
      - any validation failure occurs during load()
    when:
      - the error is caught
    then:
      - it is an instance of ConfigValidationError
