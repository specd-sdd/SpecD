title: Snapshot Hasher
description: Detecting whether an artifact has changed since it was last validated requires a stable, deterministic content fingerprint that can be stored and compared later. `hashFiles` is a pure domain service that computes SHA-256 content hashes for a set of files, recording a fingerprint at validation time so that infrastructure adapters can detect drift — a file has drifted if its current hash differs from the one stored at last validation.
dependsOn:
  - default:_global/architecture
context:
  - Detecting whether an artifact has changed since it was last validated requires a stable, deterministic content fingerprint that can be stored and compared later. `hashFiles` is a pure domain service that computes SHA-256 content hashes for a set of files, recording a fingerprint at validation time so that infrastructure adapters can detect drift — a file has drifted if its current hash differs from the one stored at last validation.
rules:
  - requirement: Hash format
    rules:
      - 'Each hash is returned as a prefixed hex string: `sha256:<64 hex characters>`. The prefix makes the algorithm explicit and allows future algorithms to be introduced without ambiguity.'
  - requirement: Determinism
    rules:
      - The same content always produces the same hash. Two calls with identical content for the same path must return the same digest.
  - requirement: Path preservation
    rules:
      - The path key is preserved exactly as given. No normalisation, no platform separator conversion.
  - requirement: Empty input
    rules:
      - An empty input object produces an empty result object without error.
  - requirement: Empty file content
    rules:
      - A file with empty string content is hashed normally — the SHA-256 of an empty string is a valid, stable digest.
constraints:
  - Pure function — no I/O, no side effects
  - Input encoding is UTF-8
  - Output keys match input keys exactly
scenarios:
  - requirement: Hash format
    name: Single file hashed
    when:
      - hashFiles is called with one file path and its content
    then:
      - the result contains that path as a key with a value matching sha256:[a-f0-9]{64}
  - requirement: Determinism
    name: Identical content produces identical hash
    when:
      - hashFiles is called twice with the same path and same content
    then:
      - both results have the same hash value for that path
  - requirement: Determinism
    name: Different content produces different hash
    when:
      - two files have different content — including content that differs only in whitespace
    then:
      - their hashes are different
  - requirement: Path preservation
    name: Path used as key
    when:
      - hashFiles is called with a path like specd/changes/foo/proposal.md
    then:
      - the result map contains that exact string as a key
  - requirement: Empty input
    name: Empty input
    when:
      - hashFiles is called with {}
    then:
      - it returns {}
  - requirement: Empty file content
    name: Empty content hashed
    when:
      - hashFiles is called with a file whose content is ""
    then:
      - the result contains a valid sha256:<hex> value for that path
