title: 'Snapshot Hasher'
description: >
  The `hashFiles` service enables drift detection by computing SHA-256 hashes
  of file content to track changes after validation. Use it when you need to
  verify that files haven't changed since they were last validated.
keywords:
  - 'hash-functions'
  - 'file-integrity'
  - 'content-hashing'
  - 'drift-detection'
  - 'pure-functions'
  - 'domain-services'
dependsOn:
  - 'specs/_global/architecture/'
contentHashes:
  spec.md: 'sha256:9a61e6453994faa05f9ac901fa43be47ca1b15d2b87764f59f1a04b96dd07f83'
  verify.md: 'sha256:6b20ea953f6b51ed6ab7fb0dcafe409d5d6f8517c215bddaf9a5e0b933414065'
rules:
  - requirement: 'Hash format'
    rules:
      - 'Each hash is returned as a prefixed hex string: `sha256:<64 hex characters>`.'
      - 'The prefix makes the algorithm explicit and allows future algorithms to be introduced without ambiguity.'
  - requirement: 'Determinism'
    rules:
      - 'The same content always produces the same hash.'
      - 'Two calls with identical content for the same path must return the same digest.'
  - requirement: 'Path preservation'
    rules:
      - 'The path key is preserved exactly as given.'
      - 'No normalisation, no platform separator conversion.'
  - requirement: 'Empty input'
    rules:
      - 'An empty input object produces an empty result object without error.'
  - requirement: 'Empty file content'
    rules:
      - 'A file with empty string content is hashed normally.'
      - 'The SHA-256 of an empty string is a valid, stable digest.'
constraints:
  - 'Pure function — no I/O, no side effects'
  - 'Input encoding is UTF-8'
  - 'Output keys match input keys exactly'
scenarios:
  - requirement: 'Hash format'
    name: 'Single file hashed'
    given: []
    when:
      - '`hashFiles` is called with one file path and its content'
    then:
      - 'the result contains that path as a key with a value matching `sha256:[a-f0-9]{64}`'
  - requirement: 'Determinism'
    name: 'Identical content produces identical hash'
    given: []
    when:
      - '`hashFiles` is called twice with the same path and same content'
    then:
      - 'both results have the same hash value for that path'
  - requirement: 'Determinism'
    name: 'Different content produces different hash'
    given: []
    when:
      - 'two files have different content — including content that differs only in whitespace'
    then:
      - 'their hashes are different'
  - requirement: 'Path preservation'
    name: 'Path used as key'
    given: []
    when:
      - '`hashFiles` is called with a path like `specd/changes/foo/proposal.md`'
    then:
      - 'the result map contains that exact string as a key'
  - requirement: 'Empty input'
    name: 'Empty input'
    given: []
    when:
      - '`hashFiles` is called with `{}`'
    then:
      - 'it returns `{}`'
  - requirement: 'Empty file content'
    name: 'Empty content hashed'
    given: []
    when:
      - '`hashFiles` is called with a file whose content is `""`'
    then:
      - 'the result contains a valid `sha256:<hex>` value for that path'
