title: ContentHasher Port
description: '`ContentHasher` is an application-layer port that defines the contract for computing deterministic content hashes. It isolates the application layer from specific hashing algorithms and cryptographic libraries, allowing implementations to be swapped without changing consumers.'
dependsOn:
  - default:_global/architecture
context:
  - '`ContentHasher` is an application-layer port that defines the contract for computing deterministic content hashes. It isolates the application layer from specific hashing algorithms and cryptographic libraries, allowing implementations to be swapped without changing consumers.'
rules:
  - requirement: Abstract class shape
    rules:
      - 'The port MUST be declared as a TypeScript `abstract class` named `ContentHasher` with a single abstract method `hash(content: string): string`. No concrete behaviour SHALL be provided.'
  - requirement: Hash input
    rules:
      - The `hash` method MUST accept a single `content` parameter of type `string`. Implementations MUST treat the input as UTF-8 encoded text.
  - requirement: Hash output format
    rules:
      - The `hash` method MUST return a string in the format `<algorithm>:<hex>`, where `<algorithm>` is a lowercase identifier for the hashing algorithm (e.g. `sha256`) and `<hex>` is the lowercase hexadecimal digest. This prefixed format makes the algorithm explicit and allows future algorithm changes without ambiguity.
  - requirement: Determinism
    rules:
      - The same input string MUST always produce the same output. Two calls with identical `content` values MUST return identical results.
  - requirement: Empty content
    rules:
      - When `content` is an empty string, the method MUST still return a valid `<algorithm>:<hex>` hash. Implementations SHALL NOT throw or return a sentinel value for empty input.
  - requirement: No side effects
    rules:
      - Implementations MUST be pure with respect to their input — calling `hash` SHALL NOT produce I/O, mutate shared state, or depend on external context beyond the algorithm itself.
constraints:
  - The port lives in application/ports/ per the hexagonal architecture rule
  - No direct dependency on any cryptographic library at the port level
  - The return format <algorithm>:<hex> is mandatory for all implementations
scenarios:
  - requirement: Abstract class shape
    name: Port cannot be instantiated directly
    when:
      - code attempts to instantiate ContentHasher directly
    then:
      - it fails because ContentHasher is abstract
  - requirement: Abstract class shape
    name: Implementation satisfies the contract
    given:
      - a concrete class extending ContentHasher
    when:
      - 'the class implements hash(content: string): string'
    then:
      - it compiles and can be instantiated
  - requirement: Hash output format
    name: Output matches algorithm-prefixed hex format
    when:
      - hash is called with any non-empty string
    then:
      - the result matches the pattern ^[a-z0-9]+:[a-f0-9]+$
  - requirement: Hash output format
    name: SHA-256 implementation returns correct prefix
    given:
      - the Node.js SHA-256 implementation
    when:
      - hash is called with any string
    then:
      - 'the result starts with sha256: followed by exactly 64 hex characters'
  - requirement: Determinism
    name: Identical input produces identical output
    when:
      - hash is called twice with the same content string
    then:
      - both calls return the same value
  - requirement: Determinism
    name: Different input produces different output
    when:
      - hash is called with two distinct content strings
    then:
      - the returned hashes differ
  - requirement: Empty content
    name: Empty string is hashed without error
    when:
      - hash is called with ""
    then:
      - the result is a valid <algorithm>:<hex> string
      - AND the result is deterministic across calls
  - requirement: No side effects
    name: Hash is pure
    when:
      - hash is called multiple times with the same input
    then:
      - no observable state changes occur between calls
      - AND the return value is identical each time
