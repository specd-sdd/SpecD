title: SaveSpecMetadata
description: "Writing metadata to disk without validation risks corrupting the spec's machine-readable summary, and silently overwriting curated `dependsOn` entries can discard human-verified dependency decisions. `SaveSpecMetadata` guards against both: it validates incoming YAML content against the strict schema, protects curated `dependsOn` from silent overwrite, delegates conflict detection to the repository layer, and persists the `.specd-metadata.yaml` artifact to disk. It is invoked by `ArchiveChange` during deterministic metadata generation and may also be called directly by tooling (e.g. the LLM refining metadata)."
dependsOn:
  - core:core/spec-metadata
  - default:_global/architecture
context:
  - "Writing metadata to disk without validation risks corrupting the spec's machine-readable summary, and silently overwriting curated `dependsOn` entries can discard human-verified dependency decisions. `SaveSpecMetadata` guards against both: it validates incoming YAML content against the strict schema, protects curated `dependsOn` from silent overwrite, delegates conflict detection to the repository layer, and persists the `.specd-metadata.yaml` artifact to disk. It is invoked by `ArchiveChange` during deterministic metadata generation and may also be called directly by tooling (e.g. the LLM refining metadata)."
rules:
  - requirement: Input contract
    rules:
      - |-
        `SaveSpecMetadata.execute()` accepts a `SaveSpecMetadataInput` with the following fields:

        * `workspace` (string, required) — the workspace name (e.g. `'default'`, `'billing'`)
        * `specPath` (SpecPath, required) — the spec path within the workspace (e.g. `'auth/oauth'`)
        * `content` (string, required) — raw YAML string to write as `.specd-metadata.yaml`
        * `force` (boolean, optional) — when `true`, skip conflict detection and `dependsOn` overwrite protection
  - requirement: Output contract
    rules:
      - |-
        On success, `execute()` SHALL return a `SaveSpecMetadataResult` containing:

        * `spec` (string) — the qualified spec label in the form `workspace:specName` (e.g. `'default:auth/oauth'`)
  - requirement: Content validation before write
    rules:
      - |-
        The use case MUST validate the incoming `content` before any other operation:

        1. Parse the YAML string via the injected `YamlSerializer`
        2. Reject the content with `MetadataValidationError` if the parsed result is `null`, `undefined`, or not an object (i.e. not a YAML mapping)
        3. Validate the parsed object against `strictSpecMetadataSchema` (the Zod schema defined in the domain layer)
        4. If validation fails, throw `MetadataValidationError` with the Zod issues formatted as a human-readable string
        5. The file MUST NOT be written when validation fails
  - requirement: Workspace resolution
    rules:
      - The use case MUST resolve the workspace from the injected `specRepos` map. If the workspace name does not match any entry in the map, the use case SHALL throw `WorkspaceNotFoundError`.
  - requirement: Spec existence check
    rules:
      - After resolving the workspace, the use case MUST look up the spec via `SpecRepository.get(specPath)`. If the spec does not exist (returns `null`), the use case SHALL throw `SpecNotFoundError` with the qualified spec identifier (`workspace:specPath`).
  - requirement: Conflict detection via originalHash
    rules:
      - When `force` is not set, the use case MUST load the existing `.specd-metadata.yaml` artifact (if any) via `SpecRepository.artifact()` and capture its `originalHash`. This hash is passed to the `SpecArtifact` constructor so that the repository layer can detect concurrent modifications during `save()`. When `force` is set, this step is skipped entirely — no existing artifact is loaded.
  - requirement: dependsOn overwrite protection
    rules:
      - |-
        When `force` is not set and an existing `.specd-metadata.yaml` exists on disk, the use case MUST check whether the incoming content would change the `dependsOn` array:

        1. Parse the existing artifact's content and validate it against `specMetadataSchema` (the lenient schema)
        2. Extract the `dependsOn` arrays from both existing and incoming metadata
        3. Compare the two arrays using `DependsOnOverwriteError.areSame()`, which performs order-independent comparison
        4. If the existing metadata has a non-empty `dependsOn` and the incoming `dependsOn` differs, throw `DependsOnOverwriteError`
        5. If the existing metadata has no `dependsOn` (absent or empty), any incoming `dependsOn` is allowed

        When `force` is set, this check MUST be skipped entirely.
  - requirement: Artifact persistence
    rules:
      - 'After all validations pass, the use case MUST construct a `SpecArtifact` with filename `.specd-metadata.yaml`, the raw YAML content, and the `originalHash` (if captured). It SHALL then delegate to `SpecRepository.save()` with `{ force: true }` when `force` is set, or with an empty options object otherwise.'
  - requirement: Constructor dependencies
    rules:
      - |-
        `SaveSpecMetadata` MUST be constructed with:

        * `specRepos` — a `ReadonlyMap<string, SpecRepository>` mapping workspace names to their repositories
        * `yaml` — a `YamlSerializer` for parsing YAML content

        These are injected by the kernel at composition time. The use case MUST NOT construct its own infrastructure adapters.
constraints:
  - Content validation uses strictSpecMetadataSchema (write-time), not the lenient specMetadataSchema (read-time) — this ensures metadata on disk always meets the strict schema requirements
  - The existing artifact is parsed with specMetadataSchema (lenient) for the dependsOn check, because on-disk metadata may predate strict schema requirements
  - The use case does not handle ArtifactConflictError — it propagates from the repository layer to the caller
  - The use case does not create spec directories — SpecRepository.save() handles directory creation
  - 'Validation order is: content schema validation, workspace resolution, spec existence, conflict detection / dependsOn check, then persist'
scenarios:
  - requirement: Content validation before write
    name: Non-mapping YAML is rejected
    when:
      - execute() is called with content that parses to a scalar (e.g. "hello")
    then:
      - MetadataValidationError is thrown with a message indicating content must be a YAML mapping
      - AND nothing is written to disk
  - requirement: Content validation before write
    name: Null YAML content is rejected
    when:
      - execute() is called with content that parses to null (e.g. an empty string or "~")
    then:
      - MetadataValidationError is thrown
  - requirement: Content validation before write
    name: Missing required fields rejected by strict schema
    given:
      - valid YAML mapping content that omits title
    when:
      - execute() is called
    then:
      - MetadataValidationError is thrown with a message referencing the missing field
  - requirement: Content validation before write
    name: Invalid field types rejected by strict schema
    given:
      - YAML content where keywords is a string instead of an array
    when:
      - execute() is called
    then:
      - MetadataValidationError is thrown with a message referencing the field and type mismatch
  - requirement: Content validation before write
    name: Unknown top-level keys are allowed
    given:
      - 'valid YAML content with all required fields plus an extra key customField: value'
    when:
      - execute() is called
    then:
      - the write succeeds and the extra key is preserved
  - requirement: Workspace resolution
    name: Unknown workspace
    when:
      - "execute() is called with workspace: 'nonexistent'"
    then:
      - WorkspaceNotFoundError is thrown
  - requirement: Spec existence check
    name: Spec does not exist in workspace
    given:
      - the workspace exists but specPath does not match any spec
    when:
      - execute() is called
    then:
      - SpecNotFoundError is thrown with the qualified identifier (e.g. 'default:auth/oauth')
  - requirement: Conflict detection via originalHash
    name: Existing artifact hash is captured for conflict detection
    given:
      - a spec with an existing .specd-metadata.yaml on disk
    when:
      - execute() is called without force
    then:
      - the existing artifact's originalHash is passed to the new SpecArtifact constructor
      - AND if the repository detects a hash mismatch, ArtifactConflictError propagates to the caller
  - requirement: Conflict detection via originalHash
    name: Force skips existing artifact loading
    when:
      - 'execute() is called with force: true'
    then:
      - the existing artifact is not loaded
      - AND the SpecArtifact is constructed without an originalHash
      - 'AND SpecRepository.save() is called with { force: true }'
  - requirement: Conflict detection via originalHash
    name: No existing artifact on disk
    given:
      - a spec with no existing .specd-metadata.yaml
    when:
      - execute() is called without force
    then:
      - originalHash is undefined
      - AND the write proceeds normally
  - requirement: dependsOn overwrite protection
    name: Existing dependsOn would be changed
    given:
      - "existing metadata has dependsOn: ['core:storage', 'core:config']"
      - "AND incoming content has dependsOn: ['core:storage']"
    when:
      - execute() is called without force
    then:
      - DependsOnOverwriteError is thrown
  - requirement: dependsOn overwrite protection
    name: Same dependsOn in different order is allowed
    given:
      - "existing metadata has dependsOn: ['core:config', 'core:storage']"
      - "AND incoming content has dependsOn: ['core:storage', 'core:config']"
    when:
      - execute() is called without force
    then:
      - the write succeeds
  - requirement: dependsOn overwrite protection
    name: No existing dependsOn allows any incoming
    given:
      - existing metadata has no dependsOn field
      - "AND incoming content has dependsOn: ['core:storage']"
    when:
      - execute() is called without force
    then:
      - the write succeeds
  - requirement: dependsOn overwrite protection
    name: Empty existing dependsOn allows any incoming
    given:
      - 'existing metadata has dependsOn: []'
      - "AND incoming content has dependsOn: ['core:storage']"
    when:
      - execute() is called without force
    then:
      - the write succeeds
  - requirement: dependsOn overwrite protection
    name: Force bypasses dependsOn check
    given:
      - "existing metadata has dependsOn: ['core:storage']"
      - "AND incoming content has dependsOn: ['core:other']"
    when:
      - 'execute() is called with force: true'
    then:
      - the write succeeds
  - requirement: Artifact persistence
    name: Successful write returns spec label
    given:
      - valid content, existing workspace, and existing spec with name auth/oauth in workspace default
    when:
      - execute() is called
    then:
      - "the result is { spec: 'default:auth/oauth' }"
  - requirement: Artifact persistence
    name: Artifact is saved with correct filename
    when:
      - execute() succeeds
    then:
      - SpecRepository.save() is called with a SpecArtifact whose filename is .specd-metadata.yaml
  - requirement: Constructor dependencies
    name: Use case receives dependencies via constructor
    when:
      - SaveSpecMetadata is constructed
    then:
      - it receives a ReadonlyMap<string, SpecRepository> and a YamlSerializer
      - AND it does not construct any infrastructure adapters internally
