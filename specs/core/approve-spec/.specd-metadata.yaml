title: ApproveSpec
description: The `ApproveSpec` use case records a spec approval on a change and transitions it to the `spec-approved` state. It enforces that the spec approval gate is enabled, computes artifact hashes using schema-defined pre-hash cleanup rules, and persists the updated change. This is the only path through the spec approval gate in the change lifecycle.
dependsOn:
  - core:core/change
  - core:core/schema-format
  - core:core/composition
  - core:core/kernel
context:
  - The `ApproveSpec` use case records a spec approval on a change and transitions it to the `spec-approved` state. It enforces that the spec approval gate is enabled, computes artifact hashes using schema-defined pre-hash cleanup rules, and persists the updated change. This is the only path through the spec approval gate in the change lifecycle.
rules:
  - requirement: Gate guard
    rules:
      - The use case MUST reject the operation with an `ApprovalGateDisabledError` if the `approvalsSpec` input flag is `false`. The gate check MUST occur before any repository access or side effects.
  - requirement: Change lookup
    rules:
      - The use case MUST load the change by name from the `ChangeRepository`. If no change with the given name exists, it MUST throw a `ChangeNotFoundError`.
  - requirement: Artifact hash computation
    rules:
      - |-
        Before recording the approval, the use case MUST compute a content hash for every artifact in the change. For each artifact:

        1. Load the artifact content from the repository via `ChangeRepository.artifact()`.
        2. If the artifact cannot be loaded (returns `null`), skip it silently.
        3. Resolve the active schema from the `SchemaRegistry` using the configured schema reference and workspace schema paths.
        4. If the schema resolves, build a cleanup map of artifact-type to pre-hash cleanup rules; if it does not resolve, use an empty cleanup map.
        5. Apply the matching cleanup rules (by artifact type) to the content, then hash the cleaned content via the `ContentHasher`.

        The result is a `Record<string, string>` mapping artifact filename to hash string.
  - requirement: Approval recording and state transition
    rules:
      - |-
        The use case MUST resolve the current actor identity via the `ActorResolver`, then:

        1. Call `change.recordSpecApproval(reason, artifactHashes, actor)` to append a `spec-approved` history event.
        2. Call `change.transition('spec-approved', actor)` to advance the lifecycle state.

        The `Change` entity enforces that the transition from the current state to `spec-approved` is valid. If the change is not in `pending-spec-approval` state, the entity throws an `InvalidStateTransitionError`.
  - requirement: Persistence and return value
    rules:
      - After recording the approval and transitioning state, the use case MUST persist the change via `ChangeRepository.save()` and return the updated `Change` entity.
  - requirement: Input contract
    rules:
      - |-
        The `ApproveSpecInput` interface MUST include:

        * `name` (string) -- the change slug identifying the target change.
        * `reason` (string) -- free-text rationale recorded in the approval event.
        * `approvalsSpec` (boolean) -- whether the spec approval gate is enabled in the active configuration.

        All fields are required and readonly.
constraints:
  - The gate check MUST be the first validation step -- no I/O occurs if the gate is disabled.
  - Artifact hashes are computed from on-disk content at approval time, not from cached or in-memory state.
  - The use case does not validate artifact content beyond hashing it -- content validation is a separate concern.
  - The use case does not determine whether the gate should be enabled; the caller passes that decision as approvalsSpec.
scenarios:
  - requirement: Gate guard
    name: Spec approval gate is disabled
    when:
      - 'execute() is called with approvalsSpec: false'
    then:
      - an ApprovalGateDisabledError is thrown with gate 'spec'
      - AND no repository access occurs
  - requirement: Change lookup
    name: Change does not exist
    given:
      - the spec approval gate is enabled
    when:
      - execute() is called with a name that does not exist in the repository
    then:
      - a ChangeNotFoundError is thrown
  - requirement: Artifact hash computation
    name: Artifacts are hashed with schema cleanup rules
    given:
      - the change has two artifacts of type spec and verify
      - AND the schema defines a pre-hash cleanup rule for spec but not verify
    when:
      - the use case computes artifact hashes
    then:
      - the spec artifact content has the cleanup rule applied before hashing
      - AND the verify artifact content is hashed without cleanup
  - requirement: Artifact hash computation
    name: Artifact cannot be loaded
    given:
      - the change has an artifact entry but ChangeRepository.artifact() returns null for it
    when:
      - the use case computes artifact hashes
    then:
      - that artifact is skipped and does not appear in the hash map
  - requirement: Artifact hash computation
    name: Schema does not resolve
    given:
      - the SchemaRegistry returns null for the configured schema reference
    when:
      - the use case computes artifact hashes
    then:
      - all artifacts are hashed without any pre-hash cleanup rules applied
  - requirement: Approval recording and state transition
    name: Change is in pending-spec-approval state
    given:
      - the change is in pending-spec-approval state
    when:
      - execute() completes successfully
    then:
      - the change history contains a spec-approved event with the provided reason, computed artifact hashes, and the resolved actor
      - AND the change state is spec-approved
  - requirement: Approval recording and state transition
    name: Change is not in pending-spec-approval state
    given:
      - the change is in drafting state
    when:
      - execute() is called
    then:
      - an InvalidStateTransitionError is thrown
  - requirement: Persistence and return value
    name: Change is saved and returned
    given:
      - a successful approval
    when:
      - execute() returns
    then:
      - ChangeRepository.save() has been called with the updated change
      - AND the returned Change has state spec-approved
  - requirement: Input contract
    name: All input fields are required
    when:
      - ApproveSpecInput is constructed
    then:
      - name, reason, and approvalsSpec are all required
      - AND all fields are readonly
