title: Artifact AST
description: Every `ArtifactParser` adapter must produce and consume a normalized AST format тАФ a plain JSON-serializable tree of nodes. This format is the contract between parsers, the delta application engine, the selector model, and validation rules. Adapter internals (which parsing library is used, how the native AST is built) are not specified here.
dependsOn:
  - core:core/delta-format
  - core:core/selector-model
context:
  - Every `ArtifactParser` adapter must produce and consume a normalized AST format тАФ a plain JSON-serializable tree of nodes. This format is the contract between parsers, the delta application engine, the selector model, and validation rules. Adapter internals (which parsing library is used, how the native AST is built) are not specified here.
rules:
  - requirement: Common node schema
    rules:
      - |-
        Every node in the normalized AST is a plain object with the following fields:
        * `type` (string, required) тАФ the node type; values are format-specific and defined per format below
        * `label` (string, optional) тАФ the identifying value of the node; this is the field evaluated by `matches` in selectors; present on nodes that have a primary identifier (section heading text, pair key name, etc.)
        * `value` (string | number | boolean | null, optional) тАФ the scalar content of a leaf node; mutually exclusive with `children`
        * `children` (array, optional) тАФ ordered child nodes; mutually exclusive with `value`
        A node may have neither `value` nor `children` (e.g. a thematic break). A node may not have both.
  - requirement: Markdown AST
    rules:
      - |-
        A markdown adapter must normalize to the following node types:
        * `document` тАФ root node; no `label`; has `children`
        * `section` тАФ a heading and all content until the next heading of equal or lesser depth; `label` is the heading text without leading `#` characters and surrounding whitespace (e.g. `"Requirement: Login"`); has `level` (integer 1тАУ6) reflecting the heading depth; has `children`
        * `paragraph` тАФ a prose block; no `label`; has `value` (the paragraph text as plain markdown inline content)
        * `list` тАФ a bullet or numbered list; no `label`; has `ordered` (boolean); has `children`
        * `list-item` тАФ an individual list entry; `label` is the item text; may have `children` for nested lists (in which case `label` holds the item text and `children` holds the nested list nodes)
        * `code-block` тАФ a fenced or indented code block; `label` is the language identifier if present; has `value` (the code content)
        * `thematic-break` тАФ a horizontal rule; no `label`; no `value`; no `children`
        Sections nest by relative heading depth: each section becomes a child of the nearest preceding section whose `level` is strictly lower. Levels need not be contiguous тАФ a `level: 4` section becomes a child of the nearest preceding `level: 1`, `level: 2`, or `level: 3` section, whichever appears last.
        Example тАФ the following markdown:
        ```markdown
        ## Requirements

        ### Requirement: Login

        The system must authenticate users.

        - Email and password
        - Rate-limited to 5 attempts
        ```
        Normalizes to:
        ```json
        {
          "type": "document",
          "children": [
            {
              "type": "section",
              "label": "Requirements",
              "level": 2,
              "children": [
                {
                  "type": "section",
                  "label": "Requirement: Login",
                  "level": 3,
                  "children": [
                    {
                      "type": "paragraph",
                      "value": "The system must authenticate users."
                    },
                    {
                      "type": "list",
                      "ordered": false,
                      "children": [
                        { "type": "list-item", "label": "Email and password" },
                        { "type": "list-item", "label": "Rate-limited to 5 attempts" }
                      ]
                    }
                  ]
                }
              ]
            }
          ]
        }
        ```
  - requirement: YAML AST
    rules:
      - |-
        A YAML adapter must normalize to the following node types:
        * `document` тАФ root node; no `label`; has `children` (the top-level mapping's pairs, or a single sequence)
        * `mapping` тАФ a YAML mapping; no `label`; has `children` (array of `pair` nodes)
        * `pair` тАФ a keyтАУvalue entry; `label` is the key name as a string; has `value` for scalar values, or `children` containing a single `mapping` or `sequence` node for nested structures
        * `sequence` тАФ a YAML sequence; no `label`; has `children` (array of `sequence-item` nodes)
        * `sequence-item` тАФ an item in a sequence; no `label`; has `value` for scalar items, or `children` containing a single `mapping` or `sequence` node for structured items
        Example тАФ the following YAML:
        ```yaml
        schema: spec-driven
        llm:
          model: claude-opus-4-6
          maxTokens: 4096
        ```
        Normalizes to:
        ```json
        {
          "type": "document",
          "children": [
            { "type": "pair", "label": "schema", "value": "spec-driven" },
            {
              "type": "pair",
              "label": "llm",
              "children": [
                {
                  "type": "mapping",
                  "children": [
                    { "type": "pair", "label": "model", "value": "claude-opus-4-6" },
                    { "type": "pair", "label": "maxTokens", "value": 4096 }
                  ]
                }
              ]
            }
          ]
        }
        ```
  - requirement: JSON AST
    rules:
      - |-
        A JSON adapter must normalize to the following node types:
        * `document` тАФ root node; no `label`; has `children` containing a single root node
        * `object` тАФ a JSON object; no `label`; has `children` (array of `property` nodes)
        * `property` тАФ a keyтАУvalue entry; `label` is the key name; has `value` for scalar values, or `children` containing a single `object` or `array` node
        * `array` тАФ a JSON array; no `label`; has `children` (array of `array-item` nodes)
        * `array-item` тАФ an item in an array; no `label`; has `value` for scalar items, or `children` containing a single `object` or `array` node
  - requirement: Plaintext AST
    rules:
      - |-
        A plaintext adapter must normalize to the following node types:
        * `document` тАФ root node; no `label`; has `children`
        * `paragraph` тАФ a block of text separated by blank lines; no `label`; has `value`
        * `line` тАФ a single line of text; no `label`; has `value`
  - requirement: Round-trip fidelity
    rules:
      - |-
        Each adapter must be able to serialize a normalized AST back to the artifact's native format. The round-trip contract:
        * All `label`, `value`, and `children` content is preserved exactly
        * For markdown: heading levels, list types (`ordered`), code block languages, and nesting structure are preserved
        * For YAML: key order within mappings is preserved; comments are preserved where the underlying library supports it (CST-level round-trip)
        * For JSON: key order is preserved; formatting is normalized to two-space indentation
        * Content not representable in the normalized format (e.g. inline markdown formatting such as bold or italic) is preserved as-is within `value` strings тАФ the adapter does not decompose inline nodes
constraints:
  - value and children are mutually exclusive on any node
  - label is only present on node types that have a primary identifier; it is absent on document, paragraph, list, sequence, array, object, thematic-break
  - All field values must be JSON-serializable тАФ no functions, no circular references, no class instances
  - The adapter is the only component that may parse or serialize the native format; all other components operate exclusively on the normalized AST
scenarios:
  - requirement: Common node schema
    name: value and children mutually exclusive
    when:
      - a node has both value and children
    then:
      - the adapter must not produce such a node тАФ it is an invalid AST
  - requirement: Common node schema
    name: label absent on non-identifying nodes
    when:
      - a paragraph, list, sequence, object, or document node is produced
    then:
      - the node has no label field
  - requirement: Markdown AST
    name: Heading becomes section with label and level
    given:
      - 'a markdown file containing ### Requirement: Login'
    when:
      - the markdown adapter parses it
    then:
      - 'the resulting AST contains a node { type: "section", label: "Requirement: Login", level: 3, children: [...] }'
  - requirement: Markdown AST
    name: Section nests by heading level
    given:
      - 'a markdown file with a ## Requirements heading followed by ### Requirement: Login'
    when:
      - the markdown adapter parses it
    then:
      - 'the Requirement: Login section node is a child of the Requirements section node'
  - requirement: Markdown AST
    name: Non-contiguous heading levels nest correctly
    given:
      - 'a markdown file with a # Overview heading followed by #### Detail (no intermediate levels)'
    when:
      - the markdown adapter parses it
    then:
      - 'the Detail section node (level: 4) is a child of the Overview section node (level: 1)'
  - requirement: Markdown AST
    name: Paragraph becomes leaf node with value
    given:
      - a markdown file containing a prose paragraph
    when:
      - the markdown adapter parses it
    then:
      - 'the resulting node is { type: "paragraph", value: "<text>" } with no children'
  - requirement: Markdown AST
    name: Fenced code block preserves lang and content
    given:
      - a markdown file with ```typescript\nconst x = 1\n```
    when:
      - the markdown adapter parses it
    then:
      - 'the resulting node is { type: "code-block", label: "typescript", value: "const x = 1" }'
  - requirement: Markdown AST
    name: Unordered list
    given:
      - a markdown file with a bullet list
    when:
      - the markdown adapter parses it
    then:
      - 'the resulting node is { type: "list", ordered: false, children: [{ type: "list-item", label: "..." }, ...] }'
  - requirement: Markdown AST
    name: Round-trip preserves structure
    given:
      - a markdown AST produced by parsing a spec file
    when:
      - the adapter serializes it back to markdown
    then:
      - re-parsing the output produces an identical AST
  - requirement: YAML AST
    name: Scalar pair
    given:
      - 'a YAML file containing schema: spec-driven'
    when:
      - the YAML adapter parses it
    then:
      - 'the resulting AST contains { type: "pair", label: "schema", value: "spec-driven" }'
  - requirement: YAML AST
    name: Nested mapping under pair
    given:
      - "a YAML file with llm:\\n  model: claude-opus-4-6"
    when:
      - the YAML adapter parses it
    then:
      - 'the llm pair has children containing a mapping node, which has a pair child with label: "model"'
  - requirement: YAML AST
    name: Sequence of scalars
    given:
      - a YAML file with a sequence of strings under a key
    when:
      - the YAML adapter parses it
    then:
      - the pair has children containing a sequence node with sequence-item children each having value
  - requirement: YAML AST
    name: Sequence of objects
    given:
      - a YAML file with a sequence of mappings (e.g. workflow steps)
    when:
      - the YAML adapter parses it
    then:
      - each sequence-item has children containing a mapping node with pair children
  - requirement: YAML AST
    name: Round-trip preserves comments
    given:
      - a YAML file with inline comments
    when:
      - the YAML adapter parses and re-serializes it without modification
    then:
      - the output preserves all comments
  - requirement: JSON AST
    name: Object property
    given:
      - 'a JSON file containing { "version": "1.0.0" }'
    when:
      - the JSON adapter parses it
    then:
      - 'the AST contains a property node with label: "version" and value: "1.0.0"'
  - requirement: JSON AST
    name: Nested object
    given:
      - a JSON file with a nested object value
    when:
      - the JSON adapter parses it
    then:
      - the property has children containing an object node with property children
  - requirement: JSON AST
    name: Array of scalars
    given:
      - 'a JSON file with "keywords": ["specd", "spec-driven"]'
    when:
      - the JSON adapter parses it
    then:
      - the keywords property has children containing an array node with array-item children each having value
