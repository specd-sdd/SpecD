title: 'Project Configuration'
description: >
  Defines the structure, validation, and semantics of specd.yaml, the single project-level
  configuration file. Covers schema references, workspace declarations, storage paths, workflow
  hooks, artifact rules, context spec selection, approval gates, and plugin declarations. Read this
  whenever working on config loading, validation, or any feature that reads from specd.yaml.
keywords:
  - 'configuration'
  - 'specd.yaml'
  - 'schema'
  - 'workspace'
  - 'storage'
  - 'workflow'
  - 'context'
  - 'approval'
  - 'plugin'
  - 'validation'
dependsOn:
  - 'core:core/schema-format'
  - 'default:_global/architecture'
  - 'core:core/storage'
  - 'core:core/spec-metadata'
  - 'core:core/workspace'
contentHashes:
  'spec.md': 'sha256:65a2f5dd19a996aa4a735d943c4e42ef98ef37cdd5b21a2cfce8b0461b7f1a70'
  'verify.md': 'sha256:1f68b76a90ebd403b257cfaddfd2acb71d7720864000cc19ad9602d09ef48f1f'
rules:
  - requirement: 'Config file location and format'
    rules:
      - 'specd.yaml must be a valid YAML file.'
      - 'If the CLI is invoked with --config path/to/specd.yaml, that path is used directly; no discovery takes place.'
      - 'specd walks up from CWD checking each directory for specd.yaml, stopping at the first match or the git repo root, whichever comes first.'
      - 'If no specd.yaml is found before or at the repo root, specd exits with an error.'
      - 'When not inside a git repo, specd checks only the current working directory and stops there.'
      - 'The search never goes above the git repo root.'
  - requirement: 'Local config override'
    rules:
      - 'When specd.local.yaml is present, specd uses it exclusively; specd.yaml is not read and no merging takes place.'
      - 'The local file is a complete, self-contained config that must be valid on its own.'
      - 'The file is optional; its absence is normal.'
      - 'specd init must add specd.local.yaml to the project .gitignore.'
      - 'When the CLI is invoked with --config, no specd.local.yaml lookup takes place.'
  - requirement: 'Schema reference'
    rules:
      - 'specd.yaml must declare a schema field identifying the schema that governs this project; the field is required.'
      - 'Only one schema is active per project at a time; per-workspace schema selection is not supported.'
      - '@scope/name resolves to an npm package loaded from node_modules/@scope/name/schema.yaml.'
      - '#workspace:name resolves a named schema from a specific workspace schemas section.'
      - '#name or bare name is equivalent to #default:name, resolved from the default workspace schemas section.'
      - 'Relative or absolute path resolves directly to a schema.yaml file; relative paths resolve from the specd.yaml directory.'
      - 'There is no implicit multi-level fallback; the prefix determines exactly where specd looks.'
      - 'Schema resolution happens at command dispatch time, immediately before the command body executes.'
      - 'Commands that do not require the schema (--help, --version, init, config validate, plugin subcommands) skip resolution entirely.'
      - 'ConfigValidationError and SchemaNotFoundError/SchemaValidationError are distinct domain error types extending SpecdError.'
  - requirement: 'Workspaces'
    rules:
      - 'specd.yaml must declare at least one workspace under the workspaces key.'
      - 'default is a reserved workspace name identifying the local project workspace; every config must contain a default workspace.'
      - 'specd init creates the default workspace automatically if no workspaces section is present.'
      - 'specs is required per workspace and declares where spec files live; has its own adapter and adapter-specific config block; only fs is supported in v1.'
      - 'specs.fs.path is required for the fs adapter; relative paths resolve from the specd.yaml directory; may point outside the project repo root.'
      - 'schemas is optional; for the default workspace it defaults to adapter: fs with fs.path: specd/schemas; for non-default workspaces, omitting it means no local schemas.'
      - 'codeRoot defaults to the project root for the default workspace; is required for non-default workspaces.'
      - 'ownership values are owned (default for default workspace), shared, or readOnly (default for non-default workspaces).'
      - 'prefix is optional; when set, prepended to all capability paths in that workspace.'
      - 'Prefix may be single-segment or multi-segment; each segment must match /^[a-z0-9_][a-z0-9_-]*$/.'
      - 'The full prefix must be one or more valid segments separated by /, with no leading/trailing /, no empty segments, no dot segments, and no special characters.'
      - 'Two workspaces may share the same prefix; prefix is not a unique identifier.'
      - 'isExternal is not declared in config; it is inferred by the application layer from whether specs.fs.path resolves outside the project repo root.'
      - 'contextIncludeSpecs and contextExcludeSpecs are optional workspace-level patterns loaded only when the workspace is active.'
      - 'Omitting the workspace qualifier in a workspace-level pattern means this workspace, not default.'
      - 'Workspace names must be unique and must match /^[a-z][a-z0-9-]*$/.'
      - 'Each project specd.yaml is the sole source of truth for that project view of its workspaces; specd never reads external repo specd.yaml files.'
  - requirement: 'Storage configuration'
    rules:
      - 'specd.yaml must include a storage section with sub-keys for changes, drafts, discarded, and archive; all four are required.'
      - 'Storage paths are global; a project has one changes directory and one archive directory regardless of workspaces.'
      - 'adapter is required per sub-key; adapter-specific fields are nested under the adapter key.'
      - 'Unknown adapter values must produce a validation error.'
      - 'Relative paths are resolved from the specd.yaml directory and must remain within the project repo root.'
      - 'drafts stores shelved changes that retain their full internal state and can be recovered.'
      - 'discarded stores permanently abandoned changes that cannot be recovered; a discarded change must include a reason.'
      - 'specd init adds specd/drafts/ and specd/discarded/ to .gitignore by default.'
      - 'The archive directory contains a .specd-index.jsonl file that caches metadata; it is a derived cache, not a source of truth.'
      - 'specd init gitignores .specd-index.jsonl inside the archive directory via a local .gitignore.'
      - 'When the index is missing or stale, it is automatically rebuilt from manifest files on disk.'
  - requirement: 'Template variables'
    rules:
      - 'Several fields support template variable interpolation using {{variable}} syntax, resolved at runtime.'
      - 'In storage.archive.fs.pattern: change.name, change.archivedName, change.workspace, year, and date are available.'
      - 'In workflow hook run commands: change.name, change.workspace, and codeRoot are available.'
      - 'Unknown variables in a template are left as-is and a warning is emitted.'
  - requirement: 'Workflow additions'
    rules:
      - 'specd.yaml may include a workflow section to add project-level hooks to schema workflow entries.'
      - 'Entries are matched by step name; schema hooks fire first, then project hooks.'
      - 'requires is not valid in project-level workflow entries and must be rejected.'
  - requirement: 'Project-level artifact rules'
    rules:
      - 'specd.yaml may include an artifactRules section to add per-artifact constraints without forking the schema.'
      - 'Keys are artifact IDs; values are arrays of constraint strings.'
      - 'CompileContext injects them as a distinct block after the schema instruction.'
      - 'Unknown keys emit a warning at startup but do not prevent startup.'
  - requirement: 'Context spec selection'
    rules:
      - 'contextIncludeSpecs and contextExcludeSpecs can be declared at project level and workspace level with different semantics.'
      - 'Project-level patterns are always applied regardless of active workspaces.'
      - 'Workspace-level patterns are applied only when that workspace is active in the current change.'
      - 'A workspace is considered active if at least one of its specs is listed in the change metadata.'
      - 'At project level, omitting the workspace qualifier is equivalent to default:.'
      - 'At workspace level, omitting the workspace qualifier means this workspace.'
      - '* may only appear alone, as workspace:*, or as a path suffix prefix/*; any other position is a startup error.'
      - 'Project-level contextIncludeSpecs defaults to [default:*]; project-level contextExcludeSpecs defaults to [].'
      - 'Workspace-level contextIncludeSpecs defaults to [*] (all specs in that workspace); workspace-level contextExcludeSpecs defaults to [].'
      - 'CompileContext resolution order: project-level context entries, project-level includes, project-level excludes, workspace-level includes per active workspace, workspace-level excludes per active workspace, dependsOn traversal.'
      - 'Specs reachable via dependsOn traversal are not subject to exclude rules.'
      - 'A spec matched by multiple include patterns appears only once at the position of the first matching pattern.'
      - 'References to unknown workspace qualifiers produce a warning at runtime but specd config validate treats them as errors.'
      - 'References to non-existent spec IDs are silently skipped at context-compilation time.'
      - 'Invalid pattern syntax is an error caught at startup.'
      - 'specd config validate warns when a pattern matches no specs on disk at validation time.'
  - requirement: 'Project context instructions'
    rules:
      - 'specd.yaml may include a top-level context field to inject additional freeform content into compiled context alongside specs.'
      - 'Each entry is an object with exactly one key: either instruction (string injected verbatim) or file (path read at compile time and injected verbatim).'
      - 'The context field is optional; if absent, no additional content is injected.'
      - 'Entries are prepended to the compiled context in declaration order, before any spec content.'
      - 'If a referenced file does not exist at compile time, specd emits a warning and skips that entry.'
      - 'File paths are relative to the specd.yaml directory; absolute paths are also accepted.'
      - 'Files are not parsed or transformed; all formats are treated as opaque strings.'
  - requirement: 'Approvals'
    rules:
      - 'specd.yaml may include an approvals section to configure which lifecycle gates require explicit human approval.'
      - 'Both gates (spec and signoff) are disabled by default; teams opt in.'
      - 'When spec is true, a change in ready state cannot transition directly to implementing; it must go through pending-spec-approval and spec-approved first.'
      - 'When signoff is true, a change in done state cannot transition directly to archivable regardless of change content; it must go through pending-signoff and signed-off first.'
      - 'Both flags are independent; any combination is valid.'
  - requirement: 'LLM optimization'
    rules:
      - 'specd.yaml may include a top-level llmOptimizedContext boolean field.'
      - 'When true, specd may invoke an LLM for optimization tasks producing richer output than deterministic extraction.'
      - 'When false or absent (the default), all operations use deterministic processing only.'
  - requirement: 'Skills manifest'
    rules:
      - 'specd.yaml may include a skills section recording which skills from @specd/skills have been installed for each agent.'
      - 'Keys are agent IDs; values are arrays of skill names.'
      - 'The section is optional; its absence means no skills are tracked.'
      - 'Skills installed globally (--global) are not recorded here.'
  - requirement: 'Plugin declarations'
    rules:
      - 'specd.yaml may include a plugins section declaring which agent-integration plugins are installed.'
      - 'Each entry must include name; options is plugin-specific and optional.'
      - 'Plugin declarations are used by specd project init, specd plugin add, and specd project update.'
      - 'They do not affect schema resolution, storage, or context compilation.'
  - requirement: 'Config writer port'
    rules:
      - '@specd/core exposes a ConfigWriter application port for all operations that mutate specd.yaml.'
      - 'Adapters never serialise or deserialise YAML directly; they call use cases that delegate to ConfigWriter.'
      - 'initProject writes a new specd.yaml, creates standard storage directories, appends specd.local.yaml to .gitignore, and creates a .gitignore inside the archive directory to exclude index.jsonl.'
      - 'recordSkillInstall adds skill names to specd.yaml skills.<agent> array, deduplicating existing entries.'
      - 'readSkillsManifest returns the skills section as a typed map; it does not require a fully validated SpecdConfig.'
      - 'FsConfigWriter reads existing YAML, makes targeted mutations, and writes back preserving comments and key order.'
      - '@specd/core owns all YAML serialisation; adapters never read or write specd.yaml directly.'
      - '@specd/core never writes agent-specific files; those are adapter-layer concerns.'
  - requirement: 'Startup validation'
    rules:
      - 'specd must validate specd.yaml before executing any command that requires a config.'
      - 'specd init is exempt; it creates specd.yaml and requires no existing config.'
      - 'FsConfigLoader validates parsed YAML against a Zod schema before constructing SpecdConfig.'
      - 'Any structural mismatch surfaces immediately as ConfigValidationError before any path resolution or domain object construction.'
      - 'Missing schema field, missing storage section, missing workspaces section, missing default workspace, missing specs in any workspace, missing codeRoot in non-default workspace, missing or unknown adapter, missing adapter-specific fields, requires in project workflow entry, storage paths outside repo root, and invalid pattern syntax are all startup errors.'
      - 'Unknown artifactRules keys, duplicate workspace names, project workflow entry naming unknown step, and unknown workspace qualifiers in patterns are warnings that allow startup to proceed.'
constraints:
  - 'schema is required; specd cannot start without a schema reference.'
  - 'workspaces.default is required; every config must have a default workspace; specd init creates it.'
  - 'specd.local.yaml is always .gitignored; specd init must add it automatically.'
  - 'When specd.local.yaml is present it is the sole active config; specd.yaml is not read.'
  - 'specd.local.yaml must be a complete, valid config on its own; partial overrides are not supported.'
  - 'requires is not valid in project-level workflow entries; only step and hooks are accepted.'
  - 'Workspace names must match /^[a-z][a-z0-9-]*$/; default is reserved for the local project workspace.'
  - 'ownership values are limited to readOnly, shared, and owned.'
  - 'isExternal is not declared; it is inferred by the application layer from whether specs.fs.path resolves outside the project repo root.'
  - 'Every workspace must declare a specs section; codeRoot is required for non-default workspaces.'
  - 'schemas is optional: for the default workspace it defaults to adapter: fs / fs.path: specd/schemas; for non-default workspaces, omitting it means no local schemas.'
  - 'adapter is required in every specs, schemas, and storage section; adapter-specific fields are nested under the adapter key.'
  - 'storage section is required and must contain changes, drafts, discarded, and archive sub-keys.'
  - 'All relative paths resolve from the specd.yaml directory; storage paths must remain within the repo root.'
  - "Project-level contextIncludeSpecs defaults to ['default:*']; project-level contextExcludeSpecs defaults to []."
  - "Workspace-level contextIncludeSpecs defaults to ['*'] (all specs in that workspace); workspace-level contextExcludeSpecs defaults to []."
  - 'llmOptimizedContext is optional; defaults to false; must be a boolean.'
  - 'context is optional; each entry is an object with exactly one key: either file or instruction.'
  - 'context file paths are resolved relative to the specd.yaml directory; absolute paths are accepted.'
  - 'A missing context file is silently skipped at compile time.'
  - 'context file content is injected verbatim; no parsing or transformation is applied.'
  - 'context entries are prepended to the compiled context in declaration order, before any spec content.'
  - 'Project-level patterns are always applied; workspace-level patterns are applied only when that workspace is active.'
  - 'At project level, omitting the workspace qualifier is equivalent to default:; at workspace level, omitting it means the declaring workspace.'
  - 'Include pattern order (project-level first, then active workspace declaration order) determines context order and truncation priority.'
  - 'A spec matched by multiple include patterns appears once, at the position of the first matching pattern.'
  - '* in a pattern may only appear alone, as workspace:*, or as a path suffix prefix/*; any other position is a startup error.'
  - 'Unknown workspace qualifiers in patterns produce a warning, not an error; missing spec IDs are silently skipped at compile time.'
scenarios:
  - requirement: 'Config file location and format'
    name: 'Config found — nearest file used'
    given: []
    when:
      - 'A specd.yaml exists somewhere between the CWD and the git repo root.'
    then:
      - 'specd uses the nearest one (closest to CWD) and stops walking.'
  - requirement: 'Config file location and format'
    name: 'Monorepo — package config takes precedence'
    given: []
    when:
      - 'A monorepo has a specd.yaml at the root and another at packages/billing/specd.yaml, and the user runs specd from within packages/billing/.'
    then:
      - 'specd uses packages/billing/specd.yaml and does not continue walking up to the root.'
  - requirement: 'Config file location and format'
    name: 'Config not found inside repo'
    given: []
    when:
      - 'The user runs any specd command inside a git repository and no specd.yaml exists between the CWD and the repo root.'
    then:
      - 'specd exits with an error explaining that specd.yaml was not found and pointing to specd init.'
  - requirement: 'Config file location and format'
    name: 'Invoked outside a git repo'
    given: []
    when:
      - 'The user runs specd from a directory that is not inside any git repository.'
    then:
      - 'specd checks only the current working directory for specd.yaml and exits with an error if not found there.'
  - requirement: 'Config file location and format'
    name: 'Explicit config flag bypasses local override'
    given: []
    when:
      - 'specd --config /path/to/specd.yaml <command> is invoked.'
    then:
      - 'specd uses the specified file exactly as-is; discovery and specd.local.yaml lookup are both skipped.'
  - requirement: 'Local config override'
    name: 'Local file takes full precedence'
    given: []
    when:
      - 'specd.local.yaml exists alongside specd.yaml.'
    then:
      - 'specd loads only specd.local.yaml; specd.yaml is ignored entirely.'
  - requirement: 'Local config override'
    name: 'Local file absent'
    given: []
    when:
      - 'No specd.local.yaml exists alongside specd.yaml.'
    then:
      - 'specd loads specd.yaml as normal; no error is emitted.'
  - requirement: 'Local config override'
    name: 'Local file not committed'
    given: []
    when:
      - 'specd init is run.'
    then:
      - 'specd.local.yaml is added to .gitignore if not already present.'
  - requirement: 'Local config override'
    name: 'Local file must be valid standalone'
    given: []
    when:
      - 'specd.local.yaml is present but missing required fields (e.g. schema).'
    then:
      - 'specd exits with a validation error; partial configs are not supported.'
  - requirement: 'Schema reference'
    name: 'npm package schema'
    given: []
    when:
      - 'schema: "@specd/schema-std" is declared and the package is installed.'
    then:
      - 'SchemaRegistry.resolve() loads it from node_modules/@specd/schema-std/schema.yaml.'
  - requirement: 'Schema reference'
    name: 'Bare name resolved from default workspace'
    given: []
    when:
      - 'schema: "spec-driven" is declared and workspaces.default.schemas.fs.path is specd/schemas.'
    then:
      - 'SchemaRegistry.resolve() loads specd/schemas/spec-driven/schema.yaml.'
  - requirement: 'Schema reference'
    name: 'Hash-prefixed name resolved from default workspace'
    given: []
    when:
      - 'schema: "#spec-driven" is declared.'
    then:
      - 'SchemaRegistry.resolve() behaves identically to the bare name form.'
  - requirement: 'Schema reference'
    name: 'Workspace-qualified schema reference'
    given: []
    when:
      - 'schema: "#billing:my-billing-schema" is declared and workspaces.billing.schemas.fs.path is ../billing/dev/schemas.'
    then:
      - 'SchemaRegistry.resolve() loads ../billing/dev/schemas/my-billing-schema/schema.yaml.'
  - requirement: 'Schema reference'
    name: 'Direct path schema'
    given: []
    when:
      - 'schema: "./custom/schema.yaml" is declared.'
    then:
      - 'SchemaRegistry.resolve() loads that file relative to the specd.yaml directory.'
  - requirement: 'Schema reference'
    name: 'Schema not found'
    given: []
    when:
      - 'The declared schema reference matches no file at the resolved location.'
    then:
      - 'specd exits with SchemaNotFoundError identifying the reference and the path searched.'
  - requirement: 'Schema reference'
    name: 'Schema fails validation'
    given: []
    when:
      - 'The schema file is found but contains structural errors (e.g. missing name or version, circular requires).'
    then:
      - 'specd exits with SchemaValidationError describing the problem; the command does not run.'
  - requirement: 'Schema reference'
    name: 'Schema field missing'
    given: []
    when:
      - 'specd.yaml does not include a schema field.'
    then:
      - 'specd exits with ConfigValidationError on startup.'
  - requirement: 'Schema reference'
    name: 'Schema-independent command skips resolution'
    given: []
    when:
      - 'specd --help or specd init is run.'
    then:
      - 'SchemaRegistry.resolve() is not called; the command runs regardless of schema validity.'
  - requirement: 'Workspaces'
    name: 'Default workspace only (simple project)'
    given: []
    when:
      - 'specd.yaml declares only a default workspace with specs.adapter: fs and specs.fs.path: specs/.'
    then:
      - 'All spec paths are relative to specs/ and there are no external workspaces.'
  - requirement: 'Workspaces'
    name: 'specd init creates default workspace'
    given: []
    when:
      - 'specd init is run in a project with no specd.yaml.'
    then:
      - 'A specd.yaml is created with a default workspace using specs.adapter: fs, specs.fs.path: specs/, storage paths specd/changes and specd/archive, and no other workspaces.'
  - requirement: 'Workspaces'
    name: 'Non-default workspace resolves outside repo'
    given: []
    when:
      - 'A workspace declares specs.fs.path: ../other-repo/specs which resolves outside the current git repo root.'
    then:
      - 'RepositoryConfig.isExternal is true for that workspace; no config error is emitted.'
  - requirement: 'Workspaces'
    name: 'Non-default workspace with custom schemas path'
    given: []
    when:
      - 'workspaces.billing.schemas.fs.path: ../billing/dev/schemas is declared.'
    then:
      - 'schema: "#billing:my-schema" resolves to ../billing/dev/schemas/my-schema/schema.yaml.'
  - requirement: 'Workspaces'
    name: 'Workspace-qualified schema with no schemas section declared'
    given: []
    when:
      - 'schema: "#billing:my-schema" is declared and the billing workspace has no schemas section.'
    then:
      - 'specd exits with SchemaNotFoundError.'
  - requirement: 'Workspaces'
    name: 'Workspace name collision'
    given: []
    when:
      - 'Two entries in workspaces use the same key.'
    then:
      - 'YAML parsing produces only one entry (last wins); specd config validate must warn about this pattern.'
  - requirement: 'Workspaces'
    name: 'Missing default workspace'
    given: []
    when:
      - 'specd.yaml declares a workspaces section but omits default.'
    then:
      - 'specd exits with a ConfigValidationError.'
  - requirement: 'Workspaces'
    name: 'Missing codeRoot in non-default workspace'
    given: []
    when:
      - 'A non-default workspace entry omits codeRoot.'
    then:
      - 'specd exits with a ConfigValidationError at startup.'
  - requirement: 'Storage configuration'
    name: 'Default storage layout'
    given: []
    when:
      - 'specd.yaml uses adapter: fs with fs.path: specd/changes and fs.path: specd/archive.'
    then:
      - 'Active changes are at specd/changes/ and archived changes at specd/archive/.'
  - requirement: 'Storage configuration'
    name: 'Unknown adapter'
    given: []
    when:
      - 'storage.changes.adapter is set to an unrecognised value (e.g. s3).'
    then:
      - 'specd exits with a validation error listing supported adapters.'
  - requirement: 'Template variables'
    name: 'Archive pattern with year prefix'
    given: []
    when:
      - "storage.archive.fs.pattern is '{{year}}/{{change.archivedName}}'."
    then:
      - 'A change archived in 2024 is stored at specd/archive/2024/<archivedName>/.'
  - requirement: 'Template variables'
    name: 'Unknown template variable'
    given: []
    when:
      - 'A template string contains {{unknown}}.'
    then:
      - 'The literal string {{unknown}} is used and a warning is emitted.'
  - requirement: 'Workflow additions'
    name: 'Project hook appended'
    given: []
    when:
      - 'Both the schema and specd.yaml define hooks for archive.post.'
    then:
      - 'Schema hooks fire first, project hooks second, within the same lifecycle point.'
  - requirement: 'Workflow additions'
    name: 'requires in project workflow entry'
    given: []
    when:
      - 'A project-level workflow entry includes a requires field.'
    then:
      - 'specd must reject it with a validation error on startup.'
  - requirement: 'Workflow additions'
    name: 'Hook for step not in schema'
    given: []
    when:
      - "A project-level workflow entry names a step not declared in the schema's workflow."
    then:
      - 'The hooks are registered for that step; they fire if the step is ever invoked, and a warning is emitted at startup.'
  - requirement: 'Project-level artifact rules'
    name: 'Rules injected'
    given: []
    when:
      - 'artifactRules.specs is set.'
    then:
      - 'CompileContext includes those strings in the compiled context for the specs artifact as constraints the agent must follow.'
  - requirement: 'Project-level artifact rules'
    name: 'Unknown artifact ID'
    given: []
    when:
      - 'artifactRules contains a key not matching any artifact ID in the active schema.'
    then:
      - 'specd emits a warning at startup and ignores those rules.'
  - requirement: 'LLM optimization'
    name: 'Flag absent — deterministic mode'
    given:
      - 'A specd.yaml with no llmOptimizedContext field.'
    when:
      - 'The metadata agent runs.'
    then:
      - 'It uses deterministic structural extraction only; no LLM is invoked.'
  - requirement: 'LLM optimization'
    name: 'Flag false — deterministic mode'
    given:
      - 'A specd.yaml with llmOptimizedContext: false.'
    when:
      - 'The metadata agent runs.'
    then:
      - 'It uses deterministic structural extraction only; no LLM is invoked.'
  - requirement: 'LLM optimization'
    name: 'Flag true — LLM mode'
    given:
      - 'A specd.yaml with llmOptimizedContext: true.'
    when:
      - 'The metadata agent runs.'
    then:
      - 'It invokes the LLM to produce richer metadata (descriptions, structured scenarios, dependsOn suggestions).'
  - requirement: 'LLM optimization'
    name: 'Non-boolean value — startup error'
    given: []
    when:
      - 'llmOptimizedContext is set to a non-boolean value (e.g. "yes", 1).'
    then:
      - 'specd exits with a startup validation error.'
  - requirement: 'Plugin declarations'
    name: 'Plugin installed'
    given: []
    when:
      - 'plugins: [{ name: "@specd/plugin-claude" }] is declared.'
    then:
      - "specd update ensures the plugin's skill files and hook configuration are up to date."
  - requirement: 'Context spec selection'
    name: 'Project-level patterns always apply'
    given: []
    when:
      - "Project-level contextIncludeSpecs: ['shared:_global/*'] is declared and the current change only touches the default workspace."
    then:
      - 'CompileContext still includes shared:_global/* specs; project-level patterns are not filtered by change scope.'
  - requirement: 'Context spec selection'
    name: 'Workspace-level patterns only apply when workspace is active'
    given: []
    when:
      - "billing workspace declares contextIncludeSpecs: ['*'] and the current change touches only default specs."
    then:
      - 'CompileContext does not include billing specs; the billing workspace is not active.'
  - requirement: 'Context spec selection'
    name: 'Workspace-level patterns apply when workspace is active'
    given: []
    when:
      - "billing workspace declares contextIncludeSpecs: ['*'] and the current change touches a billing spec."
    then:
      - 'CompileContext includes all billing workspace specs.'
  - requirement: 'Context spec selection'
    name: 'Qualifier omitted at workspace level resolves to that workspace'
    given: []
    when:
      - "Inside billing workspace, contextIncludeSpecs: ['payments/*'] is declared."
    then:
      - 'CompileContext resolves it as billing:payments/*, not default:payments/*.'
  - requirement: 'Context spec selection'
    name: 'Default project-level include is all default workspace specs'
    given: []
