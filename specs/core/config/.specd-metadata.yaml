title: 'Project Configuration'
description: >
  specd.yaml is the single project-level configuration file governing schema selection, workspace organization, spec storage, workflow hooks, artifact constraints, and plugin integration. Every tool in the specd ecosystem—CLI, MCP server, and plugins—derives its wiring from this file, making it the central source of truth for project setup. Use this spec when configuring a specd project, understanding how configurations cascade to tooling, or resolving config-related errors.
keywords:
  - 'configuration'
  - 'specd.yaml'
  - 'workspaces'
  - 'schema'
  - 'storage'
  - 'workflow'
  - 'context'
dependsOn:
  - 'core:core/schema-format'
  - 'default:_global/architecture'
  - 'core:core/storage'
  - 'core:core/spec-metadata'
contentHashes:
  spec.md: 'sha256:2d15624a055ddcbb7496c23d6afadeb96ca28ed4082f78dd7f1ca92db2097753'
  verify.md: 'sha256:c70bb34d8e02bf429cd0f005766ba00eba4d871270eda7644d3dc2ae1675eaf2'
rules:
  - requirement: 'Config file location and format'
    rules:
      - 'specd.yaml must be a valid YAML file.'
      - 'specd discovers it using the following strategy: --config flag, walk up from CWD bounded by git repo root, CWD only when not inside git repo.'
      - 'Walk stops at the first match (nearest to CWD) or at git repo root, whichever comes first.'
      - 'Search never goes above git repo root, preventing accidental pickup from parent repository.'
      - 'In monorepo with package-level specd.yaml, package file is used when running from package directory.'
  - requirement: 'Local config override'
    rules:
      - 'specd.local.yaml file in same directory as specd.yaml enables fully independent local configuration.'
      - 'When specd.local.yaml is present, specd uses it exclusively — specd.yaml is not read and no merging occurs.'
      - 'Local file must be valid and self-contained on its own.'
      - 'specd init must add specd.local.yaml to .gitignore.'
      - '--config flag bypasses specd.local.yaml lookup entirely.'
  - requirement: 'Schema reference'
    rules:
      - 'specd.yaml must declare a schema field (required, only one active per project).'
      - '@scope/name prefix — npm package, schema loaded from node_modules/@scope/name/schema.yaml.'
      - "#workspace:name syntax — named schema from specific workspace's schemas section."
      - "#name or bare name — equivalent to #default:name, resolved from default workspace's schemas section."
      - 'Relative or absolute path — direct path to schema.yaml file, relative paths resolved from specd.yaml directory.'
      - 'No implicit multi-level fallback — prefix determines exactly where specd looks.'
      - 'Schema resolution happens at command dispatch time, before command body executes.'
      - 'Schema-independent commands (--help, --version, init, config validate, plugin subcommands) skip resolution entirely.'
      - 'ConfigValidationError for malformed specd.yaml; SchemaNotFoundError and SchemaValidationError for resolution failures — all are domain errors extending SpecdError with distinct types, messages, and exit codes.'
  - requirement: 'Workspaces'
    rules:
      - 'specd.yaml must declare at least one workspace under workspaces key.'
      - 'default is reserved workspace name identifying local project workspace (required in every config).'
      - "specs (required) — declares where workspace's spec files live, has own adapter and adapter-specific config."
      - 'specs.fs.path (required for fs adapter) — directory where spec files live, relative paths resolved from specd.yaml directory, may point outside project repo root.'
      - 'schemas (optional) — declares where named local schemas stored, has own adapter and adapter-specific config.'
      - 'For default workspace, if omitted, defaults to adapter: fs with fs.path: specd/schemas.'
      - 'For non-default workspaces, if omitted, no local schemas — schema references targeting it produce SchemaNotFoundError.'
      - 'codeRoot — directory where implementation code lives, used by CompileContext.'
      - 'For default workspace, defaults to project root (specd.yaml directory).'
      - 'For non-default workspaces, codeRoot is required with no sensible default since code lives external.'
      - 'ownership values: owned (default for default workspace), shared, readOnly (default for non-default).'
      - 'isExternal is not declared — inferred by application layer from whether specs.fs.path is outside project repo root.'
      - 'contextIncludeSpecs (optional) — workspace-level context spec patterns, loaded when workspace is active in current change.'
      - 'contextExcludeSpecs (optional) — workspace-level exclusion patterns, applied when workspace is active in current change.'
      - 'Workspace names must be unique and match /^[a-z][a-z0-9-]*$/, default is reserved.'
      - "Each project's specd.yaml is sole source of truth for that project's view of its workspaces — specd never reads specd.yaml of external repos."
      - 'If external workspace structure changes, every project referencing it must update its own specd.yaml manually.'
      - "ownership is always relative to declaring project — same repo can be owned in its config and readOnly in coordinator's config simultaneously."
  - requirement: 'Storage configuration'
    rules:
      - 'specd.yaml must include storage section with sub-keys for changes and archive.'
      - 'All four sub-keys required: changes, drafts, discarded, archive.'
      - 'adapter is required per sub-key; adapter-specific fields nested under adapter key (fs:).'
      - 'Unknown adapter values must produce validation error.'
      - 'Relative paths resolved from specd.yaml directory, must remain within project repo root.'
      - 'drafts — shelved changes not ready for active development but may be recovered, can move from changes/ to drafts/ before archiving.'
      - 'discarded — permanently abandoned changes with required reason, cannot be recovered.'
      - 'specd init adds specd/drafts/ and specd/discarded/ to .gitignore by default.'
  - requirement: 'Template variables'
    rules:
      - 'Fields supporting template variable interpolation use {{variable}} syntax.'
      - 'Variables resolved at runtime by application layer before value is used.'
      - 'In storage.archive.fs.pattern: {{change.name}}, {{change.archivedName}}, {{change.workspace}}, {{year}}, {{date}}.'
      - 'In workflow hook run commands: {{change.name}}, {{change.workspace}}, {{codeRoot}}.'
      - 'Unknown variables in template left as-is and warning emitted.'
  - requirement: 'Workflow additions'
    rules:
      - 'specd.yaml may include workflow section to add project-level hooks to change lifecycle steps.'
      - 'Entries matched to schema workflow entries by step name; schema hooks fire first, then project hooks.'
      - 'requires is not valid in project-level workflow entries and must be rejected.'
      - 'step field and hooks field required; entries contain pre and/or post hook arrays.'
  - requirement: 'Project-level artifact rules'
    rules:
      - 'specd.yaml may include artifactRules section to add per-artifact constraints without forking schema.'
      - 'Keys are artifact IDs; values are arrays of constraint strings.'
      - "CompileContext injects them as distinct block in compiled instruction after schema's instruction."
      - "Keys validated against active schema's artifact IDs at startup."
      - 'Unknown keys emit warning but do not prevent startup.'
  - requirement: 'Context spec selection'
    rules:
      - 'contextIncludeSpecs and contextExcludeSpecs declared at two levels with different semantics: project level and workspace level.'
      - 'Project level — patterns always applied regardless of active workspace, use for specs always in context.'
      - 'Workspace level — patterns applied only when workspace is active in current change.'
      - "Workspace is active if at least one of its specs listed in current change's metadata."
      - "CompileContext reads spec list from change metadata, resolves each spec's workspace by matching path against specs.fs.path entries."
      - 'Pattern syntax: * (all specs), workspace:* (all specs in named workspace), prefix/* (specs under prefix), workspace:prefix/* (specs under prefix in named workspace), path/name (exact spec), workspace:path/name (exact spec in workspace).'
      - '* may only appear alone, as workspace:*, or as path suffix after / — may not appear in middle of segment.'
      - 'At project level, omitting qualifier equals default:; at workspace level, omitting means this workspace.'
      - "Project-level defaults: contextIncludeSpecs: ['default:*'], contextExcludeSpecs: []."
      - "Workspace-level defaults: contextIncludeSpecs: ['*'] (all specs in workspace), contextExcludeSpecs: []."
      - 'CompileContext builds context in order: project-level context entries, project-level includes, project-level excludes, workspace-level includes from active workspaces, workspace-level excludes from active workspaces, specs from dependsOn traversal.'
      - 'dependsOn specs not subject to exclude rules — declared dependency always included.'
      - 'Specs matched by multiple patterns appear once at position of first match.'
      - 'Unknown workspace qualifiers produce warning at runtime but allow startup; in config validate they produce error.'
      - 'References to non-existent spec paths silently skipped at compile time.'
      - 'Invalid pattern syntax is startup error.'
  - requirement: 'Project context instructions'
    rules:
      - 'specd.yaml may include a top-level context field to inject additional freeform content into compiled context alongside specs.'
      - 'Each entry is either inline instruction string or reference to external file.'
      - 'Each item is an object with exactly one key: instruction or file.'
      - 'instruction — string injected verbatim as additional context block.'
      - 'file — file at given path read at compile time and content injected verbatim, paths relative to specd.yaml directory, absolute paths accepted.'
      - 'context field is optional; if absent, no additional content injected.'
      - 'Entries prepended to compiled context in declaration order, before any spec content.'
      - 'If referenced file does not exist at compile time, specd emits warning identifying missing file, skips entry, and continues normally.'
      - 'No depth limit on file content — full file injected.'
      - 'Files not parsed or transformed; markdown, plain text, and any format all treated as opaque strings.'
  - requirement: 'Approvals'
    rules:
      - 'specd.yaml may include approvals section to configure which lifecycle gates require explicit human approval.'
      - 'spec (default: false) — when true, change in ready state cannot transition directly to implementing, must enter pending-spec-approval and receive explicit approval before spec-approved then implementing.'
      - 'signoff (default: false) — when true, change in done state cannot transition directly to archivable regardless of modifications, must enter pending-signoff and receive explicit sign-off.'
      - 'Sign-off record captures what was reviewed — new specs, modified specs, removed specs.'
      - 'When false (default), ready → implementing and done → archivable are free transitions.'
      - 'Both flags are independent — any combination is valid.'
  - requirement: 'LLM optimization'
    rules:
      - 'specd.yaml may include a top-level llmOptimizedContext boolean field.'
      - 'When true, specd may invoke an LLM for optimization tasks that produce richer output than deterministic extraction alone.'
      - 'When false or absent (the default), all operations use deterministic processing only.'
      - 'First use case is spec metadata generation: with false, metadata agent extracts rules and scenarios by parsing structural conventions directly; with true, LLM generates richer description, structured given/when/then for free-form scenarios, and more precise dependsOn suggestions.'
      - 'This field is a project-level opt-in; teams without LLM available leave it false; teams wanting LLM-enriched output set it to true and ensure tooling has access to model.'
  - requirement: 'Skills manifest'
    rules:
      - 'specd.yaml may include a skills section recording which skills from @specd/skills have been installed at the project level for each agent.'
      - 'Each entry must include name; options is plugin-specific and optional.'
      - "Plugin declarations used by specd init, specd plugin add, and specd update to install and maintain plugin's skill files and hooks."
      - 'Plugin declarations do not affect schema resolution, storage, or context compilation.'
  - requirement: 'Plugin declarations'
    rules:
      - 'specd.yaml may include plugins section declaring which agent-integration plugins are installed.'
      - 'Each entry must include name; options is plugin-specific and optional.'
      - "Plugin declarations used by specd init, specd plugin add, and specd update to install and maintain plugin's skill files and hooks."
      - 'Plugin declarations do not affect schema resolution, storage, or context compilation.'
  - requirement: 'Config writer port'
    rules:
      - 'specd.yaml may include a top-level context field to inject additional freeform content into compiled context alongside specs.'
      - '@specd/core exposes a ConfigWriter application port for all operations that mutate specd.yaml.'
      - 'Adapters (CLI, MCP) never serialise or deserialise YAML directly — they call use cases that delegate to ConfigWriter.'
      - 'initProject(options) — writes a new specd.yaml at the given path with the provided schema reference, workspace id, and workspace specs path.'
      - "recordSkillInstall(configPath, agent, skillNames) — adds the given skill names to specd.yaml's skills.<agent> array, deduplicating existing entries."
      - 'readSkillsManifest(configPath) — returns the skills section of specd.yaml as a typed map { [agent: string]: string[] }.'
      - 'FsConfigWriter adapter implements this port using the filesystem.'
      - '@specd/core owns all YAML serialisation and deserialisation.'
      - 'Adapters (CLI, MCP) call use cases with typed inputs and receive typed outputs — they never read or write specd.yaml directly.'
      - '@specd/core never writes agent-specific files — those are adapter-layer concerns.'
  - requirement: 'Startup validation'
    rules:
      - 'specd must validate specd.yaml before executing any command requiring config.'
      - 'specd init exempt — it creates specd.yaml requiring no existing config.'
      - 'Errors that abort startup immediately: missing schema field, missing storage section or changes/archive sub-keys, missing workspaces section or default workspace, missing specs section in workspace, missing codeRoot in non-default workspace, missing adapter in specs/schemas/storage section, unknown adapter value, missing required adapter-specific fields (fs.path when adapter: fs), requires in project-level workflow entry, storage path outside repo root, invalid contextIncludeSpecs/contextExcludeSpecs pattern syntax.'
      - 'Warnings allow startup: unknown key in artifactRules, duplicate workspace names, project workflow entry names step not in schema, unknown workspace qualifier in patterns at runtime.'
constraints:
  - 'schema is required — specd cannot start without a schema reference'
  - 'workspaces.default is required — every config must have a default workspace; specd init creates it'
  - 'specd.local.yaml is always .gitignored; specd init must add it automatically'
  - 'When specd.local.yaml is present it is the sole active config — specd.yaml is not read'
  - 'specd.local.yaml must be a complete, valid config on its own; partial overrides are not supported'
  - 'requires is not valid in project-level workflow entries — only step and hooks are accepted'
  - 'Workspace names must match /^[a-z][a-z0-9-]*$/; default is reserved for the local project workspace'
  - 'ownership values are limited to readOnly, shared, and owned'
  - 'isExternal is not declared — it is inferred by the application layer from whether the resolved specs.fs.path is outside the project repo root'
  - 'Every workspace must declare a specs section; codeRoot is required for non-default workspaces'
  - 'schemas is optional: for the default workspace it defaults to adapter: fs / fs.path: specd/schemas; for non-default workspaces, omitting it means no local schemas — schema references targeting that workspace produce SchemaNotFoundError'
  - 'adapter is required in every specs, schemas, and storage section; adapter-specific fields are nested under the adapter key'
  - 'storage section is required and must contain both changes and archive sub-keys'
  - 'All relative paths resolve from the specd.yaml directory; storage paths (fs.path in changes and archive) must remain within the repo root'
  - "Project-level contextIncludeSpecs defaults to ['default:*']; project-level contextExcludeSpecs defaults to []"
  - "Workspace-level contextIncludeSpecs defaults to ['*'] (all specs in that workspace); workspace-level contextExcludeSpecs defaults to []"
  - 'llmOptimizedContext is optional; defaults to false; must be a boolean — any other type is a startup validation error'
  - 'context is optional; each entry is an object with exactly one key: either file or instruction — no other shapes are valid'
  - 'context file paths are resolved relative to the specd.yaml directory; absolute paths are accepted'
  - 'A missing context file is silently skipped at compile time — no warning, no error'
  - 'context file content is injected verbatim — no parsing or transformation is applied'
  - 'context entries are prepended to the compiled context in declaration order, before any spec content'
  - 'Project-level patterns are always applied; workspace-level patterns are applied only when that workspace is active in the current change'
  - 'At project level, omitting the workspace qualifier is equivalent to default:; at workspace level, omitting it means the declaring workspace'
  - 'Include pattern order (project-level first, then active workspace declaration order) determines context order and truncation priority'
  - 'A spec matched by multiple include patterns appears once, at the position of the first matching pattern'
  - '* in a pattern may only appear alone, as workspace:*, or as a path suffix prefix/* — any other position is a startup error'
  - 'Unknown workspace qualifiers in patterns produce a warning, not an error; missing spec paths are silently skipped at compile time'
scenarios:
  - requirement: 'Config file location and format'
    name: 'Config found — nearest file used'
    given:
      - 'a specd.yaml exists somewhere between the CWD and the git repo root'
    when:
      - 'specd walks up from the current working directory'
    then:
      - 'specd uses the nearest one (closest to CWD) and stops walking'
  - requirement: 'Config file location and format'
    name: 'Monorepo — package config takes precedence'
    given:
      - 'a monorepo has a specd.yaml at the root and another at packages/billing/specd.yaml'
    when:
      - 'the user runs specd from within packages/billing/'
    then:
      - 'specd uses packages/billing/specd.yaml and does not continue walking up to the root'
  - requirement: 'Config file location and format'
    name: 'Config not found inside repo'
    given:
      - 'the user runs any specd command inside a git repository'
      - 'no specd.yaml exists between the CWD and the repo root'
    when:
      - 'specd searches for specd.yaml'
    then:
      - 'specd exits with an error explaining that specd.yaml was not found'
  - requirement: 'Config file location and format'
    name: 'Invoked outside a git repo'
    given:
      - 'the user runs specd from a directory that is not inside any git repository'
    when:
      - 'specd searches for specd.yaml'
    then:
      - 'specd checks only the current working directory for specd.yaml'
  - requirement: 'Config file location and format'
    name: 'Explicit config flag bypasses local override'
    given:
      - 'specd --config /path/to/specd.yaml <command> is invoked'
    when:
      - 'specd resolves the config file'
    then:
      - 'specd uses the specified file exactly as-is — discovery and specd.local.yaml lookup are both skipped'
  - requirement: 'Local config override'
    name: 'Local file takes full precedence'
    given:
      - 'specd.local.yaml exists alongside specd.yaml'
    when:
      - 'specd loads the config'
    then:
      - 'specd loads only specd.local.yaml; specd.yaml is ignored entirely'
  - requirement: 'Local config override'
    name: 'Local file absent'
    given:
      - 'no specd.local.yaml exists alongside specd.yaml'
    when:
      - 'specd loads the config'
    then:
      - 'specd loads specd.yaml as normal; no error is emitted'
  - requirement: 'Local config override'
    name: 'Local file not committed'
    given:
      - 'specd init is run'
    when:
      - 'specd creates the initial config'
    then:
      - 'specd.local.yaml is added to .gitignore if not already present'
  - requirement: 'Local config override'
    name: 'Local file must be valid standalone'
    given:
      - 'specd.local.yaml is present but missing required fields (e.g. schema)'
    when:
      - 'specd validates the config'
    then:
      - 'specd exits with a validation error — partial configs are not supported'
  - requirement: 'Schema reference'
    name: 'npm package schema'
    given:
      - 'schema: "@specd/schema-std" is declared'
      - 'the package is installed'
    when:
      - 'SchemaRegistry.resolve() is called'
    then:
      - 'it loads from node_modules/@specd/schema-std/schema.yaml'
  - requirement: 'Schema reference'
    name: 'Bare name resolved from default workspace'
    given:
      - 'schema: "spec-driven" is declared'
      - 'workspaces.default.schemas.fs.path is specd/schemas'
    when:
      - 'SchemaRegistry.resolve() is called'
    then:
      - 'it loads specd/schemas/spec-driven/schema.yaml'
  - requirement: 'Schema reference'
    name: 'Hash-prefixed name resolved from default workspace'
    given:
      - 'schema: "#spec-driven" is declared'
    when:
      - 'SchemaRegistry.resolve() is called'
    then:
      - 'it behaves identically to the bare name form'
  - requirement: 'Schema reference'
    name: 'Workspace-qualified schema reference'
    given:
      - 'schema: "#billing:my-billing-schema" is declared'
      - 'workspaces.billing.schemas.fs.path is ../billing/dev/schemas'
    when:
      - 'SchemaRegistry.resolve() is called'
    then:
      - 'it loads ../billing/dev/schemas/my-billing-schema/schema.yaml'
  - requirement: 'Schema reference'
    name: 'Direct path schema'
    given:
      - 'schema: "./custom/schema.yaml" is declared'
    when:
      - 'SchemaRegistry.resolve() is called'
    then:
      - 'it loads that file relative to the specd.yaml directory'
  - requirement: 'Schema reference'
    name: 'Schema not found'
    given:
      - 'the declared schema reference matches no file at the resolved location'
    when:
      - 'SchemaRegistry.resolve() is called'
    then:
      - 'specd exits with SchemaNotFoundError identifying the reference and the path searched'
  - requirement: 'Schema reference'
    name: 'Schema fails validation'
    given:
      - 'the schema file is found but contains structural errors (e.g. missing name or version, circular requires)'
    when:
      - 'SchemaRegistry.resolve() validates the schema'
    then:
      - 'specd exits with SchemaValidationError describing the problem'
  - requirement: 'Schema reference'
    name: 'Schema field missing'
    given:
      - 'specd.yaml does not include a schema field'
    when:
      - 'specd starts up'
    then:
      - 'specd exits with ConfigValidationError'
  - requirement: 'Schema reference'
    name: 'Schema-independent command skips resolution'
    given:
      - 'specd --help or specd init is run'
    when:
      - 'the command executes'
    then:
      - 'SchemaRegistry.resolve() is not called'
  - requirement: 'Workspaces'
    name: 'Default workspace only (simple project)'
    given:
      - 'specd.yaml declares only a default workspace with specs.adapter: fs and specs.fs.path: specs/'
    when:
      - 'specd loads the config'
    then:
      - 'all spec paths are relative to specs/ and there are no external workspaces'
  - requirement: 'Workspaces'
    name: 'specd init creates default workspace'
    given:
      - 'specd init is run in a project with no specd.yaml'
    when:
      - 'specd creates the initial config'
    then:
      - 'a specd.yaml is created with a default workspace using specs.adapter: fs, specs.fs.path: specs/'
  - requirement: 'Workspaces'
    name: 'Non-default workspace resolves outside repo'
    given:
      - 'a workspace declares specs.fs.path: ../other-repo/specs which resolves outside the current git repo root'
    when:
      - 'specd resolves the workspace config'
    then:
      - 'RepositoryConfig.isExternal is true for that workspace'
  - requirement: 'Workspaces'
    name: 'Non-default workspace with custom schemas path'
    given:
      - 'workspaces.billing.schemas.fs.path: ../billing/dev/schemas is declared'
    when:
      - 'SchemaRegistry.resolve() is called with #billing:my-schema'
    then:
      - 'it resolves to ../billing/dev/schemas/my-schema/schema.yaml'
  - requirement: 'Workspaces'
    name: 'Workspace-qualified schema with no schemas section declared'
    given:
      - 'schema: "#billing:my-schema" is declared'
      - 'the billing workspace has no schemas section'
    when:
      - 'SchemaRegistry.resolve() is called'
    then:
      - 'specd exits with SchemaNotFoundError — there is no schema path configured for that workspace'
  - requirement: 'Workspaces'
    name: 'Workspace name collision'
    given:
      - 'two entries in workspaces use the same key'
    when:
      - 'YAML is parsed'
    then:
      - 'YAML parsing produces only one entry (last wins); specd config validate must warn about this pattern'
  - requirement: 'Workspaces'
    name: 'Missing default workspace'
    given:
      - 'specd.yaml declares a workspaces section but omits default'
    when:
      - 'specd starts up'
    then:
      - 'specd exits with a ConfigValidationError'
  - requirement: 'Workspaces'
    name: 'Missing codeRoot in non-default workspace'
    given:
      - 'a non-default workspace entry omits codeRoot'
    when:
      - 'specd starts up'
    then:
      - 'specd exits with a ConfigValidationError'
  - requirement: 'Storage configuration'
    name: 'Default storage layout'
    given:
      - 'specd.yaml uses adapter: fs with fs.path: specd/changes and fs.path: specd/archive'
    when:
      - 'specd resolves storage paths'
    then:
      - 'active changes are at specd/changes/ and archived changes at specd/archive/'
  - requirement: 'Storage configuration'
    name: 'Unknown adapter'
    given:
      - 'storage.changes.adapter is set to an unrecognised value (e.g. "s3")'
    when:
      - 'specd validates the config'
    then:
      - 'specd exits with a validation error listing supported adapters'
  - requirement: 'Template variables'
    name: 'Archive pattern with year prefix'
    given:
      - "storage.archive.fs.pattern is '{{year}}/{{change.archivedName}}"
    when:
      - 'a change is archived in 2024'
    then:
      - 'it is stored at specd/archive/2024/<archivedName>/'
  - requirement: 'Template variables'
    name: 'Unknown template variable'
    given:
      - 'a template string contains {{unknown}}'
    when:
      - 'the template is resolved'
    then:
      - 'the literal string {{unknown}} is used and a warning is emitted'
  - requirement: 'Workflow additions'
    name: 'Project hook appended'
    given:
      - 'both the schema and specd.yaml define hooks for archive.post'
    when:
      - 'the archiving lifecycle step executes'
    then:
      - 'schema hooks fire first, project hooks second, within the same lifecycle point'
  - requirement: 'Workflow additions'
    name: 'requires in project workflow entry'
    given:
      - 'a project-level workflow entry includes a requires field'
    when:
      - 'specd validates the config'
    then:
      - 'specd must reject it with a validation error on startup'
  - requirement: 'Workflow additions'
    name: 'Hook for step not in schema'
    given:
      - "a project-level workflow entry names a step not declared in the schema's workflow"
    when:
      - 'the config is validated'
    then:
      - 'the hooks are registered for that step; they fire if the step is ever invoked, and a warning is emitted at startup'
  - requirement: 'Project-level artifact rules'
    name: 'Rules injected'
    given:
      - 'artifactRules.specs is set'
    when:
      - 'CompileContext builds the context'
    then:
      - 'CompileContext includes those strings in the compiled context for the specs artifact as constraints the agent must follow'
  - requirement: 'Project-level artifact rules'
    name: 'Unknown artifact ID'
    given:
      - 'artifactRules contains a key not matching any artifact ID in the active schema'
    when:
      - 'specd starts up'
    then:
      - 'specd emits a warning and ignores those rules'
  - requirement: 'LLM optimization'
    name: 'Flag absent — deterministic mode'
    given:
      - 'a specd.yaml with no llmOptimizedContext field'
    when:
      - 'the metadata agent runs'
    then:
      - 'it uses deterministic structural extraction only — no LLM is invoked'
  - requirement: 'LLM optimization'
    name: 'Flag false — deterministic mode'
    given:
      - 'a specd.yaml with llmOptimizedContext: false'
    when:
      - 'the metadata agent runs'
    then:
      - 'it uses deterministic structural extraction only — no LLM is invoked'
  - requirement: 'LLM optimization'
    name: 'Flag true — LLM mode'
    given:
      - 'a specd.yaml with llmOptimizedContext: true'
    when:
      - 'the metadata agent runs'
    then:
      - 'it invokes the LLM to produce richer metadata (descriptions, structured scenarios, dependsOn suggestions)'
  - requirement: 'LLM optimization'
    name: 'Non-boolean value — startup error'
    given:
      - 'llmOptimizedContext is set to a non-boolean value (e.g. "yes", 1)'
    when:
      - 'specd starts up'
    then:
      - 'specd exits with a startup validation error'
  - requirement: 'Plugin declarations'
    name: 'Plugin installed'
    given:
      - 'plugins: [{ name: "@specd/plugin-claude" }] is declared'
    when:
      - 'specd update is run'
    then:
      - "specd update ensures the plugin's skill files and hook configuration are up to date"
  - requirement: 'Context spec selection'
    name: 'Project-level patterns always apply'
    given:
      - "project-level contextIncludeSpecs: ['shared:_global/*'] is declared"
      - 'the current change only touches the default workspace'
    when:
      - 'CompileContext builds the context'
    then:
      - 'CompileContext still includes shared:_global/* specs — project-level patterns are not filtered by change scope'
  - requirement: 'Context spec selection'
    name: 'Workspace-level patterns only apply when workspace is active'
    given:
      - "billing workspace declares contextIncludeSpecs: ['*']"
      - 'the current change touches only default specs'
    when:
      - 'CompileContext builds the context'
    then:
      - 'CompileContext does not include billing specs — the billing workspace is not active'
  - requirement: 'Context spec selection'
    name: 'Workspace-level patterns apply when workspace is active'
    given:
      - "billing workspace declares contextIncludeSpecs: ['*']"
      - 'the current change touches a billing spec'
    when:
      - 'CompileContext builds the context'
    then:
      - 'CompileContext includes all billing workspace specs'
  - requirement: 'Context spec selection'
    name: 'Qualifier omitted at workspace level resolves to that workspace'
    given:
      - "inside billing workspace, contextIncludeSpecs: ['payments/*'] is declared"
    when:
      - 'CompileContext resolves the pattern'
    then:
      - 'CompileContext resolves it as billing:payments/*, not default:payments/*'
  - requirement: 'Context spec selection'
    name: 'Default project-level include is all default workspace specs'
    given:
      - 'project-level contextIncludeSpecs is omitted'
    when:
      - 'CompileContext builds the context'
    then:
      - "CompileContext behaves as if contextIncludeSpecs: ['default:*'] were declared at project level"
  - requirement: 'Context spec selection'
    name: 'Default workspace-level include is all specs in that workspace'
    given:
      - 'a workspace declares no contextIncludeSpecs'
      - 'that workspace is active in the current change'
    when:
      - 'CompileContext builds the context'
    then:
      - "CompileContext includes all specs in that workspace, as if contextIncludeSpecs: ['*'] were declared"
  - requirement: 'Context spec selection'
    name: 'Resolution order — project includes, project excludes, workspace includes, workspace excludes'
    given:
      - "project-level contextIncludeSpecs: ['default:*'] and contextExcludeSpecs: ['default:drafts/*']"
      - "default workspace declares contextIncludeSpecs: ['*'] and the change is active in default"
    when:
      - 'CompileContext builds the context'
    then:
      - 'project-level includes are accumulated first, then project-level excludes remove default:drafts/*, then workspace-level includes from default add remaining specs, in that order'
  - requirement: 'Context spec selection'
    name: 'Project-level exclude applied before workspace-level includes'
    given:
      - "project-level contextExcludeSpecs: ['default:auth/*']"
      - "default workspace declares contextIncludeSpecs: ['auth/*'] and is active"
    when:
      - 'CompileContext builds the context'
    then:
      - 'default:auth/* specs are excluded — the project-level exclude (step 2) fires before workspace-level includes (step 3)'
  - requirement: 'Context spec selection'
    name: 'Project-level exclude always applied regardless of active workspace'
    given:
      - "project-level contextExcludeSpecs: ['default:drafts/*'] is declared"
      - 'the change only touches billing'
    when:
      - 'CompileContext builds the context'
    then:
      - 'drafts/* specs are still excluded from context even though default is not the active workspace'
  - requirement: 'Context spec selection'
    name: 'Workspace declaration order determines workspace-level priority'
    given:
      - "default and billing both declare contextIncludeSpecs: ['*']"
      - 'the change touches both'
      - 'default is declared first in specd.yaml'
    when:
      - 'CompileContext builds the context'
    then:
      - 'default specs appear before billing specs in context'
  - requirement: 'Context spec selection'
    name: 'Spec matched by multiple patterns appears once'
    given:
      - "project-level includes shared:_global/* and default workspace includes ['shared:_global/architecture']"
      - 'both match the same spec'
    when:
      - 'CompileContext builds the context'
    then:
      - 'the spec appears once, at the position determined by the project-level pattern (first match)'
  - requirement: 'Context spec selection'
    name: 'Workspace-level exclude only applied when workspace is active'
    given:
      - "billing workspace declares contextExcludeSpecs: ['drafts/*']"
      - 'the change only touches default'
    when:
      - 'CompileContext builds the context'
    then:
      - 'the billing exclude is not applied — billing is not active'
  - requirement: 'Context spec selection'
    name: 'Workspace-level exclude qualifier resolves to that workspace'
    given:
      - "inside billing, contextExcludeSpecs: ['drafts/*'] is declared"
      - 'billing is active'
    when:
      - 'CompileContext builds the context'
    then:
      - 'billing:drafts/* specs are excluded from context'
  - requirement: 'Context spec selection'
    name: 'Direct include path selects only that spec'
    given:
      - "contextIncludeSpecs: ['auth/login'] is declared"
      - 'both auth/login and auth/register exist in the default workspace'
    when:
      - 'CompileContext builds the context'
    then:
      - 'CompileContext includes auth/login and does not include auth/register'
  - requirement: 'Context spec selection'
    name: 'Direct exclude path removes only that spec'
    given:
      - "contextIncludeSpecs: ['auth/*'] and contextExcludeSpecs: ['auth/login'] are declared"
      - 'both auth/login and auth/register exist'
    when:
      - 'CompileContext builds the context'
    then:
      - 'CompileContext includes auth/register but not auth/login'
  - requirement: 'Context spec selection'
    name: 'Non-existent spec path silently skipped at compile time'
    given:
      - "contextIncludeSpecs: ['auth/does-not-exist'] is declared"
      - 'no such spec exists on disk'
    when:
      - 'CompileContext builds the context'
    then:
      - 'CompileContext produces no error — the missing path is silently skipped'
  - requirement: 'Context spec selection'
    name: 'Unmatched pattern warns in config validate'
    given:
      - 'specd config validate is run'
      - 'a pattern in contextIncludeSpecs or contextExcludeSpecs matches no specs on disk'
    when:
      - 'specd validates the patterns'
    then:
      - 'specd emits a warning identifying the pattern — the command still exits successfully'
  - requirement: 'Context spec selection'
    name: 'Unknown workspace qualifier warns at runtime'
    given:
      - "contextIncludeSpecs: ['unknown-workspace:*'] is declared"
      - 'no workspace named unknown-workspace exists'
    when:
      - 'specd starts up'
    then:
      - 'specd emits a warning but does not exit — context compilation proceeds without that pattern'
  - requirement: 'Context spec selection'
    name: 'Unknown workspace qualifier fails config validate'
    given:
      - 'specd config validate is run'
      - 'a pattern contains a workspace qualifier that does not match any declared workspace'
    when:
      - 'specd validates the config'
    then:
      - 'specd exits with an error — unknown qualifiers are treated as errors in validate to catch typos before they silently drop specs from context'
  - requirement: 'Context spec selection'
    name: 'Workspace becomes active from change metadata'
    given:
      - "a change's metadata lists specs from both the default workspace and the billing workspace"
    when:
      - 'CompileContext determines active workspaces'
    then:
      - 'both workspaces are considered active'
  - requirement: 'Context spec selection'
    name: 'Workspace not active when absent from change metadata'
    given:
      - "a change's metadata lists only default specs"
    when:
      - 'CompileContext builds the context'
    then:
      - 'the billing workspace is not active and its workspace-level patterns are not applied'
  - requirement: 'Context spec selection'
    name: 'Invalid pattern syntax is a startup error'
    given:
      - "contextIncludeSpecs: ['auth/*/login'] is declared (* in the middle of a path segment)"
    when:
      - 'specd starts up'
    then:
      - 'specd exits with a config validation error'
  - requirement: 'Project context instructions'
    name: 'Context entries injected before spec content'
    given:
      - 'specd.yaml declares context: [{ instruction: "Always prefer editing existing files." }]'
    when:
      - 'CompileContext builds the compiled context'
    then:
      - 'the instruction appears before any spec content in the output'
  - requirement: 'Project context instructions'
    name: 'File reference is read and injected verbatim'
    given:
      - 'specd.yaml declares context: [{ file: specd-bootstrap.md }]'
      - 'the file exists'
    when:
      - 'CompileContext builds the compiled context'
    then:
      - 'the full content of specd-bootstrap.md is injected verbatim, before spec content'
  - requirement: 'Project context instructions'
    name: 'Missing file emits a warning'
    given:
      - 'specd.yaml declares context: [{ file: does-not-exist.md }]'
    when:
      - 'CompileContext builds the compiled context'
    then:
      - 'a warning is emitted identifying the missing file, compilation proceeds normally, and the entry is absent from the output'
  - requirement: 'Project context instructions'
    name: 'context absent — no effect'
    given:
      - 'specd.yaml does not declare a context field'
    when:
      - 'CompileContext builds the compiled context'
    then:
      - 'the output is identical to a config with context: [] — no error, no warning'
  - requirement: 'Project context instructions'
    name: 'Mixed inline and file entries preserve declaration order'
    given:
      - 'context: [{ file: AGENTS.md }, { instruction: "Inline note." }, { file: specd-bootstrap.md }]'
    when:
      - 'CompileContext builds the compiled context'
    then:
      - 'AGENTS.md content appears first, then "Inline note.", then specd-bootstrap.md content, before any spec content'
  - requirement: 'Project context instructions'
    name: 'File path resolved relative to specd.yaml directory'
    given:
      - 'specd.yaml is at /project/specd.yaml'
      - 'it declares context: [{ file: docs/bootstrap.md }]'
    when:
      - 'CompileContext resolves the file entry'
    then:
      - 'it reads /project/docs/bootstrap.md'
  - requirement: 'Project context instructions'
    name: 'Absolute file path accepted'
    given:
      - 'specd.yaml declares context: [{ file: /shared/instructions.md }]'
      - 'that file exists'
    when:
      - 'CompileContext resolves the file entry'
    then:
      - 'it reads /shared/instructions.md directly'
  - requirement: 'Startup validation'
    name: 'Missing required field blocks startup'
    given:
      - 'specd.yaml is missing any required field (e.g. schema, storage, default workspace, adapter in a specs section)'
    when:
      - 'specd starts up'
    then:
      - 'specd exits immediately with a descriptive error before executing the requested command'
  - requirement: 'Startup validation'
    name: 'Invalid pattern syntax blocks startup'
    given:
      - "contextIncludeSpecs contains an invalid pattern such as 'auth/*/login'"
    when:
      - 'specd starts up'
    then:
      - 'specd exits with a config validation error'
  - requirement: 'Startup validation'
    name: 'Storage path outside repo root blocks startup'
    given:
      - 'storage.changes.fs.path resolves to a directory outside the project repo root'
    when:
      - 'specd starts up'
    then:
      - 'specd exits with a config validation error'
  - requirement: 'Startup validation'
    name: 'Warning does not block startup'
    given:
      - 'specd.yaml has an artifactRules key for an unknown artifact'
    when:
      - 'specd starts up'
    then:
      - 'a warning is printed but the command proceeds normally'
  - requirement: 'Startup validation'
    name: 'specd init requires no existing config'
    given:
      - 'specd init is run in a directory with no specd.yaml'
    when:
      - 'specd starts up'
    then:
      - 'specd does not attempt to validate a config — it creates one from defaults and exits successfully'
