title: 'Project Configuration'
description: >
  Defines the structure, validation, and resolution rules for specd.yaml — the single project-level
  configuration file. Covers config discovery, schema references, workspaces, storage, workflow hooks,
  artifact rules, context spec selection, approvals, LLM optimization, skills, plugins, and the
  ConfigWriter port. Read this spec when working on config loading, validation, or any feature that
  reads or writes specd.yaml.
keywords:
  - 'config'
  - 'specd.yaml'
  - 'specd.local.yaml'
  - 'schema'
  - 'workspaces'
  - 'storage'
  - 'workflow'
  - 'artifactRules'
  - 'contextIncludeSpecs'
  - 'contextExcludeSpecs'
  - 'approvals'
  - 'llmOptimizedContext'
  - 'skills'
  - 'plugins'
  - 'ConfigWriter'
  - 'FsConfigLoader'
  - 'ConfigValidationError'
dependsOn:
  - 'core:core/schema-format'
  - 'default:_global/architecture'
  - 'core:core/storage'
  - 'core:core/spec-metadata'
contentHashes:
  'spec.md': 'sha256:c5fc78938cf859fad2405e8377190ee44a852214b1d7acd8d1cf2c9f9134ab94'
  'verify.md': 'sha256:1f68b76a90ebd403b257cfaddfd2acb71d7720864000cc19ad9602d09ef48f1f'
rules:
  - requirement: 'Config file location and format'
    rules:
      - 'specd.yaml must be a valid YAML file.'
      - 'If the CLI is invoked with --config path/to/specd.yaml, that path is used directly; no discovery takes place.'
      - 'specd walks up from the current working directory, checking each directory for specd.yaml, stopping at the first match (nearest to CWD) or at the git repo root (nearest ancestor containing .git/), whichever comes first.'
      - 'If no specd.yaml is found before or at the repo root, specd exits with an error.'
      - 'If no .git/ ancestor exists, specd checks only the current working directory and stops there.'
      - 'The search never goes above the git repo root.'
  - requirement: 'Local config override'
    rules:
      - 'Developers may place a specd.local.yaml file in the same directory as specd.yaml to use a fully independent local configuration.'
      - 'When specd.local.yaml is present, specd uses it exclusively — specd.yaml is not read and no merging takes place.'
      - 'The local file must be a complete, self-contained config that must be valid on its own.'
      - 'specd.local.yaml is optional — its absence is normal.'
      - 'specd init must add specd.local.yaml to the project .gitignore so it is never committed.'
      - 'When the CLI is invoked with --config, no specd.local.yaml lookup takes place.'
  - requirement: 'Schema reference'
    rules:
      - 'specd.yaml must declare a schema field identifying the schema that governs this project; the field is required.'
      - 'Only one schema is active per project at a time — per-workspace schema selection is not supported.'
      - '@scope/name resolves to node_modules/@scope/name/schema.yaml.'
      - '#workspace:name resolves from the named workspace schemas section: workspaces.<workspace>.schemas.fs.path/<name>/schema.yaml.'
      - '#name or bare name is equivalent to #default:name, resolved from the default workspace schemas section.'
      - 'Relative or absolute path resolves directly; relative paths are resolved from the directory containing specd.yaml.'
      - 'There is no implicit multi-level fallback — the prefix determines exactly where specd looks.'
      - 'SchemaRegistry.resolve() receives the full value from specd.yaml and dispatches based on the prefix.'
      - 'Schema resolution happens at command dispatch time, immediately before the command body executes.'
      - 'Commands that do not require the schema — such as --help, --version, init, config validate, and plugin subcommands — skip resolution entirely.'
      - 'ConfigValidationError (malformed specd.yaml) and SchemaNotFoundError / SchemaValidationError (resolution failures) are domain errors defined in @specd/core extending SpecdError, with distinct messages and exit codes.'
  - requirement: 'Workspaces'
    rules:
      - 'specd.yaml must declare at least one workspace under the workspaces key.'
      - 'default is a reserved workspace name that identifies the local project workspace; every config must contain a default workspace.'
      - 'specd init creates the default workspace automatically if no workspaces section is present.'
      - 'specs (required) declares where the workspace spec files live, with its own adapter and adapter-specific config block; only fs is supported in v1.'
      - 'specs.fs.path (required for fs adapter) is the directory where spec files live; relative paths are resolved from the directory containing specd.yaml.'
      - 'If specs.fs.path resolves outside the project repo root, RepositoryConfig.isExternal is set to true by the application layer.'
      - 'schemas (optional) declares where named local schemas for this workspace are stored, with its own adapter and adapter-specific config block independent of specs.'
      - 'For the default workspace, if schemas is omitted, it defaults to adapter: fs with fs.path: specd/schemas.'
      - 'For non-default workspaces, if schemas is omitted, the workspace has no local schemas — any schema reference targeting it produces a SchemaNotFoundError.'
      - 'codeRoot is the directory where implementation code lives; for the default workspace it defaults to the project root; for non-default workspaces it is required.'
      - 'ownership values: owned (project owns specs, default for default), shared (co-owns, changes may require coordination), readOnly (reads but does not modify, default for non-default).'
      - 'prefix (optional) is a logical path prefix prepended to all capability paths in this workspace.'
      - 'Prefix may be single-segment (_global) or multi-segment (team_1/shared/core); each segment must match /^[a-z0-9_][a-z0-9_-]*$/.'
      - 'Full prefix is validated as one or more valid segments separated by /, no leading/trailing /, no empty segments, no . or .. segments, no \, :, *, ?, ", <, >, | characters.'
      - 'Two workspaces may share the same prefix.'
      - 'dependsOn references use the prefixed path; contextIncludeSpecs / contextExcludeSpecs patterns use the prefixed path.'
      - 'Invalid prefix values produce ConfigValidationError at startup.'
      - 'isExternal is not declared in config — it is inferred by the application layer.'
      - 'contextIncludeSpecs (optional) — workspace-level context spec patterns, loaded only when this workspace is active; omitting the workspace qualifier means this workspace.'
      - 'contextExcludeSpecs (optional) — workspace-level exclusion patterns, applied only when this workspace is active; same qualifier semantics as contextIncludeSpecs at workspace level.'
      - 'Workspace names must be unique and must match /^[a-z][a-z0-9-]*$/; default is reserved.'
      - "Each project's specd.yaml is the sole source of truth for that project's view of its workspaces; specd never reads the specd.yaml of external repos declared as workspaces."
      - 'When an external workspace structure changes, every project that references it must update its own specd.yaml manually.'
      - 'ownership is always relative to the declaring project.'
  - requirement: 'Storage configuration'
    rules:
      - 'specd.yaml must include a storage section with sub-keys for changes and archive; these paths are global per project.'
      - 'All four sub-keys (changes, drafts, discarded, archive) are required.'
      - 'adapter is required per sub-key; adapter-specific fields are nested under the adapter key (fs:).'
      - 'Unknown adapter values must produce a validation error.'
      - 'Relative paths are resolved from the directory containing specd.yaml and must remain within the project repo root.'
      - 'drafts stores shelved changes not ready for active development; a change can be moved from changes/ to drafts/ at any point before archiving and moved back.'
      - 'discarded stores permanently abandoned changes; a discarded change must include a reason and cannot be recovered.'
      - 'specd init adds specd/drafts/ and specd/discarded/ to .gitignore by default.'
      - 'The archive directory contains a .specd-index.jsonl file that caches metadata from individual manifests; it is a derived cache, not a source of truth.'
      - 'specd init gitignores .specd-index.jsonl inside the archive directory via a local .gitignore.'
      - 'When the index is missing it is automatically rebuilt from the manifest files on disk.'
  - requirement: 'Template variables'
    rules:
      - 'Several fields in specd.yaml support template variable interpolation using {{variable}} syntax, resolved at runtime.'
      - 'In storage.archive.fs.pattern the available variables are: {{change.name}}, {{change.archivedName}}, {{change.workspace}}, {{year}}, {{date}}.'
      - 'In workflow hook run commands the available variables are: {{change.name}}, {{change.workspace}}, {{codeRoot}}.'
      - 'Unknown variables in a template are left as-is and a warning is emitted.'
  - requirement: 'Workflow additions'
    rules:
      - 'specd.yaml may include a workflow section to add project-level hooks to change lifecycle steps declared in the schema.'
      - 'Entries are matched to schema workflow entries by step name; schema hooks fire first, then project hooks.'
      - 'requires is not valid in project-level workflow entries and must be rejected.'
  - requirement: 'Project-level artifact rules'
    rules:
      - 'specd.yaml may include an artifactRules section to add per-artifact constraints without forking the schema.'
      - 'Keys are artifact IDs; values are arrays of constraint strings.'
      - 'CompileContext injects them as a distinct block in the compiled instruction, after the schema instruction.'
      - 'Keys are validated against the active schema artifact IDs at startup; unknown keys emit a warning but do not prevent startup.'
  - requirement: 'Context spec selection'
    rules:
      - 'contextIncludeSpecs and contextExcludeSpecs can be declared at project level (always applied) and workspace level (applied only when that workspace is active).'
      - 'A workspace is considered active if at least one of its specs is listed in the current change metadata.'
      - 'CompileContext resolves each spec workspace by matching its path against the declared specs.fs.path entries — not by scanning the filesystem, CWD, or codeRoot.'
      - 'Pattern * alone means all specs in all workspaces (project level) or all specs in this workspace (workspace level).'
      - 'Pattern workspace:* means all specs in the named workspace.'
      - 'Pattern prefix/* means all specs under prefix/ in default (project level) or this workspace (workspace level).'
      - 'Pattern path/name means exact spec in default (project level) or this workspace (workspace level); does not match descendants.'
      - '* may only appear alone, as workspace:*, or as a path suffix prefix/* — no other position.'
      - 'At project level, omitting the workspace qualifier is equivalent to default:; at workspace level, omitting it means this workspace.'
      - "Project-level contextIncludeSpecs defaults to ['default:*']; project-level contextExcludeSpecs defaults to []."
      - "Workspace-level contextIncludeSpecs defaults to ['*'] (all specs in that workspace); workspace-level contextExcludeSpecs defaults to []."
      - 'CompileContext resolution order: (1) project-level context entries, (2) project-level include patterns, (3) project-level exclude patterns, (4) workspace-level include patterns from each active workspace, (5) workspace-level exclude patterns from each active workspace, (6) specs reachable via dependsOn traversal.'
      - 'Specs added via dependsOn traversal are not subject to exclude rules from steps 3 or 5.'
      - 'Specs matched by earlier patterns take priority if context must be truncated; a spec matched by multiple include patterns appears only once at the position of the first matching pattern.'
      - 'Step 1 context entries are injected as-is and are not deduplicated against specs.'
      - 'References to unknown workspace qualifiers produce a warning at startup but do not prevent startup; however specd config validate must fail with an error for unknown workspace qualifiers.'
      - 'References to non-existent spec IDs are silently skipped at context-compilation time.'
      - 'Invalid pattern syntax is an error caught at startup.'
      - 'specd config validate warns when a pattern matches no specs on disk at validation time.'
  - requirement: 'Project context instructions'
    rules:
      - 'specd.yaml may include a top-level context field to inject additional freeform content into the compiled context alongside specs.'
      - 'Each entry is an object with exactly one key: either instruction (string injected verbatim) or file (path read at compile time and content injected verbatim).'
      - 'File paths are relative to the directory containing specd.yaml; absolute paths are also accepted.'
      - 'The context field is optional; if absent, no additional content is injected.'
      - 'Entries are prepended to the compiled context in declaration order, before any spec content.'
      - 'If a referenced file does not exist at compile time, specd emits a warning identifying the missing file, skips that entry, and continues compilation normally.'
      - 'There is no depth limit on file content; files are not parsed or transformed.'
  - requirement: 'Approvals'
    rules:
      - 'specd.yaml may include an approvals section to configure which lifecycle gates require explicit human approval; both gates are disabled by default.'
      - 'approvals.spec: when true, a change in ready state cannot transition directly to implementing; it must enter pending-spec-approval and receive explicit approval (with approver identity, reason, and timestamp) before transitioning to spec-approved and then to implementing.'
      - 'approvals.signoff: when true, a change in done state cannot transition directly to archivable; it must enter pending-signoff, receive explicit sign-off, and transition through signed-off to archivable.'
      - 'Both flags are independent — any combination is valid.'
  - requirement: 'LLM optimization'
    rules:
      - 'specd.yaml may include a top-level llmOptimizedContext boolean field; when true, specd may invoke an LLM for optimization tasks; when false or absent (default), all operations use deterministic processing only.'
      - 'With llmOptimizedContext false, the metadata agent extracts rules and scenarios by parsing structural conventions directly; with true, the LLM generates richer description, structured given/when/then, and more precise dependsOn suggestions.'
  - requirement: 'Skills manifest'
    rules:
      - 'specd.yaml may include a skills section recording which skills from @specd/skills have been installed at the project level for each agent.'
      - 'Keys are agent IDs; values are arrays of skill names.'
      - 'The section is optional — its absence means no skills are tracked.'
      - 'Skills installed globally (--global) are not recorded here.'
  - requirement: 'Plugin declarations'
    rules:
      - 'specd.yaml may include a plugins section declaring which agent-integration plugins are installed.'
      - 'Each entry must include name; options is plugin-specific and optional.'
      - 'Plugin declarations are used by specd project init, specd plugin add, and specd project update to install and maintain plugin skill files and hooks.'
      - 'Plugin declarations do not affect schema resolution, storage, or context compilation.'
  - requirement: 'Config writer port'
    rules:
      - '@specd/core exposes a ConfigWriter application port for all operations that mutate specd.yaml.'
      - 'Adapters (CLI, MCP) never serialise or deserialise YAML directly — they call use cases that delegate to ConfigWriter.'
      - 'initProject(options) writes a new specd.yaml with the provided schema reference, workspace id, and workspace specs path; fails if file already exists and force is false; also creates standard storage directories, appends specd.local.yaml to .gitignore, and creates a .gitignore inside the archive directory to exclude index.jsonl.'
      - 'recordSkillInstall(configPath, agent, skillNames) adds skill names to specd.yaml skills.<agent> array, deduplicating existing entries.'
      - 'readSkillsManifest(configPath) returns the skills section as a typed map { [agent: string]: string[] }; this is a targeted read that does not require a fully validated SpecdConfig.'
      - 'FsConfigWriter implements the port using the filesystem, preserving comments and key order as much as the YAML library permits.'
      - '@specd/core owns all YAML serialisation and deserialisation; adapters call use cases with typed inputs and receive typed outputs.'
      - '@specd/core never writes agent-specific files (e.g. .claude/commands/*.md) — those are adapter-layer concerns.'
      - 'Use cases that call ConfigWriter: InitProject (initProject), RecordSkillInstall (recordSkillInstall), GetSkillsManifest (readSkillsManifest).'
  - requirement: 'Startup validation'
    rules:
      - 'specd must validate specd.yaml before executing any command that requires a config; specd init is exempt.'
      - 'FsConfigLoader validates the parsed YAML against a Zod schema before constructing SpecdConfig.'
      - 'Any structural mismatch surfaces immediately as a ConfigValidationError (extends SpecdError) before any path resolution or domain object construction.'
      - 'Errors that abort startup: schema field missing; storage section missing or changes/archive sub-key absent; workspaces section missing or no default workspace; specs section missing in any workspace; codeRoot missing in non-default workspace; adapter missing in any specs/schemas/storage section; unknown adapter value; required adapter-specific fields absent; requires field in project-level workflow entry; storage path resolving outside repo root; invalid contextIncludeSpecs or contextExcludeSpecs pattern syntax.'
      - 'Warnings that allow startup: unknown key in artifactRules; duplicate workspace names; project-level workflow entry naming a step not in schema; unknown workspace qualifier in context patterns (runtime only — config validate treats it as an error).'
constraints:
  - 'schema is required — specd cannot start without a schema reference.'
  - 'workspaces.default is required — every config must have a default workspace; specd init creates it.'
  - 'specd.local.yaml is always .gitignored; specd init must add it automatically.'
  - 'When specd.local.yaml is present it is the sole active config — specd.yaml is not read.'
  - 'specd.local.yaml must be a complete, valid config on its own; partial overrides are not supported.'
  - 'requires is not valid in project-level workflow entries — only step and hooks are accepted.'
  - 'Workspace names must match /^[a-z][a-z0-9-]*$/; default is reserved for the local project workspace.'
  - 'ownership values are limited to readOnly, shared, and owned.'
  - 'isExternal is not declared — it is inferred by the application layer from whether the resolved specs.fs.path is outside the project repo root.'
  - 'Every workspace must declare a specs section; codeRoot is required for non-default workspaces.'
  - 'schemas is optional: for the default workspace it defaults to adapter: fs / fs.path: specd/schemas; for non-default workspaces, omitting it means no local schemas — schema references targeting that workspace produce SchemaNotFoundError.'
  - 'adapter is required in every specs, schemas, and storage section; adapter-specific fields are nested under the adapter key.'
  - 'storage section is required and must contain both changes and archive sub-keys.'
  - 'All relative paths resolve from the specd.yaml directory; storage paths (fs.path in changes and archive) must remain within the repo root.'
  - "Project-level contextIncludeSpecs defaults to ['default:*']; project-level contextExcludeSpecs defaults to []."
  - "Workspace-level contextIncludeSpecs defaults to ['*'] (all specs in that workspace); workspace-level contextExcludeSpecs defaults to []."
  - 'llmOptimizedContext is optional; defaults to false; must be a boolean — any other type is a startup validation error.'
  - 'context is optional; each entry is an object with exactly one key: either file or instruction — no other shapes are valid.'
  - 'context file paths are resolved relative to the specd.yaml directory; absolute paths are accepted.'
  - 'A missing context file is silently skipped at compile time — no warning, no error.'
  - 'context file content is injected verbatim — no parsing or transformation is applied.'
  - 'context entries are prepended to the compiled context in declaration order, before any spec content.'
  - 'Project-level patterns are always applied; workspace-level patterns are applied only when that workspace is active in the current change.'
  - 'At project level, omitting the workspace qualifier is equivalent to default:; at workspace level, omitting it means the declaring workspace.'
  - 'Include pattern order (project-level first, then active workspace declaration order) determines context order and truncation priority.'
  - 'A spec matched by multiple include patterns appears once, at the position of the first matching pattern.'
  - '* in a pattern may only appear alone, as workspace:*, or as a path suffix prefix/* — any other position is a startup error.'
  - 'Unknown workspace qualifiers in patterns produce a warning, not an error; missing spec IDs are silently skipped at compile time.'
scenarios:
  - requirement: 'Config file location and format'
    name: 'Config found — nearest file used'
    when:
      - 'A specd.yaml exists somewhere between the CWD and the git repo root'
    then:
      - 'specd uses the nearest one (closest to CWD) and stops walking'
  - requirement: 'Config file location and format'
    name: 'Monorepo — package config takes precedence'
    when:
      - 'A monorepo has a specd.yaml at the root and another at packages/billing/specd.yaml, and the user runs specd from within packages/billing/'
    then:
      - 'specd uses packages/billing/specd.yaml and does not continue walking up to the root'
  - requirement: 'Config file location and format'
    name: 'Config not found inside repo'
    when:
      - 'The user runs any specd command inside a git repository and no specd.yaml exists between the CWD and the repo root'
    then:
      - 'specd exits with an error explaining that specd.yaml was not found and pointing to specd init'
  - requirement: 'Config file location and format'
    name: 'Invoked outside a git repo'
    when:
      - 'The user runs specd from a directory that is not inside any git repository'
    then:
      - 'specd checks only the current working directory for specd.yaml and exits with an error if not found there'
  - requirement: 'Config file location and format'
    name: 'Explicit config flag bypasses local override'
    when:
      - 'specd --config /path/to/specd.yaml <command> is invoked'
    then:
      - 'specd uses the specified file exactly as-is — discovery and specd.local.yaml lookup are both skipped'
  - requirement: 'Local config override'
    name: 'Local file takes full precedence'
    when:
      - 'specd.local.yaml exists alongside specd.yaml'
    then:
      - 'specd loads only specd.local.yaml; specd.yaml is ignored entirely'
  - requirement: 'Local config override'
    name: 'Local file absent'
    when:
      - 'No specd.local.yaml exists alongside specd.yaml'
    then:
      - 'specd loads specd.yaml as normal; no error is emitted'
  - requirement: 'Local config override'
    name: 'Local file not committed'
    when:
      - 'specd init is run'
    then:
      - 'specd.local.yaml is added to .gitignore if not already present'
  - requirement: 'Local config override'
    name: 'Local file must be valid standalone'
    when:
      - 'specd.local.yaml is present but missing required fields (e.g. schema)'
    then:
      - 'specd exits with a validation error — partial configs are not supported'
  - requirement: 'Schema reference'
    name: 'npm package schema'
    when:
      - 'schema: "@specd/schema-std" is declared and the package is installed'
    then:
      - 'SchemaRegistry.resolve() loads it from node_modules/@specd/schema-std/schema.yaml'
  - requirement: 'Schema reference'
    name: 'Bare name resolved from default workspace'
    when:
      - 'schema: "spec-driven" is declared and workspaces.default.schemas.fs.path is specd/schemas'
    then:
      - 'SchemaRegistry.resolve() loads specd/schemas/spec-driven/schema.yaml'
  - requirement: 'Schema reference'
    name: 'Hash-prefixed name resolved from default workspace'
    when:
      - 'schema: "#spec-driven" is declared'
    then:
      - 'SchemaRegistry.resolve() behaves identically to the bare name form'
  - requirement: 'Schema reference'
    name: 'Workspace-qualified schema reference'
    when:
      - 'schema: "#billing:my-billing-schema" is declared and workspaces.billing.schemas.fs.path is ../billing/dev/schemas'
    then:
      - 'SchemaRegistry.resolve() loads ../billing/dev/schemas/my-billing-schema/schema.yaml'
  - requirement: 'Schema reference'
    name: 'Direct path schema'
    when:
      - 'schema: "./custom/schema.yaml" is declared'
    then:
      - 'SchemaRegistry.resolve() loads that file relative to the specd.yaml directory'
  - requirement: 'Schema reference'
    name: 'Schema not found'
    when:
      - 'The declared schema reference matches no file at the resolved location'
    then:
      - 'specd exits with SchemaNotFoundError identifying the reference and the path searched'
  - requirement: 'Schema reference'
    name: 'Schema fails validation'
    when:
      - 'The schema file is found but contains structural errors (e.g. missing name or version, circular requires)'
    then:
      - 'specd exits with SchemaValidationError describing the problem; the command does not run'
  - requirement: 'Schema reference'
    name: 'Schema field missing'
    when:
      - 'specd.yaml does not include a schema field'
    then:
      - 'specd exits with ConfigValidationError on startup'
  - requirement: 'Schema reference'
    name: 'Schema-independent command skips resolution'
    when:
      - 'specd --help or specd init is run'
    then:
      - 'SchemaRegistry.resolve() is not called; the command runs regardless of whether the schema is valid or even declared'
  - requirement: 'Workspaces'
    name: 'Default workspace only (simple project)'
    when:
      - 'specd.yaml declares only a default workspace with specs.adapter: fs and specs.fs.path: specs/'
    then:
      - 'All spec paths are relative to specs/ and there are no external workspaces'
  - requirement: 'Workspaces'
    name: 'specd init creates default workspace'
    when:
      - 'specd init is run in a project with no specd.yaml'
    then:
      - 'A specd.yaml is created with a default workspace using specs.adapter: fs, specs.fs.path: specs/, storage paths specd/changes and specd/archive, and no other workspaces'
  - requirement: 'Workspaces'
    name: 'Non-default workspace resolves outside repo'
    when:
      - 'A workspace declares specs.fs.path: ../other-repo/specs which resolves outside the current git repo root'
    then:
      - 'RepositoryConfig.isExternal is true for that workspace; no config error is emitted'
  - requirement: 'Workspaces'
    name: 'Non-default workspace with custom schemas path'
    when:
      - 'workspaces.billing.schemas.fs.path: ../billing/dev/schemas is declared'
    then:
      - 'schema: "#billing:my-schema" resolves to ../billing/dev/schemas/my-schema/schema.yaml'
  - requirement: 'Workspaces'
    name: 'Workspace-qualified schema with no schemas section declared'
    when:
      - 'schema: "#billing:my-schema" is declared and the billing workspace has no schemas section'
    then:
      - 'specd exits with SchemaNotFoundError — there is no schema path configured for that workspace'
  - requirement: 'Workspaces'
    name: 'Workspace name collision'
    when:
      - 'Two entries in workspaces use the same key'
    then:
      - 'YAML parsing produces only one entry (last wins); specd config validate must warn about this pattern'
  - requirement: 'Workspaces'
    name: 'Missing default workspace'
    when:
      - 'specd.yaml declares a workspaces section but omits default'
    then:
      - 'specd exits with a ConfigValidationError'
  - requirement: 'Workspaces'
    name: 'Missing codeRoot in non-default workspace'
    when:
      - 'A non-default workspace entry omits codeRoot'
    then:
      - 'specd exits with a ConfigValidationError at startup'
  - requirement: 'Storage configuration'
    name: 'Default storage layout'
    when:
      - 'specd.yaml uses adapter: fs with fs.path: specd/changes and fs.path: specd/archive'
    then:
      - 'Active changes are at specd/changes/ and archived changes at specd/archive/'
  - requirement: 'Storage configuration'
    name: 'Unknown adapter'
    when:
      - 'storage.changes.adapter is set to an unrecognised value (e.g. "s3")'
    then:
      - 'specd exits with a validation error listing supported adapters'
  - requirement: 'Template variables'
    name: 'Archive pattern with year prefix'
    when:
      - "storage.archive.fs.pattern is '{{year}}/{{change.archivedName}}'"
    then:
      - 'A change archived in 2024 is stored at specd/archive/2024/<archivedName>/'
  - requirement: 'Template variables'
    name: 'Unknown template variable'
    when:
      - 'A template string contains {{unknown}}'
    then:
      - 'The literal string {{unknown}} is used and a warning is emitted'
  - requirement: 'Workflow additions'
    name: 'Project hook appended'
    when:
      - 'Both the schema and specd.yaml define hooks for archive.post'
    then:
      - 'Schema hooks fire first, project hooks second, within the same lifecycle point'
  - requirement: 'Workflow additions'
    name: 'requires in project workflow entry'
    when:
      - 'A project-level workflow entry includes a requires field'
    then:
      - 'specd must reject it with a validation error on startup'
  - requirement: 'Workflow additions'
    name: 'Hook for step not in schema'
    when:
      - "A project-level workflow entry names a step not declared in the schema's workflow"
    then:
      - 'The hooks are registered for that step; they fire if the step is ever invoked, and a warning is emitted at startup'
  - requirement: 'Project-level artifact rules'
    name: 'Rules injected'
    when:
      - 'artifactRules.specs is set'
    then:
      - 'CompileContext includes those strings in the compiled context for the specs artifact as constraints the agent must follow'
  - requirement: 'Project-level artifact rules'
    name: 'Unknown artifact ID'
    when:
      - 'artifactRules contains a key not matching any artifact ID in the active schema'
    then:
      - 'specd emits a warning at startup and ignores those rules'
  - requirement: 'LLM optimization'
    name: 'Flag absent — deterministic mode'
    given:
      - 'A specd.yaml with no llmOptimizedContext field'
    when:
      - 'The metadata agent runs'
    then:
      - 'It uses deterministic structural extraction only — no LLM is invoked'
  - requirement: 'LLM optimization'
    name: 'Flag false — deterministic mode'
    given:
      - 'A specd.yaml with llmOptimizedContext: false'
    when:
      - 'The metadata agent runs'
    then:
      - 'It uses deterministic structural extraction only — no LLM is invoked'
  - requirement: 'LLM optimization'
    name: 'Flag true — LLM mode'
    given:
      - 'A specd.yaml with llmOptimizedContext: true'
    when:
      - 'The metadata agent runs'
    then:
      - 'It invokes the LLM to produce richer metadata (descriptions, structured scenarios, dependsOn suggestions)'
  - requirement: 'LLM optimization'
    name: 'Non-boolean value — startup error'
    when:
      - 'llmOptimizedContext is set to a non-boolean value (e.g. "yes", 1)'
    then:
      - 'specd exits with a startup validation error'
  - requirement: 'Plugin declarations'
    name: 'Plugin installed'
    when:
      - 'plugins: [{ name: "@specd/plugin-claude" }] is declared'
    then:
      - "specd update ensures the plugin's skill files and hook configuration are up to date"
  - requirement: 'Context spec selection'
    name: 'Project-level patterns always apply'
    when:
      - "Project-level contextIncludeSpecs: ['shared:_global/*'] is declared and the current change only touches the default workspace"
    then:
      - 'CompileContext still includes shared:_global/* specs — project-level patterns are not filtered by change scope'
  - requirement: 'Context spec selection'
    name: 'Workspace-level patterns only apply when workspace is active'
    when:
      - "billing workspace declares contextIncludeSpecs: ['*'] and the current change touches only default specs"
    then:
      - 'CompileContext does not include billing specs — the billing workspace is not active'
  - requirement: 'Context spec selection'
    name: 'Workspace-level patterns apply when workspace is active'
    when:
      - "billing workspace declares contextIncludeSpecs: ['*'] and the current change touches a billing spec"
    then:
      - 'CompileContext includes all billing workspace specs'
  - requirement: 'Context spec selection'
    name: 'Qualifier omitted at workspace level resolves to that workspace'
    when:
      - "Inside billing workspace, contextIncludeSpecs: ['payments/*'] is declared"
    then:
      - 'CompileContext resolves it as billing:payments/*, not default:payments/*'
  - requirement: 'Context spec selection'
    name: 'Default project-level include is all default workspace specs'
    when:
      - 'Project-level contextIncludeSpecs is omitted'
    then:
      - "CompileContext behaves as if contextIncludeSpecs: ['default:*'] were declared at project level"
  - requirement: 'Context spec selection'
    name: 'Default workspace-level include is all specs in that workspace'
    when:
      - 'A workspace declares no contextIncludeSpecs and that workspace is active in the current change'
    then:
      - "CompileContext includes all specs in that workspace, as if contextIncludeSpecs: ['*'] were declared"
  - requirement: 'Context spec selection'
    name: 'Resolution order — project includes, project excludes, workspace includes, workspace excludes'
    given:
      - "Project-level contextIncludeSpecs: ['default:*'] and contextExcludeSpecs: ['default:drafts/*']"
      - "default workspace declares contextIncludeSpecs: ['*'] and the change is active in default"
    when:
      - 'CompileContext builds the context'
    then:
      - 'Project-level includes are accumulated first, then project-level excludes remove default:drafts/*, then workspace-level includes from default add remaining specs, in that order'
  - requirement: 'Context spec selection'
    name: 'Project-level exclude applied before workspace-level includes'
    given:
      - "Project-level contextExcludeSpecs: ['default:auth/*']"
      - "default workspace declares contextIncludeSpecs: ['auth/*'] and is active"
    when:
      - 'CompileContext builds the context'
    then:
      - 'default:auth/* specs are excluded — the project-level exclude (step 2) fires before workspace-level includes (step 3)'
  - requirement: 'Context spec selection'
    name: 'Project-level exclude always applied regardless of active workspace'
    when:
      - "Project-level contextExcludeSpecs: ['default:drafts/*'] is declared and the change only touches billing"
    then:
      - 'drafts/* specs are still excluded from context even though default is not the active workspace'
  - requirement: 'Context spec selection'
    name: 'Workspace declaration order determines workspace-level priority'
    when:
      - "default and billing both declare contextIncludeSpecs: ['*'] and the change touches both, and default is declared first in specd.yaml"
    then:
      - 'default specs appear before billing specs in context'
  - requirement: 'Context spec selection'
    name: 'Spec matched by multiple patterns appears once'
    when:
      - "Project-level includes shared:_global/* and default workspace includes ['shared:_global/architecture'], and both match the same spec"
    then:
      - 'The spec appears once, at the position determined by the project-level pattern (first match)'
  - requirement: 'Context spec selection'
    name: 'Workspace-level exclude only applied when workspace is active'
    when:
      - "billing workspace declares contextExcludeSpecs: ['drafts/*'] and the change only touches default"
    then:
      - 'The billing exclude is not applied — billing is not active'
  - requirement: 'Context spec selection'
    name: 'Workspace-level exclude qualifier resolves to that workspace'
    when:
      - "Inside billing, contextExcludeSpecs: ['drafts/*'] is declared and billing is active"
    then:
      - 'billing:drafts/* specs are excluded from context'
  - requirement: 'Context spec selection'
    name: 'Direct include path selects only that spec'
    when:
      - "contextIncludeSpecs: ['auth/login'] is declared and both auth/login and auth/register exist in the default workspace"
    then:
      - 'CompileContext includes auth/login and does not include auth/register'
  - requirement: 'Context spec selection'
    name: 'Direct exclude path removes only that spec'
    when:
      - "contextIncludeSpecs: ['auth/*'] and contextExcludeSpecs: ['auth/login'] are declared and both auth/login and auth/register exist"
    then:
      - 'CompileContext includes auth/register but not auth/login'
  - requirement: 'Context spec selection'
    name: 'Non-existent spec ID silently skipped at compile time'
    when:
      - "contextIncludeSpecs: ['auth/does-not-exist'] is declared and no such spec exists on disk"
    then:
      - 'CompileContext produces no error — the missing path is silently skipped'
  - requirement: 'Context spec selection'
    name: 'Unmatched pattern warns in config validate'
    when:
      - 'specd config validate is run and a pattern in contextIncludeSpecs or contextExcludeSpecs matches no specs on disk'
    then:
      - 'specd emits a warning identifying the pattern — the command still exits successfully'
  - requirement: 'Context spec selection'
    name: 'Unknown workspace qualifier warns at runtime'
    when:
      - "contextIncludeSpecs: ['unknown-workspace:*'] is declared and no workspace named unknown-workspace exists"
    then:
      - 'specd emits a warning at startup but does not exit — context compilation proceeds without that pattern'
  - requirement: 'Context spec selection'
    name: 'Unknown workspace qualifier fails config validate'
    when:
      - 'specd config validate is run and a pattern contains a workspace qualifier that does not match any declared workspace'
    then:
      - 'specd exits with an error — unknown qualifiers are treated as errors in validate to catch typos before they silently drop specs from context'
  - requirement: 'Context spec selection'
    name: 'Workspace becomes active from change metadata'
    when:
      - "A change's metadata lists specs from both the default workspace and the billing workspace"
    then:
      - 'Both workspaces are considered active and both workspace-level contextIncludeSpecs patterns are applied'
  - requirement: 'Context spec selection'
    name: 'Workspace not active when absent from change metadata'
    when:
      - "A change's metadata lists only default specs"
    then:
      - 'The billing workspace is not active and its workspace-level patterns are not applied, regardless of CWD or codeRoot'
  - requirement: 'Context spec selection'
    name: 'Invalid pattern syntax is a startup error'
    when:
      - "contextIncludeSpecs: ['auth/*/login'] is declared (* in the middle of a path segment)"
    then:
      - 'specd exits with a config validation error at startup'
  - requirement: 'Startup validation'
    name: 'Missing required field blocks startup'
    when:
      - 'specd.yaml is missing any required field (e.g. schema, storage, default workspace, adapter in a specs section)'
    then:
      - 'specd exits immediately with a descriptive error before executing the requested command'
  - requirement: 'Startup validation'
    name: 'Invalid pattern syntax blocks startup'
    when:
      - "contextIncludeSpecs contains an invalid pattern such as 'auth/*/login'"
    then:
      - 'specd exits with a config validation error at startup'
  - requirement: 'Startup validation'
    name: 'Storage path outside repo root blocks startup'
    when:
      - 'storage.changes.fs.path resolves to a directory outside the project repo root'
    then:
      - 'specd exits with a config validation error at startup'
  - requirement: 'Startup validation'
    name: 'Warning does not block startup'
    when:
      - 'specd.yaml has an artifactRules key for an unknown artifact'
    then:
      - 'A warning is printed but the command proceeds normally'
  - requirement: 'Startup validation'
    name: 'specd init requires no existing config'
    when:
      - 'specd init is run in a directory with no specd.yaml'
    then:
      - 'specd does not attempt to validate a config — it creates one from defaults and exits successfully'
  - requirement: 'Project context instructions'
    name: 'Context entries injected before spec content'
    given:
      - 'specd.yaml declares context: [{ instruction: "Always prefer editing existing files." }]'
    when:
      - 'CompileContext builds the compiled context'
    then:
      - 'The instruction appears before any spec content in the output'
  - requirement: 'Project context instructions'
    name: 'File reference is read and injected verbatim'
    given:
      - 'specd.yaml declares context: [{ file: specd-bootstrap.md }] and the file exists'
    when:
      - 'CompileContext builds the compiled context'
    then:
      - 'The full content of specd-bootstrap.md is injected verbatim, before spec content'
  - requirement: 'Project context instructions'
    name: 'Missing file emits a warning'
    given:
      - 'specd.yaml declares context: [{ file: does-not-exist.md }]'
    when:
      - 'CompileContext builds the compiled context'
    then:
      - 'A warning is emitted identifying the missing file, compilation proceeds normally, and the entry is absent from the output'
  - requirement: 'Project context instructions'
    name: 'context absent — no effect'
    given:
      - 'specd.yaml does not declare a context field'
    when:
      - 'CompileContext builds the compiled context'
    then:
      - 'The output is identical to a config with context: [] — no error, no warning'
  - requirement: 'Project context instructions'
    name: 'Mixed inline and file entries preserve declaration order'
    given:
      - 'context: [{ file: AGENTS.md }, { instruction: "Inline note." }, { file: specd-bootstrap.md }]'
    when:
      - 'CompileContext builds the compiled context'
    then:
      - 'AGENTS.md content appears first, then "Inline note.", then specd-bootstrap.md content, before any spec content'
  - requirement: 'Project context instructions'
    name: 'File path resolved relative to specd.yaml directory'
    given:
      - 'specd.yaml is at /project/specd.yaml and declares context: [{ file: docs/bootstrap.md }]'
    when:
      - 'CompileContext resolves the file entry'
    then:
      - 'It reads /project/docs/bootstrap.md'
  - requirement: 'Project context instructions'
    name: 'Absolute file path accepted'
    given:
      - 'specd.yaml declares context: [{ file: /shared/instructions.md }] and that file exists'
    when:
      - 'CompileContext resolves the file entry'
    then:
      - 'It reads /shared/instructions.md directly, without resolving relative to the specd.yaml directory'
