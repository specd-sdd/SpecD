title: GetActiveSchema
description: Delivery mechanisms (CLI, MCP, plugins) need a single canonical way to obtain the project's resolved schema without duplicating multi-step resolution logic. `GetActiveSchema` provides this by delegating to `ResolveSchema`, which orchestrates the full pipeline (base schema, extends chain, plugins, overrides, merge, build), and returning the resulting `Schema` entity.
dependsOn:
  - core:core/resolve-schema
  - core:core/config
  - core:core/schema-format
  - default:_global/architecture
context:
  - Delivery mechanisms (CLI, MCP, plugins) need a single canonical way to obtain the project's resolved schema without duplicating multi-step resolution logic. `GetActiveSchema` provides this by delegating to `ResolveSchema`, which orchestrates the full pipeline (base schema, extends chain, plugins, overrides, merge, build), and returning the resulting `Schema` entity.
rules:
  - requirement: Accepts no input
    rules:
      - '`execute()` MUST take no arguments. All configuration is provided at construction time, not at invocation time.'
  - requirement: Delegates to ResolveSchema
    rules:
      - 'The use case MUST call `resolveSchema.execute()` to obtain the active schema. It SHALL NOT resolve schemas directly or implement any resolution logic itself. `ResolveSchema` handles the full pipeline: base resolution, extends chain, plugins, overrides, merge, and build.'
  - requirement: Returns the resolved Schema on success
    rules:
      - '`execute` MUST return `Promise<Schema>` — the fully-resolved, customised schema.'
  - requirement: Construction dependencies
    rules:
      - |-
        `GetActiveSchema` MUST be constructed with one dependency:

        - `resolveSchema` (`ResolveSchema`) — the use case that orchestrates the full schema resolution pipeline.

        All lower-level dependencies (schema registry, schema ref, plugins, overrides) are provided to `ResolveSchema` at its construction time.
constraints:
  - The use case contains no business logic — it is a thin delegation to ResolveSchema.
  - The schema reference is fixed at construction time — calling execute multiple times resolves the same reference.
  - The use case is async — it returns Promise<Schema>.
scenarios:
  - requirement: Accepts no input
    name: Execute called without arguments
    when:
      - execute() is called with no arguments
    then:
      - the call succeeds and uses the ResolveSchema instance provided at construction
  - requirement: Delegates to ResolveSchema
    name: ResolveSchema receives construction-time parameters
    given:
      - the use case was constructed with a ResolveSchema instance configured for "@specd/schema-std"
    when:
      - execute() is called
    then:
      - resolveSchema.execute() is called
  - requirement: Returns the resolved Schema on success
    name: Schema resolved with extends and plugins
    given:
      - ResolveSchema.execute() returns a valid Schema object (after resolving extends, plugins, and overrides)
    when:
      - execute() is called
    then:
      - the returned promise resolves to that Schema object
  - requirement: Returns the resolved Schema on success
    name: Schema not found
    given:
      - ResolveSchema.execute() throws SchemaNotFoundError
    when:
      - execute() is called
    then:
      - the SchemaNotFoundError propagates to the caller
  - requirement: Returns the resolved Schema on success
    name: Schema validation failure
    given:
      - ResolveSchema.execute() throws SchemaValidationError (e.g. extends cycle, plugin kind mismatch)
    when:
      - execute() is called
    then:
      - the SchemaValidationError propagates to the caller
  - requirement: Construction dependencies
    name: Multiple executions resolve the same reference
    given:
      - the use case was constructed with a ResolveSchema instance
    when:
      - execute() is called twice
    then:
      - resolveSchema.execute() is called twice
