title: InitProject
description: Before a project can use specd, it needs a valid `specd.yaml`, storage directories, and gitignore entries â€” bootstrapping that must happen through a single coordinated operation. `InitProject` is the use case that handles this by delegating to the `ConfigWriter` port to write `specd.yaml`, create required storage directories, and update `.gitignore`. It is the entry point for `specd init` and the only use case that creates a project configuration from scratch.
dependsOn:
  - core:core/config
  - default:_global/architecture
context:
  - Before a project can use specd, it needs a valid `specd.yaml`, storage directories, and gitignore entries â€” bootstrapping that must happen through a single coordinated operation. `InitProject` is the use case that handles this by delegating to the `ConfigWriter` port to write `specd.yaml`, create required storage directories, and update `.gitignore`. It is the entry point for `specd init` and the only use case that creates a project configuration from scratch.
rules:
  - requirement: Accepts InitProjectOptions as input
    rules:
      - |-
        `execute(input)` MUST accept an `InitProjectOptions` object with the following fields:

        * `projectRoot` (string, required) â€” absolute path to the directory to initialise.
        * `schemaRef` (string, required) â€” schema reference string to write into `specd.yaml` (e.g. `"@specd/schema-std"`).
        * `workspaceId` (string, required) â€” the default workspace name (e.g. `"default"`).
        * `specsPath` (string, required) â€” relative path for the specs directory (e.g. `"specs/"`).
        * `force` (boolean, optional) â€” when `true`, overwrite an existing `specd.yaml` without error.
  - requirement: Returns InitProjectResult on success
    rules:
      - |-
        On successful execution, `execute` MUST return an `InitProjectResult` containing:

        * `configPath` â€” absolute path to the created `specd.yaml`.
        * `schemaRef` â€” the schema reference as written.
        * `workspaces` â€” array of workspace IDs created.
  - requirement: Delegates entirely to ConfigWriter
    rules:
      - The use case MUST delegate all filesystem operations to the `ConfigWriter.initProject` method. It SHALL NOT perform any filesystem I/O directly. The use case is a thin orchestration layer over the port.
  - requirement: Throws AlreadyInitialisedError when config exists
    rules:
      - When `specd.yaml` already exists at the target path and `force` is not `true`, the use case MUST propagate the `AlreadyInitialisedError` thrown by the `ConfigWriter` port.
  - requirement: Side effects performed by the port
    rules:
      - |-
        The `ConfigWriter.initProject` implementation MUST:

        * Write `specd.yaml` with the provided schema reference, workspace, and specs path.
        * Create standard storage directories (`changes/`, `drafts/`, `discarded/`, `archive/`).
        * Append `specd.local.yaml` to `.gitignore`.
        * Create a `.gitignore` inside the archive directory to exclude `.specd-index.jsonl`.
constraints:
  - The use case has no business logic beyond delegation â€” it is a pass-through to the port.
  - 'InitProject is constructed with a single dependency: a ConfigWriter instance.'
  - The use case is async â€” it returns Promise<InitProjectResult>.
scenarios:
  - requirement: Accepts InitProjectOptions as input
    name: All required fields provided
    when:
      - execute is called with projectRoot, schemaRef, workspaceId, and specsPath
    then:
      - the call succeeds and the options are forwarded to ConfigWriter.initProject
  - requirement: Returns InitProjectResult on success
    name: Successful initialisation returns result
    when:
      - execute is called with valid options and no existing config
    then:
      - the returned object contains configPath, schemaRef, and workspaces
      - AND configPath is an absolute path ending in specd.yaml
      - AND workspaces includes the provided workspaceId
  - requirement: Delegates entirely to ConfigWriter
    name: Port receives the input verbatim
    when:
      - execute is called with an InitProjectOptions object
    then:
      - ConfigWriter.initProject is called exactly once with the same options object
      - AND the use case performs no other I/O
  - requirement: Throws AlreadyInitialisedError when config exists
    name: Config already exists without force flag
    given:
      - specd.yaml already exists at projectRoot
    when:
      - execute is called with force absent or false
    then:
      - an AlreadyInitialisedError is thrown
  - requirement: Throws AlreadyInitialisedError when config exists
    name: Config already exists with force flag
    given:
      - specd.yaml already exists at projectRoot
    when:
      - 'execute is called with force: true'
    then:
      - the existing config is overwritten and a successful result is returned
  - requirement: Side effects performed by the port
    name: Storage directories created
    when:
      - execute completes successfully
    then:
      - the changes/, drafts/, discarded/, and archive/ directories exist under the storage path
  - requirement: Side effects performed by the port
    name: Gitignore entries added
    when:
      - execute completes successfully
    then:
      - specd.local.yaml is listed in the project's .gitignore
      - AND a .gitignore inside the archive directory excludes .specd-index.jsonl
