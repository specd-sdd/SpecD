title: Selector Model
description: 'The selector model defines how nodes in an artifact AST are identified and addressed. Selectors are used across multiple specd mechanisms: delta entries target nodes for modification or removal, validation rules assert structural constraints, and metadata extraction declares which nodes to extract for deterministic metadata generation. The selector model is format-agnostic — the same fields apply regardless of whether the target document is markdown, JSON, YAML, or plain text.'
dependsOn:
  - core:core/artifact-ast
context:
  - 'The selector model defines how nodes in an artifact AST are identified and addressed. Selectors are used across multiple specd mechanisms: delta entries target nodes for modification or removal, validation rules assert structural constraints, and metadata extraction declares which nodes to extract for deterministic metadata generation. The selector model is format-agnostic — the same fields apply regardless of whether the target document is markdown, JSON, YAML, or plain text.'
rules:
  - requirement: Selector fields
    rules:
      - |-
        A selector is a YAML object with the following fields:
        * `type` (string, required) — the node type; must be one of the values returned by `ArtifactParser.nodeTypes()` for the target file format
        * `matches` (string, optional) — a regular expression matched case-insensitively against the node's `label` (heading text for markdown sections, key name for JSON/YAML pairs, etc.); a plain string like `"Login"` matches any label containing that text; anchors and special characters work as expected (`"^Requirement:"`, `"^Requirements$"`)
        * `contains` (string, optional) — a regular expression matched case-insensitively against the node's `value` (paragraph text, scalar pair value, etc.); useful for finding leaf nodes by content rather than by identity
        * `parent` (selector, optional) — constrains the search to nodes whose nearest ancestor matches this selector; used to disambiguate nodes with the same identifier at different nesting levels
        * `index` (integer, optional) — for `array-item` and `sequence-item` nodes, targets the item at this zero-based index; mutually exclusive with `where`
        * `where` (object, optional) — for `array-item` and `sequence-item` nodes where items are objects, targets the item whose fields match all key–value pairs in `where`; values are matched as case-insensitive regular expressions (same as `matches`); mutually exclusive with `index`
        * `level` (integer, optional) — for markdown `section` nodes, matches only sections at this heading level (1 = `#`, 2 = `##`, etc.); non-markdown nodes or nodes without a `level` property simply do not match when `level` is specified
  - requirement: Node types by file format
    rules:
      - |-
        All adapters normalize to the AST format defined in [`specs/core/artifact-ast/spec.md`](../artifact-ast/spec.md). The node types addressable by selectors are the same types produced by each adapter:
        * Markdown: `document`, `section`, `paragraph`, `list`, `list-item`, `code-block`, `thematic-break`
        * JSON: `document`, `object`, `property`, `array`, `array-item`
        * YAML: `document`, `mapping`, `pair`, `sequence`, `sequence-item`
        * Plain text: `document`, `paragraph`, `line`
        The `label` field on a node is the identifying value evaluated by `matches`; the `value` field is the scalar content evaluated by `contains`.
  - requirement: Multi-match behaviour
    rules:
      - |-
        When multiple nodes match a selector, the outcome depends on the calling context:
        * In **delta entries** (`modified`, `removed`) — `apply` must reject with a `DeltaApplicationError`; selectors in delta operations must resolve to exactly one node.
        * In **validation rules** and **metadata extraction** — multiple matches are expected and each matched node is processed individually.
  - requirement: No-match behaviour
    rules:
      - |-
        When a selector matches zero nodes:
        * In **delta entries** — `apply` must reject with a `DeltaApplicationError` for `selector` on `modified` and `removed` entries. `position.after` and `position.before` selectors in `added` entries are warnings, not errors — insertion falls back to the end of the parent scope.
        * In **validation rules** — a rule passes vacuously when it matches zero nodes (no error or warning is produced).
constraints:
  - selector.index and selector.where are mutually exclusive
  - type must be one of the node types produced by ArtifactParser.nodeTypes() for the target file format; unknown types are a validation error at parse time
  - where values are matched as case-insensitive regular expressions — the same semantics as matches
  - parent is recursive — it is itself a full selector, including optional parent, enabling multi-level ancestry constraints
scenarios:
  - requirement: Selector fields
    name: Match by type and label
    when:
      - 'a selector declares type: section and matches: "^Requirement:"'
    then:
      - it matches all section nodes whose label starts with "Requirement:" (case-insensitive)
  - requirement: Selector fields
    name: Match is case-insensitive
    when:
      - 'a selector declares matches: "login"'
    then:
      - it matches nodes with labels "Login", "LOGIN", and "login"
  - requirement: Selector fields
    name: Plain string matches substring
    when:
      - 'a selector declares matches: "Login"'
    then:
      - it matches any node whose label contains "Login" as a substring
  - requirement: Selector fields
    name: Match by value with contains
    when:
      - 'a selector declares type: paragraph and contains: "SHALL"'
    then:
      - it matches paragraph nodes whose scalar value contains "SHALL" (case-insensitive)
  - requirement: Selector fields
    name: Constrain by parent
    when:
      - 'a selector declares type: section, matches: "^Requirement:", and parent: { type: section, matches: "^Requirements$" }'
    then:
      - it matches only Requirement sections that are direct children of a Requirements section, not Requirement sections at other nesting levels
  - requirement: Selector fields
    name: Target sequence item by where
    when:
      - 'a selector declares type: sequence-item and where: { step: implementing }'
    then:
      - it matches the sequence item whose step field value matches "implementing" (case-insensitive regex)
  - requirement: Selector fields
    name: Target sequence item by index
    when:
      - 'a selector declares type: sequence-item and index: 0'
    then:
      - it matches the first item in the sequence
  - requirement: Selector fields
    name: index and where are mutually exclusive
    when:
      - a selector declares both index and where
    then:
      - a SchemaValidationError or DeltaApplicationError is produced — they cannot be combined
  - requirement: Node types by file format
    name: Unknown type is rejected
    when:
      - a selector declares a type value not in ArtifactParser.nodeTypes() for the target format
    then:
      - the selector is rejected with a validation error before any operation is attempted
  - requirement: Node types by file format
    name: YAML sequence-item with where
    when:
      - 'a delta targets a YAML file and a selector uses type: sequence-item with where: { name: "Run tests" }'
    then:
      - it matches the sequence item whose name field equals "Run tests" (case-insensitive)
  - requirement: Multi-match behaviour
    name: Delta rejects ambiguous selector
    when:
      - a delta modified or removed entry's selector matches more than one node
    then:
      - apply rejects the entire delta with DeltaApplicationError without applying any operation
  - requirement: Multi-match behaviour
    name: Validation rule processes each match
    when:
      - a validation rule's selector matches multiple nodes
    then:
      - the rule is evaluated against each matched node individually — no error is produced for multiple matches
  - requirement: No-match behaviour
    name: Delta rejects unresolved selector on modified
    when:
      - a delta modified entry's selector matches zero nodes
    then:
      - apply rejects with DeltaApplicationError
  - requirement: No-match behaviour
    name: Delta rejects unresolved selector on removed
    when:
      - a delta removed entry's selector matches zero nodes
    then:
      - apply rejects with DeltaApplicationError
  - requirement: No-match behaviour
    name: position.after fallback on no match
    when:
      - a delta added entry's position.after selector matches zero nodes
    then:
      - a warning is emitted and the new node is appended at the end of the parent scope — no error
  - requirement: No-match behaviour
    name: Validation rule passes vacuously on no match
    when:
      - a validation rule's selector matches zero nodes
    then:
      - the rule passes — no error or warning is produced
