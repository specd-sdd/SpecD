title: 'Selector Model'
description: >
  Defines how nodes in an artifact AST are identified and addressed.
  Selectors are used in delta entries, validation rules, and context
  sections to target nodes for modification, removal, or extraction.
  The model is format-agnostic, applying uniformly across markdown,
  JSON, YAML, and plain text documents.
keywords:
  - 'selector'
  - 'node-targeting'
  - 'artifact-ast'
  - 'delta-entry'
  - 'validation-rule'
  - 'pattern-matching'
  - 'format-agnostic'
dependsOn:
  - 'core:core/artifact-ast'
  - 'core:core/delta-format'
  - 'core:core/schema-format'
contentHashes:
  'spec.md': 'sha256:a5ea5f67b8a10c2a1a4171ad3fed6f9beb47f0d5445511c96363dabc35106fe5'
  'verify.md': 'sha256:d0dad66cc0f04dd5414429cb4fe87121a1ef452ee24b4b93d200f28d3a606f52'
rules:
  - requirement: 'Selector fields'
    rules:
      - 'A selector is a YAML object with fields: type (required), matches (optional), contains (optional), parent (optional), index (optional), where (optional)'
      - 'type is a string that must be one of the values returned by ArtifactParser.nodeTypes() for the target file format'
      - 'matches is a case-insensitive regular expression matched against the node label; a plain string matches any label containing that text'
      - 'contains is a case-insensitive regular expression matched against the node value'
      - 'parent constrains the search to nodes whose nearest ancestor matches the given selector'
      - 'index targets a zero-based position for array-item and sequence-item nodes; mutually exclusive with where'
      - 'where targets items whose fields match all key-value pairs as case-insensitive regular expressions; mutually exclusive with index'
  - requirement: 'Node types by file format'
    rules:
      - 'Markdown node types: document, section, paragraph, list, list-item, code-block, thematic-break'
      - 'JSON node types: document, object, property, array, array-item'
      - 'YAML node types: document, mapping, pair, sequence, sequence-item'
      - 'Plain text node types: document, paragraph, line'
      - 'The label field is the identifying value evaluated by matches; the value field is the scalar content evaluated by contains'
  - requirement: 'Multi-match behaviour'
    rules:
      - 'In delta entries (modified, removed), apply must reject with DeltaApplicationError when multiple nodes match; selectors must resolve to exactly one node'
      - 'In validation rules and context sections, multiple matches are expected and each matched node is processed individually'
  - requirement: 'No-match behaviour'
    rules:
      - 'In delta entries, apply must reject with DeltaApplicationError for selector on modified and removed entries when zero nodes match'
      - 'position.after and position.before selectors in added entries are warnings on no match — insertion falls back to end of parent scope'
      - 'In validation rules, a rule passes vacuously when it matches zero nodes'
constraints:
  - 'selector.index and selector.where are mutually exclusive'
  - 'type must be one of the node types produced by ArtifactParser.nodeTypes() for the target file format; unknown types are a validation error at parse time'
  - 'where values are matched as case-insensitive regular expressions with the same semantics as matches'
  - 'parent is recursive — it is itself a full selector including optional parent, enabling multi-level ancestry constraints'
scenarios:
  - requirement: 'Selector fields'
    name: 'Match by type and label'
    when:
      - 'a selector declares type: section and matches: "^Requirement:"'
    then:
      - 'it matches all section nodes whose label starts with "Requirement:" (case-insensitive)'
  - requirement: 'Selector fields'
    name: 'Match is case-insensitive'
    when:
      - 'a selector declares matches: "login"'
    then:
      - 'it matches nodes with labels "Login", "LOGIN", and "login"'
  - requirement: 'Selector fields'
    name: 'Plain string matches substring'
    when:
      - 'a selector declares matches: "Login"'
    then:
      - 'it matches any node whose label contains "Login" as a substring'
  - requirement: 'Selector fields'
    name: 'Match by value with contains'
    when:
      - 'a selector declares type: paragraph and contains: "SHALL"'
    then:
      - 'it matches paragraph nodes whose scalar value contains "SHALL" (case-insensitive)'
  - requirement: 'Selector fields'
    name: 'Constrain by parent'
    when:
      - 'a selector declares type: section, matches: "^Requirement:", and parent: { type: section, matches: "^Requirements$" }'
    then:
      - 'it matches only Requirement sections that are direct children of a Requirements section, not Requirement sections at other nesting levels'
  - requirement: 'Selector fields'
    name: 'Target sequence item by where'
    when:
      - 'a selector declares type: sequence-item and where: { step: implementing }'
    then:
      - 'it matches the sequence item whose step field value matches "implementing" (case-insensitive regex)'
  - requirement: 'Selector fields'
    name: 'Target sequence item by index'
    when:
      - 'a selector declares type: sequence-item and index: 0'
    then:
      - 'it matches the first item in the sequence'
  - requirement: 'Selector fields'
    name: 'index and where are mutually exclusive'
    when:
      - 'a selector declares both index and where'
    then:
      - 'a SchemaValidationError or DeltaApplicationError is produced — they cannot be combined'
  - requirement: 'Node types by file format'
    name: 'Unknown type is rejected'
    when:
      - 'a selector declares a type value not in ArtifactParser.nodeTypes() for the target format'
    then:
      - 'the selector is rejected with a validation error before any operation is attempted'
  - requirement: 'Node types by file format'
    name: 'YAML sequence-item with where'
    when:
      - 'a delta targets a YAML file and a selector uses type: sequence-item with where: { name: "Run tests" }'
    then:
      - 'it matches the sequence item whose name field equals "Run tests" (case-insensitive)'
  - requirement: 'Multi-match behaviour'
    name: 'Delta rejects ambiguous selector'
    when:
      - 'a delta modified or removed entry selector matches more than one node'
    then:
      - 'apply rejects the entire delta with DeltaApplicationError without applying any operation'
  - requirement: 'Multi-match behaviour'
    name: 'Validation rule processes each match'
    when:
      - 'a validation rule selector matches multiple nodes'
    then:
      - 'the rule is evaluated against each matched node individually — no error is produced for multiple matches'
  - requirement: 'No-match behaviour'
    name: 'Delta rejects unresolved selector on modified'
    when:
      - 'a delta modified entry selector matches zero nodes'
    then:
      - 'apply rejects with DeltaApplicationError'
  - requirement: 'No-match behaviour'
    name: 'Delta rejects unresolved selector on removed'
    when:
      - 'a delta removed entry selector matches zero nodes'
    then:
      - 'apply rejects with DeltaApplicationError'
  - requirement: 'No-match behaviour'
    name: 'position.after fallback on no match'
    when:
      - 'a delta added entry position.after selector matches zero nodes'
    then:
      - 'a warning is emitted and the new node is appended at the end of the parent scope — no error'
  - requirement: 'No-match behaviour'
    name: 'Validation rule passes vacuously on no match'
    when:
      - 'a validation rule selector matches zero nodes'
    then:
      - 'the rule passes — no error or warning is produced'
