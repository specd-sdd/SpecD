title: 'ValidateArtifacts'
description: >
  Application use case that validates a change's artifact files against the active schema,
  enforces required artifacts, runs delta validations and structural validation rules, and marks
  artifacts complete—the only code path that may call Artifact.markComplete. Handles delta
  application preview, conflict detection, and approval invalidation on content changes.
keywords:
  - 'validation'
  - 'artifacts'
  - 'lifecycle'
  - 'schema'
  - 'delta-application'
  - 'integrity'
  - 'ast-parsing'
dependsOn:
  - 'core/change'
  - 'core/schema-format'
  - 'core/delta-format'
  - 'core/storage'
contentHashes:
  spec.md: 'sha256:2679b33d5b1fa2291964d7efdcca86340e12eccce0cbcfbbd04fd199df9a228f'
  verify.md: 'sha256:e7a2776f4791714349f5fe816448efec4e7dbe1ba7cd99de282309d520697135'
rules:
  - requirement: 'Ports and constructor'
    rules:
      - 'ValidateArtifacts receives ChangeRepository, a map of SpecRepository instances (one per configured workspace), SchemaRegistry, ArtifactParserRegistry, and GitAdapter at construction time.'
      - "specs is keyed by workspace name; when loading a base spec for delta application preview, ValidateArtifacts looks up the SpecRepository for the spec path's workspace."
      - 'ArtifactParserRegistry maps format names to ArtifactParser adapters and is used for both deltaValidations checks and delta application preview.'
  - requirement: 'Input'
    rules:
      - 'ValidateArtifacts.execute receives: name (the change name to validate), specPath (the spec path to validate, must be one of the paths in change.specIds), schemaRef (the schema reference string from specd.yaml), and workspaceSchemasPaths (resolved workspace-to-schemas-path map, passed through to SchemaRegistry.resolve()).'
      - 'Validating all specs in a change requires calling execute once per spec path.'
  - requirement: 'Required artifacts check'
    rules:
      - 'Before validating structure, ValidateArtifacts must verify that all non-optional artifact IDs are present in the change (status not missing).'
      - 'Optional artifacts with status skipped (validatedHash === "__skipped__") are considered resolved and do not cause a failure.'
      - 'If any non-optional artifact is absent, ValidateArtifacts must return a failure result listing the missing artifact IDs.'
      - 'ValidateArtifacts must not throw—missing required artifacts are a validation failure, not an error.'
  - requirement: 'Dependency order check'
    rules:
      - 'Before validating an artifact, ValidateArtifacts must check that all artifact IDs in its requires list are either complete or skipped (via change.effectiveStatus(type)).'
      - 'If a required dependency is neither complete nor skipped, validation of the dependent artifact is skipped and reported as a dependency-blocked failure.'
      - 'A skipped optional artifact satisfies the dependency—it is treated as resolved.'
      - 'skipped artifacts are not validated—there is no file to check.'
  - requirement: 'Approval invalidation on content change'
    rules:
      - "If the change has an active spec approval (change.activeSpecApproval is defined) and any artifact file's current content hash (after preHashCleanup) differs from the hash recorded in that approval's artifactHashes, ValidateArtifacts must call change.invalidate('artifact-change', actor) before proceeding with validation."
      - "The same check applies to active signoff (change.activeSignoff): if any artifact's current hash differs from what was recorded in activeSignoff.artifactHashes, change.invalidate('artifact-change', actor) must be called."
      - 'A single invalidation call is made per execute invocation even if multiple artifacts have changed—the first hash mismatch triggers invalidation and the remaining artifacts are checked against the now-cleared approval state.'
  - requirement: 'Delta validation'
    rules:
      - 'If the schema artifact declares deltaValidations[] and a delta file exists for the artifact at deltas/<workspace>/<capability-path>/<filename>.delta.yaml, ValidateArtifacts must validate the delta file before attempting application.'
      - 'The delta file is parsed by the YAML adapter to produce a normalized YAML AST; each deltaValidations rule is evaluated against this AST using the same algorithm as structural validation, with the delta AST as the document root.'
      - 'For each deltaValidations rule: select candidate nodes from the document root using selector fields (type, matches, contains, parent, index, where) applied against the AST, or path (JSONPath string) evaluated against the document root.'
      - 'If zero nodes are selected: if required: true, record a failure; if required: false, record a warning; skip contentMatches and children evaluation.'
      - 'If one or more nodes are selected: for each matched node, if contentMatches is present, call parser.renderSubtree(node) to serialize the subtree to native format, then test the regex against the result; a non-matching node records a failure; evaluate any children rules recursively, using the matched node as the document root.'
      - 'A rule passes vacuously when zero nodes are selected; if any required: true delta validation rule fails, the artifact is not advanced to the delta application preview step—the failure is reported immediately.'
  - requirement: 'Delta application preview and conflict detection'
    rules:
      - 'For artifacts with delta: true and an existing base spec in SpecRepository: load the base artifact file from SpecRepository using the spec path and artifact filename.'
      - 'Load the delta file from the change directory at deltas/<workspace>/<capability-path>/<filename>.delta.yaml; resolve the ArtifactParser adapter for artifact.format.'
      - 'Call parser.parse(baseContent) to produce the base AST; call parser.apply(baseAST, deltaEntries) to produce the merged AST.'
      - 'If apply throws DeltaApplicationError, record it as a validation failure and do not proceed to validations[] or markComplete.'
      - 'The merged AST (from parser.serialize(mergedAST)) is used for validations[] checks; the base spec in SpecRepository is not modified—archive is the step that writes the merged content.'
      - 'For artifacts without a delta file (new files being created in the change), ValidateArtifacts validates the artifact content directly against validations[].'
  - requirement: 'Structural validation'
    rules:
      - "After a successful delta application preview (or for non-delta artifacts), ValidateArtifacts runs all rules in the artifact's validations[] against the merged (or direct) content."
      - 'Parse the content via ArtifactParser.parse() to produce a normalized AST (if not already parsed during delta application preview).'
      - 'For each rule in validations[], apply the rule evaluation algorithm: select nodes using selector fields or path; if zero nodes matched, record failure or warning per required and skip children/contentMatches; for each matched node, evaluate contentMatches against the serialized subtree (parser.renderSubtree(node)), then evaluate children rules recursively with that node as root.'
      - 'ValidateArtifacts collects all failures and warnings for the artifact before moving on—it does not stop at the first failure.'
  - requirement: 'Hash computation and markComplete'
    rules:
      - 'If all delta validations, conflict detection, and structural validations pass for an artifact, ValidateArtifacts must compute the cleaned hash: apply each preHashCleanup substitution in declaration order to the artifact file content, then compute SHA-256 of the result.'
      - 'If all delta validations, conflict detection, and structural validations pass for an artifact, ValidateArtifacts must call change.getArtifact(type).markComplete(cleanedHash) on the corresponding ChangeArtifact.'
      - 'If any validation step fails, markComplete must not be called for that artifact.'
  - requirement: 'Result shape'
    rules:
      - 'ValidateArtifacts.execute must return a result object—it must not throw for validation failures.'
      - 'The result must include: passed: boolean (true only if all required artifacts are present and all validations pass with no errors), failures: ValidationFailure[] (one entry per failed rule, missing artifact, or DeltaApplicationError), warnings: ValidationWarning[] (one entry per required: false rule that was absent).'
      - 'Each ValidationFailure must include the artifact ID, the rule or error description, and enough context for the CLI to produce a useful error message.'
  - requirement: 'Save after validation'
    rules:
      - 'After all artifacts have been evaluated, ValidateArtifacts must call changeRepository.save(change) to persist any markComplete calls (updated validatedHash values) and any invalidation events appended to history.'
      - 'The save must happen even if some artifacts failed—partial progress must be persisted.'
constraints:
  - 'ValidateArtifacts is the only code path that may call Artifact.markComplete(hash)—enforced by convention and test coverage'
  - 'The merged spec is never written to SpecRepository during validate—only during ArchiveChange'
  - "change.invalidate('artifact-change', actor) is called at most once per execute invocation, even if multiple artifacts have changed"
  - 'deltaValidations evaluate rules against the normalized YAML AST of the delta file; validations evaluate rules against the normalized artifact AST; both use the same rule evaluation algorithm'
  - 'validations run against the merged artifact content (or direct content for non-delta artifacts)'
  - 'preHashCleanup substitutions are applied only for hash computation, never to the actual file content on disk'
  - 'A missing deltaValidations[] is not an error—the step is skipped'
  - 'A missing validations[] is not an error—the step is skipped'
  - 'A missing delta file for a delta: true artifact is not itself a validation error—the artifact may be new (no existing base spec to delta against); in that case, validate the artifact file directly against validations[]'
scenarios:
  - requirement: 'Required artifacts check'
    name: 'Non-optional artifact missing — failure'
    given:
      - 'a schema with a non-optional artifact specs'
      - 'the change has no file for specs and validatedHash is unset'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'result.passed is false and result.failures lists specs as missing'
  - requirement: 'Required artifacts check'
    name: 'Skipped optional artifact does not cause failure'
    given:
      - 'a schema with optional: true artifact design'
      - 'the change has design.validatedHash === "__skipped__"'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'design does not appear in result.failures—skipped optional artifacts are resolved'
  - requirement: 'Required artifacts check'
    name: 'Missing optional artifact does not cause failure'
    given:
      - 'a schema with optional: true artifact design'
      - 'the change has no file and no validatedHash for design'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'design does not appear in result.failures—absent optional artifacts are allowed'
  - requirement: 'Dependency order check'
    name: 'Dependency complete — validation proceeds'
    given:
      - 'artifact specs requires proposal, and proposal is complete'
    when:
      - 'ValidateArtifacts.execute is called for specs'
    then:
      - 'validation of specs proceeds normally'
  - requirement: 'Dependency order check'
    name: 'Dependency skipped — validation proceeds'
    given:
      - 'artifact tasks requires design, and design is optional: true with validatedHash === "__skipped__"'
    when:
      - 'ValidateArtifacts.execute is called for tasks'
    then:
      - 'validation of tasks proceeds—skipped satisfies the dependency'
  - requirement: 'Dependency order check'
    name: 'Dependency incomplete — validation blocked'
    given:
      - 'artifact specs requires proposal, and proposal is in-progress'
    when:
      - 'ValidateArtifacts.execute is called for specs'
    then:
      - 'specs is reported as dependency-blocked and markComplete is not called for it'
  - requirement: 'Dependency order check'
    name: 'Skipped artifact is not validated'
    given:
      - 'artifact design is optional: true with validatedHash === "__skipped__"'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'no delta validation, application preview, or structural validation is run for design—there is no file to check'
  - requirement: 'Approval invalidation on content change'
    name: 'Content changed since approval — invalidation triggered'
    given:
      - 'an active spec approval with artifactHashes: { specs: "abc123" }'
      - 'the current cleaned hash of specs is "xyz789"'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - "change.invalidate('artifact-change', actor) is called before validation proceeds"
  - requirement: 'Approval invalidation on content change'
    name: 'Invalidation called at most once per execution'
    given:
      - 'two artifacts whose hashes both differ from the active approval'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'change.invalidate is called exactly once—not once per artifact'
  - requirement: 'Approval invalidation on content change'
    name: 'No invalidation when hashes match'
    given:
      - 'an active spec approval whose artifactHashes match the current cleaned hashes'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'change.invalidate is not called'
  - requirement: 'Delta validation'
    name: 'Delta validation failure blocks application'
    given:
      - "an artifact with a deltaValidations rule { type: sequence-item, where: { op: 'added' }, required: true }"
      - 'the delta YAML AST contains no sequence-item node where the correlated op pair has value: added'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'result.passed is false, the artifact is not advanced to application preview, and markComplete is not called'
  - requirement: 'Delta validation'
    name: 'Delta validation warning does not block application'
    given:
      - 'a deltaValidations rule with required: false that matches zero nodes in the delta YAML AST'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'the artifact proceeds to application preview and result.warnings includes the unsatisfied rule'
  - requirement: 'Delta validation'
    name: 'Delta validation passes vacuously when no nodes match'
    given:
      - 'a deltaValidations rule whose selector matches zero nodes in the delta YAML AST'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'the rule passes without error regardless of required'
  - requirement: 'Delta application preview and conflict detection'
    name: 'DeltaApplicationError blocks validation'
    given:
      - 'a delta file where two entries both target the same node'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'ArtifactParser.apply() throws DeltaApplicationError, result.passed is false, and markComplete is not called'
  - requirement: 'Delta application preview and conflict detection'
    name: 'Application preview does not write to SpecRepository'
    given:
      - 'a valid delta that would modify the base spec'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'the base spec file in SpecRepository is unchanged—the merged result is used only for validations[] checks'
  - requirement: 'Delta application preview and conflict detection'
    name: 'No delta file — artifact validated directly'
    given:
      - 'an artifact with delta: true but no delta file present in the change directory'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'validations[] run against the artifact file content directly, with no application preview step'
  - requirement: 'Delta application preview and conflict detection'
    name: 'Non-delta artifact validated directly'
    given:
      - 'an artifact with delta: false'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'validations[] run against the artifact file content directly, with no application preview step'
  - requirement: 'Structural validation'
    name: 'Required section absent — failure'
    given:
      - "an artifact with a validations rule { type: section, matches: '^Purpose$', required: true }"
      - 'the merged artifact content has no top-level Purpose section'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'result.failures includes the missing section and markComplete is not called'
  - requirement: 'Structural validation'
    name: 'Optional section absent — warning only'
    given:
      - 'a validations rule with required: false that matches no node in the artifact AST'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'result.warnings includes the absent section and validation still passes'
  - requirement: 'Structural validation'
    name: 'All validation failures collected before returning'
    given:
      - 'two required: true validation rules both fail for the same artifact'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'result.failures contains both failures—validation does not stop at the first'
  - requirement: 'Hash computation and markComplete'
    name: 'All validations pass — markComplete called with cleaned hash'
    given:
      - 'all validations pass for artifact specs'
      - 'preHashCleanup normalises checked checkboxes before hashing'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'markComplete is called with the SHA-256 of the cleaned content'
  - requirement: 'Hash computation and markComplete'
    name: 'Any validation failure — markComplete not called'
    given:
      - 'at least one required: true validation rule fails for an artifact'
    when:
      - 'ValidateArtifacts.execute is called'
    then:
      - 'markComplete is not called for that artifact'
  - requirement: 'Result shape'
    name: 'passed is false when any required artifact is missing'
    given: []
    when:
      - 'at least one non-optional artifact is missing'
    then:
      - 'result.passed is false'
  - requirement: 'Result shape'
    name: 'passed is true when all pass'
    given: []
    when:
      - 'all non-optional artifacts are present and all validations pass'
    then:
      - 'result.passed is true and result.failures is empty'
  - requirement: 'Save after validation'
    name: 'Save called even when some artifacts fail'
    given:
      - 'one artifact passes validation (markComplete called) and one fails'
    when:
      - 'ValidateArtifacts.execute completes'
    then:
      - 'changeRepository.save(change) is called—partial progress is persisted'
