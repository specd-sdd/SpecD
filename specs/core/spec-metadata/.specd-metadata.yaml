title: 'Spec Metadata'
description: >
  Defines the .specd-metadata.yaml file that lives alongside each spec's content
  artifacts. Read this when working on metadata extraction, staleness detection,
  dependency traversal, or CompileContext — it specifies the file format, validation
  rules, and how the LLM agent produces and maintains this file.
dependsOn:
  - 'core:core/config'
  - 'core:core/change'
  - 'core:core/schema-format'
keywords:
  - 'metadata'
  - 'staleness'
  - 'content-hash'
  - 'dependency-traversal'
  - 'compile-context'
  - 'validation'
  - 'llm-authorship'
contentHashes:
  'spec.md': 'sha256:19b03923c20327d49e1bd90972bb9ab863a2b436de79f810763e38b0f90e402a'
  'verify.md': 'sha256:698ecfb0c8e99996b3c36f19acacb096eda3beffd83d32dbe9003679efc5b989'
rules:
  - requirement: 'File location and naming'
    rules:
      - '.specd-metadata.yaml lives inside the spec directory at the same level as content artifacts.'
      - 'The .specd- prefix namespaces the file as specd-managed.'
      - 'Absence of .specd-metadata.yaml is not an error — the spec is treated as having no declared dependencies and no content hash.'
  - requirement: 'File format'
    rules:
      - 'All fields are optional — an empty or absent file is valid.'
      - 'title (string) is a short human-readable name; tooling falls back to the spec path if absent.'
      - 'description (string) is 2–3 sentences for discovery, used by tooling and the LLM to assess relevance without reading the full spec.'
      - 'keywords (array of strings) are lowercase hyphen-separated topic tags for spec search.'
      - 'dependsOn (array of strings) lists spec IDs this spec depends on; unqualified IDs resolve within the same workspace.'
      - 'contentHashes (map of filename to sha256 hash string) records per-file hashes for staleness detection; keys are resolved filenames from requiredSpecArtifacts.'
      - 'rules (array of objects) contains normative statements grouped by requirement name with requirement and rules keys.'
      - 'constraints (array of strings) captures hard invariants from the Constraints section.'
      - 'scenarios (array of objects) are BDD-style verification entries with requirement, name, given, when, and then keys.'
  - requirement: 'Write-time structural validation'
    rules:
      - 'SaveSpecMetadata validates YAML content against strictSpecMetadataSchema before writing.'
      - 'Content must be a YAML mapping, not empty or scalar.'
      - 'title (required) must be a non-empty string.'
      - 'description (required) must be a non-empty string.'
      - 'keywords must be an array of non-empty lowercase strings.'
      - 'dependsOn entries must match a valid spec ID pattern: capabilityPath or workspace:capabilityPath where workspace matches /^[a-z][a-z0-9-]*$/ and path segments match /^[a-z0-9_][a-z0-9_-]*$/.'
      - 'contentHashes (required) must be a non-empty record where each hash matches sha256:<64 hex chars>.'
      - 'rules must be an array of objects with requirement (non-empty string) and rules (non-empty array of non-empty strings).'
      - 'constraints must be a non-empty array of non-empty strings.'
      - 'scenarios must have requirement, name, when (non-empty), then (non-empty), and given (optional).'
      - 'Validation failure throws MetadataValidationError (extends SpecdError) with formatted Zod issues; the file is not written.'
      - 'Unknown top-level keys are allowed via .passthrough() for forward compatibility.'
  - requirement: 'LLM authorship'
    rules:
      - '.specd-metadata.yaml is written and maintained by the LLM agent, not by specd.'
      - 'Generated once per spec at archive time: ArchiveChange signals stale specs via staleMetadataSpecPaths and the caller triggers the extraction agent.'
      - 'Metadata is stable until the spec is modified again by a subsequent change.'
  - requirement: 'Staleness detection'
    rules:
      - 'specd iterates over requiredSpecArtifacts, resolves each filename via its output field, computes SHA-256, and compares against contentHashes.'
      - 'If any hash differs, a filename is missing from contentHashes, or contentHashes is absent, specd emits a staleness warning.'
      - 'Staleness is advisory only — it does not block any operation.'
  - requirement: 'Use by CompileContext'
    rules:
      - 'dependsOn is followed transitively from change.contextSpecIds to discover specs for context inclusion.'
      - 'For fresh metadata, CompileContext uses description, rules, constraints, and scenarios as the compact representation.'
      - 'For absent or stale metadata, CompileContext falls back to extracting contextSections[] from the artifact and emits a staleness warning.'
      - 'Unresolvable specs are silently skipped with a warning.'
  - requirement: 'Version control'
    rules:
      - '.specd-metadata.yaml must be committed to version control alongside spec content.'
      - 'It must not be added to .gitignore.'
constraints:
  - '.specd-metadata.yaml is not a schema artifact — never listed in requiredSpecArtifacts, never validated by ValidateArtifacts, never tracked in the change manifest artifacts array.'
  - 'Absence is not an error at any point — all reads treat a missing file as empty.'
  - 'dependsOn paths must not form cycles; cycles are broken with a warning.'
  - 'Staleness warnings are advisory only — they do not block any operation.'
  - 'The LLM must not include the spec itself in its own dependsOn list.'
  - 'SaveSpecMetadata must validate content against specMetadataSchema before writing — structurally invalid content is rejected with MetadataValidationError.'
  - 'Reading metadata (parseMetadata) remains lenient — it returns {} on invalid input so downstream operations are never blocked.'
scenarios:
  - requirement: 'File location and naming'
    name: 'Metadata file present'
    when:
      - 'a spec directory contains a .specd-metadata.yaml file'
    then:
      - 'specd reads it to obtain dependsOn and contentHashes for that spec'
  - requirement: 'File location and naming'
    name: 'Metadata file absent'
    when:
      - 'a spec directory has no .specd-metadata.yaml'
    then:
      - 'specd treats the spec as having no declared dependencies and no content hash — no error is emitted'
  - requirement: 'File format'
    name: 'Valid metadata file with all fields'
    when:
      - '.specd-metadata.yaml contains title, description, keywords, dependsOn, contentHashes, rules, constraints, and scenarios'
    then:
      - 'specd parses all fields; title, description, and keywords are available to tooling without reading the spec content'
  - requirement: 'File format'
    name: 'Title absent — fallback to path'
    when:
      - '.specd-metadata.yaml has no title field'
    then:
      - 'tooling displays the spec path instead of a title'
  - requirement: 'File format'
    name: 'Valid metadata file with only dependsOn'
    when:
      - '.specd-metadata.yaml contains dependsOn: [core/storage] and contentHashes with entries for each file'
    then:
      - 'specd parses core/storage as a dependency and uses the per-file hashes for staleness detection'
  - requirement: 'File format'
    name: 'Empty dependsOn'
    when:
      - '.specd-metadata.yaml contains dependsOn: []'
    then:
      - 'the spec has no declared dependencies — no traversal occurs from this spec'
  - requirement: 'File format'
    name: 'Cross-workspace dependency'
    when:
      - 'dependsOn contains billing:payments/invoices'
    then:
      - 'specd resolves the spec from the billing workspace specs root'
  - requirement: 'File format'
    name: 'Unqualified path resolves to same workspace'
    given:
      - 'a spec in the default workspace has dependsOn: [auth/login]'
    when:
      - 'specd resolves the dependency'
    then:
      - 'specd resolves auth/login within the default workspace'
  - requirement: 'Write-time structural validation'
    name: 'Valid metadata accepted'
    given:
      - 'a YAML string with title, description, keywords, dependsOn, and contentHashes all valid'
    when:
      - 'SaveSpecMetadata is executed with that content'
    then:
      - 'the file is written successfully'
  - requirement: 'Write-time structural validation'
    name: 'Missing title rejected'
    given:
      - 'a YAML string with description but no title'
    when:
      - 'SaveSpecMetadata is executed with that content'
    then:
      - 'a MetadataValidationError is thrown'
      - 'the file is not written'
  - requirement: 'Write-time structural validation'
    name: 'Missing description rejected'
    given:
      - 'a YAML string with title but no description'
    when:
      - 'SaveSpecMetadata is executed with that content'
    then:
      - 'a MetadataValidationError is thrown'
      - 'the file is not written'
  - requirement: 'Write-time structural validation'
    name: 'Invalid keywords rejected'
    given:
      - 'a YAML string with keywords: [Valid, 123]'
    when:
      - 'SaveSpecMetadata is executed with that content'
    then:
      - 'a MetadataValidationError is thrown indicating keywords must be lowercase strings'
      - 'the file is not written'
  - requirement: 'Write-time structural validation'
    name: 'Invalid dependsOn format rejected'
    given:
      - 'a YAML string with dependsOn: [not a valid id!]'
    when:
      - 'SaveSpecMetadata is executed with that content'
    then:
      - 'a MetadataValidationError is thrown indicating the spec ID format is invalid'
      - 'the file is not written'
  - requirement: 'Write-time structural validation'
    name: 'Invalid contentHashes format rejected'
    given:
      - 'a YAML string with contentHashes: { spec.md: md5:abc }'
    when:
      - 'SaveSpecMetadata is executed with that content'
    then:
      - 'a MetadataValidationError is thrown indicating the hash format is invalid'
      - 'the file is not written'
  - requirement: 'Write-time structural validation'
    name: 'Invalid rules structure rejected'
    given:
      - 'a YAML string with rules: [{ requirement: empty string }]'
    when:
      - 'SaveSpecMetadata is executed with that content'
    then:
      - 'a MetadataValidationError is thrown'
      - 'the file is not written'
  - requirement: 'Write-time structural validation'
    name: 'Invalid scenarios structure rejected'
    given:
      - 'a YAML string with scenarios: [{ requirement: X, name: Y }] missing when and then'
    when:
      - 'SaveSpecMetadata is executed with that content'
    then:
      - 'a MetadataValidationError is thrown'
      - 'the file is not written'
  - requirement: 'Write-time structural validation'
    name: 'Unknown top-level keys allowed'
    given:
      - 'a YAML string with title, description, and customField: value'
    when:
      - 'SaveSpecMetadata is executed with that content'
    then:
      - 'the file is written successfully — unknown keys are passed through'
  - requirement: 'Write-time structural validation'
    name: 'Empty content rejected'
    given:
      - 'an empty YAML string with no fields'
    when:
      - 'SaveSpecMetadata is executed with that content'
    then:
      - 'a MetadataValidationError is thrown — content must be a YAML mapping with at least title and description'
  - requirement: 'Write-time structural validation'
    name: 'Read path remains lenient'
    given:
      - 'a .specd-metadata.yaml on disk with keywords: [123, true]'
    when:
      - 'parseMetadata reads the file'
    then:
      - 'it returns {} without throwing — read path never blocks operations'
  - requirement: 'LLM authorship'
    name: 'Agent writes metadata after creating spec'
    when:
      - 'the LLM agent creates a new spec'
    then:
      - 'it produces a .specd-metadata.yaml with title, description, keywords, dependsOn, contentHashes, rules, constraints, and scenarios derived from the spec content'
  - requirement: 'LLM authorship'
    name: 'specd does not overwrite metadata'
    when:
      - 'any specd command runs'
    then:
      - 'specd never rewrites .specd-metadata.yaml — only the LLM agent does'
  - requirement: 'Staleness detection'
    name: 'Content unchanged — no warning'
    when:
      - 'the current hash of requiredSpecArtifacts matches contentHashes'
    then:
      - 'no staleness warning is emitted'
  - requirement: 'Staleness detection'
    name: 'Content changed — warning emitted'
    when:
      - 'a spec spec.md has been modified and its hash no longer matches contentHashes'
    then:
      - 'specd emits a warning that the spec metadata may be stale and the agent should regenerate it'
  - requirement: 'Staleness detection'
    name: 'Missing contentHashes — treated as stale'
    when:
      - '.specd-metadata.yaml exists but has no contentHashes field'
    then:
      - 'specd emits the same staleness warning'
  - requirement: 'Staleness detection'
    name: 'requiredSpecArtifact missing from contentHashes — treated as stale'
    when:
      - 'a requiredSpecArtifacts file exists but has no corresponding entry in contentHashes'
    then:
      - 'specd emits a staleness warning'
  - requirement: 'Staleness detection'
    name: 'Stale metadata does not block operations'
    when:
      - '.specd-metadata.yaml is stale'
    then:
      - 'specd emits a warning but does not block any command — the stale dependsOn is still used for context traversal'
  - requirement: 'Use by CompileContext'
    name: 'dependsOn adds context beyond excludes'
    when:
      - 'specd.yaml has contextExcludeSpecs: [core/storage] and a spec metadata lists core/storage in dependsOn'
    then:
      - 'CompileContext includes core/storage — dependsOn overrides project-level excludes'
  - requirement: 'Use by CompileContext'
    name: 'Transitive traversal'
    when:
      - 'change has contextSpecIds: [auth/login] and auth/login metadata lists auth/jwt in dependsOn and auth/jwt metadata lists crypto/keys'
    then:
      - 'CompileContext includes all three: auth/login, auth/jwt, and crypto/keys'
  - requirement: 'Use by CompileContext'
    name: 'Missing spec in dependsOn skipped with warning'
    when:
      - 'dependsOn references a spec ID that does not exist on disk'
    then:
      - 'specd emits a warning and skips that entry — context compilation continues'
  - requirement: 'Use by CompileContext'
    name: 'Cycle in dependsOn broken with warning'
    when:
      - 'spec A lists spec B in dependsOn and spec B lists spec A'
    then:
      - 'specd detects the cycle, breaks it, emits a warning, and includes both specs only once'
  - requirement: 'Version control'
    name: 'Metadata committed with spec'
    when:
      - 'a spec is created or updated and .specd-metadata.yaml is written'
    then:
      - 'it appears in git status as a tracked file alongside the spec content artifacts'
