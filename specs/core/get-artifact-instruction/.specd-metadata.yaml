title: GetArtifactInstruction
description: "When an agent is creating or modifying a specific artifact during the designing step, it needs the artifact's instruction along with its composition rules and delta guidance ‚Äî but this is instruction content, not context. `CompileContext` handles context (specs, metadata, available steps); `GetArtifactInstruction` handles the artifact-specific instructions: the schema instruction, composition rules (`rules.pre`/`rules.post`), and delta instructions with existing artifact outlines. The skill retrieves these at the right moment ‚Äî after loading context but before doing the work."
dependsOn:
  - core:core/schema-format
  - core:core/delta-format
  - core:core/change
  - core:core/schema-merge
  - core:core/template-variables
context:
  - "When an agent is creating or modifying a specific artifact during the designing step, it needs the artifact's instruction along with its composition rules and delta guidance ‚Äî but this is instruction content, not context. `CompileContext` handles context (specs, metadata, available steps); `GetArtifactInstruction` handles the artifact-specific instructions: the schema instruction, composition rules (`rules.pre`/`rules.post`), and delta instructions with existing artifact outlines. The skill retrieves these at the right moment ‚Äî after loading context but before doing the work."
rules:
  - requirement: Ports and constructor
    rules:
      - |-
        `GetArtifactInstruction` receives at construction time: `ChangeRepository`, a map of `SpecRepository` instances, `SchemaRegistry`, `ArtifactParserRegistry`, `TemplateExpander`, `schemaRef`, and `workspaceSchemasPaths`.

        ```typescript
        class GetArtifactInstruction {
          constructor(
            changes: ChangeRepository,
            specs: ReadonlyMap<string, SpecRepository>,
            schemas: SchemaRegistry,
            parsers: ArtifactParserRegistry,
            templates: TemplateExpander,
            schemaRef: string,
            workspaceSchemasPaths: ReadonlyMap<string, string>,
          )
        }
        ```

        `ArtifactParserRegistry` is needed to generate delta format instructions and existing artifact outlines. `SpecRepository` is needed to read existing artifact files for outlines. `TemplateExpander.expand()` is called on `instruction`, `template`, `deltaInstruction`, and `rules` text before returning them (verbatim expansion, no shell escaping). `SchemaRegistry` is needed to resolve the template file path and read its content. The use case builds contextual variables (`change` namespace) from the resolved change and `ChangeRepository.changePath()`, passing them to the expander.
  - requirement: Input
    rules:
      - |-
        `GetArtifactInstruction.execute` receives:

        - `name` (string, required) ‚Äî the change name
        - `artifactId` (string, optional) ‚Äî the artifact ID from the schema (e.g. `specs`, `verify`, `tasks`). When omitted, the use case auto-resolves the next artifact to work on by walking the schema's artifact list in declaration order: the first artifact whose `requires` dependencies are all satisfied (complete or skipped) but that is itself not yet complete or skipped. If all artifacts are already complete/skipped, it throws `ArtifactNotFoundError`.
  - requirement: Change lookup
    rules:
      - '`GetArtifactInstruction` loads the change by name via `ChangeRepository`. If no change exists with the given name, it MUST throw `ChangeNotFoundError`.'
  - requirement: Schema name guard
    rules:
      - After resolving the schema, `GetArtifactInstruction` MUST compare `schema.name()` with `change.schemaName`. If they differ, it MUST throw `SchemaMismatchError`.
  - requirement: Artifact resolution
    rules:
      - '`GetArtifactInstruction` MUST find the artifact entry in the schema whose `id` matches the input `artifactId`. If no matching artifact exists, it MUST throw `ArtifactNotFoundError`.'
  - requirement: Instruction resolution
    rules:
      - |-
        `GetArtifactInstruction` MUST resolve each instruction component independently:

        - **`rulesPre`** ‚Äî if the artifact declares `rules.pre`, collect all entries' `text` in declaration order. These are composition rules added by extending schemas or plugins to augment the base instruction.
        - **`instruction`** ‚Äî the artifact's `instruction` field from the schema. `null` if not declared.
        - **`template`** ‚Äî if the artifact declares a `template` path, read the file content from the schema directory via `SchemaRegistry` and return the resolved string. `null` if the artifact has no template. Template variable expansion (via `TemplateExpander`) MUST be applied to the template content using the same contextual variables as `instruction`.
        - **`delta`** ‚Äî if the artifact has `delta: true`, resolve three sub-components:
          - **`formatInstructions`** ‚Äî call `parsers.get(artifact.format).deltaInstructions()` for the technical delta format guidance.
          - **`domainInstructions`** ‚Äî the artifact's `deltaInstruction` field. `null` if not declared.
          - **`outlines`** ‚Äî for each spec ID in `change.specIds`, read the corresponding artifact file from `SpecRepository`, parse it via `ArtifactParser.parse()`, and call `ArtifactParser.outline()` to obtain an `OutlineEntry[]` tree. An outline is a navigable summary of the artifact's addressable nodes (sections in markdown, keys in YAML/JSON) without their content ‚Äî it tells the agent what structure exists so it can target delta operations correctly. Missing files are silently skipped. Each entry includes the `specId` and its `outline`.
        - **`rulesPost`** ‚Äî if the artifact declares `rules.post`, collect all entries' `text` in declaration order.

        When `delta` is `false`, the `delta` field in the result is `null`.
  - requirement: Result shape
    rules:
      - |-
        `GetArtifactInstruction.execute` MUST return a structured result containing:

        - `artifactId` (string) ‚Äî the artifact ID
        - `rulesPre` (string\[]) ‚Äî `rules.pre` texts in declaration order; empty array if none
        - `instruction` (string | null) ‚Äî the artifact's instruction text; `null` if not declared
        - `template` (string | null) ‚Äî the resolved template file content with variables expanded; `null` when the artifact has no template declared
        - `delta` (object | null) ‚Äî delta-specific instruction components; `null` when `delta: false`:
          - `formatInstructions` (string) ‚Äî format-specific delta writing guidance
          - `domainInstructions` (string | null) ‚Äî the artifact's `deltaInstruction` text; `null` if not declared
          - `outlines` (array) ‚Äî one entry per spec in `change.specIds` that has an existing artifact file:
            - `specId` (string) ‚Äî the spec ID
            - `outline` (OutlineEntry\[]) ‚Äî the navigable node structure
        - `rulesPost` (string\[]) ‚Äî `rules.post` texts in declaration order; empty array if none

        The caller decides which parts to use. A subagent creating artifacts from scratch uses `rulesPre` + `instruction` + `template` + `rulesPost`. A subagent creating deltas uses `rulesPre` + `delta` + `rulesPost` (the template is not needed for deltas since `outlines` provides the existing structure).
constraints:
  - This use case is read-only ‚Äî it does not modify the change or execute any commands
  - rules.pre and rules.post are schema composition mechanisms ‚Äî they augment the instruction without replacing it
  - The use case does not evaluate step availability or artifact status
  - Delta outlines are loaded from SpecRepository for each spec in change.specIds ‚Äî missing files are silently skipped
  - ArtifactParserRegistry must contain an adapter for the artifact's format; if no adapter is registered, the use case throws ParserNotRegisteredError
scenarios:
  - requirement: Change lookup
    name: Change not found throws ChangeNotFoundError
    given:
      - no change named nonexistent exists
    when:
      - 'GetArtifactInstruction.execute is called with name: "nonexistent"'
    then:
      - ChangeNotFoundError is thrown
  - requirement: Schema name guard
    name: Schema mismatch throws SchemaMismatchError
    given:
      - a change created with schema spec-driven
      - AND the active schema in specd.yaml is custom-schema
    when:
      - GetArtifactInstruction.execute is called
    then:
      - SchemaMismatchError is thrown
  - requirement: Artifact resolution
    name: Unknown artifact ID throws ArtifactNotFoundError
    given:
      - a schema with artifacts [proposal, specs, tasks]
    when:
      - 'GetArtifactInstruction.execute is called with artifactId: "nonexistent"'
    then:
      - ArtifactNotFoundError is thrown
  - requirement: Instruction resolution
    name: Full result with rules, instruction, and delta
    given:
      - 'an artifact with rules.pre: [{ id: "r1", text: "Pre rule" }], instruction: "Write the spec", delta: true, deltaInstruction: "Add requirements", and rules.post: [{ id: "r2", text: "Post rule" }]'
    when:
      - GetArtifactInstruction.execute is called for this artifact
    then:
      - rulesPre is ["Pre rule"]
      - AND instruction is "Write the spec"
      - AND delta.formatInstructions is a non-empty string
      - AND delta.domainInstructions is "Add requirements"
      - AND rulesPost is ["Post rule"]
  - requirement: Instruction resolution
    name: Artifact with only instruction (no rules, no delta)
    given:
      - 'an artifact with instruction: "Create the proposal" and no rules or delta'
    when:
      - GetArtifactInstruction.execute is called
    then:
      - instruction is "Create the proposal"
      - AND rulesPre is []
      - AND rulesPost is []
      - AND delta is null
  - requirement: Instruction resolution
    name: Artifact with no instruction content
    given:
      - 'an artifact with no instruction, no rules, and delta: false'
    when:
      - GetArtifactInstruction.execute is called
    then:
      - instruction is null
      - AND rulesPre is []
      - AND rulesPost is []
      - AND delta is null
  - requirement: Instruction resolution
    name: Delta outlines from existing specs
    given:
      - 'an artifact with delta: true and change.specIds includes default:auth/login'
      - AND SpecRepository has an existing spec.md for auth/login
    when:
      - GetArtifactInstruction.execute is called
    then:
      - 'delta.outlines includes an entry with specId: "default:auth/login" and a non-empty outline'
  - requirement: Instruction resolution
    name: Missing existing artifact silently skipped in outlines
    given:
      - 'an artifact with delta: true and change.specIds includes default:new/spec'
      - AND SpecRepository has no existing file for new/spec
    when:
      - GetArtifactInstruction.execute is called
    then:
      - delta.outlines does not include an entry for default:new/spec
      - AND no error or warning is produced
  - requirement: Instruction resolution
    name: rules.pre from extending schema
    given:
      - 'a base schema with instruction: "Write specs"'
      - 'AND a child schema that extends it adding rules.pre: [{ id: "lang", text: "Use formal language" }]'
    when:
      - GetArtifactInstruction.execute is called
    then:
      - rulesPre is ["Use formal language"]
      - AND instruction is "Write specs"
  - requirement: Instruction resolution
    name: Template content resolved and returned
    given:
      - 'an artifact with template: "templates/design.md" pointing to a file containing # Design: {{change.name}}'
      - AND a change named add-auth
    when:
      - GetArtifactInstruction.execute is called for this artifact
    then:
      - 'template is "# Design: add-auth" (variables expanded)'
  - requirement: Result shape
    name: Rules-only artifact has null instruction
    given:
      - 'an artifact with rules.post: [{ id: "r1", text: "Check grammar" }] but no instruction field'
    when:
      - GetArtifactInstruction.execute is called
    then:
      - instruction is null
      - AND rulesPost is ["Check grammar"]
  - requirement: Result shape
    name: Result includes template field
    given:
      - 'an artifact with template: "templates/tasks.md"'
    when:
      - GetArtifactInstruction.execute is called
    then:
      - the result includes a template field with the resolved file content
