title: YamlSerializer Port
description: YAML parsing and serialization are pervasive in specd (configs, manifests, schemas), but the architecture rule places parsing at the infrastructure boundary, so use cases must not import a YAML library directly. `YamlSerializer` is the application-layer port that defines the contract for YAML parsing and serialization, keeping consumers decoupled from any specific library.
dependsOn:
  - default:_global/architecture
context:
  - YAML parsing and serialization are pervasive in specd (configs, manifests, schemas), but the architecture rule places parsing at the infrastructure boundary, so use cases must not import a YAML library directly. `YamlSerializer` is the application-layer port that defines the contract for YAML parsing and serialization, keeping consumers decoupled from any specific library.
rules:
  - requirement: Abstract class shape
    rules:
      - 'The port MUST be declared as a TypeScript `abstract class` named `YamlSerializer` with two abstract methods: `parse(content: string): unknown` and `stringify(data: unknown): string`. No concrete behaviour SHALL be provided.'
  - requirement: Parse method input and output
    rules:
      - The `parse` method MUST accept a single `content` parameter of type `string` containing raw YAML text. It MUST return the parsed JavaScript value typed as `unknown`. The caller is responsible for narrowing the type.
  - requirement: Parse method error handling
    rules:
      - If the input string is not valid YAML, the `parse` method MUST throw an error. Implementations SHALL NOT return `undefined` or silently swallow malformed input.
  - requirement: Parse method empty and blank input
    rules:
      - When `content` is an empty string or contains only whitespace, `parse` MUST return `undefined` (the YAML spec defines an empty document as producing no value). Implementations SHALL NOT throw for empty or blank input.
  - requirement: Stringify method input and output
    rules:
      - The `stringify` method MUST accept a single `data` parameter of type `unknown` and return a YAML string representation. The output MUST be valid YAML that, when passed back to `parse`, produces a value structurally equivalent to the original input (round-trip fidelity for JSON-safe values).
  - requirement: Stringify method line wrapping
    rules:
      - Implementations MUST NOT introduce automatic line wrapping into the serialized output. Long scalar values SHALL be emitted on a single line unless the input data explicitly contains newlines.
  - requirement: No side effects
    rules:
      - Both `parse` and `stringify` MUST be pure with respect to their inputs. Calling either method SHALL NOT produce I/O, mutate shared state, or depend on external context.
constraints:
  - The port lives in application/ports/ per the hexagonal architecture rule
  - No direct dependency on any YAML library at the port level
  - parse returns unknown — consumers MUST narrow the type themselves
  - Round-trip fidelity is guaranteed only for JSON-safe values (strings, numbers, booleans, null, plain objects, arrays)
scenarios:
  - requirement: Abstract class shape
    name: Port cannot be instantiated directly
    when:
      - code attempts to instantiate YamlSerializer directly
    then:
      - it fails because YamlSerializer is abstract
  - requirement: Abstract class shape
    name: Implementation satisfies the contract
    given:
      - a concrete class extending YamlSerializer
    when:
      - the class implements both parse and stringify
    then:
      - it compiles and can be instantiated
  - requirement: Parse method input and output
    name: Valid YAML object is parsed
    when:
      - 'parse is called with "foo: bar\nbaz: 42\n"'
    then:
      - 'it returns { foo: "bar", baz: 42 }'
  - requirement: Parse method input and output
    name: Valid YAML array is parsed
    when:
      - parse is called with "- one\n- two\n"
    then:
      - it returns ["one", "two"]
  - requirement: Parse method input and output
    name: Scalar YAML is parsed
    when:
      - parse is called with "hello"
    then:
      - it returns the string "hello"
  - requirement: Parse method error handling
    name: Malformed YAML throws
    when:
      - 'parse is called with invalid YAML (e.g. "key: [unclosed")'
    then:
      - it throws an error
  - requirement: Parse method empty and blank input
    name: Empty string returns undefined
    when:
      - parse is called with ""
    then:
      - it returns undefined
  - requirement: Parse method empty and blank input
    name: Whitespace-only string returns undefined
    when:
      - parse is called with "   \n  \n"
    then:
      - it returns undefined
  - requirement: Stringify method input and output
    name: Object is serialized to valid YAML
    when:
      - 'stringify is called with { foo: "bar", baz: 42 }'
    then:
      - the result is a valid YAML string
      - AND passing the result to parse returns a structurally equivalent object
  - requirement: Stringify method input and output
    name: Array is serialized to valid YAML
    when:
      - stringify is called with ["one", "two"]
    then:
      - the result is a valid YAML string
      - AND passing the result to parse returns ["one", "two"]
  - requirement: Stringify method line wrapping
    name: Long values are not wrapped
    given:
      - a data object with a string value longer than 80 characters
    when:
      - stringify is called
    then:
      - the output contains the full value on a single line (no folded or block scalar indicators inserted by the serializer)
  - requirement: No side effects
    name: Parse is pure
    when:
      - parse is called multiple times with the same input
    then:
      - the return value is structurally identical each time
  - requirement: No side effects
    name: Stringify is pure
    when:
      - stringify is called multiple times with the same input
    then:
      - the return value is identical each time
