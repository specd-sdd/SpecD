title: Change Edit
description: Defines the `specd change edit <name>` command, which modifies the spec scope of an existing change by adding or removing spec IDs. Workspaces are never managed directly â€” they are always derived from the resulting set of `specIds` after the edit.
dependsOn:
  - cli:cli/entrypoint
  - core:core/change
  - cli:cli/change-create
  - core:core/spec-id-format
context:
  - Defines the `specd change edit <name>` command, which modifies the spec scope of an existing change by adding or removing spec IDs. Workspaces are never managed directly â€” they are always derived from the resulting set of `specIds` after the edit.
rules:
  - requirement: Command signature
    rules:
      - |-
        ```
        specd change edit <name>
          [--add-spec <id>] [--remove-spec <id>]
          [--description <text>]
          [--format text|json|toon]
        ```
        * `<name>` â€” required positional; the name of the change to edit
        * `--add-spec <id>` â€” repeatable; adds a spec ID to `specIds`. `<id>` follows the same `[<workspace>:]<capability-path>` format as `change create`, defaulting to `default` workspace when prefix is omitted
        * `--remove-spec <id>` â€” repeatable; removes a spec ID from `specIds`
        * `--description <text>` â€” optional; sets or replaces the free-text description of the change
        * `--format text|json|toon` â€” optional; output format, defaults to `text`
        At least one flag must be provided; running with no flags is a CLI usage error (exit code 1).
  - requirement: Workspace derivation
    rules:
      - After computing the new `specIds`, the CLI derives the new `workspaces` set from the workspace prefixes of all resulting spec IDs â€” the same logic as `change create`. Workspaces that are no longer referenced by any spec are removed automatically; new workspaces required by added specs are added automatically. The user never specifies workspace IDs directly.
  - requirement: Invariant enforcement
    rules:
      - The change must retain at least one `specId` after editing. If `--remove-spec` operations would leave `specIds` empty, the command exits with code 1 before making any changes.
  - requirement: Approval invalidation
    rules:
      - Any modification to `specIds` (and by extension `workspaces`) causes the domain to append an `invalidated` event followed by a `transitioned` event rolling back to `designing`. The CLI reports this in the output. Updating `--description` alone does not trigger invalidation.
  - requirement: Output on success
    rules:
      - |-
        On success, output depends on `--format`:
        * `text` (default): prints to stdout: If approval invalidation occurred, a warning is also printed to stderr:
        * `json` or `toon`: outputs (encoded in the respective format):
  - requirement: Error cases
    rules:
      - |-
        * If the change does not exist, exits with code 1.
        * If a `--remove-spec` value is not in the current `specIds`, exits with code 1.
        * If an `--add-spec` value uses a workspace prefix not declared in `specd.yaml`, exits with code 1.
        * If the result would leave `specIds` empty, exits with code 1.
constraints:
  - All edits are applied atomically â€” either all succeed or none are applied
  - The change name and createdAt are immutable and cannot be changed
  - A discarded change cannot be edited
  - Workspaces are always derived from specIds â€” they are never set independently
scenarios:
  - requirement: Command signature
    name: No edit flags provided
    when:
      - specd change edit my-change is run with no edit flags
    then:
      - the command exits with code 1 and prints a usage error to stderr
  - requirement: Workspace derivation
    name: Workspace added when new spec requires it
    given:
      - 'a change with specIds: ["default:auth/login"] and workspaces: ["default"]'
    when:
      - specd change edit my-change --add-spec billing-ws:billing/invoices is run
    then:
      - the resulting workspaces includes both default and billing-ws
  - requirement: Workspace derivation
    name: Workspace removed when no specs reference it
    given:
      - 'a change with specIds: ["default:auth/login", "billing-ws:billing/invoices"] and workspaces: ["default", "billing-ws"]'
    when:
      - specd change edit my-change --remove-spec billing-ws:billing/invoices is run
    then:
      - the resulting workspaces contains only default
      - AND billing-ws is removed automatically
  - requirement: Workspace derivation
    name: Workspace unchanged when other specs still reference it
    given:
      - 'a change with specIds: ["billing-ws:billing/invoices", "billing-ws:billing/payments"]'
    when:
      - specd change edit my-change --remove-spec billing-ws:billing/invoices is run
    then:
      - billing-ws remains in workspaces because billing-ws:billing/payments still references it
  - requirement: Invariant enforcement
    name: Removing last spec rejected
    given:
      - a change with a single specId default:auth/login
    when:
      - specd change edit my-change --remove-spec default:auth/login is run
    then:
      - the command exits with code 1
      - 'AND stderr contains an error: message'
      - AND no changes are made to the change
  - requirement: Approval invalidation
    name: Spec change triggers invalidation
    given:
      - a change with an active spec approval in spec-approved state
    when:
      - specd change edit my-change --add-spec auth/register is run
    then:
      - an invalidated event is appended to history
      - AND the change is rolled back to designing
      - 'AND stderr contains a warning: about invalidation'
  - requirement: Approval invalidation
    name: No active approval â€” no invalidation event
    given:
      - a change with no active approval in designing state
    when:
      - specd change edit my-change --add-spec auth/register is run
    then:
      - no invalidated event is appended
      - AND the state remains designing
  - requirement: Output on success
    name: Text output shows updated specs and workspaces
    when:
      - specd change edit my-change --add-spec auth/register succeeds
    then:
      - 'stdout contains updated change my-change followed by the new specs: and workspaces: lines'
      - AND the process exits with code 0
  - requirement: Output on success
    name: JSON output with invalidation
    given:
      - a change in spec-approved state
    when:
      - specd change edit my-change --add-spec auth/register --format json is run
    then:
      - stdout is valid JSON with result equal to "ok", specIds, workspaces, invalidated equal to true, and state equal to "designing"
  - requirement: Error cases
    name: Change not found
    when:
      - specd change edit nonexistent --add-spec auth/login is run
    then:
      - the command exits with code 1
      - 'AND stderr contains an error: message'
  - requirement: Error cases
    name: Removing spec not in specIds
    given:
      - a change whose specIds does not include default:auth/missing
    when:
      - specd change edit my-change --remove-spec default:auth/missing is run
    then:
      - the command exits with code 1
      - 'AND stderr contains an error: message'
  - requirement: Error cases
    name: Unknown workspace prefix in --add-spec
    when:
      - specd change edit my-change --add-spec unknown-ws:some/path is run
    then:
      - the command exits with code 1
      - 'AND stderr contains an error: message'
