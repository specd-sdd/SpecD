title: Graph Find
description: Without a way to search the code graph for symbols, users and agents must resort to text-based grep which misses semantic structure. The `specd graph find` command searches symbols in the code graph by name, kind, file, or comment text, returning structured results that include location and documentation.
dependsOn:
  - cli:cli/entrypoint
  - code-graph:code-graph/composition
context:
  - Without a way to search the code graph for symbols, users and agents must resort to text-based grep which misses semantic structure. The `specd graph find` command searches symbols in the code graph by name, kind, file, or comment text, returning structured results that include location and documentation.
rules:
  - requirement: Command signature
    rules:
      - |-
        ```
        specd graph find [--name <pattern>] [--kind <kind>] [--file <path>] [--comment <text>] [--case-sensitive] [--path <path>] [--format text|json|toon]
        ```

        * `--name` — optional; symbol name pattern, supports `*` wildcards
        * `--kind` — optional; symbol kind filter, must be one of: `function`, `class`, `method`, `variable`, `type`, `interface`, `enum`
        * `--file` — optional; file path filter, supports `*` wildcards
        * `--comment` — optional; substring match against symbol comments (full-text search)
        * `--case-sensitive` — optional; when present, `--name` and `--comment` matching is case sensitive. Default is case insensitive
        * `--path` — optional; workspace root, defaults to the current working directory
        * `--format text|json|toon` — optional; output format, defaults to `text`

        All filters are optional and combinable. At least one filter should be provided, but the command does not enforce this — an empty query returns all symbols.
  - requirement: Search behaviour
    rules:
      - |-
        The command:

        1. Creates a `CodeGraphProvider` with the resolved path
        2. Opens the provider
        3. Builds a query from the provided filters and calls the appropriate search method
        4. Outputs the matching `SymbolNode` array
        5. Closes the provider
        6. Exits with `process.exit(0)` — required because the LadybugDB native addon keeps the Node process alive
  - requirement: Output format
    rules:
      - |-
        In `text` mode (default), the output begins with a count line followed by the matching symbols:

        ```
        10 symbol(s) found:

          function computeHash  src/hash.ts:8 — /** Computes the hash. */
          class User  src/user.ts:1
        ```

        Each symbol line shows:

        * Kind (e.g. `function`, `class`)
        * Name
        * File path and line number separated by `:`
        * If a comment is present, `—` followed by the comment truncated to 60 characters

        When no symbols match, the output is `0 symbol(s) found:` with no symbol lines.

        In `json` or `toon` mode, the full `SymbolNode` array is output as-is.
  - requirement: Error cases
    rules:
      - |-
        If the provider cannot be opened or the search fails due to an infrastructure error, the command exits with code 3.

        If `--kind` is provided with an invalid value, the command exits with code 1 and prints an `error:` message listing the valid kinds.
constraints:
  - The CLI does not contain search logic — it delegates entirely to @specd/code-graph
  - process.exit(0) is called explicitly after closing the provider
  - Comment truncation in text mode is capped at 60 characters; longer comments are cut with no ellipsis marker
  - Wildcard matching for --name and --file uses * glob-style patterns
scenarios:
  - requirement: Search behaviour
    name: Search by name pattern
    given:
      - the graph contains symbols computeHash, computeDigest, and validate
    when:
      - specd graph find --name "compute*" is run
    then:
      - 'stdout shows 2 symbol(s) found: followed by computeHash and computeDigest'
      - AND validate is not included
      - AND the process exits with code 0
  - requirement: Search behaviour
    name: Search by kind
    given:
      - the graph contains 3 functions and 2 classes
    when:
      - specd graph find --kind class is run
    then:
      - 'stdout shows 2 symbol(s) found: followed by the 2 class symbols'
  - requirement: Search behaviour
    name: Search by file pattern
    given:
      - the graph contains symbols in src/auth.ts and src/user.ts
    when:
      - specd graph find --file "src/auth*" is run
    then:
      - only symbols from files matching src/auth* are shown
  - requirement: Search behaviour
    name: Search by comment text
    given:
      - the graph contains a symbol with comment /** Computes the hash. */ and another with no comment
    when:
      - specd graph find --comment "hash" is run
    then:
      - only the symbol with hash in its comment is shown
  - requirement: Search behaviour
    name: Combined filters
    given:
      - the graph contains functions and classes in src/auth.ts and src/user.ts
    when:
      - specd graph find --file "src/auth*" --kind function is run
    then:
      - only functions from files matching src/auth* are shown
  - requirement: Search behaviour
    name: No filters returns all symbols
    given:
      - the graph contains 50 symbols
    when:
      - specd graph find is run
    then:
      - 'stdout shows 50 symbol(s) found: followed by all symbols'
  - requirement: Search behaviour
    name: No matching symbols
    given:
      - the graph contains no symbols matching the query
    when:
      - specd graph find --name "nonexistent" is run
    then:
      - 'stdout shows 0 symbol(s) found:'
      - AND the process exits with code 0
  - requirement: Output format
    name: Text output with comment
    given:
      - the graph contains function computeHash at src/hash.ts:8 with comment /** Computes the hash. */
    when:
      - specd graph find --name "computeHash" is run
    then:
      - stdout contains function computeHash  src/hash.ts:8 — /** Computes the hash. */
  - requirement: Output format
    name: Text output without comment
    given:
      - the graph contains class User at src/user.ts:1 with no comment
    when:
      - specd graph find --kind class is run
    then:
      - the line for User shows class User  src/user.ts:1 with no — suffix
  - requirement: Output format
    name: Comment truncated at 60 characters
    given:
      - a symbol has a comment longer than 60 characters
    when:
      - specd graph find matches that symbol
    then:
      - the comment in text output is truncated to 60 characters
  - requirement: Output format
    name: JSON output
    given:
      - the graph contains matching symbols
    when:
      - specd graph find --name "validate" --format json is run
    then:
      - stdout is a valid JSON array of SymbolNode objects
  - requirement: Error cases
    name: Case insensitive search by default
    given:
      - the graph contains a symbol named CreateUser
    when:
      - specd graph find --name "createuser" is run
    then:
      - the symbol CreateUser is returned (case insensitive match)
  - requirement: Error cases
    name: Case sensitive search with flag
    given:
      - the graph contains symbols CreateUser and createUser
    when:
      - specd graph find --name "createUser" --case-sensitive is run
    then:
      - only createUser is returned
  - requirement: Error cases
    name: Case insensitive comment search
    given:
      - the graph contains a symbol with comment /** Validates User Input */
    when:
      - specd graph find --comment "validates user" is run
    then:
      - the symbol is returned (case insensitive substring match)
  - requirement: Error cases
    name: Invalid kind exits with code 1
    given:
      - the user passes --kind invalid
    when:
      - specd graph find --kind invalid is run
    then:
      - 'stderr contains error: followed by a message listing valid kinds'
      - AND the process exits with code 1
  - requirement: Error cases
    name: Infrastructure error exits with code 3
    given:
      - the provider cannot be opened
    when:
      - specd graph find --name "test" is run
    then:
      - 'stderr contains a fatal: prefixed error message'
      - AND the process exits with code 3
