title: Spec Context
description: Defines the `specd spec context <workspace:capability-path>` command, which prints the metadata summary for a single spec as it would appear in an AI context block, with optional section filtering and dependency traversal.
dependsOn:
  - cli:cli/entrypoint
context:
  - Defines the `specd spec context <workspace:capability-path>` command, which prints the metadata summary for a single spec as it would appear in an AI context block, with optional section filtering and dependency traversal.
rules:
  - requirement: Command signature
    rules:
      - |-
        ```
        specd spec context <workspace:capability-path>
          [--rules] [--constraints] [--scenarios]
          [--follow-deps [--depth <n>]]
          [--format text|json|toon]
        ```
        * `<workspace:capability-path>` — required positional; the fully-qualified spec ID (e.g. `default:auth/login`)
        * `--rules` — when present, includes only the rules sections in the output
        * `--constraints` — when present, includes only the constraints sections in the output
        * `--scenarios` — when present, includes only the scenarios sections in the output
        * `--follow-deps` — when present, follows `dependsOn` links from `.specd-metadata.yaml` transitively and includes each dependency's context in the output
        * `--depth <n>` — optional; only valid with `--follow-deps`; limits dependency traversal to N levels (1 = direct deps only, 2 = deps of deps, etc.); defaults to unlimited when `--follow-deps` is passed without `--depth`
        * `--format text|json|toon` — optional; output format, defaults to `text`
        When none of `--rules`, `--constraints`, or `--scenarios` are passed, all available sections are included (description + rules + constraints + scenarios). When one or more section flags are passed, only those sections are included.
  - requirement: Behaviour
    rules:
      - |-
        The command reads the spec's `.specd-metadata.yaml` and renders the requested sections. If the metadata is absent or stale (content hashes do not match current artifact files), the command falls back to the schema's `metadataExtraction` declarations to extract content deterministically from the spec's raw artifact files and emits a `warning:` to stderr.
        When `--follow-deps` is passed, the command recursively follows the `dependsOn` entries in each spec's `.specd-metadata.yaml`, applying the same section filtering and stale-fallback logic to each dependency. Cycles are detected and silently broken. The root spec is always listed first; dependencies follow in traversal order.
  - requirement: Output
    rules:
      - |-
        In `text` mode (default), each spec in the output is introduced by a header:
        ```
        ### Spec: <workspace>:<capability-path>

        <metadata content>
        ```
        When `--follow-deps` is passed, each dependency appears as a subsequent `### Spec:` block after the root.
        In `json` or `toon` mode, the output is (encoded in the respective format):
        ```json
        {
          "specs": [
            {
              "spec": "workspace:cap/path",
              "title": "...",
              "description": "...",
              "rules": [...],
              "constraints": [...],
              "scenarios": [...],
              "stale": false
            }
          ],
          "warnings": []
        }
        ```
        Only the requested sections are included in each spec object. `description` is always included when not using section filters. When a section is requested but absent, it is omitted from the object (not `null` or `[]`). The root spec is always `specs[0]`; dependencies follow in traversal order.
  - requirement: Error cases
    rules:
      - |-
        * If the workspace is not configured, exits with code 1.
        * If no artifact files exist for the spec at the given path, exits with code 1.
        * `--depth` without `--follow-deps` is a CLI usage error (exit code 1).
constraints:
  - This command is read-only — it never updates metadata
  - The workspace is always explicit in the path
  - Section flags are additive — passing --rules --constraints includes both sections
  - --follow-deps traversal uses the same cycle detection as CompileContext
  - Stale/absent metadata is never a hard error — the fallback is always attempted
scenarios:
  - requirement: Command signature
    name: Missing path argument
    when:
      - specd spec context is run without a path
    then:
      - the command exits with code 1 and prints a usage error to stderr
  - requirement: Command signature
    name: --depth without --follow-deps
    when:
      - specd spec context default:auth/login --depth 2 is run without --follow-deps
    then:
      - the command exits with code 1 and prints a usage error to stderr
  - requirement: Behaviour
    name: Fresh metadata used
    given:
      - default:auth/login has fresh .specd-metadata.yaml with valid content hashes
    when:
      - specd spec context default:auth/login is run
    then:
      - stdout contains the metadata summary (description, rules, constraints, scenarios)
      - AND no warning is emitted to stderr
      - AND the process exits with code 0
  - requirement: Behaviour
    name: Stale metadata falls back to raw artifacts
    given:
      - default:auth/login has .specd-metadata.yaml with mismatched content hashes
    when:
      - specd spec context default:auth/login is run
    then:
      - stdout contains the metadataExtraction fallback content
      - 'AND stderr contains a warning: line about stale metadata'
      - AND the process exits with code 0
  - requirement: Behaviour
    name: Section flags filter output
    given:
      - default:auth/login has metadata with description, rules, constraints, and scenarios
    when:
      - specd spec context default:auth/login --rules --scenarios is run
    then:
      - stdout contains the rules and scenarios sections
      - AND stdout does not contain the description or constraints sections
  - requirement: Behaviour
    name: No section flags includes all sections
    given:
      - default:auth/login has metadata with all sections populated
    when:
      - specd spec context default:auth/login is run without section flags
    then:
      - stdout contains description, rules, constraints, and scenarios
  - requirement: Behaviour
    name: --follow-deps includes dependency specs
    given:
      - 'default:auth/login has .specd-metadata.yaml with dependsOn: ["default:auth/shared-errors"]'
      - AND default:auth/shared-errors exists with its own metadata
    when:
      - specd spec context default:auth/login --follow-deps is run
    then:
      - 'stdout contains a ### Spec: default:auth/login block followed by a ### Spec: default:auth/shared-errors block'
  - requirement: Behaviour
    name: --depth limits traversal
    given:
      - default:auth/login depends on default:auth/shared-errors which depends on default:common/errors
    when:
      - specd spec context default:auth/login --follow-deps --depth 1 is run
    then:
      - stdout contains default:auth/login and default:auth/shared-errors but not default:common/errors
  - requirement: Behaviour
    name: Cycle detection prevents infinite loop
    given:
      - default:a depends on default:b and default:b depends on default:a
    when:
      - specd spec context default:a --follow-deps is run
    then:
      - each spec appears at most once in the output
      - AND the process exits with code 0
  - requirement: Output
    name: Text header format
    when:
      - specd spec context default:auth/login is run
    then:
      - 'stdout begins with ### Spec: default:auth/login'
  - requirement: Output
    name: JSON output — all sections, no deps
    given:
      - default:auth/login has fresh metadata with all sections
    when:
      - specd spec context default:auth/login --format json is run
    then:
      - 'stdout is valid JSON with specs array containing one entry with spec, title, description, rules, constraints, scenarios, and stale: false'
      - AND warnings is []
  - requirement: Output
    name: JSON output — section filter applied
    when:
      - specd spec context default:auth/login --constraints --format json is run
    then:
      - the spec entry in specs[0] contains constraints but not rules, scenarios, or description
  - requirement: Output
    name: JSON output — absent section omitted
    given:
      - default:auth/login has metadata with rules but no scenarios
    when:
      - specd spec context default:auth/login --scenarios --format json is run
    then:
      - the spec entry in specs[0] does not contain a scenarios key
  - requirement: Output
    name: JSON output — with dependencies
    given:
      - default:auth/login depends on default:auth/shared-errors
    when:
      - specd spec context default:auth/login --follow-deps --format json is run
    then:
      - 'specs contains two entries: specs[0] for default:auth/login and specs[1] for default:auth/shared-errors'
  - requirement: Error cases
    name: Unknown workspace
    when:
      - specd spec context unknown-ws:auth/login is run
    then:
      - the command exits with code 1
      - 'AND stderr contains an error: message'
  - requirement: Error cases
    name: No artifacts at path
    when:
      - specd spec context default:nonexistent is run and no files exist at that path
    then:
      - the command exits with code 1
      - 'AND stderr contains an error: message'
