title: Schema Show
description: Agents entering a new project need to know what artifacts they must produce and in what order, without reading raw schema YAML. The `specd schema show` command prints the active schema's declared artifacts and workflow steps in a structured, human- and machine-readable form.
dependsOn:
  - cli:cli/entrypoint
  - core:core/schema-format
context:
  - Agents entering a new project need to know what artifacts they must produce and in what order, without reading raw schema YAML. The `specd schema show` command prints the active schema's declared artifacts and workflow steps in a structured, human- and machine-readable form.
rules:
  - requirement: Command signature
    rules:
      - |-
        ```
        specd schema show [--format text|json|toon]
        ```

        * `--format text|json|toon` — optional; output format, defaults to `text`
  - requirement: Output format
    rules:
      - |-
        In `text` mode (default), the command prints the schema metadata followed by two sections:

        ```
        schema: <name>  version: <N>  kind: <kind>
        extends: <ref>  (only if present)
        plugins: <count> applied  (only if schemaPlugins is non-empty)

        artifacts:
          <id>  <scope>  <optional>  requires=[<id>,...]
          ...

        workflow:
          <step>  requires=[<id>,...]
          ...
        ```

        where `<optional>` is `optional` or `required`, and `requires` lists the artifact IDs or step names that must be complete before this entry is available. The `requires` field is omitted when empty.

        In `json` or `toon` mode, the output is (encoded in the respective format):

        ```json
        {
          "schema": {"name": "...", "version": N, "kind": "schema", "extends": "..."},
          "plugins": ["@specd/plugin-rfc"],
          "artifacts": [
            {
              "id": "...",
              "scope": "change|spec",
              "optional": false,
              "requires": [],
              "format": "...",
              "delta": false
            }
          ],
          "workflow": [
            {
              "step": "...",
              "requires": []
            }
          ]
        }
        ```
  - requirement: Error cases
    rules:
      - '* If the schema reference in `specd.yaml` cannot be resolved, exits with code 3.'
constraints:
  - This command is read-only
  - Artifact instruction, deltaInstruction, and validations are not included in the output — this command focuses on structure, not content
scenarios:
  - requirement: Output format
    name: Text output shows schema name, kind, artifacts, and workflow
    given:
      - 'a valid schema with name specd-std version 1, kind: schema, and declared artifacts and workflow steps'
    when:
      - specd schema show is run
    then:
      - 'stdout contains the schema name, version, and kind, an artifacts: section, and a workflow: section'
      - AND the process exits with code 0
  - requirement: Output format
    name: Text output shows extends when present
    given:
      - "a schema that declares extends: '@specd/schema-std'"
    when:
      - specd schema show is run
    then:
      - 'stdout contains extends: @specd/schema-std'
  - requirement: Output format
    name: Text output shows plugin count when plugins are configured
    given:
      - "specd.yaml declares schemaPlugins: ['@specd/plugin-rfc']"
    when:
      - specd schema show is run
    then:
      - 'stdout contains plugins: 1 applied'
  - requirement: Output format
    name: Optional and required artifacts distinguished
    given:
      - 'the schema declares artifact proposal as optional: true and spec as optional: false'
    when:
      - specd schema show is run
    then:
      - proposal is shown as optional and spec as required
  - requirement: Output format
    name: Requires listed for artifacts
    given:
      - 'the schema declares artifact spec with requires: ["proposal"]'
    when:
      - specd schema show is run
    then:
      - the spec line shows requires=[proposal]
  - requirement: Output format
    name: Empty requires omitted in text mode
    given:
      - the schema declares artifact proposal with no requires
    when:
      - specd schema show is run
    then:
      - the proposal line does not show a requires field
  - requirement: Output format
    name: JSON output structure
    when:
      - specd schema show --format json is run
    then:
      - stdout is valid JSON with schema, plugins, artifacts, and workflow
      - AND schema has name, version, kind, and optionally extends
      - AND each artifact entry has id, scope, optional, requires, format, and delta
      - AND each workflow entry has step and requires
      - AND the process exits with code 0
  - requirement: Error cases
    name: Schema cannot be resolved
    given:
      - specd.yaml references a schema that does not exist
    when:
      - specd schema show is run
    then:
      - the command exits with code 3
      - 'AND stderr contains a fatal: message'
