title: Spec Metadata
description: When debugging context issues or verifying metadata freshness, users need to inspect what is actually recorded in a spec's metadata file. The `specd spec metadata <workspace:capability-path>` command displays the parsed contents of a spec's `.specd-metadata.yaml` in a structured form, including freshness status for each recorded content hash.
dependsOn:
  - cli:cli/entrypoint
  - core:core/spec-metadata
  - core:core/spec-id-format
context:
  - When debugging context issues or verifying metadata freshness, users need to inspect what is actually recorded in a spec's metadata file. The `specd spec metadata <workspace:capability-path>` command displays the parsed contents of a spec's `.specd-metadata.yaml` in a structured form, including freshness status for each recorded content hash.
rules:
  - requirement: Command signature
    rules:
      - |-
        ```
        specd spec metadata <workspace:capability-path> [--format text|json|toon]
        ```

        * `<workspace:capability-path>` — required positional; the fully-qualified spec ID (e.g. `default:auth/login`)
        * `--format text|json|toon` — optional; output format, defaults to `text`
  - requirement: Behaviour
    rules:
      - |-
        The command reads `.specd-metadata.yaml` for the given spec and renders its contents in a structured form. For each file listed in `contentHashes`, it computes the current SHA-256 hash of the file on disk and compares it against the recorded hash, reporting whether the metadata is fresh or stale per file.

        If `.specd-metadata.yaml` does not exist, the command exits with code 1.
  - requirement: Output format
    rules:
      - |-
        In `text` mode (default):

        ```
        spec: <workspace>:<capability-path>

        title:       <title>
        description: <description>
        generatedBy: <core|agent>

        content hashes:
          <filename>  <fresh|STALE>

        dependsOn:
          <specId>
          ...

        rules:      <N>
        constraints: <N>
        scenarios:  <N>
        ```

        Sections with no content are omitted. `rules`, `constraints`, and `scenarios` show counts only in text mode. `generatedBy` shows which mechanism produced the metadata (`core` for deterministic extraction, `agent` for LLM-generated).

        In `json` or `toon` mode, the full parsed metadata is output including all rules, constraints, and scenarios (encoded in the respective format):

        ```json
        {
          "spec": "workspace:cap/path",
          "fresh": true,
          "title": "...",
          "description": "...",
          "generatedBy": "core",
          "contentHashes": [
            {"filename": "...", "recorded": "sha256:...", "current": "sha256:...", "fresh": true}
          ],
          "dependsOn": [...],
          "rules": [...],
          "constraints": [...],
          "scenarios": [...]
        }
        ```

        `fresh` at the top level is `true` only when all `contentHashes` entries are fresh.
  - requirement: Error cases
    rules:
      - |-
        * If the workspace is not configured, exits with code 1.
        * If `.specd-metadata.yaml` does not exist, exits with code 1 and prints an `error:` message to stderr.
constraints:
  - This command is read-only — it never writes or updates metadata
  - Metadata regeneration is handled by specd spec generate-metadata or by a skill
scenarios:
  - requirement: Command signature
    name: Missing path argument
    when:
      - specd spec metadata is run without a path
    then:
      - the command exits with code 1 and prints a usage error to stderr
  - requirement: Behaviour
    name: Fresh hash shown as fresh
    given:
      - default:auth/login has .specd-metadata.yaml with a contentHashes entry for spec.md matching the current file on disk
    when:
      - specd spec metadata default:auth/login is run
    then:
      - the spec.md line shows fresh
  - requirement: Behaviour
    name: Stale hash shown as STALE
    given:
      - default:auth/login has .specd-metadata.yaml with a contentHashes entry for spec.md that does not match the current file
    when:
      - specd spec metadata default:auth/login is run
    then:
      - the spec.md line shows STALE
  - requirement: Behaviour
    name: Sections with no content omitted in text mode
    given:
      - .specd-metadata.yaml has no dependsOn entries
    when:
      - specd spec metadata default:auth/login is run
    then:
      - 'the dependsOn: section is not printed'
  - requirement: Output format
    name: Text output shows counts for rules, constraints, scenarios
    given:
      - .specd-metadata.yaml has 3 rules, 2 constraints, and 5 scenarios
    when:
      - specd spec metadata default:auth/login is run
    then:
      - 'stdout shows rules: 3, constraints: 2, and scenarios: 5'
  - requirement: Output format
    name: JSON output includes full rules, constraints, scenarios
    given:
      - .specd-metadata.yaml has rules, constraints, and scenarios
    when:
      - specd spec metadata default:auth/login --format json is run
    then:
      - stdout is valid JSON with rules, constraints, and scenarios as full arrays, not counts
      - AND fresh at the top level is true when all hashes match
      - AND the process exits with code 0
  - requirement: Output format
    name: JSON fresh field reflects all hashes
    given:
      - one of the contentHashes entries is stale
    when:
      - specd spec metadata default:auth/login --format json is run
    then:
      - fresh at the top level is false
  - requirement: Error cases
    name: Metadata file absent
    given:
      - default:auth/login exists but has no .specd-metadata.yaml
    when:
      - specd spec metadata default:auth/login is run
    then:
      - the command exits with code 1
      - 'AND stderr contains an error: message'
  - requirement: Error cases
    name: Unknown workspace
    when:
      - specd spec metadata unknown-ws:auth/login is run
    then:
      - the command exits with code 1
      - 'AND stderr contains an error: message'
contentHashes:
  spec.md: sha256:facb5c95d9cf11c77ae12f2c2e5c2b25568a9391323a6bba38041e4b11e1ce4d
  verify.md: sha256:09e83a3b69ac6f6d3ff36bc9c24d23ea9b3baf3bc8a24748e3a29ec5e403ad73
generatedBy: core
