title: Graph Impact
description: Before modifying code, developers and agents need to understand the blast radius — which other files and symbols depend on the change. The `specd graph impact` command runs impact analysis on a file, symbol, or set of changed files, reporting risk level, dependency counts, and affected files.
dependsOn:
  - cli:cli/entrypoint
  - code-graph:code-graph/composition
context:
  - Before modifying code, developers and agents need to understand the blast radius — which other files and symbols depend on the change. The `specd graph impact` command runs impact analysis on a file, symbol, or set of changed files, reporting risk level, dependency counts, and affected files.
rules:
  - requirement: Command signature
    rules:
      - |-
        ```text
        specd graph impact [--file <path>] [--symbol <name>] [--changes <files...>] [--direction upstream|downstream|both] [--path <path>] [--format text|json|toon]
        ```

        Exactly one of `--file`, `--symbol`, or `--changes` must be provided.

        - `--file` — analyze impact of a single file
        - `--symbol` — analyze impact of a symbol by name. If multiple symbols match, all are analyzed and results listed
        - `--changes` — detect impact of changes to multiple files (variadic; accepts multiple space-separated paths)
        - `--direction` — optional; analysis direction, defaults to `upstream`. Values:
          - `upstream` — find symbols and files that depend on the target
          - `downstream` — find symbols and files that the target depends on
          - `both` — combined upstream and downstream analysis
        - `--path` — optional; workspace root, defaults to the current working directory
        - `--format text|json|toon` — optional; output format, defaults to `text`
  - requirement: File impact analysis
    rules:
      - |-
        When `--file` is provided:

        1. Creates a `CodeGraphProvider` with the resolved path
        2. Opens the provider
        3. Calls `analyzeFileImpact(file, direction)` to compute the impact
        4. Outputs the `FileImpactResult` including per-symbol breakdown
        5. Closes the provider and exits
  - requirement: Symbol impact analysis
    rules:
      - |-
        When `--symbol` is provided:

        1. Searches for symbols matching the name via `findSymbols({ name })`
        2. If no symbol is found, outputs `No symbol found matching "<name>".`
        3. If one symbol is found, calls `analyzeImpact(symbolId, direction)` and outputs the result
        4. If multiple symbols match, analyzes each one and outputs all results
  - requirement: Change detection
    rules:
      - |-
        When `--changes` is provided:

        1. Calls `detectChanges(files)` with the list of file paths
        2. Outputs the summary and affected files
  - requirement: Output format
    rules:
      - |-
        **File impact** in `text` mode:

        ```text
        Impact analysis for src/auth.ts
          Risk level:       HIGH
          Direct deps:      6
          Indirect deps:    3
          Transitive deps:  1
          Affected files:   8

        Affected files:
          src/login.ts: handleLogin:12, validateSession:45
          src/session.ts: createSession:8

        Per-symbol breakdown:
          src/auth.ts:function:validate:10:0  risk=HIGH direct=4
          src/auth.ts:class:AuthService:20:0  risk=MEDIUM direct=2
        ```

        When affected symbols are available, each file line shows the symbols grouped after a colon: `path: name:line, name:line`. Files reached only via IMPORTS (file-level) are listed without symbols.

        **Symbol impact** in `text` mode:

        ```text
        Impact analysis for function createKernel (packages/core/src/composition/kernel.ts:147)
          Risk level:       CRITICAL
          Direct deps:      1
          Indirect deps:    1
          Transitive deps:  38
          Affected files:   40

        Affected files:
          packages/cli/src/kernel.ts: wireKernel:5
          ...
        ```

        When multiple symbols match, each analysis is listed sequentially.

        **Change detection** in `text` mode outputs the summary string from `ChangeDetectionResult.summary` followed by the affected files list.

        In `json` or `toon` mode, the full result object is output as-is.
  - requirement: Error cases
    rules:
      - |-
        Exactly one of `--file`, `--symbol`, or `--changes` must be provided. If none or more than one is given, the command exits with code 1 and prints `error: provide exactly one of --file, --symbol, or --changes`.

        If the provider cannot be opened, the command exits with code 3.
constraints:
  - The CLI does not contain impact analysis logic — it delegates entirely to @specd/code-graph
  - process.exit(0) is called explicitly after closing the provider
  - All file paths are workspace-relative, not absolute
  - --direction only applies to --file and --symbol, not to --changes
scenarios:
  - requirement: File impact analysis
    name: Upstream file analysis with defaults
    given:
      - src/auth.ts is indexed in the graph with upstream dependents
    when:
      - specd graph impact --file src/auth.ts is run
    then:
      - stdout shows Impact analysis for src/auth.ts with risk level, dependency counts, affected files with their affected symbols, and per-symbol breakdown
      - AND the analysis direction is upstream
      - AND the process exits with code 0
  - requirement: File impact analysis
    name: Downstream file analysis
    given:
      - src/utils.ts is indexed with downstream dependencies
    when:
      - specd graph impact --file src/utils.ts --direction downstream is run
    then:
      - the analysis shows files and symbols that src/utils.ts depends on
  - requirement: File impact analysis
    name: Both directions
    given:
      - src/auth.ts is indexed in the graph
    when:
      - specd graph impact --file src/auth.ts --direction both is run
    then:
      - the analysis includes both upstream dependents and downstream dependencies
  - requirement: Symbol impact analysis
    name: Single symbol match
    given:
      - createKernel exists once in the graph
    when:
      - specd graph impact --symbol createKernel is run
    then:
      - stdout shows Impact analysis for function createKernel (...) with risk level and affected files
  - requirement: Symbol impact analysis
    name: Multiple symbol matches
    given:
      - validate exists in 3 different files
    when:
      - specd graph impact --symbol validate is run
    then:
      - 'stdout shows 3 symbols match "validate": followed by separate impact reports for each'
  - requirement: Symbol impact analysis
    name: Symbol not found
    given:
      - nonExistentSymbol does not exist in the graph
    when:
      - specd graph impact --symbol nonExistentSymbol is run
    then:
      - stdout shows No symbol found matching "nonExistentSymbol".
      - AND the process exits with code 0
  - requirement: Change detection
    name: Changes across multiple files
    given:
      - src/auth.ts and src/user.ts are indexed with dependents
    when:
      - specd graph impact --changes src/auth.ts src/user.ts is run
    then:
      - stdout shows the summary with changed symbol count, affected count, and risk level
      - AND the affected files list is shown
  - requirement: Change detection
    name: Changes with no dependents
    given:
      - src/isolated.ts has no dependents
    when:
      - specd graph impact --changes src/isolated.ts is run
    then:
      - 'stdout shows the summary with Risk: LOW'
  - requirement: Output format
    name: Text output shows risk level and counts
    given:
      - src/auth.ts has risk level HIGH with 6 direct, 3 indirect, and 1 transitive dependencies
    when:
      - specd graph impact --file src/auth.ts is run
    then:
      - 'stdout contains Risk level:       HIGH'
      - 'AND stdout contains Direct deps:      6'
  - requirement: Output format
    name: JSON output for file impact
    when:
      - specd graph impact --file src/auth.ts --format json is run
    then:
      - stdout is valid JSON containing target, riskLevel, directDependents, affectedFiles, affectedSymbols, and symbols
  - requirement: Output format
    name: JSON output for symbol impact
    when:
      - specd graph impact --symbol createKernel --format json is run
    then:
      - stdout is valid JSON containing symbol and impact objects
  - requirement: Output format
    name: JSON output for change detection
    when:
      - specd graph impact --changes src/auth.ts --format json is run
    then:
      - stdout is valid JSON containing changedFiles, changedSymbols, affectedSymbols, riskLevel, and summary
  - requirement: Error cases
    name: No selector or multiple selectors provided
    when:
      - specd graph impact is run without any of --file, --symbol, or --changes
    then:
      - 'stderr contains error: provide exactly one of --file, --symbol, or --changes'
      - AND the process exits with code 1
  - requirement: Error cases
    name: Infrastructure error exits with code 3
    given:
      - the provider cannot be opened
    when:
      - specd graph impact --file src/auth.ts is run
    then:
      - 'stderr contains a fatal: prefixed error message'
      - AND the process exits with code 3
  - requirement: Error cases
    name: Process exits explicitly
    given:
      - impact analysis completes successfully
    when:
      - the provider is closed
    then:
      - process.exit(0) is called to prevent the LadybugDB addon from keeping the process alive
