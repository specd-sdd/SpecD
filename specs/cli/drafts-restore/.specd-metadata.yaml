title: 'Drafts Restore'
description: >
  Defines the `specd drafts restore <name>` command, which recovers a drafted change from `drafts/` back to `changes/`. This command replaces the former `specd change restore` command.
keywords:
  - 'drafts'
  - 'restore'
  - 'command'
  - 'signature'
  - 'behaviour'
  - 'output'
  - 'success'
  - 'text'
  - 'json'
  - 'toon'
  - 'error'
  - 'cases'
dependsOn:
  - 'cli:cli/entrypoint'
  - 'core:core/change'
contentHashes:
  'spec.md': 'sha256:6eb82860de3736b4fe99b052b0084245c854b973df18a32233da771bbc33c7d1'
  'verify.md': 'sha256:751f0f7c738c7be8c5ac7f9c27e5b0b89e34075a20db6cf737ffc954d2b3b1cb'
rules:
  - requirement: 'Command signature'
    rules:
      - '`<name>` — required positional; the name of the drafted change to restore'
      - '`--format` — controls output encoding; defaults to `text`'
  - requirement: 'Behaviour'
    rules:
      - 'The command moves the change from `drafts/` to `changes/` and appends a `restored` event to history. The lifecycle state is preserved exactly as it was when the change was drafted.'
  - requirement: 'Output on success — text'
    rules:
      - 'On success, the command prints a single line to stdout:'
  - requirement: 'Output on success — JSON and toon'
    rules:
      - 'When `--format json` is passed, the command writes a JSON object to stdout on success:'
      - 'When `--format toon` is passed, the same data model is written in Token-Oriented Object Notation (toon).'
  - requirement: 'Error cases'
    rules:
      - 'If no change with the given name exists (in any location), the command exits with code 1 and prints an `error:` message to stderr.'
      - 'If the change exists but is not currently in `drafts/` (i.e. it is active or discarded), the command exits with code 1 and prints an `error:` message to stderr.'
constraints:
  - 'Restoring does not affect lifecycle state'
  - 'A change may be drafted and restored multiple times; each cycle appends events to history'
  - 'Errors always go to stderr as plain text regardless of `--format`'
  - '`--format` only affects stdout'
scenarios:
  - requirement: 'Command signature'
    name: 'Missing name argument'
    when:
      - '`specd drafts restore` is run without a name'
    then:
      - 'the command exits with code 1 and prints a usage error to stderr'
  - requirement: 'Behaviour'
    name: 'Change moved back to active'
    given:
      - 'a drafted change `old-experiment` in `drafts/` with lifecycle state `designing`'
    when:
      - '`specd drafts restore old-experiment` is run'
    then:
      - 'the change is moved to `changes/`'
      - 'a `restored` event is appended to history'
      - 'the lifecycle state remains `designing`'
  - requirement: 'Output on success — text'
    name: 'Success message — text'
    given:
      - 'a drafted change `old-experiment` in `drafts/`'
    when:
      - '`specd drafts restore old-experiment` succeeds'
    then:
      - 'stdout contains `restored change old-experiment`'
      - 'the process exits with code 0'
  - requirement: 'Output on success — JSON and toon'
    name: 'Success message — JSON'
    given:
      - 'a drafted change `old-experiment` in `drafts/`'
    when:
      - '`specd drafts restore old-experiment --format json` succeeds'
    then:
      - 'stdout is a JSON object with `result` set to `"ok"` and `name` set to `"old-experiment"`'
      - 'the process exits with code 0'
  - requirement: 'Error cases'
    name: 'Change not found'
    when:
      - '`specd drafts restore nonexistent` is run and no change named `nonexistent` exists anywhere'
    then:
      - 'the command exits with code 1'
      - 'stderr contains an `error:` message'
  - requirement: 'Error cases'
    name: 'Change not in drafts'
    given:
      - '`my-change` is active in `changes/` (not drafted)'
    when:
      - '`specd drafts restore my-change` is run'
    then:
      - 'the command exits with code 1'
      - 'stderr contains an `error:` message'
