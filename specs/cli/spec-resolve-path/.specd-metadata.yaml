title: 'Spec Resolve Path'
description: >
  Defines the `specd spec resolve-path <path>` command, which resolves a filesystem path to a logical spec identifier. This enables tools (e.g. the spec metadata skill) to convert filesystem-relative dependency paths extracted from `spec.md` into the `workspace:prefixed/capability/path` identifiers used in `.specd-metadata.yaml` `dependsOn` fields.
keywords:
  - 'resolve'
  - 'path'
  - 'command'
  - 'signature'
  - 'resolution'
  - 'output'
  - 'format'
  - 'error'
  - 'cases'
  - 'resolver'
  - 'pure'
  - 'function'
dependsOn:
  - 'cli:cli/entrypoint'
  - 'core:core/config'
  - 'core:core/spec-id-format'
contentHashes:
  'spec.md': 'sha256:035166d50bee35ab90da916934eb20a2b3cab4dad953c4f299e5829013f1aa3a'
  'verify.md': 'sha256:7a8aa76a30716adb13e7f1fec9197f9b65357bea00f7a71a0ef05b5750c51294'
rules:
  - requirement: 'Command signature'
    rules:
      - '`<path>` — required positional; filesystem path (absolute or relative to cwd) pointing to a spec directory or a file within one (e.g. `specs/core/change/spec.md` or `specs/core/change`)'
      - '`--format` — optional; output format, defaults to `text`'
      - '`--config` — optional; path to `specd.yaml`'
  - requirement: 'Path resolution'
    rules:
      - "1. Resolve `<path>` to an absolute path (relative to `process.cwd()`) 2. If the path points to a file, use its parent directory 3. For each workspace in config, check if the resolved directory falls under `workspace.specsPath` 4. If multiple workspaces match, use the most specific (longest `specsPath` prefix) 5. Compute the relative path from `specsPath`, prepend the workspace's `prefix` (if set) 6. Output `workspace:prefixed/capability/path`"
  - requirement: 'Output format'
    rules:
      - 'In `text` mode (default), the command prints the spec identifier to stdout:'
      - 'For example: `core:core/change`.'
      - 'In `json` or `toon` mode, the output is an object:'
  - requirement: 'Error cases'
    rules:
      - "Path does not fall under any configured workspace's `specsPath` — exit 1, error message to stderr"
      - 'Resolved path does not exist on disk — exit 1, error message to stderr'
constraints:
  - 'The resolver is a pure function — no I/O, just path math against config'
  - 'When a path matches multiple workspaces, the most specific (longest `specsPath` prefix) wins'
  - 'File paths are resolved to their parent directory before matching'
scenarios:
  - requirement: 'Command signature'
    name: 'Missing path argument'
    when:
      - '`specd spec resolve-path` is run without a path'
    then:
      - 'the command exits with code 1 and prints a usage error to stderr'
  - requirement: 'Path resolution'
    name: 'Relative path resolved from cwd'
    given:
      - 'cwd is `/project` and workspace `core` has `specsPath: /project/specs/core` with `prefix: core`'
    when:
      - '`specd spec resolve-path specs/core/change` is run'
    then:
      - 'stdout prints `core:core/change`'
  - requirement: 'Path resolution'
    name: 'Absolute path resolved directly'
    given:
      - 'workspace `core` has `specsPath: /project/specs/core` with `prefix: core`'
    when:
      - '`specd spec resolve-path /project/specs/core/change` is run'
    then:
      - 'stdout prints `core:core/change`'
  - requirement: 'Path resolution'
    name: 'File path uses parent directory'
    given:
      - 'workspace `default` has `specsPath: /project/specs` with no prefix'
    when:
      - '`specd spec resolve-path /project/specs/auth/login/spec.md` is run'
    then:
      - 'stdout prints `default:auth/login`'
  - requirement: 'Path resolution'
    name: 'Workspace without prefix produces bare path'
    given:
      - 'workspace `default` has `specsPath: /project/specs` with no prefix'
    when:
      - '`specd spec resolve-path /project/specs/auth/login` is run'
    then:
      - 'stdout prints `default:auth/login`'
  - requirement: 'Path resolution'
    name: 'Multiple workspaces picks most specific'
    given:
      - 'workspace `default` has `specsPath: /project/specs` and workspace `core` has `specsPath: /project/specs/core` with `prefix: core`'
    when:
      - '`specd spec resolve-path /project/specs/core/change` is run'
    then:
      - 'stdout prints `core:core/change`'
      - 'the `default` workspace is not used despite also matching'
  - requirement: 'Output format'
    name: 'Text output'
    given:
      - 'workspace `core` has `specsPath: /project/specs/core` with `prefix: core`'
    when:
      - '`specd spec resolve-path /project/specs/core/change` is run'
    then:
      - 'stdout prints exactly `core:core/change` followed by a newline'
  - requirement: 'Output format'
    name: 'JSON output structure'
    given:
      - 'workspace `core` has `specsPath: /project/specs/core` with `prefix: core`'
    when:
      - '`specd spec resolve-path /project/specs/core/change --format json` is run'
    then:
      - 'stdout is a valid JSON object with `workspace` equal to `"core"`, `specPath` equal to `"core/change"`, and `specId` equal to `"core:core/change"`'
  - requirement: 'Error cases'
    name: 'Path does not exist on disk'
    when:
      - '`specd spec resolve-path /nonexistent/path` is run'
    then:
      - 'the command exits with code 1'
      - 'stderr contains an `error:` message indicating the path does not exist'
  - requirement: 'Error cases'
    name: 'Path not under any workspace'
    given:
      - 'workspace `default` has `specsPath: /project/specs`'
    when:
      - '`specd spec resolve-path /other/unrelated/path` is run and the path exists on disk'
    then:
      - 'the command exits with code 1'
      - 'stderr contains an `error:` message indicating the path does not fall under any configured workspace'
