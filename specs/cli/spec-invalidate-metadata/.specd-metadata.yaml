title: 'Spec Invalidate-Metadata'
description: >
  Defines the `specd spec invalidate-metadata` CLI command, which marks a spec's
  `.specd-metadata.yaml` as stale by removing its contentHashes field. Use this spec
  when implementing or modifying the invalidate-metadata subcommand on the spec parent
  command.
keywords:
  - 'invalidate-metadata'
  - 'spec-command'
  - 'metadata-staleness'
  - 'content-hashes'
  - 'cli-adapter'
  - 'specd-metadata-yaml'
dependsOn:
  - 'default:_global/architecture'
  - 'default:_global/conventions'
  - 'core:core/invalidate-spec-metadata'
contentHashes:
  'spec.md': 'sha256:abc43623bcd1a7b3fc04e5019be5107a1a8567143e73154ba236be28e290d616'
  'verify.md': 'sha256:248116cecf1775bc19c1e9638c5d9e7c60850db773c30134154b52b23e314f85'
rules:
  - requirement: 'Command signature'
    rules:
      - 'The command is registered as invalidate-metadata <specPath> on the spec parent command.'
      - 'The command accepts --format <fmt> with allowed values text, json, and toon, defaulting to text.'
      - 'The command accepts --config <path> to specify the path to specd.yaml.'
      - 'The <specPath> argument uses the workspace:capability-path syntax.'
  - requirement: 'Text output'
    rules:
      - 'On success with text format, the command outputs: invalidated .specd-metadata.yaml for <workspace:path>.'
  - requirement: 'JSON output'
    rules:
      - 'On success with JSON format, the command outputs { "result": "ok", "spec": "<workspace:path>" }.'
  - requirement: 'Error — spec not found or no metadata'
    rules:
      - 'If the spec does not exist or has no .specd-metadata.yaml, the command writes error: spec <specPath> not found or has no metadata to stderr and exits with code 1.'
constraints:
  - 'The command contains no business logic — all work is delegated to the InvalidateSpecMetadata use case.'
  - 'The command never reads or writes the filesystem directly for spec content — it uses the kernel.'
scenarios:
  - requirement: 'Text output'
    name: 'Successful invalidation in text format'
    when:
      - 'The invalidation succeeds and format is text.'
    then:
      - 'The command outputs invalidated .specd-metadata.yaml for default:auth/login.'
  - requirement: 'JSON output'
    name: 'Successful invalidation in JSON format'
    when:
      - 'The invalidation succeeds and format is json.'
    then:
      - 'The command outputs { "result": "ok", "spec": "default:auth/login" }.'
  - requirement: 'Error — spec not found or no metadata'
    name: 'Unknown spec exits 1'
    when:
      - 'The spec does not exist in the workspace.'
    then:
      - 'The command writes error: spec <specPath> not found or has no metadata to stderr and exits with code 1.'
  - requirement: 'Error — spec not found or no metadata'
    name: 'No metadata file exits 1'
    given:
      - 'A spec that exists but has no .specd-metadata.yaml.'
    when:
      - 'specd spec invalidate-metadata auth/login is invoked.'
    then:
      - 'The command writes error: spec auth/login not found or has no metadata to stderr and exits with code 1.'
