title: 'Spec Validate'
description: >
  Defines the CLI command for validating spec artifacts against the active schema's
  structural rules. It covers scope selection (single spec, workspace, or all), output
  formatting (text and JSON), and error handling for missing specs or workspaces. Read
  this spec when implementing or modifying the spec validate command.
keywords:
  - 'spec-validate'
  - 'artifact-validation'
  - 'structural-rules'
  - 'cli-command'
  - 'schema-validation'
  - 'spec-scope'
  - 'validation-output'
dependsOn:
  - 'default:_global/architecture'
  - 'default:_global/conventions'
contentHashes:
  'spec.md': 'sha256:6ee3ea9d90089ab151a49548b7cdd52377acd31ef4f8c667d030e3a42b765a38'
  'verify.md': 'sha256:da52f6c42b913130352afd7082e766d4de70dc99ad0eb094da5459ef45e89989'
rules:
  - requirement: 'Command signature'
    rules:
      - 'The command signature is specd spec validate [specPath] [--all] [--workspace <name>] [--format text|json|toon] [--config <path>].'
      - 'Exactly one scope must be provided: specPath for a single spec, --all for all specs across all workspaces, or --workspace <name> for all specs in a workspace.'
  - requirement: 'Scope resolution'
    rules:
      - 'Only scope: spec artifacts from the active schema are validated.'
      - 'Change-scoped artifacts are ignored.'
  - requirement: 'Artifact filename derivation'
    rules:
      - 'The filename to load from the spec directory is derived from artifactType.output() by extracting the basename.'
  - requirement: 'Missing artifact handling'
    rules:
      - 'If a required (optional: false) artifact file is absent from the spec directory, it counts as a validation failure.'
  - requirement: 'Structural validation'
    rules:
      - 'If an artifact type defines validations, the file content is parsed with the appropriate format parser and the validation rules are evaluated against the AST.'
  - requirement: 'Text output — single spec'
    rules:
      - 'On pass, output validated <workspace:path>: all artifacts pass.'
      - 'On fail, output validation failed <workspace:path>: followed by indented error lines.'
  - requirement: 'Text output — multiple specs'
    rules:
      - 'Output a summary line: validated N specs: X passed, Y failed.'
      - 'Each failed spec is listed with indented errors.'
  - requirement: 'JSON output'
    rules:
      - 'Returns the full ValidateSpecsResult object.'
  - requirement: 'Exit code'
    rules:
      - 'Exit 0 when all specs pass.'
      - 'Exit 1 when any spec has failures or when the spec or workspace is not found.'
  - requirement: 'Error — spec not found'
    rules:
      - 'If a single specPath does not exist, write error to stderr and exit 1.'
  - requirement: 'Error — workspace not found'
    rules:
      - 'If --workspace <name> references an unknown workspace, write error to stderr and exit 1.'
constraints:
  - 'The command contains no validation logic — all rules are evaluated by the ValidateSpecs use case.'
  - 'Only scope: spec artifacts are checked.'
scenarios:
  - requirement: 'Command signature'
    name: 'No scope argument provided'
    when:
      - 'The user runs specd spec validate without any scope argument'
    then:
      - 'stderr contains an error message about specifying a scope'
      - 'Exit code is 1'
  - requirement: 'Command signature'
    name: '--workspace filters to one workspace'
    when:
      - 'The user runs specd spec validate --workspace billing'
    then:
      - 'Only specs in the billing workspace are validated'
      - 'Output follows the multi-spec format'
  - requirement: 'Text output — single spec'
    name: 'Single spec passes validation'
    when:
      - 'The user runs specd spec validate default:auth/login'
      - 'All required spec-scoped artifacts exist and pass structural rules'
    then:
      - 'stdout contains validated default:auth/login: all artifacts pass'
      - 'Exit code is 0'
  - requirement: 'Text output — single spec'
    name: 'Single spec fails validation'
    when:
      - 'The user runs specd spec validate default:auth/login'
      - 'A required artifact is missing or a structural rule fails'
    then:
      - 'stdout contains validation failed default:auth/login:'
      - 'Indented error lines follow'
      - 'Exit code is 1'
  - requirement: 'Text output — multiple specs'
    name: '--all with all specs passing'
    when:
      - 'The user runs specd spec validate --all'
      - 'Every spec across all workspaces passes'
    then:
      - 'stdout contains validated N specs: N passed, 0 failed'
      - 'Exit code is 0'
  - requirement: 'Text output — multiple specs'
    name: '--all with some specs failing'
    when:
      - 'The user runs specd spec validate --all'
      - 'At least one spec has a validation failure'
    then:
      - 'stdout contains validated N specs: X passed, Y failed'
      - 'Each failing spec is listed with a FAIL prefix and indented errors'
      - 'Exit code is 1'
  - requirement: 'JSON output'
    name: 'JSON output contains expected keys'
    when:
      - 'The user runs specd spec validate --all --format json'
    then:
      - 'The JSON output contains entries, totalSpecs, passed, and failed keys'
  - requirement: 'Error — spec not found'
    name: 'Unknown spec ID'
    when:
      - 'The user runs specd spec validate default:nonexistent'
      - 'The spec does not exist'
    then:
      - 'stderr contains error: spec not found'
      - 'Exit code is 1'
  - requirement: 'Error — workspace not found'
    name: 'Unknown workspace'
    when:
      - 'The user runs specd spec validate --workspace nonexistent'
      - 'The workspace does not exist in config'
    then:
      - 'stderr contains error: unknown workspace'
      - 'Exit code is 1'
