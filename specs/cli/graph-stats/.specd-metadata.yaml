title: Graph Stats
description: Without a quick overview of the code graph's contents, users and agents cannot tell whether the graph is populated, how large it is, or when it was last updated. The `specd graph stats` command displays summary statistics from the code graph so users can assess coverage and freshness at a glance.
dependsOn:
  - cli:cli/entrypoint
  - code-graph:code-graph/composition
context:
  - Without a quick overview of the code graph's contents, users and agents cannot tell whether the graph is populated, how large it is, or when it was last updated. The `specd graph stats` command displays summary statistics from the code graph so users can assess coverage and freshness at a glance.
rules:
  - requirement: Command signature
    rules:
      - |-
        ```
        specd graph stats [--path <path>] [--format text|json|toon]
        ```

        - `--path` — optional; workspace root, defaults to the current working directory
        - `--format text|json|toon` — optional; output format, defaults to `text`
  - requirement: Statistics retrieval
    rules:
      - |-
        The command:

        1. Creates a `CodeGraphProvider` with the resolved path
        2. Opens the provider
        3. Calls `getStatistics()` to retrieve the `GraphStatistics` object
        4. Outputs the statistics
        5. Closes the provider
        6. Exits with `process.exit(0)` — required because the LadybugDB native addon keeps the Node process alive
  - requirement: Output format
    rules:
      - |-
        In `text` mode (default), the output is a labelled summary:

        ```
        Files:     459
        Symbols:   1497
        Specs:     122
        Languages: javascript, typescript
        Relations:
          IMPORTS: 1227
          DEFINES: 1497
        Last indexed: 2026-03-14T10:38:30.178Z
        ```

        - `Files`, `Symbols`, `Specs` show `fileCount`, `symbolCount`, `specCount`
        - `Languages` shows the `languages` array joined by `, `
        - `Relations` shows only non-zero relation counts from `relationCounts`, each on its own indented line
        - `Last indexed` shows `lastIndexedAt` as an ISO 8601 timestamp

        In `json` or `toon` mode, the full `GraphStatistics` object is output as-is.
  - requirement: Error cases
    rules:
      - If the provider cannot be opened or statistics retrieval fails due to an infrastructure error, the command exits with code 3.
constraints:
  - The CLI does not compute statistics — it delegates entirely to @specd/code-graph
  - process.exit(0) is called explicitly after closing the provider
  - Zero-value relation counts are omitted from text output for readability
scenarios:
  - requirement: Statistics retrieval
    name: Successful statistics display
    given:
      - the workspace has been indexed with 459 files, 1497 symbols, and 122 specs
    when:
      - specd graph stats is run
    then:
      - 'stdout shows Files:     459, Symbols:   1497, and Specs:     122'
      - AND the process exits with code 0
  - requirement: Statistics retrieval
    name: Custom path
    given:
      - /tmp/my-project has been indexed
    when:
      - specd graph stats --path /tmp/my-project is run
    then:
      - the statistics reflect the graph at /tmp/my-project
  - requirement: Statistics retrieval
    name: Process exits explicitly
    given:
      - statistics retrieval completes successfully
    when:
      - the provider is closed
    then:
      - process.exit(0) is called to prevent the LadybugDB addon from keeping the process alive
  - requirement: Output format
    name: Text output shows languages
    given:
      - the graph contains files in javascript and typescript
    when:
      - specd graph stats is run
    then:
      - 'stdout contains Languages: javascript, typescript'
  - requirement: Output format
    name: Text output omits zero relation counts
    given:
      - 'the graph has IMPORTS: 1227, DEFINES: 1497, and CALLS: 0'
    when:
      - specd graph stats is run
    then:
      - 'stdout shows IMPORTS: 1227 and DEFINES: 1497 under Relations:'
      - AND CALLS is not shown
  - requirement: Output format
    name: Text output shows last indexed timestamp
    given:
      - the graph was last indexed at 2026-03-14T10:38:30.178Z
    when:
      - specd graph stats is run
    then:
      - 'stdout contains Last indexed: 2026-03-14T10:38:30.178Z'
  - requirement: Output format
    name: JSON output
    given:
      - the graph has been indexed
    when:
      - specd graph stats --format json is run
    then:
      - stdout is valid JSON containing fileCount, symbolCount, specCount, languages, relationCounts, and lastIndexedAt
  - requirement: Error cases
    name: Infrastructure error exits with code 3
    given:
      - the provider cannot be opened (e.g. database file is corrupted)
    when:
      - specd graph stats is run
    then:
      - 'stderr contains a fatal: prefixed error message'
      - AND the process exits with code 3
