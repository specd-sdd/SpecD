title: Spec Write-Metadata
description: Agents and scripts that produce metadata externally need a safe way to persist it without bypassing validation or conflict detection. The `specd spec write-metadata` command writes a `.specd-metadata.yaml` file for a given spec, accepting YAML content from stdin or a file and persisting it through the `SaveSpecMetadata` use case for conflict detection and atomic writes.
dependsOn:
  - default:_global/architecture
  - default:_global/conventions
  - core:core/spec-metadata
context:
  - Agents and scripts that produce metadata externally need a safe way to persist it without bypassing validation or conflict detection. The `specd spec write-metadata` command writes a `.specd-metadata.yaml` file for a given spec, accepting YAML content from stdin or a file and persisting it through the `SaveSpecMetadata` use case for conflict detection and atomic writes.
rules:
  - requirement: Command signature
    rules:
      - |-
        The command is registered as `write-metadata <specPath>` on the `spec` parent command. It accepts:

        * `--input <file>` — read YAML content from a file path instead of stdin
        * `--force` — skip conflict detection and overwrite unconditionally
        * `--format <fmt>` — output format: `text|json|toon` (default `text`)
        * `--config <path>` — path to `specd.yaml`

        The `<specPath>` argument uses the same `workspace:capability-path` syntax as other `spec` subcommands.
  - requirement: Content source
    rules:
      - Without `--input`, the command reads all of stdin until EOF. With `--input <file>`, it reads the file at the given path. In both cases the result is a raw YAML string passed to the use case.
  - requirement: YAML validation
    rules:
      - Before calling the use case, the command parses the content with `yaml.parse()` to verify it is valid YAML. If parsing fails, the command writes an error to stderr and exits with code 1.
  - requirement: Text output
    rules:
      - 'On success, text format outputs: `wrote .specd-metadata.yaml for <workspace:path>`'
  - requirement: JSON output
    rules:
      - 'On success, JSON format outputs: `{ "result": "ok", "spec": "<workspace:path>" }`'
  - requirement: Error — spec not found
    rules:
      - "If the spec does not exist in the given workspace, the command writes `error: spec '<specPath>' not found` to stderr and exits with code 1."
  - requirement: Error — invalid YAML
    rules:
      - 'If the content is not valid YAML, the command writes `error: invalid YAML: <parse error message>` to stderr and exits with code 1.'
  - requirement: Error — invalid metadata structure
    rules:
      - 'If the use case throws a `MetadataValidationError` (content is valid YAML but fails structural validation), the error propagates through `handleError` which writes `error: <message>` to stderr and exits with code 1.'
  - requirement: Error — conflict detected
    rules:
      - If `--force` is not set and the repository detects a concurrent modification (hash mismatch), the command writes the conflict error to stderr and exits with code 1.
  - requirement: Error — dependsOn overwrite
    rules:
      - |-
        If `--force` is not set and the incoming metadata would change existing `dependsOn` entries, `SaveSpecMetadata` throws a `DependsOnOverwriteError`. The error propagates through `handleError` which writes `error: dependsOn would change (...)` to stderr and exits with code 1. Stdout remains empty on error.

        When `--force` is set, the overwrite check is skipped entirely.
constraints:
  - The command contains no business logic — all writing is delegated to the SaveSpecMetadata use case
  - YAML validation happens at the CLI boundary before the use case is invoked
  - The command never reads or writes the filesystem directly for spec content — it uses the kernel
scenarios:
  - requirement: Content source
    name: Reads YAML from stdin
    when:
      - specd spec write-metadata auth/login is invoked without --input
    then:
      - the command reads all of stdin until EOF and passes the content to the use case
  - requirement: Content source
    name: Reads YAML from file
    when:
      - specd spec write-metadata auth/login --input /tmp/metadata.yaml is invoked
    then:
      - the command reads /tmp/metadata.yaml and passes its content to the use case
  - requirement: YAML validation
    name: Rejects invalid YAML
    when:
      - the content is not valid YAML (e.g. {{{)
    then:
      - 'the command writes error: invalid YAML: ... to stderr and exits with code 1'
  - requirement: Text output
    name: Successful write in text format
    when:
      - the write succeeds and format is text
    then:
      - the command outputs wrote .specd-metadata.yaml for default:auth/login
  - requirement: JSON output
    name: Successful write in JSON format
    when:
      - the write succeeds and format is json
    then:
      - 'the command outputs { "result": "ok", "spec": "default:auth/login" }'
  - requirement: Error — invalid metadata structure
    name: Structurally invalid metadata exits 1
    given:
      - 'valid YAML content with keywords: [123] (invalid type)'
    when:
      - specd spec write-metadata auth/login --input /tmp/bad.yaml is invoked
    then:
      - 'the command writes error: Metadata validation failed: ... to stderr and exits with code 1'
  - requirement: Error — spec not found
    name: Unknown spec exits 1
    when:
      - the spec does not exist in the workspace
    then:
      - "the command writes error: spec '<specPath>' not found to stderr and exits with code 1"
  - requirement: Error — conflict detected
    name: Conflict without --force exits 1
    given:
      - the .specd-metadata.yaml file was modified since it was last read
    when:
      - specd spec write-metadata auth/login is invoked without --force
    then:
      - the command exits with code 1 and reports the conflict
  - requirement: Error — conflict detected
    name: Force flag bypasses conflict
    given:
      - the .specd-metadata.yaml file was modified since it was last read
    when:
      - specd spec write-metadata auth/login --force is invoked
    then:
      - the write succeeds and the conflict is ignored
  - requirement: Error — dependsOn overwrite
    name: dependsOn change without --force exits 1
    given:
      - 'existing metadata has dependsOn: [core:config, core:schema-format]'
      - 'AND incoming YAML has dependsOn: [core:change]'
    when:
      - specd spec write-metadata auth/login --input /tmp/metadata.yaml is invoked without --force
    then:
      - 'the command writes error: dependsOn would change to stderr'
      - AND exits with code 1
      - AND stdout is empty
  - requirement: Error — dependsOn overwrite
    name: --force bypasses dependsOn check
    given:
      - 'existing metadata has dependsOn: [core:config]'
      - 'AND incoming YAML has dependsOn: [core:change]'
    when:
      - specd spec write-metadata auth/login --input /tmp/metadata.yaml --force is invoked
    then:
      - the write succeeds
