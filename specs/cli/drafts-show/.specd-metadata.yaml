title: 'Drafts Show'
description: >
  Defines the `specd drafts show <name>` command, which displays basic metadata for a single drafted change.
keywords:
  - 'drafts'
  - 'show'
  - 'command'
  - 'signature'
  - 'output'
  - 'format'
  - 'text'
  - 'json'
  - 'toon'
  - 'error'
  - 'cases'
  - 'errors'
dependsOn:
  - 'cli:cli/entrypoint'
  - 'core:core/change'
contentHashes:
  'spec.md': 'sha256:e19d44267f1dba4fe8506b68dda113393559f877624624196b8ab55483a9c824'
  'verify.md': 'sha256:fd7702fd207eddc9f47332118ee16c01ed286d43028bebe5e2842ea444ab36f0'
rules:
  - requirement: 'Command signature'
    rules:
      - '`<name>` — required positional; the name of the drafted change to show'
      - '`--format` — controls output encoding; defaults to `text`'
  - requirement: 'Output format — text'
    rules:
      - 'The command prints metadata for the change to stdout:'
  - requirement: 'Output format — JSON'
    rules:
      - 'When `--format json` is passed, the command writes a single JSON object to stdout:'
  - requirement: 'Output format — toon'
    rules:
      - 'When `--format toon` is passed, the command writes the same data model as JSON encoded in Token-Oriented Object Notation (toon) to stdout.'
  - requirement: 'Error cases'
    rules:
      - 'If no change with the given name exists in `drafts/`, the command exits with code 1 and prints an `error:` message to stderr.'
      - 'If a change with the given name exists but is not in `drafts/` (i.e. it is active in `changes/` or in `discarded/`), the command exits with code 1 and prints an `error:` message to stderr.'
constraints:
  - 'Errors always go to stderr as plain text regardless of `--format`'
  - '`--format` only affects stdout'
  - 'Only changes currently in `drafts/` are shown by this command'
scenarios:
  - requirement: 'Command signature'
    name: 'Missing name argument'
    when:
      - '`specd drafts show` is run without a name'
    then:
      - 'the command exits with code 1 and prints a usage error to stderr'
  - requirement: 'Output format — text'
    name: 'Normal text output'
    given:
      - "`drafts/` contains a change `old-experiment` in state `drafting` with specIds `['auth/legacy']` and schema `schema-std@1`"
    when:
      - '`specd drafts show old-experiment` is run'
    then:
      - 'stdout contains `name:`, `state:`, `specs:`, and `schema:` fields with the correct values'
      - 'the process exits with code 0'
  - requirement: 'Output format — JSON'
    name: 'JSON format output'
    given:
      - "`drafts/` contains a change `old-experiment` in state `drafting` with specIds `['auth/legacy']` and schema `schema-std@1`"
    when:
      - '`specd drafts show old-experiment --format json` is run'
    then:
      - 'stdout is a JSON object with `name`, `state`, `specIds`, and `schema` fields matching the change'
      - 'the process exits with code 0'
  - requirement: 'Error cases'
    name: 'Change not found'
    when:
      - '`specd drafts show nonexistent` is run and no change named `nonexistent` exists anywhere'
    then:
      - 'the command exits with code 1'
      - 'stderr contains an `error:` message'
  - requirement: 'Error cases'
    name: 'Change not in drafts'
    given:
      - '`my-change` is active in `changes/` (not drafted)'
    when:
      - '`specd drafts show my-change` is run'
    then:
      - 'the command exits with code 1'
      - 'stderr contains an `error:` message'
