title: 'Spec List'
description: >
  Defines the specd spec list command, which lists all specs in all configured
  workspaces, always including a title per spec and optionally a short summary
  and metadata freshness status.
keywords:
  - 'spec-list'
  - 'cli-command'
  - 'workspace'
  - 'metadata-status'
  - 'summary'
  - 'title-resolution'
  - 'output-format'
dependsOn:
  - 'cli:cli/entrypoint'
contentHashes:
  'spec.md': 'sha256:97ffdfc2d320202401722f193d41a0e1ab68c0305e53adb2a0697ad2282b1b95'
  'verify.md': 'sha256:8d9db96da24041af84550525c9804a52dd454d63bacf52f66c3b5fa5b3cfdcc7'
rules:
  - requirement: 'Command signature'
    rules:
      - '--summary flag includes a short summary for each spec alongside the title'
      - '--metadata-status flag includes a metadata-freshness status column for each spec'
      - '--metadata-status accepts optional comma-separated filter value to show only matching statuses'
      - 'Valid filter tokens are fresh, stale, missing, invalid'
      - '--format option accepts text, json, or toon and defaults to text'
  - requirement: 'Title resolution'
    rules:
      - 'Title resolved from title field in .specd-metadata.yaml if present and non-empty'
      - 'Fallback title is the last segment of the capability-path'
      - 'Title resolution is performed by @specd/core'
  - requirement: 'Summary resolution'
    rules:
      - 'Summary resolved from description field in .specd-metadata.yaml if present and non-empty'
      - 'Fallback extracts first non-empty paragraph after the H1 heading in spec.md'
      - 'Second fallback extracts body of first section matching Overview, Summary, or Purpose'
      - 'If no summary can be extracted, field is omitted in text mode and null in json/toon mode'
  - requirement: 'Status resolution'
    rules:
      - 'No .specd-metadata.yaml file results in missing status'
      - 'Metadata failing structural validation results in invalid status'
      - 'Missing or empty contentHashes results in stale status'
      - 'Hash mismatch with current artifact file results in stale status'
      - 'All hashes matching results in fresh status'
  - requirement: 'Output format'
    rules:
      - 'In text mode specs are grouped by workspace with inverse-video header rows'
      - 'PATH column displays fully-qualified spec identifier workspace:capability-path'
      - 'All columns are aligned to globally fixed widths computed across all entries'
  - requirement: 'Empty output'
    rules:
      - 'Workspace with no specs shows heading followed by (none) in text mode'
      - 'No workspaces configured prints message and exits with code 0'
constraints:
  - 'No filtering by workspace or prefix in v1'
  - 'All configured workspaces are listed even empty ones'
  - 'Title resolution, summary extraction, and status resolution are all implemented in @specd/core not in the CLI'
scenarios:
  - requirement: 'Title resolution'
    name: 'Title from metadata'
    given:
      - 'default:auth/login has .specd-metadata.yaml with title: "Login Flow"'
    when:
      - 'specd spec list is run'
    then:
      - 'the row for default:auth/login shows Login Flow as its title'
  - requirement: 'Title resolution'
    name: 'Title fallback to last path segment'
    given:
      - 'default:auth/login has no .specd-metadata.yaml or its title field is absent'
    when:
      - 'specd spec list is run'
    then:
      - 'the row for default:auth/login shows login as its title'
  - requirement: 'Summary resolution'
    name: 'Summary from metadata description'
    given:
      - 'default:auth/login has .specd-metadata.yaml with description: "Handles login"'
    when:
      - 'specd spec list --summary is run'
    then:
      - 'the row for default:auth/login shows Handles login as its summary'
  - requirement: 'Status resolution'
    name: 'Status fresh when all hashes match'
    given:
      - 'default:auth/login has .specd-metadata.yaml with contentHashes whose SHA-256 values match current files'
    when:
      - 'specd spec list --metadata-status is run'
    then:
      - 'the row for default:auth/login shows fresh as its status'
  - requirement: 'Status resolution'
    name: 'Status missing when no metadata file'
    given:
      - 'default:auth/login has no .specd-metadata.yaml file'
    when:
      - 'specd spec list --metadata-status is run'
    then:
      - 'the row for default:auth/login shows missing as its status'
  - requirement: 'Status resolution'
    name: 'Status invalid when metadata fails structural validation'
    given:
      - 'default:auth/login has .specd-metadata.yaml with keywords: [123] (invalid type per strict schema)'
    when:
      - 'specd spec list --metadata-status is run'
    then:
      - 'the row for default:auth/login shows invalid as its status'
  - requirement: 'Status resolution'
    name: 'Filter by multiple statuses'
    given:
      - 'the project has three specs: one fresh, one stale, one missing'
    when:
      - 'specd spec list --metadata-status stale,missing is run'
    then:
      - 'the stale and missing specs are shown'
      - 'the fresh spec is not shown'
  - requirement: 'Empty output'
    name: 'Workspace with no specs'
    given:
      - 'the billing workspace exists but has no specs'
    when:
      - 'specd spec list is run'
    then:
      - 'stdout shows the billing heading followed by (none)'
