title: Drafts List
description: Defines the `specd drafts list` command, which lists all changes currently in `drafts/`, sorted by `createdAt` ascending.
dependsOn:
  - cli:cli/entrypoint
  - core:core/change
context:
  - Defines the `specd drafts list` command, which lists all changes currently in `drafts/`, sorted by `createdAt` ascending.
rules:
  - requirement: Command signature
    rules:
      - |-
        ```
        specd drafts list [--format text|json|toon]
        ```

        No positional arguments. The `--format` flag controls output encoding; defaults to `text`.
  - requirement: Output format — text
    rules:
      - |-
        The command prints a human-readable table to stdout. Changes are sorted by `createdAt` ascending (oldest first).

        The output has an inverse-video column header row `NAME  STATE  DATE  BY  REASON` above the data rows. Column widths are fixed at render time, computed from the widest value across all rows for each column (global, not per-group). The REASON column uses wrap overflow when its content exceeds the column width.
  - requirement: Output format — JSON
    rules:
      - |-
        When `--format json` is passed, the command writes a JSON array to stdout:

        ```json
        [
          {
            "name": "...",
            "state": "...",
            "draftedAt": "...",
            "draftedBy": { "name": "...", "email": "..." },
            "reason": "..."
          }
        ]
        ```

        One object per drafted change, sorted by `createdAt` ascending. `reason` is omitted when not provided. `draftedBy` is omitted when not recorded.
  - requirement: Output format — toon
    rules:
      - When `--format toon` is passed, the command writes the same data model as JSON encoded in Token-Oriented Object Notation (toon) to stdout.
  - requirement: Empty drafts
    rules:
      - If there are no changes in `drafts/`, the command prints `no drafts` to stdout in text mode, or `[]` in JSON/toon mode, and exits with code 0.
  - requirement: Error cases
    rules:
      - '* If an I/O error occurs while reading `drafts/`, the command exits with code 3 and prints an `error:` message to stderr.'
constraints:
  - Errors always go to stderr as plain text regardless of --format
  - --format only affects stdout
scenarios:
  - requirement: Output format — text
    name: Drafts listed with correct fields
    given:
      - 'drafts/ contains two changes: old-experiment (state drafting, drafted 2024-01-05, actor alice, reason "parked for later") and shelved-work (state designing, drafted 2024-01-03, actor bob, no reason)'
    when:
      - specd drafts list is run
    then:
      - stdout contains one row for each change showing name, bracketed state, date, and actor
      - AND the row for old-experiment includes "parked for later"
      - AND the row for shelved-work does not include a quoted reason
      - AND the process exits with code 0
  - requirement: Output format — text
    name: Rows sorted by createdAt ascending
    given:
      - drafts/ contains change b-change created before a-change (alphabetically later but older)
    when:
      - specd drafts list is run
    then:
      - b-change appears before a-change in the output
  - requirement: Output format — JSON
    name: JSON format output
    given:
      - drafts/ contains one change named old-experiment in state drafting, drafted at 2024-01-05T10:00:00.000Z, actor alice, reason "parked for later"
    when:
      - specd drafts list --format json is run
    then:
      - stdout is a JSON array with one object containing name, state, draftedAt, draftedBy, and reason fields
      - AND the object does not contain specIds or schema fields
      - AND the process exits with code 0
  - requirement: Output format — JSON
    name: JSON format output — no reason or actor
    given:
      - drafts/ contains one change named shelved-work with no reason and no draftedBy recorded
    when:
      - specd drafts list --format json is run
    then:
      - the JSON object for shelved-work does not contain reason or draftedBy fields
      - AND the process exits with code 0
  - requirement: Empty drafts
    name: No drafted changes — text
    given:
      - drafts/ is empty
    when:
      - specd drafts list is run
    then:
      - stdout contains no drafts
      - AND the process exits with code 0
  - requirement: Empty drafts
    name: No drafted changes — JSON
    given:
      - drafts/ is empty
    when:
      - specd drafts list --format json is run
    then:
      - stdout is []
      - AND the process exits with code 0
  - requirement: Error cases
    name: I/O error reading drafts directory
    given:
      - the drafts/ directory cannot be read due to a permissions error
    when:
      - specd drafts list is run
    then:
      - the command exits with code 3
      - 'AND stderr contains an error: message'
