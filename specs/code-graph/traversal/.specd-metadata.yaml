title: Traversal
description: Once a code graph is built, developers need to answer questions like "what breaks if I change this function?" and "what does this function depend on?" Traversal operations walk the graph to compute blast radius, find callers and callees at arbitrary depth, and assess the risk of proposed changes. These are pure, stateless functions that read from the graph store ŌĆö the query side of the code graph.
dependsOn:
  - code-graph:code-graph/symbol-model
  - code-graph:code-graph/graph-store
context:
  - Once a code graph is built, developers need to answer questions like "what breaks if I change this function?" and "what does this function depend on?" Traversal operations walk the graph to compute blast radius, find callers and callees at arbitrary depth, and assess the risk of proposed changes. These are pure, stateless functions that read from the graph store ŌĆö the query side of the code graph.
rules:
  - requirement: Upstream traversal
    rules:
      - |-
        `getUpstream(store: GraphStore, symbolId: string, options?: TraversalOptions): Promise<TraversalResult>` SHALL return all callers of the given symbol, transitively up to `maxDepth` (default: 3). Results MUST be grouped by depth level:

        - **Depth 1** ŌĆö direct callers (symbols that call the target)
        - **Depth 2** ŌĆö callers of the direct callers
        - **Depth N** ŌĆö callers at N steps removed

        The traversal follows `CALLS` relations in reverse (target ŌåÆ source). Cycles are detected and broken ŌĆö a symbol already visited at a shallower depth is not revisited.
  - requirement: Downstream traversal
    rules:
      - '`getDownstream(store: GraphStore, symbolId: string, options?: TraversalOptions): Promise<TraversalResult>` SHALL return all callees of the given symbol, transitively up to `maxDepth` (default: 3). Results are grouped by depth level following `CALLS` relations forward (source ŌåÆ target). Cycle detection applies as with upstream.'
  - requirement: TraversalOptions and TraversalResult
    rules:
      - |-
        `TraversalOptions` is a value object with:

        - **`maxDepth`** (`number`, default: 3) ŌĆö maximum traversal depth
        - **`includeFiles`** (`boolean`, default: true) ŌĆö whether to include `IMPORTS` relations in addition to `CALLS`

        `TraversalResult` is a value object with:

        - **`root`** (`string`) ŌĆö the starting symbol id
        - **`levels`** ŌĆö `Map<number, SymbolNode[]>` ŌĆö symbols grouped by depth (1-indexed)
        - **`totalCount`** ŌĆö total number of unique symbols found across all levels
        - **`truncated`** (`boolean`) ŌĆö true if traversal hit `maxDepth` and there are potentially more results
  - requirement: Impact analysis
    rules:
      - '### Requirement: Impact analysis'
      - |-
        `analyzeImpact(store: GraphStore, target: string, direction: 'upstream' | 'downstream' | 'both', maxDepth?: number): Promise<ImpactResult>` SHALL compute the blast radius of modifying the target symbol. The optional `maxDepth` parameter (default: 3) controls how deep the traversal goes ŌĆö it is passed through to `getUpstream`/`getDownstream` and limits the IMPORTS BFS loop.

        The function produces an `ImpactResult` containing:

        - **`target`** ŌĆö the symbol being analyzed
        - **`directDependents`** ŌĆö count of depth-1 results (WILL BREAK)
        - **`indirectDependents`** ŌĆö count of depth-2 results (LIKELY AFFECTED)
        - **`transitiveDependents`** ŌĆö count of depth-3+ results (MAY NEED TESTING)
        - **`riskLevel`** ŌĆö computed from dependent counts: `LOW`, `MEDIUM`, `HIGH`, or `CRITICAL`
        - **`affectedFiles`** ŌĆö unique file paths containing any affected symbol
        - **`affectedSymbols`** ŌĆö array of `AffectedSymbol` entries with depth information
        - **`affectedProcesses`** ŌĆö execution flows that include the target or any affected symbol (when process data is available)

        `AffectedSymbol` SHALL contain:

        - **`id`** (`string`) ŌĆö the symbol identifier
        - **`name`** (`string`) ŌĆö the symbol's declared name
        - **`filePath`** (`string`) ŌĆö workspace-prefixed file path
        - **`line`** (`number`) ŌĆö 1-based line number
        - **`depth`** (`number`) ŌĆö distance from the target: 1 = direct dependent, 2 = indirect, 3+ = transitive

        Risk level thresholds:

        | Level      | Condition                                                |
        | ---------- | -------------------------------------------------------- |
        | `LOW`      | 0ŌĆō2 direct dependents, no indirect                       |
        | `MEDIUM`   | 3ŌĆō5 direct dependents, or any indirect                   |
        | `HIGH`     | 6+ direct dependents, or 10+ total dependents            |
        | `CRITICAL` | 20+ total dependents, or target is in 3+ execution flows |
  - requirement: File impact
    rules:
      - '### Requirement: File impact'
      - |-
        `analyzeFileImpact(store: GraphStore, filePath: string, direction: 'upstream' | 'downstream' | 'both', maxDepth?: number): Promise<FileImpactResult>` SHALL compute aggregate impact for all symbols defined in the given file. The optional `maxDepth` parameter (default: 3) is passed through to each per-symbol `analyzeImpact` call and limits the file-level IMPORTS BFS.

        It:

        1. Retrieves all symbols in the file via `findSymbols({ filePath })`
        2. Runs `analyzeImpact` for each symbol with the given `maxDepth`
        3. Merges results: deduplicates affected symbols (keeping the shallowest depth), takes the maximum risk level, unions affected files

        `FileImpactResult` extends `ImpactResult` with:

        - **`symbols`** ŌĆö array of per-symbol `ImpactResult` entries
        - **`riskLevel`** ŌĆö the maximum risk level across all symbols in the file
  - requirement: Change detection
    rules:
      - |-
        `detectChanges(store: GraphStore, changedFiles: string[], maxDepth?: number): Promise<ChangeDetectionResult>` SHALL identify the impact of a set of changed files on the code graph. The optional `maxDepth` parameter (default: 3) is passed through to the upstream traversal for each changed symbol. It:

        1. For each changed file, finds all symbols defined in it
        2. Runs upstream traversal on each symbol with the given `maxDepth`
        3. Aggregates affected symbols, files, and execution flows
        4. Computes an overall risk level

        `ChangeDetectionResult` contains:

        - **`changedFiles`** ŌĆö the input file paths
        - **`changedSymbols`** ŌĆö symbols defined in the changed files
        - **`affectedSymbols`** ŌĆö symbols affected by the changes (upstream dependents)
        - **`affectedFiles`** ŌĆö files containing affected symbols
        - **`riskLevel`** ŌĆö maximum risk level across all changed symbols
        - **`summary`** ŌĆö human-readable summary string
  - requirement: Pure functions
    rules:
      - All traversal operations SHALL be stateless pure functions defined in `domain/services/`. They receive a `GraphStore` instance (for reads only) and return value objects. They MUST NOT mutate the store, manage lifecycle, or hold state between calls.
constraints:
  - Traversal depth defaults to 3 ŌĆö callers may override via TraversalOptions
  - Cycles are broken by tracking visited symbols ŌĆö a symbol is only reported at its shallowest depth
  - Risk level thresholds are fixed in this spec ŌĆö they are not configurable
  - All traversal functions are in domain/services/, not in use cases or infrastructure
  - Traversal functions never mutate the store
  - No dependency on @specd/core
scenarios:
  - requirement: Upstream traversal
    name: Direct callers returned at depth 1
    given:
      - symbol C is called by symbols A and B
    when:
      - getUpstream(store, C.id) is called
    then:
      - levels.get(1) contains A and B
  - requirement: Upstream traversal
    name: Transitive callers at correct depth
    given:
      - D calls C, C calls B, B calls A
    when:
      - 'getUpstream(store, A.id, { maxDepth: 3 }) is called'
    then:
      - B is at depth 1, C is at depth 2, D is at depth 3
  - requirement: Upstream traversal
    name: Cycle broken at shallowest depth
    given:
      - A calls B, B calls C, C calls A (cycle)
    when:
      - getUpstream(store, A.id) is called
    then:
      - A is not revisited and the traversal terminates
  - requirement: Upstream traversal
    name: maxDepth limits traversal
    given:
      - a call chain of depth 5
    when:
      - 'getUpstream(store, target.id, { maxDepth: 2 }) is called'
    then:
      - only depths 1 and 2 are returned and truncated is true
  - requirement: Downstream traversal
    name: Direct callees at depth 1
    given:
      - symbol A calls B and C
    when:
      - getDownstream(store, A.id) is called
    then:
      - levels.get(1) contains B and C
  - requirement: Downstream traversal
    name: Downstream with includeFiles
    given:
      - file X imports file Y and symbol A in X calls symbol B in Y
    when:
      - 'getDownstream(store, A.id, { includeFiles: true }) is called'
    then:
      - both the CALLS relation to B and the IMPORTS relation to Y are reflected in the result
  - requirement: Impact analysis
    name: LOW risk ŌĆö no dependents
    given:
      - a symbol with 0 callers
    when:
      - analyzeImpact(store, symbol.id, 'upstream') is called
    then:
      - riskLevel is LOW and directDependents is 0
  - requirement: Impact analysis
    name: MEDIUM risk ŌĆö few direct dependents
    given:
      - a symbol with 4 direct callers and 0 indirect
    when:
      - analyzeImpact(store, symbol.id, 'upstream') is called
    then:
      - riskLevel is MEDIUM
  - requirement: Impact analysis
    name: HIGH risk ŌĆö many direct dependents
    given:
      - a symbol with 8 direct callers
    when:
      - analyzeImpact(store, symbol.id, 'upstream') is called
    then:
      - riskLevel is HIGH
  - requirement: Impact analysis
    name: CRITICAL risk ŌĆö widely used symbol
    given:
      - a symbol with 25 total dependents across all depths
    when:
      - analyzeImpact(store, symbol.id, 'upstream') is called
    then:
      - riskLevel is CRITICAL
  - requirement: Impact analysis
    name: affectedFiles deduplication
    given:
      - symbols A and B are both in src/utils.ts and both are callers of target
    when:
      - analyzeImpact is called
    then:
      - affectedFiles contains src/utils.ts only once
  - requirement: Impact analysis
    name: affectedSymbols include depth
    given:
      - 'a call chain: D calls C, C calls B, B calls target'
    when:
      - analyzeImpact(store, target.id, 'upstream') is called
    then:
      - 'affectedSymbols contains B with depth: 1, C with depth: 2, D with depth: 3'
  - requirement: Impact analysis
    name: custom maxDepth limits traversal
    given:
      - a call chain of depth 5
    when:
      - analyzeImpact(store, target.id, 'upstream', 5) is called
    then:
      - symbols up to depth 5 are included in affectedSymbols
      - AND transitiveDependents counts depths 3 through 5
  - requirement: Impact analysis
    name: default maxDepth is 3
    given:
      - a call chain of depth 5
    when:
      - analyzeImpact(store, target.id, 'upstream') is called without maxDepth
    then:
      - only symbols up to depth 3 are included
  - requirement: Impact analysis
    name: maxDepth 1 returns only direct dependents
    given:
      - a symbol with direct and indirect callers
    when:
      - analyzeImpact(store, target.id, 'upstream', 1) is called
    then:
      - only depth-1 symbols are returned
      - AND indirectDependents and transitiveDependents are 0
  - requirement: File impact
    name: Aggregate risk is maximum across symbols
    given:
      - file src/auth.ts contains symbols X (LOW risk) and Y (HIGH risk)
    when:
      - analyzeFileImpact(store, 'src/auth.ts', 'upstream') is called
    then:
      - riskLevel is HIGH (the maximum)
  - requirement: File impact
    name: Affected symbols deduplicated across file symbols
    given:
      - symbols X and Y in the file share a common upstream dependent Z
    when:
      - analyzeFileImpact is called
    then:
      - Z appears once in the aggregate result with the shallowest depth
  - requirement: File impact
    name: maxDepth passed through to per-symbol analysis
    given:
      - file src/auth.ts with symbols that have deep call chains
    when:
      - analyzeFileImpact(store, 'src/auth.ts', 'upstream', 5) is called
    then:
      - 'each per-symbol analyzeImpact call uses maxDepth: 5'
      - AND the file-level IMPORTS BFS also uses depth limit 5
  - requirement: Change detection
    name: Single changed file impact
    given:
      - src/utils.ts was modified and contains symbol hash with 3 callers
    when:
      - detectChanges(store, ['src/utils.ts']) is called
    then:
      - changedSymbols includes hash and affectedSymbols includes its 3 callers
  - requirement: Change detection
    name: Multiple changed files aggregated
    given:
      - two files were modified, each with different sets of upstream dependents
    when:
      - detectChanges(store, [file1, file2]) is called
    then:
      - affectedSymbols is the union of both files' upstream dependents
  - requirement: Change detection
    name: Summary is human-readable
    when:
      - detectChanges completes
    then:
      - summary contains the number of changed files, affected symbols, and risk level in readable form
  - requirement: Pure functions
    name: Traversal does not mutate store
    given:
      - a store with known state
    when:
      - getUpstream, getDownstream, or analyzeImpact is called
    then:
      - getStatistics() returns the same counts before and after the call
