title: Hotspots
description: Identify which symbols in the code graph have the highest impact ‚Äî the most callers, importers, and cross-workspace dependents. This allows agents and users to focus review, testing, and spec coverage on the code that would cause the most breakage if changed.
dependsOn:
  - code-graph:code-graph/symbol-model
  - code-graph:code-graph/graph-store
  - code-graph:code-graph/traversal
context:
  - Identify which symbols in the code graph have the highest impact ‚Äî the most callers, importers, and cross-workspace dependents. This allows agents and users to focus review, testing, and spec coverage on the code that would cause the most breakage if changed.
rules:
  - requirement: Batch hotspot scoring
    rules:
      - |-
        `computeHotspots(store: GraphStore, options?: HotspotOptions): Promise<HotspotResult>` SHALL compute a hotspot score for every symbol in the graph using exactly two batch queries:

        1. **Caller query** ‚Äî returns one row per (symbol, caller) pair with both the symbol's `filePath` and the caller's `filePath`
        2. **Importer count query** ‚Äî returns the number of files that import each file

        The score formula is:

        ```
        score = (sameWorkspaceCallers * 3) + (crossWorkspaceCallers * 5) + fileImporters
        ```

        Where:

        * **sameWorkspaceCallers** ‚Äî callers whose filePath shares the same workspace prefix as the symbol
        * **crossWorkspaceCallers** ‚Äî callers whose filePath has a different workspace prefix (weighted higher because cross-workspace calls are implicit contracts with wider blast radius)
        * **fileImporters** ‚Äî number of files that IMPORT the file containing this symbol

        Workspace is extracted as the first path segment of filePath (everything before the first `/`).
  - requirement: Risk level
    rules:
      - Each entry's `riskLevel` SHALL be computed using the existing `computeRiskLevel(directCallers, totalCallers + fileImporters, 0)` where `directCallers` = `sameWorkspaceCallers + crossWorkspaceCallers` and the second argument is the total callers plus file importers.
  - requirement: Smart defaults with automatic removal
    rules:
      - |-
        When invoked with **no filter flags**, the command applies safe defaults:

        * **score > 0** ‚Äî symbols with no callers and no importers are excluded
        * **risk >= MEDIUM** ‚Äî LOW-risk symbols are filtered out
        * **limit 20** ‚Äî only the top 20 results are returned

        When **any** filter flag is provided (`--workspace`, `--kind`, `--file`, `--exclude-path`, `--exclude-workspace`, `--limit`, `--min-score`, `--min-risk`), **all** defaults are removed (minScore ‚Üí 0, minRisk ‚Üí LOW, limit ‚Üí unlimited). Only explicitly provided constraints apply. This prevents defaults from silently hiding results that the user's filter was intended to surface.

        Examples:

        * `specd graph hotspots` ‚Üí defaults apply (score > 0, risk >= MEDIUM, limit 20)
        * `specd graph hotspots --min-risk HIGH` ‚Üí only risk >= HIGH, no score or limit constraint
        * `specd graph hotspots --workspace core` ‚Üí all symbols in core, no score/risk/limit constraint
        * `specd graph hotspots --min-risk HIGH --limit 5` ‚Üí risk >= HIGH, limit 5, no score constraint
  - requirement: Filtering
    rules:
      - |-
        `HotspotOptions` supports these optional filters:

        * **workspace** ‚Äî only include symbols whose filePath starts with this workspace prefix
        * **kind** ‚Äî only include symbols of this SymbolKind
        * **filePath** ‚Äî only include symbols in this file
        * **excludePaths** ‚Äî array of glob patterns to exclude by file path (supports `*` wildcards, case-insensitive). Uses `matchesExclude` from `domain/services/matches-exclude.ts`
        * **excludeWorkspaces** ‚Äî array of workspace names to exclude. Uses `matchesExclude` from `domain/services/matches-exclude.ts`
        * **limit** ‚Äî maximum results to return (default 20)
        * **minScore** ‚Äî minimum score threshold (default 1, i.e. > 0)
        * **minRisk** ‚Äî minimum risk level threshold (default MEDIUM)

        Excludes are applied alongside the existing include filters before the limit is applied.
  - requirement: Output
    rules:
      - |-
        `HotspotResult` contains:

        * **entries** ‚Äî array of `HotspotEntry`, sorted by score descending
        * **totalSymbols** ‚Äî total number of symbols in the graph (before filtering)

        Each `HotspotEntry` contains:

        * **symbol** ‚Äî the `SymbolNode`
        * **score** ‚Äî the computed hotspot score
        * **directCallers** ‚Äî same-workspace caller count
        * **crossWorkspaceCallers** ‚Äî cross-workspace caller count
        * **fileImporters** ‚Äî file importer count
        * **riskLevel** ‚Äî the computed risk level
  - requirement: Pure function
    rules:
      - '`computeHotspots` SHALL be a stateless pure function in `domain/services/`. It receives a `GraphStore` for reads only and returns value objects. It MUST NOT mutate the store.'
constraints:
  - Exactly 2 graph queries ‚Äî no N+1 per-symbol queries
  - 'Score formula weights are fixed: same-ws = 3, cross-ws = 5, importers = 1'
  - Risk level thresholds reuse the existing computeRiskLevel function
  - Workspace is the first path segment of filePath
  - No spec coverage logic ‚Äî deferred to issue 19
