title: Hotspots
description: Identify which symbols in the code graph have the highest impact тАФ the most callers, importers, and cross-workspace dependents. This allows agents and users to focus review, testing, and spec coverage on the code that would cause the most breakage if changed.
dependsOn:
  - code-graph:code-graph/symbol-model
  - code-graph:code-graph/graph-store
  - code-graph:code-graph/traversal
context:
  - Identify which symbols in the code graph have the highest impact тАФ the most callers, importers, and cross-workspace dependents. This allows agents and users to focus review, testing, and spec coverage on the code that would cause the most breakage if changed.
rules:
  - requirement: Batch hotspot scoring
    rules:
      - |-
        `computeHotspots(store: GraphStore, options?: HotspotOptions): Promise<HotspotResult>` SHALL compute a hotspot score for every symbol in the graph using exactly two batch queries:

        1. **Caller query** тАФ returns one row per (symbol, caller) pair with both the symbol's `filePath` and the caller's `filePath`
        2. **Importer count query** тАФ returns the number of files that import each file

        The score formula is:

        ```text
        score = (sameWorkspaceCallers * 3) + (crossWorkspaceCallers * 5) + fileImporters
        ```

        Where:

        * **sameWorkspaceCallers** тАФ callers whose filePath shares the same workspace prefix as the symbol
        * **crossWorkspaceCallers** тАФ callers whose filePath has a different workspace prefix (weighted higher because cross-workspace calls are implicit contracts with wider blast radius)
        * **fileImporters** тАФ number of files that IMPORT the file containing this symbol

        Workspace is extracted from filePath as the prefix before the first `:` (e.g. `core` from `core:src/index.ts`).
  - requirement: Risk level
    rules:
      - Each entry's `riskLevel` SHALL be computed using the existing `computeRiskLevel(directCallers, totalCallers + fileImporters, 0)` where `directCallers` = `sameWorkspaceCallers + crossWorkspaceCallers` and the second argument is the total callers plus file importers.
  - requirement: Smart defaults with automatic removal
    rules:
      - |-
        When invoked with **no filter flags**, the command applies safe defaults:

        * **score > 0** тАФ symbols with no callers and no importers are excluded
        * **risk >= MEDIUM** тАФ LOW-risk symbols are filtered out
        * **limit 20** тАФ only the top 20 results are returned

        When **any** filter flag is provided (`--workspace`, `--kind`, `--file`, `--exclude-path`, `--exclude-workspace`, `--limit`, `--min-score`, `--min-risk`), **all** defaults are removed (minScore тЖТ 0, minRisk тЖТ LOW, limit тЖТ unlimited). Only explicitly provided constraints apply. This prevents defaults from silently hiding results that the user's filter was intended to surface.

        Examples:

        * `specd graph hotspots` тЖТ defaults apply (score > 0, risk >= MEDIUM, limit 20)
        * `specd graph hotspots --min-risk HIGH` тЖТ only risk >= HIGH, no score or limit constraint
        * `specd graph hotspots --workspace core` тЖТ all symbols in core, no score/risk/limit constraint
        * `specd graph hotspots --min-risk HIGH --limit 5` тЖТ risk >= HIGH, limit 5, no score constraint
  - requirement: Filtering
    rules:
      - |-
        `HotspotOptions` supports these optional filters:

        * **workspace** тАФ only include symbols whose filePath starts with this workspace prefix
        * **kind** тАФ only include symbols of this SymbolKind
        * **filePath** тАФ only include symbols in this file
        * **excludePaths** тАФ array of glob patterns to exclude by file path (supports `*` wildcards, case-insensitive). Uses `matchesExclude` from `domain/services/matches-exclude.ts`
        * **excludeWorkspaces** тАФ array of workspace names to exclude. Uses `matchesExclude` from `domain/services/matches-exclude.ts`
        * **limit** тАФ maximum results to return (default 20)
        * **minScore** тАФ minimum score threshold (default 1, i.e. > 0)
        * **minRisk** тАФ minimum risk level threshold (default MEDIUM)

        Excludes are applied alongside the existing include filters before the limit is applied.
  - requirement: Output
    rules:
      - |-
        `HotspotResult` contains:

        * **entries** тАФ array of `HotspotEntry`, sorted by score descending
        * **totalSymbols** тАФ total number of symbols in the graph (before filtering)

        Each `HotspotEntry` contains:

        * **symbol** тАФ the `SymbolNode`
        * **score** тАФ the computed hotspot score
        * **directCallers** тАФ same-workspace caller count
        * **crossWorkspaceCallers** тАФ cross-workspace caller count
        * **fileImporters** тАФ file importer count
        * **riskLevel** тАФ the computed risk level
  - requirement: Pure function
    rules:
      - '`computeHotspots` SHALL be a stateless pure function in `domain/services/`. It receives a `GraphStore` for reads only and returns value objects. It MUST NOT mutate the store.'
constraints:
  - Exactly 2 graph queries тАФ no N+1 per-symbol queries
  - 'Score formula weights are fixed: same-ws = 3, cross-ws = 5, importers = 1'
  - Risk level thresholds reuse the existing computeRiskLevel function
  - 'Workspace is the prefix before the first : in filePath'
  - No spec coverage logic тАФ deferred to issue 19
