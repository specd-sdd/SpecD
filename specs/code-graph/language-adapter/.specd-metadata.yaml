title: Language Adapter
description: Different programming languages have fundamentally different syntax for functions, classes, imports, and calls. The code graph needs a pluggable abstraction that extracts symbols and relations from source files without coupling the indexer to any specific language's grammar. Language adapters encapsulate Tree-sitter-based parsing behind a uniform interface, with TypeScript as the built-in adapter.
dependsOn:
  - code-graph:code-graph/symbol-model
context:
  - Different programming languages have fundamentally different syntax for functions, classes, imports, and calls. The code graph needs a pluggable abstraction that extracts symbols and relations from source files without coupling the indexer to any specific language's grammar. Language adapters encapsulate Tree-sitter-based parsing behind a uniform interface, with TypeScript as the built-in adapter.
rules:
  - requirement: LanguageAdapter interface
    rules:
      - |-
        `LanguageAdapter` SHALL be an interface (not an abstract class, since adapters are stateless and have no shared state to inherit) with the following methods:

        * **`languages(): string[]`** — returns the language identifiers this adapter handles (e.g. `['typescript', 'tsx', 'javascript', 'jsx']`)
        * **`extractSymbols(filePath: string, content: string): SymbolNode[]`** — parses the file content and returns all symbols found
        * **`extractImportedNames(filePath: string, content: string): ImportDeclaration[]`** — parses import statements and returns structured declarations without resolution
        * **`extractRelations(filePath: string, content: string, symbols: SymbolNode[], importMap: Map<string, string>): Relation[]`** — extracts relations (IMPORTS, CALLS, DEFINES, EXPORTS) from the file

        Both extraction methods MUST be synchronous and pure — they receive content as a string, not a file path to read. They produce no side effects.
  - requirement: Language detection
    rules:
      - |-
        File-to-language mapping SHALL be determined by file extension. The adapter registry maintains a mapping from extensions to language identifiers. Files with unrecognized extensions SHALL be silently skipped — no error is thrown, no `FileNode` is created.

        The following extensions are mapped for the built-in TypeScript adapter:

        | Extension | Language ID  |
        | --------- | ------------ |
        | `.ts`     | `typescript` |
        | `.tsx`    | `tsx`        |
        | `.js`     | `javascript` |
        | `.jsx`    | `jsx`        |
  - requirement: TypeScript adapter
    rules:
      - |-
        A built-in `TypeScriptLanguageAdapter` SHALL handle `typescript`, `tsx`, `javascript`, and `jsx` files using `@ast-grep/napi` for Tree-sitter parsing. It MUST extract:

        * **Symbols**: functions (named + arrow assigned to const), classes, methods, exported variables, type aliases, interfaces, enums
        * **Comments**: For each extracted symbol, the adapter extracts the raw text of the immediately preceding comment block (JSDoc `/** ... */`, block `/* ... */`, or contiguous line comments `// ...`). The comment is stored verbatim in `SymbolNode.comment`. If no comment precedes the declaration, `comment` is `undefined`.
        * **Relations**: `DEFINES` (file → symbol), `EXPORTS` (file → exported symbol), `IMPORTS` (file → file via import specifier resolution), `CALLS` (symbol → symbol via call expressions)

        The adapter maps TypeScript/JavaScript constructs to `SymbolKind` values:

        | Construct                          | SymbolKind  |
        | ---------------------------------- | ----------- |
        | Function declaration               | `function`  |
        | Arrow function assigned to `const` | `function`  |
        | Class declaration                  | `class`     |
        | Method definition                  | `method`    |
        | Exported `const`/`let`/`var`       | `variable`  |
        | Type alias                         | `type`      |
        | Interface declaration              | `interface` |
        | Enum declaration                   | `enum`      |
  - requirement: Import declaration extraction
    rules:
      - |-
        `LanguageAdapter` SHALL provide `extractImportedNames(filePath: string, content: string): ImportDeclaration[]` — a synchronous, pure method that parses the file's import statements and returns structured declarations without any resolution.

        `ImportDeclaration` is a value object with:

        * **`localName`** (`string`) — the name used locally in the importing file (may differ from original via aliasing)
        * **`originalName`** (`string`) — the name as declared in the source module
        * **`specifier`** (`string`) — the raw import specifier string (e.g. `'./utils.js'`, `'@specd/core'`, `'os'`)
        * **`isRelative`** (`boolean`) — true if the specifier starts with `.` or `/`

        Each adapter parses imports using its language's syntax:

        | Language   | Import syntax                           | isRelative      |
        | ---------- | --------------------------------------- | --------------- |
        | TypeScript | `import { X } from 'specifier'`         | starts with `.` |
        | Python     | `from module import X`, `import module` | starts with `.` |
        | Go         | `import "pkg"`, `import alias "pkg"`    | always `false`  |
        | PHP        | `use Namespace\Class`                   | always `false`  |

        The indexer is responsible for resolving specifiers to file paths and symbol ids — the adapter only parses syntax.
  - requirement: Call resolution
    rules:
      - |-
        For `CALLS` relations, the adapter MUST extract call expressions from the AST and resolve them:

        * **Caller**: the innermost enclosing function, method, or arrow function containing the call expression. Calls at module top level are silently dropped.
        * **Callee**: resolved via the import map passed to `extractRelations`. If the called identifier is in the import map, the callee is the resolved symbol. If the identifier matches a locally defined symbol, the callee is that local symbol.

        Calls to identifiers that cannot be resolved (e.g. global built-ins, member expressions like `obj.method()`, dynamic expressions) SHALL be silently dropped — no relation is created, no error is thrown.
  - requirement: Tree-sitter query patterns
    rules:
      - The specific Tree-sitter / ast-grep query patterns used by each adapter are internal implementation details. They MUST NOT be part of the public API or exposed through the `LanguageAdapter` interface. Adapters are free to change their internal query patterns without breaking consumers.
  - requirement: Adapter registry
    rules:
      - |-
        An `AdapterRegistry` SHALL map language identifiers to `LanguageAdapter` instances. It provides:

        * **`register(adapter: LanguageAdapter): void`** — registers an adapter for all languages it declares
        * **`getAdapter(languageId: string): LanguageAdapter | undefined`** — returns the adapter for a language, or `undefined` if none registered
        * **`getAdapterForFile(filePath: string): LanguageAdapter | undefined`** — resolves extension → language → adapter

        The TypeScript adapter MUST be registered by default when the registry is created. Additional adapters can be registered to extend language support.
constraints:
  - LanguageAdapter is an interface, not an abstract class — adapters are stateless
  - Extraction methods are synchronous and pure — they receive content, not file handles
  - Unrecognized file extensions are silently skipped
  - Unresolvable call targets are silently dropped
  - Tree-sitter query patterns are internal — not part of the public API
  - The TypeScript adapter is always registered by default
  - No dependency on @specd/core
scenarios:
  - requirement: LanguageAdapter interface
    name: Extraction is pure
    given:
      - a LanguageAdapter instance
    when:
      - extractSymbols() is called twice with the same filePath and content
    then:
      - both calls return identical results
  - requirement: Language detection
    name: Unrecognized extension skipped
    given:
      - a file README.md with no registered adapter for .md
    when:
      - getAdapterForFile('README.md') is called
    then:
      - undefined is returned and no error is thrown
  - requirement: Language detection
    name: TypeScript extension mapped
    when:
      - getAdapterForFile('src/index.ts') is called
    then:
      - the TypeScriptLanguageAdapter is returned
  - requirement: Language detection
    name: JSX extension mapped
    when:
      - getAdapterForFile('src/App.jsx') is called
    then:
      - the TypeScriptLanguageAdapter is returned (it handles jsx)
  - requirement: TypeScript adapter
    name: Function declaration extracted
    given:
      - 'content containing function createUser(name: string) { ... }'
    when:
      - extractSymbols() is called
    then:
      - "a SymbolNode with name: 'createUser', kind: 'function' is returned"
  - requirement: TypeScript adapter
    name: Arrow function assigned to const extracted
    given:
      - 'content containing export const validate = (input: string) => { ... }'
    when:
      - extractSymbols() is called
    then:
      - "a SymbolNode with name: 'validate', kind: 'function' is returned"
  - requirement: TypeScript adapter
    name: Class and method extracted separately
    given:
      - content containing class AuthService { login() { ... } }
    when:
      - extractSymbols() is called
    then:
      - 'two symbols are returned: one class named AuthService and one method named login'
  - requirement: TypeScript adapter
    name: Interface extracted
    given:
      - content containing export interface UserRepository { ... }
    when:
      - extractSymbols() is called
    then:
      - "a SymbolNode with name: 'UserRepository', kind: 'interface' is returned"
  - requirement: TypeScript adapter
    name: JSDoc comment extracted with symbol
    given:
      - 'content containing:'
    when:
      - extractSymbols() is called
    then:
      - "the createUser symbol has comment: '/** Creates a user in the system. */'"
  - requirement: TypeScript adapter
    name: Multi-line JSDoc extracted
    given:
      - content with a multi-line JSDoc block before a class declaration
    when:
      - extractSymbols() is called
    then:
      - comment contains the full JSDoc text including newlines
  - requirement: TypeScript adapter
    name: No comment yields undefined
    given:
      - content containing a function with no preceding comment
    when:
      - extractSymbols() is called
    then:
      - the symbol's comment is undefined
  - requirement: TypeScript adapter
    name: EXPORTS relation created for exported symbol
    given:
      - content containing export function createUser() { ... }
    when:
      - extractRelations() is called
    then:
      - an EXPORTS relation from the file to the createUser symbol is returned
  - requirement: TypeScript adapter
    name: IMPORTS relation created for import statement
    given:
      - content containing import { createUser } from './user.ts'
    when:
      - extractRelations() is called with the appropriate import map
    then:
      - an IMPORTS relation from the current file to the resolved target file is returned
  - requirement: Import declaration extraction
    name: TypeScript named imports parsed
    given:
      - content containing import { createUser, type Config } from '@specd/core'
    when:
      - extractImportedNames() is called
    then:
      - "two declarations are returned: createUser and Config, both with specifier '@specd/core' and isRelative: false"
  - requirement: Import declaration extraction
    name: Relative import detected
    given:
      - content containing import { helper } from './utils.js'
    when:
      - extractImportedNames() is called
    then:
      - "one declaration is returned with isRelative: true and specifier './utils.js'"
  - requirement: Import declaration extraction
    name: Aliased import preserves both names
    given:
      - content containing import { foo as bar } from './mod.js'
    when:
      - extractImportedNames() is called
    then:
      - "the declaration has originalName: 'foo' and localName: 'bar'"
  - requirement: Import declaration extraction
    name: Python relative import
    given:
      - content containing from .utils import helper
    when:
      - extractImportedNames() is called on a Python adapter
    then:
      - 'one declaration is returned with isRelative: true'
  - requirement: Import declaration extraction
    name: Go imports are never relative
    given:
      - content containing import "fmt"
    when:
      - extractImportedNames() is called on a Go adapter
    then:
      - 'the declaration has isRelative: false'
  - requirement: Call resolution
    name: Call resolved via import map
    given:
      - a function processOrder that calls validateUser()
      - AND validateUser was imported from ./auth.ts
    when:
      - extractRelations() is called with the import map containing validateUser → auth.ts:validateUser
    then:
      - a CALLS relation from processOrder to validateUser is returned
  - requirement: Call resolution
    name: Unresolvable call silently dropped
    given:
      - a function that calls console.log() (a global built-in)
    when:
      - extractRelations() is called
    then:
      - no CALLS relation is created for that call and no error is thrown
  - requirement: Call resolution
    name: Top-level call silently dropped
    given:
      - a call expression init() at module top level (not inside any function or class)
    when:
      - extractRelations() is called
    then:
      - no CALLS relation is created for that call
  - requirement: Adapter registry
    name: TypeScript adapter registered by default
    when:
      - a new AdapterRegistry is created
    then:
      - getAdapter('typescript') returns the TypeScriptLanguageAdapter
  - requirement: Adapter registry
    name: Custom adapter extends registry
    given:
      - "a custom adapter declaring languages(): ['python']"
    when:
      - register(adapter) is called
    then:
      - getAdapter('python') returns that adapter
      - AND getAdapter('typescript') still returns the TypeScript adapter
  - requirement: Adapter registry
    name: Later registration overrides earlier
    given:
      - "two adapters both declaring languages(): ['typescript']"
    when:
      - both are registered in sequence
    then:
      - getAdapter('typescript') returns the second adapter
