title: 'Spec Layout'
description: >
  This spec defines the canonical directory structure and file conventions for
  all specs in specd, ensuring consistency across global constraint specs and
  package-internal specs. It establishes the paired file structure (spec.md +
  verify.md), mandatory sections, and naming patterns that enable
  cross-package consistency and support the delta merger's ability to correlate
  specs when changes are applied.
keywords:
  - 'spec-structure'
  - 'naming-convention'
  - 'markdown'
  - 'documentation'
  - 'layout'
dependsOn: []
contentHashes:
  spec.md: 'sha256:22fcc69911ffedf22970a4ad8ed1b539fc92eb6c5148c1a9d12c04c456a30c3b'
  verify.md: 'sha256:f4c07c07b9fb4ee6ecfded12e2ab2412079929b13c42295e6515e41ccbb77b4e'
rules:
  - requirement: 'Global specs for cross-cutting constraints'
    rules:
      - 'Specs that apply to all packages — architecture, coding conventions, commit format, testing rules, storage design — live under `specs/_global/<topic>/`.'
      - 'Any spec in `_global/` is a binding constraint on every package in the monorepo.'
  - requirement: 'Package specs for package-internal concerns'
    rules:
      - 'Specs that describe the internals of a specific package live under `specs/<package>/`, where `<package>` is the short package name (e.g. `core`, `cli`, `mcp`, `schema-std`).'
      - 'These specs are not binding on other packages.'
  - requirement: 'Spec file naming'
    rules:
      - 'Each spec lives in its own named subdirectory and contains two files: `spec.md` and `verify.md`.'
      - 'The subdirectory name is kebab-case and describes the topic concisely.'
      - '`spec.md` contains what the system does: requirements, constraints, examples, rationale.'
      - '`verify.md` contains how to confirm it works: WHEN/THEN scenarios.'
      - 'The two files are always paired.'
      - '`spec.md` contains no WHEN/THEN scenarios; `verify.md` contains no requirement prose.'
  - requirement: 'spec.md structure'
    rules:
      - 'Every `spec.md` must follow this structure: # Title, ## Overview (1–3 sentences describing what this spec covers and why it exists), ## Requirements (### Requirement: <Name>), ## Constraints (optional), ## Examples (optional), ## Spec Dependencies (required), ## ADRs (optional).'
      - '`## Overview`, `## Requirements`, and `## Spec Dependencies` are mandatory.'
      - 'All other sections are included when they add value.'
  - requirement: 'verify.md structure'
    rules:
      - 'Every `verify.md` must follow this structure: # Verification: <Title>, ## Requirements, ### Requirement: <Name>, #### Scenario: <Name>, - **GIVEN** (optional), - **WHEN** (required), - **THEN** (required), - **AND** (optional).'
      - 'Scenarios are grouped under requirement headings using the same `### Requirement: <name>` pattern as `spec.md` — this is required for the delta merger to correlate scenarios with their requirement when changes are applied.'
      - 'Only scenarios that add information beyond what the requirement prose already states are included.'
      - 'Scenarios that merely restate the obvious happy path are omitted.'
  - requirement: 'Spec Dependencies section'
    rules:
      - 'Every `spec.md` must include a `## Spec Dependencies` section listing other specs it depends on or that provide context for it.'
      - 'If there are none, the section must say `_none_`.'
      - 'Global specs with no dependencies use the form `_none — this is a global constraint spec_`.'
constraints:
  - "`specs/_global/` is for cross-cutting constraints only — not for any single package's implementation details"
  - 'Package spec directories use the short package name: `core`, `cli`, `mcp`, `skills`, `schema-std`, `schema-openspec`'
  - 'Every spec subdirectory contains exactly two files: `spec.md` and `verify.md`'
  - '`spec.md` contains no WHEN/THEN scenarios; `verify.md` contains no requirement prose'
  - 'Subdirectory names are kebab-case'
  - 'A spec in `specs/<package>/` is not binding on any other package'
scenarios:
  - requirement: 'Global specs for cross-cutting constraints'
    name: 'Global constraint applies to all packages'
    when:
      - 'a requirement is defined in `specs/_global/`'
    then:
      - 'it binds all packages in the monorepo without exception'
  - requirement: 'Global specs for cross-cutting constraints'
    name: 'Package-specific concern is not global'
    when:
      - "a requirement only concerns a single package's internals"
    then:
      - 'it must not be placed in `specs/_global/`'
  - requirement: 'Package specs for package-internal concerns'
    name: 'Core use case spec'
    when:
      - 'a spec describes a use case implemented in `@specd/core`'
    then:
      - 'it lives at `specs/core/<topic>/spec.md` and `specs/core/<topic>/verify.md`'
  - requirement: 'Package specs for package-internal concerns'
    name: 'CLI command spec'
    when:
      - 'a spec describes a command implemented in `@specd/cli`'
    then:
      - 'it lives at `specs/cli/<topic>/spec.md` and `specs/cli/<topic>/verify.md`'
  - requirement: 'Spec file naming'
    name: 'Correct spec path'
    when:
      - 'a spec covers delta merging in `@specd/core`'
    then:
      - 'the files are at `specs/core/delta-merger/spec.md` and `specs/core/delta-merger/verify.md`'
  - requirement: 'Spec file naming'
    name: 'Incorrect co-location'
    when:
      - 'a spec file is placed directly in `specs/core/spec.md` with no subdirectory'
    then:
      - 'it does not conform to this layout and must be moved'
  - requirement: 'Spec file naming'
    name: 'Scenarios found in spec.md'
    when:
      - 'a `spec.md` file contains a `#### Scenario:` heading'
    then:
      - 'it does not conform to this layout — scenarios must be moved to `verify.md`'
  - requirement: 'verify.md structure'
    name: 'Requirement heading missing in verify.md'
    when:
      - 'a `verify.md` file contains scenarios not grouped under a `### Requirement:` heading'
    then:
      - 'it does not conform to this layout'
  - requirement: 'Spec Dependencies section'
    name: 'Global spec with no dependencies'
    when:
      - 'a spec in `specs/_global/` has no dependencies on other specs'
    then:
      - 'its `## Spec Dependencies` section reads `_none — this is a global constraint spec_`'
  - requirement: 'Spec Dependencies section'
    name: 'Package spec referencing global constraints'
    when:
      - 'a spec in `specs/core/` is constrained by global architecture rules'
    then:
      - 'it lists `specs/_global/architecture/spec.md` in its `## Spec Dependencies` section'
