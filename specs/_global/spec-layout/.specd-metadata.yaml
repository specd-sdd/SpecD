title: Spec Layout
description: 'Without a consistent layout, specs become hard to discover and tooling cannot locate them reliably. specd specs are organised by scope under `specs/` at the monorepo root — global constraints in `specs/_global/`, package-internal specs in `specs/<package>/`. Every spec subdirectory contains two files: `spec.md` (requirements and design) and `verify.md` (WHEN/THEN scenarios).'
context:
  - 'Without a consistent layout, specs become hard to discover and tooling cannot locate them reliably. specd specs are organised by scope under `specs/` at the monorepo root — global constraints in `specs/_global/`, package-internal specs in `specs/<package>/`. Every spec subdirectory contains two files: `spec.md` (requirements and design) and `verify.md` (WHEN/THEN scenarios).'
rules:
  - requirement: Global specs for cross-cutting constraints
    rules:
      - Specs that apply to all packages — architecture, coding conventions, commit format, testing rules, storage design — live under `specs/_global/<topic>/`. Any spec in `_global/` is a binding constraint on every package in the monorepo.
  - requirement: Package specs for package-internal concerns
    rules:
      - Specs that describe the internals of a specific package live under `specs/<package>/`, where `<package>` is the short package name (e.g. `core`, `cli`, `mcp`, `schema-std`). These specs are not binding on other packages.
  - requirement: Spec file naming
    rules:
      - |-
        Each spec lives in its own named subdirectory and contains two files: `spec.md` and `verify.md`. The subdirectory name is kebab-case and describes the topic concisely.

        * `spec.md` — what the system does: requirements, constraints, examples, rationale
        * `verify.md` — how to confirm it works: WHEN/THEN scenarios

        The two files are always paired. `spec.md` contains no WHEN/THEN scenarios; `verify.md` contains no requirement prose.
  - requirement: spec.md structure
    rules:
      - |-
        Every `spec.md` must follow this structure. Sections marked *optional* may be omitted if not applicable; all other sections are required.

        ```markdown
        # <Title>

        ## Purpose

        <!-- 1–3 sentences: start with WHY this spec exists (the problem or need),
             then briefly describe WHAT it covers to give the reader context. -->

        ## Requirements

        ### Requirement: <Name>

        <!-- Requirement description using SHALL/MUST for normative statements.
             No WHEN/THEN scenarios here — those go in verify.md. -->

        ## Constraints

        <!-- Bullet list of hard rules that apply across all requirements.
             Omit if there are no constraints beyond the requirements. -->

        ## Examples

        <!-- Optional. Concrete usage examples — YAML snippets, CLI invocations, etc.
             Useful as AI context via metadataExtraction. -->

        ## Spec Dependencies

        <!-- List of other specs this spec depends on or that provide context.
             If none, write: _none_ or _none — this is a global constraint spec_ -->

        ## ADRs

        <!-- Links to ADRs that motivated or constrain this spec.
             If none, omit this section. -->
        ```

        `## Purpose`, `## Requirements`, and `## Spec Dependencies` are mandatory. All other sections are included when they add value.
  - requirement: verify.md structure
    rules:
      - |-
        Every `verify.md` must follow this structure. Scenarios are grouped under requirement headings using the same `### Requirement: <name>` pattern as `spec.md` — this is required for AST-based delta selectors to locate scenario nodes by heading when changes are applied to `verify.md`.

        ```markdown
        # Verification: <Title>

        ## Requirements

        ### Requirement: <Name>

        #### Scenario: <Name>

        - **GIVEN** <precondition> <!-- optional; omit when obvious from context -->
        - **AND/OR** <additional precondition> <!-- optional; repeat as needed -->
        - **WHEN** <condition>
        - **AND/OR** <additional condition> <!-- optional; repeat as needed -->
        - **THEN** <expected outcome>
        - **AND/OR** <additional assertion> <!-- optional; repeat as needed -->
        ```

        Only scenarios that add information beyond what the requirement prose already states are included. Scenarios that merely restate the obvious happy path are omitted.
  - requirement: Spec Dependencies section
    rules:
      - Every `spec.md` must include a `## Spec Dependencies` section listing other specs it depends on or that provide context for it. If there are none, the section must say `_none_`. Global specs with no dependencies use the form `_none — this is a global constraint spec_`.
constraints:
  - specs/_global/ is for cross-cutting constraints only — not for any single package's implementation details
  - 'Package spec directories use the short package name: core, cli, mcp, skills, schema-std, schema-openspec'
  - 'Every spec subdirectory contains exactly two authored files: spec.md and verify.md; .specd-metadata.yaml is a generated system file and is not counted'
  - Delta files (spec.md.delta.yaml, verify.md.delta.yaml, etc.) are change artifacts — they live in the change directory alongside the artifact and are never synced to the permanent specs/ directories
  - spec.md contains no WHEN/THEN scenarios; verify.md contains no requirement prose
  - Subdirectory names are kebab-case
  - A spec in specs/<package>/ is not binding on any other package
scenarios:
  - requirement: Global specs for cross-cutting constraints
    name: Global constraint applies to all packages
    when:
      - a requirement is defined in specs/_global/
    then:
      - it binds all packages in the monorepo without exception
  - requirement: Global specs for cross-cutting constraints
    name: Package-specific concern is not global
    when:
      - a requirement only concerns a single package's internals
    then:
      - it must not be placed in specs/_global/
  - requirement: Package specs for package-internal concerns
    name: Core use case spec
    when:
      - a spec describes a use case implemented in @specd/core
    then:
      - it lives at specs/core/<topic>/spec.md and specs/core/<topic>/verify.md
  - requirement: Package specs for package-internal concerns
    name: CLI command spec
    when:
      - a spec describes a command implemented in @specd/cli
    then:
      - it lives at specs/cli/<topic>/spec.md and specs/cli/<topic>/verify.md
  - requirement: Spec file naming
    name: Correct spec path
    when:
      - a spec covers snapshot hashing in @specd/core
    then:
      - the files are at specs/core/snapshot-hasher/spec.md and specs/core/snapshot-hasher/verify.md
  - requirement: Spec file naming
    name: Incorrect co-location
    when:
      - a spec file is placed directly in specs/core/spec.md with no subdirectory
    then:
      - it does not conform to this layout and must be moved
  - requirement: Spec file naming
    name: Scenarios found in spec.md
    when:
      - 'a spec.md file contains a #### Scenario: heading'
    then:
      - it does not conform to this layout — scenarios must be moved to verify.md
  - requirement: verify.md structure
    name: Requirement heading missing in verify.md
    when:
      - 'a verify.md file contains scenarios not grouped under a ### Requirement: heading'
    then:
      - it does not conform to this layout and AST-based delta selectors will fail to locate those scenarios by heading
  - requirement: Spec Dependencies section
    name: Global spec with no dependencies
    when:
      - a spec in specs/_global/ has no dependencies on other specs
    then:
      - 'its ## Spec Dependencies section reads _none — this is a global constraint spec_'
  - requirement: Spec Dependencies section
    name: Package spec referencing global constraints
    when:
      - a spec in specs/core/ is constrained by global architecture rules
    then:
      - 'it lists specs/_global/architecture/spec.md in its ## Spec Dependencies section'
