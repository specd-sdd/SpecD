title: 'ESLint Rules'
description: >
  Specifies the ESLint configuration that enforces coding conventions across
  all packages, including type-aware rules, jsdoc requirements, and import
  restrictions.
keywords:
  - 'eslint'
  - 'linting'
  - 'code-quality'
  - 'typescript'
  - 'type-safety'
  - 'code-style'
dependsOn:
  - 'specs/_global/conventions/'
contentHashes:
  spec.md: 'sha256:cedd44235fc271069dc7cdcc3aafb501037fa39111b938c388b28b8304ff9ece'
  verify.md: 'sha256:158f656872560db796e95015fbc18ebd42510dc6944ce64052d8224244859ab6'
rules:
  - requirement: 'No `any` type'
    rules:
      - 'ESLint must reject explicit `any` type annotations.'
      - 'Use `unknown` at boundaries and narrow with type guards.'
  - requirement: 'Named exports only'
    rules:
      - 'ESLint must reject default exports in all source files.'
  - requirement: 'Explicit return types on public API'
    rules:
      - 'All exported functions and class methods must have explicit return type annotations.'
      - 'Internal functions may rely on inference when the type is obvious.'
  - requirement: 'Kebab-case filenames'
    rules:
      - 'All source files under `src/` must use `kebab-case` naming.'
      - 'This is enforced by the linter to prevent case-sensitivity issues across operating systems.'
  - requirement: 'JSDoc on all functions and classes'
    rules:
      - 'All functions, methods, classes, type aliases, and interfaces in source files must have a JSDoc comment.'
      - 'This includes internal helpers — JSDoc aids code navigation, IDE tooling, and understanding for agents and humans alike.'
      - 'The JSDoc comment must include a description of what the symbol does or represents.'
      - 'The JSDoc comment must include `@param` tags for all parameters (with description) on functions and methods.'
      - 'The JSDoc comment must include `@returns` tag describing the return value on functions and methods (omit for `void`).'
      - 'The JSDoc comment must include `@throws` tag for each error type that can be thrown.'
constraints:
  - 'Type-aware lint rules are enabled for all `.ts` files.'
  - 'Lint errors must be resolved before committing (enforced by lint-staged in the pre-commit hook).'
  - 'Test files (`test/**/*.spec.ts`) are exempt from JSDoc requirements.'
  - '`dist/` and `node_modules/` are excluded from all lint rules.'
scenarios:
  - requirement: 'No `any` type'
    name: 'Explicit any in source'
    given: []
    when:
      - 'a `.ts` file contains `: any` or `as any`'
    then:
      - 'the linter must report an error'
  - requirement: 'Named exports only'
    name: 'Default export added'
    given: []
    when:
      - 'a source file contains `export default`'
    then:
      - 'the linter must report an error'
  - requirement: 'Explicit return types on public API'
    name: 'Exported function without return type'
    given: []
    when:
      - 'an exported function has no explicit return type annotation'
    then:
      - 'the linter must report an error'
  - requirement: 'Explicit return types on public API'
    name: 'Internal function without return type'
    given: []
    when:
      - 'a non-exported function has no return type annotation but the type is inferable'
    then:
      - 'the linter must not report an error'
  - requirement: 'Kebab-case filenames'
    name: 'camelCase source filename'
    given: []
    when:
      - 'a file is named `changeRepository.ts`'
    then:
      - 'the linter must report an error — the file must be renamed to `change-repository.ts`'
  - requirement: 'Kebab-case filenames'
    name: 'PascalCase source filename'
    given: []
    when:
      - 'a file is named `ChangeRepository.ts`'
    then:
      - 'the linter must report an error'
  - requirement: 'JSDoc on all functions and classes'
    name: 'Internal function without JSDoc'
    given: []
    when:
      - 'a non-exported helper function has no JSDoc comment'
    then:
      - 'the linter must report an error'
  - requirement: 'JSDoc on all functions and classes'
    name: 'Method without JSDoc'
    given: []
    when:
      - 'a class method (public or private) has no JSDoc block comment'
    then:
      - 'the linter must report an error'
  - requirement: 'JSDoc on all functions and classes'
    name: 'JSDoc missing @param'
    given: []
    when:
      - 'a function or method has JSDoc but is missing a `@param` tag for one of its parameters'
    then:
      - 'the linter must report an error'
