title: 'Documentation Conventions'
description: >
  All project documentation lives under `docs/`. Each subdirectory has a specific scope. Documentation is written and maintained by agents and humans alike — the same constraints apply to both.
keywords:
  - 'documentation'
  - 'conventions'
  - 'directory'
  - 'structure'
  - 'adr'
  - 'format'
  - 'all'
  - 'files'
  - 'use'
  - 'markdown'
  - 'filenames'
  - 'match'
dependsOn:
  - 'default:_global/conventions'
contentHashes:
  'spec.md': 'sha256:f878defaa38014eda0d78a8a34167e8591d23b62071a2b884c1e76737609d838'
  'verify.md': 'sha256:2bed20f27ce16cffa390fd112ffdc02f1d36ab49c3882c1176c30c328597feb2'
rules:
  - requirement: 'Directory structure'
    rules:
      - 'No documentation lives outside `docs/` except `README.md` at the project root and `AGENTS.md` / `CLAUDE.md` for agent instructions.'
  - requirement: 'ADR format'
    rules:
      - 'Every Architecture Decision Record follows the [MADR](https://adr.github.io/madr/) format (Markdown Architectural Decision Records) verbatim, with one project-specific addition: a `### Spec` sub-section inside `## More Information` linking to the spec(s) that capture constraints derived from this decision.'
constraints:
  - 'All documentation files use Markdown'
  - 'ADR filenames must match the pattern `NNNN-kebab-case-title.md`'
  - 'ADR numbers are sequential and never reused'
  - 'Every significant architectural decision must have an ADR'
  - 'Every ADR must include a `### Spec` sub-section inside `## More Information` linking to the spec(s) that capture its constraints'
  - 'Specs that have associated ADRs include a `## ADRs` section linking to them — omitted if none exist'
  - 'No documentation outside `docs/` except `README.md`, `AGENTS.md`, `CLAUDE.md`'
  - "A spec's `## ADRs` section lists only the ADRs that _produced_ that spec — they are historical provenance, not dependencies"
  - 'A spec may only depend on other specs (`## Spec Dependencies`), never on ADRs directly'
  - "If an ADR's decision needs to be enforced as a constraint, it must first be captured in a spec; that spec is then what other specs depend on"
scenarios:
  - requirement: 'Directory structure'
    name: 'Doc placed outside docs/'
    when:
      - 'a documentation file is created outside `docs/` (excluding `README.md`, `AGENTS.md`, `CLAUDE.md`)'
    then:
      - 'it must be moved to the appropriate subdirectory under `docs/`'
  - requirement: 'ADR format'
    name: 'ADR missing required section'
    when:
      - 'an ADR file is missing `## Context and Problem Statement`, `## Decision Outcome`, or `## More Information` with a `### Spec` sub-section'
    then:
      - 'the review must reject it as malformed'
  - requirement: 'ADR format'
    name: 'ADR missing Confirmation'
    when:
      - "an ADR's `## Decision Outcome` section has no `### Confirmation` sub-section"
    then:
      - 'the review must reject it as malformed'
  - requirement: 'ADR format'
    name: 'ADR with real alternatives omits Considered Options'
    when:
      - 'an ADR describes a decision where multiple options were genuinely evaluated'
    then:
      - 'it must include `## Considered Options` and at least one entry per option evaluated'
  - requirement: 'ADR format'
    name: 'ADR missing frontmatter'
    when:
      - 'an ADR file has no YAML frontmatter block with `status` and `date` fields before the title'
    then:
      - 'the review must reject it as malformed'
  - requirement: 'ADR numbering'
    name: 'Duplicate ADR number'
    when:
      - 'a new ADR is created with a number already used by an existing ADR'
    then:
      - 'it must be renumbered to the next available number'
  - requirement: 'ADR numbering'
    name: 'Superseded ADR'
    when:
      - 'a decision is reversed or replaced by a new ADR'
    then:
      - 'the old ADR updates its status to `Superseded by [ADR-NNNN]` and keeps its number'
  - requirement: 'ADR creation'
    name: 'Significant decision without ADR'
    when:
      - 'a decision affects multiple packages or constrains future development'
    then:
      - 'an ADR must be created before or alongside the implementing code'
  - requirement: 'CLI documentation'
    name: 'New command without docs'
    when:
      - 'a new `specd` command is added to `@specd/cli`'
    then:
      - 'a corresponding `docs/cli/<command>.md` file must be created in the same change'
  - requirement: 'MCP documentation'
    name: 'New MCP tool without docs'
    when:
      - 'a new tool is added to `@specd/mcp`'
    then:
      - 'a corresponding entry in `docs/mcp/` must be created in the same change'
  - requirement: 'Core documentation'
    name: 'New public port without docs'
    when:
      - 'a new port interface is added to `@specd/core/application/ports/`'
    then:
      - 'a corresponding entry in `docs/core/` must be created in the same change'
  - requirement: 'JSDoc on all symbols'
    name: 'Exported function without JSDoc'
    when:
      - 'an exported function in `@specd/core` has no JSDoc block comment'
    then:
      - 'the linter must report an error'
  - requirement: 'JSDoc on all symbols'
    name: 'Internal helper without JSDoc'
    when:
      - 'a non-exported helper function has no JSDoc'
    then:
      - 'the linter must not report an error'
