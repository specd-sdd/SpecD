title: 'Documentation Conventions'
description: >
  Defines where documentation lives, the scope of each subdirectory, and
  constraints for writing ADRs, JSDoc comments, and other project documents.
  Ensures consistency across all docs and enforces standards that apply to
  both human and agent contributions.
keywords:
  - 'documentation'
  - 'adr'
  - 'jsdoc'
  - 'api'
  - 'markdown'
  - 'architecture-decision'
dependsOn:
  - 'specs/_global/conventions/'
contentHashes:
  spec.md: 'sha256:f878defaa38014eda0d78a8a34167e8591d23b62071a2b884c1e76737609d838'
  verify.md: 'sha256:2bed20f27ce16cffa390fd112ffdc02f1d36ab49c3882c1176c30c328597feb2'
rules:
  - requirement: 'Directory structure'
    rules:
      - 'All project documentation lives under `docs/`.'
      - 'Each subdirectory has a specific scope: adr/, cli/, mcp/, core/, schemas/.'
      - 'No documentation lives outside `docs/` except `README.md` at the project root and `AGENTS.md` / `CLAUDE.md` for agent instructions.'
  - requirement: 'ADR format'
    rules:
      - 'Every Architecture Decision Record follows the MADR (Markdown Architectural Decision Records) format verbatim.'
      - 'An ADR must include a `### Spec` sub-section inside `## More Information` linking to the spec(s) that capture constraints derived from the decision.'
      - '`## Decision Drivers`, `## Considered Options`, `## Pros and Cons of the Options`, and `## More Information` are optional — omit them when they add no value.'
      - '`### Confirmation` inside `## Decision Outcome` is always present.'
      - '`### Spec` inside `## More Information` is always present.'
  - requirement: 'ADR numbering'
    rules:
      - 'ADRs are numbered sequentially starting at `0001`.'
      - 'The filename matches the number and a kebab-case title: `NNNN-kebab-case-title.md`.'
      - 'Numbers are never reused — deprecated or superseded ADRs keep their number and update their status.'
  - requirement: 'ADR creation'
    rules:
      - 'An ADR is created for every significant architectural or design decision.'
      - 'Significant means: it affects multiple packages, it constrains future development, or it was a non-obvious choice between real alternatives.'
      - 'Implementation details that follow naturally from prior ADRs do not need their own ADR.'
  - requirement: 'CLI documentation'
    rules:
      - 'Every `specd` command has a corresponding doc file in `docs/cli/` describing its purpose, flags, examples, and exit codes.'
  - requirement: 'MCP documentation'
    rules:
      - 'Every MCP tool and resource exposed by `@specd/mcp` has a corresponding entry in `docs/mcp/` describing its input schema, output schema, and example usage.'
  - requirement: 'Core documentation'
    rules:
      - 'Public types, ports, and use cases in `@specd/core` are documented in `docs/core/` with their purpose, contracts, and usage examples.'
  - requirement: 'JSDoc on all symbols'
    rules:
      - 'All functions, methods, classes, type aliases, and interfaces in all packages must have JSDoc comments — not just public exports.'
      - 'This enables IDE tooling, API doc generation, and self-describing code for both agents and human contributors.'
      - 'JSDoc must include: a description of what the symbol does or represents.'
      - 'JSDoc must include: `@param` for each parameter with a description.'
      - 'JSDoc must include: `@returns` describing the return value (omit for `void` and constructors).'
      - 'JSDoc must include: `@throws` for each error type the function can throw.'
constraints:
  - 'All documentation files use Markdown.'
  - 'ADR filenames must match the pattern `NNNN-kebab-case-title.md`.'
  - 'ADR numbers are sequential and never reused.'
  - 'Every significant architectural decision must have an ADR.'
  - 'Every ADR must include a `### Spec` sub-section inside `## More Information` linking to the spec(s) that capture its constraints.'
  - 'Specs that have associated ADRs include a `## ADRs` section linking to them — omitted if none exist.'
  - 'No documentation outside `docs/` except `README.md`, `AGENTS.md`, `CLAUDE.md`.'
  - "A spec's `## ADRs` section lists only the ADRs that _produced_ that spec — they are historical provenance, not dependencies."
  - 'A spec may only depend on other specs (`## Spec Dependencies`), never on ADRs directly.'
  - "If an ADR's decision needs to be enforced as a constraint, it must first be captured in a spec; that spec is then what other specs depend on."
scenarios:
  - requirement: 'Directory structure'
    name: 'Doc placed outside docs/'
    given:
      - 'A documentation file is created outside `docs/` (excluding `README.md`, `AGENTS.md`, `CLAUDE.md`)'
    when:
      - 'The file is reviewed or validated'
    then:
      - 'It must be moved to the appropriate subdirectory under `docs/`'
  - requirement: 'ADR format'
    name: 'ADR missing required section'
    given:
      - 'An ADR file is being reviewed'
    when:
      - 'It is missing `## Context and Problem Statement`, `## Decision Outcome`, or `## More Information` with a `### Spec` sub-section'
    then:
      - 'The review must reject it as malformed'
  - requirement: 'ADR format'
    name: 'ADR missing Confirmation'
    given:
      - 'An ADR file has a `## Decision Outcome` section'
    when:
      - 'It has no `### Confirmation` sub-section'
    then:
      - 'The review must reject it as malformed'
  - requirement: 'ADR format'
    name: 'ADR with real alternatives omits Considered Options'
    given:
      - 'An ADR describes a decision where multiple options were genuinely evaluated'
    when:
      - 'The ADR is reviewed'
    then:
      - 'It must include `## Considered Options` and at least one entry per option evaluated'
  - requirement: 'ADR format'
    name: 'ADR missing frontmatter'
    given:
      - 'An ADR file is created'
    when:
      - 'It has no YAML frontmatter block with `status` and `date` fields before the title'
    then:
      - 'The review must reject it as malformed'
  - requirement: 'ADR numbering'
    name: 'Duplicate ADR number'
    given:
      - 'A new ADR is being created'
    when:
      - 'Its number is already used by an existing ADR'
    then:
      - 'It must be renumbered to the next available number'
  - requirement: 'ADR numbering'
    name: 'Superseded ADR'
    given:
      - 'A decision is reversed or replaced by a new ADR'
    when:
      - 'The old ADR needs updating'
    then:
      - 'The old ADR updates its status to `Superseded by [ADR-NNNN]` and keeps its number'
  - requirement: 'ADR creation'
    name: 'Significant decision without ADR'
    given:
      - 'A decision affects multiple packages or constrains future development'
    when:
      - 'Code is being submitted'
    then:
      - 'An ADR must be created before or alongside the implementing code'
  - requirement: 'CLI documentation'
    name: 'New command without docs'
    given:
      - 'A new `specd` command is added to `@specd/cli`'
    when:
      - 'The change is submitted'
    then:
      - 'A corresponding `docs/cli/<command>.md` file must be created in the same change'
  - requirement: 'MCP documentation'
    name: 'New MCP tool without docs'
    given:
      - 'A new tool is added to `@specd/mcp`'
    when:
      - 'The change is submitted'
    then:
      - 'A corresponding entry in `docs/mcp/` must be created in the same change'
  - requirement: 'Core documentation'
    name: 'New public port without docs'
    given:
      - 'A new port interface is added to `@specd/core/application/ports/`'
    when:
      - 'The change is submitted'
    then:
      - 'A corresponding entry in `docs/core/` must be created in the same change'
  - requirement: 'JSDoc on all symbols'
    name: 'Exported function without JSDoc'
    given:
      - 'An exported function in `@specd/core` is reviewed'
    when:
      - 'It has no JSDoc block comment'
    then:
      - 'The linter must report an error'
  - requirement: 'JSDoc on all symbols'
    name: 'Internal helper without JSDoc'
    given:
      - 'A non-exported helper function is reviewed'
    when:
      - 'It has no JSDoc'
    then:
      - 'The linter must not report an error'
