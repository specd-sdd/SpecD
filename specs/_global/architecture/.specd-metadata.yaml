title: 'Architecture'
description: >
  Defines hexagonal architecture and domain-driven design principles for specd packages with business logic. Establishes layering rules for domain, application, infrastructure, and composition; requires pure domains, port-based I/O, rich entities, and manual dependency injection. Use this spec when designing or reviewing package structure, dependency directions, layer boundaries, and composition patterns.
keywords:
  - 'architecture'
  - 'hexagonal'
  - 'ports-adapters'
  - 'domain-driven-design'
  - 'layering'
  - 'dependencies'
  - 'entities'
  - 'composition'
  - 'use-case-wiring'
  - 'config-loading'
dependsOn: []
contentHashes:
  spec.md: 'sha256:391763ad2fd1dc16e123060d759a3767302f3282054aa8d8ff8cd7da68039655'
  verify.md: 'sha256:dbbf29057514a748003772a3670aa33c62a8fb2a7e859ec9d9a49d49367cbbff'
rules:
  - requirement: 'Layered structure for packages with business logic'
    rules:
      - 'Any package containing business logic must be organized in three layers: domain, application, and infrastructure.'
      - 'Each layer has strict import rules — inner layers never import from outer layers.'
      - 'Currently @specd/core is the only such package; any future package with domain logic must follow the same structure.'
  - requirement: 'Domain layer is pure'
    rules:
      - 'The domain layer has zero I/O dependencies: no fs, no net, no child_process, no external HTTP.'
      - 'It depends only on the TypeScript standard library and other domain types.'
      - "This applies to every package's domain/ layer."
  - requirement: 'Application layer uses ports only'
    rules:
      - 'The application layer (use cases and application services) interacts with the outside world exclusively through port interfaces defined in application/ports/.'
      - 'It never imports infrastructure adapters directly.'
      - "This applies to every package's application/ layer."
  - requirement: 'Rich domain entities'
    rules:
      - 'Domain entities enforce their own invariants and state machine transitions.'
      - 'Invalid state transitions throw typed domain errors.'
      - 'Use cases do not duplicate invariant checks that belong to the entity.'
      - 'This applies to any domain entity defined in any package.'
  - requirement: 'Domain value objects expose behaviour, not structure'
    rules:
      - 'Domain value objects expose operations and computed properties via methods and getters.'
      - 'Internal representation (e.g. raw segment arrays, backing fields) must not be accessible from outside the class hierarchy.'
      - "This applies to all value objects in any package's domain/ layer."
  - requirement: 'Ports with shared construction are abstract classes'
    rules:
      - 'When a port has constructor arguments that are invariant across all implementations (e.g. scope, ownership, isExternal), it is defined as an abstract class rather than an interface.'
      - 'The abstract class sets those fields in its constructor and exposes them as methods.'
      - 'All storage operations are declared abstract.'
      - 'This lets the TypeScript compiler enforce both the construction contract and the method contract without relying on ESLint or convention.'
      - 'All methods on port abstract classes — including the shared ones from the base — are explicit methods, never property signatures.'
  - requirement: 'Pure functions for stateless domain services'
    rules:
      - 'Domain operations that are stateless and have no I/O are implemented as plain exported functions in domain/services/, not as classes.'
      - 'This applies to any package with a domain/ layer.'
  - requirement: 'Manual dependency injection'
    rules:
      - 'Dependencies are wired manually at the application entry point of each package.'
      - 'No IoC container.'
      - 'Use case constructors receive their port implementations as arguments.'
  - requirement: 'Composition layer for use-case wiring'
    rules:
      - 'Each package with business logic may have a composition/ layer above infrastructure/.'
      - 'This layer is the only layer permitted to import from infrastructure/.'
      - 'It exposes use-case factories (one per use case; construct all required ports internally and return the pre-wired use case; internal ports with a single concrete implementation are constructed here and never exported; each factory supports two call signatures: createX(config: SpecdConfig) and createX(context, options)).'
      - 'It exposes Kernel — createKernel(config: SpecdConfig) calls every use-case factory and returns all use cases grouped by domain area.'
      - 'Config loader port — ConfigLoader is defined in application/ports/ and resolves a SpecdConfig from one or more sources; implementations live in infrastructure/.'
      - 'Concrete adapter classes and repository-level factories are never exported from index.ts.'
      - 'Delivery mechanisms (CLI, MCP) import only use-case factories, the kernel, and the config loader port — never ports, infrastructure classes, or use case constructors.'
  - requirement: 'Adapter packages contain no business logic'
    rules:
      - 'Packages that serve as delivery mechanisms (@specd/cli, @specd/mcp, @specd/plugin-*) contain no business logic.'
      - 'They translate between their delivery mechanism and use cases.'
      - 'Any new adapter package must follow the same rule.'
  - requirement: 'No circular dependencies between packages'
    rules:
      - 'Package dependency direction is strictly one-way: plugin-* → skills → core.'
      - 'cli → core.'
      - 'mcp → core.'
      - 'schema-* has no dependencies on other specd packages.'
      - 'Any new package must fit into this directed graph without introducing cycles.'
constraints:
  - 'In any package with business logic, domain/ must not import from application/, infrastructure/, or composition/.'
  - 'In any package with business logic, application/ must not import from infrastructure/ or composition/.'
  - 'In any package with business logic, infrastructure/ must not import from composition/.'
  - 'Only composition/ may import from infrastructure/; concrete adapter classes and repository-level factories must not be exported from index.ts.'
  - 'Delivery mechanisms import only use-case factories, the kernel, and the config loader port — never ports, infrastructure classes, or use case constructors.'
  - 'Use cases receive all dependencies via constructor — no module-level singletons, in any package.'
  - 'Domain entities must throw typed errors (subclasses of SpecdError) for invalid operations.'
  - 'Stateless domain operations must be plain functions, not classes.'
  - 'Ports with invariant constructor arguments are abstract class, not interface.'
  - 'All port methods are explicit methods — no property signatures.'
  - 'No package may introduce a circular workspace:* dependency.'
scenarios:
  - requirement: 'Layered structure for packages with business logic'
    name: 'Domain imports from infrastructure'
    given: []
    when:
      - 'a file in domain/ imports from infrastructure/'
    then:
      - 'the TypeScript compiler must reject the import'
  - requirement: 'Layered structure for packages with business logic'
    name: 'Application imports infrastructure directly'
    given: []
    when:
      - 'a use case imports a concrete adapter instead of the port interface'
    then:
      - 'the TypeScript compiler must reject the import'
  - requirement: 'Domain layer is pure'
    name: 'Domain imports node:fs'
    given: []
    when:
      - 'a file in domain/ imports node:fs or any I/O module'
    then:
      - 'the TypeScript compiler must reject the import'
  - requirement: 'Application layer uses ports only'
    name: 'Use case receives port via constructor'
    given: []
    when:
      - 'a use case needs to read specs'
    then:
      - 'it receives a SpecRepository port via its constructor, not a concrete FsSpecRepository'
  - requirement: 'Rich domain entities'
    name: 'Invalid state transition'
    given: []
    when:
      - 'a use case attempts an invalid state transition on a domain entity'
    then:
      - 'the entity throws a typed SpecdError subclass before any side effect occurs'
  - requirement: 'Domain value objects expose behaviour, not structure'
    name: 'Value object exposes internal array'
    given: []
    when:
      - 'a value object in domain/ has a public getter that returns its internal backing field directly'
    then:
      - 'it must be replaced with a method or getter that exposes only the behaviour the caller needs'
  - requirement: 'Domain value objects expose behaviour, not structure'
    name: 'Infrastructure adapter accesses internal segments'
    given: []
    when:
      - 'an infrastructure adapter needs a filesystem path from a domain path object'
    then:
      - 'it must call domainPath.toFsPath(sep) — it must not access a segments property'
  - requirement: 'Ports with shared construction are abstract classes'
    name: 'Port has shared construction arguments'
    given: []
    when:
      - 'every possible implementation of a port receives the same set of constructor arguments'
    then:
      - 'the port is an abstract class with those arguments in its constructor, not an interface'
  - requirement: 'Ports with shared construction are abstract classes'
    name: 'Port declares a property instead of a method'
    given: []
    when:
      - 'a port class declares readonly scope: string instead of scope(): string'
    then:
      - 'it must be changed to the method form'
  - requirement: 'Pure functions for stateless domain services'
    name: 'Domain service is a function'
    given: []
    when:
      - 'a developer adds a stateless domain operation to any package'
    then:
      - 'it is exported as a plain function, not as a class with methods'
  - requirement: 'Manual dependency injection'
    name: 'Use case wired at entry point'
    given: []
    when:
      - 'any package boots (CLI, MCP, or future entry points)'
    then:
      - 'it constructs use cases manually, passing concrete adapters to each constructor'
  - requirement: 'Adapter packages contain no business logic'
    name: 'Adapter package contains business logic'
    given: []
    when:
      - 'a command, tool, or plugin implements domain logic instead of delegating to a use case'
    then:
      - 'the logic must be moved to the appropriate core package'
  - requirement: 'No circular dependencies between packages'
    name: 'Cycle introduced by new package'
    given: []
    when:
      - 'a new package declares a workspace:* dependency that creates a cycle'
    then:
      - 'pnpm must reject it'
