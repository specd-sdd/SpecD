title: Database Schema
description: The code graph persists files, symbols, specs, and their relationships in a LadybugDB embedded graph database. The schema defines the exact node tables, relationship tables, full-text search indexes, and versioning strategy. Having the schema specified ensures changes are deliberate and migration-aware.
dependsOn:
  - code-graph:code-graph/symbol-model
  - code-graph:code-graph/graph-store
  - code-graph:code-graph/workspace-integration
context:
  - The code graph persists files, symbols, specs, and their relationships in a LadybugDB embedded graph database. The schema defines the exact node tables, relationship tables, full-text search indexes, and versioning strategy. Having the schema specified ensures changes are deliberate and migration-aware.
rules:
  - requirement: Node tables
    rules:
      - |-
        The database SHALL define the following node tables:

        **File** — source files indexed from workspace code roots.

        | Column      | Type   | Notes                                      |
        | ----------- | ------ | ------------------------------------------ |
        | path        | STRING | Primary key. `{workspace}:{relativePath}`. |
        | language    | STRING | Language identifier (e.g. `typescript`).   |
        | contentHash | STRING | SHA-256 hash of file content.              |
        | workspace   | STRING | Workspace name (e.g. `core`, `cli`).       |

        **Symbol** — code symbols extracted from files.

        | Column     | Type   | Notes                                                                    |
        | ---------- | ------ | ------------------------------------------------------------------------ |
        | id         | STRING | Primary key. `{filePath}:{kind}:{name}:{line}`.                          |
        | name       | STRING | Symbol's declared name.                                                  |
        | searchName | STRING | Expanded name for FTS. camelCase/snake\_case/kebab-case split + original. |
        | kind       | STRING | `SymbolKind` value.                                                      |
        | filePath   | STRING | References `File.path`.                                                  |
        | line       | INT64  | 1-based line number.                                                     |
        | col        | INT64  | 0-based column offset.                                                   |
        | comment    | STRING | Raw preceding comment text, or empty string.                             |

        **Spec** — specification documents from workspace spec directories.

        | Column      | Type   | Notes                                                                                                                                                         |
        | ----------- | ------ | ------------------------------------------------------------------------------------------------------------------------------------------------------------- |
        | specId      | STRING | Primary key. `{workspace}:{specPath}`.                                                                                                                        |
        | path        | STRING | Spec path within the workspace.                                                                                                                               |
        | title       | STRING | From `.specd-metadata.yaml` `title` field.                                                                                                                    |
        | description | STRING | From `.specd-metadata.yaml` `description` field.                                                                                                              |
        | contentHash | STRING | SHA-256 hash of concatenated artifacts (excluding `.specd-metadata.yaml`).                                                                                    |
        | content     | STRING | Concatenated artifact text for full-text search. `spec.md` first if present, then remaining artifacts in alphabetical order. Excludes `.specd-metadata.yaml`. |
        | workspace   | STRING | Workspace name.                                                                                                                                               |

        **Meta** — key-value metadata for the database itself.

        | Column | Type   | Notes                             |
        | ------ | ------ | --------------------------------- |
        | key    | STRING | Primary key (e.g. `lastIndexed`). |
        | value  | STRING | Metadata value.                   |
  - requirement: Relationship tables
    rules:
      - |-
        The database SHALL define the following relationship tables:

        | Relationship | From   | To     | Populated by        |
        | ------------ | ------ | ------ | ------------------- |
        | IMPORTS      | File   | File   | Indexer Pass 2      |
        | DEFINES      | File   | Symbol | Indexer Pass 1      |
        | CALLS        | Symbol | Symbol | Indexer Pass 2      |
        | EXPORTS      | File   | Symbol | Indexer Pass 1      |
        | DEPENDS\_ON   | Spec   | Spec   | Spec indexing phase |
        | COVERS       | Spec   | File   | Deferred to v2+     |

        Relationships have no properties — they are pure edges.
  - requirement: Full-text search indexes
    rules:
      - |-
        The database SHALL create FTS indexes after schema initialization:

        **`symbol_fts`** — on the `Symbol` table, covering `searchName` and `comment` columns. Enables keyword search across symbol names (with camelCase/snake\_case/kebab-case tokenization) and their documentation comments.

        **`spec_fts`** — on the `Spec` table, covering `title`, `description`, and `content` columns. Enables keyword search across spec documentation.

        Both indexes use the `porter` stemmer for English-language stemming. Indexes are created using `CREATE_FTS_INDEX` and queried using `QUERY_FTS_INDEX`, which returns results ranked by BM25 score.

        FTS queries apply WHERE clauses between the `QUERY_FTS_INDEX` CALL and the RETURN for filtering by kind, file path pattern, workspace inclusion/exclusion, and path exclusion patterns. This ensures filters are applied before `ORDER BY score DESC LIMIT n`, avoiding lossy post-query filtering.

        FTS indexes are created once during `open()` after schema DDL. If the index already exists, creation is skipped (idempotent).
  - requirement: Schema versioning
    rules:
      - |-
        The schema SHALL be versioned with an integer `SCHEMA_VERSION` constant. The current version is **5**. When the database is opened:

        1. Execute the DDL statements (all use `IF NOT EXISTS` — safe to re-run)
        2. Create FTS indexes if they do not exist
        3. Store the schema version in the `Meta` table

        Schema version changes require a `--force` re-index to rebuild the database from scratch. There is no incremental migration between versions — the `.lbug` file is deleted and recreated.
  - requirement: Database file location
    rules:
      - The database file SHALL be stored at `{storagePath}/.specd/code-graph.lbug`. The `storagePath` is the project root (derived from `SpecdConfig.projectRoot` or passed directly as `CodeGraphOptions.storagePath`). The `.specd/` directory is created automatically on first `open()` if it does not exist.
constraints:
  - All node table primary keys are STRING — no auto-increment
  - comment on Symbol is stored as empty string (not NULL) when no comment exists, to enable FTS indexing
  - searchName on Symbol is computed at insert time by expandSymbolName(name) — it is a derived column, never set directly by callers
  - content on Spec may be large (full spec text) — no size limit enforced
  - FTS indexes are rebuilt on --force re-index (dropped with the database)
  - Relationship tables have no properties — metadata is not persisted on edges
  - The COVERS relationship table exists in the schema but is not populated until v2+
scenarios:
  - requirement: Node tables
    name: File node stored and retrieved
    given:
      - a FileNode with path core:src/index.ts and workspace core
    when:
      - it is upserted and then retrieved by path
    then:
      - all fields (path, language, contentHash, workspace) are preserved
  - requirement: Node tables
    name: Spec node stores description and content
    given:
      - a SpecNode with title, description, content, and contentHash
    when:
      - it is upserted and then retrieved by specId
    then:
      - all fields including description and content are preserved
  - requirement: Node tables
    name: Symbol comment stored as empty string when absent
    given:
      - a symbol with no preceding comment
    when:
      - it is stored
    then:
      - the comment column contains an empty string, not NULL
  - requirement: Full-text search indexes
    name: Symbol FTS search by name
    given:
      - symbols createUser, deleteUser, listOrders are indexed
    when:
      - QUERY_FTS_INDEX('Symbol', 'symbol_fts', 'user') is called
    then:
      - createUser and deleteUser are returned with BM25 scores
      - AND listOrders is not returned
  - requirement: Full-text search indexes
    name: Symbol FTS search by comment
    given:
      - a symbol with comment /** Validates the user's authentication token */
    when:
      - QUERY_FTS_INDEX('Symbol', 'symbol_fts', 'authentication token') is called
    then:
      - the symbol is returned
  - requirement: Full-text search indexes
    name: Spec FTS search by content
    given:
      - a spec with content containing "lifecycle state transition"
    when:
      - QUERY_FTS_INDEX('Spec', 'spec_fts', 'lifecycle transition') is called
    then:
      - the spec is returned with a BM25 score
  - requirement: Full-text search indexes
    name: Spec FTS search by description
    given:
      - a spec with description "Defines the adapter interface for language-specific parsing"
    when:
      - QUERY_FTS_INDEX('Spec', 'spec_fts', 'adapter parsing') is called
    then:
      - the spec is returned
  - requirement: Full-text search indexes
    name: FTS indexes are idempotent
    when:
      - open() is called twice on the same database
    then:
      - no error occurs — FTS index creation is skipped if already exists
  - requirement: Schema versioning
    name: Schema version 5
    when:
      - a fresh database is opened
    then:
      - the schema version stored in the Meta table is 5
  - requirement: Schema versioning
    name: Old schema requires force re-index
    given:
      - a database created with schema version 4
    when:
      - the application opens it expecting version 5
    then:
      - a --force re-index is required to rebuild
  - requirement: Relationship tables
    name: DEPENDS_ON connects specs
    given:
      - spec A depends on spec B
    when:
      - a DEPENDS_ON relation is created
    then:
      - querying spec A's dependencies returns spec B
  - requirement: Relationship tables
    name: COVERS table exists but is empty
    when:
      - the database schema is initialized
    then:
      - the COVERS relationship table exists
      - AND it contains no rows (v2+ feature)
