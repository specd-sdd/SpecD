generatedBy: 'agent'
title: 'SchemaRegistry Port'
description: 'Defines the SchemaRegistry application-layer port, the single resolution interface for loading schemas from npm packages, workspace directories, or filesystem paths. It decouples use cases from any specific schema source by routing references via prefix conventions and delegating workspace access to SchemaRepository instances. Read this spec when implementing or consuming schema resolution, adding new schema sources, or modifying the resolve/list contract.'
keywords:
  - 'schema-registry'
  - 'application-port'
  - 'schema-resolution'
  - 'prefix-routing'
  - 'workspace-delegation'
  - 'schema-entry'
  - 'resolve-raw'
  - 'hexagonal-architecture'
contentHashes:
  spec.md: 'sha256:347761ec5407038296b89876b15c74708f3d5b7e1d80f93eefdae92b585bd81f'
  verify.md: 'sha256:2b3cba3c67aca63212103710b6f132b51fa8bd0665aeb09fa8881bfcdf56025c'
dependsOn:
  - 'default:_global/architecture'
  - 'core:core/parse-schema-yaml'
  - 'core:core/resolve-schema'
  - 'core:core/schema-repository-port'
rules:
  - requirement: 'Interface shape'
    rules:
      - 'The port MUST be a TypeScript interface named SchemaRegistry with methods resolve, resolveRaw, and list; it SHALL NOT be an abstract class.'
      - 'Implementations MUST receive a ReadonlyMap<string, SchemaRepository> at construction time mapping workspace names to SchemaRepository instances.'
  - requirement: 'Resolve method signature'
    rules:
      - 'resolve(ref: string) MUST return Promise<Schema | null>; null indicates the schema file does not exist.'
      - 'Workspace schema resolution MUST be delegated to the SchemaRepository instance for the target workspace.'
  - requirement: 'Resolve prefix routing'
    rules:
      - '@scope/name references MUST resolve from node_modules/@scope/name/schema.yaml within the registry implementation.'
      - '#workspace:name references MUST be delegated to the SchemaRepository for the given workspace.'
      - '#name or bare name (no prefix) MUST be treated as #default:name and delegated to the default workspace SchemaRepository.'
      - 'Relative or absolute filesystem paths MUST be loaded directly without delegating to any repository.'
      - 'There SHALL be no implicit multi-level fallback between resolution strategies.'
      - 'When a workspace-qualified reference targets a workspace not present in the constructor map, the registry MUST return null.'
  - requirement: 'ResolveRaw method signature'
    rules:
      - 'resolveRaw(ref: string) MUST return Promise<SchemaRawResult | null> where SchemaRawResult contains data (SchemaYamlData), templates (ReadonlyMap<string, string>), and resolvedPath (string).'
      - 'resolveRaw is used by ResolveSchema for the merge pipeline; resolve returns the fully-built Schema entity.'
      - 'resolveRaw MUST use the same prefix routing as resolve and delegate workspace schemas to the corresponding SchemaRepository.'
  - requirement: 'List method signature'
    rules:
      - 'list() MUST accept no parameters and return Promise<SchemaEntry[]>.'
      - 'list SHALL NOT load or validate schema file contents; it MUST only discover available schemas and return metadata.'
      - 'Workspace schema entries MUST be obtained by calling list() on each SchemaRepository instance.'
  - requirement: 'List result ordering'
    rules:
      - 'Results MUST be grouped by source: workspace entries first in workspace declaration order, npm entries last.'
  - requirement: 'SchemaEntry shape'
    rules:
      - 'Each SchemaEntry MUST contain ref (string), name (string), source (npm | workspace), and optionally workspace (string, present only when source is workspace).'
  - requirement: 'Schema re-export'
    rules:
      - 'The port module MUST re-export the Schema type from domain/value-objects/schema.ts.'
constraints:
  - 'The port MUST reside in application/ports/ per hexagonal architecture rules.'
  - 'The port MUST have no direct dependency on node_modules resolution, filesystem APIs, or any I/O.'
  - 'The Schema type is defined in the domain layer and only re-exported by this port module.'
scenarios:
  - requirement: 'Interface shape'
    name: 'Implementation satisfies the contract'
    given:
      - 'a concrete class implementing SchemaRegistry'
    when:
      - 'the class implements resolve, resolveRaw, and list'
    then:
      - 'it compiles and can be instantiated'
  - requirement: 'Resolve method signature'
    name: 'Resolve returns Schema on success'
    given:
      - 'a SchemaRegistry implementation with workspace repositories configured'
      - 'a valid schema reference'
    when:
      - 'resolve is called with the ref'
    then:
      - 'it returns a Promise<Schema> containing the parsed schema'
  - requirement: 'Resolve method signature'
    name: 'Resolve returns null for missing schema'
    given:
      - 'a SchemaRegistry implementation and a reference to a non-existent schema file'
    when:
      - 'resolve is called'
    then:
      - 'it returns null'
  - requirement: 'Resolve prefix routing'
    name: 'npm-scoped reference routes to node_modules'
    when:
      - 'resolve is called with @specd/schema-std'
    then:
      - 'the implementation loads from node_modules/@specd/schema-std/schema.yaml'
  - requirement: 'Resolve prefix routing'
    name: 'Workspace-qualified reference delegates to SchemaRepository'
    given:
      - 'a SchemaRepository for workspace billing is in the registry map'
    when:
      - 'resolve is called with #billing:my-schema'
    then:
      - 'the registry delegates to the billing repository resolve(my-schema)'
  - requirement: 'Resolve prefix routing'
    name: 'Bare name delegates to default workspace repository'
    when:
      - 'resolve is called with spec-driven (no prefix)'
    then:
      - 'the registry delegates to the default repository resolve(spec-driven)'
  - requirement: 'Resolve prefix routing'
    name: 'Hash-only reference delegates to default workspace repository'
    when:
      - 'resolve is called with #my-schema'
    then:
      - 'the registry delegates to the default repository resolve(my-schema)'
  - requirement: 'Resolve prefix routing'
    name: 'Filesystem path is loaded directly'
    when:
      - 'resolve is called with ./custom/schema.yaml'
    then:
      - 'the implementation loads from that path directly without delegating to any repository'
  - requirement: 'Resolve prefix routing'
    name: 'Unknown workspace returns null'
    given:
      - 'no SchemaRepository exists for workspace unknown in the registry map'
    when:
      - 'resolve is called with #unknown:my-schema'
    then:
      - 'it returns null'
  - requirement: 'ResolveRaw method signature'
    name: 'ResolveRaw returns intermediate data on success'
    given:
      - 'a valid schema reference'
    when:
      - 'resolveRaw is called'
    then:
      - 'it returns a SchemaRawResult with data (SchemaYamlData), templates (Map), and resolvedPath (string)'
  - requirement: 'ResolveRaw method signature'
    name: 'ResolveRaw returns null for missing schema'
    given:
      - 'a reference to a non-existent schema file'
    when:
      - 'resolveRaw is called'
    then:
      - 'it returns null'
  - requirement: 'ResolveRaw method signature'
    name: 'ResolveRaw uses same prefix routing as resolve'
    when:
      - 'resolveRaw is called with @specd/schema-std'
    then:
      - 'it resolves from the same location as resolve would'
  - requirement: 'ResolveRaw method signature'
    name: 'ResolveRaw delegates workspace schemas to repository'
    given:
      - 'a SchemaRepository for workspace billing is in the registry map'
    when:
      - 'resolveRaw is called with #billing:my-schema'
    then:
      - 'the registry delegates to the billing repository resolveRaw(my-schema)'
  - requirement: 'List result ordering'
    name: 'Workspace entries appear before npm entries'
    given:
      - 'schemas exist in workspace repositories and in npm packages'
    when:
      - 'list is called'
    then:
      - 'all workspace SchemaEntry items appear before npm SchemaEntry items'
  - requirement: 'List result ordering'
    name: 'List aggregates from all workspace repositories'
    given:
      - 'SchemaRepository instances for default and billing are in the registry map'
      - 'each has schemas'
    when:
      - 'list is called'
    then:
      - 'entries from both repositories are included in the result'
  - requirement: 'SchemaEntry shape'
    name: 'Workspace entry has workspace field'
    given:
      - 'a schema discovered in workspace billing'
    when:
      - 'list returns the entry'
    then:
      - 'source is workspace and workspace is billing'
  - requirement: 'SchemaEntry shape'
    name: 'npm entry omits workspace field'
    given:
      - 'a schema discovered as an npm package'
    when:
      - 'list returns the entry'
    then:
      - 'source is npm and workspace is undefined'
