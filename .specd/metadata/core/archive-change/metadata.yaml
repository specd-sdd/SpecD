generatedBy: 'agent'
title: 'ArchiveChange'
description: >
  Specifies the ArchiveChange use case, which finalizes a change by merging delta artifacts into
  project specs, moving the change directory to the archive, firing pre- and post-archive lifecycle
  hooks, and generating spec metadata. It defines the full execution sequence — schema guard,
  archivable state gate, hook delegation, delta merge, archive repository call, and result shape —
  ensuring atomicity and correct ordering of each step.
keywords:
  - 'archive-change'
  - 'delta-merge'
  - 'spec-sync'
  - 'lifecycle-hooks'
  - 'spec-metadata-generation'
  - 'archived-change'
  - 'change-finalization'
dependsOn:
  - 'core:core/change'
  - 'core:core/schema-format'
  - 'core:core/delta-format'
  - 'core:core/validate-artifacts'
  - 'core:core/storage'
  - 'core:core/run-step-hooks'
  - 'core:core/hook-execution-model'
  - 'core:core/template-variables'
  - 'core:core/spec-metadata'
  - 'core:core/content-extraction'
  - 'default:_global/architecture'
  - 'core:core/workspace'
  - 'core:core/spec-id-format'
contentHashes:
  'spec.md': 'sha256:0cbd3f5565e657b16008d3e126f01dd1100a6819991cb5f543e7a66ed6452b60'
  'verify.md': 'sha256:71254effd9ca5c1ab66a4d0dec00f0f6c0b68aac47818fd1d50f0b895875bcfc'
rules:
  - requirement: 'Ports and constructor'
    rules:
      - 'ArchiveChange receives at construction: ChangeRepository, a ReadonlyMap of SpecRepository instances keyed by workspace name, ArchiveRepository, RunStepHooks, ActorResolver, ArtifactParserRegistry, SchemaProvider, GenerateSpecMetadata, SaveSpecMetadata, and YamlSerializer.'
      - 'Hook execution is delegated to RunStepHooks — ArchiveChange does not receive HookRunner or projectWorkflowHooks directly.'
      - 'SchemaProvider is a lazy caching port returning the fully-resolved schema; it replaces the previous SchemaRegistry + schemaRef + workspaceSchemasPaths triple.'
      - 'All dependencies are injected at kernel composition time, not passed per invocation.'
      - 'specs is keyed by workspace name; ArchiveChange looks up the SpecRepository for each spec ID workspace before reading or writing.'
      - 'ArtifactParserRegistry maps format names (markdown, json, yaml, plaintext) to ArtifactParser adapters; ArchiveChange does not instantiate parsers directly.'
  - requirement: 'Input'
    rules:
      - 'ArchiveChange.execute receives name (the change name) and an optional skipHooks boolean (default false).'
      - 'When skipHooks is true, the use case skips all run: hook execution; the caller is responsible for invoking hooks separately via RunStepHooks.'
  - requirement: 'Schema name guard'
    rules:
      - 'After obtaining the schema from SchemaProvider, ArchiveChange must compare schema.name() with change.schemaName and throw SchemaMismatchError if they differ.'
      - 'The schema name guard must execute before the archivable guard, any hooks, or file modifications.'
  - requirement: 'Archivable guard'
    rules:
      - 'The first step after the schema name guard must call change.assertArchivable(), which throws InvalidStateTransitionError if the change is not in archivable state.'
      - 'After the guard passes, ArchiveChange must transition the change to archiving via change.transition(archiving, actor) and persist via ChangeRepository.save(change) before any hooks or file modifications.'
  - requirement: 'Pre-archive hooks'
    rules:
      - 'When skipHooks is false, ArchiveChange must delegate to RunStepHooks.execute({ name, step: archiving, phase: pre }) after the archivable guard passes.'
      - 'If any pre-archive run: hook fails, ArchiveChange must throw HookFailedError with the hook command, exit code, and stderr; no files are modified.'
      - 'When skipHooks is true, pre-archive hook execution is skipped entirely.'
  - requirement: 'Delta merge and spec sync'
    rules:
      - 'For each spec ID in change.specIds, resolve the active schema for that spec workspace and iterate over artifacts with scope: spec.'
      - 'If artifact.getFile(specId) returns absent, missing, or skipped status, skip that artifact.'
      - 'For delta: true artifacts with an existing .delta.yaml: parse the delta file as YAML, look up the ArtifactParser for the artifact format, load the base from SpecRepository (or treat as empty if absent), call ArtifactParser.apply(baseAST, deltaEntries), and save the serialized result.'
      - 'For delta: true artifacts without a .delta.yaml: fall back to copying the primary file directly from ChangeRepository to SpecRepository (handles new specs under delta-capable artifact types).'
      - 'For delta: false artifacts: load the artifact file from ChangeRepository and save directly to SpecRepository.'
      - 'If ArtifactParser.apply throws DeltaApplicationError, re-throw it.'
      - 'If no ArtifactParser adapter is registered for the artifact format, throw.'
      - 'Markdown merge output must preserve inline formatting and list/style conventions from the base artifact in untouched sections.'
      - 'When base markdown uses mixed style markers, archive-time serialization must be deterministic and follow project markdown conventions.'
  - requirement: 'Archive repository call'
    rules:
      - 'After syncing all specs, resolve the actor via ActorResolver.identity(); if identity() throws, proceed without an actor.'
      - 'Call archiveRepository.archive(change, { actor }) when an actor is available, or archiveRepository.archive(change, {}) when not.'
      - 'ArchiveChange never constructs ArchivedChange directly — the repository returns it.'
      - 'archivedName must follow the pattern YYYYMMDD-HHmmss-<name> derived from change.createdAt, not wall-clock time.'
      - 'archivedAt is set by the repository at archive completion time.'
      - 'archivedBy is the git identity of the actor; absent when unavailable.'
      - 'workspace is the SpecPath of the primary workspace (the first entry in change.workspaces).'
      - 'ArchivedChange has no approval field and no wasStructural flag.'
  - requirement: 'Post-archive hooks'
    rules:
      - 'When skipHooks is false, delegate to RunStepHooks.execute({ name, step: archiving, phase: post }) after archiveRepository.archive() succeeds.'
      - 'Post-archive hook failures do not roll back the archive; failures are collected and returned in postHookFailures.'
      - 'When skipHooks is true, post-archive hook execution is skipped entirely.'
  - requirement: 'Spec metadata generation'
    rules:
      - 'After post-archive hooks, generate .specd-metadata.yaml for each spec modified during delta merge and spec sync.'
      - 'For each modified spec: resolve the schema, load and parse requiredSpecArtifacts via ArtifactParser, call extractMetadata() with the schema metadataExtraction declarations.'
      - 'If change.specDependsOn has an entry for the spec, use it as dependsOn instead of the extracted value.'
      - 'Compute contentHashes by hashing each requiredSpecArtifacts file.'
      - 'Serialize the metadata as YAML and write via SaveSpecMetadata.'
      - 'If metadata generation fails (e.g. MetadataValidationError), collect the failure in staleMetadataSpecPaths but do not abort the archive.'
  - requirement: 'Result shape'
    rules:
      - 'ArchiveChange.execute returns a result with archivedChange (the persisted ArchivedChange record), postHookFailures (array of failed post-archive hooks, empty on success), and staleMetadataSpecPaths (array of spec paths where metadata generation failed, empty on success).'
      - 'Pre-archive hook failures and assertArchivable failures throw; post-archive failures are returned, not thrown.'
constraints:
  - 'change.assertArchivable() must be called before any hooks or file modifications.'
  - 'Pre-archive hook failures abort the archive and throw — no partial state is written.'
  - 'Post-archive hook failures are returned in the result; the archive is not rolled back.'
  - 'ArchiveChange must not call change.invalidate() or any mutation on the Change entity — the change is already at its terminal state.'
  - 'ArchiveChange never constructs ArchivedChange directly — it is always returned by archiveRepository.archive(change, { actor }).'
  - 'archivedName must be derived from change.createdAt by the repository — never from wall-clock time at archive execution.'
  - 'ArchiveChange does not delete the change from ChangeRepository — FsArchiveRepository.archive() moves the directory as part of the archive operation.'
  - 'Metadata generation failures do not abort the archive — failures are collected in staleMetadataSpecPaths.'
  - 'Hook execution is delegated to RunStepHooks — ArchiveChange does not call HookRunner directly.'
scenarios:
  - requirement: 'Archivable guard'
    name: 'Change not in archivable state'
    given:
      - 'a change that is not in archivable state'
    when:
      - 'ArchiveChange.execute is called'
    then:
      - 'InvalidStateTransitionError is thrown'
      - 'no hooks are executed and no files are modified'
  - requirement: 'Archivable guard'
    name: 'Change in archivable state transitions to archiving'
    given:
      - 'the change is in archivable state'
    when:
      - 'ArchiveChange.execute is called'
    then:
      - 'the archivable guard passes'
      - 'the change transitions to archiving via change.transition(archiving, actor)'
      - 'the change is persisted via ChangeRepository.save(change)'
      - 'execution proceeds to pre-archive hooks'
  - requirement: 'Pre-archive hooks'
    name: 'Pre-archive run hook executes before file sync'
    given:
      - 'the schema declares workflow.archiving.hooks.pre: [{ run: pnpm test }]'
    when:
      - 'ArchiveChange.execute is called'
    then:
      - 'pnpm test is executed before any spec files are written'
  - requirement: 'Pre-archive hooks'
    name: 'Failing pre-archive hook aborts archive'
    given:
      - 'a pre-archive run: hook exits with code 1'
    when:
      - 'ArchiveChange.execute is called'
    then:
      - 'HookFailedError is thrown'
      - 'no spec files are written or modified'
  - requirement: 'Pre-archive hooks'
    name: 'instruction entries in pre hooks are not executed'
    given:
      - 'the schema declares a workflow.archiving.hooks.pre entry with instruction: Review delta specs'
    when:
      - 'ArchiveChange.execute is called'
    then:
      - 'no shell command is run for the instruction entry'
      - 'execution proceeds to the next hook'
  - requirement: 'Delta merge and spec sync'
    name: 'Delta artifact merged into base spec'
    given:
      - 'a change artifact contains delta modifications under ## MODIFIED Requirements'
      - 'the base spec in SpecRepository has a ## Requirements section with the targeted block'
    when:
      - 'ArchiveChange.execute is called'
    then:
      - 'the merged content (with the modification applied) is saved to SpecRepository'
  - requirement: 'Delta merge and spec sync'
    name: 'New artifact synced directly'
    given:
      - 'a change artifact with no deltas[] configuration (a new file)'
    when:
      - 'ArchiveChange.execute is called'
    then:
      - 'the artifact content is saved as-is to SpecRepository'
  - requirement: 'Delta merge and spec sync'
    name: 'New spec with delta-capable artifact copied to project'
    given:
      - 'a change has a spec ID for a spec that does not yet exist in the project'
      - 'the schema declares the artifact type with delta: true'
      - 'the change directory contains a full primary file instead of a .delta.yaml'
    when:
      - 'ArchiveChange.execute is called'
    then:
      - 'the primary file content is copied directly to SpecRepository'
      - 'the spec directory and file are created in the project'
  - requirement: 'Delta merge and spec sync'
    name: "Optional artifact with missing status \u2014 not synced"
    given:
      - 'an optional artifact declared in the schema has no file in the change directory and validatedHash is null (status missing)'
    when:
      - 'ArchiveChange.execute is called'
    then:
      - 'that artifact is not synced and no entry is created in SpecRepository'
  - requirement: 'Delta merge and spec sync'
    name: "Optional artifact with skipped status \u2014 not synced"
    given:
      - 'an optional artifact has validatedHash: __skipped__ in the manifest (status skipped) and no file in the change directory'
    when:
      - 'ArchiveChange.execute is called'
    then:
      - 'that artifact is not synced and no entry is created in SpecRepository'
  - requirement: 'Delta merge and spec sync'
    name: 'Conflict detected at archive time'
    given:
      - 'the delta file has a conflict (same block in MODIFIED and REMOVED)'
    when:
      - 'ArchiveChange.execute reaches the merge step'
    then:
      - 'DeltaConflictError is thrown'
  - requirement: 'Delta merge and spec sync'
    name: 'Markdown delta merge preserves untouched inline formatting'
    given:
      - 'a base markdown spec with untouched prose containing inline code like specd change validate <name>'
      - 'the delta modifies a different section in the same file'
    when:
      - 'ArchiveChange.execute merges and serializes the markdown artifact'
    then:
      - 'untouched prose still contains inline-code backticks and unescaped <name> text'
  - requirement: 'Delta merge and spec sync'
    name: 'Mixed markdown style serializes deterministically'
    given:
      - 'a base markdown spec that mixes unordered list markers (- and *) or emphasis markers (* and _) for the same construct'
    when:
      - 'ArchiveChange.execute merges and serializes the markdown artifact'
    then:
      - 'output style is deterministic and follows project markdown conventions'
  - requirement: 'ArchivedChange construction'
    name: 'archivedName derived from createdAt'
    given:
      - 'a change with createdAt = 2024-01-15T12:00:00Z and name = add-auth-flow'
    when:
      - 'ArchiveChange constructs the ArchivedChange'
    then:
      - 'archivedName is 20240115-120000-add-auth-flow'
  - requirement: 'ArchivedChange construction'
    name: 'ArchivedChange has no approval or wasStructural fields'
    when:
      - 'ArchiveChange constructs the ArchivedChange'
    then:
      - 'the result has no approval field and no wasStructural field'
  - requirement: 'Post-archive hooks'
    name: 'Post-archive hook runs after archive'
    given:
      - 'the schema declares workflow.archiving.hooks.post: [{ run: git commit -m "archive" }]'
    when:
      - 'ArchiveChange.execute succeeds'
    then:
      - 'the run: command executes after archiveRepository.archive() is called'
  - requirement: 'Post-archive hooks'
    name: 'Failing post-archive hook does not roll back archive'
    given:
      - 'a post-archive run: hook exits with code 1'
    when:
      - 'ArchiveChange.execute is called'
    then:
      - 'the archive is not rolled back'
      - "the result's postHookFailures includes the failed hook"
  - requirement: 'Spec metadata generation'
    name: 'Metadata generated for modified specs after archive'
    given:
      - 'a change modifies specs auth/login and auth/register'
    when:
      - 'ArchiveChange.execute completes successfully'
    then:
      - '.specd-metadata.yaml is written for both auth/login and auth/register with title, description, dependsOn, contentHashes, and any rules, constraints, scenarios extracted from the spec content'
  - requirement: 'Spec metadata generation'
    name: 'Manifest specDependsOn overrides extracted dependsOn'
    given:
      - 'a change has specDependsOn: { default:auth/login: [default:auth/shared] }'
      - "the spec's ## Spec Dependencies section links to auth/jwt"
    when:
      - 'ArchiveChange.execute generates metadata for auth/login'
    then:
      - 'the written .specd-metadata.yaml has dependsOn: [default:auth/shared] (from the manifest, not from extraction)'
  - requirement: 'Spec metadata generation'
    name: 'Metadata generation failure does not abort archive'
    given:
      - "a spec has no # Title heading and the schema's metadataExtraction.title selector matches nothing"
    when:
      - 'ArchiveChange.execute runs metadata generation for that spec'
    then:
      - 'the archive is not rolled back'
      - 'the spec path appears in staleMetadataSpecPaths'
  - requirement: 'Spec metadata generation'
    name: 'staleMetadataSpecPaths empty on full success'
    given:
      - 'all modified specs produce valid metadata'
    when:
      - 'ArchiveChange.execute completes'
    then:
      - 'staleMetadataSpecPaths is empty'
  - requirement: 'Result shape'
    name: 'Successful archive returns result'
    when:
      - 'ArchiveChange.execute completes successfully'
    then:
      - 'the result includes the ArchivedChange record'
      - 'postHookFailures is empty'
  - requirement: 'Result shape'
    name: 'Pre-archive failure throws'
    when:
      - 'a pre-archive hook fails'
    then:
      - 'ArchiveChange.execute throws and does not return a result'
