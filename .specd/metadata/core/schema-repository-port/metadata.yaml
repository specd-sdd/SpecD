generatedBy: 'agent'
title: 'SchemaRepository Port'
description: 'Application-layer port for reading and listing schemas within a single workspace. Extends the Repository base class to provide workspace-scoped schema resolution (raw and full) and discovery, decoupling the SchemaRegistry from internal storage layout. Read this spec when implementing or consuming workspace-level schema access.'
keywords:
  - 'schema-repository'
  - 'application-port'
  - 'workspace-scoping'
  - 'schema-resolution'
  - 'abstract-class'
  - 'schema-entry'
  - 'schema-raw-result'
  - 'hexagonal-architecture'
dependsOn:
  - 'core:core/repository-port'
  - 'default:_global/architecture'
  - 'core:core/schema-registry-port'
  - 'core:core/parse-schema-yaml'
  - 'core:core/workspace'
contentHashes:
  spec.md: 'sha256:26e9a7e859209f3c7a4fbadbde10320523e2731537e7c70519190e5eede9d80f'
  verify.md: 'sha256:896defcd37f270352a3d980f03e0e255814ae63c795267a2f86e8b2df2eba8c0'
rules:
  - requirement: 'Inheritance from Repository base'
    rules:
      - 'SchemaRepository MUST extend Repository; workspace(), ownership(), and isExternal() accessors MUST reflect construction-time values and remain immutable for the instance lifetime.'
  - requirement: 'Workspace scoping'
    rules:
      - 'Each SchemaRepository instance is bound to exactly one workspace; resolveRaw, resolve, and list MUST operate only within that workspace. Access to multiple workspaces requires multiple instances.'
  - requirement: 'Abstract class with abstract methods'
    rules:
      - 'SchemaRepository MUST be an abstract class (not an interface) with resolveRaw, resolve, and list declared as abstract methods.'
  - requirement: 'resolveRaw method signature'
    rules:
      - 'resolveRaw(name: string) MUST accept a schema name (post-prefix segment) and return Promise<SchemaRawResult | null>.'
      - 'SchemaRawResult MUST contain data: SchemaYamlData, templates: ReadonlyMap<string, string>, and resolvedPath: string.'
      - 'A null return indicates the schema does not exist in this workspace.'
  - requirement: 'resolve method signature'
    rules:
      - 'resolve(name: string) MUST accept a schema name and return Promise<Schema | null>, loading and building the full domain Schema entity. Null indicates the schema does not exist.'
  - requirement: 'list method signature'
    rules:
      - 'list() MUST accept no parameters and return Promise<SchemaEntry[]>, discovering available schemas without loading or validating contents.'
      - 'Each SchemaEntry MUST have source set to "workspace" and workspace set to this repository workspace name.'
  - requirement: 'SchemaRawResult and SchemaEntry re-export'
    rules:
      - 'The port module MUST re-export SchemaRawResult and SchemaEntry types from the SchemaRegistry port module.'
constraints:
  - 'The port MUST live in application/ports/ per hexagonal architecture rules.'
  - 'No direct dependency on filesystem APIs or any I/O at the port level.'
  - 'Each instance is bound to a single workspace; workspace identity is immutable after construction.'
  - 'list() returns lightweight SchemaEntry metadata only; schema content is never loaded by this method.'
  - 'All methods MUST be explicit methods, not property signatures.'
scenarios:
  - requirement: 'Inheritance from Repository base'
    name: 'Accessors reflect construction-time values'
    given:
      - 'a SchemaRepository constructed with workspace "billing", ownership "readOnly", isExternal true'
    when:
      - 'the accessors are called'
    then:
      - 'workspace() returns "billing", ownership() returns "readOnly", isExternal() returns true'
  - requirement: 'Workspace scoping'
    name: 'Operations only access schemas within the bound workspace'
    given:
      - 'a SchemaRepository bound to workspace "billing" with schemasPath /billing/schemas'
    when:
      - 'resolve("my-schema") is called'
    then:
      - 'the implementation looks only within /billing/schemas/my-schema/schema.yaml'
      - 'never accesses schemas from other workspaces'
  - requirement: 'Abstract class with abstract methods'
    name: 'Subclass must implement all abstract methods'
    given:
      - 'a class that extends SchemaRepository without implementing resolveRaw, resolve, or list'
    when:
      - 'the code is compiled'
    then:
      - 'the TypeScript compiler reports errors for each unimplemented abstract method'
  - requirement: 'resolveRaw method signature'
    name: 'resolveRaw returns intermediate data on success'
    given:
      - 'a schema named "spec-driven" exists in this workspace'
    when:
      - 'resolveRaw("spec-driven") is called'
    then:
      - 'it returns a SchemaRawResult with data (SchemaYamlData), templates (Map), and resolvedPath (string)'
  - requirement: 'resolveRaw method signature'
    name: 'resolveRaw returns null for missing schema'
    given:
      - 'no schema named "nonexistent" exists in this workspace'
    when:
      - 'resolveRaw("nonexistent") is called'
    then:
      - 'it returns null'
  - requirement: 'resolve method signature'
    name: 'resolve returns Schema on success'
    given:
      - 'a schema named "spec-driven" exists in this workspace'
    when:
      - 'resolve("spec-driven") is called'
    then:
      - 'it returns a Schema entity'
  - requirement: 'resolve method signature'
    name: 'resolve returns null for missing schema'
    given:
      - 'no schema named "nonexistent" exists in this workspace'
    when:
      - 'resolve("nonexistent") is called'
    then:
      - 'it returns null'
  - requirement: 'list method signature'
    name: 'list returns entries for all schemas in the workspace'
    given:
      - 'a workspace with two schemas: "alpha" and "beta"'
    when:
      - 'list() is called'
    then:
      - 'it returns two SchemaEntry objects'
      - 'each has source set to "workspace" and workspace set to this repository workspace name'
  - requirement: 'list method signature'
    name: 'list does not load schema contents'
    given:
      - 'a workspace with a schema that has an invalid schema.yaml'
    when:
      - 'list() is called'
    then:
      - 'it returns a SchemaEntry for that schema without throwing a validation error'
  - requirement: 'SchemaRawResult and SchemaEntry re-export'
    name: 'Types are importable from the port module'
    given: []
    when:
      - 'a consumer imports SchemaRawResult and SchemaEntry from the schema-repository port module'
    then:
      - 'the imports resolve successfully'
