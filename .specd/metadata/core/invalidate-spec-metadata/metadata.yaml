title: Invalidate Spec Metadata
description: When a spec's content changes outside the normal archive flow, its metadata becomes untrustworthy but deleting the entire file would lose curated fields like `dependsOn` and `description`. The `InvalidateSpecMetadata` use case marks the metadata as stale by removing only the `contentHashes` field, which causes all downstream consumers (staleness detection, `spec list --metadata-status`) to treat it as stale and forces regeneration on the next metadata pass. All other fields (title, description, rules, scenarios, etc.) are preserved.
dependsOn:
  - core:core/spec-metadata
  - core:core/storage
context:
  - When a spec's content changes outside the normal archive flow, its metadata becomes untrustworthy but deleting the entire file would lose curated fields like `dependsOn` and `description`. The `InvalidateSpecMetadata` use case marks the metadata as stale by removing only the `contentHashes` field, which causes all downstream consumers (staleness detection, `spec list --metadata-status`) to treat it as stale and forces regeneration on the next metadata pass. All other fields (title, description, rules, scenarios, etc.) are preserved.
rules:
  - requirement: Removes contentHashes
    rules:
      - 'When executed, the use case reads the existing metadata via `SpecRepository.metadata()`, removes the `contentHashes` key from the parsed YAML, and writes the result back via `SpecRepository.saveMetadata()`. The write uses `force: true` to skip conflict detection — invalidation is always unconditional.'
  - requirement: Preserves other fields
    rules:
      - All fields other than `contentHashes` remain unchanged in the rewritten file. The use case does not validate the remaining content against the strict schema — it is a targeted mutation, not a full rewrite.
  - requirement: Error on unknown workspace or spec
    rules:
      - If the workspace does not exist in the configured repositories, the use case throws `WorkspaceNotFoundError`. If the spec does not exist in the workspace, it throws `SpecNotFoundError`.
  - requirement: Returns null when not applicable
    rules:
      - |-
        The use case returns `null` (no-op) when:

        - The spec has no metadata file
        - The file content is not a YAML mapping (e.g. scalar, null)

        In all other cases it returns `{ spec: '<workspace>:<path>' }`.
  - requirement: No strict validation on write
    rules:
      - Because the use case intentionally removes `contentHashes` (a required field in `strictSpecMetadataSchema`), it bypasses `SaveSpecMetadata` and writes directly through `SpecRepository.saveMetadata()`. This is the only use case that writes metadata without strict validation.
constraints:
  - The use case contains no CLI or delivery logic — it operates purely through the SpecRepository port
  - 'The write is always forced (force: true) — there is no conflict detection for invalidation'
  - The use case never deletes the metadata file — it only strips contentHashes
  - Metadata is read via SpecRepository.metadata() and written via SpecRepository.saveMetadata()
scenarios:
  - requirement: Removes contentHashes
    name: Existing metadata with contentHashes
    given:
      - a spec with metadata containing title, description, contentHashes, and rules
    when:
      - InvalidateSpecMetadata is executed for that spec
    then:
      - the rewritten file has no contentHashes field
      - AND the spec appears as stale in staleness detection
  - requirement: Removes contentHashes
    name: Existing metadata without contentHashes
    given:
      - a spec with metadata that has no contentHashes field
    when:
      - InvalidateSpecMetadata is executed for that spec
    then:
      - the file is rewritten unchanged (no-op content-wise)
      - AND the result is still returned (not null)
  - requirement: Preserves other fields
    name: Title, description, rules survive invalidation
    given:
      - "a spec with metadata containing title: 'Auth', description: 'Handles auth', rules, and contentHashes"
    when:
      - InvalidateSpecMetadata is executed
    then:
      - "the rewritten file contains title: 'Auth', description: 'Handles auth', and rules exactly as before"
  - requirement: Error on unknown workspace or spec
    name: Unknown workspace
    when:
      - InvalidateSpecMetadata is executed with a workspace that does not exist
    then:
      - it throws WorkspaceNotFoundError
  - requirement: Error on unknown workspace or spec
    name: Unknown spec
    when:
      - InvalidateSpecMetadata is executed for a spec path that does not exist
    then:
      - it throws SpecNotFoundError
  - requirement: Returns null when not applicable
    name: No metadata file
    given:
      - a spec that exists but has no metadata
    when:
      - InvalidateSpecMetadata is executed for that spec
    then:
      - the result is null — no file is created
  - requirement: Returns null when not applicable
    name: Non-mapping content
    given:
      - a spec with metadata containing a scalar value (e.g. "hello")
    when:
      - InvalidateSpecMetadata is executed
    then:
      - the result is null — the file is not modified
