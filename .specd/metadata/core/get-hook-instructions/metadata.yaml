title: GetHookInstructions
description: 'Workflow steps declare `instruction:` hooks — text blocks that guide agent behaviour at step boundaries. These instructions are distinct from context (specs, metadata, artifact rules) and must be retrieved separately. `GetHookInstructions` is the sole consumer of `instruction:` hooks: it returns instruction text for a given step and phase, optionally filtered by hook ID. Both native specd skills and external agent tools (e.g. Claude Code hooks) use this to retrieve step instructions independently from context compilation.'
dependsOn:
  - core:core/hook-execution-model
  - core:core/schema-format
  - core:core/config
  - core:core/change
  - core:core/template-variables
  - core:core/archive-repository-port
context:
  - 'Workflow steps declare `instruction:` hooks — text blocks that guide agent behaviour at step boundaries. These instructions are distinct from context (specs, metadata, artifact rules) and must be retrieved separately. `GetHookInstructions` is the sole consumer of `instruction:` hooks: it returns instruction text for a given step and phase, optionally filtered by hook ID. Both native specd skills and external agent tools (e.g. Claude Code hooks) use this to retrieve step instructions independently from context compilation.'
rules:
  - requirement: Ports and constructor
    rules:
      - |-
        `GetHookInstructions` receives at construction time: `ChangeRepository`, `ArchiveRepository`, `SchemaProvider`, and `TemplateExpander`.

        ```typescript
        class GetHookInstructions {
          constructor(
            changes: ChangeRepository,
            archive: ArchiveRepository,
            schemaProvider: SchemaProvider,
            expander: TemplateExpander,
          )
        }
        ```

        `SchemaProvider` returns the fully-resolved schema with plugins and overrides applied — all workflow hooks (including those added via `schemaOverrides`) are already present in the schema's workflow steps. All dependencies are injected at kernel composition time.
  - requirement: Input
    rules:
      - |-
        `GetHookInstructions.execute` receives:

        - `name` (string, required) — the change name
        - `step` (string, required) — the workflow step name
        - `phase` (`'pre'` | `'post'`, required) — which hook phase to query
        - `only` (string, optional) — when provided, filters to a single hook by its `id`
  - requirement: Change lookup
    rules:
      - |-
        `GetHookInstructions` loads the change by name via `ChangeRepository`. If no change exists with the given name **and** the requested step is `'archiving'` with phase `'post'`, it MUST fall back to `ArchiveRepository.get(name)`. If the change is found in the archive, it MUST be used for template variable construction (using `ArchivedChange.name`, `ArchivedChange.workspace`, and `ArchiveRepository.archivePath(archivedChange)` for the `change.path` variable). If the change is not found in the archive either, it MUST throw `ChangeNotFoundError`.

        For all other step/phase combinations, if `ChangeRepository.get(name)` returns null, `GetHookInstructions` MUST throw `ChangeNotFoundError` immediately — the archive fallback does not apply.
  - requirement: Schema name guard
    rules:
      - After resolving the schema, `GetHookInstructions` MUST compare `schema.name()` with `change.schemaName`. If they differ, it MUST throw `SchemaMismatchError`.
  - requirement: Step resolution
    rules:
      - |-
        `GetHookInstructions` validates that `step` is a valid `ChangeState` (a lifecycle state defined by the domain, which includes `archiving`). If it is not, it MUST throw `StepNotValidError`.

        If the step is a valid lifecycle state, `GetHookInstructions` looks up the workflow step entry via `schema.workflowStep(step)`. If no matching entry exists (the schema does not declare hooks for this state), the use case returns `{ phase, instructions: [] }` — no error is thrown.
  - requirement: Instruction collection
    rules:
      - |-
        For the matched step and phase, `GetHookInstructions` MUST collect `instruction:` hooks from `workflow[step].hooks[phase]` — only entries with `type: 'instruction'`, in declaration order.

        `run:` entries (type `'run'`) MUST be skipped — they are not instruction text.

        All hooks — whether from the base schema, plugins, or overrides — are already merged into the schema's workflow steps by `ResolveSchema`. There is no separate project-level hook collection.
  - requirement: Hook filtering with --only
    rules:
      - When `only` is provided, the result MUST contain only the hook whose `id` matches. If no hook matches the ID, the use case MUST throw `HookNotFoundError` with reason `'not-found'`. If the ID matches a `run:` hook instead of an `instruction:` hook, the use case MUST throw `HookNotFoundError` with reason `'wrong-type'`.
  - requirement: Result shape
    rules:
      - |-
        `GetHookInstructions.execute` MUST return a result object containing:

        - `phase` (`'pre'` | `'post'`) — the queried phase (always matches the input)
        - `instructions` — array of instruction entries, each with:
          - `id` (string) — the hook's `id`
          - `text` (string) — the instruction text verbatim

        When no `instruction:` hooks exist for the step+phase, the result is `{ phase, instructions: [] }`.
constraints:
  - This use case is read-only — it does not modify the change or execute any commands
  - 'run: hooks are always excluded from results'
  - Schema-level hooks precede project-level hooks, consistent with hook ordering
  - This use case does not evaluate step availability — it returns instructions regardless of whether the step is currently available
scenarios:
  - requirement: Schema name guard
    name: Schema mismatch throws SchemaMismatchError
    given:
      - a change created with schema spec-driven
      - AND SchemaProvider.get() returns a schema named custom-schema
    when:
      - execute is called
    then:
      - SchemaMismatchError is thrown
      - AND no hooks are executed
  - requirement: Step resolution
    name: Invalid step name throws StepNotValidError
    given:
      - a valid schema
    when:
      - 'GetHookInstructions.execute is called with step: "reviewing"'
    then:
      - StepNotValidError is thrown because reviewing is not a valid ChangeState
  - requirement: Step resolution
    name: Archiving step is accepted as a valid ChangeState
    given:
      - a schema with workflow steps [designing, implementing, verifying, archiving]
    when:
      - 'GetHookInstructions.execute is called with step: "archiving"'
    then:
      - no error is thrown
      - AND the step is resolved normally via schema.workflowStep("archiving")
  - requirement: Step resolution
    name: Valid state without workflow entry returns empty
    given:
      - a schema with workflow steps [designing, implementing, verifying, archiving]
    when:
      - 'GetHookInstructions.execute is called with step: "ready" and phase: "pre"'
    then:
      - 'the result is { phase: "pre", instructions: [] }'
  - requirement: Instruction collection
    name: Only instruction hooks are collected
    given:
      - 'a step with hooks.pre: [{ id: "guidance", type: "instruction", text: "Read tasks" }, { id: "lint", type: "run", command: "pnpm lint" }, { id: "review", type: "instruction", text: "Review changes" }]'
    when:
      - GetHookInstructions collects hooks for the pre phase
    then:
      - 'the result contains [{ id: "guidance", text: "Read tasks" }, { id: "review", text: "Review changes" }]'
      - AND lint is not included
  - requirement: Hook filtering with --only
    name: Single instruction hook returned by ID
    given:
      - 'pre hooks [{ id: "guidance", instruction: "Read tasks" }, { id: "review", instruction: "Review changes" }]'
    when:
      - 'GetHookInstructions.execute is called with only: "review"'
    then:
      - 'the result contains only { id: "review", text: "Review changes" }'
  - requirement: Hook filtering with --only
    name: Filtering by run hook ID throws error
    given:
      - 'pre hooks [{ id: "lint", run: "pnpm lint" }]'
    when:
      - 'GetHookInstructions.execute is called with only: "lint"'
    then:
      - 'a domain error is thrown — run: hooks are not queryable via this use case'
  - requirement: Hook filtering with --only
    name: Unknown hook ID throws error
    given:
      - 'pre hooks [{ id: "guidance", instruction: "Read tasks" }]'
    when:
      - 'GetHookInstructions.execute is called with only: "nonexistent"'
    then:
      - a domain error is thrown
  - requirement: Result shape
    name: No instruction hooks returns empty array
    given:
      - 'a step with only run: hooks in the pre phase'
    when:
      - 'GetHookInstructions.execute is called with phase: "pre"'
    then:
      - 'the result is { phase: "pre", instructions: [] }'
  - requirement: Change lookup — archive fallback
    name: Post-archiving fallback — change found in archive
    given:
      - a change named my-change does not exist in ChangeRepository
      - AND ArchiveRepository.get("my-change") returns an ArchivedChange
    when:
      - 'GetHookInstructions.execute is called with name: "my-change", step: "archiving", phase: "post"'
    then:
      - the use case proceeds normally using the archived change
      - AND change.path template variable resolves to ArchiveRepository.archivePath(archivedChange)
  - requirement: Change lookup — archive fallback
    name: Post-archiving fallback — change not in either repository
    given:
      - a change named nonexistent does not exist in ChangeRepository
      - AND ArchiveRepository.get("nonexistent") returns null
    when:
      - 'GetHookInstructions.execute is called with name: "nonexistent", step: "archiving", phase: "post"'
    then:
      - ChangeNotFoundError is thrown
  - requirement: Change lookup — archive fallback
    name: Active change takes precedence over archived
    given:
      - a change named my-change exists in both ChangeRepository and ArchiveRepository
    when:
      - 'GetHookInstructions.execute is called with name: "my-change", step: "archiving", phase: "post"'
    then:
      - the active change from ChangeRepository is used
      - AND ArchiveRepository.get() is not called
  - requirement: Change lookup — archive fallback
    name: Non-archiving step does not fall back to archive
    given:
      - a change named my-change does not exist in ChangeRepository
      - AND ArchiveRepository.get("my-change") would return an ArchivedChange
    when:
      - 'GetHookInstructions.execute is called with name: "my-change", step: "implementing", phase: "post"'
    then:
      - ChangeNotFoundError is thrown immediately
      - AND ArchiveRepository.get() is not called
