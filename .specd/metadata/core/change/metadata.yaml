generatedBy: 'agent'
title: 'Change'
description: >
  Defines the Change entity, the central domain object in specd that represents a discrete unit of
  in-progress spec work spanning one or more workspaces. It specifies identity, lifecycle state
  machine with configurable approval gates, artifact tracking with dependency cascades, event-sourced
  history, schema version compatibility, and drafting/discarding workflows.
keywords:
  - 'change-entity'
  - 'lifecycle-state-machine'
  - 'approval-gates'
  - 'artifact-tracking'
  - 'event-sourcing'
  - 'spec-approval'
  - 'signoff-gate'
  - 'change-drafting'
dependsOn:
  - 'core:core/config'
  - 'core:core/schema-format'
  - 'core:core/change-manifest'
  - 'core:core/storage'
  - 'core:core/delta-format'
  - 'core:core/spec-metadata'
  - 'core:core/spec-id-format'
  - 'core:core/workspace'
contentHashes:
  'spec.md': 'sha256:2b377d69090ac1d40fa1fec616fa44a9aea11397fa9fb9127ddf07f4314fb42b'
  'verify.md': 'sha256:ae8f0951bbeac2123fd4ad471c5e3ceae23aebd17eb132c8fe6e37eb2a1f6bfd'
rules:
  - requirement: 'Identity'
    rules:
      - 'A Change has a unique user-defined slug name and a createdAt timestamp, both immutable and set at creation time.'
      - 'The name is the primary handle used in all CLI commands and port interfaces.'
      - 'The createdAt timestamp is the source of truth for ordering; storage directory name prefix is derived from it but is an infrastructure concern not part of the domain model.'
  - requirement: 'Workspaces and specs'
    rules:
      - 'A Change declares specIds as zero or more spec IDs being created or modified; an empty list is allowed.'
      - 'workspaces is a computed getter derived at runtime from specIds by extracting the workspace component via parseSpecId(); it is not declared or persisted.'
      - 'specDependsOn is an optional map from spec ID to an array of spec IDs representing per-spec declared dependencies, used by CompileContext as highest-priority source for dependsOn resolution.'
      - 'Updating specDependsOn does not trigger approval invalidation.'
      - 'specIds workspace components are validated against specd.yaml at creation time; spec paths are not validated against the filesystem since new specs may not yet exist.'
      - 'specIds is mutable after creation; any modification triggers approval invalidation.'
      - 'When specIds is updated via updateSpecIds(), any specDependsOn entry whose key is absent from the new spec ID set shall be removed.'
      - 'CompileContext derives active workspaces from specIds via the workspaces getter and resolves dependsOn dynamically on every execution by reading each spec .specd-metadata.yaml and following links transitively.'
  - requirement: 'Lifecycle'
    rules:
      - 'A Change progresses through states: drafting, designing, ready, pending-spec-approval, spec-approved, implementing, verifying, done, pending-signoff, signed-off, archivable.'
      - 'pending-spec-approval and spec-approved are only reachable when approvals.spec is true; pending-signoff and signed-off are only reachable when approvals.signoff is true.'
      - 'Only transitions defined in the state machine are valid; any other transition throws InvalidStateTransitionError.'
      - 'archivable is the terminal state; no further transitions are possible.'
      - 'The implementing to verifying transition is bidirectional and may repeat any number of times.'
      - 'The implementing to verifying transition is only valid when all artifacts in the implementing step requires field have zero matches for their taskCompletionCheck.incompletePattern.'
      - 'The default incompletePattern is markdown unchecked checkboxes matching the regex ^\s*-\s+\[ \] when taskCompletionCheck is not declared in the schema.'
      - 'The verifying to implementing transition is taken when verification fails; it does not trigger approval invalidation and resets the tasks artifact to in-progress.'
  - requirement: 'Implementation and verification loop'
    rules:
      - 'The implementing and verifying states form a loop that repeats until verification passes.'
      - 'The implementing to verifying transition requires zero matches of taskCompletionCheck.incompletePattern across all artifacts in the implementing step requires list; throws InvalidStateTransitionError if any incomplete item is found.'
      - 'The verifying to implementing transition does not trigger approval invalidation.'
  - requirement: 'Spec approval gate'
    rules:
      - 'When approvals.spec is true, ready to implementing is blocked; the change must transition through pending-spec-approval and receive explicit approval with approver identity, reason, and artifact hashes before reaching spec-approved.'
      - 'When approvals.spec is false (default), ready to implementing is a free transition and pending-spec-approval and spec-approved are unreachable.'
  - requirement: 'Signoff gate'
    rules:
      - 'When approvals.signoff is true, done to archivable is blocked regardless of change content; the change must transition through pending-signoff and receive explicit sign-off before reaching signed-off and then archivable.'
      - 'When approvals.signoff is false (default), done to archivable is a free transition.'
  - requirement: 'Artifacts'
    rules:
      - 'A Change holds a set of artifacts whose types and dependency graph are declared by the active schema.'
      - 'Each ChangeArtifact has type, optional, requires, and files (a Map<string, ArtifactFile> keyed by file key).'
      - 'For scope: change artifacts there is one file keyed by artifact type id; for scope: spec artifacts there is one file per spec ID in change.specIds.'
      - 'Each ArtifactFile has key, filename, status (derived at load time), and validatedHash.'
      - 'ArtifactFile status is derived from validatedHash and file presence: __skipped__ sentinel yields skipped; file absent yields missing; cleaned hash matches validatedHash yields complete; otherwise in-progress.'
      - 'Aggregated ChangeArtifact status: complete when all files are complete or skipped with at least one file; skipped when all files are skipped; missing when all files are missing or no files exist; in-progress otherwise.'
      - 'ChangeArtifact.markComplete(key, hash) delegates to ArtifactFile.markComplete(hash) and may only be called by ValidateArtifacts.'
      - 'ChangeArtifact.markSkipped() marks all files as skipped and may only be called by the skip use case.'
      - 'invalidate() accepts optional driftedArtifactIds; when provided, only drifted artifacts and their downstream dependents have validatedHash cleared; upstream artifacts are left intact.'
      - 'When driftedArtifactIds is not provided, all artifacts are reset.'
      - 'For the verifying to implementing transition, only artifacts in the implementing step requires list are reset.'
      - 'Effective status cascades: an artifact is in-progress if any artifact in its requires chain is neither complete nor skipped.'
      - 'A skipped optional artifact satisfies the dependency for downstream artifacts and workflow steps.'
  - requirement: 'Artifact sync'
    rules:
      - 'syncArtifacts(artifactTypes) reconciles the artifact map against the current schema artifact types: adds new types and files, removes types no longer in schema, and adjusts files for changed specIds.'
      - 'syncArtifacts returns true if changes were made, false if already in sync.'
      - 'When changes are made, an ArtifactsSyncedEvent is appended with SYSTEM_ACTOR identity ({name: specd, email: system@specd.dev}).'
  - requirement: 'History and event sourcing'
    rules:
      - 'The change manifest contains an append-only history array of typed events; events are never modified or removed.'
      - 'Current lifecycle state is derived from the to field of the most recent transitioned event; if none exists the state is drafting.'
      - 'Current draft/active status is derived from history: if the most recent drafted or restored event is drafted, the change is shelved in drafts/.'
      - 'Active approval for each gate is the most recent spec-approved or signed-off event not superseded by a subsequent invalidated event.'
      - 'All events share common fields: type, at (ISO 8601 timestamp), and by (git identity with name and email).'
      - 'Event types are: created, transitioned, spec-approved, signed-off, invalidated, drafted, restored, artifact-skipped, artifacts-synced, and discarded.'
      - 'When spec list or artifact content changes, an invalidated event is appended followed by a transitioned event rolling back to designing.'
      - 'Invalidation can be triggered by use cases or automatically by FsChangeRepository.get() using SYSTEM_ACTOR when artifact file drift is detected.'
  - requirement: 'Schema version'
    rules:
      - 'The created event records the schemaName and schemaVersion of the schema active at creation time.'
      - 'A schemaName mismatch throws SchemaMismatchError before any work is performed by ArchiveChange, ValidateArtifacts, or CompileContext.'
      - 'A schemaVersion mismatch within the same schema name is advisory; a warning is emitted but the change remains usable and archivable.'
  - requirement: 'Drafting and discarding'
    rules:
      - 'Draft moves a change from changes/ to drafts/, appending a drafted event with mandatory by identity and optional reason; can be performed at any point before archiving.'
      - 'Restore moves a drafted change from drafts/ back to changes/, appending a restored event; the change resumes from its preserved state.'
      - 'Discard moves a change to discarded/, appending a discarded event with mandatory reason and by identity, and optional supersededBy list of replacement change names.'
      - 'Discarding is irreversible; a change may be drafted and restored multiple times before being discarded.'
constraints:
  - 'name and createdAt are set at creation and never changed.'
  - 'workspaces is a computed getter derived from specIds via parseSpecId() and is not declared or persisted.'
  - 'specIds may be empty, resulting in empty workspaces.'
  - 'Current lifecycle state is derived from history (last transitioned event); no state snapshot is stored.'
  - 'Any modification to the spec list or artifact content appends an invalidated event followed by a transitioned event back to designing, triggered by use cases or automatically by FsChangeRepository.get() using SYSTEM_ACTOR.'
  - 'ChangeArtifact contains files: Map<string, ArtifactFile>; artifact status is aggregated from per-file statuses.'
  - 'ArtifactFile status is never stored directly; it is always derived from validatedHash and file presence.'
  - 'validatedHash === "__skipped__" is the sentinel for skipped status and is only valid on optional: true artifacts.'
  - 'skipped is only valid for optional: true artifacts; attempting to skip a non-optional artifact throws an error.'
  - 'skipped satisfies the dependency in requires chains and workflow step availability checks.'
  - 'On invalidated event with driftedArtifactIds: only drifted artifacts and their downstream dependents have validatedHash cleared; without driftedArtifactIds all artifacts are reset.'
  - 'On verifying to implementing transition: only artifacts in implementing.requires are reset.'
  - 'ChangeArtifact.markComplete(key, hash) may only be called from ValidateArtifacts.'
  - 'ChangeArtifact.markSkipped() marks all files and may only be called from the skip use case.'
  - 'syncArtifacts(artifactTypes) reconciles the artifact map against the schema and appends artifacts-synced event with SYSTEM_ACTOR when changes occur.'
  - 'archivable is the only state from which a change may be archived; any other state throws InvalidStateTransitionError.'
  - 'Both approval gates default to false; teams opt in via approvals in specd.yaml.'
  - 'When approvals.spec is true, spec approval is required before implementing.'
  - 'When approvals.signoff is true, sign-off is always required before archivable regardless of change content.'
  - 'implementing to verifying requires zero matches of taskCompletionCheck.incompletePattern across all artifacts in implementing.requires; defaults to ^\s*-\s+\[ \] if not declared; throws InvalidStateTransitionError if any incomplete item is found.'
  - 'verifying to implementing does not trigger approval invalidation.'
  - 'History events are never modified or deleted; invalidated approvals are identifiable by a subsequent invalidated event.'
  - 'Discarding a change requires a discarded event with mandatory reason and by; it is irreversible.'
scenarios:
  - requirement: 'Identity'
    name: 'Change name immutable after creation'
    when:
      - 'a Change is created with name add-auth-flow'
    then:
      - 'the name cannot be changed by any subsequent operation'
  - requirement: 'Workspaces and specs'
    name: 'Workspaces derived from specIds'
    when:
      - "a Change has specIds: ['default:auth/login', 'billing:invoices']"
    then:
      - "workspaces returns ['default', 'billing'] derived via parseSpecId()"
  - requirement: 'Workspaces and specs'
    name: 'Workspaces empty when specIds empty'
    when:
      - 'a Change has an empty specIds list'
    then:
      - 'workspaces returns an empty list'
  - requirement: 'Workspaces and specs'
    name: 'Empty specIds allowed at creation'
    when:
      - 'a Change is created with an empty specIds list'
    then:
      - 'creation succeeds and workspaces is empty'
  - requirement: 'Workspaces and specs'
    name: 'Single workspace derived from specIds'
    when:
      - "a Change has specIds: ['default:auth/login']"
    then:
      - 'only the default workspace is active for CompileContext'
  - requirement: 'Workspaces and specs'
    name: 'Multi-workspace derived from specIds'
    when:
      - "a Change has specIds: ['default:auth/login', 'billing:invoices']"
    then:
      - 'both default and billing are active and both workspace-level context patterns are applied'
  - requirement: 'Workspaces and specs'
    name: 'Spec added after creation'
    when:
      - "a new spec ID is added to the Change's specIds"
    then:
      - "an invalidated event with cause: 'spec-change' is appended and a transitioned event rolling back to designing is appended"
  - requirement: 'Workspaces and specs'
    name: 'Orphaned specDependsOn removed when spec removed from specIds'
    given:
      - "a Change with specIds: ['auth/login', 'auth/session']"
      - "AND specDependsOn has entries for both 'auth/login' and 'auth/session'"
    when:
      - "updateSpecIds(['auth/login'], actor) is called"
    then:
      - "specDependsOn no longer has an entry for 'auth/session'"
      - "AND specDependsOn still has the entry for 'auth/login'"
  - requirement: 'Lifecycle'
    name: 'Valid transition succeeds'
    when:
      - 'a Change in drafting state is transitioned to designing'
    then:
      - "a transitioned event with from: 'drafting' and to: 'designing' is appended and deriving state from history returns designing"
  - requirement: 'Lifecycle'
    name: 'Invalid transition throws'
    when:
      - 'a Change in drafting state is transitioned to archivable'
    then:
      - 'InvalidStateTransitionError is thrown, no event is appended, and the state remains drafting'
  - requirement: 'Lifecycle'
    name: 'archivable is terminal'
    when:
      - 'a Change in archivable state is transitioned to any other state'
    then:
      - 'InvalidStateTransitionError is thrown'
  - requirement: 'Lifecycle'
    name: 'State derived from history — no snapshot'
    when:
      - "a Change has a history containing two transitioned events ending with to: 'implementing'"
    then:
      - 'deriving state from history returns implementing without reading any separate state field'
  - requirement: 'Lifecycle'
    name: 'Valid transition — implementing to verifying when all task items complete'
    given:
      - 'a Change in implementing state'
      - "AND all artifacts in the implementing step's requires have zero matches for their taskCompletionCheck.incompletePattern"
    when:
      - 'the change is transitioned to verifying'
    then:
      - "a transitioned event with from: 'implementing' and to: 'verifying' is appended and deriving state returns verifying"
  - requirement: 'Lifecycle'
    name: 'Default incompletePattern matches markdown unchecked checkboxes'
    given:
      - 'an artifact with no taskCompletionCheck declared'
      - 'AND its file contains - [ ] implement login and - [x] implement logout'
    when:
      - 'the implementing to verifying transition is attempted'
    then:
      - 'the default pattern ^\s*-\s+\[ \] matches - [ ] implement login and the transition is blocked'
  - requirement: 'Lifecycle'
    name: 'Custom incompletePattern blocks transition'
    given:
      - "an artifact declares taskCompletionCheck.incompletePattern: '^\\s*TODO:'"
      - 'AND its file contains TODO: implement login and DONE: implement logout'
    when:
      - 'the implementing to verifying transition is attempted'
    then:
      - 'the custom pattern matches TODO: implement login and the transition is blocked'
  - requirement: 'Lifecycle'
    name: 'Invalid transition — implementing to verifying when a task item is incomplete'
    given:
      - 'a Change in implementing state'
      - "AND at least one artifact in the implementing step's requires has one or more matches for taskCompletionCheck.incompletePattern"
    when:
      - 'the change is transitioned to verifying'
    then:
      - 'InvalidStateTransitionError is thrown and the state remains implementing'
  - requirement: 'Lifecycle'
    name: 'Progress reported from both patterns'
    given:
      - 'an artifact with taskCompletionCheck.completePattern and taskCompletionCheck.incompletePattern both declared'
      - 'AND the artifact file contains 3 complete items and 2 incomplete items'
    when:
      - 'the CLI reports task progress'
    then:
      - 'it reports 3/5 tasks complete'
  - requirement: 'Lifecycle'
    name: 'Invalid transition — implementing to done (skipping verifying)'
    when:
      - 'a Change in implementing state is transitioned directly to done'
    then:
      - 'InvalidStateTransitionError is thrown and the state remains implementing'
  - requirement: 'Lifecycle'
    name: 'Valid transition — verifying back to implementing when verification fails'
    given:
      - 'a Change in verifying state where verification has failed and changes are required'
    when:
      - 'the change is transitioned back to implementing'
    then:
      - "a transitioned event with from: 'verifying' and to: 'implementing' is appended"
      - 'AND no approval invalidation is triggered'
  - requirement: 'Lifecycle'
    name: 'implementing ↔ verifying loop repeats until verification passes'
    given:
      - 'a Change that has cycled through implementing to verifying to implementing to verifying'
    when:
      - 'verification passes on the second verifying round'
    then:
      - 'the change transitions to done and the full cycle is recorded in history'
  - requirement: 'Lifecycle'
    name: 'Valid transition — verifying to done'
    when:
      - 'a Change in verifying state transitions to done'
    then:
      - "a transitioned event with from: 'verifying' and to: 'done' is appended"
  - requirement: 'Spec approval gate'
    name: 'Gate disabled — free transition to implementing'
    when:
      - 'approvals.spec: false (default) and a Change is in ready state'
    then:
      - 'it transitions directly to implementing with no approval required'
  - requirement: 'Spec approval gate'
    name: 'Gate enabled — blocked until spec approved'
    when:
      - 'approvals.spec: true and a Change is in ready state'
    then:
      - 'it transitions to pending-spec-approval, not implementing'
  - requirement: 'Spec approval gate'
    name: 'Gate enabled — implementing reachable after approval'
    when:
      - 'approvals.spec: true and a Change in pending-spec-approval receives approval'
    then:
      - 'a spec-approved event is appended, then a transitioned event to spec-approved state, then to implementing'
  - requirement: 'Signoff gate'
    name: 'Gate disabled — free transition to archivable'
    when:
      - 'approvals.signoff: false (default) and a Change is in done state'
    then:
      - 'it transitions directly to archivable regardless of change content'
  - requirement: 'Signoff gate'
    name: 'Gate enabled — always blocked at done'
    when:
      - 'approvals.signoff: true and a Change is in done state'
    then:
      - 'it transitions to pending-signoff, not archivable — regardless of whether changes are additions, modifications, or removals'
  - requirement: 'Signoff gate'
    name: 'Gate enabled — archivable after signoff'
    when:
      - 'approvals.signoff: true and a Change in pending-signoff receives sign-off'
    then:
      - 'a signed-off event is appended, then a transitioned event to signed-off state, then to archivable'
  - requirement: 'Signoff gate'
    name: 'Archive from non-archivable state throws'
    when:
      - 'archiving is attempted on a Change not in archivable state'
    then:
      - 'InvalidStateTransitionError is thrown'
  - requirement: 'Artifacts'
    name: 'Status derived — complete'
    when:
      - "the cleaned hash of an artifact's current file matches its validatedHash"
    then:
      - 'effectiveStatus returns complete'
  - requirement: 'Artifacts'
    name: 'Status derived — missing'
    when:
      - "an artifact's file does not exist"
    then:
      - 'effectiveStatus returns missing'
  - requirement: 'Artifacts'
    name: 'Status derived — in-progress'
    when:
      - "an artifact's cleaned file hash differs from validatedHash"
    then:
      - 'effectiveStatus returns in-progress'
  - requirement: 'Artifacts'
    name: 'preHashCleanup applied before status comparison'
    when:
      - 'an artifact has preHashCleanup defined and a progress marker changes (e.g. a checkbox is checked)'
    then:
      - 'effectiveStatus remains complete — the cleaned hash is unchanged'
  - requirement: 'Artifacts'
    name: 'Status derived — skipped'
    given:
      - 'an optional: true artifact with no file on disk'
      - 'AND its validatedHash is "__skipped__"'
    when:
      - 'effectiveStatus is derived'
    then:
      - 'it returns skipped'
  - requirement: 'Artifacts'
    name: 'skipped persists across calls'
    given:
      - 'an optional: true artifact with validatedHash === "__skipped__" persisted in the manifest'
    when:
      - 'effectiveStatus is derived in a subsequent CLI invocation'
    then:
      - 'it returns skipped — the sentinel in the manifest is the source of truth'
  - requirement: 'Artifacts'
    name: 'skipping a non-optional artifact fails'
    when:
      - 'an attempt is made to skip an artifact with optional: false'
    then:
      - 'the operation fails with an error and validatedHash is not modified'
  - requirement: 'Artifacts'
    name: 'invalidated event with driftedArtifactIds clears only downstream'
    given:
      - 'a DAG: proposal -> specs -> verify, proposal -> design, specs + design -> tasks'
      - 'AND all artifacts are complete'
    when:
      - "invalidate('artifact-change', actor, ['tasks']) is called"
    then:
      - 'only tasks.validatedHash is cleared (no downstream dependents)'
      - 'AND proposal, specs, verify, and design remain complete'
  - requirement: 'Artifacts'
    name: 'invalidated event with driftedArtifactIds cascades downstream'
    given:
      - 'a DAG: proposal -> specs -> verify, proposal -> design, specs + design -> tasks'
      - 'AND all artifacts are complete'
    when:
      - "invalidate('artifact-change', actor, ['specs']) is called"
    then:
      - 'specs, verify, and tasks are cleared (specs + its downstream)'
      - 'AND proposal and design remain complete'
  - requirement: 'Artifacts'
    name: 'invalidated event without driftedArtifactIds clears all'
    given:
      - 'a change with one complete artifact and one skipped artifact'
    when:
      - "invalidate('artifact-change', actor) is called without driftedArtifactIds"
    then:
      - 'all validatedHash values are cleared — the complete artifact becomes in-progress and the skipped artifact becomes missing'
  - requirement: 'Artifacts'
    name: 'verifying → implementing clears only implementing.requires artifacts'
    given:
      - 'a change with implementing.requires: [tasks] and tasks is complete'
    when:
      - 'the change transitions verifying to implementing'
    then:
      - 'only tasks.validatedHash is cleared — other artifacts retain their status'
  - requirement: 'Artifacts'
    name: 'Dependency cascade — skipped optional satisfies dependency'
    given:
      - 'artifact B requires artifact A, and artifact A is optional: true and skipped'
    when:
      - 'effectiveStatus for artifact B is derived'
    then:
      - 'it is not blocked by A — skipped is treated as resolved'
  - requirement: 'Artifacts'
    name: 'Dependency cascade — incomplete dependency'
    when:
      - 'artifact B requires artifact A, and artifact A is in-progress'
    then:
      - "effectiveStatus for artifact B returns in-progress even if B's own cleaned hash matches its validatedHash"
  - requirement: 'Artifacts'
    name: 'markComplete only from ValidateArtifacts'
    when:
      - 'any code path other than ValidateArtifacts calls Artifact.markComplete(hash)'
    then:
      - 'this is a violation of the domain contract — no other use case may set an artifact to complete'
  - requirement: 'History and event sourcing'
    name: 'History is append-only'
    when:
      - 'any operation is performed on a Change'
    then:
      - 'new events are appended to history; no existing event is modified or removed'
  - requirement: 'History and event sourcing'
    name: 'State derived from last transitioned event'
    when:
      - 'history contains transitioned events with to values of designing, ready, implementing, verifying'
    then:
      - 'deriving state returns verifying (the most recent to value)'
  - requirement: 'History and event sourcing'
    name: 'Draft status derived from history'
    when:
      - 'history contains a drafted event followed by no restored event'
    then:
      - 'the change is considered currently shelved in drafts/'
  - requirement: 'History and event sourcing'
    name: 'Draft/restore cycle tracked'
    when:
      - 'a Change is drafted, then restored, then drafted again'
    then:
      - 'history contains two drafted events and one restored event, and the change is currently shelved'
  - requirement: 'History and event sourcing'
    name: 'Active approval derived from history'
    when:
      - 'a spec-approved event exists in history and no subsequent invalidated event exists'
    then:
      - 'that approval is the active spec approval and its artifactHashes represent the current approved signature'
  - requirement: 'History and event sourcing'
    name: 'Approval superseded by subsequent invalidated event'
    when:
      - 'a spec-approved event exists in history followed by an invalidated event'
    then:
      - 'the prior spec-approved event is superseded — there is no active spec approval'
  - requirement: 'History and event sourcing'
    name: 'Multiple approval cycles in history'
    when:
      - 'a Change is spec-approved, then invalidated, then spec-approved again'
    then:
      - 'history contains two spec-approved events; the first is superseded by the invalidated event; the second is the active approval'
  - requirement: 'History and event sourcing'
    name: 'Approval events never modified'
    when:
      - 'a Change already has spec-approved or signed-off events in history'
    then:
      - 'no operation may overwrite or modify those events — only new events are appended'
  - requirement: 'History and event sourcing'
    name: 'Artifact change triggers invalidation'
    when:
      - "an artifact's validatedHash is updated (i.e. its content changed after a prior approval)"
    then:
      - "an invalidated event with cause: 'artifact-change' is appended and a transitioned event back to designing is appended"
  - requirement: 'Schema version'
    name: 'Schema version mismatch warns'
    when:
      - "a Change is loaded and the active schema's version differs from the schemaVersion recorded in the created event"
    then:
      - 'specd emits a warning but the change remains fully usable'
  - requirement: 'Schema version'
    name: 'Schema mismatch does not block archive'
    when:
      - 'a Change with a schema version mismatch is in archivable state'
    then:
      - 'archiving proceeds normally — the mismatch warning is advisory only'
  - requirement: 'Drafting and discarding'
    name: 'Draft requires identity'
    when:
      - 'a Change is drafted without providing a by identity'
    then:
      - 'the operation fails with a validation error and no event is appended'
  - requirement: 'Drafting and discarding'
    name: 'Draft appends drafted event'
    when:
      - 'a Change in implementing state is drafted with a valid identity'
    then:
      - 'a drafted event is appended to history, the change is moved to drafts/, and it retains its implementing lifecycle state'
  - requirement: 'Drafting and discarding'
    name: 'Drafted change no longer appears in active changes'
    when:
      - 'a Change has a drafted event as its most recent drafted/restored event'
    then:
      - 'the change is resolved from drafts/, not changes/'
  - requirement: 'Drafting and discarding'
    name: 'Restore appends restored event'
    when:
      - 'a drafted Change is restored'
    then:
      - 'a restored event is appended to history, the change is moved back to changes/, and it resumes from its preserved lifecycle state'
  - requirement: 'Drafting and discarding'
    name: 'Discard requires reason and identity'
    when:
      - 'a Change is discarded without providing a reason or by identity'
    then:
      - 'the operation fails with a validation error and no event is appended'
  - requirement: 'Drafting and discarding'
    name: 'Discard appends discarded event'
    when:
      - 'a Change is discarded with a reason, identity, and optional superseding change names'
    then:
      - 'a discarded event is appended to history and the change is moved to discarded/'
  - requirement: 'Drafting and discarding'
    name: 'Discard from drafts'
    when:
      - 'a drafted Change is discarded'
    then:
      - 'a discarded event is appended, the change is moved to discarded/, and it cannot be recovered'
  - requirement: 'Drafting and discarding'
    name: 'Discard with supersededBy'
    when:
      - "a Change is discarded with supersededBy: ['new-auth-flow', 'cleanup-tokens']"
    then:
      - 'the discarded event stores those names for traceability'
  - requirement: 'Drafting and discarding'
    name: 'Discarded change cannot be restored'
    when:
      - 'a discard operation is attempted to be reversed'
    then:
      - 'no operation exists to move a change out of discarded/'
