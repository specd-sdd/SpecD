title: Change Draft
description: Sometimes work needs to be paused without losing progress or polluting the active change list. `specd change draft <name> [--reason <text>]` shelves an active change to `drafts/` without affecting its lifecycle state, keeping it recoverable at any time via `specd drafts restore`.
dependsOn:
  - cli:cli/entrypoint
  - core:core/change
context:
  - Sometimes work needs to be paused without losing progress or polluting the active change list. `specd change draft <name> [--reason <text>]` shelves an active change to `drafts/` without affecting its lifecycle state, keeping it recoverable at any time via `specd drafts restore`.
rules:
  - requirement: Command signature
    rules:
      - |-
        ```
        specd change draft <name> [--reason <text>] [--format text|json|toon]
        ```

        - `<name>` — required positional; the name of the change to shelve
        - `--reason <text>` — optional; a human-readable explanation for shelving the change
        - `--format text|json|toon` — optional; output format, defaults to `text`
  - requirement: Behaviour
    rules:
      - The command moves the change from `changes/` to `drafts/` and appends a `drafted` event to history. The lifecycle state is preserved. The change can be recovered at any time using `specd change restore`.
  - requirement: Output on success
    rules:
      - |-
        On success, output depends on `--format`:

        - `text` (default): prints a single line to stdout:
        - `json` or `toon`: outputs the following to stdout (encoded in the respective format):
  - requirement: Error cases
    rules:
      - |-
        - If the change does not exist, the command exits with code 1 and prints an `error:` message to stderr.
        - If the change is already in `drafts/`, the command exits with code 1 and prints an `error:` message to stderr.
constraints:
  - Drafting does not affect lifecycle state
  - A change may be drafted at any point before archiving
  - --reason is stored in the drafted event but not printed on success
scenarios:
  - requirement: Command signature
    name: Missing name argument
    when:
      - specd change draft is run without a name
    then:
      - the command exits with code 1 and prints a usage error to stderr
  - requirement: Behaviour
    name: Change moved to drafts
    given:
      - an active change my-change in changes/
    when:
      - specd change draft my-change is run
    then:
      - the change is moved to drafts/
      - AND a drafted event is appended to history
      - AND the lifecycle state is unchanged
  - requirement: Behaviour
    name: Optional reason stored in history
    when:
      - specd change draft my-change --reason "on hold" is run
    then:
      - 'the drafted event in history has reason: "on hold"'
  - requirement: Output on success
    name: Success message
    when:
      - specd change draft my-change succeeds
    then:
      - stdout contains drafted change my-change
      - AND the process exits with code 0
  - requirement: Error cases
    name: Change not found
    when:
      - specd change draft nonexistent is run
    then:
      - the command exits with code 1
      - 'AND stderr contains an error: message'
  - requirement: Error cases
    name: Already drafted
    given:
      - my-change is already in drafts/
    when:
      - specd change draft my-change is run
    then:
      - the command exits with code 1
      - 'AND stderr contains an error: message'
  - requirement: Output on success
    name: JSON output on success
    when:
      - specd change draft my-change --format json succeeds
    then:
      - stdout is valid JSON with result equal to "ok" and name equal to "my-change"
      - AND the process exits with code 0
