title: Graph Stats
description: Without a quick overview of the code graph's contents, users and agents cannot tell whether the graph is populated, how large it is, or when it was last updated. The `specd graph stats` command displays summary statistics from the code graph so users can assess coverage and freshness at a glance.
dependsOn:
  - cli:cli/entrypoint
  - code-graph:code-graph/composition
  - code-graph:code-graph/staleness-detection
context:
  - Without a quick overview of the code graph's contents, users and agents cannot tell whether the graph is populated, how large it is, or when it was last updated. The `specd graph stats` command displays summary statistics from the code graph so users can assess coverage and freshness at a glance.
rules:
  - requirement: Command signature
    rules:
      - |-
        ```
        specd graph stats [--path <path>] [--format text|json|toon]
        ```

        - `--path` — optional; workspace root, defaults to the current working directory
        - `--format text|json|toon` — optional; output format, defaults to `text`
  - requirement: Statistics retrieval
    rules:
      - |-
        The command:

        1. Creates a `CodeGraphProvider` with the resolved path
        2. Opens the provider
        3. Calls `getStatistics()` to retrieve the `GraphStatistics` object
        4. Resolves the current VCS ref via `createVcsAdapter(projectRoot)` and `vcs.ref()`. If VCS detection fails or `ref()` throws, `currentRef` is `null`.
        5. Compares `currentRef` against `statistics.lastIndexedRef` to determine staleness
        6. Outputs the statistics with staleness information
        7. Closes the provider
        8. Exits with `process.exit(0)` — required because the LadybugDB native addon keeps the Node process alive
  - requirement: Output format
    rules:
      - |-
        In `text` mode (default), the output is a labelled summary:

        ```
        Files:     459
        Symbols:   1497
        Specs:     122
        Languages: javascript, typescript
        Relations:
          IMPORTS: 1227
          DEFINES: 1497
        Last indexed: 2026-03-14T10:38:30.178Z
        ```

        - `Files`, `Symbols`, `Specs` show `fileCount`, `symbolCount`, `specCount`
        - `Languages` shows the `languages` array joined by `, `
        - `Relations` shows only non-zero relation counts from `relationCounts`, each on its own indented line
        - `Last indexed` shows `lastIndexedAt` as an ISO 8601 timestamp

        If the graph is stale, a warning line SHALL be appended after `Last indexed`:

        ```
        ⚠ Graph is stale (indexed at <short-ref>, current: <short-ref>)
        ```

        Where `<short-ref>` is the first 7 characters of the ref. If `lastIndexedRef` is `null`, no staleness line is shown.

        In `json` or `toon` mode, the full `GraphStatistics` object is output as-is, with two additional fields:

        - `stale: boolean | null` — `true` if stale, `false` if fresh, `null` if unknown
        - `currentRef: string | null` — the current VCS ref, or `null` if unavailable
  - requirement: Error cases
    rules:
      - If the provider cannot be opened or statistics retrieval fails due to an infrastructure error, the command exits with code 3.
constraints:
  - The CLI does not compute statistics — it delegates entirely to @specd/code-graph
  - process.exit(0) is called explicitly after closing the provider
  - Zero-value relation counts are omitted from text output for readability
scenarios:
  - requirement: Statistics retrieval
    name: Command retrieves statistics and resolves VCS ref
    when:
      - graph stats is executed
    then:
      - the command SHALL create a provider, open it, call getStatistics(), resolve the current VCS ref, output results, close the provider, and exit with code 0
  - requirement: Statistics retrieval
    name: VCS detection failure is graceful
    given:
      - the project has no VCS (e.g. no .git/ directory)
    when:
      - graph stats is executed
    then:
      - currentRef SHALL be null
      - AND the command SHALL proceed without error
  - requirement: Output format
    name: Text output with fresh graph
    given:
      - lastIndexedRef equals the current VCS ref
    when:
      - graph stats is run in text mode
    then:
      - no staleness warning line SHALL be shown
  - requirement: Output format
    name: Text output with stale graph
    given:
      - lastIndexedRef is "abc1234def" and the current VCS ref is "fff9999aaa"
    when:
      - graph stats is run in text mode
    then:
      - 'a line ⚠ Graph is stale (indexed at abc1234, current: fff9999) SHALL appear after Last indexed'
  - requirement: Output format
    name: Text output with null ref
    given:
      - lastIndexedRef is null
    when:
      - graph stats is run in text mode
    then:
      - no staleness line SHALL be shown
  - requirement: Output format
    name: JSON output includes staleness fields
    when:
      - graph stats --format json is run
    then:
      - the output SHALL include stale (boolean or null) and currentRef (string or null) fields
  - requirement: Output format
    name: JSON stale field values
    given:
      - the graph is stale
    when:
      - graph stats --format json is run
    then:
      - stale SHALL be true
      - AND currentRef SHALL be the current VCS ref string
  - requirement: Error cases
    name: Infrastructure error exits with code 3
    given:
      - the provider cannot be opened (e.g. database file is corrupted)
    when:
      - specd graph stats is run
    then:
      - 'stderr contains a fatal: prefixed error message'
      - AND the process exits with code 3
